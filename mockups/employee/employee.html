<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сотрудники · АСУБК</title>
<!--
  Модуль «Сотрудники» (АСУБК Credit Module), версия 2. Предшественник — employee.html,
  где всё было захардкожено в разметке. Здесь логика исполняется.

  ГЛАВНЫЙ ВОДОРАЗДЕЛ. В состоянии лежат только ФАКТЫ (EMPLOYEES / ASSIGN / ABSENCE /
  ACCOUNTS / ROLES / CURATOR / TASKS / DOCS / AUDIT). Все статусы — ПРОИЗВОДНЫЕ,
  считаются чистыми функциями на дату среза. Поля employee.status в модели нет.

  ТРИ НЕЗАВИСИМЫЕ ОСИ — три функции, три владельца:
    hrStatusAt(e,d)      кадровый статус   — меняют кадры приказом
    availabilityAt(e,d)  доступность       — считается из отсутствий, вручную не ставится
    acctStateAt(e,d)     учётная запись    — меняет администратор
  Склеивать их в один «статус сотрудника» нельзя — их некуда записать.

  ЧТО ИСПОЛНЯЕТСЯ
   1. Дата среза пересчитывает всё: подразделение/должность (mainAt), доступность,
      состояние отсутствия, истечение и.о. Чипы 2021-12-31 / 2026-07-14 / 2026-08-12.
   2. Уровни доступа A/B/C — атрибут ДАННЫХ, не экрана: canSee(class, role, empId);
      документ наследует уровень своей вкладки (DOCS[].tab -> CLASS_OF_TAB).
   3. Перевод: doTransfer() атомарно закрывает период (по = дата−1) и открывает новый.
      Решение по закреплённым заёмщикам обязательно — сами они не переходят.
   4. Увольнение: dismissBlockers() читает CURATOR/TASKS/ABSENCE; пока не ноль — кнопка
      мертва. doDismiss() закрывает периоды, отменяет будущие отсутствия, блокирует
      (не удаляет) учётную запись, снимает заёмщиков, переводит карточку в read-only.
   5. resolveActor(e,d) — контракт наружу: задание назначается на учётную запись куратора,
      при активном замещении маршрутизируется на замещающего; ответственность на кураторе.
   6. validateSubstitute() — три правила замещающего: работает · не отсутствует в пересечении ·
      имеет действующую учётную запись. Плюс запрет цепочки замещений.

  Токены дизайн-системы — из mockups/borrower/borrower.html (Jmix on Vaadin / Lumo).
-->
<style>
  :root{
    --primary:#006af5;
    --primary-text:#005fdb;
    --primary-hover:#0059d1;
    --green-btn:#2e8b3d;
    --green-btn-hover:#277633;
    --body-text:#1b2a3d;
    --secondary-text:rgba(38,55,78,0.69);
    --success:#158a4e;
    --error:#e02020;
    --green-card-bg:#eaf7f0;
    --border:#dbe0e6;
    --border-strong:#c7ced6;
    --field-bg:#f6f8fa;
    --filter-bg:#eef1f4;
    --field-border:#c9d0d8;
    --panel-border:#e3e7ec;
    --grid-hover:#f3f7fd;
    --grid-sel:#dbe9fb;
    --radius:4px;
    --font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font);color:var(--body-text);background:#fff;font-size:16px;line-height:1.4;}
  .app{display:flex;min-height:100vh;}
  .muted{color:var(--secondary-text);font-size:13px;}
  .muted b{color:var(--body-text);font-weight:600;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{width:300px;flex:0 0 300px;background:#eff1f4;border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .sidebar .brand{padding:18px 16px 14px;font-weight:600;font-size:17px;letter-spacing:0.04em;}
  .nav{flex:1;overflow-y:auto;padding-bottom:8px;}
  .nav-toggle{display:flex;align-items:center;gap:8px;width:100%;appearance:none;border:none;background:transparent;
    color:var(--body-text);cursor:pointer;text-align:left;font-family:inherit;}
  .nav-group > .nav-toggle{padding:9px 16px;font-weight:600;font-size:15px;}
  .nav-toggle:hover{background:var(--filter-bg);}
  .nav-toggle .chev{display:inline-flex;color:var(--secondary-text);transition:transform 120ms ease;flex:none;}
  .nav-group.open > .nav-toggle .chev{transform:rotate(90deg);}
  .nav-children{display:none;}
  .nav-group.open > .nav-children{display:block;}
  .nav-item{display:block;padding:7px 16px 7px 40px;font-size:16px;line-height:1.6;color:var(--secondary-text);
    text-decoration:none;cursor:pointer;}
  .nav-item:hover{background:rgba(24,39,57,0.05);}
  .nav-item.active{background:rgba(51,139,255,0.13);color:var(--body-text);font-weight:600;}
  .sidebar-foot{border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px;color:var(--secondary-text);font-size:14px;}
  .icon-btn{border:none;background:rgba(24,39,57,0.05);color:var(--primary-text);cursor:pointer;padding:7px;border-radius:var(--radius);display:flex;}

  /* ---------- TOPBAR ---------- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 26px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .topbar .title{font-weight:700;font-size:20px;}
  .date-wrap,.role-wrap{display:flex;align-items:center;gap:8px;color:var(--secondary-text);font-size:13px;}
  .date-wrap{margin-left:auto;}
  .date-wrap input,.role-wrap select{height:32px;border:1px solid var(--field-border);border-radius:var(--radius);
    background:var(--field-bg);font-family:var(--font);font-size:14px;color:var(--body-text);padding:0 8px;}
  .date-chip{height:26px;padding:0 9px;border:1px solid var(--field-border);background:#fff;border-radius:999px;
    font-family:var(--font);font-size:12px;color:var(--primary-text);cursor:pointer;}
  .date-chip:hover{background:var(--grid-hover);}
  .date-chip.on{background:var(--primary);border-color:var(--primary);color:#fff;}

  /* ---------- VIEW TABS ---------- */
  .viewtabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 26px;}
  .vtab{appearance:none;border:0;background:transparent;font-family:var(--font);font-size:15px;font-weight:600;
    color:var(--secondary-text);padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .vtab:hover{color:var(--primary-text);}
  .vtab.active{color:var(--primary-text);border-bottom-color:var(--primary-text);}
  .content{padding:18px 26px 30px;flex:1;}
  .mainview{display:none;flex:1;flex-direction:column;}
  .mainview.active{display:flex;}

  /* ---------- BUTTONS ---------- */
  .btn{font-family:var(--font);font-size:15px;font-weight:600;border-radius:var(--radius);padding:8px 16px;
    border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:var(--filter-bg);color:var(--secondary-text);border-color:var(--field-border);}
  .btn-secondary:not([disabled]):hover{background:#e4e8ed;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:not([disabled]):hover{background:var(--primary-hover);}
  .btn-green{background:var(--green-btn);color:#fff;}
  .btn-green:hover{background:var(--green-btn-hover);}
  .btn-cancel{background:#fff;color:var(--primary-text);border-color:var(--border-strong);}
  .btn-danger{background:#fff;color:#ca150c;border-color:#e6b3ae;}
  .btn-danger:not([disabled]):hover{background:#fdeaea;}
  .btn-sm{padding:4px 10px;font-size:13px;}

  /* ---------- BADGES (3 оси) ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;
    padding:2px 9px;border-radius:999px;white-space:nowrap;line-height:1.6;}
  .b-ok{color:var(--success);background:var(--green-card-bg);}
  .b-muted{color:var(--secondary-text);background:var(--filter-bg);}
  .b-info{color:var(--primary-text);background:#e9f1fe;}
  .b-warn{color:#9a6a00;background:#fdf3dd;}
  .b-err{color:var(--error);background:#fdeaea;}
  .b-dot::before{content:"●";font-size:9px;}

  /* ---------- LIST ---------- */
  .filter-card{border:1px solid var(--panel-border);border-radius:3px;padding:14px 16px;margin-bottom:14px;
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .fgrp{display:flex;align-items:center;gap:8px;}
  .fgrp label{color:var(--secondary-text);font-size:14px;}
  .fgrp select,.fgrp input{height:34px;border:1px solid var(--field-border);border-radius:var(--radius);
    background:var(--field-bg);font-family:var(--font);font-size:15px;color:var(--body-text);padding:0 8px;}
  .fgrp input{width:230px;}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .rowcount{margin-left:auto;color:var(--body-text);font-size:15px;}
  .grid{border:1px solid var(--border);border-radius:3px;overflow:hidden;}
  .grid table{width:100%;border-collapse:collapse;table-layout:fixed;}
  .grid thead th{text-align:left;font-weight:700;font-size:14px;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap;}
  .grid tbody td{padding:9px 14px;border-bottom:1px solid #eef1f4;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .grid tbody tr{cursor:pointer;}
  .grid tbody tr:hover{background:var(--grid-hover);}
  .grid tbody tr.sel{background:var(--grid-sel);}
  .grid tbody tr:last-child td{border-bottom:0;}
  .grid tbody tr.gone td{color:var(--secondary-text);background:#fbfcfd;}
  .empty-row{padding:26px;text-align:center;color:var(--secondary-text);}

  /* ---------- ОБЗОР ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .kpi{border:1px solid var(--panel-border);border-radius:var(--radius);padding:12px 14px;}
  .kpi .kn{font-size:26px;font-weight:700;line-height:1.2;}
  .kpi .kl{font-size:13px;color:var(--secondary-text);margin-top:2px;}
  .kpi.bad .kn{color:var(--error);} .kpi.warn .kn{color:#9a6a00;}
  .prob{border:1px solid var(--panel-border);border-radius:var(--radius);padding:0;margin-bottom:20px;overflow:hidden;}
  .prob-h{padding:11px 16px;background:var(--filter-bg);font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
  .prob-row{display:flex;gap:12px;align-items:flex-start;padding:11px 16px;border-top:1px solid #eef1f4;font-size:14px;}
  .prob-row .pi{flex:0 0 20px;}
  .prob-row .pb{flex:1;min-width:0;}
  .prob-row .pw{font-size:13px;color:var(--secondary-text);margin-top:2px;}
  .prob-row .pa{flex:none;}
  .prob-empty{padding:18px 16px;color:var(--success);font-size:14px;}

  /* ---------- CARD ---------- */
  .backlink{display:inline-flex;align-items:center;gap:6px;color:var(--primary-text);font-size:14px;cursor:pointer;margin-bottom:12px;}
  .backlink:hover{text-decoration:underline;}
  .header-card{border:1px solid var(--panel-border);border-radius:3px;padding:12px 18px;display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .photo{flex:0 0 76px;width:76px;height:76px;border:1px solid var(--border);border-radius:50%;
    background:var(--field-bg);display:flex;align-items:center;justify-content:center;font-size:34px;}
  .header-mid{flex:1;min-width:280px;}
  .emp-name{font-size:20px;font-weight:700;margin:0 0 1px;}
  .emp-sub{color:var(--secondary-text);font-size:14px;margin:0 0 8px;}
  .emp-sub .calc{color:var(--primary-text);}
  .calc-tag{font-size:11px;font-weight:600;color:var(--primary-text);background:#e9f1fe;border-radius:3px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
  .kv-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:15px;align-items:center;max-width:620px;}
  .kv-grid .k{color:var(--secondary-text);}
  .status-row{display:flex;flex-wrap:wrap;gap:10px 22px;align-items:center;}
  .st-axis{display:flex;align-items:center;gap:7px;}
  .st-k{font-size:12px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.03em;}
  .card-actions{display:flex;gap:10px;margin:0 0 16px;flex-wrap:wrap;align-items:center;}
  .ro-note{color:var(--secondary-text);font-size:13px;}
  .dropdown{position:relative;flex-shrink:0;}
  .dd-btn .dd-chev{margin-left:6px;font-size:11px;display:inline-block;transition:transform 120ms ease;}
  .dropdown.open .dd-chev{transform:rotate(180deg);}
  .dd-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:50;min-width:230px;
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:0 8px 24px rgba(24,39,57,0.14);padding:6px;}
  .dropdown.open .dd-menu{display:block;}
  .dd-item{display:block;width:100%;text-align:left;appearance:none;border:none;background:none;
    padding:9px 11px;border-radius:var(--radius);font-size:15px;color:var(--primary-text);cursor:pointer;}
  .dd-item:hover{background:var(--field-bg);}
  .dd-item.dd-danger{color:#ca150c;}
  .dd-div{height:1px;background:var(--border);margin:6px 4px;}

  /* ---------- TABS карточки ---------- */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .tab{appearance:none;border:0;background:transparent;font-family:var(--font);padding:9px 12px 11px;font-size:15px;
    color:var(--secondary-text);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;}
  .tab:hover{color:var(--primary-text);}
  .tab.active{color:var(--primary-text);border-bottom-color:var(--primary-text);font-weight:600;}
  .tab .cls{font-size:10px;font-weight:700;border-radius:3px;padding:0 4px;}
  .cls-B{color:#9a6a00;background:#fdf3dd;}
  .cls-C{color:var(--error);background:#fdeaea;}
  .section-title{font-size:19px;font-weight:700;margin:2px 0 4px;}
  .section-sub{font-size:16px;font-weight:700;margin:20px 0 4px;}
  .section-rule{border:0;border-top:1px solid var(--border);margin:9px 0 16px;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .section-head .section-title{margin-bottom:0;}
  .btn-edit{appearance:none;border:0;background:transparent;font-family:var(--font);font-size:14px;font-weight:600;
    color:var(--primary);cursor:pointer;padding:2px 4px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .btn-edit:hover{text-decoration:underline;}
  .btn-edit.muted{color:var(--secondary-text);}
  .edit-actions{display:inline-flex;gap:10px;flex:0 0 auto;}
  .mask{font-family:ui-monospace,Menlo,Consolas,monospace;letter-spacing:.08em;}

  /* таблицы вкладок */
  .dtable{width:100%;border-collapse:collapse;table-layout:fixed;}
  .dtable thead th{text-align:left;font-weight:700;font-size:13px;padding:10px 13px;border-bottom:1px solid var(--border);white-space:nowrap;}
  .dtable tbody td{padding:10px 13px;border-bottom:1px solid #eef1f4;font-size:14px;vertical-align:top;}
  .dtable tbody tr:last-child td{border-bottom:0;}
  .dtable tr.closed td{background:#fbfcfd;color:var(--secondary-text);}
  .grid-wrap{border:1px solid var(--border);border-radius:3px;overflow:hidden;}
  .tab-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .tab-toolbar .spacer{margin-left:auto;}
  .src-banner{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px;padding:8px 12px;
    background:#f0f4fa;border:1px solid #d7e0ee;border-left:3px solid #2f6fb0;border-radius:6px;font-size:12px;}
  .src-banner .src-sync{margin-left:auto;color:#5b6b80;white-space:nowrap;}
  .lnk{color:var(--primary-text);cursor:pointer;font-size:13px;}
  .lnk:hover{text-decoration:underline;}

  /* баннеры */
  .banner{border-radius:var(--radius);padding:11px 14px;margin:0 0 14px;font-size:14px;display:flex;gap:10px;align-items:flex-start;}
  .banner .ic{flex:0 0 18px;line-height:1.3;}
  .banner.warn{background:#fdf3dd;border:1px solid #f0dca8;color:#7a5600;}
  .banner.err{background:#fdeaea;border:1px solid #f2c4c0;color:#9a1b14;}
  .banner.info{background:#e9f1fe;border:1px solid #c7ddfb;color:#0a4aa8;}
  .banner.ok{background:var(--green-card-bg);border:1px solid #cdeadb;color:#126b3e;}
  .banner b{font-weight:700;}
  .banner code{background:rgba(0,0,0,.05);border-radius:3px;padding:0 4px;font-size:13px;}

  /* учётная запись и кураторство */
  .proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:1000px){.proj-grid{grid-template-columns:1fr;}}
  .ob-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 48px;align-items:start;}
  .ob-cols .section-sub:first-child{margin-top:0;}
  @media(max-width:1000px){.ob-cols{grid-template-columns:1fr;}}
  .proj-card{border:1px solid var(--panel-border);border-radius:var(--radius);padding:13px 15px;}
  .proj-card h4{margin:0 0 8px;font-size:15px;}
  .proj-row{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid #f0f2f5;font-size:14px;}
  .proj-row:last-child{border-bottom:0;}
  .proj-row .pk{color:var(--secondary-text);}

  /* документы */
  .doc-acc{border:1px solid var(--panel-border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;}
  .doc-acc-head{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;background:var(--filter-bg);user-select:none;}
  .doc-acc-head .chev{color:var(--secondary-text);transition:transform .12s ease;display:inline-block;width:12px;}
  .doc-acc.open .doc-acc-head .chev{transform:rotate(90deg);}
  .doc-acc-title{font-weight:700;font-size:15px;}
  .doc-acc-count{margin-left:auto;font-size:13px;font-weight:600;color:var(--secondary-text);
    background:#fff;border:1px solid var(--border);border-radius:999px;padding:2px 10px;}
  .doc-acc-body{display:none;}
  .doc-acc.open .doc-acc-body{display:block;}
  .doc-row{display:flex;align-items:center;gap:12px;padding:10px 15px;border-top:1px solid #eef1f4;flex-wrap:wrap;}
  .doc-row .dname{flex:1;min-width:200px;font-size:14px;}
  .doc-row .dmeta{flex-basis:100%;font-size:13px;color:var(--secondary-text);}

  /* таймлайн */
  .timeline{position:relative;padding-left:24px;margin-top:6px;}
  .timeline::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--border);}
  .tl-item{position:relative;padding:0 0 16px;}
  .tl-item:last-child{padding-bottom:0;}
  .tl-dot{position:absolute;left:-22px;top:4px;width:11px;height:11px;border-radius:50%;
    background:var(--primary);border:2px solid #fff;box-shadow:0 0 0 1px var(--border);}
  .tl-dot.ok{background:var(--success);} .tl-dot.muted{background:var(--secondary-text);} .tl-dot.warn{background:#d99500;}
  .tl-when{font-size:13px;color:var(--secondary-text);margin-bottom:2px;}
  .tl-what{font-size:14px;}
  .tl-what b{font-weight:600;}

  /* ---------- MODAL ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(24,39,57,0.34);z-index:100;
    display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:6px;box-shadow:0 12px 40px rgba(24,39,57,0.3);
    width:100%;max-width:660px;display:flex;flex-direction:column;max-height:88vh;overflow:hidden;}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 22px 10px;}
  .modal-title{font-weight:700;font-size:18px;}
  .modal-x{width:28px;height:28px;border:0;background:transparent;color:var(--secondary-text);font-size:18px;cursor:pointer;border-radius:var(--radius);flex:0 0 28px;}
  .modal-x:hover{background:var(--filter-bg);}
  .modal-body{padding:0 22px 14px;overflow-y:auto;}
  .modal-foot{display:flex;gap:12px;padding:13px 22px 18px;border-top:1px solid var(--border);align-items:center;}
  .modal-foot .spacer{margin-left:auto;}
  .op-box{background:var(--field-bg);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;
    font-size:13px;margin:4px 0 14px;font-family:ui-monospace,Menlo,Consolas,monospace;}
  .gate-q{font-size:15px;font-weight:600;margin:14px 0 8px;}
  .radio-row{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);border-radius:var(--radius);
    padding:11px 13px;margin-bottom:9px;cursor:pointer;}

   2. ЧИСТЫЕ ФУНКЦИИ. Всё производное считается ЗДЕСЬ и нигде больше.
   ========================================================================= */
const emp = id => EMPLOYEES.find(e => e.id === id);
const unitName = u => UNITS[u] || '—';
const acct = id => ACCOUNTS.find(a => a.emp === id);
const curatorOf = login => CURATOR.find(c => c.login === login);
const fmt = d => d ? d.split('-').reverse().join('.') : '—';
const shortFio = id => { const e = emp(id); if(!e) return '—';
  const p = e.fio.split(' '); return p[0] + ' ' + (p[1]?p[1][0]+'.':'') + (p[2]?p[2][0]+'.':''); };
const days = (a,b) => Math.round((Date.parse(b) - Date.parse(a)) / 86400000);
const addDays = (d,n) => { const t = new Date(Date.parse(d) + n*86400000); return t.toISOString().slice(0,10); };
// возвращает ТОЛЬКО слово по числу («год/года/лет») — число подставляет вызывающий
function plural(n, one, few, many){ const m10=n%10, m100=n%100; if(m10===1&&m100!==11)return one; if(m10>=2&&m10<=4&&(m100<10||m100>=20))return few; return many; }
function stazhText(from, to){
  const a=new Date(from), b=new Date(to);
  let months=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate()) months--;
  if(months<0) months=0;
  const y=Math.floor(months/12), mo=months%12;
  const parts=[];
  if(y) parts.push(y+' '+plural(y,'год','года','лет'));
  parts.push(mo+' '+plural(mo,'месяц','месяца','месяцев'));
  return parts.join(' ');
}
const spanActive = (from,to,d) => from <= d && (to == null || to >= d);

// --- ось 1: кадровый статус (правовая связь) --------------------------------
function hrStatusAt(id, d){
  const e = emp(id);
  if (e.fired && e.fired <= d) return 'Уволен';
  if (assignsAt(id, d).some(a => a.kind === 'main')) return 'Работает';
  return 'Оформляется';           // черновик: правовой связи ещё/уже нет
}
function assignsAt(id, d){ return ASSIGN.filter(a => a.emp === id && spanActive(a.from, a.to, d)); }
function mainAt(id, d){ return assignsAt(id, d).find(a => a.kind === 'main') || null; }
function deptPostAt(id, d){ const m = mainAt(id, d); return m ? unitName(m.unit) + ' · ' + m.post : '— · —'; }
// Руководитель = начальник подразделения текущего основного назначения.
const HEAD_OF_UNIT = { uk:'e142', otr:'e113', vzy:'e044', jur:'e178', buh:'e180' };
// Начальники отделов подчиняются директору (e113). Директор — корень, руководителя нет.
const MANAGER_OF = { e142:'e113', e044:'e113', e178:'e113', e180:'e113' };
function managerOf(id, d){
  if (MANAGER_OF[id]) return emp(MANAGER_OF[id]) || null;
  const m = mainAt(id, d); if (!m) return null;
  const hid = HEAD_OF_UNIT[m.unit];
  if (!hid || hid === id) return null;             // сам руководитель подразделения
  return emp(hid) || null;
}
function rateSumAt(id, d){ return assignsAt(id, d).reduce((s,a) => s + a.rate, 0); }

// --- ось 2: доступность (вычисляется из ABSENCE, никто её не «ставит») ------
function absenceAt(id, d){
  return ABSENCE.find(b => b.emp === id && !b.cancelled && spanActive(b.from, b.factTo || b.planTo, d)) || null;
}
function absenceStateAt(b, d){
  if (b.cancelled) return {t:'Отменено', c:'b-muted'};
  const end = b.factTo || b.planTo;
  if (b.from > d) return {t:'Запланировано', c:'b-muted'};
  if (end < d)    return {t:'Завершено',     c:'b-ok'};
  return {t:'Идёт', c:'b-warn'};
}
function substitutingFor(id, d){   // кого этот сотрудник замещает на дату
  return ABSENCE.filter(b => b.sub === id && !b.cancelled && spanActive(b.from, b.factTo||b.planTo, d))
                .map(b => b.emp);
}
function availabilityAt(id, d){
  const st = hrStatusAt(id, d);
  if (st === 'Уволен')      return {t:'вне организации', c:'b-muted'};
  if (st === 'Оформляется') return {t:'—', c:'b-muted'};
  const b = absenceAt(id, d);
  if (b){
    const kind = b.kind.startsWith('Больнич') ? 'На больничном'
               : b.kind.startsWith('Команд')  ? b.kind
               : 'В отпуске';
    const tail = b.sub ? ' · замещает ' + shortFio(b.sub) : ' · замещения нет';
    return {t:`${kind} до ${fmt(b.factTo||b.planTo)}${tail}`, c: b.sub ? 'b-warn' : 'b-err', away:true};
  }
  const covering = substitutingFor(id, d);
  if (covering.length) return {t:'На месте · замещает ' + covering.map(shortFio).join(', '), c:'b-ok'};
  return {t:'На месте', c:'b-ok'};
}

// --- ось 3: состояние УЗ (доступ; меняет администратор) ---------------------
function acctStateAt(id, d){
  const a = acct(id);
  if (!a) return {t:'не заведена', c:'b-muted', state:null};
  if (a.state === 'blocked') return {t:'заблокирована', c:'b-err', state:'blocked'};
  return {t:'активна', c:'b-info', state:'active'};
}

// --- контракт наружу: кому уедет задание ------------------------------------
function resolveActor(id, d){
  const a = acct(id);
  if (!a || a.state !== 'active') return {assignee:null, router:null, note:'Учётной записи нет или она заблокирована — задание назначить не на кого.'};
  const b = absenceAt(id, d);
  if (b && b.sub){
    const sa = acct(b.sub);
    if (sa && sa.state === 'active')
      return {assignee:a.login, router:sa.login,
              note:`Активное замещение до ${fmt(b.factTo||b.planTo)}. Ответственность остаётся на кураторе.`};
  }
  if (b && !b.sub)
    return {assignee:a.login, router:null,
            note:`Отсутствует до ${fmt(b.factTo||b.planTo)}, замещение не оформлено.`, hole:true};
  return {assignee:a.login, router:null, note:'На месте — задание уходит напрямую.'};
}

// --- правила назначений ------------------------------------------------------
function assignIssues(id, d){
  const out = [];
  const list = ASSIGN.filter(a => a.emp === id);
  const mains = list.filter(a => a.kind === 'main');
  for (let i = 0; i < mains.length; i++)
    for (let j = i+1; j < mains.length; j++){
      const A = mains[i], B = mains[j];
      const ov = A.from <= (B.to || '9999-12-31') && B.from <= (A.to || '9999-12-31');
      if (ov) out.push(`Периоды «основное» пересекаются: ${fmt(A.from)}… и ${fmt(B.from)}…`);
    }
  const sum = rateSumAt(id, d);
  if (sum > 1.5) out.push(`Сумма ставок ${sum.toFixed(1)} — больше допустимых 1.5`);
  const open = list.filter(a => a.to == null);
  if (open.length > 1) out.push('Больше одного действующего периода «основное»');
  if (open.length && hrStatusAt(id, d) === 'Уволен') out.push('Сотрудник уволен, но период назначения не закрыт');
  return out;
}

// --- уровни доступа: право на КЛАСС ДАННЫХ, а не на экран --------------------
const CLASS_OF_TAB = {obshee:'A', uz:'A', naznach:'A', otsut:'A', docs:'A', history:'A',
                      pasport:'B', obraz:'B', semya:'B', stazh:'B', yazyki:'B', voinuch:'B', nagrady:'C'};
const ROLE_CLASSES = {hr:['A','B','C'], admin:['A'], head:['A','C'], self:['A','B','C'], cred:['A']};
function canSee(cls, empId){
  if (cls === 'A') return true;
  if (role === 'self') return empId === SELF && ROLE_CLASSES.self.includes(cls);
  return ROLE_CLASSES[role].includes(cls);
}
const canSeeTab = (tabKey, empId) => canSee(CLASS_OF_TAB[tabKey], empId);
const canEdit = id => (role === 'hr') && hrStatusAt(id, asOf) !== 'Уволен';   // read-only после увольнения

// --- дашборд «Требует внимания» ---------------------------------------------
const ACTING_WINDOW = 30;
function problemsAt(d){
  const P = [];
  EMPLOYEES.forEach(e => {
    const st = hrStatusAt(e.id, d);
    if (st === 'Уволен') return;
    const a = acct(e.id);
    const cur = a ? curatorOf(a.login) : null;
    const b = absenceAt(e.id, d);

    if (st === 'Работает' && b && !b.sub && cur && cur.borrowers > 0)
      P.push({sev:'err', ic:'🔴', emp:e.id,
        t:`${e.fio} — отсутствует (${b.kind.toLowerCase()}) до ${fmt(b.factTo||b.planTo)}, замещение не оформлено`,
        w:`За ним закреплено ${cur.borrowers} ${plural(cur.borrowers,'заёмщик','заёмщика','заёмщиков')} и ${TASKS.filter(t=>t.login===a.login).length} ${plural(TASKS.filter(t=>t.login===a.login).length,'открытое задание','открытых задания','открытых заданий')} — принять их некому.`,
        act:'Оформить замещение', fn:'openAbsence'});

    if (st === 'Работает' && !a)
      P.push({sev:'err', ic:'🔴', emp:e.id, t:`${e.fio} — работает, но учётной записи нет`,
        w:'Задание назначить нельзя, замещать других не может.', act:'Открыть карточку', fn:'open'});

    if (st === 'Работает' && a && a.state === 'blocked')
      P.push({sev:'err', ic:'🔴', emp:e.id, t:`${e.fio} — работает, но учётная запись заблокирована`,
        w:'Доступа в систему нет. Разбирает администратор.', act:'Открыть карточку', fn:'open'});

    if (a && a.rolesStale)
      P.push({sev:'warn', ic:'🟡', emp:e.id, t:`${e.fio} — роли не пересмотрены после перевода (${fmt(a.rolesStale)})`,
        w:'Работу не блокирует. Роли правит администратор, уведомление отправлено.', act:'Открыть карточку', fn:'open'});

    assignsAt(e.id, d).filter(x => x.kind === 'acting' && x.to).forEach(x => {
      const left = days(d, x.to);
      if (left >= 0 && left <= ACTING_WINDOW)
        P.push({sev:'warn', ic:'🟡', emp:e.id, t:`${e.fio} — «${x.post}» заканчивается через ${left} дн. (${fmt(x.to)})`,
          w:'Дальше должность снова вакантна: продлить приказом или закрыть.', act:'Открыть карточку', fn:'open'});
    });

    if (cur && cur.conflict > 0)
      P.push({sev:'warn', ic:'🟡', emp:e.id, t:`${e.fio} — конфликт интересов: ${cur.conflict} ${plural(cur.conflict,'заёмщик','заёмщика','заёмщиков')}`,
        w:'Совпадение по составу семьи. Отстранён только от этого заёмщика, остальных ведёт как обычно.', act:'Открыть карточку', fn:'open'});

    assignIssues(e.id, d).forEach(msg =>
      P.push({sev:'err', ic:'🔴', emp:e.id, t:`${e.fio} — ошибка в назначениях`, w:msg, act:'Открыть карточку', fn:'open'}));
  });
  const rank = {err:0, warn:1};
  return P.sort((x,y) => rank[x.sev] - rank[y.sev]);
}
function metricsAt(d){
  const live = EMPLOYEES.filter(e => hrStatusAt(e.id, d) === 'Работает');
  const away = live.filter(e => availabilityAt(e.id, d).away);
  const noSub = away.filter(e => { const b = absenceAt(e.id, d); return b && !b.sub; });
  const noAcct = live.filter(e => !acct(e.id));
  const drafts = EMPLOYEES.filter(e => hrStatusAt(e.id, d) === 'Оформляется');
  return {live:live.length, away:away.length, noSub:noSub.length, noAcct:noAcct.length,
          drafts:drafts.length, fired:EMPLOYEES.filter(e => hrStatusAt(e.id, d) === 'Уволен').length};
}

/* =========================================================================
   3. МУТАЦИИ — только через гейты. Каждая пишет в AUDIT.
   ========================================================================= */
function audit(empId, what, kind){
  AUDIT.unshift({emp:empId, when: asOf.split('-').reverse().join('.') + ' ' + '12:00', who: role === 'hr' ? 'hr.kadyrova' : role, kind: kind||'', what});
}
// Создание — только карточка (кадровое дело) со ссылкой на физлицо из справочника.
// Назначения нет → hrStatusAt даёт «Оформляется».
function doCreate(f){
  const id = 'e' + (900 + EMPLOYEES.filter(e => e.id.startsWith('e9')).length + 1);
  const p = person(f.person);
  EMPLOYEES.push({
    id, person:f.person, tab:f.tab, fio:p.fio, hired:null, fired:null,
    pin:p.pin, soate:p.soate, cat:f.cat,
    phone:f.phone || '—', wphone:'—', mail:f.mail || '—', wmail:'—',
    pass:{birth:p.birth === '—' ? '—' : fmt(p.birth), sex:p.sex, nat:'—', citiz:'Кыргызская Республика',
          num:'—', issued:'—', valid:'—', family:'—', addr:p.addr}
  });
  audit(id, `<b>Создана карточка:</b> физлицо ${esc(p.fio)} (ПИН ${p.pin}), табельный № ${esc(f.tab)}. Назначения нет → статус «Оформляется», сотрудник операционно невидим.`, 'warn');
  return id;
}
// Приём = открытие первого периода назначения. Статус «Работает» получается сам.
function doHire(id, unit, post, date, rate, order){
  const e = emp(id);
  e.hired = date;
  ASSIGN.push({id:'a'+(ASSIGN.length+1), emp:id, from:date, to:null, unit, post, kind:'main', rate, order});
  audit(id, `<b>Приём:</b> открыт период «${post}, ${unitName(unit)}» с ${fmt(date)} · осн. ${order}. Учётной записи нет — её заводит администратор.`, 'ok');
}
function doTransfer(id, unit, post, date, order){
  const m = mainAt(id, asOf);
  if (m) m.to = addDays(date, -1);                                   // закрыть период
  ASSIGN.push({id:'a'+(ASSIGN.length+1), emp:id, from:date, to:null, // открыть новый — одна транзакция
               unit, post, kind:'main', rate:1.0, order});
  const a = acct(id);
  if (a) a.rolesStale = date;                                        // не блокирует, но флаг поднят
  audit(id, `<b>Перевод (атомарно):</b> закрыт период «${m ? m.post + ', ' + unitName(m.unit) : '—'}» (по ${fmt(addDays(date,-1))}) + открыт «${post}, ${unitName(unit)}» (с ${fmt(date)}) · осн. ${order}.`, 'ok');
  audit(id, 'Отмечено: <b>роли не пересмотрены</b> после перевода; уведомление администратору', 'muted');
}
function doDismiss(id, date, order){
  const e = emp(id);
  e.fired = date;
  ASSIGN.filter(a => a.emp === id && a.to == null).forEach(a => a.to = date);   // закрыть открытые периоды
  ABSENCE.filter(b => b.emp === id && b.from > date).forEach(b => b.cancelled = true); // отменить будущие
  const a = acct(id);
  if (a) a.state = 'blocked';                               // блокируется, НЕ удаляется
  audit(id, `<b>Увольнение:</b> ${fmt(date)} · осн. ${order}. Периоды назначений закрыты · будущие отсутствия отменены · учётная запись заблокирована · карточка только для чтения.`, 'muted');
}
function doAbsence(id, kind, from, to, base, subId){
  ABSENCE.push({id:'b'+(ABSENCE.length+1), emp:id, kind, from, planTo:to, factTo:null, base,
                sub: subId || null, cancelled:false});
  audit(id, `<b>Отсутствие:</b> ${kind.toLowerCase()} ${fmt(from)}–${fmt(to)}, ${subId ? 'замещающий ' + shortFio(subId) : '<b>замещающий не назначен</b>'} · осн. ${base}`, subId ? '' : 'warn');
}
// 3 правила замещающего: работает · не отсутствует в пересечении · есть учётная запись
function validateSubstitute(subId, empId, from, to){
  if (!subId) return null;
  if (subId === empId) return 'Сотрудник не может замещать сам себя.';
  if (hrStatusAt(subId, from) !== 'Работает') return `${shortFio(subId)}: на дату начала не работает.`;
  const clash = ABSENCE.find(b => b.emp === subId && !b.cancelled &&
                 b.from <= to && (b.factTo || b.planTo) >= from);
  if (clash) return `${shortFio(subId)}: в это время отсутствует (${fmt(clash.from)}–${fmt(clash.factTo||clash.planTo)}) — периоды пересекаются.`;
  const a = acct(subId);
  if (!a || a.state !== 'active') return `${shortFio(subId)}: нет действующей учётной записи — задания передать некуда.`;
  const trans = ABSENCE.find(b => b.emp === subId && b.sub && !b.cancelled && b.from <= to && (b.factTo||b.planTo) >= from);
  if (trans) return `${shortFio(subId)}: в это время уже замещают его самого — цепочка замещений не допускается.`;
  return null;
}

  return EMPLOYEES.filter(e => {
    const st = hrStatusAt(e.id, d);
    const m  = mainAt(e.id, d);
    const av = availabilityAt(e.id, d);
    if (fs && st !== fs) return false;
    if (fu && (!m || m.unit !== fu)) return false;
    if (fa === 'here' && av.away) return false;
    if (fa === 'away' && !av.away) return false;
    if (q && !(e.fio.toLowerCase().includes(q) || e.tab.includes(q))) return false;
    return true;
  });
}

// --- стаж: полных месяцев между датами -> «7 л. 3 мес.»
function monthsBetween(from, to){
  const [y1,m1,d1] = from.split('-').map(Number), [y2,m2,d2] = to.split('-').map(Number);
  let mm = (y2 - y1) * 12 + (m2 - m1);
  if (d2 < d1) mm--;
  return Math.max(0, mm);
}
function durText(mm){
  const y = Math.floor(mm / 12), m = mm % 12;
  // plural() возвращает только слово («лет») — число подставляем здесь
  const py = y ? y + ' ' + plural(y,'год','года','лет') : '';
  const pm = m ? m + ' ' + plural(m,'месяц','месяца','месяцев') : '';
  return [py, pm].filter(Boolean).join(' ') || 'меньше месяца';
}
// Стаж по набору периодов: сливаем смежные (зазор ≤ 1 дня) и перекрывающиеся интервалы,
// потом считаем месяцы один раз на слитый span — иначе остаток дней теряется на каждом стыке
// (45+54 давало 99 вместо 100), а перекрытие давало бы двойной счёт.
function coveredMonths(list, d){
  const DAY = 86400000;
  const segs = list
    .map(a => [a.from, (a.to && a.to < d) ? a.to : d])
    .filter(([f, t]) => f < t)
    .sort((x, y) => x[0].localeCompare(y[0]));
  let total = 0, curF = null, curT = null;
  for (const [f, t] of segs){
    if (curT === null){ curF = f; curT = t; }
    else if (Date.parse(f) - Date.parse(curT) <= DAY){ if (t > curT) curT = t; }  // стык/перекрытие → продлить
    else { total += monthsBetween(curF, curT); curF = f; curT = t; }              // реальный разрыв → закрыть период
  }
  if (curT !== null) total += monthsBetween(curF, curT);
  return total;
}

function pDocs(e, d){
  const mine = DOCS.filter(x => x.emp === e.id);
  const visible = mine.filter(x => canSee(CLASS_OF_TAB[x.tab], e.id));
  const hidden  = mine.length - visible.length;
  const groups = {};
  visible.forEach(x => { const c = CLASS_OF_TAB[x.tab]; (groups[c] = groups[c] || []).push(x); });
  const GN = {A:'Уровень A · приказы и основания', B:'Уровень B · кадровое дело', C:'Уровень C · дисциплинарные'};
  return `
    <div class="section-title">Документы</div><hr class="section-rule">
    ${addBtn('doc', 'Загрузить документ')}
    ${Object.keys(groups).sort().map((c,i) => `
      <div class="doc-acc ${i===0?'open':''}">
        <div class="doc-acc-head"><span class="chev">›</span>
          <span class="doc-acc-title">${GN[c]}</span>
          ${c!=='A'?`<span class="cls cls-${c}">🔒 ${c}</span>`:''}
          <span class="doc-acc-count">${groups[c].length}</span></div>
        <div class="doc-acc-body">
          ${groups[c].map(x => `<div class="doc-row">
            <span class="dname">📄 ${esc(x.name)}</span>
            <span class="badge ${c==='A'?'b-muted':c==='B'?'b-warn':'b-err'}">${c}</span>
            <span class="lnk">скачать</span>
            ${canEdit(e.id) ? `<button class="row-btn del" data-del="doc" data-id="${x.id}" title="Удалить">✕</button>` : ''}
            <div class="dmeta">версия ${x.v} · ${fmt(x.date)} · ${x.by} · вкладка «${TABS.find(t=>t.k===x.tab).n}»</div>

  const e = emp(openId), d = asOf;
  const m = mainAt(e.id, d);
  const dt = addDays(asOf, 18);

  $('#trBody').innerHTML = `
    <div class="banner info" style="margin-top:6px;"><span class="ic">ℹ️</span>
      <div>Сейчас: <b>${m ? esc(m.post + ', ' + unitName(m.unit)) : '—'}</b> с ${m ? fmt(m.from) : '—'}.</div></div>
    <div class="fld"><label for="trUnit">Новое подразделение</label>
      <select id="trUnit">${Object.entries(UNITS).map(([k,v]) =>
        `<option value="${k}" ${m && m.unit===k ? 'disabled' : ''}>${v}</option>`).join('')}</select></div>
    <div class="fld"><label for="trPost">Новая должность</label>
      <input id="trPost" value="Ведущий специалист"></div>
    <div class="fld"><label for="trDate">Дата перевода</label>
      <input type="date" id="trDate" value="${dt}"></div>
    <div class="fld"><label for="trOrder">Основание (приказ)</label>
      <input id="trOrder" placeholder="напр. Приказ №62-к от ${fmt(addDays(dt,-3))}" value="Приказ №62-к от ${fmt(addDays(dt,-3))}"></div>`;

  $('#trHint').textContent = '';
  $('#trConfirm').disabled = false;
  openModal('mTransfer');
}
$('#trConfirm').addEventListener('click', () => {
  const unit = $('#trUnit').value, post = $('#trPost').value.trim() || 'Специалист';
  const date = $('#trDate').value, order = $('#trOrder').value.trim() || 'приказ не указан';
  doTransfer(openId, unit, post, date, order);
  closeModal('mTransfer');
  renderAll();
  toast('Перевод проведён. Роли требуют пересмотра администратором.' +
    (date > asOf ? ` Вступает в силу ${fmt(date)} — поставьте эту дату среза, чтобы увидеть новое подразделение.` : ''));
});

function openRow(kind, id){
  if (kind === 'pass') return openPassport();
  if (kind === 'passSync') return syncPassport();
  rwKind = kind; rwId = id;
  const sp = ROW_SPECS[kind];
  const rec = id ? sp.arr().find(x => x.id === id) : null;
  $('#rwTitle').textContent = (rec ? 'Изменить: ' : 'Добавить: ') + sp.title.toLowerCase();
  $('#rwBody').innerHTML = sp.fields.map(f => {
    const v = rec ? (rec[f.k] ?? '') : (f.k === 'date' ? asOf : '');
    if (f.t === 'select'){
      // зависимый список (напр. «Уровень» от «Вид»): опции берём из справочника по значению ведущего поля
      const raw = f.dep
        ? (f.opts[rec ? rec[f.dep] : sp.fields.find(x => x.k === f.dep).opts[0]] || [])
        : f.opts;
      const opts = raw.map(o => Array.isArray(o) ? o : [o, o]);
      return `<div class="fld"><label for="rw_${f.k}">${f.l}</label>
        <select id="rw_${f.k}">${opts.map(([val,lab]) =>
          `<option value="${esc(val)}" ${String(v)===val?'selected':''}>${esc(lab)}</option>`).join('')}</select></div>`;
    }
    return `<div class="fld"><label for="rw_${f.k}">${f.l}</label>
      <input id="rw_${f.k}" type="${f.t}" value="${esc(v)}" autocomplete="off"></div>`;
  }).join('') + '<div id="rwErr"></div>';
  sp.fields.forEach(f => $('#rw_'+f.k).addEventListener('input', checkRow));
  // пересобрать зависимый select при смене ведущего поля
  sp.fields.filter(f => f.dep).forEach(f => {
    const master = $('#rw_'+f.dep);
    master.addEventListener('change', () => {
      const list = (f.opts[master.value] || []).map(o => Array.isArray(o) ? o : [o, o]);
      $('#rw_'+f.k).innerHTML = list.map(([val,lab]) =>
        `<option value="${esc(val)}">${esc(lab)}</option>`).join('');
      checkRow();
    });
  });
  checkRow();
  $('#rwConfirm').onclick = saveRow;
  openModal('mRow');
}
function rowValues(){
  const sp = ROW_SPECS[rwKind], out = {};
  sp.fields.forEach(f => {
    const raw = $('#rw_'+f.k).value.trim();
    out[f.k] = f.t === 'number' ? (raw ? Number(raw) : null)
             : f.t === 'date'   ? (raw || null)          // пустая дата = «нет срока», это значимо
             : (raw || '—');
  });
  return out;
}
function rowErrors(){
  const sp = ROW_SPECS[rwKind], v = rowValues(), out = [];
  sp.fields.filter(f => f.req).forEach(f => { if (v[f.k] == null || v[f.k] === '') out.push(`${f.l}: не заполнено.`); });
  if (!out.length && sp.check){ const e = sp.check(v); if (e) out.push(e); }
  return out;
}
function checkRow(){
  const errs = rowErrors();
  $('#rwErr').innerHTML = errs.map(x => `<div class="fld-err">🔴 ${esc(x)}</div>`).join('');
  $('#rwConfirm').disabled = errs.length > 0;
  $('#rwHint').textContent = errs.length ? 'Заполните обязательные поля' : 'Готово к сохранению';
}
function saveRow(){
  if (rowErrors().length) return;
  const sp = ROW_SPECS[rwKind], v = rowValues(), tabName = TABS.find(t => t.k === sp.tab).n;
  if (rwId){
    const rec = sp.arr().find(x => x.id === rwId);
    Object.assign(rec, v);
    audit(openId, `<b>${tabName}:</b> изменена запись «${esc(sp.name(rec))}»`, '');
    toast('Запись изменена.');
  } else {
    const rec = {id:'r'+(++rowSeq), emp:openId, ...v};
    if (rwKind === 'doc'){                       // версия документа = какой он по счёту с таким именем
      rec.v = DOCS.filter(x => x.emp === openId && x.name === rec.name).length + 1;
      rec.by = 'hr.kadyrova';
    }
    sp.arr().push(rec);
    audit(openId, `<b>${tabName}:</b> добавлена запись «${esc(sp.name(rec))}»`, 'ok');
    toast(rwKind === 'doc' && rec.v > 1
      ? `Загружена версия ${rec.v} документа — прежняя сохранена.`
      : 'Запись добавлена.');
  }
  closeModal('mRow');
  renderAll();
}
function delRow(kind, id){
  const sp = ROW_SPECS[kind], arr = sp.arr();
  const i = arr.findIndex(x => x.id === id);
  if (i < 0) return;
  const rec = arr[i];
  const tabName = TABS.find(t => t.k === sp.tab).n;
  arr.splice(i, 1);
  audit(openId, `<b>${tabName}:</b> удалена запись «${esc(sp.name(rec))}»`, 'warn');
  toast('Запись удалена.');
  renderAll();
}

/* --- паспорт: не правится по месту, а заменяется версией --- */
function openPassport(){
  const e = emp(openId), p = e.pass;
  $('#rwTitle').textContent = 'Замена паспорта';
  $('#rwBody').innerHTML = `
    <div class="fld"><label>Действующий паспорт</label>
      <input value="${esc(p.num)} · выдан ${p.issued}" disabled></div>
    <div class="fld"><label for="ps_num">Серия и номер нового паспорта</label>
      <input id="ps_num" placeholder="AN 0000000" value="" autocomplete="off"></div>
    <div class="fld"><label for="ps_issued">Дата выдачи</label><input type="date" id="ps_issued" value="${asOf}"></div>
    <div class="fld"><label for="ps_valid">Срок действия</label><input type="date" id="ps_valid" value=""></div>
    <div class="fld"><label for="ps_nat">Национальность</label><input id="ps_nat" value="${esc(p.nat)}"></div>
    <div class="fld"><label for="ps_family">Семейное положение</label>
      <select id="ps_family">${['холост','женат','замужем','не замужем','разведён','разведена'].map(o =>
        `<option ${p.family===o?'selected':''}>${o}</option>`).join('')}</select></div>
    <div class="fld"><label for="ps_addr">Адрес регистрации</label><input id="ps_addr" value="${esc(p.addr)}"></div>
    <div class="fld"><label for="ps_base">Основание замены</label>
      <select id="ps_base"><option>Замена по сроку действия</option><option>Смена фамилии</option>
        <option>Утрата паспорта</option><option>Обмен на биометрический</option></select></div>
    <div class="op-box">прежний паспорт уходит в историю, не затирается<br>скан загружается новой версией — старые кредитные документы ссылаются на прежний номер</div>
    <div id="rwErr"></div>`;
  ['ps_num','ps_valid'].forEach(id => $('#'+id).addEventListener('input', checkPassport));
  checkPassport();
  openModal('mRow');
  $('#rwConfirm').onclick = savePassport;
}
function checkPassport(){
  const errs = [];
  if (!$('#ps_num').value.trim()) errs.push('Серия и номер: не заполнено.');
  if (!$('#ps_valid').value) errs.push('Срок действия: не заполнено.');
  else if ($('#ps_valid').value <= $('#ps_issued').value) errs.push('Срок действия раньше даты выдачи.');
  $('#rwErr').innerHTML = errs.map(x => `<div class="fld-err">🔴 ${esc(x)}</div>`).join('');
  $('#rwConfirm').disabled = errs.length > 0;
  $('#rwHint').textContent = errs.length ? 'Заполните обязательные поля' : 'Готово к замене';
}
function savePassport(){
  const e = emp(openId), p = e.pass;
  (PASS_HIST[e.id] = PASS_HIST[e.id] || []).unshift(
    {num:p.num, issued:p.issued, replaced:asOf, base:$('#ps_base').value});
  const num = $('#ps_num').value.trim();
  e.pass = {...p, num, issued:fmt($('#ps_issued').value), valid:fmt($('#ps_valid').value),
            nat:$('#ps_nat').value.trim() || '—', family:$('#ps_family').value,
            addr:$('#ps_addr').value.trim() || '—'};
  const v = DOCS.filter(x => x.emp === e.id && x.tab === 'pasport').length + 1;
  DOCS.push({id:'r'+(++rowSeq), emp:e.id, name:'Скан паспорта.pdf', tab:'pasport', v, date:asOf, by:'hr.kadyrova'});
  audit(e.id, `<b>Паспорт:</b> замена (${$('#ps_base').value}). Новый ${esc(num)} с ${fmt($('#ps_issued').value)}; прежний ${esc(p.num)} сохранён в истории. Скан загружен версией ${v}.`, '');
  closeModal('mRow');
  renderAll();
  toast('Паспорт заменён. Прежний номер сохранён — старые кредитные документы на него ссылаются.');
}
// «⟳ Обновить из Тундук» — повторный запрос паспортных данных из ГРС. Ручной правки нет.
function syncPassport(){
  const e = emp(openId);
  PASS_SYNC[e.id] = fmt(asOf) + ' 09:15';
  audit(e.id, `<b>Паспорт (вкл. 5, B):</b> данные обновлены из Тундук (ГРС). Расхождений с реестром нет.`, '');
  renderAll();
  toast('Данные актуальны. Синхронизировано с ГРС через Тундук.');
}

  const out = [];
  const tab = $('#crTab').value.trim();
  if (!crPerson) out.push('Физ. лицо не выбрано.');
  else if (personTaken(crPerson)) out.push(`На это физлицо уже заведена карточка: ${personTaken(crPerson).fio}, табельный № ${personTaken(crPerson).tab}.`);
  if (!/^\d{4}$/.test(tab)) out.push('Табельный номер: 4 цифры.');
  else if (EMPLOYEES.some(e => e.tab === tab)) out.push('Табельный номер занят.');

  toast('Карточка создана в статусе «Оформляется». Проведите приказ о приёме — статус станет «Работает» сам.');
});

/* --- справочник физлиц --- */
let pkSel = null, pkQ = '', pkAdd = false;
function openPersonPicker(){
  pkSel = null; pkQ = ''; pkAdd = false;
  renderPicker();
  openModal('mPerson');
}
function renderPicker(){
  const q = pkQ.trim().toLowerCase();
  const list = PERSONS.filter(p => !q || p.fio.toLowerCase().includes(q) || p.pin.includes(q));
  $('#pkBody').innerHTML = `
    <input class="lk-search" id="pkQ" type="search" placeholder="Поиск по ФИО или ПИН…" value="${esc(pkQ)}">
    <div class="lk-wrap">
      <table>
        <thead><tr><th style="width:34%">ПИН</th><th>ФИО</th><th style="width:20%">Дата рождения</th></tr></thead>
        <tbody>${list.length ? list.map(p => {
          const taken = personTaken(p.id);
          return `<tr class="${taken?'taken':''} ${pkSel===p.id?'sel':''}" ${taken?'':`data-p="${p.id}"`}>
            <td><span class="mask">${p.pin}</span></td>
            <td>${esc(p.fio)}${taken ? ' <span class="badge b-muted">уже сотрудник</span>' : ''}</td>
            <td>${fmt(p.birth)}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="3" class="empty-row">Ничего не найдено.</td></tr>'}</tbody>
      </table>
    </div>
    ${pkAdd ? `
      <div class="section-sub" style="margin-top:16px;">Новое физ. лицо</div><hr class="section-rule">
      <div class="fld"><label for="npFio">ФИО</label>
        <input id="npFio" placeholder="Фамилия Имя Отчество" autocomplete="off"></div>
      <div class="fld"><label for="npPin">ПИН (14 цифр)</label>
        <input id="npPin" maxlength="14" placeholder="20101199500000" autocomplete="off"></div>
      <div class="fld"><label for="npBirth">Дата рождения</label>
        <input type="date" id="npBirth"></div>
      <div class="fld"><label for="npSex">Пол</label>
        <select id="npSex"><option>муж.</option><option>жен.</option></select></div>
      <div class="fld"><label for="npAddr">Адрес регистрации</label>
        <input id="npAddr" placeholder="г. Бишкек, ул. …" autocomplete="off"></div>
      <div id="npErr"></div>
      <button class="btn btn-green" id="npSave">Добавить в справочник</button>` : ''}`;
  const inp = $('#pkQ');
  inp.addEventListener('input', () => { pkQ = inp.value; pkSel = null; renderPicker(); $('#pkQ').focus(); });
  document.querySelectorAll('#pkBody tr[data-p]').forEach(tr => {
    tr.addEventListener('click', () => { pkSel = tr.dataset.p; renderPicker(); });
    tr.addEventListener('dblclick', () => { pkSel = tr.dataset.p; applyPerson(); });
  });
  if (pkAdd) $('#npSave').addEventListener('click', saveNewPerson);
  $('#pkConfirm').disabled = !pkSel;
  $('#pkHint').textContent = pkSel ? 'Строка выбрана' : pkAdd ? 'Заполните нового' : 'Выберите физлицо';
}
function applyPerson(){
  if (!pkSel) return;
  crPerson = pkSel;
  closeModal('mPerson');
  renderCrPerson();
}
$('#pkConfirm').addEventListener('click', applyPerson);
$('#pkNew').addEventListener('click', () => { pkAdd = true; renderPicker(); $('#npFio').focus(); });
// физлица нет в справочнике — заводится здесь же и сразу подставляется в карточку
function saveNewPerson(){
  const fio = $('#npFio').value.trim(), pin = $('#npPin').value.trim();
  const errs = [];
  if (fio.split(/\s+/).filter(Boolean).length < 2) errs.push('ФИО: нужны минимум фамилия и имя.');
  if (!/^\d{14}$/.test(pin)) errs.push('ПИН: ровно 14 цифр.');
  else if (PERSONS.some(p => p.pin === pin)) errs.push('Физлицо с таким ПИН уже есть в справочнике.');
  $('#npErr').innerHTML = errs.map(x => `<div class="fld-err">🔴 ${esc(x)}</div>`).join('');
  if (errs.length) return;
  const id = 'p' + (80000 + PERSONS.length);
  PERSONS.push({id, fio, pin, birth: $('#npBirth').value || '—', sex: $('#npSex').value,
                addr: $('#npAddr').value.trim() || '—', soate:'41708 802 810'});
  pkSel = id; pkAdd = false;
  applyPerson();
  toast('Физлицо добавлено в справочник и подставлено в карточку.');
}

        <option>Ежегодный отпуск</option><option>Больничный</option>

      </select></div>
    <div class="fld"><label for="abFrom">С</label><input type="date" id="abFrom" value="${addDays(asOf, 7)}"></div>
    <div class="fld"><label for="abTo">По (план)</label><input type="date" id="abTo" value="${addDays(asOf, 18)}"></div>
    <div class="fld"><label for="abBase">Основание</label>
      <input id="abBase" value="Приказ №80-о от ${fmt(asOf)}"></div>

  const err = validateSubstitute($('#abSub').value, openId, $('#abFrom').value, $('#abTo').value);
  const bad = $('#abFrom').value > $('#abTo').value;
  $('#abErr').innerHTML = bad ? '<div class="fld-err">Дата «по» раньше даты «с».</div>'
                        : err  ? `<div class="fld-err">🔴 ${esc(err)}</div>` : '';
  $('#abConfirm').disabled = !!(err || bad);
  $('#abHint').textContent = (err || bad) ? 'Замещающий не подходит'
                           : $('#abSub').value ? 'Замещающий подходит' : 'Замещающий не выбран';
}
$('#abConfirm').addEventListener('click', () => {
  doAbsence(openId, $('#abKind').value, $('#abFrom').value, $('#abTo').value,
            $('#abBase').value.trim() || 'основание не указано', $('#abSub').value || null);
  closeModal('mAbsence');
  renderAll();
  toast($('#abSub') && $('#abSub').value ? 'Отсутствие оформлено, замещение действует.'
       : 'Отсутствие оформлено без замещающего — задания будут копиться. См. «Требует внимания».');
});

/* =========================================================================
   6. КАРКАС: виды, дата, роль, модалки, навигация, тост
   ========================================================================= */
function goView(v){
  if (v === 'overview' && role !== 'hr') v = 'list';   // «Обзор» — только кадры
  curView = v;
  document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.querySelectorAll('.mainview').forEach(m => m.classList.toggle('active', m.id === 'view-' + v));
  window.scrollTo(0, 0);
  saveState();
}
const LS_KEY = 'empV2State';
function saveState(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(
    { v: curView, openId, cardTab, asOf, role, sel: selectedId })); } catch (e) {}
}
function restoreState(){
  let s; try { s = JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch (e) {}
  if (!s) return;
  if (s.asOf) asOf = s.asOf;
  if (s.role) role = s.role;
  if (s.sel) selectedId = s.sel;
  if (s.openId && emp(s.openId)) { openId = s.openId; cardTab = s.cardTab || 'obshee'; }
  curView = s.v || 'overview';
  if (curView === 'card' && !openId) curView = 'list';   // карточки уже нет — уходим в список
}
document.querySelectorAll('.vtab').forEach(t => t.addEventListener('click', () => goView(t.dataset.view)));

function openModal(id){ $('#'+id).classList.add('open'); }
function closeModal(id){ $('#'+id).classList.remove('open'); }
document.querySelectorAll('[data-close]').forEach(b =>
  b.addEventListener('click', () => b.closest('.modal-overlay').classList.remove('open')));
document.querySelectorAll('.modal-overlay').forEach(ov =>
  ov.addEventListener('click', ex => { if (ex.target === ov) ov.classList.remove('open'); }));
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(o => o.classList.remove('open'));
});
// клик вне открытого меню действий — закрыть
document.addEventListener('click', ev => {
  document.querySelectorAll('.dropdown.open').forEach(dd => { if (!dd.contains(ev.target)) dd.classList.remove('open'); });
});

$('#dateInp').addEventListener('change', ev => { asOf = ev.target.value || TODAY; renderAll(); });
document.querySelectorAll('.date-chip').forEach(c => c.addEventListener('click', () => {
  asOf = c.dataset.d; $('#dateInp').value = asOf; renderAll();
}));
function syncChips(){
  document.querySelectorAll('.date-chip').forEach(c => c.classList.toggle('on', c.dataset.d === asOf));
}
$('#roleSel').addEventListener('change', ev => {
  role = ev.target.value;
  const who = {hr:'hr.kadyrova', admin:'admin', head:'director', self:'a.slamkulov', cred:'k.jumabekov'}[role];
  $('#whoami').textContent = '[' + who + ']';
  renderAll();
  const seen = ROLE_CLASSES[role].join(' · ');
  toast(role === 'cred' ? 'Кредитный специалист: кадровое дело и взыскания недоступны — этих вкладок и документов он не видит.'
      : role === 'self' ? 'Сам сотрудник видит своё кадровое дело только в своей карточке (Сламкулов). В чужой — лишь общие данные.'
      : `Роль «${ev.target.selectedOptions[0].text}»: доступные уровни ${seen}.`);
});
['fStatus','fUnit','fAvail','fQ'].forEach(id =>
  $('#'+id).addEventListener('input', () => { selectedId = null; $('#btnOpen').disabled = true; renderList(); }));
$('#fReset').addEventListener('click', () => {
  $('#fStatus').value = ''; $('#fUnit').value = ''; $('#fAvail').value = ''; $('#fQ').value = '';
  renderList();
});
$('#btnOpen').addEventListener('click', () => { if (selectedId) openCard(selectedId); });
$('#btnCreate').addEventListener('click', openCreate);

// Экспорт списка в Excel — HTML-таблица как .xls (кириллица через UTF-8 BOM), по текущему фильтру и дате.
function exportExcel(){
  const d = asOf, rows = currentListRows();
  const head = ['ФИО','Подразделение · Должность','Доступность','Рабочий телефон','Мобильный телефон','Кабинет'];
  const body = rows.map(e => [
    e.fio, deptPostAt(e.id, d), availabilityAt(e.id, d).t,
    e.wphone || '—', e.phone || '—', (e.work && e.work.room) || '—',
  ].map(c => `<td>${esc(c)}</td>`).join('')).map(tr => `<tr>${tr}</tr>`).join('');
  const html = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head>`
    + `<body><table border="1"><thead><tr>${head.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>`
    + `<tbody>${body}</tbody></table></body></html>`;
  const url = URL.createObjectURL(new Blob(['﻿' + html], {type:'application/vnd.ms-excel'}));
  const a = document.createElement('a');
  a.href = url; a.download = `Сотрудники_${fmt(d).replace(/\./g,'-')}.xls`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast(`Выгружено в Excel: ${rows.length} строк на ${fmt(d)}.`);
}
$('#btnExport').addEventListener('click', exportExcel);

const NAV = [
  {label:'Система кредитования', items:['Заявки','Комиссии по заявкам','Заёмщики','Кредиты']},
  {label:'Залоговое обеспечение', items:['Предметы залога']},
  {label:'Организационная структура', items:['Подразделения','Должности']},
  {label:'Администрирование', open:true, items:['Пользователи','Сотрудники','Роли и политики']},
  {label:'Справочники', items:['Справочники']},
  {label:'Отчёты', items:['Отчёты']},
];
function renderNav(){
  $('#nav').innerHTML = NAV.map(g => `
    <div class="nav-group ${g.open ? 'open' : ''}">
      <button class="nav-toggle" onclick="this.parentNode.classList.toggle('open')">
        <span class="chev"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></span>
        <span class="lbl">${g.label}</span></button>
      <div class="nav-children">
        ${g.items.map(i => `<a class="nav-item ${i==='Сотрудники'?'active':''}" data-nav="${i}">${i}</a>`).join('')}
      </div></div>`).join('');
  document.querySelectorAll('[data-nav]').forEach(a => a.addEventListener('click', () => {
    if (a.dataset.nav !== 'Сотрудники') toast('В прототипе показан только раздел «Сотрудники».');
  }));
}

let toastT;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 4200);
}

/* ---------- старт ---------- */
restoreState();                                  // вернуть открытую карточку/вкладку после рефреша
$('#dateInp').value = asOf;
$('#roleSel').value = role;
$('#whoami').textContent = '[' + {hr:'hr.kadyrova', admin:'admin', head:'director', self:'a.slamkulov', cred:'k.jumabekov'}[role] + ']';
$('#fUnit').innerHTML = '<option value="">— все —</option>' +
  Object.entries(UNITS).map(([k,v]) => `<option value="${k}">${v}</option>`).join('');
renderNav();
if (openId) $('#vtabCard').style.display = '';   // показать вкладку «Карточка»
renderAll();
goView(curView);                                 // активировать сохранённую вкладку
</script>
