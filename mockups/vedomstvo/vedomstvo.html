<title>Информация о ведомстве · АСУБК (v2)</title>
<!--
  РАБОЧИЙ ПРОТОТИП (single-file, MVP) — модуль «Управление информацией о ведомстве» (TO-BE).
  Версия 2 (переработка). Не картинка: логика ниже ИСПОЛНЯЕТСЯ.
  Спека: `ASUBK-vedomstvo-logika.md`. Модуль подсистемы администрирования (ТЗ АСУБК-3).

  ЧТО РЕАЛИЗОВАНО (и что разработчик обязан сохранить)

  1. КЛАСС — ИНФОРМАЦИОННАЯ ВИТРИНА (§1). Read-mostly. Ни бизнес-логики кредитования, ни
     workflow, ни статусов «черновик/на рассмотрении», ни четырёхглазки, ни версионности
     собственных полей. Единственный процессный элемент — технический аудит-лог (§6).
     ⚠ Эффективное датирование реквизитов ОТКЛОНЕНО (§1, решение 3). См. п. 9.

  2. SINGLETON (§2). Одна запись на всю систему. Создание/удаление недоступны (кроме первичной
     инициализации). Кнопок «+ Ведомство» / «Удалить» НЕТ by design. Правка — только Админ.

  3. СВОИ БЛОКИ vs ЗЕРКАЛА (§3) — ключевой шов. Модуль ВЛАДЕЕТ: Общая инфо, Хронология,
     Реквизиты (регистрационные + банковские), Документы, Контакты — единственный источник
     правды, правятся здесь. ЗЕРКАЛИТ: Оргструктура, Показатели — только чтение,
     «ссылка, а не копия»: не хранятся тут, читаются из модуля-источника, правка → переход
     в модуль-источник. Копировать зеркало в карточку = два расходящихся источника правды
     = АНТИПАТТЕРН.

  4. БАНКОВСКИЕ РЕКВИЗИТЫ — МНОЖЕСТВЕННЫЕ (§4). У холдинга N счетов (валюты/назначения).
     ИНВАРИАНТ: не более одного счёта с флагом «основной» В РАЗРЕЗЕ ВАЛЮТЫ (checkMainAccount),
     считается ТОЛЬКО ПО ДЕЙСТВУЮЩИМ счетам. Демо содержит валидное состояние; переключатель
     «сломать инвариант» показывает баннер нарушения. Счёт ПОГАШЕНИЯ задолженности заёмщиком —
     ВНЕ модуля (кредит/программа/линия).

  5. ПОКАЗАТЕЛИ — ЗАФИКСИРОВАННЫЙ СРЕЗ (§7 В-3). Витрина показывает срез, посчитанный модулем
     статистики в нерабочее время, с явной пометкой ДАТЫ РАСЧЁТА — не считает «на лету».
     Только всеорганизационные агрегаты (§7 В-2); разрез по подразделению/сотруднику — это
     управленческая отчётность с ограничением доступа, ЕЙ ЗДЕСЬ НЕ МЕСТО.

  6. ГРАНИЦЫ (§2). Внешние госорганы (МФКР, Кабмин, регистрирующие/нотариальные/залоговые
     конторы, банки заёмщика, суды, КИБ «Ишеним») — НЕ здесь, их место — справочники. Модуль
     описывает ТОЛЬКО ОАО «Госфинхолдинг». Оргструктура-зеркало — до подразделений без
     персоналий (§7 В-1, рекомендация а): ФИО руководителя как публичный атрибут узла,
     а не ссылка на чувствительную карточку сотрудника.

  --- добавлено в переработке (§8, решения Р-1…Р-9) ---

  7. СЧЁТ НЕ УДАЛЯЕТСЯ, А ЗАКРЫВАЕТСЯ ДАТОЙ (§8 Р-1). Реквизиты счёта могли попасть в договоры,
     платёжные поручения и печатные формы — задним числом их стереть нельзя. Модель append-only:
     `closedAt`. Закрытый счёт автоматически теряет флаг «основной» и НЕ УЧАСТВУЕТ в подсчёте
     инварианта. Кнопки «Удалить счёт» нет нигде.

  8. КЛАССИФИЦИРУЮЩИЕ ПОЛЯ — ТОЛЬКО ИЗ СПРАВОЧНИКОВ (§8 Р-2). Банк, валюта, назначение счёта,
     орган регистрации, тип телефона/e-mail/документа — селекты из модуля справочников (здесь
     имитация `REF`). Free-text для них = расхождение значений между модулями = АНТИПАТТЕРН.
     БИК принадлежит банку, а не нашему счёту: подставляется из справочника, read-only.

  9. ПЕЧАТНАЯ КАРТОЧКА — СТРОГО «НА СЕЙЧАС» (§8 Р-4). Формируется на текущий момент и помечается
     «Сформировано {дата}». Версионность реквизитов не вводится — карточка не претендует на
     воспроизведение состояния на прошлую дату.
     ⚠ ЕСЛИ к этому модулю привяжут шаблоны договоров / платёжных документов, требующие
     состояния «на дату», — решение 3 (§1, отклонённое эффективное датирование) подлежит
     НЕМЕДЛЕННОМУ ПЕРЕСМОТРУ. Иначе получим тихую подмену исторических реквизитов.

 10. ДОКУМЕНТЫ ВЕДОМСТВА (§8 Р-5). Устав, свидетельство, лицензии, разрешения: карточка
     документа + ссылка на вложение, срок действия → производный статус (бессрочный /
     действует / истекает ≤90 дн. / истёк). Файлы физически хранит ПОДСИСТЕМА
     ДОКУМЕНТООБОРОТА — модуль ведомства не является файловым хранилищем.
     Документ удалять МОЖНО (в отличие от счёта): это вложение, а не реквизит, ушедший в чужие
     документы. Удаление пишется в аудит.

 11. ДАТА ПРОСМОТРА РЕЗОЛВИТ ТОЛЬКО ЗЕРКАЛА (§8 Р-7). Поле в шапке — «Дата просмотра»; на неё
     резолвятся Оргструктура (nodesAt/nameAt/headAt — функции модуля-источника, здесь имитация)
     и Показатели (ближайший зафиксированный срез ≤ даты). Собственные блоки версионности НЕ
     ИМЕЮТ — при `date ≠ today` на них выводится плашка «показано актуальное состояние»,
     иначе пользователь решит, что вся страница историческая.

 12. АУДИТ — ОБЩЕСИСТЕМНОЕ ХРАНИЛИЩЕ (§8 Р-9). Записи живут в подсистеме администрирования со
     `scope`; вкладка ведомства — ОТФИЛЬТРОВАННОЕ ПРЕДСТАВЛЕНИЕ (`scope:'vedomstvo'`) с фильтрами,
     пагинацией и выгрузкой CSV. Это НЕ версионность: восстановление состояния «на дату» из
     журнала как пользовательская функция по-прежнему не предполагается (§1, решение 3).
     `objId` обязателен для сущностей с множественностью (счёт, документ, событие, телефон) —
     иначе по записи журнала нельзя найти объект.

  ОТКЛОНЕНО (§8 Р-6) — ДВУЯЗЫЧИЕ НАИМЕНОВАНИЯ (кыр/рус) не вводится, работаем только с русским.
     Если печатная карточка или договоры потребуют официального наименования на государственном
     языке — решение пересматривается.

  РОЛИ: Администратор (правит собственные блоки), Наблюдатель (только чтение). canEdit().
-->

<script>
/* =========================================================================

const TODAY = '2026-07-12';

/* -------------------------------------------------------------------------

const REF = {
  CCY: [ {code:'KGS', name:'Сом'}, {code:'USD', name:'Доллар США'},
         {code:'EUR', name:'Евро'}, {code:'RUB', name:'Российский рубль'} ],

  REG_ORGS: [ {id:'r1', name:'Министерство юстиции Кыргызской Республики'},

  EMAIL_TYPES: [ {id:'e1', name:'Общий'}, {id:'e2', name:'Для обращений граждан'},
                 {id:'e3', name:'СЭД'} ],

  DOC_TYPES: [ {id:'d1', name:'Устав'}, {id:'d2', name:'Свидетельство о регистрации'},

               {id:'d5', name:'Постановление об учреждении'} ],

const bankOf  = id => REF.BANKS.find(b=>b.id===id) || {name:'—', bik:'—'};
const ccyName = code => (REF.CCY.find(c=>c.code===code)||{}).name || code;

/* -------------------------------------------------------------------------
   §8 Р-3. ВАЛИДАТОРЫ. Применяются НА СОХРАНЕНИЕ (жёсткая блокировка) + подсветкой

   ------------------------------------------------------------------------- */
const V = {
  inn:   v => /^\d{14}$/.test(v),          // ИНН КР — 14 цифр
  okpo:  v => /^\d{8}$/.test(v),           // ОКПО — 8 цифр

  { id:'ch1', date:'2024-11-15', title:'Запуск программы льготного агрокредитования', descr:'Начало выдачи кредитов сельхозпроизводителям по ставке 6% годовых за счёт средств республиканского бюджета.' },
  { id:'ch2', date:'2023-05-20', title:'Переход на АСУБК',                            descr:'Ввод в промышленную эксплуатацию автоматизированной системы управления банковским кредитованием.' },

  { id:'ch4', date:'2020-01-01', title:'Учреждение ОАО «Госфинхолдинг»',              descr:'Создание организации-оператора государственных кредитных программ.' },
];

// §3.1 РЕГИСТРАЦИОННЫЕ ДАННЫЕ (свои, 1). §8 Р-2: орган регистрации — ссылка в справочник.
const REG = {
  certNo:   '0012345',
  certDate: '2020-01-15',
  regOrgId: 'r1',
  inn:      '01234202010012',

   §4 + §8 Р-1. ИНВАРИАНТ — не более одного «основного» счёта в разрезе валюты,
   СЧИТАЕТСЯ ТОЛЬКО ПО ДЕЙСТВУЮЩИМ СЧЕТАМ (закрытый основным быть не может).
   ========================================================================= */
const isActive = a => !a.closedAt;
function accountsAll(){
  return state.breakInvariant
    ? ACCOUNTS.map(a=> a.id==='ac2' ? {...a, main:true} : a) // демо-поломка: 2 основных в KGS
    : ACCOUNTS;
}
function accountsView(){
  const all = accountsAll();
  return state.acctFilter==='active' ? all.filter(isActive) : all;
}
function checkMainAccount(list){
  const byCcy = {};
  list.filter(a=> a.main && isActive(a)).forEach(a=> byCcy[a.ccy]=(byCcy[a.ccy]||0)+1);
  return Object.entries(byCcy).filter(([,n])=>n>1).map(([c])=>c); // валюты с нарушением
}

/* =========================================================================
   §8 Р-5. ПРОИЗВОДНЫЙ СТАТУС ДОКУМЕНТА — вычисляется, не хранится.
   Считается на СЕГОДНЯ: документы — собственный блок, версионности нет (§8 Р-7).
   ========================================================================= */
function docStatus(d, today){
  if(!d.expires) return { kind:'perm', label:'Бессрочный', pill:'neutral' };
  const days = Math.round((new Date(d.expires) - new Date(today)) / 86400000);
  if(days < 0)   return { kind:'expired', label:`Истёк ${fmtDate(d.expires)}`,       pill:'err'  };
  if(days <= 90) return { kind:'soon',    label:`Истекает через ${days} дн.`,        pill:'warn' };
  return                { kind:'ok',      label:`Действует до ${fmtDate(d.expires)}`, pill:'ok'   };
}
const docsExpired = ()=> DOCS.filter(d=> docStatus(d,TODAY).kind==='expired');
const docsSoon    = ()=> DOCS.filter(d=> docStatus(d,TODAY).kind==='soon');

/* =========================================================================
   §8 Р-9 (мелочи п.5). ПОЛНОТА КАРТОЧКИ — исполняемая проверка, не декорация.
   ========================================================================= */
function completeness(){
  const has = v => !!(v && String(v).trim());
  const checks = [
    ['Полное наименование',   has(ORG.fullName)],
    ['Краткое наименование',  has(ORG.shortName)],
    ['Краткое описание',      has(ORG.descr)],
    ['ИНН',                   V.inn(REG.inn||'')],
    ['ОКПО',                  V.okpo(REG.okpo||'')],
    ['Свидетельство о регистрации', has(REG.certNo) && has(REG.certDate)],
    ['Юридический адрес',     has(CONTACTS.legalAddr)],
    ['Хотя бы один действующий счёт', ACCOUNTS.some(isActive)],
    ['Хотя бы один телефон',  CONTACTS.phones.length>0],
    ['Телефон антикоррупционной линии', CONTACTS.phones.some(p=>p.typeId==='t3')],
    ['Электронная почта',     CONTACTS.emails.length>0],
    ['Адрес сайта',           V.url(CONTACTS.site||'')],
    ['Документ типа «Устав»', DOCS.some(d=>d.typeId==='d1')],
  ];
  const missing = checks.filter(([,ok])=>!ok).map(([n])=>n);
  return { filled: checks.length - missing.length, total: checks.length, missing };
}

const METRIC_DEFS = [
  { key:'portfolio',    label:'Объём портфеля',        unit:'сом',           fmt:v=>fmtSom(v),                  mode:'pct',  goodUp:true  },
  { key:'issuedYtd',    label:'Выдано с начала года',  unit:'сом',           fmt:v=>fmtSom(v),                  mode:'pct',  goodUp:true  },
  { key:'overdueShare', label:'Доля просрочки',        unit:'от портфеля',   fmt:v=>num(v)+'%',                 mode:'pp',   goodUp:false },
  { key:'borrowers',    label:'Количество заёмщиков',  unit:'активных',      fmt:v=>v.toLocaleString('ru-RU'),  mode:'pct',  goodUp:true  },
];

/* Спарклайн — inline SVG по ВСЕМ срезам в хронологическом порядке (не только до выбранной
   даты: иначе на ранней дате линия вырождается в точку). Точка выбранного среза выделена. */
function sparkline(values, idx){
  const W=104, H=30, P=4;
  const min = Math.min(...values), max = Math.max(...values), span = (max-min) || 1;
  const x = i => P + i*(W-2*P)/Math.max(values.length-1,1);
  const y = v => H-P - (v-min)/span*(H-2*P);
  const pts = values.map((v,i)=> `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  return `<svg class="spark" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="var(--asubk-blue)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(idx).toFixed(1)}" cy="${y(values[idx]).toFixed(1)}" r="3" fill="var(--asubk-ink)"/>
  </svg>`;
}

function deltaHtml(def, snap, prev){
  if(!prev) return `<div class="md flat">Первый зафиксированный срез — сравнивать не с чем.</div>`;
  const cur = snap[def.key], old = prev[def.key];
  const diff = cur - old;
  if(Math.abs(diff) < 1e-9) return `<div class="md flat">без изменений <span class="mdn">к ${fmtDate(prev.calcDate)}</span></div>`;
  // §8 Р-8: доля просрочки — ПРОЦЕНТНЫЕ ПУНКТЫ (не процент от процента!), остальное — проценты.
  const val = def.mode==='pp'
    ? num(Math.abs(diff).toFixed(1))+' п.п.'
    : num((Math.abs(diff)/old*100).toFixed(1))+' %';
  const up = diff > 0;
  const good = up === def.goodUp;                        // рост просрочки — плохо, рост портфеля — хорошо
  return `<div class="md ${good?'up':'down'}">${up?'↑':'↓'} ${val} <span class="mdn">к ${fmtDate(prev.calcDate)}</span></div>`;
}

/* ---- §8 Р-9. Журнал изменений: фильтры, пагинация, CSV ---- */
const PAGE_SIZE = 10;
function auditRows(){
  const f = state.audit;
  return AUDIT
    .filter(a=> a.scope==='vedomstvo')                  // отфильтрованное представление общесистемного лога
    .filter(a=> !f.block || a.block===f.block)
    .filter(a=> !f.who   || a.who===f.who)
    .filter(a=> !f.from  || a.when.slice(0,10) >= f.from)
    .filter(a=> !f.to    || a.when.slice(0,10) <= f.to)
    .sort((a,b)=> a.when<b.when?1:-1);
}
function renderAudit(){
  const el = document.getElementById('p-audit');
  const f = state.audit;
  const rows = auditRows();
  const pages = Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  if(f.page > pages) f.page = pages;
  const slice = rows.slice((f.page-1)*PAGE_SIZE, f.page*PAGE_SIZE);
  const whoList = [...new Set(AUDIT.filter(a=>a.scope==='vedomstvo').map(a=>a.who))].sort();

  el.innerHTML = `<div class="panel-wrap">
    <div class="section">
      <div class="section-h"><span class="sh-t">Журнал изменений (audit log)</span>
        <span class="sh-act">
          <button class="btn btn-secondary" data-act="csv-audit">${ICONS.down}<span>Выгрузить CSV</span></button>
          <span class="readonly-tag">${ICONS.lock} технический · только чтение</span>
        </span>
      </div>
      <div class="filters">
        <div class="ff"><label for="afBlock">Блок</label>
          <select id="afBlock"><option value="">Все блоки</option>
            ${AUDIT_BLOCKS.map(b=>`<option value="${esc(b)}"${f.block===b?' selected':''}>${esc(b)}</option>`).join('')}
          </select></div>
        <div class="ff"><label for="afWho">Пользователь</label>
          <select id="afWho"><option value="">Все пользователи</option>
            ${whoList.map(w=>`<option value="${esc(w)}"${f.who===w?' selected':''}>${esc(w)}</option>`).join('')}
          </select></div>
        <div class="ff"><label for="afFrom">Период с</label><input type="date" id="afFrom" value="${esc(f.from)}"></div>
        <div class="ff"><label for="afTo">по</label><input type="date" id="afTo" value="${esc(f.to)}"></div>
        <div class="ff"><label>&nbsp;</label><button class="btn btn-secondary" id="afReset">Сбросить</button></div>
        <span class="grow"></span>
        <div class="ff"><label>&nbsp;</label><span class="readonly-tag">найдено: <b>&nbsp;${rows.length}</b></span></div>
      </div>
      <div class="section-b" style="padding:0">
        <div class="audit">
          <div class="ae" style="background:var(--surface-panel)">
            <div class="aw" style="font-weight:500;color:var(--text-heading)">Когда · кто</div>
            <div class="ab">Блок · поле</div>
            <div class="ao" style="color:var(--text-heading);font-weight:500">Объект</div>
            <div class="ad" style="color:var(--text-heading);font-weight:500">Было → стало</div>
          </div>
          ${slice.length ? slice.map(a=>`<div class="ae">
            <div class="aw">${esc(a.when)}<br><span class="muted">${esc(a.who)}</span></div>
            <div class="ab">${esc(a.block)}<br><span class="muted" style="font-weight:400">${esc(a.field)}</span></div>
            <div class="ao">${esc(a.objLabel)}<br><span class="mono muted" style="font-size:12px">${esc(a.objId)}</span></div>
            <div class="ad"><del>${esc(a.from)}</del> <span class="arrow">→</span> <ins>${esc(a.to)}</ins></div>
          </div>`).join('') : `<div class="empty">По заданным фильтрам записей нет.</div>`}
        </div>
      </div>
      <div class="pager">
        <span>Показано ${slice.length} из ${rows.length}</span>
        <span class="pg">
          <button class="btn btn-secondary" data-act="pg-prev" ${f.page<=1?'disabled':''}>‹ Назад</button>
          <span>стр. ${f.page} из ${pages}</span>
          <button class="btn btn-secondary" data-act="pg-next" ${f.page>=pages?'disabled':''}>Далее ›</button>
        </span>
      </div>
    </div>
  </div>`;

  const rerender = ()=>{ state.audit.page = 1; renderAudit(); };
  document.getElementById('afBlock').onchange = e=>{ state.audit.block = e.target.value; rerender(); };
  document.getElementById('afWho').onchange   = e=>{ state.audit.who   = e.target.value; rerender(); };
  document.getElementById('afFrom').onchange  = e=>{ state.audit.from  = e.target.value; rerender(); };
  document.getElementById('afTo').onchange    = e=>{ state.audit.to    = e.target.value; rerender(); };
  document.getElementById('afReset').onclick  = ()=>{ state.audit = {block:'',who:'',from:'',to:'',page:1}; renderAudit(); };
}

function renderAll(){
  renderTabs();
  document.querySelectorAll('.detail-panel').forEach(p=> p.classList.remove('active'));
  const panel = document.getElementById('p-'+state.tab);
  if(panel) panel.classList.add('active');

  if(btn) btn.style.display = state.date===TODAY ? 'none' : '';
  ({ general:renderGeneral, chrono:renderChrono, reqs:renderReqs, docs:renderDocs, contacts:renderContacts,
     orgstruct:renderOrgstruct, metrics:renderMetrics, audit:renderAudit }[state.tab] || renderGeneral)();

/* =========================================================================
   §6 + §8 Р-9. АУДИТ — каждое изменение собственного блока пишет запись.
   audit(block, field, from, to, objId, objLabel)
   ========================================================================= */
function nowStamp(){
  const d = new Date(), p = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
const CURRENT_USER = 'Сламкулов А. О.';
function audit(block, field, from, to, objId, objLabel){
  if(String(from)===String(to)) return;
  AUDIT.unshift({ id:'a'+(auditSeq++), scope:'vedomstvo', when:nowStamp(), who:CURRENT_USER,
    block, objId:objId||'—', objLabel:objLabel||'Карточка организации',
    field, from:from||'—', to:to||'—' });
}

/* =========================================================================
   МОДАЛКА — общий каркас. openModal({title, body, onSave, onDelete, deleteLabel, wide})
   onSave/onDelete возвращают строку-ошибку, чтобы не закрывать окно.
   ========================================================================= */
const mBack = document.getElementById('modalBack');
const mBox  = document.getElementById('modalBox');
let modalCtx = null;
function defaultSave(){
  if(!modalCtx || !modalCtx.onSave) return closeModal();
  const err = modalCtx.onSave();
  if(err){ document.getElementById('mErr').textContent = err; return; }
  closeModal(); renderAll();
}
function openModal(cfg){
  modalCtx = cfg;
  document.getElementById('mTitle').textContent = cfg.title;
  document.getElementById('mBody').innerHTML = cfg.body;
  document.getElementById('mErr').textContent = '';
  mBox.classList.toggle('wide', !!cfg.wide);
  const del = document.getElementById('mDelete');
  if(cfg.onDelete){ del.style.display=''; del.textContent = cfg.deleteLabel||'Удалить'; } else del.style.display='none';
  const save = document.getElementById('mSave');
  save.style.display = cfg.hideSave ? 'none' : '';
  save.textContent = cfg.saveLabel || 'Сохранить';
  save.onclick = cfg.onPrimary || defaultSave;   // печатная карточка подменяет действие только на себя
  mBack.classList.add('open');
  if(cfg.onOpen) cfg.onOpen();
  const first = document.querySelector('#mBody input:not([disabled]), #mBody textarea, #mBody select');
  if(first) first.focus();
}
function closeModal(){ mBack.classList.remove('open'); mBox.classList.remove('wide'); modalCtx = null; }
function mVal(id){ const el = document.getElementById(id); return el ? String(el.value).trim() : ''; }
function mChecked(id){ const el = document.getElementById(id); return el ? el.checked : false; }

document.getElementById('mCancel').onclick = closeModal;
mBack.onclick = e=>{ if(e.target===mBack) closeModal(); };
document.getElementById('mSave').onclick = defaultSave;
document.getElementById('mDelete').onclick = ()=>{
  if(!modalCtx || !modalCtx.onDelete) return;
  const err = modalCtx.onDelete();
  if(err){ document.getElementById('mErr').textContent = err; return; }
  closeModal(); renderAll();
};
document.addEventListener('keydown', e=>{
  if(!mBack.classList.contains('open')) return;
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && e.target.tagName!=='TEXTAREA' && !modalCtx?.onPrimary) document.getElementById('mSave').click();
});

/* §8 Р-3. Подсветка «в реальном времени»: на потере фокуса поле с data-v проверяется
   валидатором. Кнопка «Сохранить» НЕ блокируется — жёсткая проверка всё равно на сохранении,
   так мы не плодим второе состояние формы. */
document.getElementById('mBody').addEventListener('focusout', e=>{
  const el = e.target;
  if(!el.dataset || !el.dataset.v) return;
  const fn = V[el.dataset.v]; if(!fn) return;
  const v = String(el.value).trim();
  el.classList.toggle('bad', !!v && !fn(v));
});

/* =========================================================================
   ПОЛЯ ФОРМ
   ========================================================================= */
function fld(id, label, val, hint, vtype){ return `<div class="fld"><label for="${id}">${label}</label>
  <input type="text" id="${id}" value="${esc(val||'')}"${vtype?` data-v="${vtype}"`:''}>${hint?`<span class="fhint">${hint}</span>`:''}</div>`; }
function fldArea(id, label, val){ return `<div class="fld"><label for="${id}">${label}</label>
  <textarea id="${id}">${esc(val||'')}</textarea></div>`; }
function fldDate(id, label, val, hint){ return `<div class="fld"><label for="${id}">${label}</label>
  <input type="date" id="${id}" value="${esc(val||'')}">${hint?`<span class="fhint">${hint}</span>`:''}</div>`; }
function fldRO(id, label, val, hint){ return `<div class="fld"><label for="${id}">${label}</label>
  <input type="text" id="${id}" value="${esc(val||'')}" disabled>${hint?`<span class="fhint">${hint}</span>`:''}</div>`; }
/* §8 Р-2. Селект из справочника + маркер источника: разработчик должен видеть, что значения
   приходят из чужого модуля и free-text здесь запрещён. */
function selectFld(id, label, list, val, refLabel, keyField){
  const k = keyField || 'id';
  const opts = list.map(x=>`<option value="${esc(x[k])}"${String(x[k])===String(val)?' selected':''}>${esc(x.name)}${k==='code'?' ('+esc(x.code)+')':''}</option>`).join('');
  return `<div class="fld"><label for="${id}">${label}</label>
    <select id="${id}">${opts}</select>
    ${refLabel?`<span class="fhint ref">из справочника «${esc(refLabel)}»</span>`:''}</div>`;
}

    fld('gfFull','Полное наименование', ORG.fullName) +
    fld('gfShort','Краткое наименование', ORG.shortName) +

      <input type="file" id="gfLogo" accept="image/*">
      <span class="fhint">PNG/SVG, квадратный. Текущий: ${esc(ORG.logoName||'не загружен')}</span></div>`,
    onSave(){
      const full=mVal('gfFull'), short=mVal('gfShort'), descr=mVal('gfDescr');

      audit('Общая информация','Полное наименование', ORG.fullName, full);

  const closed = !!ac.closedAt;
  openModal({ title: isNew ? 'Новый счёт' : (closed ? 'Банковский счёт (закрыт)' : 'Банковский счёт'), body:
    selectFld('acBank','Банк', REF.BANKS, ac.bankId, 'Банки') +
    `<div class="fld row2">
       ${fldRO('acBik','БИК', bankOf(ac.bankId).bik, 'подставляется из справочника — принадлежит банку, а не счёту')}
       ${fld('acNo','Номер счёта', ac.acc, '16 цифр', 'acct')}
     </div>` +
    `<div class="fld row2">
       ${selectFld('acCcy','Валюта', REF.CCY, ac.ccy, 'Валюты', 'code')}
       ${selectFld('acPurp','Назначение', REF.ACCT_PURPOSE, ac.purposeId, 'Назначения счетов')}
     </div>` +
    `<div class="fld row2">
       ${fldDate('acOpen','Дата открытия', ac.openedAt)}
       ${closed ? fldRO('acClose','Дата закрытия', ac.closedAt) : ''}
     </div>` +
    `<label class="fld-check"><input type="checkbox" id="acMain"${ac.main?' checked':''}${closed?' disabled':''}> <span>Основной счёт по валюте${closed?' — закрытый счёт основным быть не может':''}</span></label>`,
    onOpen(){
      // БИК следует за банком: он атрибут банка, а не нашего счёта
      document.getElementById('acBank').onchange = e=>{
        document.getElementById('acBik').value = bankOf(e.target.value).bik;
      };
    },
    onSave(){
      const bankId=mVal('acBank'), no=mVal('acNo'), ccy=mVal('acCcy'), purposeId=mVal('acPurp'),
            openedAt=mVal('acOpen'), main = closed ? false : mChecked('acMain');
      if(!V.acct(no)) return 'Номер счёта должен содержать ровно 16 цифр.';
      const dup = ACCOUNTS.some(x=> x!==ac && x.acc===no && isActive(x));
      if(dup) return 'Счёт с таким номером уже заведён.';
      if(!V.date(openedAt)) return 'Укажите дату открытия счёта.';
      if(ac.closedAt && openedAt > ac.closedAt) return 'Дата открытия не может быть позже даты закрытия.';
      const label = 'Счёт '+ccy+' · '+bankOf(bankId).name;
      if(isNew){
        ac.id='ac'+(accountSeq++);
        Object.assign(ac, {bankId, acc:no, ccy, purposeId, openedAt, main});
        ACCOUNTS.push(ac);
        audit('Банковские реквизиты','Счёт','—','добавлен', ac.id, label);
      } else {
        audit('Банковские реквизиты','Банк', bankOf(ac.bankId).name, bankOf(bankId).name, ac.id, label);
        audit('Банковские реквизиты','Номер счёта', ac.acc, no, ac.id, label);
        audit('Банковские реквизиты','Валюта', ac.ccy, ccy, ac.id, label);
        audit('Банковские реквизиты','Назначение', refName(REF.ACCT_PURPOSE,ac.purposeId), refName(REF.ACCT_PURPOSE,purposeId), ac.id, label);
        audit('Банковские реквизиты','Дата открытия', ac.openedAt, openedAt, ac.id, label);
        audit('Банковские реквизиты','Основной', ac.main?'основной':'не основной', main?'основной':'не основной', ac.id, label);
        Object.assign(ac, {bankId, acc:no, ccy, purposeId, openedAt, main});
      }
      // §4 держим инвариант — только среди ДЕЙСТВУЮЩИХ
      if(main) ACCOUNTS.forEach(x=>{ if(x!==ac && x.ccy===ccy && isActive(x)) x.main=false; });
    }});
  // кнопки «Удалить счёт» здесь нет by design (§8 Р-1)
}

function closeAccountForm(ac){
  const label = 'Счёт '+ac.ccy+' · '+bankOf(ac.bankId).name;
  openModal({ title:'Закрытие счёта', saveLabel:'Закрыть счёт', body:
    `<div class="modal-note">Счёт <span class="mono">${esc(ac.acc)}</span> · ${esc(bankOf(ac.bankId).name)} · ${esc(ac.ccy)}. Открыт ${esc(fmtDate(ac.openedAt))}.</div>` +
    fldDate('clDate','Дата закрытия', TODAY, 'не может быть раньше даты открытия') +
    (ac.main ? `<div class="modal-note">Флаг «основной» будет снят автоматически — закрытый счёт основным быть не может.</div>` : ''),
    onSave(){
      const dt = mVal('clDate');
      if(!V.date(dt)) return 'Дата закрытия обязательна.';
      if(dt < ac.openedAt) return 'Дата закрытия не может быть раньше даты открытия ('+fmtDate(ac.openedAt)+').';
      audit('Банковские реквизиты','Дата закрытия','—', dt, ac.id, label);
      if(ac.main){
        audit('Банковские реквизиты','Основной','основной','не основной (счёт закрыт)', ac.id, label);
        ac.main = false;                          // закрытый не может быть основным
      }
      ac.closedAt = dt;
      toast(`Счёт <span class="mono">${esc(ac.acc)}</span> закрыт ${esc(fmtDate(dt))}. Запись сохранена в истории (§8 Р-1).`);
    }});
}

/* =========================================================================
   §8 Р-5. ДОКУМЕНТ ВЕДОМСТВА.
   ========================================================================= */
function docForm(d){
  const isNew = !d;
  d = d || { typeId:'d3', title:'', no:'', issued:TODAY, expires:'', org:'', file:'', size:'' };
  const perm = !d.expires;
  openModal({ title:isNew?'Новый документ':'Документ ведомства', body:
    selectFld('dcType','Тип документа', REF.DOC_TYPES, d.typeId, 'Типы документов') +
    fld('dcTitle','Наименование', d.title) +
    `<div class="fld row2">${fld('dcNo','Номер', d.no)}${fldDate('dcIssued','Дата выдачи', d.issued)}</div>` +
    fld('dcOrg','Орган выдачи', d.org) +
    `<label class="fld-check"><input type="checkbox" id="dcPerm"${perm?' checked':''}> <span>Бессрочный</span></label>` +
    fldDate('dcExp','Действует до', d.expires||'') +
    `<div class="fld"><label for="dcFile">Файл</label>
      <input type="file" id="dcFile">
      <span class="fhint">${d.file?'текущий: '+esc(d.file)+' · '+esc(d.size):'файл не приложен'}</span></div>`,
    onOpen(){
      const p = document.getElementById('dcPerm'), e = document.getElementById('dcExp');
      const sync = ()=>{ e.disabled = p.checked; if(p.checked) e.value=''; };
      p.onchange = sync; sync();
    },
    onSave(){
      const typeId=mVal('dcType'), title=mVal('dcTitle'), no=mVal('dcNo'), issued=mVal('dcIssued'),
            org=mVal('dcOrg'), permanent=mChecked('dcPerm'), expires = permanent ? null : mVal('dcExp');
      if(!title) return 'Наименование документа обязательно.';
      if(!V.date(issued)) return 'Укажите дату выдачи.';
      if(issued > TODAY) return 'Дата выдачи не может быть в будущем.';
      if(!permanent){
        if(!V.date(expires||'')) return 'Укажите срок действия или отметьте «Бессрочный».';
        if(expires <= issued)    return 'Срок действия должен быть позже даты выдачи.';
      }
      const f = document.getElementById('dcFile').files[0];
      const label = refName(REF.DOC_TYPES, typeId)+(no && no!=='—' ? ' '+no : '');
      if(isNew){
        d.id='dc'+(docSeq++);
        Object.assign(d, {typeId,title,no:no||'—',issued,expires,org});
        if(f){ d.file=f.name; d.size=(f.size/1024>1024? (f.size/1048576).toFixed(1)+' МБ' : Math.round(f.size/1024)+' КБ'); }
        DOCS.push(d);
        audit('Документы','Документ','—','добавлен', d.id, label);
      } else {
        audit('Документы','Тип', refName(REF.DOC_TYPES,d.typeId), refName(REF.DOC_TYPES,typeId), d.id, label);
        audit('Документы','Наименование', d.title, title, d.id, label);
        audit('Документы','Номер', d.no, no||'—', d.id, label);
        audit('Документы','Дата выдачи', d.issued, issued, d.id, label);
        audit('Документы','Орган выдачи', d.org, org, d.id, label);
        audit('Документы','Срок действия', d.expires||'бессрочный', expires||'бессрочный', d.id, label);
        if(f) audit('Документы','Файл', d.file||'—', f.name, d.id, label);
        Object.assign(d, {typeId,title,no:no||'—',issued,expires,org});
        if(f){ d.file=f.name; d.size=(f.size/1024>1024? (f.size/1048576).toFixed(1)+' МБ' : Math.round(f.size/1024)+' КБ'); }
      }
    },
    onDelete: isNew ? null : function(){
      const i=DOCS.indexOf(d); if(i>=0) DOCS.splice(i,1);
      audit('Документы','Документ','«'+d.title+'»','удалён', d.id, refName(REF.DOC_TYPES,d.typeId)+' '+d.no);
    },
    deleteLabel:'Удалить документ' });
}

/* =========================================================================
   §8 Р-4. КОПИРОВАНИЕ РЕКВИЗИТОВ + ПЕЧАТНАЯ КАРТОЧКА — строго «на сейчас».
   ========================================================================= */
function reqsBlock(ac){
  const b = bankOf(ac.bankId);
  return [
    'Получатель: ' + ORG.shortName,
    'ИНН: ' + REG.inn,
    'ОКПО: ' + REG.okpo,
    'Банк: ' + b.name,
    'БИК: ' + b.bik,
    'Счёт: ' + ac.acc + ' (' + ac.ccy + ')',
    'Назначение: ' + refName(REF.ACCT_PURPOSE, ac.purposeId),
  ].join('\n');
}
/* clipboard API часто заблокирован в iframe-песочнице → fallback обязателен */
function copyText(text){
  const done = ()=> toast('Реквизиты счёта скопированы в буфер обмена. Данные — <b>на текущий момент</b> (§8 Р-4).');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=> fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text; ta.setAttribute('readonly','');
  ta.style.cssText = 'position:fixed;top:-1000px;left:-1000px;opacity:0';
  document.body.appendChild(ta); ta.select();
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){ ok = false; }
  document.body.removeChild(ta);
  ok ? done() : toast('Не удалось скопировать автоматически — выделите реквизиты вручную.');
}

    </div>

    <dl>
      <dt>Свидетельство о регистрации №</dt><dd>${esc(REG.certNo)} от ${esc(fmtDate(REG.certDate))}</dd>
      <dt>Орган регистрации</dt><dd>${esc(refName(REF.REG_ORGS, REG.regOrgId))}</dd>
      <dt>ИНН</dt><dd>${esc(REG.inn)}</dd>
      <dt>ОКПО</dt><dd>${esc(REG.okpo)}</dd>
    </dl>
    <h2>Адреса и контакты</h2>
    <dl>
      <dt>Юридический адрес</dt><dd>${esc(CONTACTS.legalAddr)}</dd>
      <dt>Фактический адрес</dt><dd>${esc(CONTACTS.factAddr)}</dd>
      <dt>Телефоны</dt><dd>${esc(phones)}</dd>
      <dt>Электронная почта</dt><dd>${esc(emails)}</dd>
      <dt>Адрес сайта</dt><dd>${esc(CONTACTS.site)}</dd>
      <dt>Часы работы</dt><dd>${esc(CONTACTS.workHours)}</dd>
    </dl>
    <h2>Банковские реквизиты (действующие счета)</h2>
    <table>
      <thead><tr><th>Банк</th><th>БИК</th><th>Номер счёта</th><th>Валюта</th><th>Назначение</th><th>Основной</th></tr></thead>
      <tbody>
        ${active.map(a=>{ const b=bankOf(a.bankId); return `<tr>
          <td>${esc(b.name)}</td><td>${esc(b.bik)}</td><td>${esc(a.acc)}</td>
          <td>${esc(a.ccy)}</td><td>${esc(refName(REF.ACCT_PURPOSE,a.purposeId))}</td>

      Реквизиты приведены по состоянию на момент формирования. Закрытые счета не печатаются.
    </div>
  </div>`;
}
function openPrintCard(){
  const html = printCardHtml();
  document.getElementById('printRoot').innerHTML = html;   // печатается он, .app скрыт @media print
  openModal({ title:'Карточка организации · предпросмотр', wide:true, saveLabel:'Печать',
    onPrimary: ()=> window.print(),
    body:`<div style="border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px">${html}</div>` });
}

/* =========================================================================
   §8 Р-9. ВЫГРУЗКА CSV (отфильтрованного набора, не всей таблицы).
   BOM ﻿ — иначе Excel ломает кириллицу. Разделитель «;» — русская локаль Excel.
   ========================================================================= */
function downloadCsv(rows, filename){
  const csv = rows.map(r => r.map(c => '"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});   // BOM — иначе Excel ломает кириллицу
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(a.href), 1000);
}
function exportAudit(){
  const rows = auditRows();
  const head = ['Дата и время','Пользователь','Блок','Объект','Поле','Было','Стало'];
  const body = rows.map(a=> [a.when, a.who, a.block, a.objLabel+' ('+a.objId+')', a.field, a.from, a.to]);
  downloadCsv([head, ...body], 'audit-vedomstvo.csv');
  toast(`Выгружено записей: <b>${rows.length}</b> (отфильтрованный набор, не весь журнал).`);
}

/* =========================================================================
   ДЕЛЕГИРОВАНИЕ КЛИКОВ по data-act (кнопки перерисовываются — слушатель один).
   ========================================================================= */
const READ_ACTS = ['copy-reqs','print-card','dl-doc','csv-audit','pg-prev','pg-next'];
document.querySelector('.content').addEventListener('click', e=>{
  const b = e.target.closest('[data-act]'); if(!b || b.disabled) return;
  const act = b.dataset.act, id = b.dataset.id;
  if(!canEdit() && !READ_ACTS.includes(act)) return; // §2/§5 правка только Админ
  switch(act){
    case 'edit-general':  editGeneral(); break;
    case 'edit-reg':      editReg(); break;
    case 'edit-contacts': editContacts(); break;

    case 'add-chrono':    chronoForm(null); break;
    case 'edit-chrono':   chronoForm(CHRONO.find(x=>x.id===id)); break;
    case 'del-chrono':    { const ev=CHRONO.find(x=>x.id===id); if(ev){ CHRONO.splice(CHRONO.indexOf(ev),1);
                            audit('Хронология','Событие','«'+ev.title+'»','удалено', ev.id, 'Событие '+ev.date); renderAll(); } break; }

    case 'add-account':   accountForm(null); break;
    case 'edit-account':  accountForm(ACCOUNTS.find(x=>x.id===id)); break;
    case 'close-account': closeAccountForm(ACCOUNTS.find(x=>x.id===id)); break;   // §8 Р-1: вместо удаления
    case 'copy-reqs':     { const ac=ACCOUNTS.find(x=>x.id===id); if(ac) copyText(reqsBlock(ac)); break; }
    case 'print-card':    openPrintCard(); break;

    case 'add-doc':       docForm(null); break;
    case 'edit-doc':      docForm(DOCS.find(x=>x.id===id)); break;
    case 'del-doc':       { const d=DOCS.find(x=>x.id===id); if(d && confirm('Удалить документ «'+d.title+'»? Удаление будет записано в журнал изменений.')){
                            DOCS.splice(DOCS.indexOf(d),1);
                            audit('Документы','Документ','«'+d.title+'»','удалён', d.id, refName(REF.DOC_TYPES,d.typeId)+' '+d.no);
                            renderAll(); } break; }
    case 'dl-doc':        { const d=DOCS.find(x=>x.id===id);
                            toast(`Скачивание файла <span class="mono">${esc(d?d.file:'')}</span> (демо). Файлы хранит подсистема документооборота, не модуль ведомства.`); break; }

    case 'add-phone':     phoneForm(null); break;
    case 'edit-phone':    phoneForm(CONTACTS.phones.find(x=>x.id===id)); break;
    case 'del-phone':     { const p=CONTACTS.phones.find(x=>x.id===id); if(p){ CONTACTS.phones.splice(CONTACTS.phones.indexOf(p),1);
                            audit('Контакты','Телефон', p.value,'удалён', p.id, 'Телефон · '+refName(REF.PHONE_TYPES,p.typeId)); renderAll(); } break; }
    case 'add-email':     emailForm(null); break;
    case 'edit-email':    emailForm(CONTACTS.emails.find(x=>x.id===id)); break;
    case 'del-email':     { const m=CONTACTS.emails.find(x=>x.id===id); if(m){ CONTACTS.emails.splice(CONTACTS.emails.indexOf(m),1);
                            audit('Контакты','E-mail', m.value,'удалён', m.id, 'E-mail · '+refName(REF.EMAIL_TYPES,m.typeId)); renderAll(); } break; }

    case 'csv-audit':     exportAudit(); break;
    case 'pg-prev':       state.audit.page = Math.max(1, state.audit.page-1); renderAudit(); break;
    case 'pg-next':       state.audit.page = state.audit.page+1; renderAudit(); break;

  }
});

/* ---- боковое меню и выход (демо-заглушки) ---- */
document.querySelectorAll('.nav-item').forEach(a=> a.addEventListener('click', ev=>{
  if(a.classList.contains('active')){ ev.preventDefault(); return; }
  if(a.getAttribute('href')) return;                   // реальные ссылки на соседние мокапы
  ev.preventDefault();
  toast(`Раздел «${a.textContent.trim()}» — отдельный модуль АСУБК (в этом прототипе не реализован).`);
}));
document.querySelector('.icon-btn').addEventListener('click', ()=> toast('Выход из системы (демо).'));

/* ---- события шапки ---- */
document.getElementById('roleSel').onchange = e=>{
  state.role = e.target.value;
  if(state.tab==='audit' && !canEdit()) state.tab='general'; // наблюдателю журнал недоступен
  renderAll();
};
// §8 Р-7: дата просмотра пронизывает ОБА зеркала и включает плашку на собственных вкладках
document.getElementById('dateInp').onchange = e=>{ state.date = e.target.value; renderAll(); };
document.getElementById('todayBtn').onclick = ()=>{
  state.date = TODAY; document.getElementById('dateInp').value = TODAY; renderAll();
};

renderAll();
