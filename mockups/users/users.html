<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>АСУБК — Управление пользователями</title>
<!--
  users.html — мокап модуля управления пользователями АСУБК (ОАО «Госфинхолдинг»).
  Источник истины по логике: ASUBK-users-logika.md. Спека главнее промпта.
  Один самодостаточный файл, vanilla JS, без сети, без localStorage — состояние в памяти.
  Структура скрипта: DATA · CORE (resolvePermission + помощники §7) · HELPERS(UI) ·
  RENDER (экраны §4) · ACTIONS · DEMO · BOOT.
  Ключевой тезис (§4.1): переключается ПОЛЬЗОВАТЕЛЬ, роль/scope/сеть вычисляются из модели.
-->
<style>
  :root{
    --primary:#006af5; --primary-text:#005fdb; --primary-hover:#0059d1;
    --green-btn:#2e8b3d; --green-btn-hover:#277633;
    --body-text:#1b2a3d; --secondary-text:rgba(38,55,78,0.69);
    --success:#158a4e; --error:#e02020; --green-card-bg:#eaf7f0;
    --border:#dbe0e6; --border-strong:#c7ced6; --field-bg:#f6f8fa; --filter-bg:#eef1f4;
    --field-border:#c9d0d8; --panel-border:#e3e7ec; --grid-hover:#f3f7fd; --grid-sel:#dbe9fb;
    --radius:4px;
    --font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font);color:var(--body-text);background:#fff;font-size:16px;line-height:1.4;}
  .app{display:flex;min-height:100vh;}
  .muted{color:var(--secondary-text);font-size:13px;}
  .muted b{color:var(--body-text);font-weight:600;}
  a.lnk,.lnk{color:var(--primary-text);cursor:pointer;font-size:14px;text-decoration:none;}
  .lnk:hover{text-decoration:underline;}
  code{background:rgba(0,0,0,.05);border-radius:3px;padding:0 4px;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace;}

  /* SIDEBAR */
  .sidebar{width:280px;flex:0 0 280px;background:#eff1f4;border-right:1px solid var(--border);display:flex;flex-direction:column;}
  .sidebar .brand{padding:18px 16px 6px;font-weight:600;font-size:17px;letter-spacing:0.04em;}
  .sidebar .brand small{display:block;font-weight:500;font-size:12px;color:var(--secondary-text);letter-spacing:0;margin-top:3px;}
  .nav{flex:1;overflow-y:auto;padding:8px 0;}
  .nav-group{padding:9px 16px 3px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--secondary-text);}
  .nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px 8px 20px;font-size:15px;color:var(--secondary-text);cursor:pointer;border-left:3px solid transparent;}
  .nav-item:hover{background:rgba(24,39,57,0.05);}
  .nav-item.active{background:rgba(51,139,255,0.13);color:var(--body-text);font-weight:600;border-left-color:var(--primary);}
  .nav-item .ic{flex:0 0 18px;display:inline-flex;color:currentColor;}
  .nav-item .cnt{margin-left:auto;font-size:12px;font-weight:600;color:var(--secondary-text);background:#fff;border:1px solid var(--border);border-radius:999px;padding:0 7px;}
  .sidebar-foot{border-top:1px solid var(--border);padding:12px 16px;color:var(--secondary-text);font-size:13px;}

  /* TOPBAR */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;gap:14px;padding:11px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .topbar .title{font-weight:700;font-size:20px;}
  .topbar .crumb{color:var(--secondary-text);font-size:13px;}
  .who-wrap{margin-left:auto;display:flex;align-items:center;gap:9px;}
  .who-wrap label{color:var(--secondary-text);font-size:12px;}
  .who-wrap select{height:34px;border:1px solid var(--field-border);border-radius:var(--radius);
    background:var(--field-bg);font-family:var(--font);font-size:14px;color:var(--body-text);padding:0 8px;max-width:340px;}
  .net-toggle{display:flex;align-items:center;gap:0;border:1px solid var(--field-border);border-radius:999px;overflow:hidden;}
  .net-toggle button{appearance:none;border:0;background:#fff;font-family:var(--font);font-size:12px;font-weight:600;
    color:var(--secondary-text);padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;}
  .net-toggle button.on{background:var(--primary);color:#fff;}
  .net-toggle button.on.ext{background:#b46200;}
  .content{padding:18px 24px 40px;flex:1;overflow-x:auto;}

  /* BUTTONS */
  .btn{font-family:var(--font);font-size:15px;font-weight:600;border-radius:var(--radius);padding:8px 15px;
    border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:var(--filter-bg);color:var(--secondary-text);border-color:var(--field-border);}
  .btn-secondary:not([disabled]):hover{background:#e4e8ed;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:not([disabled]):hover{background:var(--primary-hover);}
  .btn-green{background:var(--green-btn);color:#fff;}
  .btn-green:not([disabled]):hover{background:var(--green-btn-hover);}
  .btn-cancel{background:#fff;color:var(--primary-text);border-color:var(--border-strong);}
  .btn-danger{background:#fff;color:#ca150c;border-color:#e6b3ae;}
  .btn-danger:not([disabled]):hover{background:#fdeaea;}
  .btn-sm{padding:5px 11px;font-size:13px;}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;
    padding:2px 9px;border-radius:999px;white-space:nowrap;line-height:1.6;}
  .b-ok{color:var(--success);background:var(--green-card-bg);}
  .b-muted{color:var(--secondary-text);background:var(--filter-bg);}
  .b-info{color:var(--primary-text);background:#e9f1fe;}
  .b-warn{color:#9a6a00;background:#fdf3dd;}
  .b-err{color:var(--error);background:#fdeaea;}
  .b-dot::before{content:"●";font-size:8px;}

  /* LIST / FILTERS */
  .filter-card{border:1px solid var(--panel-border);border-radius:3px;padding:12px 14px;margin-bottom:14px;
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .fgrp{display:flex;align-items:center;gap:7px;}
  .fgrp label{color:var(--secondary-text);font-size:13px;}
  .fgrp select,.fgrp input{height:34px;border:1px solid var(--field-border);border-radius:var(--radius);
    background:var(--field-bg);font-family:var(--font);font-size:14px;color:var(--body-text);padding:0 8px;}
  .fgrp input{width:220px;}
  .toolbar{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap;}
  .rowcount{margin-left:auto;color:var(--body-text);font-size:14px;}
  .grid{border:1px solid var(--border);border-radius:3px;overflow:auto;}
  .grid table{width:100%;border-collapse:collapse;}
  .grid thead th{text-align:left;font-weight:700;font-size:13px;padding:10px 13px;border-bottom:1px solid var(--border);white-space:nowrap;background:#fbfcfd;position:sticky;top:0;z-index:1;}
  .grid tbody td{padding:9px 13px;border-bottom:1px solid #eef1f4;font-size:14px;white-space:nowrap;}
  .grid tbody tr[data-open]{cursor:pointer;}
  .grid tbody tr[data-open]:hover{background:var(--grid-hover);}
  .grid tbody tr.sel{background:var(--grid-sel);}
  .grid tbody tr:last-child td{border-bottom:0;}
  .grid tbody tr.gone td{color:var(--secondary-text);background:#fbfcfd;}
  .empty-row{padding:24px;text-align:center;color:var(--secondary-text);}

  /* CARD */
  .backlink{display:inline-flex;align-items:center;gap:6px;color:var(--primary-text);font-size:14px;cursor:pointer;margin-bottom:12px;}
  .backlink:hover{text-decoration:underline;}
  .header-card{border:1px solid var(--panel-border);border-radius:4px;padding:14px 18px;display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .avatar{flex:0 0 60px;width:60px;height:60px;border:1px solid var(--border);border-radius:50%;
    background:var(--field-bg);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--primary-text);}
  .header-mid{flex:1;min-width:260px;}
  .obj-name{font-size:20px;font-weight:700;margin:0 0 2px;}
  .obj-sub{color:var(--secondary-text);font-size:14px;margin:0 0 8px;}
  .status-row{display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;}
  .card-actions{display:flex;gap:9px;margin:0 0 16px;flex-wrap:wrap;align-items:center;}
  .kv-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;font-size:15px;align-items:center;max-width:640px;}
  .kv-grid .k{color:var(--secondary-text);}
  .mask{font-family:ui-monospace,Menlo,Consolas,monospace;letter-spacing:.08em;}

  /* TABS */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .tab{appearance:none;border:0;background:transparent;font-family:var(--font);padding:9px 12px 11px;font-size:15px;
    color:var(--secondary-text);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .tab:hover{color:var(--primary-text);}
  .tab.active{color:var(--primary-text);border-bottom-color:var(--primary-text);font-weight:600;}
  .tab-cnt{display:inline-block;min-width:16px;padding:0 4px;border-radius:8px;background:var(--field-bg);border:1px solid var(--border);
    font-size:11px;font-weight:600;color:var(--secondary-text);text-align:center;line-height:15px;}
  .tab.active .tab-cnt{background:#e9f1fe;border-color:#bcd6fb;color:var(--primary-text);}
  .section-title{font-size:18px;font-weight:700;margin:2px 0 4px;}
  .section-sub{font-size:15px;font-weight:700;margin:22px 0 8px;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:8px;}

  /* dtable (вкладки) */
  .dtable{width:100%;border-collapse:collapse;}
  .dtable thead th{text-align:left;font-weight:700;font-size:13px;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;background:#fbfcfd;}
  .dtable tbody td{padding:9px 12px;border-bottom:1px solid #eef1f4;font-size:14px;vertical-align:top;}
  .dtable tbody tr:last-child td{border-bottom:0;}
  .dtable tr.closed td{background:#fbfcfd;color:var(--secondary-text);}
  .grid-wrap{border:1px solid var(--border);border-radius:3px;overflow:auto;}

  /* banners */
  .banner{border-radius:var(--radius);padding:11px 14px;margin:0 0 14px;font-size:14px;display:flex;gap:10px;align-items:flex-start;}
  .banner .ic{flex:0 0 18px;line-height:1.3;}
  .banner.warn{background:#fdf3dd;border:1px solid #f0dca8;color:#7a5600;}
  .banner.err{background:#fdeaea;border:1px solid #f2c4c0;color:#9a1b14;}
  .banner.info{background:#e9f1fe;border:1px solid #c7ddfb;color:#0a4aa8;}
  .banner.ok{background:var(--green-card-bg);border:1px solid #cdeadb;color:#126b3e;}
  .banner b{font-weight:700;}

  /* forms */
  .fld{display:flex;flex-direction:column;gap:4px;margin-bottom:13px;}
  .fld label{font-size:13px;color:var(--secondary-text);}
  .fld input,.fld select,.fld textarea{border:1px solid var(--field-border);border-radius:var(--radius);
    background:var(--field-bg);font-family:var(--font);font-size:15px;color:var(--body-text);padding:8px 10px;}
  .fld select,.fld input{height:36px;}
  .fld textarea{min-height:70px;resize:vertical;}
  .fld-err{color:var(--error);font-size:13px;font-weight:600;margin:-7px 0 12px;}
  .chk-row{display:flex;align-items:center;gap:8px;font-size:14px;padding:4px 0;}
  .cols2{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;align-items:start;}
  @media(max-width:900px){.cols2{grid-template-columns:1fr;}}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(24,39,57,0.34);z-index:100;
    display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:6px;box-shadow:0 12px 40px rgba(24,39,57,0.3);
    width:100%;max-width:640px;display:flex;flex-direction:column;max-height:88vh;overflow:hidden;}
  .modal.wide{max-width:860px;}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:17px 22px 10px;}
  .modal-title{font-weight:700;font-size:18px;}
  .modal-x{width:28px;height:28px;border:0;background:transparent;color:var(--secondary-text);font-size:18px;cursor:pointer;border-radius:var(--radius);flex:0 0 28px;}
  .modal-x:hover{background:var(--filter-bg);}
  .modal-body{padding:2px 22px 14px;overflow-y:auto;}
  .modal-foot{display:flex;gap:10px;padding:13px 22px 18px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap;}
  .modal-foot .spacer{margin-left:auto;}
  .op-box{background:var(--field-bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;
    font-size:13px;margin:4px 0 12px;font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-word;}
  .pw-show{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:20px;font-weight:700;letter-spacing:.06em;
    background:#0f1c2e;color:#7ee0a0;padding:12px 16px;border-radius:var(--radius);text-align:center;user-select:all;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1b2a3d;color:#fff;
    padding:12px 20px;border-radius:6px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:200;
    display:none;max-width:600px;}
  .toast.show{display:block;}
  .toast.err{background:#8a1410;} .toast.ok{background:#12603a;}

  /* PERMISSION TREE / MATRIX */
  .ptree{border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .ptree .pg{background:var(--filter-bg);font-weight:700;font-size:13px;padding:8px 12px;border-bottom:1px solid var(--border);}
  .ptree table{width:100%;border-collapse:collapse;}
  .ptree th{font-size:11px;font-weight:700;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.03em;
    text-align:center;padding:7px 4px;border-bottom:1px solid var(--border);width:92px;}
  .ptree th.fn{text-align:left;width:auto;padding-left:12px;}
  .ptree td{padding:7px 4px;border-bottom:1px solid #eef1f4;font-size:14px;text-align:center;}
  .ptree td.fn{text-align:left;padding-left:12px;}
  .ptree tr:last-child td{border-bottom:0;}
  .pc{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:22px;border-radius:4px;
    font-size:12px;font-weight:700;padding:0 6px;cursor:default;}
  .pc-ok{background:var(--green-card-bg);color:var(--success);}
  .pc-no{background:var(--filter-bg);color:var(--secondary-text);}
  .pc-deny{background:#fdf3dd;color:#9a6a00;}
  .pc-scope{background:#eaf0fb;color:#4360a8;}
  .pc-net{background:#fdeaea;color:var(--error);}
  .pc-na{color:#c7ced6;}
  .mx-chk{width:17px;height:17px;cursor:pointer;}
  .mx-na{color:#c7ced6;font-size:12px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--secondary-text);margin:8px 0 0;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:13px;height:13px;border-radius:3px;display:inline-block;}

  /* DEMO panel */
  .demo-panel{border:1px solid #d7e0ee;background:#f0f4fa;border-left:3px solid var(--primary);border-radius:6px;
    padding:12px 15px;margin-bottom:16px;}
  .demo-panel h4{margin:0 0 8px;font-size:14px;display:flex;align-items:center;gap:8px;}
  .demo-list{display:grid;grid-template-columns:1fr 1fr;gap:7px 18px;}
  @media(max-width:900px){.demo-list{grid-template-columns:1fr;}}
  .demo-item{font-size:13px;line-height:1.45;}
  .demo-item b{color:var(--primary-text);}
  .demo-run{appearance:none;border:1px solid var(--field-border);background:#fff;border-radius:999px;
    font-size:11px;font-weight:600;color:var(--primary-text);padding:2px 9px;cursor:pointer;margin-left:6px;}
  .demo-run:hover{background:var(--grid-hover);}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:999px;background:#e9f1fe;color:var(--primary-text);}
  .kv2{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:14px;}
  .kv2 .k{color:var(--secondary-text);}
</style>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">АСУБК<small>Управление пользователями · подсистема 1.1</small></div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot" id="foot"></div>
  </aside>
  <div class="main">
    <header class="topbar">
      <span class="title" id="scrTitle">—</span>
      <div class="who-wrap">
        <label for="whoSel">Текущий пользователь</label>
        <select id="whoSel" onchange="switchUser(this.value)"></select>
        <div class="net-toggle" id="netToggle"></div>
      </div>
    </header>
    <div class="content" id="screen"></div>
  </div>
</div>
<div class="modal-overlay" id="modalHost"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================================
   DATA — демо-состояние (в памяти). Сброс: resetDemo(). §2 спеки.
   Все id, статусы, действия — из вокабуляра спеки, без синонимов.
   ============================================================================ */
const INIT = () => ({

/* 2.4 ПОДРАЗДЕЛЕНИЕ (внешняя, владелец — отдел кадров). Дерево, isHeadOffice. */
DEPARTMENTS: [
  {id:'D0', code:'ГО',    name:'Головной офис',            parentId:null, isHeadOffice:true},
  {id:'D1', code:'Ф-СЕВ', name:'Филиал «Север»',           parentId:'D0', isHeadOffice:false},
  {id:'D2', code:'Ф-ЮГ',  name:'Филиал «Юг»',              parentId:'D0', isHeadOffice:false},
  {id:'D3', code:'ОР',    name:'Отдел рисков',             parentId:'D0', isHeadOffice:false},
  {id:'D4', code:'ЮР',    name:'Юридический отдел',         parentId:'D0', isHeadOffice:false},
  {id:'D5', code:'ОБ',    name:'Отдел безопасности',        parentId:'D0', isHeadOffice:false},
],

/* 3.2 РЕЕСТР ФУНКЦИЙ — системный, только для чтения. Дерево повторяет навигацию.
   actions[] — какие из view/create/edit/delete/execute применимы к функции.
   objectCheck — проверка_принадлежности_объекта (§7): headOffice | commissionMember | deptOfConclusion.
   critical — попадает под сетевое ограничение (§6.3). */
FUNCTIONS: [
  {id:'f-dec',      group:'Решения',            name:'Решения госоргана',                         actions:['view','create','edit','delete','execute']},
  {id:'f-prog',     group:'Кредитные программы', name:'Кредитные программы',                       actions:['view','create','edit','execute']},
  {id:'f-app',      group:'Заявки',             name:'Заявки',                                    actions:['view','create','edit']},
  {id:'f-app-send', group:'Заявки',             name:'Заявка · Отправить в комиссию',             actions:['execute']},
  {id:'f-app-conf', group:'Заявки',             name:'Заявка · Подтвердить комплект (2-й уровень)', actions:['execute'], objectCheck:'headOffice'},
  {id:'f-loan',     group:'Кредиты',            name:'Кредиты',                                   actions:['view','edit']},
  {id:'f-loan-wo',  group:'Кредиты',            name:'Кредит · Списание задолженности',            actions:['execute'], critical:true},
  {id:'f-borr',     group:'Заёмщики',           name:'Заёмщики',                                  actions:['view','create','edit']},
  {id:'f-coll',     group:'Залоги',             name:'Залоги',                                    actions:['view','edit']},
  {id:'f-coll-rel', group:'Залоги',             name:'Залог · Снятие залога',                      actions:['execute'], critical:true},
  {id:'f-comm',     group:'Комиссия',           name:'Комиссия',                                  actions:['view']},
  {id:'f-comm-vote',group:'Комиссия',           name:'Комиссия · Голосовать / подтвердить',        actions:['execute'], objectCheck:'commissionMember'},
  {id:'f-vzysk',    group:'Взыскание',          name:'Взыскание',                                 actions:['view','create','edit','execute']},
  {id:'f-rep',      group:'Отчёты',             name:'Отчёты',                                    actions:['view']},
  {id:'f-dict',     group:'Справочники',        name:'Справочники',                               actions:['view','edit']},
  {id:'f-users',    group:'Система',            name:'Пользователи',                              actions:['view','create','edit','execute']},
  {id:'f-roles',    group:'Система',            name:'Роли',                                      actions:['view','create','edit','delete']},
  {id:'f-rassign',  group:'Система',            name:'Роли · Назначение роли',                     actions:['execute'], critical:true},

function byId(coll, id){ return DB[coll].find(x => x.id === id) || null; }
function fn(id){ return DB.FUNCTIONS.find(f => f.id === id) || null; }
function role(id){ return DB.ROLES.find(r => r.id === id) || null; }
function dept(id){ return DB.DEPARTMENTS.find(d => d.id === id) || null; }
function employeeOf(acc){ return acc && acc.employeeId ? byId('EMPLOYEES', acc.employeeId) : null; }
function deptOfAccount(acc){ const e = employeeOf(acc); return e ? e.deptId : null; }
function accountByEmployee(empId){ return DB.ACCOUNTS.find(a => a.employeeId === empId) || null; }
function deptDescendants(deptId){ // головной офис видит своё + подчинённые по дереву
  const out = [deptId];
  const walk = pid => DB.DEPARTMENTS.filter(d => d.parentId === pid).forEach(c => { out.push(c.id); walk(c.id); });
  const d = dept(deptId); if (d && d.isHeadOffice) walk(deptId);
  return out;
}
function periodsOverlap(a1,a2,b1,b2){ return a1 <= b2 && b1 <= a2; }

// --- сеть: IP в CIDR ---
function ipToLong(ip){ const p = ip.split('.').map(Number); if (p.length!==4||p.some(n=>isNaN(n))) return null; return ((p[0]<<24)>>>0)+(p[1]<<16)+(p[2]<<8)+p[3]; }
function ipInCidr(ip, cidr){
  const [net, bitsRaw] = cidr.split('/'); const bits = parseInt(bitsRaw,10);
  const a = ipToLong(ip), b = ipToLong(net); if (a===null||b===null) return false;
  const mask = bits===0 ? 0 : (~((1<<(32-bits))-1))>>>0;
  return (a & mask) === (b & mask);
}
function ipInPolicy(ctx, policy){
  const okIp = (policy.ipRanges||[]).some(c => ipInCidr(ctx.ip, c));
  // MAC — вспомогательно (§5.3: по HTTP не передаётся; в мокапе учитываем, если политика его задаёт)
  const okMac = !(policy.macList||[]).length || policy.macList.includes(ctx.mac);
  return okIp && okMac;
}

/* effectiveRoles(account) — роли УЗ (активные назначения) + роли активного замещения.
   Возвращает [{role, origin:'own'|'subst', substId?}]. §3.3 */
function effectiveRoles(acc){
  const out = [];
  DB.ROLE_ASSIGNMENTS
    .filter(a => a.accountId === acc.id && !a.revokedAt)
    .forEach(a => { const r = role(a.roleId); if (r) out.push({role:r, origin:'own'}); });
  activeSubstitutionsFor(acc).forEach(s =>
    s.roleIds.forEach(rid => { const r = role(rid); if (r && !out.some(o=>o.role.id===rid)) out.push({role:r, origin:'subst', substId:s.id}); })
  );
  return out;
}
function isSubstituting(acc){ return activeSubstitutionsFor(acc).length > 0; }
function activeSubstitutionsFor(acc){
  return DB.SUBSTITUTIONS.filter(s => s.substituteAccountId === acc.id && s.status === 'Действует');
}
function hasGlobalScope(acc){ return effectiveRoles(acc).some(o => o.role.globalScope); }

/* Изъятия политикой подразделения для acc: {funcId,action} множество (строки-ключи). §2.6 */
function deniedSetFor(acc){
  const d = deptOfAccount(acc); const set = new Set();
  if (!d) return set;
  effectiveRoles(acc).forEach(o => {
    DB.DEPT_ROLE_POLICIES
      .filter(p => p.roleId === o.role.id && p.deptId === d)
      .forEach(p => (p.deniedPermissions||[]).forEach(dp => set.add(dp.funcId + '|' + dp.action)));
  });
  return set;
}

/* Функциональная проверка: 'ok' | 'no-role' | 'denied-by-policy'. §7 шаг 1 */
function functionalCheck(acc, funcId, action){
  const inRole = effectiveRoles(acc).some(o =>
    o.role.permissions.some(p => p.funcId === funcId && p.actions.includes(action)));
  if (!inRole) return 'no-role';
  if (deniedSetFor(acc).has(funcId + '|' + action)) return 'denied-by-policy';
  return 'ok';
}

/* scope(УЗ) — §4.2. Возвращает true, если запись в scope. */
function recordInScope(acc, record){
  if (hasGlobalScope(acc)) return true;
  const d = deptOfAccount(acc);
  if (d && deptDescendants(d).includes(record.deptId)) return true;         // подразделение + дерево
  if (curatedRecordIds(acc).includes(record.id)) return true;              // кураторство (свой + замещаемого)
  if (record.ownerId === acc.id) return true;                             // владелец == пользователь
  return false;
}
/* Кураторские записи: свои + замещаемого при активном замещении (§2.7.1). */
function curatedRecordIds(acc){
  const ids = new Set();
  (DB.CURATORSHIPS.find(c => c.accountId === acc.id)?.recordIds || []).forEach(r => ids.add(r));
  activeSubstitutionsFor(acc).forEach(s => {
    const absentAcc = accountByEmployee(s.absentEmployeeId);
    if (absentAcc) (DB.CURATORSHIPS.find(c => c.accountId === absentAcc.id)?.recordIds || []).forEach(r => ids.add(r));
  });
  return [...ids];
}

/* Проверка принадлежности объекта (§7): headOffice | commissionMember | deptOfConclusion. */
function objectCheckPass(acc, func, record){
  if (!func.objectCheck) return true;
  if (func.objectCheck === 'headOffice'){ const d = dept(deptOfAccount(acc)); return !!(d && d.isHeadOffice); }
  if (func.objectCheck === 'commissionMember'){
    if (!record || !record.commissionId) return null; // не оценивается без записи
    const m = DB.COMMISSION_MEMBERS.find(c => c.commissionId === record.commissionId);
    return !!(m && m.accountIds.includes(acc.id));
  }
  if (func.objectCheck === 'deptOfConclusion'){
    if (!record) return null;
    return record.deptId === deptOfAccount(acc);
  }
  return true;
}

/* Сетевая проверка (§5): функция×действие → политика; ip/mac ctx. */
function networkCheck(func, action, ctx){
  const r = DB.FUNCTION_NET_RESTRICTIONS.find(x => x.funcId === func.id && x.action === action);
  if (!r) return {restricted:false, ok:true, policy:null};
  const policy = byId('NETWORK_POLICIES', r.policyId);
  return {restricted:true, ok:policy ? ipInPolicy(ctx, policy) : false, policy};
}

/* ---- ЕДИНЫЙ ВЫЧИСЛИТЕЛЬ ПРАВ (§7) ----
   resolvePermission(user, func, action, record?, ctx) → {allowed, reason, detail}
   reason: 'ok'|'no-role'|'denied-by-policy'|'out-of-scope'|'blocked-by-network'|'pending-control' */
function resolvePermission(user, func, action, record, ctx){
  ctx = ctx || ctxNow();
  if (typeof func === 'string') func = fn(func);
  if (!func) return {allowed:false, reason:'no-role', detail:'Функция не найдена'};

  // 1. Функциональное измерение (роль ∪ роли замещения, минус изъятия политики)
  const fc = functionalCheck(user, func.id, action);
  if (fc === 'no-role')
    return {allowed:false, reason:'no-role', detail:`Ни одна роль УЗ не даёт «${action}» на «${func.name}»`};
  if (fc === 'denied-by-policy')
    return {allowed:false, reason:'denied-by-policy', detail:`Разрешение изъято политикой подразделения «${dept(deptOfAccount(user))?.name || '—'}»`};

  // 2. Строчное измерение (только при наличии записи; §4.2 — порядок: функция → scope)
  if (record){
    if (!recordInScope(user, record))
      return {allowed:false, reason:'out-of-scope', detail:`Запись «${record.name}» вне scope пользователя`};
  }
  // проверка принадлежности объекта (headOffice — по пользователю; остальные — по записи)
  const oc = objectCheckPass(user, func, record);
  if (oc === false){
    const why = func.objectCheck === 'headOffice' ? 'доступно только сотруднику головного офиса'
      : func.objectCheck === 'commissionMember' ? 'пользователь не входит в состав этой комиссии'
      : 'запись не относится к подразделению-исполнителю пользователя';
    return {allowed:false, reason:'out-of-scope', detail:why};
  }

  // 3. Сетевое измерение (§5)
  const nc = networkCheck(func, action, ctx);
  if (nc.restricted && !nc.ok)
    return {allowed:false, reason:'blocked-by-network', detail:`Доступно только из сети «${nc.policy?.name || '—'}» (сейчас ${ctx.place}, ip ${ctx.ip})`};

  // 4. Многоуровневый контроль (§6 — отложен, точка расширения)
  /* SLOT: multi-level control (deferred) — здесь появится ветка «уйти в очередь подтверждения».
     Сейчас условие константно true; при реализации вернёт reason:'pending-control'. */
  const controlSingleLevel = true;
  if (!controlSingleLevel)
    return {allowed:false, reason:'pending-control', detail:'Действие уходит в очередь подтверждения'};

  return {allowed:true, reason:'ok', detail:'ok'};
}

/* Текстовое описание эффективного scope (§4.2) — для карточек и «Проверки прав». */
function effectiveScopeText(acc){
  if (hasGlobalScope(acc)) return 'Глобальный (globalScope) — видит все записи системы';
  const parts = [];
  const d = deptOfAccount(acc);
  if (d){
    const chain = deptDescendants(d);
    parts.push(chain.length > 1
      ? `Подразделение «${dept(d).name}» + подчинённые по дереву (${chain.length} подр.)`
      : `Подразделение «${dept(d).name}»`);
  }
  const cur = curatedRecordIds(acc);
  if (cur.length){
    const own = (DB.CURATORSHIPS.find(c=>c.accountId===acc.id)?.recordIds||[]).length;
    const viaSub = cur.length - own;
    parts.push(`Кураторство: ${own} своих${viaSub>0?` + ${viaSub} по замещению`:''}`);
  }
  parts.push('Владелец записей (где ownerId == УЗ)');
  if (!d && !cur.length) return 'Пустой scope — техническая УЗ без сотрудника и без кураторства (§4.2)';
  return parts.join(' · ');
}

/* ============================================================================
   HELPERS (UI) — общие. Аудит append-only, модалки, тосты.
   ============================================================================ */
const $ = sel => document.querySelector(sel);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function nowTs(){ const d = new Date(); const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
function fioOf(acc){ const e = employeeOf(acc); return e ? e.fio : (acc.type==='Техническая' ? '— (техническая)' : '—'); }
function deptName(id){ const d = dept(id); return d ? d.name : '—'; }
function shortFio(fio){ const [a,b,c] = String(fio).split(' '); return b&&c ? `${a} ${b[0]}.${c[0]}.` : fio; }
function currentSession(){
  const s = DB.SESSIONS.find(x => x.accountId === STATE.currentAccountId);
  const ctx = ctxNow();
  return s ? {sessionId:s.sessionId, ip:ctx.ip} : {sessionId:'sess-live', ip:ctx.ip};
}

/* АУДИТ — единственный способ записи; заморозка => append-only (§8.5). Нет edit/delete API. */
function writeAudit({action, objectType, objectId, before=null, after=null, actorAccountId, sessionId, ip}){
  const acc = currentAccount();
  const ses = currentSession();
  const isSystem = actorAccountId === null;           // системное действие (§2.2.1: «система»)
  const actor = (actorAccountId !== undefined) ? actorAccountId : acc.id;
  const sub = isSystem ? null : activeSubstitutionsFor(acc)[0];
  const entry = Object.freeze({
    ts: nowTs(),
    actorAccountId: actor,
    sessionId: (sessionId !== undefined) ? sessionId : (isSystem ? '—' : ses.sessionId),
    ip: (ip !== undefined) ? ip : (isSystem ? '—' : ses.ip),
    action, objectType, objectId, before, after,
    onBehalfOf: sub ? sub.absentEmployeeId : null,
  });
  DB.AUDIT.unshift(entry);
}

/* Тост */
let toastTimer = null;
function toast(msg, type){
  const t = $('#toast'); t.className = 'toast show' + (type ? ' '+type : ''); t.textContent = msg;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

/* Модалка. openModal({title, body, buttons:[{label,cls,onClick,keepOpen}], wide}) */
function openModal(opts){
  const box = $('#modalBox');
  box.className = 'modal' + (opts.wide ? ' wide' : '');
  const btns = (opts.buttons||[{label:'Закрыть', cls:'btn-cancel'}]).map((b,i) =>
    `<button class="btn ${b.cls||'btn-secondary'}" data-mbtn="${i}">${esc(b.label)}</button>`).join('');
  box.innerHTML =
    `<div class="modal-head"><div class="modal-title">${esc(opts.title||'')}</div>
       <button class="modal-x" data-mclose aria-label="Закрыть">✕</button></div>
     <div class="modal-body">${opts.body||''}</div>
     <div class="modal-foot">${opts.footLeft||''}<span class="spacer"></span>${btns}</div>`;
  $('#modalHost').classList.add('open');
  box.querySelector('[data-mclose]').onclick = closeModal;
  (opts.buttons||[]).forEach((b,i) => {
    const el = box.querySelector(`[data-mbtn="${i}"]`);
    if (el) el.onclick = () => { const r = b.onClick ? b.onClick() : true; if (r !== false && !b.keepOpen) closeModal(); };
  });
  if (opts.onOpen) opts.onOpen(box);
}
function closeModal(){ $('#modalHost').classList.remove('open'); $('#modalBox').innerHTML=''; }

    case 's4': STATE.currentAccountId='A7'; STATE.screen='subst'; render(); setTimeout(()=>openSubstForm(),50);
      go('Сценарий 4: открыта форма создания замещения. Меняйте поля — V1–V7 срабатывают вживую.'); break;
    case 's5': STATE.currentAccountId='A6'; STATE.inOffice=false; STATE.screen='check'; render();
      go('Сценарий 5: вы вне офиса. Критичные execute стали «Блокировано сетью» (не исчезли).'); break;
    case 's6': STATE.currentAccountId='A7'; STATE.screen='users'; render();
      go('Сценарий 6: список УЗ. Нурланов — Заблокирована; Эркинов — Отключена (уволен).'); break;

      go('Сценарий 7: журнал аудита. Кнопок правки/удаления нет ни у кого, включая администратора.'); break;
  }
}

/* ============================================================================
   RENDER — §4.6 ПРОВЕРКА ПРАВ (эталонный «рентген» модели).
   Весь гейтинг идёт через resolvePermission — здесь он визуализирован целиком.
   ============================================================================ */
const ACTIONS_ALL = ['view','create','edit','delete','execute'];
SCREENS.check = function(host){
  const acc = currentAccount();
  const ctx = ctxNow();
  const roles = effectiveRoles(acc);
  const rolesHtml = roles.length
    ? roles.map(o=>`<span class="badge ${o.origin==='subst'?'b-info':'b-muted'}" title="${o.origin==='subst'?'по активному замещению':'собственная роль'}">${esc(o.role.name)}${o.origin==='subst'?' · по замещению':''}</span>`).join(' ')
    : '<span class="muted">нет активных ролей</span>';

  // Функциональное дерево: группы функций × действия. Оценка без записи (§ капабилити-срез).
  const groups = [...new Set(DB.FUNCTIONS.map(f=>f.group))];
  let tree = `<div class="ptree"><table><thead><tr><th class="fn">Функция</th>${
    ACTIONS_ALL.map(a=>`<th>${a}</th>`).join('')}</tr></thead><tbody>`;
  groups.forEach(g=>{
    tree += `<tr><td class="fn" colspan="6" style="background:var(--filter-bg);font-weight:700;font-size:12px">${esc(g)}</td></tr>`;
    DB.FUNCTIONS.filter(f=>f.group===g).forEach(f=>{
      tree += `<tr><td class="fn">${esc(f.name)}${f.critical?' <span class="badge b-warn" style="font-size:10px">крит.</span>':''}${f.objectCheck?` <span class="muted" title="проверка принадлежности объекта">⊕${esc(f.objectCheck)}</span>`:''}</td>`;
      ACTIONS_ALL.forEach(a=>{
        if (!f.actions.includes(a)){ tree += `<td><span class="pc-na">·</span></td>`; return; }
        const res = resolvePermission(acc, f, a, null, ctx);
        tree += `<td>${reasonBadge(res)}</td>`;
      });
      tree += `</tr>`;
    });
  });
  tree += `</tbody></table></div>`;

  // Строчный срез: реальные записи × доступ (демонстрирует scope, политику, сеть на записи).
  let recs = `<div class="grid-wrap"><table class="dtable"><thead><tr>
    <th>Запись</th><th>Подразд.</th><th>Владелец</th><th>Просмотр</th><th>Критичное действие</th><th>Почему</th></tr></thead><tbody>`;
  DB.RECORDS.forEach(r=>{
    const viewFn = r.type==='Кредит' ? fn('f-loan') : fn('f-app');
    const critFn = r.type==='Кредит' ? fn('f-loan-wo') : fn('f-app-send');
    const vRes = resolvePermission(acc, viewFn, 'view', r, ctx);
    const cRes = resolvePermission(acc, critFn, 'execute', r, ctx);
    recs += `<tr><td>${esc(r.name)}</td><td>${esc(dept(r.deptId).code)}</td><td>${esc(byId('ACCOUNTS',r.ownerId)?.login||'—')}</td>
      <td>${reasonBadge(vRes)}</td><td>${reasonBadge(cRes)} <span class="muted">${esc(critFn.name.split('·')[1]||'')}</span></td>
      <td class="muted">${esc(vRes.allowed?cRes.detail:vRes.detail)}</td></tr>`;
  });
  recs += `</tbody></table></div>`;

  host.innerHTML = demoPanel('check') + `
    <div class="banner info"><span class="ic">🔍</span><div>Этот экран — «рентген» модели: каждая ячейка ниже — результат <code>resolvePermission()</code>.
      Переключайте <b>пользователя</b> и <b>сеть</b> в шапке — роль, scope и сетевой контекст вычисляются из модели (§4.1).</div></div>

    <div class="header-card">
      <div class="avatar">${esc((fioOf(acc)[0]||'?'))}</div>
      <div class="header-mid">
        <div class="obj-name">${esc(fioOf(acc))} <span class="muted">· ${esc(acc.login)}</span></div>
        <div class="obj-sub">${esc(acc.type)} · ${esc(deptName(deptOfAccount(acc)))} · ${statusBadge(acc.status)} ${isSubstituting(acc)?'<span class="badge b-info">замещает</span>':''}</div>
        <div style="margin-bottom:6px">${rolesHtml}</div>
        <div class="kv2"><span class="k">Эффективный scope</span><span>${esc(effectiveScopeText(acc))}</span>
          <span class="k">Сетевой контекст</span><span>${esc(ctx.place)} · ip <code>${esc(ctx.ip)}</code></span></div>
      </div>
    </div>

    <div class="section-title">Функциональные права × действия</div>
    <div class="muted" style="margin-bottom:8px">Оценка функциональной доступности (без конкретной записи). Строчный scope проверяется на записях ниже.</div>
    ${tree}
    <div class="legend">
      <span><i class="pc-ok" style="background:var(--green-card-bg)"></i> доступно</span>
      <span><i style="background:var(--filter-bg)"></i> нет роли</span>
      <span><i style="background:#fdf3dd"></i> изъято политикой</span>
      <span><i style="background:#eaf0fb"></i> вне scope</span>
      <span><i style="background:#fdeaea"></i> блокировано сетью</span>
      <span>⊕ — проверка принадлежности объекта</span>
    </div>

    <div class="section-sub">Строчный доступ на реальных записях (scope · политика · сеть)</div>
    ${recs}`;
};

/* Гейт-кнопка: no-role → кнопка скрыта (нет права вовсе, §5.2); прочие reason → показана
   заблокированной с подсказкой (право есть, но место/политика/scope не те). */
function permBtn(func, action, record, o){
  const res = resolvePermission(currentAccount(), func, action, record || null);
  if (res.reason === 'no-role') return '';
  const cls = o.cls || 'btn-secondary';
  if (res.allowed) return `<button class="btn ${cls} ${o.sm?'btn-sm':''}" onclick="${o.onclick}">${esc(o.label)}</button>`;
  return `<button class="btn ${cls} ${o.sm?'btn-sm':''}" disabled title="${esc(res.detail)}">${esc(o.label)} 🔒</button>`;
}
function can(func, action, record){ return resolvePermission(currentAccount(), func, action, record||null).allowed; }

   RENDER — §4.1/4.2 ПОЛЬЗОВАТЕЛИ (список + карточка)

SCREENS.users = function(host){
  if (STATE.card.kind === 'user') return renderUserCard(host, STATE.card.id);
  const f = STATE.filt_users || (STATE.filt_users = {dept:'', status:'', role:'', type:'', q:''});
  let rows = DB.ACCOUNTS.filter(a=>{
    if (f.dept && deptOfAccount(a) !== f.dept) return false;
    if (f.status && a.status !== f.status) return false;
    if (f.type && a.type !== f.type) return false;
    if (f.role && !effectiveRoles(a).some(o=>o.role.id===f.role)) return false;
    if (f.q){ const s=(a.login+' '+fioOf(a)).toLowerCase(); if(!s.includes(f.q.toLowerCase())) return false; }

    permBtn(fn('f-users'),'execute',null,{label:'Разблокировать',onclick:"lifecycleSelected('unblock')"}) +
    permBtn(fn('f-users'),'execute',null,{label:'Отключить',cls:'btn-danger',onclick:"lifecycleSelected('disable')"}) +

  host.innerHTML = demoPanel('users') + `
    <div class="filter-card">
      <div class="fgrp"><label>Подразделение</label><select onchange="setUF('dept',this.value)"><option value="">все</option>${opt(DB.DEPARTMENTS,f.dept,d=>d.id,d=>d.name)}</select></div>
      <div class="fgrp"><label>Статус</label><select onchange="setUF('status',this.value)"><option value="">все</option>${['Создана','Активна','Заблокирована','Отключена'].map(s=>`<option ${s===f.status?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="fgrp"><label>Роль</label><select onchange="setUF('role',this.value)"><option value="">все</option>${opt(DB.ROLES,f.role,r=>r.id,r=>r.name)}</select></div>
      <div class="fgrp"><label>Тип</label><select onchange="setUF('type',this.value)"><option value="">все</option><option ${f.type==='Личная'?'selected':''}>Личная</option><option ${f.type==='Техническая'?'selected':''}>Техническая</option></select></div>
      <div class="fgrp"><input placeholder="поиск: логин / ФИО" value="${esc(f.q)}" oninput="setUF('q',this.value)"></div>
    </div>
    <div class="toolbar">${toolbar}<span class="rowcount">${rows.length} УЗ</span></div>
    <div class="grid"><table><thead><tr>
      <th>Логин</th><th>ФИО</th><th>Подразделение</th><th>Должность</th><th>Роли</th><th>Статус</th><th>Последний вход</th><th>Замещение</th>
    </tr></thead><tbody>${rows.length?rows.map(userRow).join(''):'<tr><td colspan="8" class="empty-row">Нет УЗ по фильтру</td></tr>'}</tbody></table></div>`;
};
function userRow(a){
  const e = employeeOf(a);
  const roles = effectiveRoles(a);
  const own = roles.filter(o=>o.origin==='own');
  const rolesCell = own.length
    ? `<span class="tab-cnt" title="${esc(own.map(o=>o.role.name).join(', '))}">${own.length}</span> ${esc(own[0].role.code)}${own.length>1?' +'+(own.length-1):''}`
    : '<span class="muted">—</span>';
  let sub = '';
  if (isSubstituting(a)) sub = '<span class="badge b-info">замещает</span>';
  else if (DB.SUBSTITUTIONS.some(s=>s.absentEmployeeId===a.employeeId && s.status==='Действует')) sub='<span class="badge b-warn">замещается</span>';
  const selCls = STATE.sel.users===a.id?'sel':'';
  return `<tr data-open class="${a.status==='Отключена'?'gone ':''}${selCls}" onclick="selUser('${a.id}')" ondblclick="openUserCard('${a.id}')" title="клик — выбрать, двойной клик — карточка">
    <td><b>${esc(a.login)}</b></td><td>${esc(fioOf(a))}</td><td>${esc(e?deptName(e.deptId):'—')}</td>
    <td>${esc(e?e.position:'—')}</td><td>${rolesCell}</td><td>${statusBadge(a.status)}</td>
    <td class="muted">${esc(a.lastLoginAt||'—')}</td><td>${sub||'<span class="muted">—</span>'}</td></tr>`;
}

      <div class="grid-wrap"><table class="dtable"><thead><tr><th>Сессия</th><th>IP</th><th>Устройство</th><th>Начало</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="empty-row">Активных сессий нет</td></tr>'}</tbody></table></div>`;
  }
  if (tab==='history'){
    const slice = DB.AUDIT.filter(x=>x.objectId===a.id || x.actorAccountId===a.id);
    return `<div class="banner info"><span class="ic">📓</span><div>Срез журнала аудита по этой УЗ — <b>только чтение</b>. Правка/удаление недоступны никому (§8.5).</div></div>
      ${auditTable(slice, false)}`;
  }
}

/* Эффективное дерево прав УЗ (свёрнутое, с отметками) */
function effPermTree(a){
  const denied = deniedSetFor(a);
  const groups=[...new Set(DB.FUNCTIONS.map(f=>f.group))];
  let out='<div class="ptree"><table><thead><tr><th class="fn">Функция</th>'+ACTIONS_ALL.map(x=>`<th>${x}</th>`).join('')+'</tr></thead><tbody>';
  groups.forEach(g=>{
    const fs=DB.FUNCTIONS.filter(f=>f.group===g);
    const anyGranted=fs.some(f=>f.actions.some(ac=>functionalCheck(a,f.id,ac)!=='no-role'));
    if(!anyGranted) return;
    out+=`<tr><td class="fn" colspan="6" style="background:var(--filter-bg);font-weight:700;font-size:12px">${esc(g)}</td></tr>`;
    fs.forEach(f=>{
      if(!f.actions.some(ac=>functionalCheck(a,f.id,ac)!=='no-role')) return;
      out+=`<tr><td class="fn">${esc(f.name)}</td>`;
      ACTIONS_ALL.forEach(ac=>{
        if(!f.actions.includes(ac)){out+='<td><span class="pc-na">·</span></td>';return;}
        const fc=functionalCheck(a,f.id,ac);
        if(fc==='no-role') out+='<td><span class="pc-na">·</span></td>';
        else if(fc==='denied-by-policy') out+='<td><span class="pc pc-deny" title="изъято политикой подразделения">изъято</span></td>';
        else out+='<td><span class="pc pc-ok">✓</span></td>';
      });
      out+='</tr>';
    });
  });
  out+='</tbody></table></div>';
  if([...denied].length) out+=`<div class="muted" style="margin-top:6px">⚠ Политикой подразделения изъято: ${[...denied].map(k=>{const [fid,ac]=k.split('|');return `${fn(fid).name} · ${ac}`;}).join('; ')}</div>`;
  return out;
}

function genPassword(){ const cs='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789#$%&'; let p=''; for(let i=0;i<10;i++) p+=cs[Math.floor(Math.random()*cs.length)]; return p; }
function interruptSubstOfAccount(accId, why){
  DB.SUBSTITUTIONS.filter(s=>s.substituteAccountId===accId && (s.status==='Действует'||s.status==='Запланировано'))
    .forEach(s=>{ const b=s.status; s.status='Прервано досрочно'; writeAudit({action:'Замещение прервано досрочно', objectType:'Замещение', objectId:s.id, before:b, after:'Прервано досрочно ('+why+')'}); });
}
function doLifecycle(id, op){
  const a = byId('ACCOUNTS', id); if(!a) return;
  if (op==='block'){
    if (a.status!=='Активна') return toast('Блокировка доступна только для «Активна»', 'err');
    const b=a.status; a.status='Заблокирована'; writeAudit({action:'Блокировка УЗ', objectType:'УЗ', objectId:id, before:b, after:'Заблокирована'});
    toast('УЗ '+a.login+' заблокирована'); render();
  } else if (op==='unblock'){
    if (a.status!=='Заблокирована') return toast('Разблокировать можно только «Заблокирована»', 'err');
    const b=a.status; a.status='Активна'; a.failedAttempts=0; writeAudit({action:'Разблокировка УЗ', objectType:'УЗ', objectId:id, before:b, after:'Активна'});
    toast('УЗ '+a.login+' разблокирована', 'ok'); render();
  } else if (op==='disable'){
    openModal({title:'Отключение УЗ — терминально', body:
      `<div class="banner err"><span class="ic">⛔</span><div>Отключение <b>необратимо</b>: переход «Отключена → Активна» невозможен (§2.2.1). При восстановлении сотрудника заводится новая УЗ с новым логином.</div></div>
       <div class="kv2"><span class="k">УЗ</span><span><b>${esc(a.login)}</b> · ${esc(fioOf(a))}</span></div>`,
      buttons:[{label:'Отмена', cls:'btn-cancel'}, {label:'Отключить', cls:'btn-danger', onClick:()=>{
        const b=a.status; a.status='Отключена';
        const ss=DB.SESSIONS.filter(s=>s.accountId===id).length; DB.SESSIONS=DB.SESSIONS.filter(s=>s.accountId!==id);
        interruptSubstOfAccount(id,'отключение УЗ');
        writeAudit({action:'Отключение УЗ', objectType:'УЗ', objectId:id, before:b, after:'Отключена'+(ss?` (+завершено сессий: ${ss})`:'')});
        toast('УЗ '+a.login+' отключена', 'ok'); render();
      }}]});
  } else if (op==='reset'){
    if (a.status==='Отключена') return toast('УЗ отключена — сброс невозможен', 'err');
    const pw = genPassword(); a.mustChangePassword=true; a.passwordChangedAt=nowTs().slice(0,10);
    writeAudit({action:'Сброс пароля', objectType:'УЗ', objectId:id, before:null, after:'mustChangePassword=true'});
    openModal({title:'Временный пароль выдан', body:
      `<div class="banner warn"><span class="ic">🔑</span><div>Показывается <b>один раз</b>. Администратор не знает пароль пользователя — только сбрасывает его (§8.2). Значение нигде более не отображается.</div></div>
       <div class="muted" style="margin-bottom:6px">Временный пароль для <b>${esc(a.login)}</b> (потребуется смена при входе):</div>
       <div class="pw-show">${esc(pw)}</div>`,
      buttons:[{label:'Готово', cls:'btn-primary'}]});
    render();
  }
}

function toggleRolePerm(roleId, funcId, action){
  const r=role(roleId); let perm=r.permissions.find(p=>p.funcId===funcId);
  if(!perm){ perm={funcId, actions:[]}; r.permissions.push(perm); }
  const i=perm.actions.indexOf(action);
  if(i>=0){ perm.actions.splice(i,1); if(!perm.actions.length) r.permissions=r.permissions.filter(p=>p.funcId!==funcId); }
  else perm.actions.push(action);
  writeAudit({action:'Правка матрицы роли', objectType:'Роль', objectId:roleId, before:null, after:`${fn(funcId).name} · ${action} → ${i>=0?'снято':'добавлено'}`});
  render();
}

function absentRolesOf(empId){ const a=accountByEmployee(empId); return a?DB.ROLE_ASSIGNMENTS.filter(x=>x.accountId===a.id&&!x.revokedAt).map(x=>role(x.roleId)):[]; }
function validateSubst(){
  const f=SUBFORM, errs=[]; let warn=null;
  const absEmp=byId('EMPLOYEES',f.absentEmployeeId);
  const subAcc=f.substituteAccountId?byId('ACCOUNTS',f.substituteAccountId):null;
  if(!absEmp) errs.push('Выберите замещаемого');
  if(!subAcc) errs.push('Выберите замещающего');
  if(!f.dateFrom||!f.dateTo) errs.push('Укажите период (с/по)');
  if(f.dateFrom&&f.dateTo&&f.dateFrom>f.dateTo) errs.push('Дата «с» позже даты «по»');
  if(absEmp&&subAcc){
    if(subAcc.employeeId===absEmp.id) errs.push('V6: замещающий не может совпадать с замещаемым');
    if(deptOfAccount(subAcc)!==absEmp.deptId) errs.push('V1: замещающий и замещаемый должны быть из одного подразделения ('+deptName(absEmp.deptId)+')');
    if(subAcc.status!=='Активна') errs.push('V5: УЗ замещающего должна быть в статусе «Активна» (сейчас «'+subAcc.status+'»)');
    const abRoles=absentRolesOf(absEmp.id).map(r=>r.id);
    if(f.roleIds.length&&!f.roleIds.every(r=>abRoles.includes(r))) errs.push('V4: роли замещения должны быть подмножеством ролей замещаемого');
    if(!f.roleIds.length) errs.push('Выберите хотя бы одну роль');
    if(f.dateFrom&&f.dateTo){
      const clashAbs=DB.SUBSTITUTIONS.some(s=>s.absentEmployeeId===absEmp.id&&(s.status==='Действует'||s.status==='Запланировано')&&periodsOverlap(f.dateFrom,f.dateTo,s.dateFrom,s.dateTo));
      if(clashAbs) errs.push('V2: у замещаемого уже есть замещение с пересекающимся периодом');
      const clashSub=DB.SUBSTITUTIONS.some(s=>s.substituteAccountId===subAcc.id&&(s.status==='Действует'||s.status==='Запланировано')&&periodsOverlap(f.dateFrom,f.dateTo,s.dateFrom,s.dateTo));
      if(clashSub) errs.push('V3: у замещающего уже есть замещение с пересекающимся периодом');
    }
    // V7 — предупреждение (продавливаемое)
    const subConfirming=effectiveRoles(subAcc).some(o=>roleIsConfirming(o.role));
    const delegExecuting=f.roleIds.some(rid=>roleIsExecuting(role(rid)));
    if(!errs.length&&subConfirming&&delegExecuting)
      warn='V7: замещающий уже имеет подтверждающую роль, а по замещению получает исполняющую — «четыре глаза» схлопываются в одни (§6.2).';
  }
  return {errs, warn, ok:errs.length===0};
}

  const v=validateSubst();
  box.innerHTML=`
    <div class="cols2"><div>

        <select onchange="sfSet('absentEmployeeId',this.value)">${candAbsent.map(e=>`<option value="${e.id}" ${e.id===f.absentEmployeeId?'selected':''}>${esc(e.fio)} · ${esc(deptName(e.deptId))} · ${esc(e.hrStatus)}</option>`).join('')}</select></div>
      <div class="fld"><label>Замещающий (УЗ) <span class="muted">${f.showAll?'— все подразделения':'— фильтр: то же подразделение (V1)'}</span></label>
        <select onchange="sfSet('substituteAccountId',this.value)"><option value="">— выберите —</option>${subCandidates.map(a=>`<option value="${a.id}" ${a.id===f.substituteAccountId?'selected':''}>${esc(fioOf(a))} · ${esc(deptName(deptOfAccount(a)))} · ${esc(a.status)}</option>`).join('')}</select></div>
      <div class="chk-row"><input type="checkbox" id="sfAll" ${f.showAll?'checked':''} onchange="sfSet('showAll',this.checked)"><label for="sfAll">показать УЗ всех подразделений (для демонстрации V1-блокировки)</label></div>
    </div><div>
      <div class="fld"><label>Период с</label><input type="date" value="${esc(f.dateFrom)}" onchange="sfSet('dateFrom',this.value)"></div>

      <div class="fld"><label>Основание (приказ)</label><input value="${esc(f.orderRef)}" placeholder="Приказ №… (отпуск/командировка)" onchange="sfSet('orderRef',this.value)"></div>
    </div></div>
    <div class="section-sub">Роли замещения <span class="muted">— только из ролей замещаемого (V4)</span></div>
    ${abRoles.length?abRoles.map(r=>`<div class="chk-row"><input type="checkbox" id="sfr_${r.id}" ${f.roleIds.includes(r.id)?'checked':''} onchange="sfToggleRole('${r.id}')"><label for="sfr_${r.id}">${esc(r.name)} (${esc(r.code)})${roleIsConfirming(r)?' <span class="badge b-info">подтверждающая</span>':''}${roleIsExecuting(r)?' <span class="badge b-warn">исполняющая</span>':''}</label></div>`).join(''):'<div class="muted">У замещаемого нет активных ролей</div>'}
    <div style="margin-top:14px">
      ${v.errs.length?`<div class="banner err"><span class="ic">⛔</span><div><b>Блокирующие проверки:</b><ul style="margin:6px 0 0;padding-left:18px">${v.errs.map(e=>`<li>${esc(e)}</li>`).join('')}</ul></div></div>`:''}
      ${(!v.errs.length&&v.warn)?`<div class="banner warn"><span class="ic">⚠️</span><div><b>Предупреждение (продавливаемое):</b> ${esc(v.warn)}<br>Кнопка стала «Всё равно создать» — факт продавливания попадёт в аудит.</div></div>`:''}
      ${(v.ok&&!v.warn)?`<div class="banner ok"><span class="ic">✓</span><div>Все проверки пройдены — можно создавать.</div></div>`:''}
    </div>`;
  // синхронизируем подпись кнопки создания
  const btn=document.querySelector('#modalBox [data-mbtn="1"]');
  if(btn){ btn.disabled=!v.ok; btn.textContent=(v.ok&&v.warn)?'Всё равно создать (продавить V7)':'Создать'; btn.className='btn '+((v.ok&&v.warn)?'btn-danger':'btn-primary'); }
}
function submitSubst(){
  const v=validateSubst(); if(!v.ok){ toast('Есть блокирующие проверки', 'err'); return false; }
  const f=SUBFORM, absEmp=byId('EMPLOYEES',f.absentEmployeeId);

  const status=f.dateFrom>today?'Запланировано':'Действует';

  DB.SUBSTITUTIONS.push({id, absentEmployeeId:f.absentEmployeeId, substituteAccountId:f.substituteAccountId, dateFrom:f.dateFrom, dateTo:f.dateTo, orderRef:f.orderRef||'—', roleIds:[...f.roleIds], status, createdBy:STATE.currentAccountId, createdAt:today, overrideWarning:v.warn||null});
  writeAudit({action:'Создание замещения', objectType:'Замещение', objectId:id, before:null, after:status});

  closeModal(); toast('Замещение создано ('+status+')'+(v.warn?' — V7 продавлено':''), 'ok'); render();
  return true;
}

    ${cards}
    <div class="section-head"><div class="section-title">Привязка политик к функциям (функция × действие → политика)</div>${permBtn(fn('f-netpol'),'edit',null,{label:'Добавить привязку',cls:'btn-primary',sm:true,onclick:'openAddBinding()'})}</div>
    <div class="grid-wrap"><table class="dtable"><thead><tr><th>Функция</th><th>Действие</th><th>Политика</th><th></th></tr></thead><tbody>${bind||'<tr><td colspan="4" class="empty-row">Привязок нет</td></tr>'}</tbody></table></div>
    <div class="muted" style="margin-top:8px">Проверить эффект: переключите тумблер «в офисе / вне офиса» в шапке и откройте «Проверка прав» — критичные execute сменят состояние.</div>`;
};
function openAddBinding(){
  const crit=DB.FUNCTIONS.filter(f=>f.actions.includes('execute'));
  openModal({title:'Привязать функцию к сетевой политике', body:
    `<div class="fld"><label>Функция</label><select id="abFunc" onchange="abFuncChange()">${crit.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('')}</select></div>
     <div class="fld"><label>Действие</label><select id="abAction"></select></div>
     <div class="fld"><label>Политика</label><select id="abPol">${DB.NETWORK_POLICIES.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>`,
    buttons:[{label:'Отмена',cls:'btn-cancel'},{label:'Привязать',cls:'btn-primary',onClick:()=>{
      const funcId=document.getElementById('abFunc').value, action=document.getElementById('abAction').value, policyId=document.getElementById('abPol').value;
      if(DB.FUNCTION_NET_RESTRICTIONS.some(r=>r.funcId===funcId&&r.action===action)){ toast('Такая привязка уже есть','err'); return; }
      DB.FUNCTION_NET_RESTRICTIONS.push({funcId, action, policyId});
      writeAudit({action:'Изменение сетевой политики', objectType:'Функция', objectId:funcId, before:null, after:`${action} → политика «${byId('NETWORK_POLICIES',policyId).name}»`});
      toast('Привязка добавлена — гейтинг изменён', 'ok'); render();
    }}], onOpen:abFuncChange});
}
function abFuncChange(){ const f=fn(document.getElementById('abFunc').value); document.getElementById('abAction').innerHTML=f.actions.map(a=>`<option value="${a}">${a}</option>`).join(''); }
function removeBinding(i){
  const r=DB.FUNCTION_NET_RESTRICTIONS[i]; if(!r) return;
  DB.FUNCTION_NET_RESTRICTIONS.splice(i,1);
  writeAudit({action:'Изменение сетевой политики', objectType:'Функция', objectId:r.funcId, before:`${r.action} → «${byId('NETWORK_POLICIES',r.policyId)?.name}»`, after:'ограничение снято'});
  toast('Привязка снята — функция доступна отовсюду'); render();
}

/* ============================================================================
   RENDER — §4.7 ЖУРНАЛ АУДИТА (только чтение; без кнопок правки/удаления)
   ============================================================================ */
SCREENS.audit = function(host){
  const f=STATE.filt_audit||(STATE.filt_audit={from:'',to:'',actor:'',dept:'',action:''});
  const actions=[...new Set(DB.AUDIT.map(x=>x.action))];
  let rows=DB.AUDIT.filter(x=>{
    if(f.from&&x.ts.slice(0,10)<f.from) return false;
    if(f.to&&x.ts.slice(0,10)>f.to) return false;
    if(f.action&&x.action!==f.action) return false;
    if(f.actor){ const a=x.actorAccountId?byId('ACCOUNTS',x.actorAccountId):null; const s=((a?fioOf(a)+' '+a.login:'система')).toLowerCase(); if(!s.includes(f.actor.toLowerCase())) return false; }
    if(f.dept){ const a=x.actorAccountId?byId('ACCOUNTS',x.actorAccountId):null; if(!a||deptOfAccount(a)!==f.dept) return false; }
    return true;
  });
  host.innerHTML=`
    <div class="banner ok"><span class="ic">🔒</span><div>Журнал <b>append-only</b>: не редактируется и не удаляется <b>никем, включая администратора</b> (§8.5). Действия администратора аудируются наравне со всеми. Ни одной кнопки правки/удаления ниже нет.</div></div>
    <div class="filter-card">
      <div class="fgrp"><label>С</label><input type="date" value="${esc(f.from)}" onchange="setAF('from',this.value)"></div>
      <div class="fgrp"><label>По</label><input type="date" value="${esc(f.to)}" onchange="setAF('to',this.value)"></div>
      <div class="fgrp"><label>ФИО/логин</label><input value="${esc(f.actor)}" oninput="setAF('actor',this.value)"></div>
      <div class="fgrp"><label>Отдел</label><select onchange="setAF('dept',this.value)"><option value="">все</option>${DB.DEPARTMENTS.map(d=>`<option value="${d.id}" ${d.id===f.dept?'selected':''}>${esc(d.name)}</option>`).join('')}</select></div>
      <div class="fgrp"><label>Действие</label><select onchange="setAF('action',this.value)"><option value="">все</option>${actions.map(a=>`<option ${a===f.action?'selected':''}>${esc(a)}</option>`).join('')}</select></div>
    </div>
    <div class="toolbar"><span class="rowcount">${rows.length} записей</span></div>
    ${auditTable(rows, true)}`;
};
function setAF(k,v){ STATE.filt_audit[k]=v; render(); }

//__SCREENS__

/* Тест-хук: даёт headless smoke-тесту доступ к DB/STATE (let-биндинги не попадают на window). */
if (typeof window !== 'undefined'){ window.__db = () => DB; window.__state = STATE; }

/* BOOT */
render();
</script>
