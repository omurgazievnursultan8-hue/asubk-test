  MOCKUP (single-file, interactive) — TO-BE модуля «Реструктуризация (урегулирование)
  задолженности» (реестр заявок → карточка заявки → справочник видов). Образец для
  команды разработки, не прод-код. Экрана реструктуризации в живой системе нет — модуль
  проектируется с нуля.

  Канон логики: mockups/restructuring/ASUBK-restrukturizatsiya-logika.md (решения Р-1…Р-19).
  Регуляторная база: п.18–19 «Порядка мониторинга, взыскания и урегулирования
  задолженности ОАО "Госфинхолдинг"». Стиль сверен с mockups/collateral/zalog.html.
  Проверка: node scripts/inspect/restructuring-check.mjs

  РЕАЛИЗОВАННЫЕ РЕШЕНИЯ
   Р-1  Единица работы — ЗАЯВКА; якорь = ИНН; один ИНН на заявку.
   Р-2  Охват: только один ИНН; запрет кредита с другой активной заявкой (тост).
   Р-3  Справочник видов: разрешённые параметры + документы + режим просрочки;
        на заявке — объединение параметров/документов выбранных видов.
   Р-4  Конвейер 6 стадий; стадия ПРОИЗВОДНА от owned-фактов (stageOf).
   Р-5  Заключения (СРМиК/ДПО); куратор добавляет заключанта → новое требование гейта.
   Р-6  Комитет→Минфин: позиция необязывающая; письмо всегда (5 р.д.); решение Минфина
        канон, обязателен реквизит письма.
   Р-7  Дедлайны — производные от якоря стадии; просрочка = флаг+история, НЕ блокировка.
   Р-8  Оформление: доп. соглашение (номер+дата обязательны) активирует версию.
   Р-9  Капитализация / прощение — документированные операции на дату вступления
        (компенсирующие, не удаление).
   Р-10 Режим просрочки из вида: (1) в новый график + обнуление счётчика · (2) сохраняется.
   Р-11 Новые условия версии, поля ограничены объединением видов; diff-таблица.
   Р-12 Автоматика швов: пауза (весь процесс, 70 к.д.) + оверлей 181-го дня.
   Р-13 Пеня во время паузы продолжает начисляться (info-plate).
   Р-14 Оси заёмщика не трогаем; счётчик реструктуризаций на кредите +1.
   Р-15 Гейт обеспечения (coverGate) + waiver комиссии по залогу с обязательным основанием.
   Р-16 История append-only; ничего не удаляется/не переписывается.
   Р-17 6 ролей; права через canX(); чужое действие → тост.
   Р-18 5 демо-цепочек.
   Р-19 Зеркальная дисциплина: производное (дедлайны, гейты, покрытие, стадия) не хранится.

  ДЕМО-ОГРАНИЧЕНИЯ
   • «Сегодня» демо зафиксировано (TODAY) — счётчики дедлайнов считаются от него.
   • Рабочие дни для дедлайна письма — простой календарь (сб/вс), без праздников.
   • Расчёт графика — детерминированный аннуитет-упрощение (демонстрация «версия вперёд»),
     не банковский расчётный движок.
   • Мини-зеркало взыскания — read-only панель на демо-данных, навигация внутристраничная.

  ОТКРЫТЫЕ ВОПРОСЫ (спека §17)
   1. Приоритет при разных режимах просрочки у нескольких видов одной заявки.
   2. Источник производственного календаря праздников для дедлайна письма.
   3. Лимит повторов реструктуризации (счётчик растёт неограниченно).

/* ---- утилиты дат (Р-7): производные счётчики, ничего не хранится ---- */
const D = s => new Date(s+'T00:00:00Z');
const daysBetween = (a,b) => Math.round((D(b)-D(a))/86400000);
function addCalDays(s,n){ const d=D(s); d.setUTCDate(d.getUTCDate()+n); return d.toISOString().slice(0,10); }
function addWorkDays(s,n){ let d=D(s),added=0; while(added<n){ d.setUTCDate(d.getUTCDate()+1); const wd=d.getUTCDay(); if(wd!==0&&wd!==6) added++; } return d.toISOString().slice(0,10); }
const fmt = n => Number(n||0).toLocaleString('ru-RU',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmt2= n => Number(n||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ================= РАСЧЁТНЫЙ ДВИЖОК (§4 промпта) ================= */
const round2 = x => Math.round((Number(x)||0)*100)/100;
function periodMonths(schedule){
  return schedule==='ежеквартально' ? 3
       : schedule==='раз в полугодие' ? 6
       : schedule==='ежегодно' ? 12 : 1;                // дефолт «ежемесячно»
}
/* Амортизация: тело `base`, годовая ставка `rate`, срок `termMonths`, метод, блоки льгот, дата среза, периодность.
   graceBlocks = [{months:Int, type:'interest-only'|'moratorium'}]. Демо: месяц = 30 дней. */
function amortize(base, rate, termMonths, method, graceBlocks, cutoffDate, schedule){
  const p = periodMonths(schedule||'ежемесячно');
  const i = (Number(rate)||0)/100 * p/12;
  const nTotal = Math.max(1, Math.round((Number(termMonths)||0)/p));
  let gMor=0, gIo=0;
  (graceBlocks||[]).forEach(b=>{ const per=Math.round((b.months||0)/p);
    if(b.type==='moratorium') gMor+=per; else gIo+=per; });
  const m = Math.max(1, nTotal - gMor - gIo);
  const dateAt = idx => addCalDays(cutoffDate, idx * 30 * p);
  const rows=[]; let k=0;
  /* фаза моратория: проценты капитализируются в конце льготы (Task 3 добавит строки) */
  let baseAmort = base, morCap = 0;
  if(gMor>0){ baseAmort = base*Math.pow(1+i,gMor); morCap = round2(baseAmort - base); }
  /* амортизирующая фаза на baseAmort за m периодов */
  let bal = round2(baseAmort);
  if(method==='дифференцированный'){
    const prConst = round2(baseAmort/m);
    for(let j=0;j<m;j++){ k++;
      const interest = round2(bal*i);
      const principal = (j===m-1) ? bal : prConst;
      const pay = round2(principal + interest);
      bal = round2(bal - principal);
      rows.push({n:k,date:dateAt(k),pay,principal,interest,balance:round2(Math.max(bal,0))});
    }
  } else {                                              // аннуитет (дефолт)
    const A = i>0 ? baseAmort*i/(1-Math.pow(1+i,-m)) : baseAmort/m;
    const Ar = round2(A);
    for(let j=0;j<m;j++){ k++;
      const interest = round2(bal*i);
      const principal = (j===m-1) ? bal : round2(Ar - interest);
      const pay = (j===m-1) ? round2(principal + interest) : Ar;
      bal = round2(bal - principal);
      rows.push({n:k,date:dateAt(k),pay,principal,interest,balance:round2(Math.max(bal,0))});
    }
  }
  return { rows, morCap, meta:{p,i,nTotal,gMor,gIo,m,baseAmort} };
}

/* ================= ПРОИЗВОДНЫЕ (Р-19: считаем, не храним) ================= */
const creditById = id => state.credits.find(c=>c.id===id);
const kindById   = id => state.kinds.find(k=>k.id===id);
const appById    = id => state.apps.find(a=>a.id===id);

/* объединение разрешённых параметров выбранных видов (Р-3 ↔ Р-11) */
function allowedParams(app){ const s=new Set(); app.kindIds.forEach(id=>{ const k=kindById(id); if(k) k.params.forEach(p=>s.add(p)); }); return s; }
/* объединение требуемых документов (Р-3, гейт стадии 1) */
function requiredDocs(app){ const s=new Set(); app.kindIds.forEach(id=>{ const k=kindById(id); if(k) k.docs.forEach(d=>s.add(d)); }); return [...s]; }

/* стадия — производная от owned-фактов (Р-4) */
function stageOf(app){
  if(app.outcome==='возврат') return {idx:0, closed:true, label:'Возвращена без рассмотрения'};
  if(app.ds && app.ds.no)     return {idx:5, closed:true, label:'Закрыта (оформлена)'};
  if(app.outcome==='отказ')   return {idx:4, closed:true, label:'Отказ Минфина'};
  if(app.minfin && app.minfin.fixed) return {idx:5, closed:false, label:'Оформление'};
  if(app.letterSent && app.letterSent.fixed) return {idx:3, closed:false, label:'Направлено в Минфин'};
  if(app.committee && app.committee.fixed)   return {idx:2, closed:false, label:'Комитет'};
  if(app.analysisStarted)     return {idx:1, closed:false, label:'Анализ'};
  return {idx:0, closed:false, label:'Регистрация обращения'};
}

/* дедлайн активной стадии (Р-7) */
function deadline(app){
  const st = stageOf(app); if(st.closed) return null;
  if(st.idx===1) { const due=addCalDays(app.regDate,30); return mkDl('Анализ',30,'к.д.',app.regDate,due); }
  if(st.idx===2) { if(app.committee&&app.committee.date){ const due=addWorkDays(app.committee.date,5); return mkDl('Письмо в Минфин',5,'р.д.',app.committee.date,due);} return null; }
  if(st.idx===3) { if(app.letterSent&&app.letterSent.date){ const due=addCalDays(app.letterSent.date,70); return mkDl('Решение Минфина',70,'к.д.',app.letterSent.date,due);} return null; }
  return null;
}
function mkDl(name,limit,unit,anchor,due){ const rem=daysBetween(TODAY,due); return {name,limit,unit,anchor,due,remaining:rem,overdue:rem<0}; }

/* гейты (Р-19: производные предикаты) */
function packetGate(app){ const req=requiredDocs(app); const missing=req.filter(d=>!app.packetDocs[d]); return {ok:missing.length===0 && req.length>0, missing, req}; }
function conclGate(app){ const pending=app.conclusions.filter(c=>!c.visa).map(c=>c.dept); return {ok:pending.length===0 && app.conclusions.length>0, pending}; }
function minfinGate(app){ const m=app.minfin||{}; return {ok:!!m.decision && !!(m.letterRef&&m.letterRef.trim())}; }
function dsGate(app){ const d=app.ds||{}; return {ok:!!(d.no&&d.no.trim()) && !!(d.date&&d.date.trim())}; }

/* остаток на новых условиях (демо-упрощение): тело то же, влияет срок/ставка на maturity */
function newMaturity(app,cr){ const term=(app.version&&app.version.params.term)||cr.terms.term; return addCalDays(app.regDate, term*30); }
function coverGate(app,cr){
  const required = cr.requiredCoverPct;
  const cover = Math.round(cr.collateralValue / cr.balance * 100);
  const coverOk = cover >= required;
  const mat = newMaturity(app,cr);
  const ageOk = !cr.tech || (cr.techAgeYears + Math.ceil(((app.version&&app.version.params.term)||cr.terms.term)/12) <= cr.techMaxAge);
  const insured = daysBetween(mat, cr.insuredUntil) >= 0;
  const waived = !!(app.waiver && app.waiver.granted);
  const ok = (coverOk && ageOk && insured) || waived;
  return {required,cover,coverOk,ageOk,insured,waived,ok,maturity:mat};
}
/* агрегат гейта обеспечения по всем кредитам заявки */
function coverGateApp(app){ const rows=app.creditIds.map(id=>({cr:creditById(id),g:coverGate(app,creditById(id))})); const ok=rows.every(r=>r.g.ok); return {rows,ok}; }

/* активная заявка на кредите (Р-2): любая незакрытая заявка, кроме текущей */
function activeAppOnCredit(creditId, exceptAppId){
  return state.apps.find(a=>a.id!==exceptAppId && !stageOf(a).closed && a.creditIds.includes(creditId));
}
function canAdvance(app){
  const st=stageOf(app);
  if(st.idx===0) return {to:'Анализ', ok:packetGate(app).ok, why:'Пакет документов неполон'};
  if(st.idx===1) return {to:'Комитет', ok:conclGate(app).ok && app.creditIds.length>0, why:'Не все заключения завизированы / пустой охват'};
  return null;
}

/* права (Р-17) */
function canX(action){ return (RIGHTS[state.role]||[]).includes(action); }
function guard(action){ if(!canX(action)){ toast('Роль «'+state.role+'» не может выполнить это действие','err'); return false; } return true; }

/* ================= ДЕМО-ЦЕПОЧКИ (Р-18) ================= */
function baseApp(id,inn,borrower,kindIds,creditIds,regDate){
  return { id,inn,borrower,kindIds:[...kindIds],creditIds:[...creditIds],regDate,
    packetDocs:{}, analysisStarted:false, conclusions:[], committee:null, letterSent:null, minfin:null,

}
function H(app,what,who,cls){ app.history.push({when:app._t||app.regDate, what, who:who||'', cls:cls||''}); }
function defaultConclusions(){ return [ {dept:'СРМиК',text:'',visa:false,visaDate:null}, {dept:'ДПО',text:'',visa:false,visaDate:null} ]; }
function fillDocs(app){ requiredDocs(app).forEach(d=>app.packetDocs[d]=true); }
function versionFrom(cr){
  return {
    params:{...cr.terms},                 // 11 ключей, редактируемое подмножество по видам (Р-3)
    cutoffDate:TODAY,                      // Р-20: дата расчёта, замораживается в версию
    snapshot:{...cr.snapshot},             // копия снимка на момент фиксации среза
    inputs:{ forgivePenalty:0, capInterest:0, capPenalty:0, graceBlocks:[] }, // управляющие суммы
    overdueMode:1,                         // Р-10/Р-28: наследуется из первого вида заявки (Task 5)
    plan:null,                             // РЕЗУЛЬТАТ расчёта; null = не рассчитано
    graph:[], state:'проект', source:'заёмщик'
  };
}

function buildDemoApps(){
  const A=[];

function stageLabel(app){ return stageOf(app).label; }
function outcomeChip(app){
  const o=app.outcome;
  if(o==='возврат') return '<span class="pill neutral">возврат без рассмотрения</span>';
  if(o==='отказ')   return '<span class="pill high">отказ Минфина</span>';
  if(app.ds&&app.ds.no){ return o==='изм'?'<span class="pill low">одобрена (изм. условия)</span>':'<span class="pill low">одобрена</span>'; }
  if(app.minfin&&app.minfin.fixed) return app.minfin.decision==='отказ'?'<span class="pill high">отказ</span>':'<span class="pill info">на оформлении</span>';
  return '<span class="pill neutral">в работе</span>';
}

/* ================= РЕНДЕР: КАРТОЧКА ЗАЯВКИ ================= */
const TABS=[['req','Обращение'],['scope','Охват'],['concl','Заключения'],['terms','Новые условия'],['minfin','Комитет / Минфин'],['formal','Оформление'],['hist','История']];
function openApp(id){ state.curApp=id; state.view='card'; state.curTab='req'; render(); }
function setTab(t){ state.curTab=t; render(); }

function renderCard(){
  const v=document.getElementById('view-card'); const app=appById(state.curApp); if(!app){ state.view='list'; return render(); }
  const st=stageOf(app);
  const tabbar = TABS.map(([k,l])=>`<button class="dtab ${state.curTab===k?'active':''}" onclick="RS.setTab('${k}')">${l}</button>`).join('');
  v.innerHTML = phead(app,st) + `<div class="detail-tabbar">${tabbar}</div>` +
    `<div class="panel-wrap">${panel(app)}</div>` + footer(app);
}
function phead(app,st){
  const kinds=app.kindIds.map(id=>kindById(id)?.name).filter(Boolean).join(', ');
  const steps = STAGES.map((s,i)=>{
    let cls = i<st.idx?'done': i===st.idx&&!st.closed?'cur':'todo';
    if(st.closed && i<=st.idx) cls='done';
    const dl = (i===st.idx && !st.closed) ? deadline(app) : null;
    let sub='';
    if(dl){ sub = dl.overdue?`<span class="dl-red">просрочен ${-dl.remaining} дн.</span>`:`осталось ${dl.remaining} дн.`; }
    return `<div class="tl-step"><span class="tl-dot ${cls}">${cls==='done'?'✓':i+1}</span>
      <span class="tl-lbl ${cls==='todo'?'todo':''}">${s}${sub?`<small>${sub}</small>`:''}</span></div>` +
      (i<STAGES.length-1?`<span class="tl-arrow">→</span>`:'');
  }).join('');
  return `<div class="panel-wrap"><div class="phead">
    <div class="phead-top">
      <div class="phead-name"><span class="nm">${app.id}</span>
        <div class="phead-sub"><b>${esc(app.borrower)}</b> · ИНН ${app.inn} · виды: ${esc(kinds)||'—'} · кредиты: ${app.creditIds.map(id=>creditById(id)?.no).join(', ')||'—'}</div>
      </div>
      <div>${outcomeChip(app)}</div>
    </div>
    <div class="timeline">${steps}</div>
  </div></div>`;
}
function footer(app){
  return `<div class="footer">
    <button class="btn btn-secondary" onclick="RS.go('list')">← К реестру</button>
    <div class="spacer"></div>${advanceBtn(app)}</div>`;
}
function advanceBtn(app){
  const adv=canAdvance(app); if(!adv) return '';
  return `<button class="btn btn-primary" ${adv.ok?'':'disabled title="'+esc(adv.why)+'"'} onclick="RS.advance('${app.id}')">Перевести в «${adv.to}»</button>`;
}

/* --- панели вкладок --- */
function panel(app){
  switch(state.curTab){
    case 'req': return pReq(app);
    case 'scope': return pScope(app);
    case 'concl': return pConcl(app);
    case 'terms': return pTerms(app);
    case 'minfin': return pMinfin(app);
    case 'formal': return pFormal(app);
    case 'hist': return pHist(app);
  }
  return '';
}

/* 1. Обращение — чек-лист пакета = объединение документов видов; гейт стадии 1 */
function pReq(app){
  const st=stageOf(app); const g=packetGate(app);
  const docs = g.req.map(d=>`<label class="chk"><input type="checkbox" ${app.packetDocs[d]?'checked':''}
     ${st.idx>0||st.closed?'disabled':''} onchange="RS.toggleDoc('${app.id}','${esc(d)}',this.checked)"> ${esc(d)}</label>`).join('') ||
     '<div class="op-empty">Виды не выбраны — требований к пакету нет.</div>';
  let gate='';
  if(st.idx===0 && !st.closed){
    gate = g.ok
      ? `<div class="okline">Пакет полон. Переход в «Анализ» доступен (кнопка внизу).</div>`
      : `<div class="flagline">Пакет неполон (нет: ${g.missing.map(esc).join(', ')||'—'}). Гейт стадии 1: доступен только исход «возвращена без рассмотрения» либо докомплект. Переход в «Анализ» заблокирован.</div>`;
  }
  const retBtn = (st.idx===0 && !st.closed)
    ? `<button class="btn btn-secondary btn-sm" onclick="RS.returnApp('${app.id}')">Вернуть без рассмотрения</button>` : '';
  return `<div class="detail-panel active">
    <div class="section-h">Обращение</div>
    <div class="section-note">Дата регистрации: <b>${app.regDate}</b>. Требования к пакету — объединение документов выбранных видов (Р-3).</div>
    ${gate}
    <div class="f2" style="max-width:520px">${docs}</div>
    <div style="margin-top:14px">${retBtn}</div>
  </div>`;
}

function pScope(app){

    return `<tr>
      <td>${c.no}</td><td class="numcell">${fmt(c.balance)}</td>
      <td>${c.odDays} дн. / ${fmt(c.odSum)}</td>
      <td>${c.collProc?`<span class="rowlink" onclick="RS.showMirror('${c.collProc}','${app.id}')">${c.collProc}</span>`:'—'}</td>
      <td>${other?`<span class="pill high">${other.id}</span>`:'<span class="pill low">нет</span>'}</td>
      <td>реструкт.: ${c.restructCount}</td>
    </tr>`; }).join('') || `<tr><td colspan="6" class="op-empty">Охват пуст</td></tr>`;
  const st=stageOf(app);
  const addBtn = (!st.closed) ? `<button class="btn btn-primary btn-sm" onclick="RS.openAddCredit('${app.id}')">+ Добавить кредит</button>`:'';
  return `<div class="detail-panel active">
    <div class="section-h">Охват заявки</div>
    <div class="section-note">Только кредиты ИНН <b>${app.inn}</b>. Кредит с другой активной заявкой добавить нельзя (Р-2). Остаток/просрочка — read-only снимки.</div>
    <div class="gtoolbar">${addBtn}</div>
    <div class="cgrid-wrap"><table class="cgrid"><thead><tr>
      <th>Кредит</th><th class="numcell">Остаток</th><th>Просрочка</th><th>Взыскание</th><th>Другая активная заявка</th><th>Счётчик</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

/* 3. Заключения (Р-5) */
function pConcl(app){
  const g=conclGate(app);
  const cards=app.conclusions.map((c,i)=>{
    const mine = canX('editConcl:'+c.dept);
    return `<div class="concl-card">
      <div class="ch"><span class="cn">Заключение: ${esc(c.dept)}</span>
        ${c.visa?`<span class="gatechip ok">✓ виза ${c.visaDate}</span>`:`<span class="gatechip no">без визы</span>`}</div>
      <div class="field col-span"><textarea ${mine&&!c.visa?'':'disabled'} placeholder="${mine?'Текст заключения…':'Правит только заключант '+esc(c.dept)}"
        onchange="RS.setConclText('${app.id}',${i},this.value)">${esc(c.text)}</textarea></div>
      <div style="margin-top:8px">
        ${!c.visa?`<button class="btn btn-success btn-sm" ${mine?'':'disabled'} onclick="RS.visaConcl('${app.id}',${i})">Завизировать</button>`
          :`<span class="mode-tag">Завизировано ${c.visaDate}</span>`}
      </div>
    </div>`;
  }).join('');
  const gate = g.ok
    ? `<div class="okline">Все затребованные заключения завизированы. Гейт «в Комитет» открыт.</div>`
    : `<div class="warnline">Ожидают визы: ${g.pending.map(esc).join(', ')}. Гейт «в Комитет» закрыт.</div>`;
  return `<div class="detail-panel active">
    <div class="section-h">Заключения подразделений</div>
    <div class="section-note">Куратор может добавить заключанта — это добавит требование к гейту комитета (Р-5).</div>
    ${gate}
    <div class="gtoolbar"><button class="btn btn-secondary btn-sm" onclick="RS.openAddConcl('${app.id}')">+ Добавить заключанта</button></div>
    ${cards}
  </div>`;
}

/* 4. Новые условия (Р-11) + diff */
function pTerms(app){
  const cr=creditById(app.creditIds[0]);
  if(!cr) return `<div class="detail-panel active"><div class="op-empty">Добавьте кредит в охват.</div></div>`;
  if(!app.version){ app.version=versionFrom(cr); }
  const allow=allowedParams(app); const st=stageOf(app);
  const editable = !st.closed && canX('editVersion');
  const fields = PARAM_KEYS.map(([k,label])=>{
    const isAllowed=allow.has(k); const val=app.version.params[k]!==undefined?app.version.params[k]:(cr.terms[k]??'');
    const dis = !editable || !isAllowed;
    return `<div class="field"><span class="flabel">${label} ${isAllowed?'':'<span class="ro-tag">(вид не разрешает)</span>'}</span>
      <input value="${esc(val)}" ${dis?'disabled':''} onchange="RS.setParam('${app.id}','${k}',this.value)"></div>`;
  }).join('');
  const diffRows = PARAM_KEYS.map(([k,label])=>{
    const oldV=cr.terms[k]??'—', newV=app.version.params[k]!==undefined?app.version.params[k]:oldV;
    const changed=String(oldV)!==String(newV);
    return `<tr class="${changed?'diff-changed':''}"><td>${label}</td>
      <td class="${changed?'diff-old':''}">${esc(oldV)}</td>
      <td class="${changed?'diff-new':''}">${esc(newV)}</td></tr>`;
  }).join('');
  const graph = app.version.graph.length
    ? `<div class="cgrid-wrap" style="max-width:520px"><table class="cgrid"><thead><tr><th>№</th><th>Дата</th><th class="numcell">Платёж</th></tr></thead><tbody>
        ${app.version.graph.map(g=>`<tr><td>${g.n}</td><td>${g.date}</td><td class="numcell">${fmt2(g.pay)}</td></tr>`).join('')}
       </tbody></table></div>`
    : '<div class="op-empty">График не рассчитан. Нажмите «Рассчитать график».</div>';
  const srcTag = app.version.source==='минфин' ? `<span class="pill info">условия Минфина</span>` : '';
  return `<div class="detail-panel active">
    <div class="section-h">Новые условия версии ${srcTag}</div>
    <div class="section-note">Редактируемы только параметры, разрешённые видами заявки (Р-3). Остальные видимы, но read-only. Кредит-база: ${cr.no}. Состояние версии: <b>${app.version.state}</b>.</div>
    <div class="f2">${fields}</div>
    <div class="gtoolbar" style="margin-top:14px"><button class="btn btn-secondary btn-sm" ${editable?'':'disabled'} onclick="RS.calcGraph('${app.id}')">Рассчитать график</button></div>
    ${graph}
    <div class="section-h" style="margin-top:18px">Diff — старая / новая версия</div>
    <div class="cgrid-wrap" style="max-width:640px"><table class="cgrid"><thead><tr><th>Параметр</th><th>Старая</th><th>Новая</th></tr></thead><tbody>${diffRows}</tbody></table></div>
  </div>`;
}

/* 5. Комитет / Минфин (Р-6) */
function pMinfin(app){
  const st=stageOf(app); const c=app.committee||{}; const l=app.letterSent||{}; const m=app.minfin||{};
  const dl=deadline(app);
  const committeeBlock = c.fixed
    ? `<div class="okline">Позиция комитета: <b>${esc(c.position)}</b> (${c.date}). Позиция необязывающая — письмо направляется всегда.</div>`
    : `<div class="field" style="max-width:420px"><span class="flabel">Позиция комитета</span>
        <select id="cpos"><option value="целесообразно">целесообразно</option><option value="нецелесообразно">нецелесообразно</option></select>
        <div style="margin-top:8px"><button class="btn btn-success btn-sm" onclick="RS.fixCommittee('${app.id}')">Зафиксировать позицию</button></div></div>`;
  let letterBlock='';
  if(c.fixed){
    letterBlock = l.fixed
      ? `<div class="okline">Письмо в Минфин направлено ${l.date}. Включена пауза взыскания + дедлайн решения 70 к.д. (см. вкладку История / блок «Автоматика» ниже).</div>`
      : `<div class="warnline">Дедлайн письма: ${dl?(dl.overdue?`<span class="dl-red">просрочен ${-dl.remaining} дн.</span>`:`осталось ${dl.remaining} дн.`):'5 р.д.'} (флаг, не блокировка). Письмо направляется при любой позиции.</div>
         <button class="btn btn-primary btn-sm" onclick="RS.fixLetter('${app.id}')">Зафиксировать отправку письма</button>`;
  }
  let minfinBlock='';
  if(l.fixed){
    minfinBlock = m.fixed
      ? `<div class="${m.decision==='отказ'?'flagline':'okline'}">Решение Минфина: <b>${decLabel(m.decision)}</b> · реквизит: ${esc(m.letterRef)} (${m.date}).</div>`
      : `<div class="f2" style="max-width:640px">
          <div class="field"><span class="flabel">Решение</span><select id="mdec">
            <option value="одобрено">одобрено</option><option value="изм">одобрено с изменёнными условиями</option><option value="отказ">отказ</option></select></div>
          <div class="field"><span class="flabel">Реквизит письма Минфина •</span><input id="mref" placeholder="МФ-исх-№ от дата"></div>
          <div class="field col-span"><button class="btn btn-primary btn-sm" onclick="RS.fixMinfin('${app.id}')">Зафиксировать решение Минфина</button>
            <span class="mode-tag" style="margin-left:8px">Без реквизита кнопка отклонит фиксацию (minfinGate).</span></div>
        </div>`;
  }
  const auto = automationBlock(app);
  return `<div class="detail-panel active">
    <div class="section-h">Комитет</div>${committeeBlock}
    <div class="section-h" style="margin-top:18px">Письмо в Минфин</div>${letterBlock||'<div class="op-empty">Сначала зафиксируйте позицию комитета.</div>'}
    <div class="section-h" style="margin-top:18px">Решение Минфина</div>${minfinBlock||'<div class="op-empty">Сначала зафиксируйте отправку письма.</div>'}
    ${auto}
  </div>`;
}
function decLabel(d){ return d==='изм'?'одобрено с изменёнными условиями':d==='отказ'?'отказ':'одобрено'; }

/* Блок «Автоматика» (Р-12/13/14) + мини-зеркало */
function automationBlock(app){
  if(!app.automation.length) return '';
  const events=app.automation.map(e=>`<div class="op-row"><span class="pill ${e.kind==='risk'?'high':e.kind==='unpause'?'low':'mid'}">${e.kind}</span><span class="op-t">${esc(e.text)}</span><span class="mode-tag">${e.when}</span></div>`).join('');
  const cr=creditById(app.creditIds[0]); const proc=cr&&cr.collProc?state.procs[cr.collProc]:null;
  const paused = app.letterSent&&app.letterSent.fixed && !(app.outcome==='отказ'||(app.ds&&app.ds.no));
  const mirror = proc ? `<div class="mirror">
      <div class="mh">Зеркало процесса взыскания ${proc.id} (read-only)</div>
      ${paused?`<div class="mbanner">⏸ Пауза (scope: весь процесс, дедлайн 70 к.д.) — источник: заявка <span class="rowlink" onclick="RS.openApp('${app.id}')">${app.id}</span></div>`:''}
      <div class="mrow"><span>Фаза</span><span>${proc.phase}</span></div>
      <div class="mrow"><span>Дней в категории</span><span>${proc.catDays}</span></div>
      <div class="mrow"><span>Заёмщик (ИНН)</span><span>${proc.inn}</span></div>
    </div>`:'';
  return `<div class="section-h" style="margin-top:20px">Автоматика швов</div>
    <div class="ops-list">${events}</div>
    ${mirror}
    <div class="infoline">Пени во время паузы <b>продолжают начисляться</b> (Р-13). Пауза останавливает меры, не обязательства.</div>
    <div class="infoline">Оси заёмщика <b>не трогаем</b> (Р-14): группа и риск-категория меняются только классификатором; счётчик реструктуризаций на кредите +1.</div>`;
}

/* 6. Оформление (Р-8, Р-15) */
function pFormal(app){
  const approved = app.minfin&&app.minfin.fixed&&app.minfin.decision!=='отказ';
  if(!approved) return `<div class="detail-panel active"><div class="op-empty">Оформление доступно после одобрения Минфином.</div></div>`;
  const cga=coverGateApp(app);
  const rows=cga.rows.map(({cr,g})=>`<tr>
    <td>${cr.no}</td>
    <td class="numcell">${g.cover}% / ≥${g.required}%</td>
    <td>${g.coverOk?'<span class="gatechip ok">покрытие ✓</span>':'<span class="gatechip no">покрытие ✗</span>'}</td>
    <td>${cr.tech?(g.ageOk?'<span class="gatechip ok">возраст ✓</span>':'<span class="gatechip no">возраст ✗</span>'):'<span class="mode-tag">не техника</span>'}</td>
    <td>${g.insured?'<span class="gatechip ok">страховка ✓</span>':'<span class="gatechip no">страховка ✗</span>'}</td>
  </tr>`).join('');
  const waived = app.waiver&&app.waiver.granted;
  let gateLine;
  if(cga.ok && !waived) gateLine=`<div class="okline">Гейт обеспечения пройден по всем кредитам. Регистрация доп. соглашения доступна.</div>`;
  else if(waived) gateLine=`<div class="warnline">Гейт обеспечения снят WAIVER-ом комиссии по залогу. Основание: ${esc(app.waiver.reason)} (${app.waiver.date}).</div>`;
  else gateLine=`<div class="flagline">Гейт обеспечения не пройден — регистрация доп. соглашения заблокирована. Разблокировка — «Решение комиссии по залогу» с обязательным основанием.</div>`;
  const done = app.ds&&app.ds.no;
  const dsBlock = done
    ? `<div class="okline">Доп. соглашение <b>${esc(app.ds.no)}</b> зарегистрировано. Версия «действует» с ${app.ds.date}. Счётчик реструктуризаций кредитов +1.</div>`
    : `<div class="gtoolbar">
        ${(!cga.ok && !waived)?`<button class="btn btn-danger btn-sm" onclick="RS.openWaiver('${app.id}')">Решение комиссии по залогу (waiver)</button>`:''}
        <button class="btn btn-primary btn-sm" ${(cga.ok||waived)?'':'disabled'} onclick="RS.openDS('${app.id}')">Зарегистрировать доп. соглашение</button>
      </div>`;
  const ops = app.ops.length
    ? `<div class="ops-list">${app.ops.map(o=>`<div class="op-row"><span class="op-t"><b>${esc(o.type)}</b> — ${esc(o.detail)}</span>${o.before!==undefined?`<span class="mode-tag">${fmt(o.before)} → ${fmt(o.after)}</span>`:''}</div>`).join('')}</div>`
    : '<div class="op-empty">Операции на дату вступления появятся при активации версии (Р-9/Р-10).</div>';
  return `<div class="detail-panel active">
    <div class="section-h">Гейт обеспечения (на новых условиях)</div>
    <div class="section-note">Покрытие = залоговая стоимость / остаток ≥ порог. Возраст техники против нового срока. Страховка на новый срок (Р-15).</div>
    ${gateLine}
    <div class="cgrid-wrap" style="max-width:760px"><table class="cgrid"><thead><tr><th>Кредит</th><th class="numcell">Покрытие</th><th>Покрытие</th><th>Возраст</th><th>Страховка</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="section-h" style="margin-top:18px">Доп. соглашение</div>${dsBlock}
    <div class="section-h" style="margin-top:18px">Операции на дату вступления</div>${ops}
  </div>`;
}

/* 7. История (Р-16, append-only) */
function pHist(app){
  const rows=[...app.history].map(h=>`<div class="hrow ${h.cls||''}">
    <div class="hwhen">${h.when}</div><div class="hwhat">${esc(h.what)}</div>${h.who?`<div class="hwho">${esc(h.who)}</div>`:''}
  </div>`).join('');
  return `<div class="detail-panel active">
    <div class="section-h">История заявки</div>
    <div class="section-note">Append-only. Записи не удаляются и не переписываются; отмена — компенсирующей записью (Р-16).</div>
    <div class="hist">${rows||'<div class="op-empty">Пусто</div>'}</div>
  </div>`;
}

/* ================= СПРАВОЧНИК ВИДОВ (Р-3) ================= */
function renderDict(){
  const v=document.getElementById('view-dict');
  const rows=state.kinds.map(k=>`<tr>
    <td><b>${esc(k.name)}</b></td>
    <td>${[...k.params].map(p=>PARAM_LABEL[p]||p).join(', ')}</td>
    <td>${k.docs.map(esc).join(', ')}</td>
    <td>${k.overdueMode===1?'(1) в новый график + обнуление':'(2) сохраняется'}</td>
    <td>${esc(k.limits||'')}</td>
  </tr>`).join('');
  v.innerHTML=`
    <div class="tb-actions">
      <button class="btn btn-primary btn-sm" ${canX('manageDict')?'':'disabled'} onclick="RS.openNewKind()">+ Новый вид</button>
      <div class="spacer"></div>
      <span class="mode-tag">Конструктор — роль Администратор. Новый вид сразу доступен в заявках.</span>
    </div>
    <div class="grid-wrap"><table class="grid"><thead><tr>
      <th>Вид</th><th>Разрешённые параметры</th><th>Документы</th><th>Режим просрочки</th><th>Ограничения</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ================= МОДАЛКИ ================= */
const overlay = () => document.getElementById('overlay');
function modal(html){ overlay().innerHTML=html; overlay().classList.add('open'); }
function closeModal(){ overlay().classList.remove('open'); overlay().innerHTML=''; }
const mhead = t => `<div class="modal-h"><span class="mt">${t}</span><button class="modal-x" onclick="RS.closeModal()">×</button></div>`;

function openAddCredit(appId){
  if(!guard('addCredit')) return; const app=appById(appId);
  const cands=state.credits.filter(c=>!app.creditIds.includes(c.id));
  const opts=cands.map(c=>`<option value="${c.id}">${c.no} · ${c.borrower} · ИНН ${c.inn} · остаток ${fmt(c.balance)}</option>`).join('');
  modal(`<div class="modal">${mhead('Добавить кредит в охват')}<div class="modal-b">
    <div class="section-note">Валидации Р-2: тот же ИНН (${app.inn}); кредит без другой активной заявки.</div>
    <div class="field"><span class="flabel">Кредит</span><select id="addcr">${opts||'<option value="">нет кандидатов</option>'}</select></div>
  </div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="RS.addCredit('${appId}')">Добавить</button></div></div>`);
}
function addCredit(appId){
  const app=appById(appId); const id=document.getElementById('addcr').value; const c=creditById(id); if(!c) return;
  if(c.inn!==app.inn){ toast('Кредит другого ИНН — добавить нельзя (Р-2)','err'); return; }
  const other=activeAppOnCredit(id,appId);
  if(other){ toast('Кредит уже в активной заявке '+other.id+' — добавить нельзя (Р-2)','err'); return; }
  app.creditIds.push(id); app._t=TODAY; H(app,'В охват добавлен кредит '+c.no+'.',state.role);
  closeModal(); toast('Кредит добавлен','ok'); render();
}

function openAddConcl(appId){
  if(!guard('addConcl')) return;
  modal(`<div class="modal">${mhead('Добавить подразделение-заключанта')}<div class="modal-b">
    <div class="section-note">Добавит новое требование к гейту «в Комитет» (Р-5).</div>
    <div class="field"><span class="flabel">Название подразделения</span><input id="ncdept" placeholder="напр. Юридический департамент"></div>
  </div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="RS.addConcl('${appId}')">Добавить</button></div></div>`);
}
function addConcl(appId){
  const app=appById(appId); const dept=(document.getElementById('ncdept').value||'').trim();
  if(!dept){ toast('Укажите подразделение','err'); return; }
  app.conclusions.push({dept,text:'',visa:false,visaDate:null}); app._t=TODAY; H(app,'Добавлен заключант: '+dept+'.',state.role);
  closeModal(); toast('Заключант добавлен — гейт комитета обновлён','ok'); render();
}

function openWaiver(appId){
  if(!guard('waiver')) return;
  modal(`<div class="modal">${mhead('Решение комиссии по залогу (waiver)')}<div class="modal-b">
    <div class="flagline">Гейт обеспечения не пройден. Основание обязательно — оно пишется в историю (Р-16).</div>
    <div class="field col-span"><span class="flabel">Основание •</span><textarea id="wreason" placeholder="Протокол комиссии, компенсирующее обеспечение, …"></textarea></div>
  </div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Отмена</button>
    <button class="btn btn-danger" onclick="RS.grantWaiver('${appId}')">Снять блокировку (waiver)</button></div></div>`);
}
function grantWaiver(appId){
  const app=appById(appId); const reason=(document.getElementById('wreason').value||'').trim();
  if(!reason){ toast('Основание обязательно','err'); return; }
  app.waiver={granted:true,reason,by:'Комиссия по залогу',date:TODAY}; app._t=TODAY;
  H(app,'WAIVER комиссии по залогу: '+reason,'Комиссия по залогу','waiver');
  closeModal(); toast('Гейт обеспечения снят waiver-ом','ok'); render();
}

function openDS(appId){
  if(!guard('regDS')) return; const app=appById(appId);
  const cga=coverGateApp(app);
  if(!cga.ok && !(app.waiver&&app.waiver.granted)){ toast('Гейт обеспечения не пройден — сначала waiver','err'); return; }
  modal(`<div class="modal">${mhead('Регистрация доп. соглашения')}<div class="modal-b"><div class="mform">
    <div class="field req"><span class="flabel">Номер доп. соглашения</span><input id="dsno" placeholder="ДС-…"></div>
    <div class="field req"><span class="flabel">Дата</span><input id="dsdate" type="date" value="${TODAY}"></div>
    <div class="field col-span"><div class="section-note">Оба реквизита обязательны (Р-8). При регистрации: версия «действует», операции на дату вступления, счётчик реструктуризаций +1.</div></div>
  </div></div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="RS.regDS('${appId}')">Зарегистрировать</button></div></div>`);
}
function regDS(appId){
  const app=appById(appId); const no=(document.getElementById('dsno').value||'').trim(); const date=(document.getElementById('dsdate').value||'').trim();
  if(!no||!date){ toast('Номер и дата обязательны (Р-8)','err'); return; }
  app.ds={no,date};
  if(!app.outcome) app.outcome = app.minfin.decision==='изм'?'изм':'одобрена';
  if(app.version) app.version.state='действует';
  applyEntryOps(app);
  app.creditIds.forEach(id=>{ const c=creditById(id); c.restructCount+=1; });
  app._t=date; H(app,'Доп. соглашение '+no+' зарегистрировано. Версия «действует» с '+date+'. Операции на дату вступления выполнены. Счётчик реструктуризаций +1.',state.role);
  const cr=creditById(app.creditIds[0]);
  if(cr&&cr.collProc){ app.automation.push({when:date,kind:'unpause',text:'Оформление завершено — пауза снята штатно, взыскание закрыто по кредитам заявки'}); }
  closeModal(); toast('Доп. соглашение зарегистрировано — версия действует','ok'); render();
}
function applyEntryOps(app){
  const kinds=app.kindIds.map(kindById);
  const cr=creditById(app.creditIds[0]);
  if(kinds.some(k=>k&&k.params.includes('capInterest'))) app.ops.push({type:'Капитализация процентов',detail:'Начисленные % перенесены в тело долга',before:cr.balance,after:cr.balance});
  if(kinds.some(k=>k&&k.params.includes('capPenalty'))) app.ops.push({type:'Капитализация штрафов',detail:'Штрафы перенесены в тело долга',before:cr.balance,after:cr.balance});
  if(kinds.some(k=>k&&k.params.includes('forgive'))) app.ops.push({type:'Прощение санкций',detail:'Списание пени компенсирующей записью (не удаление)',before:cr.odSum,after:0});
  const mode = kinds.find(k=>k)?.overdueMode||2;
  app.ops.push({type:'Режим просрочки',detail:mode===1?'режим (1): в новый график + обнуление счётчика дней':'режим (2): просрочка сохраняется со своим счётчиком',mode});
  if(mode===1 && cr){ H(app,'Режим просрочки (1): счётчик дней просрочки обнулён ('+cr.odDays+' → 0).','Система'); cr.odDays=0; }
}

function openNewKind(){
  if(!guard('manageDict')) return;
  const chks=PARAM_KEYS.map(([k,l])=>`<label class="chk"><input type="checkbox" value="${k}" class="npk"> ${l}</label>`).join('');
  modal(`<div class="modal wide">${mhead('Новый вид реструктуризации')}<div class="modal-b"><div class="mform">
    <div class="field req col-span"><span class="flabel">Название</span><input id="nkname"></div>
    <div class="field col-span"><span class="flabel">Разрешённые параметры</span><div class="f2" style="grid-template-columns:1fr 1fr 1fr">${chks}</div></div>
    <div class="field col-span"><span class="flabel">Требуемые документы (через запятую)</span><input id="nkdocs" value="Заявление"></div>
    <div class="field req"><span class="flabel">Режим просрочки</span><select id="nkmode"><option value="1">(1) в новый график + обнуление счётчика</option><option value="2">(2) просрочка сохраняется</option></select></div>
    <div class="field"><span class="flabel">Ограничения</span><input id="nklim"></div>
  </div></div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="RS.addKind()">Создать вид</button></div></div>`);
}
function addKind(){
  const name=(document.getElementById('nkname').value||'').trim(); if(!name){ toast('Название обязательно','err'); return; }
  const params=[...document.querySelectorAll('.npk:checked')].map(x=>x.value);
  const docs=(document.getElementById('nkdocs').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const mode=+document.getElementById('nkmode').value; const limits=(document.getElementById('nklim').value||'').trim();
  const id='K'+(state.kinds.length+1)+'_'+Date.now().toString(36);
  state.kinds.push({id,name,params,docs,overdueMode:mode,limits});
  closeModal(); toast('Вид создан — доступен в заявках','ok'); render();
}

function showMirror(procId,appId){
  const p=state.procs[procId]; if(!p) return;
  const app=appById(appId); const paused=app&&app.letterSent&&app.letterSent.fixed&&!(app.outcome==='отказ'||(app.ds&&app.ds.no));
  modal(`<div class="modal">${mhead('Процесс взыскания '+procId+' (read-only)')}<div class="modal-b">
    ${paused?`<div class="warnline">⏸ Пауза (весь процесс, 70 к.д.) — источник: заявка ${appId}</div>`:''}
    <div class="mirror"><div class="mrow"><span>Фаза</span><span>${p.phase}</span></div>
    <div class="mrow"><span>Дней в категории</span><span>${p.catDays}</span></div>
    <div class="mrow"><span>Заёмщик (ИНН)</span><span>${p.inn}</span></div></div>
    <div class="section-note">Зеркало read-only. Условия кредита из зеркала не редактируются.</div>
  </div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Закрыть</button></div></div>`);
}

/* ================= ДЕЙСТВИЯ (мутации owned-фактов) ================= */
function toggleDoc(appId,doc,val){ if(!guard('toggleDoc')) return; const app=appById(appId); app.packetDocs[doc]=val; render(); }
function returnApp(appId){ if(!guard('returnApp')) return; const app=appById(appId); app.outcome='возврат'; app._t=TODAY;
  H(app,'Исход: возвращена без рассмотрения (неполный пакет).',state.role); toast('Заявка возвращена без рассмотрения','ok'); render(); }
function setConclText(appId,i,val){ const app=appById(appId); if(!canX('editConcl:'+app.conclusions[i].dept)){ return; } app.conclusions[i].text=val; }
function visaConcl(appId,i){ const app=appById(appId); const c=app.conclusions[i];
  if(!canX('editConcl:'+c.dept)){ toast('Визирует только заключант '+c.dept,'err'); return; }
  if(!c.text.trim()){ toast('Заполните текст заключения','err'); return; }
  c.visa=true; c.visaDate=TODAY; app._t=TODAY; H(app,'Заключение '+c.dept+' завизировано.','Заключант '+c.dept); toast('Завизировано','ok'); render(); }
function fixCommittee(appId){ if(!guard('fixCommittee')) return; const app=appById(appId);
  const pos=document.getElementById('cpos').value; app.committee={fixed:true,position:pos,date:TODAY}; app._t=TODAY;
  H(app,'Позиция комитета: '+pos+'. Дедлайн письма 5 р.д.','Секретарь комитета'); toast('Позиция комитета зафиксирована','ok'); render(); }
function fixLetter(appId){ if(!guard('fixLetter')) return; const app=appById(appId);
  app.letterSent={fixed:true,date:TODAY}; app._t=TODAY;
  const cr=creditById(app.creditIds[0]);
  app.automation.push({when:TODAY,kind:'pause',text:'Пауза поставлена в процессе взыскания '+(cr&&cr.collProc||'—')+' (scope: весь процесс, дедлайн 70 к.д.)'});
  if(cr) app.automation.push({when:TODAY,kind:'overlay',text:'Оверлей подавления 181-го дня поставлен на кредит '+cr.no});
  H(app,'Письмо в Минфин направлено. Пауза взыскания (весь процесс, 70 к.д.) + оверлей 181-го дня.','Куратор ОД','auto');
  toast('Отправка письма зафиксирована — автоматика паузы включена','ok'); render(); }
function fixMinfin(appId){ if(!guard('fixMinfin')) return; const app=appById(appId);
  const dec=document.getElementById('mdec').value; const ref=(document.getElementById('mref').value||'').trim();
  if(!ref){ toast('Реквизит письма Минфина обязателен (minfinGate)','err'); return; }
  app.minfin={fixed:true,decision:dec,letterRef:ref,date:TODAY}; app._t=TODAY;
  H(app,'Решение Минфина: '+decLabel(dec)+' ('+ref+').','Куратор ОД');
  if(dec==='отказ'){ app.outcome='отказ';
    const cr=creditById(app.creditIds[0]); const nd=addCalDays(TODAY,1);
    app.automation.push({when:nd,kind:'unpause',text:'Отказ зафиксирован '+TODAY+' → снятие следующим календарным днём ('+nd+'): взыскание возобновлено с фазы «'+(cr&&cr.collProc?state.procs[cr.collProc].phase:'—')+'».'});
    app.automation.push({when:nd,kind:'risk',text:'Ночной пересчёт категории → высокий (следующим календарным днём после отказа).'});
    H(app,'Снятие паузы/оверлея следующим днём; взыскание возобновлено с сохранённой фазы; категория → высокий.','Система','auto');
    toast('Отказ зафиксирован','ok');
  } else if(dec==='изм'){ if(app.version) app.version.source='минфин';
    H(app,'Условия — версия Минфина (то, что утвердили). Откройте вкладку «Новые условия» для правки.','Куратор ОД'); toast('Одобрено с изменёнными условиями','ok');
  } else { toast('Решение Минфина зафиксировано','ok'); }
  render(); }
function setParam(appId,k,val){ const app=appById(appId); if(!canX('editVersion')){ toast('Условия правит Куратор ОД','err'); return; }
  if(!allowedParams(app).has(k)){ toast('Параметр не разрешён выбранными видами (Р-3)','err'); return; }
  const num=Number(val); app.version.params[k]=(val!==''&&!isNaN(num)&&/^[0-9.]+$/.test(val))?num:val; }
function calcGraph(appId){ if(!guard('calcGraph')) return; const app=appById(appId); const cr=creditById(app.creditIds[0]);
  const term=Number(app.version.params.term)||cr.terms.term; const rate=Number(app.version.params.rate)||cr.terms.rate;
  const P=cr.balance, r=rate/100/12, n=term;
  const pay = r>0 ? P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1) : P/n;
  app.version.graph=Array.from({length:Math.min(n,6)},(_,i)=>({n:i+1,date:addCalDays(app.regDate,(i+1)*30),pay}));
  toast('График рассчитан (демо-аннуитет)','ok'); render(); }
function advance(appId){ const app=appById(appId); const adv=canAdvance(app); if(!adv||!adv.ok){ toast(adv?adv.why:'Нет перехода','err'); return; }
  if(adv.to==='Анализ'){ if(!guard('startAnalysis')) return; app.analysisStarted=true; app._t=TODAY; H(app,'Пакет укомплектован → переход в «Анализ». Дедлайн 30 к.д.',state.role); toast('Переход выполнен','ok'); render(); return; }
  if(adv.to==='Комитет'){ toast('Заключения завизированы — зафиксируйте позицию комитета во вкладке «Комитет / Минфин»','ok'); state.curTab='minfin'; render(); return; }
}

/* ================= МАРШРУТ / ИНИЦИАЛИЗАЦИЯ ================= */
/* создание новой заявки (Р-1: заявка — единица работы, привязана к ИНН; Р-2: охват одного ИНН) */
function newApp(){
  if(!guard('createApp')) return;
  const inns=[...new Map(state.credits.map(c=>[c.inn,c.borrower])).entries()];
  const innOpts=inns.map(([inn,b],i)=>`<option value="${inn}" ${i===0?'selected':''}>${esc(b)} · ИНН ${inn}</option>`).join('');
  const kinds=state.kinds.map(k=>`<label class="chk"><input type="checkbox" class="nakind" value="${k.id}"> ${esc(k.name)}</label>`).join('');
  modal(`<div class="modal wide">${mhead('Новая заявка на реструктуризацию')}<div class="modal-b"><div class="mform">
    <div class="field req"><span class="flabel">Заёмщик (ИНН)</span><select id="nainn" onchange="RS.naFillCredits()">${innOpts}</select></div>
    <div class="field req"><span class="flabel">Дата регистрации обращения</span><input id="nadate" value="${TODAY}" placeholder="ГГГГ-ММ-ДД"></div>
    <div class="field col-span"><span class="flabel">Охват — кредиты этого ИНН <span class="ro-tag">(Р-2: кредит с активной заявкой недоступен)</span></span>
      <div id="nacredits" class="f2" style="max-width:640px"></div></div>
    <div class="field col-span"><span class="flabel">Виды реструктуризации <span class="ro-tag">(Р-3; определяют пакет документов и разрешённые параметры)</span></span>
      <div class="f2" style="grid-template-columns:1fr 1fr">${kinds}</div></div>
    <div class="section-note">Заключения (СРМиК/ДПО), чек-лист пакета и конвейер стадий создаются автоматически. Заявка стартует на стадии «Регистрация обращения».</div>
  </div></div><div class="modal-f"><button class="btn btn-secondary" onclick="RS.closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="RS.createApp()">Создать заявку</button></div></div>`);
  naFillCredits();
}
function naFillCredits(){
  const inn=document.getElementById('nainn').value;
  const list=state.credits.filter(c=>c.inn===inn).map(c=>{
    const other=activeAppOnCredit(c.id,'__new__');
    return `<label class="chk" ${other?'style="opacity:.5"':''}><input type="checkbox" class="nacred" value="${c.id}" ${other?'disabled':''}>
      ${c.no} · остаток ${fmt(c.balance)} · просрочка ${c.odDays} дн.${other?` · занят заявкой ${other.id}`:''}</label>`;
  }).join('') || '<div class="op-empty">У ИНН нет кредитов</div>';
  document.getElementById('nacredits').innerHTML=list;
}
function nextAppId(){ let n=1001; const ids=new Set(state.apps.map(a=>a.id)); while(ids.has('RS-'+n)) n++; return 'RS-'+n; }
function createApp(){
  if(!guard('createApp')) return;
  const inn=document.getElementById('nainn').value;
  const borrower=(state.credits.find(c=>c.inn===inn)||{}).borrower||'';
  const regDate=(document.getElementById('nadate').value||'').trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(regDate)){ toast('Дата регистрации в формате ГГГГ-ММ-ДД','err'); return; }
  const creditIds=[...document.querySelectorAll('.nacred:checked')].map(x=>x.value);
  if(!creditIds.length){ toast('Выберите хотя бы один кредит охвата','err'); return; }
  const bad=creditIds.find(id=>activeAppOnCredit(id,'__new__'));
  if(bad){ toast('Кредит '+creditById(bad).no+' в другой активной заявке (Р-2)','err'); return; }
  const kindIds=[...document.querySelectorAll('.nakind:checked')].map(x=>x.value);
  if(!kindIds.length){ toast('Выберите хотя бы один вид реструктуризации','err'); return; }
  const id=nextAppId();
  const app=baseApp(id,inn,borrower,kindIds,creditIds,regDate);
  app.conclusions=defaultConclusions();
  app._t=regDate;
  H(app,'Заявка зарегистрирована. Охват: '+creditIds.map(i=>creditById(i).no).join(', ')+'. Виды: '+kindIds.map(i=>kindById(i).name).join(', ')+'.',state.role);
  state.apps.push(app);
  closeModal(); toast('Заявка '+id+' создана — стадия «Регистрация обращения»','ok'); openApp(id);
}
function setFilter(k,v){ if(k==='stage') state.filterStage=v; else state.filterOutcome=v; render(); }
function go(view){ state.view=view; if(view==='list') state.curApp=null; render(); }
function setRole(r){ state.role=r; render(); }

function render(){
  document.getElementById('view-list').classList.toggle('active',state.view==='list');
  document.getElementById('view-card').classList.toggle('active',state.view==='card');
  document.getElementById('view-dict').classList.toggle('active',state.view==='dict');
  document.getElementById('crumb').innerHTML =
    state.view==='card' ? `<span class="bk" onclick="RS.go('list')">Реестр заявок</span> / ${state.curApp||''}`
    : state.view==='dict' ? 'Справочник видов' : 'Реестр заявок';
  renderNav(); renderRoles();
  if(state.view==='list') renderList();
  else if(state.view==='card') renderCard();
  else if(state.view==='dict') renderDict();
}

function toast(msg,kind){ const w=document.getElementById('toastWrap'); if(!w) return; const t=document.createElement('div');
  t.className='toast'+(kind?' '+kind:''); t.innerHTML=`<span>${esc(msg)}</span>`; w.appendChild(t); setTimeout(()=>t.remove(),4200); }

/* публичный слой (UI + headless-check) */
const RS = {
  go, setRole, setTab, openApp, newApp, naFillCredits, createApp, nextAppId, setFilter, closeModal,
  toggleDoc, returnApp, setConclText, visaConcl, openAddConcl, addConcl,
  openAddCredit, addCredit, fixCommittee, fixLetter, fixMinfin, setParam, calcGraph, advance,
  openWaiver, grantWaiver, openDS, regDS, openNewKind, addKind, showMirror,
  get state(){ return state; }, seed, stageOf, deadline, packetGate, conclGate, minfinGate, dsGate,
  coverGate, coverGateApp, allowedParams, requiredDocs, activeAppOnCredit, canAdvance, canX,
  appById, creditById, kindById, applyEntryOps, versionFrom, amortize, periodMonths, round2, TODAY, STAGES, ROLES,
  __baseApp: baseApp
};
if(typeof window!=='undefined') window.RS=RS;

seed();
if(typeof document!=='undefined' && document.getElementById('view-list')){
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&overlay().classList.contains('open')) closeModal(); });
  render();
}
</script>
</body>
