<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Справочники · АСУБК</title>
<!--
  MOCKUP (single-file, static) — образец для команды разработки, не прод-код.
  Раздел «Справочники» (витрина справочников).
  Дизайн-система: токены скопированы из mockups/loan-program/loan-program.html (:root, строки 37-180).

  Цель файла: показать раскладку sidebar + main (топбар, пустая область списка) и набор
  CSS-классов (.section, .section-head, .arch-chip, .slug, .row-count, .nav-filter, .grid, .badge),
  готовых к наполнению данными в следующих задачах.

  Переиспользуется из loan-program.html:
    - все переменные :root (--asubk-*, --text-*, --space-*, --radius-*, --control-h,
      --header-h, --sidebar-w, --shadow-focus)
    - базовые правила: *, html/body, .app, .sidebar, .brand, .nav, .main, .topbar,
      .crumb-title, .crumb-status, scrollbar
    - компонентные классы: .btn*, .toolbar, .badge, .grid (table)
-->
<style>
:root{
  --asubk-blue:#006AF5; --asubk-blue-hover:#0058CC; --asubk-blue-active:#0049A8;
  --asubk-link:#005FDB; --asubk-green:#158443; --asubk-green-hover:#106A36;
  --asubk-red:#E03A3A; --asubk-red-hover:#C42E2E;
  --asubk-ink:#192434;
  --asubk-ink-90:rgba(24,39,57,0.94); --asubk-ink-65:rgba(24,39,57,0.65);
  --asubk-ink-45:rgba(24,39,57,0.45); --asubk-ink-26:rgba(28,52,84,0.26);
  --asubk-white:#FFFFFF; --asubk-gray-50:#F8F9FB; --asubk-gray-100:#F5F7FA;
  --asubk-gray-150:#EFF1F4; --asubk-gray-200:#E4E8EE;
  --asubk-border-base:rgba(28,55,90,0.16); --asubk-border-strong:rgba(28,55,90,0.30);
  --asubk-blue-tint:rgba(0,106,245,0.08); --asubk-nav-active:rgba(51,139,255,0.13);
  --asubk-disabled-fill:rgba(25,59,103,0.05); --asubk-red-tint:#FCE6E6;
  --asubk-green-tint:rgba(21,132,67,0.10); --asubk-amber:#B8860B; --asubk-amber-tint:rgba(184,134,11,0.12);
  --text-body:var(--asubk-ink-90); --text-heading:var(--asubk-ink); --text-muted:var(--asubk-ink-65);
  --text-placeholder:var(--asubk-ink-45); --text-disabled:var(--asubk-ink-26); --text-link:var(--asubk-link);
  --surface-page:var(--asubk-white); --surface-panel:var(--asubk-gray-100); --surface-sidebar:var(--asubk-gray-150);
  --surface-card:var(--asubk-white); --surface-input:var(--asubk-gray-200); --surface-hover:var(--asubk-gray-50);
  --border-default:var(--asubk-border-base); --border-strong:var(--asubk-border-strong); --border-focus:var(--asubk-blue);
  --action-primary:var(--asubk-blue); --action-primary-hover:var(--asubk-blue-hover);
  --action-success:var(--asubk-green); --action-danger:var(--asubk-red);
  --status-success:var(--asubk-green); --status-success-bg:var(--asubk-green-tint);
  --status-info:var(--asubk-blue); --status-info-bg:var(--asubk-blue-tint);
  --status-warning:var(--asubk-amber); --status-warning-bg:var(--asubk-amber-tint);
  --status-error:var(--asubk-red); --status-error-bg:var(--asubk-red-tint);
  --asubk-font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif;
  --text-xs:12px; --text-sm:14px; --text-base:16px; --text-lg:18px;
  --weight-regular:400; --weight-medium:500; --weight-semibold:600; --weight-bold:700;
  --leading-tight:1.2; --leading-snug:1.35; --leading-normal:1.5;
  --font-body:var(--weight-regular) var(--text-base)/var(--leading-normal) var(--asubk-font);
  --font-label:var(--weight-regular) var(--text-sm)/var(--leading-snug) var(--asubk-font);
  --font-page-title:var(--weight-semibold) var(--text-lg)/var(--leading-tight) var(--asubk-font);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:24px; --space-6:32px;
  --radius-sm:3.5px; --radius-md:4px; --radius-lg:8px; --radius-pill:999px;
  --control-h:36px; --header-h:56px; --sidebar-w:320px;
  --shadow-focus:0 0 0 2px rgba(0,106,245,0.35);
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font:var(--font-body); color:var(--text-body); background:var(--surface-page); }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:rgba(28,55,90,0.22); border-radius:6px; }
a{ color:inherit; }

.app{ display:flex; height:100vh; width:100%; }

/* ---- sidebar ---- */
.sidebar{ width:var(--sidebar-w); flex:none; background:var(--surface-sidebar);
  display:flex; flex-direction:column; border-right:1px solid var(--border-default); }
.brand{ padding:18px 16px 14px; font:var(--weight-semibold) 17px/1.2 var(--asubk-font);
  color:var(--text-heading); letter-spacing:0.04em; }
.nav{ flex:1; overflow-y:auto; padding-bottom:8px; }

/* ---- nav-filter (поле фильтрации справочников в sidebar) ---- */
.nav-filter{
  display:block; width:calc(100% - 24px); margin:0 12px 8px;
  height:var(--control-h); padding:0 var(--space-2);
  background:var(--surface-card); color:var(--text-body);
  border:1px solid var(--border-default); border-radius:var(--radius-md);
  font:var(--font-label); outline:none;
  transition:border-color 120ms ease, box-shadow 120ms ease;
}
.nav-filter::placeholder{ color:var(--text-placeholder); }
.nav-filter:focus{ border-color:var(--border-focus); box-shadow:var(--shadow-focus); }

/* ---- main ---- */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--surface-page); }
.topbar{ height:var(--header-h); flex:none; background:var(--surface-page);
  border-bottom:1px solid var(--border-default); display:flex; align-items:center; gap:14px; padding:0 20px; }
.crumb-title{ font:var(--font-page-title); color:var(--text-heading); }
.crumb-status{ margin-left:auto; font:var(--font-label); color:var(--text-muted); }

/* ---- dict-list (список секций справочников) ---- */
.dict-list{ padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-6);
  flex:1; overflow-y:auto; }

/* ---- section (карточка одного справочника или группы) ---- */
/* flex:none — иначе в колоночном flex-контейнере .dict-list секции с overflow:hidden
   получают min-height:auto → 0 и схлопываются до высоты рамок (≈2px). */
.section{ background:var(--surface-card); border:1px solid var(--border-default);
  border-radius:var(--radius-lg); overflow:hidden; flex:none; }
.section-head{ display:flex; align-items:center; gap:10px; padding:14px 16px;
  border-bottom:1px solid var(--border-default); background:var(--surface-panel); }
.section-head h2{ margin:0; font:var(--weight-semibold) var(--text-base)/var(--leading-tight) var(--asubk-font);
  color:var(--text-heading); flex:1; }

/* arch-chip / slug / row-count: см. блок «render-engine additions» ниже */

/* ---- toolbar (панель действий над справочником) ---- */
.toolbar{ display:flex; align-items:center; gap:var(--space-2); padding:12px 20px;
  border-bottom:1px solid var(--border-default); flex-wrap:wrap; }
.tb-spacer{ flex:1; }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);
  height:var(--control-h); padding:0 14px; border:1px solid transparent; border-radius:var(--radius-md);
  font:var(--weight-semibold) var(--text-sm)/1 var(--asubk-font); cursor:pointer; white-space:nowrap; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn svg{ flex:none; }
/* единое соглашение классов кнопок: .btn + модификатор через пробел (как в render-движке) */
.btn.primary{ background:var(--action-primary); color:#fff; }
.btn.primary:hover:not(:disabled){ background:var(--action-primary-hover); }
.btn.ghost{ background:rgba(25,59,103,0.05); color:var(--text-link); border-color:var(--border-default); }
.btn.ghost:hover:not(:disabled){ background:var(--surface-hover); color:var(--text-body); }
.btn.danger{ background:var(--surface-card); color:var(--action-danger); border-color:var(--border-default); }
.btn.danger:hover:not(:disabled){ background:var(--status-error-bg); }

/* ---- grid (таблица записей справочника) ---- */
.grid-wrap{ overflow-x:auto; }
table.grid{ width:100%; border-collapse:collapse; font:var(--font-label); }
table.grid thead th{ background:var(--surface-panel); text-align:left; padding:10px 12px;
  border-bottom:1px solid var(--border-strong);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); color:var(--text-heading);
  white-space:nowrap; user-select:none; }
table.grid tbody td{ padding:10px 12px; border-bottom:1px solid var(--border-default);
  color:var(--text-body); vertical-align:middle; }
table.grid tbody tr{ cursor:pointer; }
table.grid tbody tr:hover{ background:var(--surface-hover); }
table.grid tbody tr.sel{ background:var(--asubk-nav-active); }

/* ---- status badges ---- */
.badge{ display:inline-flex; align-items:center; gap:var(--space-1); height:22px; padding:0 var(--space-2);
  border-radius:var(--radius-pill); font:var(--weight-medium) var(--text-xs)/1 var(--asubk-font); white-space:nowrap; }
.badge.draft{ color:var(--text-muted); background:var(--asubk-gray-150); }
.badge.active{ color:var(--status-success); background:var(--status-success-bg); }
.badge.archived{ color:var(--text-disabled); background:var(--asubk-gray-200); }
.badge.info{ color:var(--status-info); background:var(--status-info-bg); }

/* ---- Task 5: nav groups + items ---- */
.nav-grp-label{ display:flex; align-items:center; gap:8px; width:calc(100% - 8px);
  margin:0 4px 1px; padding:9px 10px; background:none; border:0; cursor:pointer;
  text-align:left; font:var(--weight-medium) var(--text-sm)/1.2 var(--asubk-font);
  color:var(--text-body); border-radius:var(--radius-md); }
.nav-grp-label span:first-child{ flex:1; }
.nav-grp-count{ flex:none; min-width:22px; height:20px; padding:0 7px; display:inline-flex;
  align-items:center; justify-content:center; border-radius:var(--radius-pill);
  background:var(--asubk-gray-200); color:var(--text-muted);
  font:var(--weight-semibold) var(--text-xs)/1 var(--asubk-font); }
.nav-group.active > .nav-grp-label .nav-grp-count{ background:var(--asubk-blue); color:#fff; }
.nav-grp-label:hover{ color:var(--text-body); }
.nav-grp-label:focus-visible{ outline:none; box-shadow:var(--shadow-focus); }
/* активная (выбранная) группа: подсветка + заливка, как у nav-item.active */
.nav-group.active > .nav-grp-label{ color:var(--asubk-blue); background:var(--asubk-nav-active); }

/* ---- Task 3: render-engine additions ---- */
.arch-chip{ font:600 12px/1 var(--asubk-font); padding:3px 7px; border-radius:var(--radius-pill);
  background:var(--asubk-blue-tint); color:var(--asubk-link); }
.arch-chip.r{ background:var(--asubk-green-tint); color:var(--asubk-green); }
.slug{ font:400 13px/1 ui-monospace,monospace; color:var(--text-muted); }
.row-count{ margin-left:auto; font:var(--font-label); color:var(--text-muted); }
.badge.success{ background:var(--status-success-bg); color:var(--status-success); }
.badge.warning{ background:var(--status-warning-bg); color:var(--status-warning); }
.badge.error{ background:var(--status-error-bg); color:var(--status-error); }
.empty-note{ padding:14px 16px; color:var(--text-muted); border:1px dashed var(--border-default);
  border-radius:var(--radius-md); }

/* ---- Task 7: picker ---- */
.picker-row{display:flex;gap:8px;padding:8px;border-bottom:1px solid var(--border-default);cursor:pointer}
.picker-note{font:var(--font-label);color:var(--text-muted);margin:4px 0}

/* ---- field-card: справочник как picker-поле формы (1:1 как в системе) ---- */
.grp{ display:flex; flex-direction:column; gap:10px; }
.grp-head{ margin:8px 0 2px; font:var(--weight-semibold) var(--text-sm)/1.2 var(--asubk-font);
  color:var(--text-muted); letter-spacing:0.02em; text-transform:uppercase; }
.field-card{ background:#fff; border:1px solid var(--border-default); border-radius:var(--radius-lg);
  padding:16px 18px; display:flex; align-items:center; gap:16px; flex:none; }
.field-card .fc-label{ flex:0 0 220px; padding-top:0; color:var(--asubk-link);
  font:14px/1.3 var(--asubk-font); }
.field-card .jx-pickfield{ flex:1; max-width:620px; }
.field-card .fc-meta{ flex:none; font:var(--font-label); color:var(--text-muted); white-space:nowrap; }

/* ---- Task 6: modal ---- */
.modal-overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.42); display:flex;
  align-items:center; justify-content:center; z-index:50; padding:20px; }
.modal{ background:var(--surface-card); border-radius:var(--radius-lg); width:min(540px,100%);
  max-height:86vh; display:flex; flex-direction:column;
  box-shadow:0 20px 60px rgba(16,28,46,0.35); }
.modal-head{ padding:16px 20px; border-bottom:1px solid var(--border-default);
  font:var(--font-page-title); color:var(--text-heading); }
.modal-body{ padding:18px 20px; overflow:auto; display:flex; flex-direction:column; gap:12px; }
.modal-foot{ padding:14px 20px; border-top:1px solid var(--border-default);
  display:flex; gap:10px; justify-content:flex-end; }
.field{ display:flex; flex-direction:column; gap:4px; }
.field label{ font:var(--weight-medium) var(--text-sm)/var(--leading-snug) var(--asubk-font);
  color:var(--text-muted); }
.field input{ height:var(--control-h); padding:0 10px; border:1px solid var(--border-default);
  border-radius:var(--radius-md); font:var(--font-body); color:var(--text-body);
  background:var(--surface-card); outline:none;
  transition:border-color 120ms ease, box-shadow 120ms ease; }
.field input:focus{ border-color:var(--border-focus); box-shadow:var(--shadow-focus); }
.field input[readonly]{ background:var(--asubk-gray-100); color:var(--text-muted); cursor:default; }

/* ─────────────────────────────────────────────────────────────────────────
   Jmix/Lumo 1:1 reproduction (prefix .jx-) — НЕ дизайн-система ASUBK.
   Воспроизводит фактический вид online-системы (скрины 09-16-36 / 09-16-48):
   форма-источник «Решение правительства» + полный CRUD picker «Вид решения».
   Цвета подобраны под скрины (Lumo), gov-blue токены здесь сознательно НЕ
   используются. Это демо «как сейчас в системе» (дефект P2-08 / P2-R9 / P8-02).
   ───────────────────────────────────────────────────────────────────────── */
/* ТОЧНЫЕ значения сняты с computed-стилей живого диалога (2026-06-25, gov-decisions/new) */
.jx{ --jx-blue:#006AF5; --jx-blue-hover:#0058CC; --jx-link:#005FDB; --jx-green:#158443; --jx-green-hover:#106a36;
  --jx-ink:rgba(24,39,57,0.94); --jx-title:#192434; --jx-muted:rgba(24,39,57,0.65);
  --jx-line:rgba(28,55,90,0.16); --jx-rowline:rgba(26,57,96,0.10); --jx-fieldbg:rgba(26,57,96,0.10);
  --jx-dis-fill:rgba(25,59,103,0.05); --jx-dis-fg:rgba(28,52,84,0.26); --jx-sel-btn:rgba(28,52,84,0.26);
  --jx-font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif; }

/* демо-callout-обёртка */
.jx-demo{ border:1px solid var(--jx-line); border-radius:var(--radius-lg); overflow:hidden;
  flex:none; align-self:flex-start; width:33%; min-width:340px; }
.jx-demo-tag{ display:flex; align-items:center; gap:8px; padding:10px 14px;
  background:var(--status-warning-bg); color:var(--status-warning);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); border-bottom:1px solid var(--jx-line); }

/* форма-источник */
.jx-form{ background:#fff; padding:20px 18px; font:14px/1.4 var(--jx-font); color:var(--jx-ink);
  display:flex; flex-direction:column; gap:14px; }
.jx-form-row{ display:flex; align-items:flex-start; gap:14px; }
.jx-label{ flex:0 0 110px; padding-top:8px; color:var(--jx-link); font:14px/1.3 var(--jx-font); }
.jx-control{ flex:1; min-width:0; display:flex; gap:6px; }
.jx-input{ flex:1; min-width:0; height:34px; padding:0 10px; border:1px solid var(--jx-line);
  border-radius:4px; background:#fff; color:var(--jx-ink); font:14px/1 var(--jx-font); outline:none; }
.jx-input:focus{ border-color:var(--jx-focus); box-shadow:0 0 0 2px rgba(74,144,226,0.25); }
.jx-input.ro{ background:var(--jx-fieldbg); color:var(--jx-ink); }
.jx-input.ro:focus{ box-shadow:none; border-color:var(--jx-line); }
/* picker-поле (live): фон rgba(26,57,96,.1), радиус 4, высота 36; ···/✕ — 30×30 кнопки
   с заливкой rgba(25,59,103,.05) и синей иконкой #005FDB, внутри поля справа */
.jx-pickfield{ flex:1; min-width:0; display:flex; align-items:center; gap:2px; height:36px;
  border:0; border-radius:4px; background:var(--jx-fieldbg); padding:0 3px 0 0; overflow:hidden; }
.jx-pf-input{ flex:1; min-width:0; border:0; background:transparent; height:100%; padding:0 4px 0 10px;
  color:var(--jx-ink); font:500 16px/1 var(--jx-font); outline:none; }
.jx-pf-dots,.jx-pf-x{ flex:none; width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center;
  border:0; border-radius:4px; background:var(--jx-dis-fill); color:var(--jx-link);
  cursor:pointer; font:500 16px/1 var(--jx-font); letter-spacing:1px; }
.jx-pf-dots:hover,.jx-pf-x:hover{ background:rgba(25,59,103,0.10); }

/* picker-диалог */
.modal.jx-dlg{ width:min(1024px,100%); background:#fff; font:16px/1.625 var(--jx-font); color:var(--jx-ink);
  border-radius:8px;
  box-shadow:0 0 0 1px rgba(25,59,103,0.05), 0 4px 24px -3px rgba(28,55,90,0.16), 0 18px 64px -8px rgba(28,50,79,0.38); }
.jx-dlg-head{ display:flex; align-items:center; padding:18px 22px 6px;
  font:600 22px/1.375 var(--jx-font); color:var(--jx-title); }
.jx-dlg-x{ margin-left:auto; width:28px; height:28px; border:0; background:none; cursor:pointer;
  font-size:20px; color:var(--jx-title); line-height:1; }
.jx-dlg-body{ padding:6px 22px 4px; overflow:auto; display:flex; flex-direction:column; gap:12px; }
.jx-filter-head{ display:flex; align-items:center; gap:6px; color:var(--jx-muted);
  font:16px/1 var(--jx-font); cursor:pointer; padding:6px 0; }
.jx-filter-head svg{ flex:none; }
.jx-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.jx-btn{ height:36px; padding:0 14px; display:inline-flex; align-items:center; gap:6px;
  border:1px solid transparent; border-radius:4px; cursor:pointer; white-space:nowrap;
  font:500 16px/1.625 var(--jx-font); }
.jx-btn.refresh{ background:var(--jx-green); color:#fff; border-radius:4px 0 0 4px; }
.jx-btn.refresh:hover{ background:var(--jx-green-hover); }
.jx-split{ height:36px; width:34px; display:inline-flex; align-items:center; justify-content:center;
  background:var(--jx-green); color:#fff; border:0; border-left:1px solid rgba(255,255,255,0.3);
  border-radius:0 4px 4px 0; cursor:pointer; margin-left:-10px; font-size:11px; }
.jx-split:hover{ background:var(--jx-green-hover); }
.jx-gear{ height:36px; width:42px; padding:0 9px; display:inline-flex; align-items:center; justify-content:center;
  background:var(--jx-dis-fill); border:0; border-radius:4px; cursor:pointer; color:var(--jx-link); }
.jx-gear:hover{ background:rgba(25,59,103,0.10); }
.jx-link{ background:none; border:0; color:var(--jx-link); cursor:pointer; font:500 16px/1.625 var(--jx-font); padding:0 6px; }
.jx-link:hover{ text-decoration:underline; }
.jx-btn.create,.jx-btn.select{ background:var(--jx-blue); color:#fff; font-weight:600; }
.jx-btn.create:hover:not(:disabled),.jx-btn.select:hover:not(:disabled){ background:var(--jx-blue-hover); }
/* tertiary (Изменить/Удалить/Отмена): светлая заливка rgba(25,59,103,.05) */
.jx-btn.edit,.jx-btn.del{ background:var(--jx-dis-fill); color:var(--jx-ink); }
.jx-btn.edit:hover:not(:disabled),.jx-btn.del:hover:not(:disabled){ background:rgba(25,59,103,0.10); }
.jx-btn.cancel{ background:var(--jx-dis-fill); color:var(--jx-link); }
.jx-btn.cancel:hover{ background:rgba(25,59,103,0.10); }

  'agreement-templates':'prog7','agreement-template-codes':'prog7','document-check-levels':'prog7',
  // 02 · Программа · вкл.8 — залог
  'collateralTypes':'prog8',
  // 02–03 · Субъекты — сотрудники, комиссии, физ/юр лица
  'employees':'subj','commissions':'subj','individuals':'subj','organizations':'subj',
  // 04 · Заёмщик и отрасли
  'borrower-groups':'borrower','debtor-types':'borrower','organization-forms':'borrower',
  'work-sectors':'borrower','loan-payment-capacity-groups':'borrower','industryDirections':'borrower',
  // 05 · Кредит
  'loan-types':'loan','loan-termses':'loan','creditTerms':'loan','calculationCoefficients':'loan',
  'loan-states':'loan','loan-type-repayment-accounts':'loan','loan-redemption-accounts':'loan',
  // 06–07 · График, погашения, товары/счета
  'installment-states':'sched','payment-types':'sched','good-types':'sched',
  'destination-accounts':'sched','payment-purpose-requisites':'sched',
};
// справочники без собственного пункта меню — открываются только picker-ом из формы (§2.1)
const PICKER_ONLY = new Set(['loan-credit-purposes','document-check-levels','interest-calc-types']);
// Доп. членство: общий справочник = picker-поле нескольких страниц. Эти 6 — picker-поля
// вкл.1 (live 2026-06-25), но primary-дом в 04/05/субъектах. Показываем в обеих корзинах.
const SHARED = {
  'loan-types':['prog1'], 'industryDirections':['prog1'], 'loan-type-repayment-accounts':['prog1'],
  'individuals':['prog1'], 'organizations':['prog1'], 'employees':['prog1'],
};
DICTS.forEach(d=>{
  d.group = PAGE[d.route] || d.group;                          // primary-корзина
  d.groups = [...new Set([d.group, ...(SHARED[d.route]||[])])]; // все корзины-потребители
  d.pickerOnly = PICKER_ONLY.has(d.route);
});

const cellHTML = (d,c,ci) => (d.statusDict || isStatusCol(d.columns[ci])) ? `<td>${badge(c)}</td>` : `<td>${esc(c)}</td>`;

function sectionHTML(d){
  const locFlag = d.loc ? ` <span class="badge warning" title="Заголовки колонок — сырые java-property-пути (дефект локализации)">loc</span>` : '';
  const head = `<div class="section-head">
    <h2>${esc(d.title)}</h2>
    <span class="arch-chip ${d.archetype==='R'?'r':''}">${d.archetype}</span>${locFlag}
    <span class="slug">${d.route}</span>
    <span class="row-count">${d.note || (d.total+' строк')}</span></div>`;
  // «Просмотр» существует только у архетипа R (live, §3 ТЗ); S-словари — без просмотра.
  const viewBtn = d.archetype==='R' ? `<button class="btn" data-act="view">Просмотр</button>` : '';
  const toolbar = d.group==='picker'
    ? `<div class="toolbar"><button class="btn" data-act="picker">Открыть как picker</button>
    <div class="picker-note">Доступен только из формы (picker-диалог)</div></div>`
    : `<div class="toolbar">
    <button class="btn primary" data-act="create">Создать</button>
    <button class="btn" data-act="edit">Изменить</button>
    ${viewBtn}
    <button class="btn danger" data-act="delete">Удалить</button>
    <button class="btn ghost" data-act="filter">+ Добавить условие поиска</button>
    <span class="tb-spacer"></span>
    <button class="btn ghost" data-act="jmix" title="1:1 как в действующей системе (Jmix-диалог)">Открыть как в системе</button></div>`;
  let grid;
  if(!d.rows.length){ grid = `<div class="empty-note">Справочник не наполнен</div>`; }
  else {
    const th = d.columns.map(c=>`<th>${esc(c)}</th>`).join('');
    const tr = d.rows.map((r,i)=>`<tr data-i="${i}">`+
      r.map((c,ci)=> cellHTML(d,c,ci)).join('')
      +`</tr>`).join('');
    grid = `<div class="grid-wrap"><table class="grid"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div>`;
  }
  return `<section class="section" id="sec-${d.route}" data-route="${d.route}">${head}${toolbar}${grid}</section>`;
}
// ── nav-группы (используются и витриной карточек, и сайдбаром) ──────────────
// Группы = страница/вкладка-потребитель (08-spravochniki.md §2.1), в порядке жизненного цикла.
const GROUPS = [
  {id:'dec',     label:'01 · Госрешение — статус + вид решения'},
  {id:'docs',    label:'Классификаторы вне формы (документы, пакеты, списки получателей)'},
  {id:'prog1',   label:'02 · Программа · вкл.1 — основные данные (picker-поля формы)'},
  {id:'prog3',   label:'02 · Программа · вкл.3 — ставки'},
  {id:'prog6',   label:'02 · Программа · вкл.6 — платежи и расчёты'},
  {id:'prog7',   label:'02 · Программа · вкл.7 — договоры'},
  {id:'prog8',   label:'02 · Программа · вкл.8 — залог'},
  {id:'subj',    label:'02–03 · Субъекты: сотрудники, комиссии, лица'},
  {id:'borrower',label:'04 · Заёмщик и отрасли'},
  {id:'loan',    label:'05 · Кредит'},
  {id:'sched',   label:'06–07 · График, погашения, товары/счета'},
];

// ── Витрина: каждый справочник = picker-поле формы (1:1 как в системе) ──────
// Поле «Вид решения» на скрине = образец. ··· открывает 1:1 Jmix-CRUD-диалог
// со снятыми с live колонками/строками; ✕ очищает поле.
function fieldCardHTML(d){
  const meta = `${d.archetype} · ${d.route} · ${d.note || (d.total+' строк')}${d.loc?' · loc':''}${d.pickerOnly?' · picker-only (нет в меню)':''}`;
  return `<div class="jx field-card section" id="sec-${d.route}" data-route="${d.route}">
    <label class="fc-label">${esc(d.title)}</label>
    <div class="jx-pickfield">
      <input class="jx-pf-input" readonly>
      <button type="button" class="jx-pf-dots" data-pick title="Выбрать">···</button>
      <button type="button" class="jx-pf-x" data-clear title="Очистить">✕</button>
    </div>
    <span class="fc-meta">${esc(meta)}</span>
  </div>`;
}
function renderSections(){
  const list=document.getElementById('dict-list');
  list.innerHTML = GROUPS.map(g=>{
    const cards = DICTS.filter(d=>d.groups.includes(g.id)).map(fieldCardHTML).join('');
    return `<div class="grp" data-grp="${g.id}"><h3 class="grp-head">${esc(g.label)}</h3>${cards}</div>`;
  }).join('');
  document.getElementById('topbar-count').textContent = DICTS.length+' справочников';
  list.querySelectorAll('.field-card').forEach(card=>{
    const route=card.dataset.route, input=card.querySelector('.jx-pf-input');
    card.querySelector('[data-pick]').onclick=()=>openJmixPicker(route, v=>input.value=v);
    card.querySelector('[data-clear]').onclick=()=>input.value='';
  });
}
renderSections();
function renderNav(){
  const nav=document.getElementById('nav');
  // сайдбар — только группы справочников (без отдельных пунктов)
  nav.innerHTML=GROUPS.map(g=>{
    const n=DICTS.filter(d=>d.groups.includes(g.id)).length;
    return `<div class="nav-group" data-grp="${g.id}">
      <button type="button" class="nav-grp-label">
        <span>${esc(g.label)}</span><span class="nav-grp-count">${n}</span></button></div>`;
  }).join('');
  // клик по группе = выбрать её
  nav.querySelectorAll('.nav-grp-label').forEach(btn=>btn.addEventListener('click',()=>{
    applyGroup(btn.closest('.nav-group').dataset.grp);
  }));
}
renderNav();

// ── выбор группы: в main видна только выбранная группа, остальные скрыты ──────
let activeGroup = GROUPS[0].id;
function applyGroup(gid){
  activeGroup = gid;
  // main — показываем карточки только выбранной группы
  document.querySelectorAll('#dict-list .grp').forEach(g=>{
    g.style.display = g.dataset.grp===gid ? '' : 'none';
  });
  // nav — подсвечиваем выбранную группу
  document.querySelectorAll('#nav .nav-group').forEach(g=>{
    g.classList.toggle('active', g.dataset.grp===gid);
  });
  const grp = GROUPS.find(x=>x.id===gid);
  const n = DICTS.filter(d=>d.groups.includes(gid)).length;
  document.getElementById('topbar-count').textContent = (grp?grp.label+' · ':'')+n+' справочников';
}
applyGroup(activeGroup);

// ── Task 6: shared modal (view/edit/create) + delete + row select ──────────
let selected={}; // route -> rowIndex
function openModal(route,mode,i){
  const d=DICTS.find(x=>x.route===route);
  const row = (i!=null && d.rows[i]) || d.columns.map(()=> '');
  const ro = mode==='view';
  const fields=d.columns.map((c,ci)=>`<div class="field"><label>${esc(c)}</label>
    <input value="${esc(row[ci])}" ${ro?'readonly':''}></div>`).join('');
  const title={view:'Просмотр',edit:'Изменить',create:'Создать'}[mode]+' — '+esc(d.title);
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay">
    <div class="modal"><div class="modal-head">${esc(title)}</div>
    <div class="modal-body">${fields}</div>
    <div class="modal-foot">${ro?'':'<button class="btn primary" data-m="save">Сохранить</button>'}
      <button class="btn" data-m="close">${ro?'Закрыть':'Отмена'}</button></div></div></div>`;
  const close=()=>document.getElementById('modal-root').innerHTML='';
  document.querySelector('[data-m="close"]').onclick=close;
  const save=document.querySelector('[data-m="save"]'); if(save) save.onclick=close;
}

// mono line-иконки (currentColor) — как в Vaadin/Lumo (gray в disabled, blue gear)
const SVG={
  gear:'<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>',
  pencil:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>',
  trash:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>',
  chevDown:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  sort:'<svg width="11" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 9 12 5 16 9"/><polyline points="8 15 12 19 16 15"/></svg>',
};

// Jmix-picker 1:1 (полный CRUD-диалог как в online). Работает с локальной копией
// строк (data) — Удалить/Создать в диалоге не трогают грид витрины.
function openJmixPicker(route, onPick){
  const d=DICTS.find(x=>x.route===route);
  const data=d.rows.map(r=>r.slice()); // локальная копия
  let sel=null; // индекс выбранной строки

  const root=document.getElementById('modal-root');
  const close=()=>{ root.innerHTML=''; };

  function gridHTML(){
    const th=d.columns.map(c=>`<th>${esc(c)} <span class="sort">${SVG.sort}</span></th>`).join('');
    const tr=data.length
      ? data.map((r,i)=>`<tr data-i="${i}"${i===sel?' class="sel"':''}>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')
      : `<tr><td colspan="${d.columns.length}" style="color:#9aa6b2">нет значений</td></tr>`;
    return `<table class="jx-grid"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
  }
  function render(){
    const hasSel=sel!=null;
    root.innerHTML=`<div class="modal-overlay"><div class="modal jx jx-dlg">
      <div class="jx-dlg-head"><span>${esc(d.title)}</span><button class="jx-dlg-x" data-m="close">✕</button></div>
      <div class="jx-dlg-body">
        <div class="jx-filter-head">${SVG.chevDown} Фильтр</div>
        <div class="jx-row">
          <button class="jx-btn refresh">Обновить</button><button class="jx-split">▼</button>
          <button class="jx-gear">${SVG.gear}</button>
          <button class="jx-link">Добавить условие поиска</button>
        </div>
        <div class="jx-row">
          <button class="jx-btn create" data-m="create">+ Создать</button>
          <button class="jx-btn edit" data-m="edit" ${hasSel?'':'disabled'}>${SVG.pencil} Изменить</button>
          <button class="jx-btn del" data-m="del" ${hasSel?'':'disabled'}>${SVG.trash} Удалить</button>
          <span class="jx-pager"><button>«</button><button>‹</button><span class="jx-count">${data.length} строк</span><button>›</button><button>»</button></span>
        </div>
        <div class="jx-grid-wrap">${gridHTML()}</div>
      </div>
      <div class="jx-dlg-foot">
        <button class="jx-btn select" data-m="ok" ${hasSel?'':'disabled'}>✓ Выбрать</button>
        <button class="jx-btn cancel" data-m="close">⊘ Отмена</button>
      </div></div></div>`;

    root.querySelectorAll('[data-m="close"]').forEach(b=>b.onclick=close);
    root.querySelector('[data-m="ok"]').onclick=()=>{ if(sel==null) return;
      if(onPick) onPick(data[sel].join(' ')); close(); };
    root.querySelector('[data-m="create"]').onclick=()=>openRecordForm(null);
    root.querySelector('[data-m="edit"]').onclick=()=>{ if(sel!=null) openRecordForm(sel); };
    root.querySelector('[data-m="del"]').onclick=()=>{ if(sel!=null){ data.splice(sel,1); sel=null; render(); } };
    root.querySelectorAll('tr[data-i]').forEach(tr=>{
      tr.onclick=()=>{ sel=+tr.dataset.i; render(); };
      tr.ondblclick=()=>{ sel=+tr.dataset.i; if(onPick) onPick(data[sel].join(' ')); close(); };
    });
  }
  // минимальная Jmix-форма записи (Создать/Изменить) — показывает полный CRUD
  function openRecordForm(i){
    const row = i!=null ? data[i] : d.columns.map(()=> '');
    const fields=d.columns.map((c,ci)=>`<div class="jx-form-row"><label class="jx-label">${esc(c)}</label>
      <div class="jx-control"><input class="jx-input" data-ci="${ci}" value="${esc(row[ci])}"></div></div>`).join('');
    root.innerHTML=`<div class="modal-overlay"><div class="modal jx jx-dlg" style="width:min(640px,100%)">
      <div class="jx-dlg-head"><span>${i!=null?'Изменить':'Создать'} — ${esc(d.title)}</span>
        <button class="jx-dlg-x" data-m="back">✕</button></div>
      <div class="jx-dlg-body"><form class="jx-form" onsubmit="return false">${fields}</form></div>
      <div class="jx-dlg-foot"><button class="jx-btn select" data-m="save">Сохранить</button>
        <button class="jx-btn cancel" data-m="back">Отмена</button></div></div></div>`;
    const back=()=>render();
    root.querySelectorAll('[data-m="back"]').forEach(b=>b.onclick=back);
    root.querySelector('[data-m="save"]').onclick=()=>{
      const vals=[...root.querySelectorAll('input[data-ci]')].map(inp=>inp.value);
      if(i!=null) data[i]=vals; else { data.push(vals); sel=data.length-1; }
      render();
    };
  }
  render();
}

document.getElementById('dict-list').addEventListener('click',e=>{
  const btn=e.target.closest('[data-act]'); if(!btn) return;
  const route=btn.closest('.section').dataset.route;
  const act=btn.dataset.act;
  if(act==='picker'||act==='jmix') return openJmixPicker(route);
  if(act==='create') return openModal(route,'create',null);
  if(act==='filter') return btn.closest('.section').querySelector('.grid')?.classList.toggle('filtering'); // демо
  const i=selected[route];
  if(act==='view'||act==='edit'){ if(i==null) return alert('Выберите строку'); return openModal(route,act,i); }
  if(act==='delete'){ if(i==null) return alert('Выберите строку');
    if(confirm('Удалить запись?')){ const tr=document.querySelector('#sec-'+route+' tr[data-i="'+i+'"]'); tr&&tr.remove(); selected[route]=null; } }
});
// выбор строки + двойной клик → Просмотр
document.getElementById('dict-list').addEventListener('click',e=>{
  const tr=e.target.closest('tr[data-i]'); if(!tr) return;
  const route=tr.closest('.section').dataset.route;
  tr.closest('tbody').querySelectorAll('tr.sel').forEach(x=>x.classList.remove('sel'));
  tr.classList.add('sel'); selected[route]=+tr.dataset.i;
});
document.getElementById('dict-list').addEventListener('dblclick',e=>{
  const tr=e.target.closest('tr[data-i]'); if(!tr) return;
  openModal(tr.closest('.section').dataset.route,'view',+tr.dataset.i);
});

// data-i is the frozen index into d.rows; never call renderSections() mid-session or indices desync
document.getElementById('nav-filter').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  const hitFn=d=>d.title.toLowerCase().includes(q)||d.route.toLowerCase().includes(q);
  DICTS.forEach(d=>{
    // карточка общего справочника может присутствовать в нескольких группах — тогглим все
    document.querySelectorAll('#dict-list [data-route="'+d.route+'"]').forEach(el=>{
      el.style.display=hitFn(d)?'':'none';
    });
  });
  // сайдбар: при фильтре показываем только группы с совпадениями, иначе все
  document.querySelectorAll('#nav .nav-group').forEach(g=>{
    g.style.display = q==='' ? '' : (DICTS.some(d=>d.groups.includes(g.dataset.grp) && hitFn(d)) ? '' : 'none');
  });
  // прячем пустые группы карточек в витрине
  document.querySelectorAll('#dict-list .grp').forEach(g => {
    const visible = [...g.querySelectorAll('.field-card')].some(c => c.style.display !== 'none');
    g.style.display = visible ? '' : 'none';
  });
  // фильтр пуст — возвращаем вид «только выбранная группа»
  if(q==='') applyGroup(activeGroup);
});
</script>
