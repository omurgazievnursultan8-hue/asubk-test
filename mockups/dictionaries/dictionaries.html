<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Справочники · АСУБК</title>
<!--
  MOCKUP (single-file, static) — образец для команды разработки, не прод-код.
  Раздел «Справочники» (витрина справочников).
  Дизайн-система: токены скопированы из mockups/loan-program/loan-program.html (:root, строки 37-180).

  Цель файла: показать раскладку sidebar + main (топбар, пустая область списка) и набор
  CSS-классов (.section, .section-head, .arch-chip, .slug, .row-count, .nav-filter, .grid, .badge),
  готовых к наполнению данными в следующих задачах.

  Переиспользуется из loan-program.html:
    - все переменные :root (--asubk-*, --text-*, --space-*, --radius-*, --control-h,
      --header-h, --sidebar-w, --shadow-focus)
    - базовые правила: *, html/body, .app, .sidebar, .brand, .nav, .main, .topbar,
      .crumb-title, .crumb-status, scrollbar
    - компонентные классы: .btn*, .toolbar, .badge, .grid (table)
-->
<style>
:root{
  --asubk-blue:#006AF5; --asubk-blue-hover:#0058CC; --asubk-blue-active:#0049A8;
  --asubk-link:#005FDB; --asubk-green:#158443; --asubk-green-hover:#106A36;
  --asubk-red:#E03A3A; --asubk-red-hover:#C42E2E;
  --asubk-ink:#192434;
  --asubk-ink-90:rgba(24,39,57,0.94); --asubk-ink-65:rgba(24,39,57,0.65);
  --asubk-ink-45:rgba(24,39,57,0.45); --asubk-ink-26:rgba(28,52,84,0.26);
  --asubk-white:#FFFFFF; --asubk-gray-50:#F8F9FB; --asubk-gray-100:#F5F7FA;
  --asubk-gray-150:#EFF1F4; --asubk-gray-200:#E4E8EE;
  --asubk-border-base:rgba(28,55,90,0.16); --asubk-border-strong:rgba(28,55,90,0.30);
  --asubk-blue-tint:rgba(0,106,245,0.08); --asubk-nav-active:rgba(51,139,255,0.13);
  --asubk-disabled-fill:rgba(25,59,103,0.05); --asubk-red-tint:#FCE6E6;
  --asubk-green-tint:rgba(21,132,67,0.10); --asubk-amber:#B8860B; --asubk-amber-tint:rgba(184,134,11,0.12);
  --text-body:var(--asubk-ink-90); --text-heading:var(--asubk-ink); --text-muted:var(--asubk-ink-65);
  --text-placeholder:var(--asubk-ink-45); --text-disabled:var(--asubk-ink-26); --text-link:var(--asubk-link);
  --surface-page:var(--asubk-white); --surface-panel:var(--asubk-gray-100); --surface-sidebar:var(--asubk-gray-150);
  --surface-card:var(--asubk-white); --surface-input:var(--asubk-gray-200); --surface-hover:var(--asubk-gray-50);
  --border-default:var(--asubk-border-base); --border-strong:var(--asubk-border-strong); --border-focus:var(--asubk-blue);
  --action-primary:var(--asubk-blue); --action-primary-hover:var(--asubk-blue-hover);
  --action-success:var(--asubk-green); --action-danger:var(--asubk-red);
  --status-success:var(--asubk-green); --status-success-bg:var(--asubk-green-tint);
  --status-info:var(--asubk-blue); --status-info-bg:var(--asubk-blue-tint);
  --status-warning:var(--asubk-amber); --status-warning-bg:var(--asubk-amber-tint);
  --status-error:var(--asubk-red); --status-error-bg:var(--asubk-red-tint);
  --asubk-font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif;
  --text-xs:12px; --text-sm:14px; --text-base:16px; --text-lg:18px;
  --weight-regular:400; --weight-medium:500; --weight-semibold:600; --weight-bold:700;
  --leading-tight:1.2; --leading-snug:1.35; --leading-normal:1.5;
  --font-body:var(--weight-regular) var(--text-base)/var(--leading-normal) var(--asubk-font);
  --font-label:var(--weight-regular) var(--text-sm)/var(--leading-snug) var(--asubk-font);
  --font-page-title:var(--weight-semibold) var(--text-lg)/var(--leading-tight) var(--asubk-font);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:24px; --space-6:32px;
  --radius-sm:3.5px; --radius-md:4px; --radius-lg:8px; --radius-pill:999px;
  --control-h:36px; --header-h:56px; --sidebar-w:320px;
  --shadow-focus:0 0 0 2px rgba(0,106,245,0.35);
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font:var(--font-body); color:var(--text-body); background:var(--surface-page); }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:rgba(28,55,90,0.22); border-radius:6px; }
a{ color:inherit; }

.app{ display:flex; height:100vh; width:100%; }

/* ---- sidebar ---- */
.sidebar{ width:var(--sidebar-w); flex:none; background:var(--surface-sidebar);
  display:flex; flex-direction:column; border-right:1px solid var(--border-default); }
.brand{ padding:18px 16px 14px; font:var(--weight-semibold) 17px/1.2 var(--asubk-font);
  color:var(--text-heading); letter-spacing:0.04em; }
.nav{ flex:1; overflow-y:auto; padding-bottom:8px; }

/* ---- nav-filter (поле фильтрации справочников в sidebar) ---- */
.nav-filter{
  display:block; width:calc(100% - 24px); margin:0 12px 8px;
  height:var(--control-h); padding:0 var(--space-2);
  background:var(--surface-card); color:var(--text-body);
  border:1px solid var(--border-default); border-radius:var(--radius-md);
  font:var(--font-label); outline:none;
  transition:border-color 120ms ease, box-shadow 120ms ease;
}
.nav-filter::placeholder{ color:var(--text-placeholder); }
.nav-filter:focus{ border-color:var(--border-focus); box-shadow:var(--shadow-focus); }

/* ---- main ---- */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--surface-page); }
.topbar{ height:var(--header-h); flex:none; background:var(--surface-page);
  border-bottom:1px solid var(--border-default); display:flex; align-items:center; gap:14px; padding:0 20px; }
.crumb-title{ font:var(--font-page-title); color:var(--text-heading); }
.crumb-status{ margin-left:auto; font:var(--font-label); color:var(--text-muted); }

/* ---- dict-list (список секций справочников) ---- */
.dict-list{ padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-6);
  flex:1; overflow-y:auto; }

/* ---- section (карточка одного справочника или группы) ---- */
.section{ background:var(--surface-card); border:1px solid var(--border-default);
  border-radius:var(--radius-lg); overflow:hidden; }
.section-head{ display:flex; align-items:center; gap:10px; padding:14px 16px;
  border-bottom:1px solid var(--border-default); background:var(--surface-panel); }
.section-head h2{ margin:0; font:var(--weight-semibold) var(--text-base)/var(--leading-tight) var(--asubk-font);
  color:var(--text-heading); flex:1; }

/* ---- arch-chip (пометка «Архивный») ---- */
.arch-chip{ display:inline-flex; align-items:center; height:20px; padding:0 var(--space-2);
  border-radius:var(--radius-pill); background:var(--asubk-gray-200); color:var(--text-muted);
  font:var(--weight-medium) var(--text-xs)/1 var(--asubk-font); white-space:nowrap; }

/* ---- slug (технический идентификатор справочника) ---- */
.slug{ font:var(--weight-regular) var(--text-xs)/1 var(--asubk-font);
  color:var(--text-placeholder); font-family:monospace, monospace; }

/* ---- row-count (счётчик записей) ---- */
.row-count{ font:var(--weight-regular) var(--text-xs)/1 var(--asubk-font);
  color:var(--text-muted); margin-left:auto; }

/* ---- toolbar (панель действий над справочником) ---- */
.toolbar{ display:flex; align-items:center; gap:var(--space-2); padding:12px 20px;
  border-bottom:1px solid var(--border-default); flex-wrap:wrap; }
.tb-spacer{ flex:1; }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);
  height:var(--control-h); padding:0 14px; border:1px solid transparent; border-radius:var(--radius-md);
  font:var(--weight-semibold) var(--text-sm)/1 var(--asubk-font); cursor:pointer; white-space:nowrap; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn svg{ flex:none; }
.btn-primary{ background:var(--action-primary); color:#fff; }
.btn-primary:hover:not(:disabled){ background:var(--action-primary-hover); }
.btn-secondary{ background:var(--surface-card); color:var(--text-body); border-color:var(--border-default); }
.btn-secondary:hover:not(:disabled){ background:var(--surface-hover); }
.btn-danger{ background:var(--surface-card); color:var(--action-danger); border-color:var(--border-default); }
.btn-danger:hover:not(:disabled){ background:var(--status-error-bg); }
.btn-sm{ height:32px; padding:0 10px; font-size:var(--text-sm); }
/* space-separated two-class convention used by render engine */
.btn.primary{ background:var(--action-primary); color:#fff; }
.btn.primary:hover:not(:disabled){ background:var(--action-primary-hover); }
.btn.ghost{ background:rgba(25,59,103,0.05); color:var(--text-link); border-color:var(--border-default); }
.btn.ghost:hover:not(:disabled){ background:var(--surface-hover); color:var(--text-body); }

/* ---- grid (таблица записей справочника) ---- */
.grid-wrap{ overflow-x:auto; }
table.grid{ width:100%; border-collapse:collapse; font:var(--font-label); }
table.grid thead th{ background:var(--surface-panel); text-align:left; padding:10px 12px;
  border-bottom:1px solid var(--border-strong);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); color:var(--text-heading);
  white-space:nowrap; user-select:none; }
table.grid tbody td{ padding:10px 12px; border-bottom:1px solid var(--border-default);
  color:var(--text-body); vertical-align:middle; }
table.grid tbody tr{ cursor:pointer; }
table.grid tbody tr:hover{ background:var(--surface-hover); }
table.grid tbody tr.sel{ background:var(--asubk-nav-active); }

/* ---- status badges ---- */
.badge{ display:inline-flex; align-items:center; gap:var(--space-1); height:22px; padding:0 var(--space-2);
  border-radius:var(--radius-pill); font:var(--weight-medium) var(--text-xs)/1 var(--asubk-font); white-space:nowrap; }
.badge.draft{ color:var(--text-muted); background:var(--asubk-gray-150); }
.badge.active{ color:var(--status-success); background:var(--status-success-bg); }
.badge.archived{ color:var(--text-disabled); background:var(--asubk-gray-200); }
.badge.info{ color:var(--status-info); background:var(--status-info-bg); }

/* ---- Task 3: render-engine additions ---- */
.arch-chip{ font:600 12px/1 var(--asubk-font); padding:3px 7px; border-radius:var(--radius-pill);
  background:var(--asubk-blue-tint); color:var(--asubk-link); }
.arch-chip.r{ background:var(--asubk-green-tint); color:var(--asubk-green); }
.slug{ font:400 13px/1 ui-monospace,monospace; color:var(--text-muted); }
.row-count{ margin-left:auto; font:var(--font-label); color:var(--text-muted); }
.badge.success{ background:var(--status-success-bg); color:var(--status-success); }
.badge.warning{ background:var(--status-warning-bg); color:var(--status-warning); }
.badge.error{ background:var(--status-error-bg); color:var(--status-error); }
.empty-note{ padding:14px 16px; color:var(--text-muted); border:1px dashed var(--border-default);
  border-radius:var(--radius-md); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">АСУБК · Справочники</div>
    <input id="nav-filter" class="nav-filter" placeholder="Фильтр справочников…">
    <nav id="nav" class="nav"></nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <span class="crumb-title">Справочники</span>
      <span id="topbar-count" class="crumb-status"></span>
    </header>
    <div id="dict-list" class="dict-list"></div>
  </main>
</div>
<div id="modal-root"></div>
<script>
const STATUS_KIND = { // текст статуса → класс бейджа
  'Активный':'success','Активная':'success','Действует':'success','Одобрен':'success',
  'Неактивный':'warning','Закрыт':'warning','Черновик':'info','На рассмотрении':'info','Отклонён':'error',
};
const badge = t => `<span class="badge ${STATUS_KIND[t]||'info'}">${t}</span>`;
const isStatusCol = name => /статус/i.test(name);

const DICTS = [
  { route:'loan-types', title:'Вид кредита', archetype:'S', group:'src',
    columns:['Наименование'],
    rows:[['Бюджетная ссуда'],['Бюджетный кредит'],['ЮСАИД'],['МАР'],
          ['Фонд развития регионов'],['Имущественные активы']], total:6 },
];

function sectionHTML(d){
  const head = `<div class="section-head">
    <h2>${d.title}</h2>
    <span class="arch-chip ${d.archetype==='R'?'r':''}">${d.archetype}</span>
    <span class="slug">${d.route}</span>
    <span class="row-count">${d.note || (d.total+' строк')}</span></div>`;
  const toolbar = `<div class="toolbar">
    <button class="btn primary" data-act="create">Создать</button>
    <button class="btn" data-act="edit">Изменить</button>
    <button class="btn" data-act="view">Просмотр</button>
    <button class="btn" data-act="delete">Удалить</button>
    <button class="btn ghost" data-act="filter">+ Добавить условие поиска</button></div>`;
  let grid;
  if(!d.rows.length){ grid = `<div class="empty-note">Справочник не наполнен</div>`; }
  else {
    const th = d.columns.map(c=>`<th>${c}</th>`).join('');
    const tr = d.rows.map((r,i)=>`<tr data-i="${i}">`+
      r.map((c,ci)=> isStatusCol(d.columns[ci]) ? `<td>${badge(c)}</td>` : `<td>${c}</td>`).join('')
      +`</tr>`).join('');
    grid = `<table class="grid"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table>`;
  }
  return `<section class="section" id="sec-${d.route}" data-route="${d.route}">${head}${toolbar}${grid}</section>`;
}
function renderSections(){
  document.getElementById('dict-list').innerHTML = DICTS.map(sectionHTML).join('');
  document.getElementById('topbar-count').textContent = DICTS.length+' справочников';
}
renderSections();
</script>

</body>
</html>
