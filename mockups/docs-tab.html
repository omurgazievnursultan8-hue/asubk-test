<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вкладка «Документы» (to-be) · АСУБК</title>
<!--
  НАБРОСОК вкладки «Документы» для модуля «Заявки» (to-be).
  Демонстрирует логику из рекомендаций:
   • секции комплекта, часть переключается по типу заёмщика (физ/юр);
   • полный жизненный цикл документа, а не «Загружен/Не загружен»;
   • срок действия документа (просрочка блокирует гейт);
   • waiver «Не требуется» с обязательным обоснованием;
   • многоуровневые действия по ролям (спец собирает, комиссия принимает);
   • гейт «Отправить в комиссию» с честным пересчётом готовности.
  Токены и компоненты — из loan-application.html. Не прод-код.
-->
<style>
:root{
  --asubk-blue:#006AF5; --asubk-blue-hover:#0058CC;
  --asubk-green:#158443; --asubk-green-hover:#106A36;
  --asubk-red:#E03A3A; --asubk-ink:#192434;
  --asubk-ink-90:rgba(24,39,57,0.94); --asubk-ink-65:rgba(24,39,57,0.65);
  --asubk-ink-45:rgba(24,39,57,0.45); --asubk-ink-26:rgba(28,52,84,0.26);
  --asubk-white:#FFFFFF; --asubk-gray-50:#F8F9FB; --asubk-gray-100:#F5F7FA;
  --asubk-gray-150:#EFF1F4; --asubk-gray-200:#E4E8EE;
  --asubk-border-base:rgba(28,55,90,0.16);
  --asubk-blue-tint:rgba(0,106,245,0.08);
  --asubk-disabled-fill:rgba(25,59,103,0.05); --asubk-red-tint:#FCE6E6;
  --asubk-green-tint:rgba(21,132,67,0.10); --asubk-amber:#B8860B; --asubk-amber-tint:rgba(184,134,11,0.12);
  --text-body:var(--asubk-ink-90); --text-heading:var(--asubk-ink); --text-muted:var(--asubk-ink-65);
  --text-placeholder:var(--asubk-ink-45); --text-disabled:var(--asubk-ink-26); --text-link:#005FDB;
  --surface-page:var(--asubk-white); --surface-panel:var(--asubk-gray-100);
  --surface-card:var(--asubk-white); --surface-input:var(--asubk-gray-200); --surface-hover:var(--asubk-gray-50);
  --border-default:var(--asubk-border-base); --action-primary:var(--asubk-blue); --action-primary-hover:var(--asubk-blue-hover);
  --action-success:var(--asubk-green); --action-danger:var(--asubk-red);
  --status-success:var(--asubk-green); --status-success-bg:var(--asubk-green-tint);
  --status-info:var(--asubk-blue); --status-info-bg:var(--asubk-blue-tint);
  --status-warning:var(--asubk-amber); --status-warning-bg:var(--asubk-amber-tint);
  --status-error:var(--asubk-red); --status-error-bg:var(--asubk-red-tint);
  --asubk-font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif;
  --text-xs:12px; --text-sm:14px; --text-base:16px; --text-lg:18px;
  --weight-regular:400; --weight-medium:500; --weight-semibold:600;
  --leading-tight:1.2; --leading-snug:1.35; --leading-normal:1.5;
  --font-body:var(--weight-regular) var(--text-base)/var(--leading-normal) var(--asubk-font);
  --font-label:var(--weight-regular) var(--text-sm)/var(--leading-snug) var(--asubk-font);
  --radius-md:4px; --radius-pill:999px; --control-h:36px;
}
*{ box-sizing:border-box; }
html,body{ margin:0; }
body{ font:var(--font-body); color:var(--text-body); background:var(--surface-page); }

/* ── page frame (только для превью вкладки) ── */
.frame{ max-width:1040px; margin:0 auto; }
.topbar{ height:56px; display:flex; align-items:center; gap:14px; padding:0 20px;
  border-bottom:1px solid var(--border-default); }
.crumb-title{ font:var(--weight-semibold) var(--text-lg)/1.2 var(--asubk-font); color:var(--text-heading); }
.crumb-sub{ font:var(--font-label); color:var(--text-muted); }
.demo-controls{ margin-left:auto; display:flex; align-items:center; gap:16px; }
.dc{ display:inline-flex; align-items:center; gap:6px; font:var(--font-label); color:var(--text-muted); }
.dc select{ height:28px; border:1px solid var(--border-default); border-radius:var(--radius-md);
  background:var(--surface-card); font:var(--font-label); color:var(--text-body); padding:0 6px; }
.switch{ display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
.switch input{ accent-color:var(--asubk-blue); width:15px; height:15px; }

/* ── buttons ── */
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px;
  height:var(--control-h); padding:0 14px; border:1px solid transparent; border-radius:var(--radius-md);
  font:var(--weight-semibold) var(--text-sm)/1 var(--asubk-font); cursor:pointer; white-space:nowrap; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn svg{ flex:none; }
.btn-primary{ background:var(--action-primary); color:#fff; }
.btn-primary:hover:not(:disabled){ background:var(--action-primary-hover); }
.btn-secondary{ background:var(--surface-card); color:var(--text-body); border-color:var(--border-default); }
.btn-secondary:hover:not(:disabled){ background:var(--surface-hover); }
.btn-success{ background:var(--action-success); color:#fff; }
.btn-success:hover:not(:disabled){ background:var(--asubk-green-hover); }
.btn-danger{ background:var(--surface-card); color:var(--action-danger); border-color:var(--border-default); }
.btn-danger:hover:not(:disabled){ background:var(--status-error-bg); }
.btn-ghost{ background:transparent; color:var(--text-muted); border-color:var(--border-default); }
.btn-ghost:hover:not(:disabled){ background:var(--surface-hover); color:var(--text-body); }
.btn-sm{ height:30px; padding:0 10px; font-size:var(--text-sm); }

/* ── gate + progress ── */
.docs-wrap{ padding:18px 20px 28px; }
.note-banner{ display:flex; align-items:flex-start; gap:10px; padding:11px 14px; border-radius:var(--radius-md);
  background:var(--status-info-bg); color:#0a3d80; font:var(--font-label); margin:0 0 14px; }
.note-banner.warn{ background:var(--status-warning-bg); color:#7a5b00; }
.note-banner.ok{ background:var(--status-success-bg); color:#0c5a2f; }
.note-banner b{ font-weight:var(--weight-semibold); }
.note-banner svg{ flex:none; margin-top:1px; }
.gate-row{ display:flex; align-items:center; gap:14px; margin:0 0 18px; }
.gate-row .btn{ flex:none; }
.bar-block{ flex:1; min-width:0; }
.bar-label{ font:var(--font-label); color:var(--text-body); margin-bottom:6px; }
.bar-wrap{ height:6px; background:var(--asubk-gray-200); border-radius:var(--radius-pill); overflow:hidden; }
.bar{ height:100%; background:var(--asubk-blue); border-radius:var(--radius-pill); transition:width 200ms ease; }

/* ── accordion sections ── */
.doc-acc{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:hidden; margin-bottom:12px; }
.doc-acc-head{ display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer;
  background:var(--surface-panel); user-select:none; }
.doc-acc-head .chev{ display:inline-flex; color:rgba(24,39,57,.5); transition:transform 120ms ease; }
.doc-acc.open .doc-acc-head .chev{ transform:rotate(90deg); }
.doc-acc-title{ font:var(--weight-semibold) var(--text-base)/1.2 var(--asubk-font); color:var(--text-heading); }
.acc-note{ font:var(--font-label); color:var(--text-muted); font-weight:var(--weight-regular); }
.spacer{ flex:1; }
.doc-count{ font:var(--weight-medium) var(--text-sm)/1 var(--asubk-font); color:var(--text-muted);
  background:var(--surface-input); border-radius:var(--radius-pill); padding:3px 10px; white-space:nowrap; }
.doc-count.done{ color:var(--status-success); background:var(--status-success-bg); }
.doc-count.block{ color:var(--status-error); background:var(--status-error-bg); }
.doc-acc-body{ display:none; }
.doc-acc.open .doc-acc-body{ display:block; }
.sec-locked-note{ padding:12px 14px; border-top:1px solid var(--border-default);
  font:var(--font-label); color:var(--text-muted); background:var(--asubk-gray-50); }

/* ── doc row ── */
.doc-row{ display:flex; align-items:center; gap:12px; padding:11px 14px; border-top:1px solid var(--border-default); flex-wrap:wrap; }
.doc-main{ display:flex; align-items:center; gap:10px; flex:1; min-width:220px; }
.doc-name{ font:var(--font-label); color:var(--text-body); }
.doc-name.waived{ text-decoration:line-through; color:var(--text-muted); }
.doc-req{ font:var(--weight-medium) 11px/1 var(--asubk-font); padding:2px 7px; border-radius:var(--radius-pill); white-space:nowrap; }
.doc-req.req{ color:var(--action-danger); background:var(--status-error-bg); }
.doc-req.opt{ color:var(--text-muted); background:var(--surface-input); }
.doc-badge{ font:var(--weight-medium) 12px/1 var(--asubk-font); padding:4px 9px; border-radius:var(--radius-pill);
  white-space:nowrap; display:inline-flex; align-items:center; gap:5px; }
.st-req{ color:var(--text-muted); background:var(--surface-input); }
.st-up{ color:#0a3d80; background:var(--status-info-bg); }
.st-rev{ color:#0a3d80; background:var(--status-info-bg); }
.st-acc{ color:var(--status-success); background:var(--status-success-bg); }
.st-rej{ color:var(--status-error); background:var(--status-error-bg); }
.st-exp{ color:var(--status-warning); background:var(--status-warning-bg); }
.st-wv{ color:var(--text-muted); background:var(--surface-input); }
.doc-meta{ flex-basis:100%; padding-left:0; font:var(--font-label); color:var(--text-muted); display:flex; flex-wrap:wrap; gap:4px 16px; }
.doc-meta .m-rej{ color:var(--status-error); }
.doc-meta .m-exp{ color:var(--status-warning); }
.doc-actions{ display:flex; gap:6px; flex:none; }

/* ── modal (reason prompt) ── */
.overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.35); display:none;
  align-items:center; justify-content:center; z-index:50; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface-card); border-radius:8px; width:440px; max-width:calc(100vw - 32px);
  box-shadow:0 20px 60px rgba(16,28,46,0.3); overflow:hidden; }
.modal-h{ padding:16px 18px; border-bottom:1px solid var(--border-default);
  font:var(--weight-semibold) var(--text-base)/1.2 var(--asubk-font); color:var(--text-heading); }
.modal-b{ padding:16px 18px; }
.modal-b label{ font:var(--font-label); color:var(--text-muted); display:block; margin-bottom:6px; }
.modal-b textarea{ width:100%; min-height:84px; border:1px solid var(--border-default); border-radius:var(--radius-md);
  padding:8px 10px; font:var(--font-label); color:var(--text-body); resize:vertical; }
.modal-b textarea:focus{ outline:none; border-color:var(--action-primary); box-shadow:0 0 0 2px rgba(0,106,245,0.25); }
.modal-f{ padding:12px 18px; display:flex; justify-content:flex-end; gap:8px; border-top:1px solid var(--border-default); }

/* ── toast ── */
.toast-wrap{ position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:80; }
.toast{ min-width:260px; max-width:420px; padding:12px 14px; border-radius:var(--radius-md);
  background:var(--asubk-ink); color:#fff; font:var(--font-label); box-shadow:0 10px 30px rgba(16,28,46,0.3); }
.toast.ok{ background:var(--asubk-green); } .toast.err{ background:var(--asubk-red); } .toast.warn{ background:var(--asubk-amber); }
</style>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <div>
      <div class="crumb-title">Документы</div>
      <div class="crumb-sub">Заявка З-2026-000103 · комплект наследуется из программы</div>
    </div>
    <div class="demo-controls">
      <span class="dc">Тип заёмщика
        <select id="btype" onchange="setType(this.value)">
          <option value="fiz">Физ. лицо</option>
          <option value="ur">Юр. лицо</option>
        </select>
      </span>
      <span class="dc">Роль
        <select id="role" onchange="setRole(this.value)">
          <option value="spec">👷 Кредитный специалист</option>
          <option value="commission">🏛 Комиссия</option>
          <option value="others">👁 Просмотр</option>
        </select>
      </span>
      <label class="switch"><input type="checkbox" id="coll" checked onchange="render()"> залог</label>
    </div>
  </div>
  <div class="docs-wrap" id="docsWrap"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-h" id="modalTitle">Обоснование</div>
    <div class="modal-b">
      <label id="modalLabel">Укажите причину</label>
      <textarea id="modalText" placeholder="Обоснование попадёт в историю заявки и аудит"></textarea>
    </div>
    <div class="modal-f">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary btn-sm" id="modalOk" onclick="confirmModal()">Подтвердить</button>
    </div>
  </div>
</div>
<div class="toast-wrap" id="toasts"></div>

<script>
/* ============================================================
   Жизненный цикл документа:
     required → uploaded → review → accepted
                              └─────→ rejected → (повторная загрузка) → uploaded
     любой → waived (Не требуется, с обоснованием)
     accepted/uploaded с истёкшим сроком → expired
   Гейт «Отправить в комиссию»: каждый ОБЯЗАТЕЛЬНЫЙ документ должен быть
   «закрыт» = статус uploaded|review|accepted|waived И не expired|rejected.
   ============================================================ */
const STATUS = {
  required:{ label:'Требуется',   cls:'st-req' },
  uploaded:{ label:'Загружен',    cls:'st-up'  },
  review:  { label:'На проверке', cls:'st-rev' },
  accepted:{ label:'Принят',      cls:'st-acc' },
  rejected:{ label:'Отклонён',    cls:'st-rej' },
  expired: { label:'Просрочен',   cls:'st-exp' },
  waived:  { label:'Не требуется',cls:'st-wv'  },
};
// «закрыт» для гейта отправки
const OPEN_BLOCKS = s => s==='required' || s==='rejected' || s==='expired';

let ROLE='spec', BTYPE='fiz', pending=null;

/* Секции. forType: 'both'|'fiz'|'ur'. stage:'contract' — договорные, залочены до одобрения.
   validity — есть срок действия (демо). */
const SECTIONS = [
  { key:'ident', title:'Идентификация заёмщика', docs:[
    // физлицо
    { id:'p1', t:'Паспорт (лицевая сторона)', req:true,  ft:'fiz', st:'accepted' },
    { id:'p2', t:'Паспорт (оборотная сторона)',req:true,  ft:'fiz', st:'accepted' },
    { id:'inn',t:'ИНН',                         req:true,  ft:'fiz', st:'uploaded' },
    { id:'pd', t:'Согласие на обработку ПД',    req:true,  ft:'fiz', st:'accepted' },
    { id:'kb', t:'Согласие на запрос в кредбюро',req:true, ft:'fiz', st:'uploaded' },
    { id:'sp', t:'Согласие супруга(и)',         req:false, ft:'fiz', st:'required' },
    // юрлицо
    { id:'ust',t:'Устав',                       req:true,  ft:'ur', st:'accepted' },
    { id:'reg',t:'Свидетельство о госрегистрации',req:true,ft:'ur', st:'uploaded' },
    { id:'egr',t:'Выписка из ЕГРЮЛ',            req:true,  ft:'ur', st:'expired', valid:'до 05.07.2026' },
    { id:'dec',t:'Решение уполн. органа о займе',req:true, ft:'ur', st:'uploaded' },
    { id:'ord',t:'Приказ о назначении руководителя',req:true,ft:'ur',st:'accepted' },
    { id:'sig',t:'Карточка образцов подписей',  req:false, ft:'ur', st:'required' },
  ]},
  { key:'fin', title:'Платёжеспособность', docs:[
    { id:'inc',t:'Справка о доходах',           req:true,  ft:'fiz', st:'rejected', reason:'Нечитаемый скан, стр. 2' },
    { id:'job',t:'Справка с места работы',       req:false, ft:'fiz', st:'required' },
    { id:'rep',t:'Финансовая отчётность (баланс, ОПиУ)',req:true,ft:'ur',st:'accepted' },
    { id:'tax',t:'Налоговые декларации',        req:true,  ft:'ur', st:'uploaded' },
    { id:'trn',t:'Справка об оборотах по счетам',req:true,  ft:'ur', st:'uploaded', valid:'до 20.07.2026' },
    { id:'nod',t:'Справка об отсутствии задолженности',req:false,ft:'ur',st:'required' },
  ]},
  { key:'proj', title:'Целевые / проектные', note:'опциональные — по решению специалиста', docs:[
    { id:'bp', t:'Бизнес-план',                 req:false, ft:'both', st:'uploaded' },
    { id:'teo',t:'Технико-эконом. обоснование', req:false, ft:'both', st:'required' },
    { id:'fm', t:'Финансовая модель',           req:false, ft:'both', st:'required' },
    { id:'usc',t:'Договоры под целевое использование',req:false,ft:'both',st:'required' },
  ]},
  { key:'coll', title:'Залоговые', note:'по видам залога — из блока «Залоговое обеспечение»', collateral:true, docs:[
    { id:'val',t:'Отчёт об оценке залога',      req:true,  ft:'both', st:'accepted' },
    { id:'own',t:'Правоустанавливающие документы',req:true, ft:'both', st:'uploaded' },
  ]},
  { key:'contract', title:'Договорные', note:'доступны после одобрения комиссией', stage:'contract', docs:[
    { id:'agr',t:'Кредитный договор (подписанный скан)',req:true,ft:'both',st:'required' },
    { id:'sch',t:'График погашения (подписанный)',req:true,ft:'both',st:'required' },
  ]},
];
const APPROVED = false; // демо: заявка ещё не одобрена → договорные залочены

const openState = {}; // какие секции раскрыты
SECTIONS.forEach((s,i)=> openState[s.key] = i<2);

const visibleDocs = s => s.docs.filter(d => d.ft==='both' || d.ft===BTYPE);
const hasCollateral = () => document.getElementById('coll').checked;
const sectionVisible = s => !s.collateral || hasCollateral();

function setRole(v){ ROLE=v; render(); }
function setType(v){ BTYPE=v; render(); }

function render(){
  const secs = SECTIONS.filter(sectionVisible);
  // общий гейт — по обязательным (кроме договорной стадии, она отдельным этапом)
  let reqTot=0, reqClosed=0, blockers=0;
  secs.filter(s=>s.stage!=='contract').forEach(s=>{
    visibleDocs(s).forEach(d=>{
      if(d.req){ reqTot++; if(!OPEN_BLOCKS(d.st)) reqClosed++; if(d.st==='rejected'||d.st==='expired') blockers++; }
    });
  });
  const met = reqTot>0 && reqClosed===reqTot;

  const gate = met
    ? `<div class="note-banner ok">${icoOk()}<span>Обязательный комплект собран (<b>${reqClosed}/${reqTot}</b>). Заявку можно отправить в комиссию.</span></div>`
    : `<div class="note-banner ${blockers?'warn':''}">${blockers?icoWarn():icoInfo()}<span>Собрано обязательных: <b>${reqClosed} из ${reqTot}</b>.${blockers?` Есть блокирующие: отклонённые/просроченные — <b>${blockers}</b>. Их нужно перезагрузить.`:''} «Отправить в комиссию» доступно только при полном обязательном комплекте.</span></div>`;

  const pct = reqTot? Math.round(reqClosed/reqTot*100):0;
  const gateRow = `<div class="gate-row">
    <button class="btn btn-primary" ${met&&ROLE==='spec'?'':'disabled'} onclick="send()">Отправить в комиссию</button>
    <div class="bar-block">
      <div class="bar-label">Готовность обязательного комплекта — ${pct}%</div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  const accs = secs.map(s=>{
    const docs = visibleDocs(s);
    const locked = s.stage==='contract' && !APPROVED;
    const reqIn = docs.filter(d=>d.req).length;
    const reqDone = docs.filter(d=>d.req && !OPEN_BLOCKS(d.st)).length;
    const hasBlock = docs.some(d=>d.req && (d.st==='rejected'||d.st==='expired'));
    const cntCls = reqIn===0 ? '' : hasBlock ? 'block' : (reqDone===reqIn?'done':'');
    const cntTxt = reqIn===0 ? `${docs.length} опц.` : `${reqDone}/${reqIn}${reqDone===reqIn&&!hasBlock?' ✓':''}`;
    const rows = locked
      ? `<div class="sec-locked-note">${icoLock()} Раздел откроется после одобрения комиссией — тогда сюда загружаются подписанные экземпляры сгенерированных договоров.</div>`
      : docs.map(d=>docRow(d)).join('');
    return `<div class="doc-acc${openState[s.key]?' open':''}">
      <div class="doc-acc-head" onclick="toggle('${s.key}')">
        ${chev()}<span class="doc-acc-title">${s.title}</span>
        ${s.note?`<span class="acc-note">— ${s.note}</span>`:''}
        <span class="spacer"></span>
        <span class="doc-count ${cntCls}">${cntTxt}</span>
      </div>
      <div class="doc-acc-body">${rows}</div>
    </div>`;
  }).join('');

  document.getElementById('docsWrap').innerHTML = gate + gateRow + accs;
}

function docRow(d){
  const st = STATUS[d.st];
  const canSpec = ROLE==='spec';
  const canCom  = ROLE==='commission';
  let acts='';
  if(canSpec){
    if(d.st==='required') acts += btn('primary','Загрузить',`up('${d.id}')`);
    else if(d.st==='rejected'||d.st==='expired') acts += btn('primary','Перезагрузить',`up('${d.id}')`);
    else acts += btn('ghost','Заменить',`up('${d.id}')`);
    if(d.req && d.st!=='waived') acts += btn('ghost','Не требуется',`waive('${d.id}')`);
  }
  if(canCom && (d.st==='uploaded'||d.st==='review')){
    acts += btn('success','Принять',`accept('${d.id}')`);
    acts += btn('danger','Отклонить',`reject('${d.id}')`);
  }
  // мета-строка
  const meta=[];
  if(d.st==='rejected'&&d.reason) meta.push(`<span class="m-rej">Причина отклонения: ${d.reason}</span>`);
  if(d.st==='expired') meta.push(`<span class="m-exp">Срок действия истёк${d.valid?` (${d.valid})`:''} — требуется свежий документ</span>`);
  else if(d.valid && (d.st==='uploaded'||d.st==='accepted')) meta.push(`Срок действия: ${d.valid}`);
  if(d.st==='waived'&&d.waiveReason) meta.push(`Не требуется: ${d.waiveReason}`);
  if(['uploaded','review','accepted'].includes(d.st)) meta.unshift(`Файл: ${d.id}_scan.pdf · загружен 04.07.2026`);

  return `<div class="doc-row">
    <div class="doc-main">
      <span class="doc-name${d.st==='waived'?' waived':''}">${d.t}</span>
      <span class="doc-req ${d.req?'req':'opt'}">${d.req?'обязат.':'опц.'}</span>
      <span class="doc-badge ${st.cls}">${st.label}</span>
    </div>
    <div class="doc-actions">${acts}</div>
    ${meta.length?`<div class="doc-meta">${meta.join('')}</div>`:''}
  </div>`;
}

/* ── actions ── */
function findDoc(id){ for(const s of SECTIONS){ const d=s.docs.find(x=>x.id===id); if(d) return d; } }
function up(id){ const d=findDoc(id); d.st='review'; delete d.reason; if(d.valid&&d.valid.includes('05.07')) d.valid='до 04.08.2026'; render(); toast('Документ загружен, отправлен на проверку','ok'); }
function accept(id){ findDoc(id).st='accepted'; render(); toast('Документ принят','ok'); }
function reject(id){ pending={id,kind:'reject'}; openModal('Отклонить документ','Причина отклонения (обязательно)','Отклонить'); }
function waive(id){ pending={id,kind:'waive'}; openModal('Пометить «Не требуется»','Обоснование waiver (обязательно, попадёт в аудит)','Подтвердить'); }
function send(){ toast('Заявка отправлена в комиссию. Право правки условий перешло к комиссии.','ok'); }

/* ── modal ── */
function openModal(title,label,ok){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalLabel').textContent=label;
  document.getElementById('modalOk').textContent=ok;
  document.getElementById('modalText').value='';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modalText').focus(),30);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); pending=null; }
function confirmModal(){
  const txt=document.getElementById('modalText').value.trim();
  if(!txt){ toast('Нужно указать обоснование','err'); return; }
  const d=findDoc(pending.id);
  if(pending.kind==='reject'){ d.st='rejected'; d.reason=txt; toast('Документ отклонён','warn'); }
  else { d.st='waived'; d.waiveReason=txt; toast('Документ помечен «Не требуется»','ok'); }
  closeModal(); render();
}

/* ── ui helpers ── */
function toggle(k){ openState[k]=!openState[k]; render(); }
function btn(kind,label,onclick){ return `<button class="btn btn-${kind} btn-sm" onclick="${onclick}">${label}</button>`; }
function chev(){ return '<span class="chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>'; }
function icoOk(){ return svg('<path d="M20 6 9 17l-5-5"/>'); }
function icoInfo(){ return svg('<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>'); }
function icoWarn(){ return svg('<path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>'); }
function icoLock(){ return svg('<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'); }
function svg(inner){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`; }
function toast(msg,kind){ const w=document.getElementById('toasts'); const t=document.createElement('div');
  t.className='toast '+(kind||''); t.textContent=msg; w.appendChild(t); setTimeout(()=>t.remove(),2600); }

render();
</script>
</body>
</html>
