<title>Взыскание задолженности · АСУБК</title>
<!--
  MOCKUP (single-file, interactive) — TO-BE модуля «Взыскание задолженности»
  (список процессов → карточка процесса). Образец для команды разработки, не прод-код.

  ЭТО НЕ КЛОН ЖИВОГО СТЕНДА: экрана взыскания в системе нет, модуль проектируется
  с нуля. Дефектов по нему нет и в `notes/qa-findings.md` не заводится.
  Рекомендации команде: `TODO.md`, секция «Фаза 9 — Взыскание задолженности» (P9-R1…R9).
  Спек: `docs/superpowers/specs/2026-07-10-collection-mockup-design.md`.
  Проверка: `node scripts/inspect/collection-check.mjs`.

  Источники логики (вне репозитория): регламент «Порядок мониторинга, взыскания и
  урегулирования задолженности по бюджетным кредитам ОАО "Госфинхолдинг"» (99 пунктов,
  17 глав) и ТЗ, раздел 2.5. Стиль сверен с `mockups/loan-credit/`.

  КЛЮЧЕВЫЕ ДОМЕННЫЕ РЕШЕНИЯ

  1. Единица работы — ПРОЦЕСС ВЗЫСКАНИЯ, не кредит. Список показывает процессы.
     Процесс привязан к ОДНОМУ ЗАЁМЩИКУ (ИНН — якорь).

  2. Кредит ↔ процесс — МНОГИЕ-КО-МНОГИМ. Ранняя редакция логики фиксировала
     «не более одного активного процесса на кредит» — ЭТО РЕШЕНИЕ ОТМЕНЕНО.
     По одному кредиту идут несколько процессов, различающихся ПРЕДМЕТОМ ТРЕБОВАНИЯ
     (см. пару 142 «просроченная сумма» / 151 «залог» по дог. №56). Связь живёт
     в «Охвате процесса». Контроль пересечения — мягкое предупреждение, не запрет.

  3. ТРИ НЕЗАВИСИМЫХ ИЗМЕРЕНИЯ СОСТОЯНИЯ, не сливать в одно поле «статус»:
       • Категория риска — ВЫЧИСЛЕНА из дней просрочки (catOf), только чтение.
         0–5 дн норма · 6–180 дн средний риск · 181+ дн высокий риск.
       • Группа платежеспособности — атрибут ЗАЁМЩИКА, процесс её только читает.
       • Фаза — двигается ТОЛЬКО регистрацией меры-вехи в журнале мер, не селектором.
       • Стадия — ПРОИЗВОДНАЯ от фазы (stageOf), не хранится.
     Поэтому в данных процесса нет полей `cat` и `stage` — только `catDays` и `phase`.

  4. Шапка карточки — панель-ИНДИКАТОР, а не форма. Под каждой плиткой подпись
     источника значения. Ни одно из четырёх измерений не редактируется.
     Карточка целиком read-only → внизу только «Закрыть», без OK/Отмена (единая ИА
     с `mockups/loan-application-commission/commission.html`, P3-R29).

  5. ТРИ РАЗНЫХ не-фазовых механизма поверх любой стадии, баннером в шапке:
       • ПАУЗА (янтарный) — заморозка с дедлайном ≤70 дн. Фаза сохраняется,
         счётчик дней НЕ замораживается. Обязателен scope: весь процесс vs одна мера.
       • СОГЛАШЕНИЕ (синий) — мировое / добровольное исполнение. НЕ пауза:
         у паузы дедлайн, который пережидают; здесь новый график, который мониторят.
       • СОБЫТИЕ (красный) — смерть, недееспособность. Уводит вбок в спецпроцедуру.
     У всех трёх фаза СОХРАНЯЕТСЯ.

  6. Исход переключает группу платежеспособности заёмщика. Необратимое действие
     (безакцепт, принятие имущества, списание, внесудебное обращение) требует
     решения комитета — общий паттерн, не частный случай.

  7. Апелляции и кассации — меры ВНУТРИ фазы «Иск» / «Решение суда», не новые фазы.

  8. Демо-ограничения: кнопки паузы/соглашения/события показывают тост, без модалок;
     пересчёт суммы при извещении не выполняется в рантайме (показан результат
     в данных процесса 151 + заметка о правиле).

  ОТКРЫТЫЕ ВОПРОСЫ (макет их фиксирует, но не решает)

  - Пени во время паузы: продолжают ли начисляться финансовые санкции при заморозке
    (реструктуризация / мировое соглашение). Бизнес-вопрос, ответа нет.
  - Вкладку обеспечения кредита нужно расширить на поручительства, гарантии и депозит —
    без этого не автогенерируется список требований обеспечителям (досудебный шаг 2).
  - Флаг «право безакцептного списания» на кредитном договоре: вероятно, отсутствует.
    Требует проверки — это предусловие фазы «Безакцептное списание».
-->

/* Событие (смерть, недееспособность) — уводит процесс вбок, фаза сохраняется. */
.phead-banner.danger{ background:var(--status-error-bg); color:var(--asubk-red); }
.phead-banner svg{ flex:none; }
.phead-dims{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media(max-width:760px){ .phead-dims{ grid-template-columns:repeat(2,1fr); } }
.dim{ background:var(--surface-panel); border-radius:var(--radius-md); padding:10px 14px; }
.dim .dl{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-muted); margin-bottom:5px; }
.dim .dv{ font:var(--weight-semibold) 16px/1.2 var(--asubk-font); color:var(--text-heading); }
.dim .src{ font:var(--weight-regular) 11px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:4px; }

/* two-column form (label above) */
.f2{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; max-width:1500px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field .flabel{ font:var(--font-label); color:var(--text-muted); }
.field.col-span{ grid-column:1 / -1; }
.control{ position:relative; display:flex; align-items:center; }
.control input, .control select, .note-area{ width:100%; height:var(--control-h); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); font-weight:var(--weight-medium);
  border:1px solid var(--border-strong); outline:none; padding:0 var(--space-2);
  transition:box-shadow 120ms ease, border-color 120ms ease; }
.control select{ cursor:pointer; appearance:none; padding-right:30px; }
.control input:focus, .control select:focus, .note-area:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); }
.control input[readonly], .ro input, .ro .note-area{ background:var(--surface-input); color:var(--text-muted); border:1px solid transparent; cursor:default; }
.control input[readonly]:focus{ border-color:transparent; box-shadow:none; }
.grey input, .grey select{ background:var(--surface-input); border-color:transparent; }
.control .cal, .control .caret{ position:absolute; right:9px; pointer-events:none; color:var(--text-muted); display:flex; }
.note-area{ height:auto; min-height:80px; padding:10px 12px; resize:vertical; line-height:1.5; }
.dtpair{ display:grid; grid-template-columns:1fr 1fr; gap:0 10px; }

/* lookup (picker) */
.lookup{ display:flex; align-items:center; height:var(--control-h); background:var(--surface-input);
  border-radius:var(--radius-md); border:1px solid transparent; padding-left:var(--space-2); }
.lookup .val{ flex:1; font:var(--font-body); font-weight:var(--weight-medium); color:var(--text-body);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lookup .val.ph{ color:var(--text-placeholder); }
.lookup button{ display:inline-flex; align-items:center; justify-content:center; width:32px; height:var(--control-h);
  border:none; background:transparent; color:var(--text-link); cursor:pointer; }
.lookup .pick{ font-weight:var(--weight-bold); letter-spacing:1px; }

/* section heading + toolbar above collection grid */
.section-h{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); margin:0 0 6px; }
.section-note{ font:var(--font-label); color:var(--text-muted); margin:0 0 14px; max-width:900px; }
.gtoolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.gtoolbar .spacer{ flex:1; }

/* collection grid */
.cgrid-wrap{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:auto; min-height:80px; }
table.cgrid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
table.cgrid thead th{ position:sticky; top:0; text-align:left; padding:10px 12px; background:var(--surface-card);
  border-bottom:1px solid var(--border-default); font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font);
  color:var(--text-heading); cursor:pointer; user-select:none; }
table.cgrid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; font-weight:400; }
table.cgrid tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default); color:var(--text-body); vertical-align:middle; }
table.cgrid tbody tr:hover{ background:var(--surface-hover); }
table.cgrid tbody tr.total td{ font-weight:var(--weight-bold); color:var(--text-heading);
  background:var(--surface-hover); border-top:1px solid var(--border-strong); }
.cgrid-empty{ display:flex; align-items:center; justify-content:center; min-height:120px;
  color:var(--text-placeholder); font:var(--font-label); }
.rowlink{ color:var(--text-link); cursor:pointer; }
.rowlink:hover{ text-decoration:underline; }

/* timeline (phase machine indicator) */
.timeline{ display:flex; flex-wrap:wrap; gap:0; margin:2px 0 20px; }
.tl-step{ display:flex; align-items:center; gap:8px; padding:6px 0; }
.tl-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font:var(--weight-bold) 12px/1 var(--asubk-font); flex:none; }
.tl-dot.done{ background:var(--asubk-green); color:#fff; }
.tl-dot.cur{ background:var(--asubk-blue); color:#fff; }
.tl-dot.todo{ background:var(--surface-input); color:var(--text-placeholder); }
.tl-lbl{ font:var(--font-label); color:var(--text-body); }
.tl-lbl.todo{ color:var(--text-placeholder); }
.tl-arrow{ color:var(--text-placeholder); margin:0 12px; display:flex; }

/* history rows */
.hist{ border-left:2px solid var(--border-strong); margin-left:6px; padding-left:0; }
.hrow{ position:relative; padding:10px 0 10px 22px; border-bottom:1px solid var(--asubk-grid-line); }
.hrow::before{ content:""; position:absolute; left:-5px; top:16px; width:8px; height:8px; border-radius:50%;
  background:var(--asubk-blue); }
.hrow .hwhen{ font:var(--weight-medium) 13px/1.3 var(--asubk-font); color:var(--text-muted); }
.hrow .hwhat{ font:var(--font-label); color:var(--text-body); margin-top:2px; }
.hrow .hwho{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:2px; }

/* footer */
.footer{ position:sticky; bottom:0; background:var(--surface-page); border-top:1px solid var(--border-default);
  padding:14px 20px; display:flex; align-items:center; gap:12px; }

/* modals */
.overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.42); display:none; align-items:center;
  justify-content:center; z-index:60; padding:24px; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface-card); border-radius:var(--radius-lg); width:min(1040px,100%); max-height:88vh;
  display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(16,28,46,0.4); }
.modal.form{ width:min(720px,100%); }
.modal.narrow{ width:min(560px,100%); }
.modal-h{ padding:18px 24px 12px; display:flex; align-items:center; gap:10px; }
.modal-h .mt{ font:var(--weight-bold) 20px/1.2 var(--asubk-font); color:var(--text-heading); flex:1; }
.modal-x{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); display:flex; padding:4px; }
.modal-x:hover{ color:var(--text-body); }
.modal-b{ padding:0 24px 8px; overflow:auto; flex:1; }
.modal-f{ padding:14px 24px 20px; display:flex; gap:12px; justify-content:flex-end; }
.mform{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; padding-top:8px; }
.mform .field.col-span{ grid-column:1 / -1; }
.mform .field.req .flabel::after{ content:" •"; color:var(--action-danger); }
.mform .control input, .mform .control select, .mform .note-area{ background:var(--surface-input); border-color:transparent; }
.warn-inline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-warning-bg);
  color:var(--asubk-amber); border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin-top:6px; }
/* Мера без подтверждения вручения не считается исполненной — она не годится
   как доказательство в суде. Строка подсвечена, а не спрятана. */
.cgrid tbody tr.mrow-undelivered{ background:var(--status-warning-bg); }
/* Мягкое предупреждение о пересечении охвата — не запрет. */
.overlap-note{ display:flex; gap:8px; align-items:flex-start; background:var(--status-warning-bg);
  color:var(--asubk-amber); border-radius:var(--radius-md); padding:10px 12px; margin:0 0 14px;
  font:var(--font-label); }
.overlap-note svg{ flex:none; margin-top:2px; }
.overlap-note .rowlink{ color:var(--text-link); font-weight:600; }
table.eb-grid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
.eb-grid-wrap{ border:1px solid var(--border-strong); border-radius:var(--radius-md); overflow:auto; max-height:52vh; }
table.eb-grid thead th{ position:sticky; top:0; background:var(--surface-panel); text-align:left; z-index:1;
  padding:11px 14px; border-bottom:1px solid var(--border-default); color:var(--text-heading);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); }
table.eb-grid tbody td{ padding:11px 14px; border-bottom:1px solid var(--border-default); color:var(--text-body); }
table.eb-grid tbody tr{ cursor:pointer; }
table.eb-grid tbody tr:hover{ background:var(--surface-hover); }
table.eb-grid tbody tr:last-child td{ border-bottom:none; }

/* toast */
.toast-wrap{ position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:80; }
.toast{ min-width:260px; max-width:420px; padding:12px 14px; border-radius:var(--radius-md);
  background:var(--asubk-ink); color:#fff; font:var(--font-label); box-shadow:0 10px 30px rgba(16,28,46,0.3);
  display:flex; gap:10px; align-items:flex-start; }
.toast.ok{ background:var(--asubk-green); }
.toast.warn{ background:var(--asubk-amber); }
</style>

<script>
/* ============================================================
   SIDEBAR NAVIGATION (взыскание активно)
   ============================================================ */
const TREE = [
  { id:"k", label:"Система кредитования", subs:[
    { id:"k-app", label:"Заявки и комиссии", items:[ {label:"Заявки"}, {label:"Комиссии по заявкам"} ]},
    { id:"k-prog", label:"Программы и решения", items:[ {label:"Решение правительства"}, {label:"Кредитные программы"} ]},
    { id:"k-borr", label:"Заёмщики", items:[ {label:"Заёмщики"} ]},
    { id:"k-loan", label:"Кредиты и транши", items:[ {label:"Кредиты"}, {label:"Список траншей"} ]} ]},
  { id:"g", label:"Поручительства", subs:[ { id:"g-all", headerless:true, items:[ {label:"Анкеты поручительств"} ]} ]},
  { id:"debt", label:"Взыскание задолженности", open:true, subs:[
    { id:"debt-all", headerless:true, items:[
      { label:"Процессы взыскания", active:true },
      { label:"Досудебный порядок" }, { label:"Судебный порядок" },
      { label:"Исполнительное производство" }, { label:"Отчуждение активов" } ]} ]},
  { id:"d", label:"Справочники", subs:[ { id:"d-all", headerless:true, items:[ {label:"Справочники"} ]} ]},
  { id:"r", label:"Отчёты", subs:[ { id:"r-all", headerless:true, items:[ {label:"Отчёты"} ]} ]},
  { id:"adm", label:"Администрирование", subs:[ { id:"adm-all", headerless:true, items:[ {label:"Администрирование"} ]} ]},
  { id:"sec", label:"Безопасность", subs:[ { id:"sec-all", headerless:true, items:[ {label:"Безопасность"} ]} ]},
];
const chev = s => `<span class="chev"><svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>`;
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = TREE.map(g=>{
    const subs = (g.subs||[]).map(s=>{
      const items = (s.items||[]).map(it=>`<a class="nav-item${s.headerless?' headerless':''}${it.active?' active':''}" onclick="navClick('${it.label}')">${it.label}</a>`).join('');
      if(s.headerless) return `<div class="nav-children" style="display:block">${items}</div>`;
      return `<div class="nav-sub${s.open?' open':''}"><button class="nav-toggle" onclick="this.parentNode.classList.toggle('open')">${chev(13)}<span class="lbl">${s.label}</span></button><div class="nav-children">${items}</div></div>`;
    }).join('');
    return `<div class="nav-group${g.open?' open':''}"><button class="nav-toggle" onclick="this.parentNode.classList.toggle('open')">${chev(14)}<span class="lbl">${g.label}</span></button><div class="nav-children">${subs}</div></div>`;
  }).join('');
}
function navClick(l){ if(l!=="Процессы взыскания") toast("Демо-макет: доступен раздел «Процессы взыскания»"); }

/* ============================================================
   SAMPLE DATA — процессы взыскания
   Иллюстрируют согласованную логику, в т.ч. два процесса по
   одному кредиту у одного заёмщика (просроч. сумма + залог).
   ============================================================ */
const PHASES_PRE  = ['Претензия','Повторная претензия','Безакцептное списание'];
const PHASES_FORCE= ['Извещение','Иск','Решение суда','Исполнительный лист','На исполнении'];

/* ============================================================
   СПРАВОЧНИК ВИДОВ МЕРЫ (в проде — пополняемый справочник).
   МАТРИЦА «фаза ← вид меры-основания» — конфигурация, не данные:
   иначе теряется контроль п. 98 регламента (статус только по документу).
   Апелляции и кассации — меры ВНУТРИ фазы, не вехи.
   ============================================================ */
const MEASURE_KINDS = [
  'Первичная претензия', 'Повторная претензия', 'Требование поручителю',
  'Требование гаранту', 'Требование отраслевому госоргану', 'Акт сверки',
  'Безакцептное списание', 'Платёжное требование в банк', 'Решение комитета',
  'Служебная записка в ДПО', 'Извещение об обращении на залог', 'Исковое заявление',
  'Уточнение исковых требований', 'Решение суда', 'Апелляционная жалоба',
  'Кассационная жалоба', 'Исполнительный лист', 'Письмо в ПССИ',
  'Акт несостоявшихся торгов', 'Постановление о возврате ИЛ',
];

/* Вехи двигают фазу. Всё остальное живёт в журнале, не трогая фазу. */
const MILESTONE_KINDS = new Set([
  'Первичная претензия', 'Повторная претензия', 'Безакцептное списание',
  'Извещение об обращении на залог', 'Исковое заявление', 'Решение суда',
  'Исполнительный лист',
]);
const isMilestone = kind => MILESTONE_KINDS.has(kind);

/* Структурный номер процесса — единый формат с З-… (заявки) и К-… (комиссии), P3-R27. */
const procNo = id => `В-2026-${String(id).padStart(6, '0')}`;

/* ============================================================
   ВЫЧИСЛЯЕМЫЕ ПРАВИЛА — не хранить то, что выводится.
   Категория и стадия НЕ лежат в данных процесса: категория считается
   из дней просрочки, стадия — из фазы. Разработчик видит формулу.
   ============================================================ */
const catOf   = days  => days <= 5 ? 'norm' : days <= 180 ? 'mid' : 'high';
const stageOf = phase => PHASES_PRE.includes(phase) ? 'Досудебная' : 'Принудительная';

/* Терминальный процесс — работа завершена (исход есть). Короткая подпись баннера overlay в списке. */
const isTerminal   = p => Boolean(p.outcome);
const overlayShort = t => t === 'Пауза' ? 'пауза' : t === 'Соглашение' ? 'соглашение' : 'событие';

/* Фаза установлена мерой-вехой. Показываем ЕЁ номер — так правило
   «фаза следует из журнала мер» видно, а не только объявлено. */
const PHASE_BY_MEASURE = {
  'Претензия':'Первичная претензия', 'Повторная претензия':'Повторная претензия',
  'Безакцептное списание':'Безакцептное списание', 'Извещение':'Извещение об обращении на залог',
  'Иск':'Исковое заявление', 'Решение суда':'Решение суда',
  'Исполнительный лист':'Исполнительный лист', 'На исполнении':'Исполнительный лист',
};
function phaseSource(p){
  const kind = PHASE_BY_MEASURE[p.phase];
  const m = [...p.measures].reverse().find(x => x.kind === kind);
  return m ? `по документу-основанию: ${m.num}` : 'по документу-основанию';
}

/* ============================================================
   КОНТРОЛЬ ПЕРЕСЕЧЕНИЯ ОХВАТА
   Кредит ↔ процесс — многие-ко-многим. Два активных процесса по одному
   кредиту законны, если предмет требования разный (142: просроченная сумма,
   151: залог по тому же дог. №56). Пересечением считается совпадение ОБЩЕГО
   КРЕДИТА с другим активным процессом (не пары кредит+предмет — совпадение
   пары означало бы дубль-процесс, которого в данных нет и быть не должно).
   Это мягкое предупреждение, а не запрет: решает человек.
   ============================================================ */
function overlaps(proc){
  const out = [];
  for(const c of proc.credits){
    for(const other of PROCESSES){
      if(other.id === proc.id || isTerminal(other)) continue;
      if(other.credits.some(oc => oc.id === c.id))
        out.push({ credit:c, subject:c.subject, other });
    }
  }
  return out;
}

const catLabel = c => c === 'norm' ? 'Норма' : c === 'mid' ? 'Средний' : 'Высокий';
const catCls   = c => c === 'norm' ? 'low'   : c === 'mid' ? 'mid'     : 'high';

/* ============================================================
   LIST
   ============================================================ */
let selectedRow = null, sortKey='id', sortDir=1;
const LIST_COLS = [
  {k:'id', t:'№ процесса'}, {k:'borrower', t:'Заёмщик'}, {k:'scope', t:'Охват'},
  {k:'phase', t:'Фаза'}, {k:'cat', t:'Категория'}, {k:'group', t:'Группа'}, {k:'owner', t:'Владелец'},
];
function renderList(){
  document.getElementById('listHead').innerHTML =
    LIST_COLS.map(c=>`<th onclick="sortList('${c.k}')">${c.t}<span class="sort">↕</span></th>`).join('');
  const rows = [...PROCESSES].sort((a,b)=>{
    // «Категория» не хранится в данных — сортируем по catDays, иначе порядок «Высокий/Норма/Средний» будет алфавитным, а не по тяжести риска.
    const key = sortKey==='cat' ? 'catDays' : sortKey;
    let x=a[key], y=b[key];
    if(typeof x==='number') return (x-y)*sortDir;
    return String(x).localeCompare(String(y),'ru')*sortDir;
  });
  document.getElementById('listBody').innerHTML = rows.map(p=>`
    <tr data-id="${p.id}" class="${isTerminal(p) ? 'terminal' : ''}" onclick="selectRow('${p.id}',this)" ondblclick="openDetail('${p.id}')">
      <td>${procNo(p.id)}</td>
      <td>${p.borrower}</td>
      <td>${p.scope}</td>
      <td>${isTerminal(p)
        ? `<span class="pill neutral">${p.outcome}</span>`
        : `${p.phase}${p.overlay ? ` <span class="pill neutral">${overlayShort(p.overlay.type)}</span>` : ''}`}</td>
      <td><span class="pill ${catCls(catOf(p.catDays))}">${catLabel(catOf(p.catDays))}</span></td>
      <td>${p.group}</td>
      <td>${p.owner}</td>
    </tr>`).join('');
  document.getElementById('pagerCount').textContent = PROCESSES.length+' процессов';
}
function sortList(k){ if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=1;} renderList(); if(selectedRow) selectRow(selectedRow); }
function selectRow(id,el){
  selectedRow=id;
  document.querySelectorAll('#listBody tr').forEach(r=>r.classList.toggle('sel', r.dataset.id===id));
  document.getElementById('btnOpen').disabled=false;
}

let curProc=null, curTab=0;
function openDetail(id){
  curProc = PROCESSES.find(p=>p.id===id) || PROCESSES[0];
  curTab=0; renderTabs(); renderPanels(); showView('detail');
  document.getElementById('crumbTitle').textContent = `${procNo(curProc.id)} · ${curProc.borrower}`;
}
function renderTabs(){
  document.getElementById('detailTabbar').innerHTML =
    TABS.map((t,i)=>`<button class="dtab${i===curTab?' active':''}" onclick="switchTab(${i})">${t}</button>`).join('');
}
function switchTab(i){ curTab=i; renderTabs(); document.querySelectorAll('.detail-panel').forEach((p,idx)=>p.classList.toggle('active',idx===i)); }

/* Три РАЗНЫХ не-фазовых механизма поверх любой стадии — своим баннером.
   Пауза (янтарный, дедлайн, счётчик дней не заморожен) ≠ Соглашение (синий,
   график без дедлайна) ≠ Событие (красный, уводит в спецпроцедуру).
   У всех трёх фаза СОХРАНЯЕТСЯ. */
function overlayBanner(p){
  if(!p.overlay) return '';
  const o = p.overlay;
  if(o.type === 'Пауза') return `<div class="phead-banner warn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
    <span>Пауза: ${o.label} · до ${o.until} · фаза сохранена · область: ${o.scope} · счётчик дней не заморожен</span></div>`;
  if(o.type === 'Соглашение') return `<div class="phead-banner info">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>Исполнение по соглашению: ${o.label} · наблюдение за графиком (не пауза — дедлайна нет) · фаза сохранена</span></div>`;
  return `<div class="phead-banner danger">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
    <span>Событие: ${o.label} · процесс уведён в спецпроцедуру · фаза сохранена</span></div>`;
}

      <div class="phead-name">
        <span class="nm">${p.borrower}</span>
        <a onclick="toast('Переход в карточку заёмщика (демо)')">ИНН ${p.inn} <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg></a>
        <div class="phead-sub" style="width:100%">${procNo(p.id)} · охват: <b>${p.scope}</b></div>
      </div>
      <span class="phead-owner">Владелец: ${p.owner}</span>

      <thead><tr><th>Кредитный договор</th><th>Предмет требования</th><th style="text-align:right">Сумма требования</th><th>Залог</th></tr></thead>
      <tbody>${rows}</tbody>

/* ---- panel: Журнал мер ---- */
function panelMery(){
  const p=curProc;
  const rows = p.measures.map(m=>{
    const bad = needsDelivery(m.kind) && !m.delivered;
    return `<tr class="${bad ? 'mrow-undelivered' : ''}">
      <td>${m.sec}</td><td>${m.kind}</td><td>${m.date}</td><td>${m.num}</td>
      <td>${m.deliver}${bad ? ' <span class="pill mid">не исполнена: нет подтверждения вручения</span>' : ''}</td>
      <td>${m.result}</td><td>${m.stageEx}</td><td style="text-align:right">${m.sum}</td></tr>`;
  }).join('');
  return `<div class="panel-wrap">
    ${phaseTimeline()}
    <p class="section-h">Журнал мер</p>
    <p class="section-note">Реестр всех претензий, извещений, исков, жалоб и писем. Фаза процесса двигается ТОЛЬКО регистрацией меры-вехи (иск → фаза «Иск» и т.д.). Претензии и извещения требуют подтверждения вручения — иначе мера не считается исполненной.</p>
    <div class="gtoolbar">
      <button class="btn btn-tint btn-sm" onclick="openMeasureModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Зарегистрировать меру</button>
    </div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Раздел</th><th>Вид меры</th><th>Дата</th><th>Номер</th><th>Направление / вручение</th><th>Результат</th><th>Стадия</th><th style="text-align:right">Сумма</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}
function phaseTimeline(){
  const p=curProc;
  const chain = stageOf(p.phase) === 'Досудебная' ? PHASES_PRE : PHASES_FORCE;
  const curIdx = chain.indexOf(p.phase);
  const steps = chain.map((ph,i)=>{
    const st = i<curIdx?'done': i===curIdx?'cur':'todo';
    const mark = st==='done'?'✓': (i+1);
    return `<div class="tl-step"><span class="tl-dot ${st}">${mark}</span><span class="tl-lbl${st==='todo'?' todo':''}">${ph}</span></div>${i<chain.length-1?'<span class="tl-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>':''}`;
  }).join('');
  return `<div class="timeline">${steps}</div>`;
}

/* ---- panel: Передачи дела ---- */
function panelHandoffs(){
  const p=curProc;
  const rows = p.handoffs.length ? p.handoffs.map(h=>{
    const pill = h.status==='подтверждено'?'<span class="pill low">подтверждено</span>':h.status==='отклонено'?'<span class="pill high">отклонено</span>':'<span class="pill mid">ожидает</span>';
    return `<tr><td>${h.from}</td><td>${h.to}</td><td>${h.when}</td><td>${h.checklist}</td><td>${pill}${h.reason?` <span class="src">${h.reason}</span>`:''}</td></tr>`;
  }).join('') : '';
  const body = rows || `<tr><td colspan="5"><div class="cgrid-empty">Передач ещё не было</div></td></tr>`;
  return `<div class="panel-wrap">
    <p class="section-h">Передачи дела (эстафета подразделений)</p>
    <p class="section-note">Дело последовательно меняет владельца: куратор → ДПО → отдел проблемных кредитов → приставы / сектор активов. Принимающая сторона подтверждает или отклоняет пакет с указанием причины (паттерн «четырёх глаз»).</p>
    <div class="gtoolbar">
      <button class="btn btn-tint btn-sm" onclick="toast('Форма передачи дела (демо)')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg> Передать дело</button>
    </div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>От кого</th><th>Кому</th><th>Дата</th><th>Чек-лист документов</th><th>Статус</th></tr></thead>
      <tbody>${body}</tbody>
    </table></div></div>`;
}

/* ---- panel: Особые состояния ---- */
function panelSpecial(){
  const p=curProc;
  const rows = p.special.map(s=>{
    const pill = s.type==='Пауза'?'<span class="pill mid">пауза</span>'
               : s.type==='Соглашение'?'<span class="pill info">соглашение</span>'
               : '<span class="pill high">событие</span>';
    return `<tr><td>${pill}</td><td>${s.name}</td><td>${s.note}</td><td>${s.when||'—'}</td><td>${s.deadline||'—'}</td></tr>`;
  }).join('');
  const body = rows || `<tr><td colspan="5"><div class="cgrid-empty">Особых состояний нет</div></td></tr>`;
  return `<div class="panel-wrap">
    <p class="section-h">Особые состояния (поверх любой стадии)</p>
    <p class="section-note">Три механизма, действующие поверх фазы: <b>пауза</b> (заморозка с дедлайном, фаза сохраняется), <b>соглашение</b> (наблюдение за новым графиком) и <b>событие</b> (смерть, недееспособность — уводит процесс в спецпроцедуру). Счётчик дней при паузе не замораживается.</p>
    <div class="gtoolbar">
      <button class="btn btn-tint btn-sm" onclick="toast('Постановка на паузу (демо)')">Поставить на паузу</button>
      <button class="btn btn-tint btn-sm" onclick="toast('Регистрация соглашения (демо)')">Соглашение</button>
      <button class="btn btn-tint btn-sm" onclick="toast('Регистрация события (демо)')">Событие</button>
    </div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Тип</th><th>Наименование</th><th>Примечание</th><th>Начало</th><th>Дедлайн</th></tr></thead>
      <tbody>${body}</tbody>
    </table></div></div>`;
}

/* ---- panel: Залог / реализация ---- */
function panelZalog(){
  const p=curProc;
  const rows = p.colls.length ? p.colls.map(c=>`<tr>
    <td>${c.item}</td><td>${c.kind}</td><td style="text-align:right">${c.pledge}</td><td>${c.order}</td><td>${c.real}</td>
    <td>${c.ban ? `<span class="pill high">${c.ban}</span>` : '—'}</td></tr>`).join('')
    : `<tr><td colspan="6"><div class="cgrid-empty">По этому процессу залог не обращается</div></td></tr>`;
  return `<div class="panel-wrap">
    <p class="section-h">Залог / реализация</p>
    <p class="section-note">Предметы залога пред-заполняются из залогового договора кредита; процесс добавляет только слой реализации (порядок обращения, статус торгов, принятие имущества). Внесудебный порядок блокируется для единственного жилья, культурной ценности и имущественного комплекса.</p>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Предмет залога</th><th>Вид</th><th style="text-align:right">Залоговая стоимость</th><th>Порядок обращения</th><th>Статус реализации</th><th>Запрет внесуд.</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

/* ---- panel: История ---- */
function panelHistory(){
  const p=curProc;
  return `<div class="panel-wrap">
    <p class="section-h">История процесса</p>
    <p class="section-note">Аудит статусных вех: смена фазы (с документом-основанием), передачи дела, паузы и события. Только чтение, по убыванию времени.</p>

function renderPanels(){
  const builders=[panelObschaya,panelOhvat,panelMery,panelHandoffs,panelSpecial,panelZalog,panelHistory];
  document.getElementById('detailPanels').innerHTML =
    builders.map((b,i)=>`<div class="detail-panel${i===0?' active':''}">${b()}</div>`).join('');
}

function addCreditToScope(){
  const host=document.getElementById('modalHost');
  const ovs = overlaps(curProc);
  const live = ovs.length
    ? ovs.map(o=>`По ${o.credit.num} уже идёт процесс ${procNo(o.other.id)} (предмет: ${o.other.scope}).`).join(' ')

function closeModal(){ document.getElementById('modalHost').classList.remove('open'); document.getElementById('modalHost').innerHTML=''; }

  t.innerHTML=`<span>${msg}</span>`; w.appendChild(t); setTimeout(()=>t.remove(),2600); }

/* Escape закрывает диалог — единый стандарт диалогов модуля (P3-R33).
   Клик по подложке уже обрабатывается на #modalHost. */
document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && document.getElementById('modalHost').classList.contains('open')) closeModal();
});

renderNav(); renderList();

</script>
</body>
</html>
