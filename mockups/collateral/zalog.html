  contracts:  ['№','Договор','Заёмщик','Статус','Предметов','Кредитов','Мин. покрытие','Доп. согл.'],
  monitor:    ['Критичность','Тип','Объект','Описание','Что делать'],
};
/* Ширины столбцов (table-layout:fixed). '' = гибкая колонка — забирает остаток
   ширины (обычно текстовое «Наименование»/«Заёмщик»/«Описание»). */
const WIDTHS = {
  items:      ['72px','200px','','220px','195px','180px','170px'],
  contracts:  ['72px','150px','','150px','110px','100px','130px','100px'],
  monitor:    ['110px','180px','220px','',''],
};
function minCoverage(c){
  const cs = ctx(isActive(c) ? null : c);
  const list = c.credits.map(id => coverage(cs, id).ratio);
  return list.length ? Math.min(...list) : 0;
}
/* Порог покрытия — функция состава (requiredCover), не константа (Д-2): пилюля
   «допуск <порога» на реестре/карточке не может показать одно число на все кредиты
   договора — тултип раскрывает порог по каждому кредиту отдельно. */
function reqTooltip(c){
  const cs = ctx(isActive(c) ? null : c);
  return c.credits.map(id => { const r = requiredCover(id, cs); return `${id} — ${pct(r.req)} (${r.source})`; }).join(', ');
}
function ctrlBadge(it){
  const s = isOverdue(nextSurvey(it)), r = isOverdue(nextReval(it));
  if(s && r) return '<span class="pill high">обслед. + переоц.</span>';
  if(s) return '<span class="pill mid">обследование просрочено</span>';
  if(r) return '<span class="pill mid">переоценка просрочена</span>';
  if(it.needReval) return '<span class="pill mid">нужна переоценка</span>';
  return '<span class="pill low">по графику</span>';
}
function rowsItems(){
  return ITEMS.map(it => {
    const st = lienStatus(it);
    return { id: it.id, sort:{ id:it.id, kind:it.kind, name:it.name, pledger:clientName(it.pledger),
        pledge:pledgeValue(it), st },
      cells:[ it.id, it.kind, esc(it.name), esc(clientName(it.pledger)),
        `<span class="numcell">${fmt(pledgeValue(it))}${it.override ? (isOverAbove(it) ? ' <span class="pill high" title="решение комиссии выше расчётной">комиссия ↑</span>' : ' <span class="pill neutral" title="залоговая по решению комиссии">комиссия</span>') : ''}</span>`,
        `<span class="axis"><span class="pill ${lienCls(st)}">${st}</span>${banPill(it)}</span>`,
        ctrlBadge(it) ] };
  });
}
function rowsContracts(){
  return CONTRACTS.map(c => {
    const mc = minCoverage(c);
    const stPill = c.status===ACTIVE ? 'low' : c.status==='Оформляется' ? 'neutral' : c.status==='Закрыт' ? 'neutral' : 'high';
    return { id:c.id, sort:{ id:c.id, no:c.no, inn:clientName(c.inn), status:c.status,
        items:new Set(c.allocs.map(a=>a.item)).size, credits:c.credits.length, mc, add:c.addenda.length },
      cells:[ c.id, c.no ? esc(c.no) : '<span style="color:var(--text-placeholder)">— не зарегистрирован —</span>',
        esc(clientName(c.inn)),
        `<span class="pill ${stPill}">${c.status}</span>${c.undercovered ? ` <span class="pill high" title="${esc(reqTooltip(c))}">допуск &lt;порога</span>` : ''}${c.replacementRefusal ? ` <span class="pill high" title="${esc(c.replacementRefusal.reason)}">отказ в замене</span>` : ''}`,
        `<span class="numcell">${new Set(c.allocs.map(a=>a.item)).size}</span>`,
        `<span class="numcell">${c.credits.length}</span>`,
        c.status==='Закрыт' ? '—' : `<span class="pill ${gateCheck(c).ok?'low':'high'}">${pct(mc)}</span>`,
        `<span class="numcell">${c.addenda.length}</span>` ] };
  });
}
function rowsMonitor(){
  return triggers().map((t,i) => ({ id:t.obj, kind:t.type, raw:t,
    sort:{ crit:t.crit==='high'?0:1, type:t.type, obj:t.objLbl },
    cells:[ `<span class="pill ${t.crit==='high'?'high':'mid'}">${t.crit==='high'?'высокая':'средняя'}</span>`,
      esc(t.type), esc(t.objLbl), esc(t.text), esc(t.act) ] }));
}

/* ---- карточки реестров (вид «Карточки»). Данные/фильтр/сортировка — те же,
   что в таблице: на вход идёт уже отфильтрованный+отсортированный список строк. ---- */
const cardField = (l,v,span) => `<div class="pcard-field${span?' span2':''}"><span class="pcard-flabel">${l}</span><span class="pcard-fval">${v}</span></div>`;
function itemCard(it){
  const st = lienStatus(it);
  const badges = `<span class="pill ${lienCls(st)}">${st}</span>${banPill(it)}${ctrlBadge(it)}`;
  const pledge = `${fmt(pledgeValue(it))}${it.override ? (isOverAbove(it) ? ' <span class="pill high" title="решение комиссии выше расчётной">комиссия ↑</span>' : ' <span class="pill neutral" title="залоговая по решению комиссии">комиссия</span>') : ''}`;
  return `<div class="pcard ${it.id===selected?'sel':''}" onclick="selectRow('${it.id}')" ondblclick="openSelected()">
    <div class="pcard-head">
      <div class="pcard-ava" style="background:${AVA_LIEN[st]||'#5B6B7E'}">${kindIcon(it.kind)}</div>
      <div class="pcard-title">
        <div class="pcard-name" title="${esc(it.name)}">${esc(it.name)||'—'}</div>
        <div class="pcard-sub">${it.id} · ${esc(it.kind)}</div>
      </div>
      <span class="pcard-chev">${_chev}</span>
    </div>
    <div class="pcard-badges">${badges}</div>
    <div class="pcard-fields">
      ${cardField('Залогодатель', esc(clientName(it.pledger)), true)}
      ${cardField('Залоговая стоимость', `<span class="numcell">${pledge}</span>`, true)}
    </div>
  </div>`;
}
function contractCard(c){
  const mc = minCoverage(c);
  const stPill = c.status===ACTIVE ? 'low' : c.status==='Оформляется' ? 'neutral' : c.status==='Закрыт' ? 'neutral' : 'high';
  const nItems = new Set(c.allocs.map(a=>a.item)).size;
  const cov = c.status==='Закрыт' ? '—' : `<span class="pill ${gateCheck(c).ok?'low':'high'}">${pct(mc)}</span>`;
  const badges = `<span class="pill ${stPill}">${c.status}</span>${c.undercovered ? ` <span class="pill high" title="${esc(reqTooltip(c))}">допуск &lt;порога</span>` : ''}${c.replacementRefusal ? ` <span class="pill high" title="${esc(c.replacementRefusal.reason)}">отказ в замене</span>` : ''}`;
  return `<div class="pcard ${c.id===selected?'sel':''}" onclick="selectRow('${c.id}')" ondblclick="openSelected()">
    <div class="pcard-head">
      <div class="pcard-ava" style="background:${AVA_CTR[c.status]||'#5B6B7E'}">${docIcon()}</div>
      <div class="pcard-title">
        <div class="pcard-name">${c.no ? esc(c.no) : '<span style="color:var(--text-placeholder)">— не зарегистрирован —</span>'}</div>
        <div class="pcard-sub" title="${esc(clientName(c.inn))}">${c.id} · ${esc(clientName(c.inn))}</div>
      </div>
      <span class="pcard-chev">${_chev}</span>
    </div>
    <div class="pcard-badges">${badges}</div>
    <div class="pcard-fields">
      ${cardField('Предметов', `<span class="numcell">${nItems}</span>`)}
      ${cardField('Кредитов', `<span class="numcell">${c.credits.length}</span>`)}
      ${cardField('Мин. покрытие', cov)}
      ${cardField('Доп. согл.', `<span class="numcell">${c.addenda.length}</span>`)}
    </div>
  </div>`;
}
function renderCards(rows){
  const el = document.getElementById('cardsWrap');
  if(!rows.length){ el.innerHTML = `<div class="cards-empty">Записей нет</div>`; return; }
  const card = reg==='items' ? (r=>itemCard(item(r.id))) : (r=>contractCard(contract(r.id)));
  el.innerHTML = `<div class="cards-grid">${rows.map(card).join('')}</div>`;
}
function renderList(){
  document.getElementById('btnNewLbl').textContent = 'Новый залоговый договор';
  /* Предмет рождается только на карточке договора → в реестре «Предметы» кнопки создания нет
     (read-only проекция). Кнопка есть лишь на списке договоров. */
  document.getElementById('btnNew').style.display = (reg==='contracts') ? 'inline-flex' : 'none';

  if(filterPanelReg !== reg) renderFilterPanel();

  const heads = HEADS[reg], ws = WIDTHS[reg] || [];
  document.getElementById('listHead').innerHTML = heads.map((h,i)=>`<th${ws[i]?` style="width:${ws[i]}"`:''} onclick="sortBy(${i})">${h}<span class="sort">↕</span></th>`).join('');
  let rows = filterRows(regRows());
  if(sortKey !== null){
    const keys = Object.keys(rows.length ? rows[0].sort : {});
    const k = keys[sortKey];
    if(k) rows = [...rows].sort((a,b)=>{
      const x=a.sort[k], y=b.sort[k];
      return (typeof x === 'number' ? (x-y) : String(x).localeCompare(String(y),'ru')) * sortDir;
    });
  }
  document.getElementById('listBody').innerHTML = rows.map(r=>`
    <tr data-id="${r.id}" onclick="selectRow('${r.id}')" ondblclick="openSelected()">
      ${r.cells.map(c=>`<td>${c}</td>`).join('')}
    </tr>`).join('') || `<tr><td colspan="${heads.length}"><div class="cgrid-empty">Записей нет</div></td></tr>`;
  const noun = reg==='items' ? 'предметов' : reg==='contracts' ? 'договоров' : 'активных триггеров';
  const active = Object.keys(activeFilter[reg]||{}).length;
  document.getElementById('pagerCount').textContent = rows.length+' '+noun+(active ? ' (фильтр)' : '');
  document.getElementById('jfSummary').textContent = active ? `Фильтр · ${active} активно` : 'Фильтр';
  if(selected) document.querySelectorAll('#listBody tr').forEach(t=>t.classList.toggle('sel', t.dataset.id===selected));

  /* Вид Таблица ↔ Карточки: тумблер только для items/contracts, monitor — всегда таблица. */
  const view = regView(), canToggle = CARD_REGS.includes(reg);
  document.getElementById('viewSeg').style.display = canToggle ? 'inline-flex' : 'none';
  document.getElementById('segTable').classList.toggle('active', view==='table');
  document.getElementById('segCards').classList.toggle('active', view==='cards');
  document.getElementById('gridWrap').style.display  = view==='cards' ? 'none' : '';
  document.getElementById('cardsWrap').style.display = view==='cards' ? '' : 'none';
  if(view==='cards') renderCards(rows);
}
function sortBy(i){ if(sortKey===i) sortDir*=-1; else { sortKey=i; sortDir=1; } renderList(); }
function selectRow(id){ selected = id; renderList(); }
function openSelected(){
  if(!selected) return;
  if(item(selected)) openCard('item', selected);
  else if(contract(selected)) openCard('contract', selected);
  else if(credit(selected)) toast('Переход в карточку кредита '+credit(selected).num+' (модуль «Кредиты»)');
}
/* Кнопка списка создаёт только договор. Предмет рождается на карточке договора (openNewItem с targetCid). */
function onNew(){ if(!canCurate()) return denyEdit(); if(reg==='contracts') openNewContract(); }

/* ============================================================
   КАРТОЧКИ — вкладки и панели
   ============================================================ */
const TABS_ITEM = ['Основное','Стоимость и переоценки','Запрет на отчуждение','Обследования','Обеспечиваемые кредиты','Документы','История'];
const TABS_CTR  = ['Общая информация','Предметы и доли','Кредиты и покрытие','Доп соглашения','Документы','История'];
let curTab = 0;

function openCard(type, id, tab){
  cur = { type, id }; curTab = tab ?? 0;
  const tabs = type==='item' ? TABS_ITEM : TABS_CTR;
  document.getElementById('detailTabbar').innerHTML =
    tabs.map((t,i)=>`<button class="dtab${i===curTab?' active':''}" onclick="openCard('${type}','${id}',${i})">${t}</button>`).join('');
  const panels = type==='item' ? itemPanels(item(id)) : ctrPanels(contract(id));
  document.getElementById('detailPanels').innerHTML = panels[curTab];
  document.getElementById('detailFooter').innerHTML = type==='item' ? itemFooter(item(id)) : ctrFooter(contract(id));
  document.getElementById('crumbTitle').textContent = type==='item'
    ? `${id} · ${item(id).name}` : `${id} · ${contract(id).no || 'черновик'} · ${clientName(contract(id).inn)}`;
  showView('detail');
}
const kpi = (l,v,src) => `<div class="dim"><div class="dl">${l}</div><div class="dv">${v}</div><div class="src">${src}</div></div>`;
const ro  = (l,v)=>`<div class="field"><span class="flabel">${l}</span><div class="control ro"><input value="${esc(v??'')}" readonly></div></div>`;

/* ---------- КАРТОЧКА ПРЕДМЕТА ---------- */
/* Р-8: блок извещения о восполнении на карточке (состояние регламентного шага перед взысканием). */
function renderRestoreBlock(it){
  const rn = it.restoreNotice, reason = it.lost ? 'утрата' : 'ухудшение состояния';
  if(!rn || !rn.issued) return `<div class="warn-inline" style="margin:0 0 12px"><span>Обследование зафиксировало <b>${reason}</b>. Оформите извещение о восполнении и установите срок.</span></div>`;
  if(rn.resolved === 'восполнено') return `<div class="okline" style="margin:0 0 12px"><span>Восполнено: ${esc(rn.doc||'')} — предмет восстановлен/заменён, взыскание не требуется.</span></div>`;
  if(rn.resolved === 'отказ' || isOverdue(rn.deadline)){
    const why = rn.resolved==='отказ' ? 'залогодатель отказался восполнить предмет' : `срок восполнения ${rn.deadline} истёк без восполнения`;
    return `<div class="flagline" style="margin:0 0 12px"><span>Извещение ${esc(rn.doc||'')} от ${rn.date}: ${why}. Замените предмет доп соглашением либо зафиксируйте отказ.</span></div>`;
  }
  return `<div class="infoline" style="margin:0 0 12px"><span>Извещение ${esc(rn.doc||'')} от ${rn.date} вручено, срок восполнения до <b>${rn.deadline}</b> (${daysLeft(rn.deadline)} дн.). До истечения срока взыскание не поднимается.</span></div>`;
}
/* type-specific детали предмета для чтения (KIND_FIELDS §9.2 прежней системы) */
function detailRows(it){
  const defs = KIND_FIELDS[it.kind] || [], d = it.details || {};
  const rows = defs.filter(f => d[f.k]!=null && String(d[f.k]).trim()!=='').map(f => ro(f.l, d[f.k]));
  return rows.length ? rows.join('')
    : `<div class="field col-span"><div class="infoline"><span>Детальные поля вида не заполнены — запись перенесена из прежней системы (краткий идентификатор «${esc(it.ident||'—')}»).</span></div></div>`;
}
/* ВЛОЖЕНИЯ (сканы): правоуст. документ, отчёт оценщика, акты обследования, согласия. */
const FILE_TAGS = ['Правоустанавливающий документ','Отчёт оценщика','Акт обследования','Согласие / решение органа','Договор / доп. соглашение','Иное'];
function fileTable(files){
  const fs = files || [];
  return `<div class="cgrid-wrap"><table class="cgrid">
    <thead><tr><th>Тип документа</th><th>Файл</th><th>Дата</th><th>Кто прикрепил</th></tr></thead>
    <tbody>${fs.length ? fs.map(f=>`<tr><td>${esc(f.tag)}</td><td>${esc(f.name)}</td><td>${f.when}</td><td>${esc(f.who)}</td></tr>`).join('')
      : `<tr><td colspan="4"><div class="cgrid-empty">Файлы не прикреплены</div></td></tr>`}</tbody>
  </table></div>`;
}
function openAttach(scope, id){
  if(!canCurate()) return denyEdit();
  modal(`<div class="modal form">${mhead('Прикрепить файл')}
    <div class="modal-b"><div class="mform">
      ${fsel('atTag','Тип документа', FILE_TAGS, FILE_TAGS[0], true)}
      ${fin('atName','Имя файла','', true, true)}
    </div>
    </div>${mfoot('Прикрепить','saveAttach(\''+scope+'\',\''+id+'\')')}</div>`);
}
function saveAttach(scope, id){
  const tag = val('atTag'), name = val('atName').trim();
  if(!name) return toast('Укажите имя файла','warn');
  const h = scope==='item' ? item(id) : contract(id);
  if(!h) return;
  (h.files ||= []).push({ tag, name, when: TODAY, who: role });
  hist(h, `Прикреплён файл «${name}» (${tag})`);
  closeModal(); toast('Файл прикреплён','ok'); refresh();
}

function itemPanels(it){
  const st = lienStatus(it), pv = pledgeValue(it), cp = calcPledge(it);
  const ns = nextSurvey(it), bs = borrowerSolvency(it);
  /* Р-22 (ПОР п.10): если действующий интервал ужесточён относительно нормативной
     матрицы (§2.3), показываем ОБА — норматив и действующий (с категорией риска).
     Равны → показываем только один, как до Р-22. */
  const rcIt = bs ? itemRiskCategory(it) : null;
  const effIt = bs ? effectiveInterval(bs.group, movableOf(it), rcIt, RISK_TIGHTENING_APPROVAL) : null;
  const intervalNote = (bs && effIt != null && effIt !== bs.interval)
    ? ` (норматив §2.3 — ${bs.interval} мес.; действующий — ${effIt} мес., ПОР п.10, категория риска «${rcIt}»)`
    : '';
  const surveyLbl = ns ? (ns + (isOverdue(ns) ? ' — ПРОСРОЧЕНО' : '') + intervalNote)
    : (bs && bs.bankrupt ? 'по договору со спецадминистратором (банкрот)' : 'не планируется (предмет никого не обеспечивает)');
  const head = `<div class="phead">
    <div class="phead-top">
      <div class="phead-name"><span class="nm">${esc(it.name)}</span>
        <a onclick="toast('Переход в карточку клиента (модуль «Заёмщики»)')">${esc(clientName(it.pledger))} <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg></a>
        <div class="phead-sub" style="width:100%">${it.id} · ${esc(it.kind)} · ${esc(it.ident)}</div>
      </div>
      <span class="phead-owner"><span class="pill ${lienCls(st)}">${st}</span> ${banPill(it)}</span>
    </div>
    ${banMissing(it) ? `<div class="phead-banner danger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
      <span>Залог не защищён от продажи: договор(ы) ${banContracts(it).join(', ')} зарегистрированы, но запрет на отчуждение в «${esc(organOf(it))}» не наложен. Залогодатель может продать предмет без нашего ведома. Срок наложения: до ${banDeadline(it)}${banOverdue(it) ? ` — ПРОСРОЧЕН на ${Math.abs(daysLeft(banDeadline(it)))} дн.` : ''}.</span></div>` : ''}
    ${banStale(it) ? `<div class="phead-banner warn"><span>Доли по предмету обнулились, а запрет ${esc(it.ban.regNo)} от ${it.ban.date} продолжает действовать в «${esc(organOf(it))}». Имущество клиента заблокировано без правового основания — требуется снятие запрета отдельным актом.</span></div>` : ''}
    ${it.ban && !banStale(it) ? `<div class="phead-banner ok"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
      <span>Запрет на отчуждение наложен: ${esc(organOf(it))} · ${esc(it.ban.regNo)} от ${it.ban.date}. Предмет не может быть продан без нашего ведома.</span></div>` : ''}
    ${it.lost ? `<div class="phead-banner danger"><span>Предмет утрачен по акту обследования — стоимость исключена из покрытия (залоговая = 0).</span></div>` : ''}
    ${it.needReval ? `<div class="phead-banner warn"><span>Обследование зафиксировало ухудшение состояния → требуется досрочная переоценка (вне планового цикла).</span></div>` : ''}
    <div class="phead-dims">
      ${kpi('Оценочная стоимость', fmt(it.appraised), `owned · отчёт ${esc(it.apprReport)} от ${it.apprDate}`)}
      ${kpi('Залоговая стоимость', fmt(pv), it.override ? `решение комиссии${isOverAbove(it)?' ↑ выше расчётной':''} · расчётная ${fmt(cp)}` : `расчётная · ${fmt(it.appraised)} × ${coefOf(it.kind)}`)}
      ${kpi('Отнесено', fmt(allocatedLegal(it.id)+allocatedDraft(it.id)), `доли по договорам (действ. ${fmt(allocatedLegal(it.id))} + черновики ${fmt(allocatedDraft(it.id))})`)}
      ${kpi('Доступно', fmt(availableOf(it)), 'залоговая − отнесённое')}
    </div></div>`;

  const p0 = `<div class="panel-wrap">${head}<div class="panel-card"><div class="f2">
      ${ro('Вид залога', it.kind)}
      ${ro('Наименование / описание', it.name)}
      ${ro('Залогодатель', clientName(it.pledger)+' · ИНН '+it.pledger)}
      ${ro('Количество · ед. изм.', (it.qty??'—')+' '+(it.unit||''))}
      ${ro('Правоустанавливающий документ', it.legalDoc || '—')}
      ${ro('Краткий идентификатор', it.ident)}
      ${ro('Статус (залоговая ось)', st)}
      ${ro('Запрет на отчуждение', it.ban
        ? `${banStatus(it)} · ${organOf(it)} · ${it.ban.regNo} от ${it.ban.date}`
        : (banRequired(it) ? `${banStatus(it)} · срок до ${banDeadline(it)}` : 'не требуется'))}
      ${ro('Тип залогодателя', it.pledgerType)}
      ${ro('Следующее обследование', surveyLbl)}
      ${ro('Следующая переоценка', nextReval(it) + (isOverdue(nextReval(it)) ? ' — ПРОСРОЧЕНО' : ''))}
    </div>
    <p class="section-h" style="font-size:16px;margin-top:18px">Детали предмета (по виду «${esc(it.kind)}»)</p>
    <div class="f2">${detailRows(it)}</div>
    </div></div>`;

  const filesSection = `<p class="section-h" style="margin-top:22px">Вложения</p>
    <div class="gtoolbar"><button class="btn btn-tint btn-sm" onclick="openAttach('item','${it.id}')">Прикрепить файл</button></div>
    ${fileTable(it.files)}`;

  const zBadge = it.override
    ? (isOverAbove(it)
        ? '<span class="pill high" title="решение комиссии выше расчётной — вне положения">решение комиссии ↑</span>'
        : '<span class="pill neutral" title="залоговая установлена решением комитета по администрированию бюджетных кредитов">решение комиссии</span>')
    : '<span class="pill info" title="залоговая = оценочная × коэффициент вида">расчётная</span>';
  const p1 = `<div class="panel-wrap">
    <p class="section-h">Стоимость</p>
    <div class="panel-card" style="margin-bottom:16px"><div class="f2">
      ${ro('Оценочная (owned)', fmt(it.appraised))}
      ${ro('Коэффициент вида «'+it.kind+'» (справочник)', String(coefOf(it.kind)).replace('.',','))}
      <div class="field col-span"><span class="flabel">Залоговая стоимость (в расчёте покрытия)</span>
        <div class="control ro" style="gap:8px">
          <input value="${esc(fmt(pv))}" readonly style="width:auto;flex:1">
          ${zBadge}
        </div></div>
    </div>
    ${it.override ? `<div class="${isOverAbove(it)?'flagline':'infoline'}" style="margin-top:14px">
      <span><b>Решение комитета по администрированию бюджетных кредитов:</b> ${fmt(it.override.value)} (расчётная ${fmt(cp)})${isOverAbove(it)
        ? ' — <b>выше расчётной</b>, вне положения:' : ' — снижение, в рамках положения.'}
      ${isOverAbove(it) ? `<br>«${esc(it.override.obosn)}»<br><span class="formula">${esc(it.override.by)} · ${it.override.date}</span>` : ''}</span></div>`
      : ''}
    </div>
    <p class="section-h">История переоценок</p>
    <div class="gtoolbar">
      <button class="btn btn-tint btn-sm" onclick="openReval('${it.id}')">Провести переоценку</button>
      <button class="btn btn-tint btn-sm" onclick="openOverride('${it.id}')">Изменить залоговую стоимость (решение комиссии)</button>
    </div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Дата</th><th>Отчёт оценщика</th><th class="numcell">Оценочная</th><th class="numcell">Залоговая (расч.)</th><th>Примечание</th></tr></thead>
      <tbody>${[...it.revals].reverse().map(r=>`<tr><td>${r.date}</td><td>${esc(r.report)}</td>
        <td class="numcell">${fmt(r.appraised)}</td><td class="numcell">${fmt(Math.round(r.appraised*coefOf(it.kind)*100)/100)}</td>
        <td>${esc(r.note||'')}</td></tr>`).join('')}</tbody>
    </table></div></div>`;

  const canPlace = banRequired(it) && !it.ban;          // есть основание, запрета ещё нет
  const canRelease = Boolean(it.ban) && allocatedLegal(it.id) === 0;  // доли обнулились
  const consentsRows = (it.consents||[]).map(cn=>`<tr><td>${esc(cn.action)}</td><td>${cn.date}</td><td>${esc(cn.doc||'')}</td>
    <td><span class="pill ${cn.decision==='положительное'?'low':'high'}">${cn.decision}</span></td>
    <td>${cn.revalRequired?(cn.revalDone?'переоценка выполнена':'<span class="pill mid">требуется переоценка</span>'):'—'}</td>
    <td>${esc(cn.note||'')}</td></tr>`).join('');
  const p2 = `<div class="panel-wrap">
    <p class="section-h">Запрет на отчуждение</p>
    <div class="gtoolbar">
      <button class="btn btn-tint btn-sm" onclick="openBan('${it.id}')" ${canPlace?'':'disabled'} title="${canPlace?'':'Наложить можно только на обременённый зарегистрированным договором предмет'}">Наложить запрет</button>
      <button class="btn btn-tint btn-sm" onclick="openConsent('${it.id}')" ${it.ban?'':'disabled'} title="${it.ban?'':'Согласие выдаётся только по действующему запрету'}">Согласие на действия (без снятия)</button>
      <button class="btn btn-tint btn-sm danger" onclick="openBanRelease('${it.id}')" ${canRelease?'':'disabled'} title="${canRelease?'':'Полное снятие нельзя, пока по предмету закреплены доли'}">Снять запрет (полное)</button>
      <button class="btn btn-tint btn-sm" onclick="openPartialRelease('${it.id}')" ${it.ban?'':'disabled'} title="${it.ban?'частичное снятие запрета с части предмета':'Нет действующего запрета'}">Частичное снятие</button>
    </div>
    ${it.ban ? `<div class="panel-card"><div class="f2">
        ${ro('Статус', banStatus(it))}
        ${ro('Регистрирующий орган', it.ban.organ)}
        ${ro('Рег. № запрета', it.ban.regNo)}
        ${ro('Дата наложения', it.ban.date)}
        ${ro('Договоры-основания', it.ban.contracts.join(', '))}
        ${ro('Подлежит снятию', it.ban.pendingRelease ? 'да — доли обнулились, оформить акт снятия' : 'нет — предмет обеспечивает кредит')}
      </div>
      ${banStale(it) ? `<div class="phead-banner warn" style="margin:14px 0 0"><span>Доли обнулились — запрет продолжает действовать в органе. Снимите его отдельным актом.</span></div>`
        : `<div class="okline" style="margin:14px 0 0"><span>Предмет защищён от продажи.</span></div>`}
      ${(it.consents&&it.consents.length) ? `<p class="section-h" style="font-size:16px;margin-top:18px">Согласия на действия (запрет сохраняется в силе)</p>
        <div class="cgrid-wrap"><table class="cgrid"><thead><tr><th>Действие</th><th>Дата</th><th>Документ</th><th>Решение</th><th>Переоценка</th><th>Примечание</th></tr></thead><tbody>${consentsRows}</tbody></table></div>` : ''}
      </div>`
      : (banRequired(it) ? `<div class="flagline"><span>Запрет НЕ наложен, а договор(ы) ${banContracts(it).join(', ')} уже зарегистрированы. Залог не защищён от продажи. Срок наложения в «${esc(organOf(it))}»: до ${banDeadline(it)}${banOverdue(it) ? ` — ПРОСРОЧЕН на ${Math.abs(daysLeft(banDeadline(it)))} дн.` : ''}. Нажмите «Наложить запрет».</span></div>`
        : `<div class="okline"><span>Запрет не требуется: предмет не обременён ни одним зарегистрированным договором — оснований для наложения нет.</span></div>`)}
    </div>`;

  const p3 = `<div class="panel-wrap">
    <p class="section-h">Обследования</p>
    <div class="kpis">
      ${kpi('Группа платёжеспособности', bs ? bs.group : '—', 'зеркало из модуля заёмщика')}
      ${kpi('Интервал обследования', bs ? (bs.interval!=null ? bs.interval+' мес.' : 'по договору со спецадминистратором') : '—', `${movableOf(it)?'движимое':'недвижимое'}`)}
      ${kpi('Следующее обследование', ns || '—', ns ? (isOverdue(ns) ? 'ПРОСРОЧЕНО на '+Math.abs(daysLeft(ns))+' дн.' : 'через '+daysLeft(ns)+' дн.') : (bs&&bs.bankrupt?'банкрот — авто-просрочка не поднимается':'не планируется'))}
      ${kpi('Следующая переоценка', nextReval(it), (isOverdue(nextReval(it)) ? 'ПРОСРОЧЕНО на '+Math.abs(daysLeft(nextReval(it)))+' дн.' : 'через '+daysLeft(nextReval(it))+' дн.'))}
    </div>
    <div class="gtoolbar"><button class="btn btn-tint btn-sm" onclick="openSurvey('${it.id}')">Зарегистрировать обследование</button>
      ${(it.lost||it.needReval) ? `<button class="btn btn-tint btn-sm" onclick="openRestoreNotice('${it.id}')">${it.restoreNotice&&it.restoreNotice.issued?'Обновить извещение о восполнении':'Оформить извещение о восполнении'}</button>` : ''}</div>
    ${(it.lost||it.needReval) ? renderRestoreBlock(it) : ''}
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Дата</th><th>Акт</th><th>Исход</th><th>Примечание</th></tr></thead>
      <tbody>${[...it.surveys].reverse().map(s=>{const ef=surveyEffect(s.outcome);return `<tr><td>${s.date}</td><td>${esc(s.act)}${s.oneSided ? ` <span class="pill mid" title="Сторона уклонилась от подписания (П2 §2.4)">односторонний</span>` : ''}</td>
        <td><span class="pill ${ef==='ok'?'low':ef==='lost'?'high':'mid'}">${esc(s.outcome)}</span></td>
        <td>${esc(s.note||'')}</td></tr>`}).join('')}</tbody>
    </table></div></div>`;

  const cs = CONTRACTS.filter(c => (isActive(c)||isDraftish(c)) && c.allocs.some(a=>a.item===it.id));
  const active = CONTRACTS.filter(isActive);
  const arows = cs.flatMap(c => c.allocs.filter(a=>a.item===it.id).map(a=>({c,a})));
  const totAll = allocatedLegal(it.id) + allocatedDraft(it.id);
  const p4 = `<div class="panel-wrap">
    <p class="section-h">Обеспечиваемые кредиты (предмет ↔ кредит)</p>
    <div class="${totAll > pv + 0.005 ? 'flagline' : 'okline'}">
      <span>Инвариант: Σ долей ${fmt(totAll)} ${totAll > pv + 0.005 ? '>' : '≤'} залоговая ${fmt(pv)} ${totAll > pv + 0.005
        ? '— НАРУШЕН. Доли усечены пропорционально в расчёте покрытия (юридический объём договора не меняется), кредиты уходят в триггер «недостаточность обеспечения».'
        : '— соблюдён. Доступно для перезалога: '+fmt(availableOf(it))+'.'}</span></div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Договор</th><th>Статус</th><th>Кредит</th><th class="numcell">Доля (юр.)</th><th class="numcell">Эффективная доля</th><th>Приоритет</th></tr></thead>
      <tbody>${arows.length ? arows.map(({c,a},i)=>`<tr>
        <td><span class="rowlink" onclick="openCard('contract','${c.id}')">${c.id} ${esc(c.no||'(черновик)')}</span></td>
        <td><span class="pill ${isActive(c)?'low':'neutral'}">${c.status}</span></td>
        <td><span class="rowlink" onclick="toast('Переход в карточку кредита ${credit(a.credit).num}')">${a.credit} · ${esc(credit(a.credit).num)}</span></td>
        <td class="numcell">${fmt(a.share)}</td>
        <td class="numcell">${isActive(c) ? fmt(effShare(active, it.id, a.share)) : '—'}</td>
        <td>${isActive(c) ? (i+1)+' (по дате регистрации ' + c.date + ')' : '—'}</td></tr>`).join('')
        : `<tr><td colspan="6"><div class="cgrid-empty">Предмет не отнесён ни к одному кредиту — свободен целиком</div></td></tr>`}</tbody>
    </table></div></div>`;

  const p5 = `<div class="panel-wrap">
    <p class="section-h">История предмета</p>
    <div class="hist">${[...it.history].map(h=>`<div class="hrow"><div class="hwhen">${h.when}</div><div class="hwhat">${esc(h.what)}</div><div class="hwho">${esc(h.who)}</div></div>`).join('')}</div></div>`;

  /* ---- Р-5 предпосылки оформления + Р-7 техническая допустимость ---- */
  const req = prereqReq(it), pr = it.prereqs || {};
  const prereqRows = PREREQ_KEYS.map(k=>{
    const rq = req[k], present = (pr[k]||{}).present, need = rq.required;
    const cls = !need ? 'neutral' : present ? 'low' : 'high';
    const stt = !need ? 'не требуется' : present ? 'приложено' : 'обязателен, отсутствует';
    const label = k==='ownerConsent' ? 'Согласие собственника' : k==='spouseConsent' ? 'Согласие супруга(и)' : 'Справка об отсутствии ограничений';
    return `<tr><td>${label}</td><td>${esc(rq.label)}</td><td><span class="pill ${cls}">${stt}</span></td>
      <td>${(pr[k]||{}).doc?esc(pr[k].doc):'—'}</td>
      ${canCurate()?`<td>${need?`<button class="btn btn-tint btn-sm" onclick="togglePrereq('${it.id}','${k}')">${present?'Открепить':'Приложить документ'}</button>`:'—'}</td>`:''}</tr>`;
  }).join('');
  const miss = prereqMissing(it);
  /* Р-17: возрастной флаг не всегда «приём не допускается» — жёсткий блок только для
     «дополнительный» залог сверх лимита; «основной» сверх лимита — допуск решением комитета. */
  const ageChk = techAge(it)!=null ? techAgeCheck({ securityRole: it.securityRole||'основной', origin: it.origin, age: techAge(it) }) : null;
  const techBlock = isTech(it) ? `<p class="section-h" style="margin-top:20px">Техническая допустимость</p>
    <div class="panel-card"><div class="f2">
      ${ro('Год выпуска', it.year||'—')}
      ${ro('Возраст', techAge(it)!=null ? techAge(it)+' лет (лимит '+techAgeLimit(it)+' — '+it.origin+')' : '—')}
      ${ro('Происхождение', it.origin||'—')}
      ${ro('Роль обеспечения', it.securityRole||'—')}
      ${ro('Страховой полис', it.insured&&it.insured.present ? (it.insured.policy+(it.insured.till?' · до '+it.insured.till:'')) : 'нет')}
    </div>
    ${ageChk && (ageChk.block || ageChk.needCommittee) ? `<div class="flagline" style="margin-top:12px"><span>${esc(ageChk.msg)}</span></div>` : ''}
    ${!techInsuredOk(it) ? `<div class="flagline" style="margin-top:12px"><span>Техника-обеспечение не застрахована.</span></div>`
      : techPolicyExpired(it) ? `<div class="flagline" style="margin-top:12px"><span>Страховой полис ${esc(it.insured.policy)} истёк ${it.insured.till} — триггер «страхование техники истекло».</span></div>`
      : `<div class="okline" style="margin-top:12px"><span>Техническая допустимость соблюдена.</span></div>`}
    </div>` : '';
  const p6 = `<div class="panel-wrap">
    <p class="section-h">Предпосылки оформления</p>
    <div class="${miss.length?'flagline':'okline'}"><span>${miss.length ? ('Не приложены обязательные документы: '+miss.map(m=>esc(m.label)).join('; ')+'. Регистрация договора будет заблокирована.') : 'Все обязательные предпосылки закрыты.'}</span></div>
    <div class="cgrid-wrap"><table class="cgrid"><thead><tr><th>Предпосылка</th><th>Что требуется</th><th>Статус</th><th>Документ</th>${canCurate()?'<th></th>':''}</tr></thead><tbody>${prereqRows}</tbody></table></div>
    ${techBlock}
    ${filesSection}
    </div>`;

  return [p0,p1,p2,p3,p4,p6,p5];
}
function itemFooter(it){
  // Действия предмета живут в тулбарах своих вкладок (переоценка → «Стоимость»,
  // запрет → «Запрет на отчуждение», обследование → «Обследования») — рядом со
  // своим статусом, гейтами и историей. Футер несёт только выход из карточки.
  return `<button class="btn btn-secondary" onclick="showView('list')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Закрыть</button>`;
}

/* ---------- КАРТОЧКА ЗАЛОГОВОГО ДОГОВОРА ---------- */
function ctrPanels(c){
  const virtual = isActive(c) ? null : c;
  const cs = ctx(virtual);
  const gate = gateCheck(c);
  const mc = minCoverage(c);
  const items = [...new Set(c.allocs.map(a=>a.item))];
  const thirdParty = items.filter(i => item(i).pledger !== c.inn);
  /* Запреты на отчуждение — вычисляемый оверлей поверх статуса «Зарегистрирован»,
     НЕ отдельный статус договора (как «покрытие — оверлей, не статус»). Считается
     только по зарегистрированному договору: до регистрации оснований для запрета нет. */
  const banItems  = isActive(c) ? items.filter(i => banRequired(item(i))) : [];
  const banPlaced = banItems.filter(i => item(i).ban);
  const banMiss   = banItems.filter(i => !item(i).ban);

  const head = `<div class="phead">
    <div class="phead-top">
      <div class="phead-name"><span class="nm">${c.no || 'Залоговый договор (черновик)'}</span>
        <a onclick="toast('Переход в карточку заёмщика (модуль «Заёмщики»)')">${esc(clientName(c.inn))} <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg></a>
        <div class="phead-sub" style="width:100%">${c.id} · ${c.credits.length} кредит(ов) · ${items.length} предмет(ов)</div>
      </div>
      <span class="phead-owner"><span class="pill ${isActive(c)?'low':c.status==='На рассмотрении комиссии'?'high':'neutral'}">${c.status}</span></span>
    </div>
    ${c.status==='На рассмотрении комиссии' ? `<div class="phead-banner danger">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
      <span>Контрольный гейт покрытия не пройден (${gate.rows.filter(r=>!r.ok).map(r=>`${r.id} — ${pct(r.ratio)} при пороге ${pct(r.req)} (${r.source})`).join('; ')}) — регистрация ЗАБЛОКИРОВАНА до решения комитета по администрированию бюджетных кредитов. Комиссия либо возвращает на доработку (догрузить/заменить предмет), либо допускает недообеспеченный кредит с обязательным обоснованием.</span></div>` : ''}
    ${c.undercovered ? `<div class="phead-banner warn">
      <span>Допущен комиссией с покрытием ниже порога ${pct(c.undercovered.req)} (${pct(c.undercovered.ratio)}). Обоснование: «${esc(c.undercovered.obosn)}» · ${esc(c.undercovered.by)} · ${c.undercovered.date}</span></div>` : ''}
    ${c.replacementRefusal ? `<div class="phead-banner warn">
      <span>Отказано в замене залога по кредиту(ам) ${c.replacementRefusal.credits.join(', ')} (Прил.3 §3.5). Причина: «${esc(c.replacementRefusal.reason)}» · ${esc(c.replacementRefusal.by)} · ${c.replacementRefusal.date}</span></div>` : ''}
    <div class="phead-dims">
      ${kpi('Статус', c.status, 'ЖЦ договора')}
      ${kpi('Мин. покрытие', c.status==='Закрыт' ? '—' : `<span class="pill ${gateCheck(c).ok?'low':'high'}">${pct(mc)}</span>`, `худший кредит договора · порог по составу (${pct(COVER_LIQUID)}/${pct(COVER_MOVABLE)})`)}
    </div></div>`;

  const p0 = `<div class="panel-wrap">${head}<div class="panel-card">
    <p class="section-h" style="font-size:16px;margin-top:0">Договор</p>
    <div class="f2">
      ${ro('Номер договора', c.no || '—')}
      ${ro('Дата договора', c.date || '—')}
      ${ro('Заёмщик (кредиты договора)', clientName(c.inn)+' · ИНН '+c.inn)}
      ${ro('Залогодатель(и)', [...new Set(items.map(i=>clientName(item(i).pledger)))].join(', ') || '—')}
    </div>
    <p class="section-h" style="font-size:16px;margin-top:18px">Регистрация</p>
    <div class="f2">
      ${ro('Нотариус', c.notary || '—')}
      ${ro('№ / дата нотариальной регистрации', c.notaryNo ? c.notaryNo+' от '+c.notaryDate : '—')}
      ${ro('Залоговое рег. свидетельство', c.cert || '—')}
    </div>
    ${banMiss.length ? `<div class="flagline" style="margin-top:14px"><span>Оформление не завершено: по предметам ${banMiss.join(', ')} не наложен запрет на отчуждение (срок до ${banDeadline(item(banMiss[0]))}). Договор зарегистрирован, но залог не защищён от продажи.</span></div>` : ''}
    ${thirdParty.length ? `<div class="infoline" style="margin-top:14px"><span>В договоре есть предметы, чей залогодатель ≠ заёмщик (${thirdParty.map(i=>i+' · '+clientName(item(i).pledger)).join('; ')}). Имущественный залог третьего лица — отвечает только заложенным предметом.</span></div>` : ''}
    </div></div>`;

  const editable = isDraftish(c) && canCurate();
  /* Группировка по предмету: атрибуты предмета (вид/залогодатель/залоговая/запрет)
     rowspan'ятся, под-строки — по кредитам, которые предмет обеспечивает.
     Убирает построчный дубль, когда один предмет обеспечивает несколько кредитов. */
  const itemGroups = [];
  c.allocs.forEach((a,i)=>{ let g = itemGroups.find(x=>x.item===a.item); if(!g){ g = { item:a.item, rows:[] }; itemGroups.push(g); } g.rows.push({ a, i }); });
  const totalEff = c.allocs.reduce((s,a)=>s+effShare(cs, a.item, a.share),0);
  const colCount = editable ? 8 : 7;
  const p1 = `<div class="panel-wrap">
    <p class="section-h">Предметы и доли</p>
    ${editable ? `<div class="gtoolbar">
      <button class="btn btn-tint btn-sm" onclick="openNewItem('${c.id}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Создать новый предмет</button>
      <button class="btn btn-tint btn-sm" onclick="openAlloc('${c.id}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Привязать существующий</button></div>` : ''}
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Предмет</th><th>Вид</th><th>Залогодатель</th><th>Кредит</th><th class="numcell">Залоговая</th><th class="numcell">Доля</th><th>Запрет</th>${editable?'<th></th>':''}</tr></thead>
      <tbody>${itemGroups.length ? itemGroups.map(g=>{ const it = item(g.item), rs = g.rows.length;
        return g.rows.map((r,ri)=>{ const a = r.a, eff = effShare(cs, it.id, a.share);
          const creditCell = `<td>${a.credit}</td>`;
          const shareCell = `<td class="numcell">${fmt(a.share)}${eff < a.share - 0.005 ? ` <span class="pill high" title="залоговая упала ниже суммы долей — фактически учтено ${fmt(eff)}">усечена → ${fmt(eff)}</span>` : ''}</td>`;
          const actionCell = editable ? `<td><button class="btn btn-tint btn-sm danger" onclick="dropAlloc('${c.id}',${r.i})">Убрать</button></td>` : '';
          if(ri>0) return `<tr>${creditCell}${shareCell}${actionCell}</tr>`;
          return `<tr>
            <td rowspan="${rs}" style="vertical-align:top"><span class="rowlink" onclick="openCard('item','${it.id}')">${it.id} · ${esc(it.name)}</span></td>
            <td rowspan="${rs}" style="vertical-align:top">${esc(it.kind)}</td>
            <td rowspan="${rs}" style="vertical-align:top">${esc(clientName(it.pledger))}</td>
            ${creditCell}
            <td rowspan="${rs}" class="numcell" style="vertical-align:top">${fmt(pledgeValue(it))}</td>
            ${shareCell}
            <td rowspan="${rs}" style="vertical-align:top"><span class="rowlink" onclick="openCard('item','${it.id}',2)">${banPill(it)}</span></td>
            ${actionCell}</tr>`;
        }).join('');
      }).join('') + `<tr class="total"><td colspan="5">Итого — залоговая масса договора</td><td class="numcell">${fmt(totalEff)}</td><td${editable?' colspan="2"':''}></td></tr>`
        : `<tr><td colspan="${colCount}"><div class="cgrid-empty">Предметы не привязаны</div></td></tr>`}</tbody>
    </table></div></div>`;

  const totAmt = c.credits.reduce((s,id)=>s+credit(id).amount,0);
  const totSec = c.credits.reduce((s,id)=>{ const r = gate.rows.find(x=>x.id===id); return s + r.sum; },0);
  const p2 = `<div class="panel-wrap">

      <tbody>${c.credits.map(id=>{ const r = gate.rows.find(x=>x.id===id), cr = credit(id);
        const need = cr.amount*r.req, deficit = need - r.sum;
        const defCell = r.other ? '<span class="pill neutral">—</span>'

                             : `<span class="diff-up" title="обеспечение выше требуемого">+${fmt(-deficit)}</span>`);
        const otherNote = r.other ? (r.other.type==='банковская гарантия' ? 'учтена в индексе обеспеченности (Р-11)' : 'вне залогового гейта, справочно') : '';
        return `<tr>
        <td>${id}${r.other?` <span class="pill info" title="${esc(r.other.type)} — ${otherNote}">иная форма</span>`:''}</td><td>${esc(cr.num)}</td>
        <td class="numcell">${fmt(cr.amount)}</td>
        <td class="numcell">${r.other ? '<span class="pill neutral">—</span>' : `${pct(r.req)} · ${fmt(need)}`}</td>
        <td class="numcell">${fmt(r.sum)}</td>
        <td class="numcell">${defCell}</td>
        <td><span class="pill ${r.ok?'low':(r.covOk?'mid':'high')}">${pct(r.ratio)}</span></td>
        <td><span class="pill ${r.index>=1?'low':'high'}" title="залог ${pct(r.idxPledge)}${r.gReq?` + гарантия ${pct(r.idxGuar)} (порог ${pct(r.gReq)})`:''} = индекс ${pct(r.index)}">${pct(r.index)}</span></td>
        <td>${r.liqApplies ? `<span class="pill ${r.liqOk?'low':'high'}">${pct(r.liqShare)} / 80%</span>` : '<span class="pill neutral">—</span>'}</td>
        <td>${cr.status}${cr.overdue?' <span class="pill high">просрочка</span>':''}</td>
        ${canCurate()&&isActive(c) ? `<td>${cr.status==='Действующий' ? `<button class="btn btn-tint btn-sm" onclick="repay('${c.id}','${id}')">Отметить погашенным</button>` : '—'}</td>` : ''}</tr>`; }).join('')}
        <tr class="total"><td colspan="2">Итого по договору</td><td class="numcell">${fmt(totAmt)}</td><td class="numcell"></td><td class="numcell">${fmt(totSec)}</td><td class="numcell"></td><td><span class="pill ${totSec>=totAmt?'low':'high'}">${pct(totAmt ? totSec/totAmt : 0)}</span></td><td></td><td></td><td></td>${canCurate()&&isActive(c)?'<td></td>':''}</tr></tbody>
    </table></div>
    ${gate.ok ? `<div class="okline" style="margin-top:14px"><span>Гейт покрытия пройден по всем кредитам договора.</span></div>`
      : `<div class="flagline" style="margin-top:14px"><span>Гейт покрытия НЕ пройден: ${gate.rows.filter(r=>!r.ok).map(r=>`${r.id} — ${pct(r.ratio)} (порог ${pct(r.req)}${r.liqApplies&&!r.liqOk?`, доля ликвида ${pct(r.liqShare)}<80%`:''})`).join(', ')}. ${isActive(c)
        ? 'Триггер «недостаточность обеспечения» во взыскание.'
        : 'Регистрация заблокирована до решения комиссии.'}</span></div>`}
    </div>`;

  const p3 = `<div class="panel-wrap">
    <p class="section-h">Доп соглашения</p>
    ${isActive(c) && canDs() ? `<div class="gtoolbar"><button class="btn btn-tint btn-sm" onclick="openDs('${c.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Новое доп соглашение</button></div>`
      : ''}
    ${c.addenda.length ? c.addenda.map(d=>`<div class="panel-card" style="margin-bottom:14px">
      <div class="section-h" style="font-size:16px">${d.no} от ${d.date} <span class="pill low">зарегистрировано</span></div>
      <div class="cgrid-wrap" style="margin:10px 0"><table class="cgrid">
        <thead><tr><th>Операции пакета</th></tr></thead>
        <tbody>${d.ops.map(o=>`<tr><td>${esc(o)}</td></tr>`).join('')}</tbody></table></div>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Кредит</th><th>Покрытие до</th><th>Покрытие после</th></tr></thead>
        <tbody>${d.diff.map(x=>`<tr><td>${x.id}</td><td>${x.before}</td>
          <td class="${x.up?'diff-up':'diff-dn'}">${x.after}</td></tr>`).join('')}</tbody></table></div>
      ${d.obosn ? `<div class="flagline" style="margin-top:12px"><span>Допущено комиссией ниже порога ${pct(d.req)}. Обоснование: «${esc(d.obosn)}»</span></div>` : ''}
    </div>`).join('') : `<div class="cgrid-empty" style="border:1px solid var(--border-default);border-radius:4px">Доп соглашений нет</div>`}
    </div>`;

  const pDocs = `<div class="panel-wrap">
    <p class="section-h">Документы договора</p>
    <div class="gtoolbar"><button class="btn btn-tint btn-sm" onclick="openAttach('contract','${c.id}')">Прикрепить файл</button></div>
    ${fileTable(c.files)}</div>`;

  const p4 = `<div class="panel-wrap">
    <p class="section-h">История договора</p>
    <div class="hist">${[...c.history].reverse().map(h=>`<div class="hrow"><div class="hwhen">${h.when}</div><div class="hwhat">${esc(h.what)}</div><div class="hwho">${esc(h.who)}</div></div>`).join('')}</div></div>`;

  return [p0,p1,p2,p3,pDocs,p4];
}
function ctrFooter(c){
  const back = `<button class="btn btn-secondary" onclick="showView('list')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Закрыть</button><div style="flex:1"></div>`;
  if(c.status==='Оформляется')
    return back + `<button class="btn btn-primary" onclick="openRegister('${c.id}')">Зарегистрировать договор</button>`;
  if(c.status==='На рассмотрении комиссии')

}

/* ============================================================
   ДИАЛОГИ И ДЕЙСТВИЯ — здесь состояние РЕАЛЬНО меняется.
   Каждое действие: валидация → мутация → запись в историю → перерисовка.
