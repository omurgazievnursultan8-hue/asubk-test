  return `
      <p class="section-h" style="font-size:16px">Пороги обеспеченности (§2.3–2.4)</p>
      <div class="mform">
        ${fin('rb-cov-liq','Ликвидный залог, % (недвижимость / кред. портфель)', String(Math.round(COVER_LIQUID*100)))}
        ${fin('rb-cov-mov','Движимый неликвидный залог, % (техника / ТМЦ)', String(Math.round(COVER_MOVABLE*100)))}
        ${fin('rb-liqshare','Мин. доля ликвида, % (при движимом неликвидном)', String(Math.round(LIQUID_SHARE_MIN*100)))}
        ${fin('rb-ban-days','Срок наложения запрета, рабочих дней', String(BAN_DEADLINE_DAYS))}
      </div>

      <p class="section-h" style="font-size:16px;margin-top:16px">Коэффициент, ранг ликвидности, переоценка, орган (по виду)</p>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Вид залога</th><th>Коэффициент (§2.1)</th><th>Ранг ликвидности (§8)</th><th>Переоценка, мес. (вне положения)</th><th>Регистрирующий орган (запрет)</th><th class="numcell">Предметов</th></tr></thead>
        <tbody>${kinds.map(k=>`<tr>
          <td>${esc(k)}${KINDS[k].movable&&!KINDS[k].liquid?' <span class="pill neutral">движ. неликв.</span>':(KINDS[k].liquid?' <span class="pill low">ликвид</span>':'')}</td>
          <td><div class="control" style="width:90px"><input id="rb-k-${esc(k)}" value="${KINDS[k].k}"></div></td>
          <td><div class="control" style="width:80px"><input id="rb-lr-${esc(k)}" value="${KINDS[k].liquidityRank}"></div></td>
          <td><div class="control" style="width:90px"><input id="rb-r-${esc(k)}" value="${KINDS[k].reval}"></div></td>
          <td><div class="control" style="min-width:240px"><input id="rb-o-${esc(k)}" value="${esc(KINDS[k].organ)}"></div></td>
          <td class="numcell">${ITEMS.filter(i=>i.kind===k).length}</td></tr>`).join('')}</tbody>
      </table></div>

      <p class="section-h" style="font-size:16px;margin-top:16px">Периодичность обследования — норматив, матрица (Прил.2 §2.3)</p>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Группа платёжеспособности</th><th>Недвижимое, мес.</th><th>Движимое, мес.</th></tr></thead>
        <tbody>${grp.map(g=>`<tr><td>${esc(g)}</td>
          ${g==='Предприятия-банкроты'
            ? `<td colspan="2">по договору со спецадминистратором</td>`
            : `<td><div class="control" style="width:90px"><input id="rb-sm-im-${esc(g)}" value="${SURVEY_MATRIX[g].immovable}"></div></td>
               <td><div class="control" style="width:90px"><input id="rb-sm-mv-${esc(g)}" value="${SURVEY_MATRIX[g].movable}"></div></td>`}</tr>`).join('')}</tbody>
      </table></div>

      <p class="section-h" style="font-size:16px;margin-top:16px">Ужесточение периодичности по категории риска — read-only, норматив (ПОР п.10)</p>
      <p style="color:var(--text-muted);font-size:13px;margin:0 0 8px">Слой ПОВЕРХ матрицы выше: действующий интервал = max(мин., матрица × коэффициент), только при согласовании зампреда. Не редактируется здесь — параметр положения, не справочника.</p>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Категория риска</th><th>Коэффициент</th></tr></thead>
        <tbody>${Object.keys(RISK_TIGHTENING).map(rc=>`<tr><td>${esc(rc)}</td><td>${RISK_TIGHTENING[rc]}</td></tr>`).join('')}</tbody>
      </table></div>
      <div class="mform" style="margin-top:8px">
        ${ro('Нижний предел интервала после ужесточения', SURVEY_MIN_MONTHS + ' мес. (ПОР п.10)')}
        ${ro('Согласование зампреда', RISK_TIGHTENING_APPROVAL.approved
          ? `предоставлено · ${esc(RISK_TIGHTENING_APPROVAL.req)} от ${RISK_TIGHTENING_APPROVAL.date}`
          : 'не предоставлено — действует чистая матрица §2.3, без ужесточения')}
      </div>

      <p class="section-h" style="font-size:16px;margin-top:16px">Предельный срок эксплуатации техники (§2.5)</p>
      <div class="mform">
        ${fin('rb-age-sng','СНГ, лет', String(TECH_AGE_LIMIT['СНГ']))}
        ${fin('rb-age-far','Дальнее зарубежье, лет', String(TECH_AGE_LIMIT['Дальнее зарубежье']))}
      </div>

      <p class="section-h" style="font-size:16px;margin-top:16px">Не принимается в залог — стоп-лист §3.5 (регламентная константа, read-only)</p>
      <div class="ops-list">${PROHIBITED_KINDS.map(p=>`<div class="op-row"><span class="op-t">${esc(p)}</span></div>`).join('')}</div>

      <p class="section-h" style="font-size:16px;margin-top:16px">Миграция видов залога: прежняя система → §22 (импорт исторических договоров)</p>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Прежний вид</th><th>Вид в §22</th><th>Правило переноса</th></tr></thead>
        <tbody>${KIND_MIGRATION.map(m=>`<tr><td>${esc(m.from)}</td><td>${esc(m.to)}</td><td>${esc(m.note)}</td></tr>`).join('')}</tbody>
      </table></div>`;
}
function renderRefbook(){
  document.getElementById('refbookPanel').innerHTML =
    `<p class="section-h" style="font-size:20px;margin:0 0 4px">Справочник: регламентные параметры залога</p>
     <p style="color:var(--text-muted);font-size:13px;margin:0 0 16px">Регламентируется администратором. Изменения пересчитывают залоговую стоимость, покрытие, интервалы контроля и валидации приёма по всему модулю.</p>`
    + refbookInner();
  document.getElementById('refbookFooter').innerHTML =
    `<div style="flex:1"></div><button class="btn btn-primary" onclick="saveRefbook()">Сохранить справочник</button>`;
  document.getElementById('crumbTitle').textContent = 'Регламентные параметры залога';
  cur = null;
  document.querySelectorAll('.nav-item').forEach(a=>a.classList.toggle('active', a.textContent==='Регламентные параметры залога'));
}
function saveRefbook(){
  const bd = num(val('rb-ban-days')), cl = num(val('rb-cov-liq')), cm = num(val('rb-cov-mov')), ls = num(val('rb-liqshare')),
        ageS = num(val('rb-age-sng')), ageF = num(val('rb-age-far'));
  if(!(bd > 0)) return toast('Срок наложения запрета — положительное число рабочих дней','warn');
  if(!(cl >= 100)) return toast('Порог ликвидного залога — не менее 100%','warn');
  if(!(cm >= 100)) return toast('Порог движимого неликвидного залога — не менее 100%','warn');
  if(!(ls > 0 && ls <= 100)) return toast('Доля ликвида — в диапазоне (0; 100]%','warn');
  if(!(ageS > 0) || !(ageF > 0)) return toast('Лимиты возраста техники — положительные','warn');
  const draft = {};
  for(const k of Object.keys(KINDS)){
    const kf = num(val('rb-k-'+k)), lr = num(val('rb-lr-'+k)), r = num(val('rb-r-'+k)), o = val('rb-o-'+k).trim();
    if(!(kf > 0 && kf <= 1)) return toast('Коэффициент «'+k+'» — в диапазоне (0; 1]','warn');
    if(!(lr >= 0)) return toast('Ранг ликвидности «'+k+'» — число ≥ 0','warn');
    if(!(r > 0)) return toast('Интервал переоценки «'+k+'» — положительный','warn');
    if(!o) return toast('Укажите регистрирующий орган для «'+k+'»','warn');
    draft[k] = { ...KINDS[k], k:kf, liquidityRank:Math.round(lr), reval:Math.round(r), organ:o };
  }
  const sm = {};
  for(const g of ['Платёжеспособные','Неплатёжеспособные']){
    const im = num(val('rb-sm-im-'+g)), mv = num(val('rb-sm-mv-'+g));
    if(!(im > 0) || !(mv > 0)) return toast('Интервалы обследования «'+g+'» — положительные','warn');
    sm[g] = { immovable:Math.round(im), movable:Math.round(mv) };
  }
  Object.keys(draft).forEach(k => KINDS[k] = draft[k]);
  Object.keys(sm).forEach(g => SURVEY_MATRIX[g] = sm[g]);
  BAN_DEADLINE_DAYS = Math.round(bd);
  COVER_LIQUID = cl/100; COVER_MOVABLE = cm/100; LIQUID_SHARE_MIN = ls/100;
  TECH_AGE_LIMIT['СНГ'] = Math.round(ageS); TECH_AGE_LIMIT['Дальнее зарубежье'] = Math.round(ageF);
  toast('Справочник сохранён — параметры пересчитаны','ok'); refresh(); renderRefbook();
}

function showView(v){
  document.querySelectorAll('.view').forEach(s=>s.style.display='none');
  document.getElementById('view-'+v).style.display='flex';
  if(v==='list'){ cur=null; document.getElementById('crumbTitle').textContent='Залоговое обеспечение'; renderList(); }
}
function scrollTabs(){ document.getElementById('detailTabbar').scrollBy({left:200, behavior:'smooth'}); }
function closeSplit(){ document.getElementById('splitRefresh').classList.remove('open'); }
function toast(msg, kind){
  const w = document.getElementById('toastWrap'), t = document.createElement('div');
  t.className = 'toast' + (kind ? ' '+kind : ''); t.innerHTML = `<span>${msg}</span>`;
  w.appendChild(t); setTimeout(()=>t.remove(), 4200);
}
document.addEventListener('keydown', e => { if(e.key==='Escape' && host().classList.contains('open')) closeModal(); });

renderNav(); renderList();
