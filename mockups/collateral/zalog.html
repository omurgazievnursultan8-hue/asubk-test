const host = () => document.getElementById('modalHost');
const phost = () => document.getElementById('pickHost');
function pmodal(html){ phost().innerHTML = html; phost().classList.add('open'); }
function pclose(){ phost().classList.remove('open'); phost().innerHTML = ''; }
function modal(html){ host().innerHTML = html; host().classList.add('open'); }
function closeModal(){ host().classList.remove('open'); host().innerHTML = ''; }
const mhead = t => `<div class="modal-h"><span class="mt">${t}</span><button class="modal-x" onclick="closeModal()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>`;
const mhead2 = t => `<div class="modal-h"><span class="mt">${t}</span><button class="modal-x" onclick="pclose()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>`;
const mfoot = (okLbl, okFn, okCls) => `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
  <button class="btn ${okCls||'btn-primary'}" onclick="${okFn}">${okLbl}</button></div>`;
const caret = () => `<span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>`;
const fin = (id,l,v,req,span) => `<div class="field${req?' req':''}${span?' col-span':''}"><span class="flabel">${l}</span>
  <div class="control"><input id="${id}" value="${esc(v??'')}"></div></div>`;
const fdate = (id,l,v,req,span) => `<div class="field${req?' req':''}${span?' col-span':''}"><span class="flabel">${l}</span>
  <div class="control"><input type="date" id="${id}" value="${d2iso(v)}"></div></div>`;
const fsel = (id,l,opts,v,span) => `<div class="field${span?' col-span':''}"><span class="flabel">${l}</span>
  <div class="control grey"><select id="${id}">${opts.map(o=>`<option value="${esc(o.v??o)}"${(o.v??o)===v?' selected':''}>${esc(o.t??o)}</option>`).join('')}</select>${caret()}</div></div>`;
const ftxt = (id,l,v) => `<div class="field col-span"><span class="flabel">${l}</span><textarea id="${id}" class="note-area">${esc(v??'')}</textarea></div>`;
const val = id => (document.getElementById(id)||{}).value ?? '';
const nowStamp = () => TODAY + ' ' + new Date().toTimeString().slice(0,5);
const hist = (o, what) => o.history.push({ when: nowStamp(), what, who: role });
function refresh(){ renderList(); if(cur) openCard(cur.type, cur.id, curTab); }
const clientOpts = () => CLIENTS.map(c=>({v:c.inn, t:c.name+' · ИНН '+c.inn}));
const nextId = (arr, pfx) => pfx + String(arr.length+1).padStart(3,'0');

/* ---------- НОВЫЙ ПРЕДМЕТ ЗАЛОГА ----------
   Точка рождения предмета — карточка залогового договора (targetCid). Предмет пишется
   в реестр (single source), затем сразу цепляется привязка к этому договору + кредиту
   (доля). Реестр «Предметы» — read-only проекция, из него предметы не рождаются. */
let _newItemTarget = null;
function openNewItem(targetCid){
  if(!canCurate()) return denyEdit();
  _newItemTarget = targetCid || null;
  modal(`<div class="modal form">${mhead('Новый предмет залога')}
    <div class="modal-b"><div class="mform">
      ${fsel('niKind','Вид залога', Object.keys(KINDS), 'Недвижимое имущество')}
      ${fin('niName','Наименование / описание','',true)}
      ${fsel('niPledger','Залогодатель (клиентский реестр)', clientOpts())}
      ${fsel('niPledgerType','Тип залогодателя (предпосылки §5.2)', PLEDGER_TYPES, 'Прочее ЮЛ')}
      ${fin('niQty','Количество','1',true)}
      ${fsel('niUnit','Единица измерения', QUANTITY_UNITS, 'ед.')}
      ${fin('niLegalDoc','Правоустанавливающий документ (госакт / свидетельство)','',true)}
      ${fin('niVal','Оценочная стоимость (из отчёта оценщика)','',true)}
      ${fdate('niDate','Дата оценки', TODAY, true)}
      ${fin('niRep','Отчёт оценщика (номер)','',true)}
    </div>
    <p class="section-h" style="font-size:15px;margin:16px 0 2px">Детали предмета</p>
    <div id="niDetails" class="mform"></div>
    <div id="niExtra"></div>
    </div>${mfoot('Создать','saveNewItem()')}</div>`);
  document.getElementById('niKind').addEventListener('change', niKindChange);
  niKindChange();
}
/* Р-2/Р-7: набор полей формы зависит от вида — техника требует возраст/происхождение/страховку;
   «Товары в обороте» требуют подтверждения непопадания под §3.5. */
function niKindChange(){
  const kind = val('niKind'), box = document.getElementById('niExtra'); if(!box) return;
  /* type-specific детали: набор полей меняется по виду залога (KIND_FIELDS) */
  const dbox = document.getElementById('niDetails');
  if(dbox){
    const defs = KIND_FIELDS[kind] || [];
    dbox.innerHTML = defs.map(f => f.sel
      ? fsel('nd_'+f.k, f.l, f.sel, f.sel[0])
      : fin('nd_'+f.k, f.l, '', !!f.req)).join('');
  }
  const K = KINDS[kind] || {}, tech = !!K.tech, tvo = kind === 'Товары в обороте';
  const secRole = !!K.movable && !tvo;   // Р-17: роль обеспечения — шире, чем «техника» (движимое, кроме ТМЦ)
  const realEstate = kind === 'Недвижимое имущество';
  let html = '';
  if(secRole) html += `<div class="mform" style="margin-top:4px">
      ${fsel('niSecurityRole','Роль обеспечения', ['основной','дополнительный'], 'основной')}
    </div>`;
  /* Р-18 (П1 §3.5): земли с/х назначения в залог не принимаются — жёсткий отказ без права
     допуска комитетом, см. stopListCheck. */
  if(realEstate) html += `<div class="mform" style="margin-top:4px">
      ${fsel('niLandPurpose','Целевое назначение земли', ['—','сельскохозяйственного назначения','населённых пунктов','промышленности','иное'], '—')}
    </div>`;
  if(tech) html += `<div class="mform" style="margin-top:4px">
      ${fin('niYear','Год выпуска (техника)','',true)}
      ${fsel('niOrigin','Происхождение', ['СНГ','Дальнее зарубежье'], 'СНГ')}
      ${fin('niPolicy','Страховой полис (номер)','',true)}
      ${fdate('niTill','Полис действует до','',true)}
      ${fin('niWearPct','Физический износ, %','')}
    </div>
    <label class="chk" style="margin-top:8px"><input type="checkbox" id="niTechCond"> Техника в исправном техническом состоянии и находится в эксплуатации (П1 §3.3)</label>
    <label class="chk" style="margin-top:4px"><input type="checkbox" id="niNotObsolete"> Оборудование морально не устарело (П1 §3.5)</label>
    <div class="mform" style="margin-top:4px">${fin('niTechAct','Реквизит акта осмотра (П1 §3.3)','',true)}</div>`;
  /* Р-18: «Товары в обороте» — три раздельных подтверждения §3.5 вместо одного общего
     чек-бокса (был niNotProhibited); каждое снятое подтверждение блокирует приём отдельно
     (stopListCheck: perishable / lowDemand / singleNameBulk). */
  if(tvo) html += `<label class="chk" style="margin-top:8px"><input type="checkbox" id="niNotPerishable"> Товар не относится к скоропортящимся</label>
    <label class="chk" style="margin-top:4px"><input type="checkbox" id="niDemandOk"> Товар пользуется устойчивым спросом (обоснование приложено)</label>
    <label class="chk" style="margin-top:4px"><input type="checkbox" id="niNotBulkSingle"> Не является товаром одного наименования в большом количестве</label>`;
  /* Р-18: общее подтверждение оборотоспособности — для ВСЕХ видов залога, не только ТМЦ. */
  html += `<label class="chk" style="margin-top:8px"><input type="checkbox" id="niCirculable"> Имущество не изъято и не ограничено в обороте (П1 §3.5)</label>`;
  box.innerHTML = html;
}
function saveNewItem(){
  const kind = val('niKind'), name = val('niName').trim(), pledger = val('niPledger'), pledgerType = val('niPledgerType'),
        qty = num(val('niQty')), unit = val('niUnit'), legalDoc = val('niLegalDoc').trim(),
        v = num(val('niVal')), date = iso2d(val('niDate')), rep = val('niRep').trim();
  if(!name || !rep) return toast('Заполните наименование и отчёт оценщика','warn');
  if(!legalDoc) return toast('Укажите правоустанавливающий документ (госакт / свидетельство)','warn');
  if(!(qty > 0)) return toast('Количество должно быть положительным числом','warn');
  if(!(v > 0)) return toast('Оценочная стоимость должна быть положительным числом','warn');
  if(!isDate(date)) return toast('Дата оценки — в формате дд.мм.гггг','warn');
  /* type-specific детали предмета + проверка обязательных полей вида (KIND_FIELDS) */
  const defs = KIND_FIELDS[kind] || [], details = {};
  for(const f of defs){
    const dv = (val('nd_'+f.k)||'').trim();
    if(f.req && !dv) return toast('Заполните обязательное поле «'+f.l+'»','warn');
    if(dv) details[f.k] = dv;
  }
  const ident = details[PRIMARY_DETAIL[kind]] || name;   // краткий идентификатор для шапки/списка
  const K = KINDS[kind] || {}, tech = !!K.tech, tvo = kind === 'Товары в обороте';
  const secRole = !!K.movable && !tvo;   // Р-17: та же граница, что и в niKindChange
  const realEstate = kind === 'Недвижимое имущество';
  let extra = {};
  if(secRole) extra.securityRole = val('niSecurityRole') || 'основной';
  if(realEstate) extra.landPurpose = val('niLandPurpose');   // Р-18: '—' не блокирует, см. stopListCheck
  if(tech){
    const year = Math.round(num(val('niYear'))), origin = val('niOrigin'),
          policy = val('niPolicy').trim(), till = iso2d(val('niTill'));
    if(!(year > 1900)) return toast('Укажите корректный год выпуска техники','warn');
    const techCondOk = Boolean((document.getElementById('niTechCond')||{}).checked), techAct = val('niTechAct').trim();
    if(!techCondOk || !techAct) return toast('Приём отклонён (П1 §3.3): подтвердите исправное техническое состояние техники и укажите реквизит акта осмотра','warn');
    const age = CUR_YEAR - year;
    const ageChk = techAgeCheck({ securityRole: extra.securityRole, origin, age });
    if(ageChk.block) return toast(ageChk.msg,'warn');
    if(!policy) return toast('Приём отклонён (§3.4): техника-обеспечение должна быть застрахована — укажите полис','warn');
    if(till && !isDate(till)) return toast('Дата окончания полиса — в формате дд.мм.гггг','warn');
    extra = { ...extra, year, origin, insured:{ present:true, policy, till }, techCondition:{ ok:true, act:techAct } };
    if(ageChk.needCommittee) extra.committeeReq = { reason:'возраст техники сверх лимита §2.5 — допуск основного обеспечения по решению комитета §3.4', msg: ageChk.msg };
    /* Р-18 (П1 §3.5): физический износ и моральное устаревание — стоп-лист, не §3.3-осмотр. */
    const wearRaw = val('niWearPct').trim();
    if(wearRaw !== '') extra.wearPct = num(wearRaw);
    extra.morallyObsolete = !((document.getElementById('niNotObsolete')||{}).checked);
  }
  if(tvo){
    /* Р-18: три раздельных подтверждения ТМЦ — снятое подтверждение выставляет блокирующий флаг */
    extra.perishable     = !((document.getElementById('niNotPerishable')||{}).checked);
    extra.lowDemand       = !((document.getElementById('niDemandOk')||{}).checked);
    extra.singleNameBulk  = !((document.getElementById('niNotBulkSingle')||{}).checked);
  }
  extra.circulable = Boolean((document.getElementById('niCirculable')||{}).checked);   // Р-18: все виды
  const stop = stopListCheck(extra);
  if(stop.block) return toast(stop.msg,'warn');
  const it = { id: nextId(ITEMS,'П-'), kind, name, pledger, pledgerType, ident, qty, unit, legalDoc, details, files:[],
    appraised:v, apprDate:date, apprReport:rep,
    override:null, ban:null, lost:false, realizing:false, needReval:false, everPledged:false,
    lastSurvey:date, lastReval:date, consents:[], restoreNotice:null, ...extra,
    revals:[{date, appraised:v, report:rep, note:'первичная оценка'}],
    surveys:[], history:[] };
  normalizeItem(it);
  hist(it, `Предмет зарегистрирован в реестре. Оценочная ${fmt(v)} → залоговая (расч.) ${fmt(calcPledge(it))}`);
  if(it.committeeReq) hist(it, `П1 §3.4: ${it.committeeReq.reason}`);
  ITEMS.push(it); closeModal(); toast('Предмет '+it.id+' создан. Залоговая: '+fmt(calcPledge(it)),'ok');
  if(it.committeeReq) toast(it.committeeReq.msg,'warn');
  const target = _newItemTarget; _newItemTarget = null;
  if(target && contract(target)){
    /* рождён с карточки договора → сразу привязка к этому договору + кредиту (доля) */
    openAlloc(target, it.id);
  } else {
    reg='items'; selected = it.id; refresh();
  }
}

/* ---------- ПЕРЕОЦЕНКА (событие: меняет ОЦЕНОЧНУЮ; залоговая и покрытие — следом) ---------- */
function openReval(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  modal(`<div class="modal form">${mhead('Переоценка · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fdate('rvDate','Дата переоценки', TODAY, true)}
      ${fin('rvRep','Отчёт оценщика (номер)','',true)}
      ${fin('rvVal','Новая оценочная стоимость', String(it.appraised), true)}
      ${fin('rvOld','Текущая оценочная', fmt(it.appraised))}
      ${ftxt('rvNote','Примечание','')}
    </div>
    <div class="warn-inline"><span>Меняется только <b>оценочная</b> — залоговая пересчитается сама (× ${coefOf(it.kind)})${it.override ? '; действующее решение комиссии её перекрывает' : ''}. Падение покрытия ниже порога поднимет триггер «недостаточность обеспечения».</span></div>
    </div>${mfoot('Сохранить переоценку','saveReval(\''+id+'\')')}</div>`);
  document.getElementById('rvOld').readOnly = true;
}
function saveReval(id){
  const it = item(id), v = num(val('rvVal')), date = iso2d(val('rvDate')), rep = val('rvRep').trim(), note = val('rvNote').trim();
  if(!(v > 0)) return toast('Оценочная стоимость должна быть положительным числом','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  if(!rep) return toast('Укажите номер отчёта оценщика','warn');
  const acs0 = CONTRACTS.filter(isActive);
  const before = acs0.flatMap(c=>c.credits.map(cid=>({cid, ok:coverage(acs0, cid).ok})));
  const old = it.appraised;
  it.appraised = v; it.apprDate = date; it.apprReport = rep; it.lastReval = date; it.needReval = false;
  it.revals.push({date, appraised:v, report:rep, note: note || 'переоценка'});
  hist(it, `Переоценка: оценочная ${fmt(old)} → ${fmt(v)} (${rep}). Залоговая (расч.) → ${fmt(calcPledge(it))}${it.override?' · перекрыта действующим override '+fmt(it.override.value):''}`);
  closeModal();
  const acs1 = CONTRACTS.filter(isActive);
  const dropped = acs1.flatMap(c=>c.credits.map(cid=>({cid, ok:coverage(acs1, cid).ok})))
                      .filter(a => !a.ok && (before.find(b=>b.cid===a.cid)||{ok:true}).ok);
  toast('Переоценка сохранена. Залоговая: '+fmt(pledgeValue(it)),'ok');
  if(dropped.length) toast('ТРИГГЕР «недостаточность обеспечения»: покрытие упало ниже порога по '+dropped.map(d=>d.cid).join(', ')+' → трек взыскания по обеспечению','warn');
  refresh();
}

/* ---------- OVERRIDE ЗАЛОГОВОЙ (только комиссия). Р-10: разворот смысла — снижение
   (более консервативный коэффициент/значение) допустимо свободно; подъём ВЫШЕ расчётной
   противоречит смыслу залоговой стоимости (коэффициент — дисконт риска/спроса, §2.1) и
   трактуется как НАРУШЕНИЕ: требует исключительного решения с явной пометкой «сверх дисконта —
   вне положения». Флаг isOverAbove маркирует нарушение, а не рядовой кейс. ---------- */
function openOverride(id){
  if(!canCommittee()) return denyComm();
  const it = item(id), cp = calcPledge(it);
  modal(`<div class="modal form">${mhead('Фактическая залоговая стоимость · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fin('ovCalc','Расчётная залоговая (оценочная × '+coefOf(it.kind)+')', fmt(cp))}
      ${fin('ovVal','Фактическая залоговая (решение комиссии)', String(it.override ? it.override.value : cp), true)}
      ${ftxt('ovObosn','Обоснование', it.override ? it.override.obosn : '')}
    </div>
    <div class="flagline" id="ovWarn" style="display:none"><span>Подъём <b>выше расчётной</b> вне положения: покрытие завышается относительно ликвидационной базы. Только как исключительное решение с пометкой и обоснованием.</span></div>
    <label class="chk" id="ovExcWrap" style="display:none;margin-top:8px"><input type="checkbox" id="ovException"> Исключительное решение комиссии — сверх дисконта, вне положения</label>
    </div>
    <div class="modal-f">
      ${it.override ? `<button class="btn btn-tint danger" onclick="clearOverride('${id}')">Отменить решение комиссии</button>` : ''}
      <div style="flex:1"></div>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveOverride('${id}')">Сохранить</button>
    </div></div>`);
  document.getElementById('ovCalc').readOnly = true;
  const sync = () => { const above = num(val('ovVal')) > cp;
    document.getElementById('ovWarn').style.display = above ? 'flex' : 'none';
    document.getElementById('ovExcWrap').style.display = above ? 'flex' : 'none'; };
  document.getElementById('ovVal').addEventListener('input', sync); sync();
}
function saveOverride(id){
  const it = item(id), cp = calcPledge(it), v = num(val('ovVal')), ob = val('ovObosn').trim();
  if(!(v > 0)) return toast('Стоимость должна быть положительным числом','warn');
  const above = v > cp;
  if(above){
    /* Р-10: подъём выше расчётной — недопустимое действие; пропускаем только как исключение с пометкой. */
    if(!((document.getElementById('ovException')||{}).checked))
      return toast('Подъём выше расчётной недопустим по положению. Отметьте «исключительное решение — вне положения», иначе действие заблокировано','warn');
    if(!ob) return toast('Исключительное решение (сверх дисконта) требует обоснования','warn');
  }
  const alloc = allocatedLegal(it.id) + allocatedDraft(it.id);
  if(v < alloc) toast('Внимание: новая залоговая '+fmt(v)+' МЕНЬШЕ суммы закреплённых долей '+fmt(alloc)+' — доли будут усечены в расчёте покрытия','warn');
  const old = pledgeValue(it);
  it.override = { value:v, obosn: ob, by: role, date: TODAY, beyondDiscount: above };
  hist(it, `Решение комиссии по залоговой: ${fmt(old)} → ${fmt(v)} (расчётная ${fmt(cp)})${above ? ' — ВЫШЕ расчётной: ИСКЛЮЧИТЕЛЬНОЕ решение сверх дисконта, ВНЕ ПОЛОЖЕНИЯ (Р-10). Обоснование: «'+ob+'»' : ' — снижение (консервативно), в рамках положения'}`);
  closeModal(); toast(above?'Установлено исключительное значение (вне положения) — помечено флагом':'Залоговая стоимость установлена: '+fmt(v), above?'warn':'ok'); refresh();
}
function clearOverride(id){
  const it = item(id), old = pledgeValue(it);
  it.override = null;
  hist(it, `Решение комиссии отменено: залоговая ${fmt(old)} → ${fmt(calcPledge(it))} (снова расчётная)`);
  closeModal(); toast('Решение комиссии отменено, залоговая снова расчётная','ok'); refresh();
}

/* ---------- ЗАПРЕТ НА ОТЧУЖДЕНИЕ: НАЛОЖЕНИЕ / СНЯТИЕ (наш шаг оформления) ----------
   Наложение — только на предмет, обременённый зарегистрированным договором (есть
   основание). Снятие — под гейтом: пока живы доли, снять нельзя. Оба действия —
   роль «Залоговый специалист». Залоговую ось не трогают (оси независимы). */
function openBan(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  /* Предусловие: наложить запрет на свободный предмет нельзя — оснований нет. */
  if(!banRequired(it)) return toast('Наложить запрет нельзя: предмет не обременён ни одним зарегистрированным договором — оснований нет','warn');
  if(it.ban) return toast('Запрет уже наложен: '+it.ban.regNo+'. При перезалоге он дополняется основанием автоматически при регистрации договора','warn');
  const grounds = banContracts(it);
  modal(`<div class="modal form">${mhead('Наложение запрета на отчуждение · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fsel('bnOrgan','Регистрирующий орган', ORG_REGISTRY, organOf(it), true)}
      ${fin('bnReg','Рег. № запрета в органе','',true)}
      ${fdate('bnDate','Дата наложения', TODAY, true)}
      ${ro('Договоры-основания', grounds.join(', '))}
    </div>
    <div class="warn-inline"><span>Основания (${grounds.join(', ')}) заполнятся автоматически. Срок наложения: до ${banDeadline(it)}.</span></div>
    </div>${mfoot('Наложить запрет','saveBan(\''+id+'\')','btn-primary')}</div>`);
}
function saveBan(id){
  const it = item(id), organ = val('bnOrgan').trim(), regNo = val('bnReg').trim(), date = iso2d(val('bnDate'));
  if(!banRequired(it)) return toast('Оснований для запрета нет','warn');
  if(!organ) return toast('Укажите регистрирующий орган','warn');
  if(!regNo) return toast('Укажите рег. № запрета','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  const grounds = banContracts(it);
  it.ban = { organ, regNo, date, contracts: grounds, pendingRelease:false };
  hist(it, `Наложен запрет на отчуждение: ${organ} · ${regNo} от ${date} (основания ${grounds.join(', ')}). Предмет не может быть продан без нашего ведома.`);
  grounds.forEach(cid => hist(contract(cid), `По предмету ${it.id} наложен запрет на отчуждение: ${organ} · ${regNo} от ${date}`));
  closeModal(); toast('Запрет на отчуждение наложен — залог защищён от продажи','ok'); refresh();
}
/* ---------- СНЯТИЕ ЗАПРЕТА (Р-9): классифицированное основание + цепочка согласования + частичное снятие ---------- */
function openBanRelease(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  if(!it.ban) return toast('Запрет не наложен','warn');
  /* ГЕЙТ ПОЛНОГО СНЯТИЯ: нельзя снять, пока по предмету живы доли (частичное — отдельным действием). */
  const alloc = allocatedLegal(it.id);
  if(alloc > 0){
    const cs = CONTRACTS.filter(c=>isActive(c) && c.allocs.some(a=>a.item===it.id)).map(c=>c.id);
    return toast(`Полное снятие невозможно: по предмету закреплены доли на ${fmt(alloc)} по договорам ${cs.join(', ')}. Сначала погасите кредит / выведите предмет доп соглашением; частичное снятие — отдельным действием`,'warn');
  }
  modal(`<div class="modal form">${mhead('Снятие запрета на отчуждение · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fsel('rbChannel','Канал оформления снятия', RELEASE_CHANNELS, 'doc', true)}
      ${fsel('rbGround','Основание снятия', RELEASE_GROUNDS, 'Полное погашение обязательства', true)}
      ${fin('rbAct','Реквизит акта / № документа снятия','',true)}
      ${fdate('rbDate','Дата снятия', TODAY, true)}
      ${ro('Орган', it.ban.organ)}
    </div>
    <div class="warn-inline"><span>Действующий запрет: ${esc(it.ban.organ)} · ${esc(it.ban.regNo)} от ${it.ban.date}. Доли обнулились — снятие допустимо. Пройдите цепочку согласования:</span></div>
    <div class="ops-list" style="margin-top:8px">${RELEASE_APPROVALS.map((a,i)=>`<div class="op-row"><label class="chk"><input type="checkbox" class="rbAppr" id="rbAppr${i}"> ${esc(a)}</label></div>`).join('')}</div>
    </div>${mfoot('Снять запрет','saveRelease(\''+id+'\')','btn-primary')}</div>`);
}
function saveRelease(id){
  const it = item(id), ground = val('rbGround'), act = val('rbAct').trim(), date = iso2d(val('rbDate')),
        channel = val('rbChannel'), chLbl = (RELEASE_CHANNELS.find(c=>c.v===channel)||{}).t || channel;
  if(allocatedLegal(it.id) > 0) return toast('По предмету снова закреплены доли — снятие невозможно','warn');
  if(!act) return toast('Укажите реквизит акта / № документа снятия','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  if(![...document.querySelectorAll('.rbAppr')].every(x=>x.checked))
    return toast('Пройдите всю цепочку согласования снятия (Прил.3 §3.2)','warn');
  const was = it.ban;
  hist(it, `Запрет на отчуждение снят (${chLbl.toLowerCase()}): основание «${ground}», акт/№ ${act} от ${date} (был ${was.organ} · ${was.regNo} от ${was.date}). Цепочка согласования пройдена. Предмет свободен от обременения.`);
  it.ban = null;
  closeModal(); toast('Запрет на отчуждение снят','ok'); refresh();
}
/* Частичное снятие с части предмета (Прил.3 §3.3.1): запрет на остаток сохраняется. */
function openPartialRelease(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  if(!it.ban) return toast('Нет действующего запрета','warn');
  const overdueCr = [...new Set(CONTRACTS.filter(c=>isActive(c)&&c.allocs.some(a=>a.item===it.id)).flatMap(c=>c.credits))].filter(x=>(credit(x)||{}).overdue);
  modal(`<div class="modal form">${mhead('Частичное снятие запрета с части предмета · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fsel('prBasis','Основание', ['Продажа части предмета по решению суда','Продажа части по решению спецадминистратора','Передача части предмета ГФХ в счёт погашения','Иное (при достаточном ликвидном остатке)'], null, true)}
      ${fin('prPart','Часть предмета (описание / доля)','',true)}
      ${fin('prAct','Реквизит акта','',true)}
      ${fdate('prDate','Дата', TODAY, true)}
    </div>
    ${overdueCr.length ? `<div class="flagline"><span>По кредитам ${overdueCr.join(', ')} есть просроченная задолженность — частичное снятие не допускается. Погасите просрочку.</span></div>`
      : `<div class="warn-inline"><span>Запрет на отчуждение <b>сохраняется на оставшуюся часть</b> предмета.</span></div>`}
    </div>${overdueCr.length ? `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Закрыть</button></div>` : mfoot('Оформить частичное снятие','savePartialRelease(\''+id+'\')','btn-primary')}</div>`);
}
function savePartialRelease(id){
  const it = item(id), basis = val('prBasis'), part = val('prPart').trim(), act = val('prAct').trim(), date = iso2d(val('prDate'));
  if(!part) return toast('Опишите часть предмета','warn');
  if(!act) return toast('Укажите реквизит акта','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  const overdueCr = [...new Set(CONTRACTS.filter(c=>isActive(c)&&c.allocs.some(a=>a.item===it.id)).flatMap(c=>c.credits))].filter(x=>(credit(x)||{}).overdue);
  if(overdueCr.length) return toast('Частичное снятие не допускается при просроченной задолженности','warn');
  (it.ban.partial ||= []).push({ part, basis, act, date });
  hist(it, `Частичное снятие запрета с части предмета: «${part}», основание «${basis}», акт ${act} от ${date}. Запрет на оставшуюся часть сохраняется в силе.`);
  closeModal(); toast('Частичное снятие оформлено — запрет на остаток сохранён','ok'); refresh();
}

/* ---------- СОГЛАСИЕ НА ДЕЙСТВИЯ БЕЗ СНЯТИЯ ЗАПРЕТА (Р-4, §8, Прил.3 §4) ---------- */
function openConsent(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  if(!it.ban) return toast('Согласие на действия выдаётся только по действующему запрету','warn');
  modal(`<div class="modal form">${mhead('Согласие на действия с залогом (без снятия запрета) · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fsel('cnAction','Действие', CONSENT_ACTIONS, CONSENT_ACTIONS[2], true)}
      ${fdate('cnDate','Дата', TODAY, true)}
      ${fin('cnDoc','Реквизит заявления / согласия','',true)}
      ${fsel('cnDecision','Решение', ['положительное','отрицательное'], 'положительное')}
      <label class="chk col-span"><input type="checkbox" id="cnReval"> Требуется переоценка после действия (за счёт залогодателя)</label>
      ${ftxt('cnNote','Примечание','')}
    </div>
    <div class="warn-inline"><span>Согласие на действия без снятия запрета — запрет <b>остаётся в силе</b> до полного исполнения обязательств.</span></div>
    </div>${mfoot('Зафиксировать согласие','saveConsent(\''+id+'\')')}</div>`);
}
function saveConsent(id){
  const it = item(id), action = val('cnAction'), date = iso2d(val('cnDate')), doc = val('cnDoc').trim(),
        decision = val('cnDecision'), revalReq = (document.getElementById('cnReval')||{}).checked, note = val('cnNote').trim();
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  if(!doc) return toast('Укажите реквизит заявления/согласия','warn');
  const revalRequired = decision==='положительное' && revalReq;
  it.consents.push({ id:'СГ-'+(it.consents.length+1), action, date, doc, decision, note, revalRequired });
  /* ИНВАРИАНТ ОСИ ЗАПРЕТА: согласие НЕ снимает и НЕ ослабляет запрет — it.ban не трогается. */
  hist(it, `Выдано ${decision} согласие на «${action}»${decision==='положительное'?' без снятия запрета; запрет остаётся в силе':''} (${doc} от ${date})${revalRequired?'. Требуется переоценка за счёт залогодателя':''}`);
  closeModal(); toast('Согласие зафиксировано — запрет на отчуждение остаётся в силе','ok'); refresh();
}

/* ---------- ИЗВЕЩЕНИЕ О ВОСПОЛНЕНИИ (Р-8, Прил.2 §2.5) ---------- */
function openRestoreNotice(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  if(!(it.lost||it.needReval)) return toast('Извещение оформляется при исходе обследования «ухудшение»/«утрата»','warn');
  const rn = it.restoreNotice || {};
  modal(`<div class="modal form">${mhead('Извещение о восполнении предмета залога · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fin('rnDoc','Реквизит извещения', rn.doc||'', true)}
      ${fdate('rnDate','Дата вручения', rn.date||TODAY, true)}
      ${fdate('rnDeadline','Срок восполнения до', rn.deadline||'', true)}
      ${fsel('rnResolved','Итог', ['(не завершено)','восполнено','отказ'], rn.resolved||'(не завершено)')}
    </div>
    <div class="warn-inline"><span>До истечения срока восполнения взыскание не поднимается. При отказе или истечении срока материалы идут во взыскание.</span></div>
    </div>${mfoot('Сохранить извещение','saveRestoreNotice(\''+id+'\')')}</div>`);
}
function saveRestoreNotice(id){
  const it = item(id), doc = val('rnDoc').trim(), date = iso2d(val('rnDate')), deadline = iso2d(val('rnDeadline')),
        sel = val('rnResolved'), resolved = sel==='(не завершено)' ? null : sel;
  if(!doc) return toast('Укажите реквизит извещения','warn');
  if(!isDate(date)) return toast('Дата вручения — в формате дд.мм.гггг','warn');
  if(!isDate(deadline)) return toast('Срок восполнения — в формате дд.мм.гггг','warn');
  it.restoreNotice = { issued:true, doc, date, deadline, resolved };
  if(resolved==='восполнено'){
    it.lost = false; it.needReval = false;
    hist(it, `Восполнено по извещению ${doc}: предмет восстановлен/заменён — триггеры недостаточности сняты производно`);
    toast('Восполнено — триггеры сняты','ok');
  } else {
    hist(it, `Оформлено извещение о восполнении ${doc} от ${date}, срок восполнения до ${deadline}${resolved==='отказ'?' — зафиксирован ОТКАЗ, материалы во взыскание (§2.5)':' — до истечения срока взыскание не поднимается'}`);
    toast(resolved==='отказ'?'Зафиксирован отказ — трек взыскания по обеспечению':'Извещение оформлено — идёт срок восполнения', resolved==='отказ'?'warn':'ok');
  }
  closeModal(); refresh();
}

/* ---------- ПРЕДПОСЫЛКИ §5.2: приложить / открепить документ (Р-5) ---------- */
function togglePrereq(id, key){
  if(!canCurate()) return denyEdit();
  const it = item(id); it.prereqs[key] = it.prereqs[key] || {};
  const now = !it.prereqs[key].present;
  it.prereqs[key].present = now;
  it.prereqs[key].doc = now ? (prereqReq(it)[key].label+' — приложено '+TODAY) : '';
  hist(it, `Предпосылка §5.2 «${prereqReq(it)[key].label}»: ${now?'документ приложен':'документ откреплён'}`);
  toast(now?'Документ приложен':'Документ откреплён','ok'); refresh();
}

/* ---------- ОБСЛЕДОВАНИЕ (классифицированный исход ветвит действие) ----------
   Р-15 (П2 §2.4): акт обследования — заключение и фотофиксация (§2.3) обязательны
   всегда; при одностороннем акте (сторона уклонилась) — подтверждённое наличие
   имущества, иначе — подписи представителя ГФХ и залогодателя (surveyValidate). */
function openSurvey(id){
  if(!canCurate()) return denyEdit();
  const it = item(id);
  modal(`<div class="modal form">${mhead('Обследование предмета · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fdate('svDate','Дата обследования', TODAY, true)}
      ${fin('svAct','Номер акта','',true)}
      ${fsel('svOut','Исход (состояние предмета)', SURVEY_RESULTS.map(r=>r.v), 'Хорошее', true)}
      <div class="field req col-span"><span class="flabel">Заключение</span>
        <textarea id="svConclusion" class="note-area"></textarea></div>
      <div class="field req col-span"><span class="flabel">Фотофиксация (файлы, минимум 1)</span>
        <div class="control"><input type="file" id="svPhotos" multiple accept="image/*"></div></div>
      ${ftxt('svNote','Примечание','')}
      <label class="chk col-span" style="margin-top:8px"><input type="checkbox" id="svOneSided"> Односторонний акт (сторона уклонилась от подписания)</label>
      <label class="chk col-span" id="svPresenceWrap" style="display:none"><input type="checkbox" id="svPresence"> Подтверждено наличие имущества по факту осмотра</label>
      <div class="field col-span" id="svSignersWrap"><span class="flabel">Подписанты (участники обследования)</span>
        <label class="chk"><input type="checkbox" id="svSignGfh"> Представитель ГФХ</label>
        <label class="chk"><input type="checkbox" id="svSignPledgor"> Залогодатель</label>
        <label class="chk"><input type="checkbox" id="svSignBorrower"> Заёмщик</label>
        <label class="chk"><input type="checkbox" id="svSignPoa"> По доверенности</label>
        <div class="control" style="margin-top:6px"><input id="svPoaReq" placeholder="Реквизиты доверенности"></div>
      </div>
      <div class="field col-span"><span class="flabel">ФИО / должность представителя ГФХ</span>
        <div class="control"><input id="svGfhName" placeholder="ФИО"></div>
        <div class="control" style="margin-top:6px"><input id="svGfhPost" placeholder="Должность"></div>
      </div>
    </div>
    </div>${mfoot('Зарегистрировать акт','saveSurvey(\''+id+'\')')}</div>`);
  const syncOneSided = () => {
    const os = (document.getElementById('svOneSided')||{}).checked;
    document.getElementById('svPresenceWrap').style.display = os ? 'flex' : 'none';
    document.getElementById('svSignersWrap').style.display = os ? 'none' : '';
  };
  document.getElementById('svOneSided').addEventListener('change', syncOneSided); syncOneSided();
}
function svSigners(){
  const s = [];
  if((document.getElementById('svSignGfh')||{}).checked) s.push('ГФХ');
  if((document.getElementById('svSignPledgor')||{}).checked) s.push('залогодатель');
  if((document.getElementById('svSignBorrower')||{}).checked) s.push('заёмщик');
  if((document.getElementById('svSignPoa')||{}).checked) s.push('по доверенности'+(val('svPoaReq').trim()?' ('+val('svPoaReq').trim()+')':''));
  return s;
}
function saveSurvey(id){
  const it = item(id), date = iso2d(val('svDate')), act = val('svAct').trim(), out = val('svOut'), note = val('svNote').trim();
  if(!act) return toast('Укажите номер акта','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  const conclusion = val('svConclusion').trim();
  const photosEl = document.getElementById('svPhotos');
  const photos = (photosEl && photosEl.files) ? Array.from(photosEl.files).map(f=>f.name) : [];
  const oneSided = !!(document.getElementById('svOneSided')||{}).checked;
  const presenceConfirmed = !!(document.getElementById('svPresence')||{}).checked;
  const signers = svSigners();
  const v = surveyValidate({conclusion, photos, oneSided, presenceConfirmed, signers});
  if(!v.ok) return toast(v.msg,'warn');
  const effect = surveyEffect(out);                 // 6-значный классификатор → эффект в модели
  it.surveys.push({date, act, outcome:out, effect, note, conclusion, photos, oneSided, presenceConfirmed, signers});
  it.lastSurvey = date;
  if(effect === 'ok'){
    it.needReval = false; it.lost = false; it.restoreNotice = null;   // возврат в норму снимает извещение/утрату
    const ns = nextSurvey(it);
    hist(it, `Обследование ${act} от ${date}: ${out} (в норме). Следующее — ${ns || '(по матрице/банкрот)'}`);
    toast('Акт зарегистрирован. Следующее обследование: '+(ns||'по матрице'),'ok');
  } else if(effect === 'reval'){
    it.needReval = true; it.lost = false; it.restoreNotice = null;   // новый плохой исход → требуется новое извещение (Р-8)
    hist(it, `Обследование ${act} от ${date}: ${out} → регламентный шаг: требуется досрочная переоценка + извещение о восполнении (§2.5) до обращения во взыскание`);
    toast('Ухудшение зафиксировано → досрочная переоценка + извещение о восполнении (§2.5); взыскание — только по истечении срока/отказу','warn');
  } else {
    it.lost = true; it.restoreNotice = null;
    hist(it, `Обследование ${act} от ${date}: ${out} — УТРАТА. Предмет выбыл, залоговая = 0. Регламентный шаг: извещение о восполнении (§2.5) до обращения во взыскание`);
    toast('Утрата зафиксирована → оформите извещение о восполнении (§2.5); взыскание — только по истечении срока/отказу','warn');
  }
  closeModal(); refresh();
}

/* ---------- ПРИВЯЗКА ПРЕДМЕТА К ЧЕРНОВИКУ (перезалог считается здесь же) ---------- */
function openAlloc(cid, preItemId){
  if(!canCurate()) return denyEdit();
  const c = contract(cid);
  const opts = ITEMS.filter(i=>!i.lost).map(i=>({v:i.id, t:`${i.id} · ${i.name} · залогодатель ${clientName(i.pledger)} · доступно ${fmt(availableOf(i))}`}));
  modal(`<div class="modal form">${mhead('Привязать предмет · '+cid)}
    <div class="modal-b"><div class="mform">
      ${fsel('alItem','Предмет из реестра', opts, preItemId||null, true)}
      ${fsel('alCredit','Кредит договора', c.credits.map(id=>({v:id, t:id+' · '+credit(id).num+' · требуется '+fmt(credit(id).amount*requiredCover(id, ctx(c)).req)})))}
      ${fin('alShare','Отнесённая доля (часть залоговой стоимости)','',true)}
    </div>
    <div class="warn-inline" id="alInfo"></div>
    </div>${mfoot('Привязать','saveAlloc(\''+cid+'\')')}</div>`);
  const sync = () => {
    const it = item(val('alItem')); if(!it) return;
    const crId = val('alCredit');
    const av = availableOf(it), leg = allocatedLegal(it.id);
    /* Порог зависит от СОСТАВА обеспечения (Р-1, П1 §2.3–2.4) — учитываем гипотетически
       и предмет, выбранный в этом диалоге прямо сейчас, ещё до сохранения привязки,
       чтобы порог 120%↔150% пересчитывался на лету при смене предмета в селекторе. */
    const draftWithItem = { ...c, allocs: [...c.allocs, { item: it.id, credit: crId, share: 0 }] };
    const ctxWithDraft = ctx(draftWithItem);
    const { req } = requiredCover(crId, ctxWithDraft);
    const ls = liquidShare(crId, ctxWithDraft);
    document.getElementById('alInfo').innerHTML = `<span>Залоговая ${fmt(pledgeValue(it))} · уже обременено действующими договорами ${fmt(leg)} · <b>доступно ${fmt(av)}</b>.
      ${leg > 0 ? 'Это <b>перезалог</b> на остаточную стоимость предмета.' : ''}
      ${it.ban ? `<br>По предмету уже действует запрет ${esc(it.ban.regNo)} — при регистрации будет дополнен основанием.` : ''}
      <br>Порог по текущему составу: ${pct(req)} (${req===COVER_MOVABLE?'в покрытии есть движимый неликвидный предмет — П1 §2.4':'ликвидный состав — П1 §2.3'}). Доля ликвида: ${pct(ls)} при минимуме 80%.</span>`;
    /* Д-3/Т3: дефолт доли = недостающее ДО ПОРОГА, а не полное требуемое покрытие. Т3 (Р-11):
       нетто считается по coverage-wide secPledge кредита — эффективные доли залога на этом
       кредите ВО ВСЕХ действующих договорах + в этом черновике (ctxWithDraft), а не только по
       долям текущего черновика, иначе дефолт завышал бы недостающую сумму для кредита, уже
       частично закрытого залогом по ДРУГОМУ договору. */
    const cr = credit(crId);
    const alreadyByCredit = coverage(ctxWithDraft, crId).secPledge;
    document.getElementById('alShare').value = document.getElementById('alShare').value || String(Math.min(av, Math.max(0, cr.amount*req - alreadyByCredit)));
  };
  document.getElementById('alItem').addEventListener('change', ()=>{ document.getElementById('alShare').value=''; sync(); });
  document.getElementById('alCredit').addEventListener('change', ()=>{ document.getElementById('alShare').value=''; sync(); });
  sync();
}
function saveAlloc(cid){
  const c = contract(cid), it = item(val('alItem')), cr = val('alCredit'), share = num(val('alShare'));
  if(!(share > 0)) return toast('Доля должна быть положительным числом','warn');
  const av = availableOf(it);
  if(share > av + 0.005)
    return toast('Доля '+fmt(share)+' превышает доступную залоговую стоимость '+fmt(av)+' — инвариант Σ долей ≤ залоговая нарушен','warn');
  c.allocs.push({ item: it.id, credit: cr, share });
  it.everPledged = true;
  hist(c, `Привязан предмет ${it.id} под ${cr}: доля ${fmt(share)} (доступно было ${fmt(av)})`);
  hist(it, `Отнесение к ${cr} по договору ${c.id}: доля ${fmt(share)}`);
  closeModal(); toast('Предмет привязан','ok'); refresh();
}
function dropAlloc(cid, idx){
  const c = contract(cid), a = c.allocs[idx];
  c.allocs.splice(idx,1);
  hist(c, `Отвязан предмет ${a.item} (${a.credit}, доля ${fmt(a.share)}) — правка черновика`);
  toast('Предмет отвязан от черновика','ok'); refresh();
}

/* ---------- РЕГИСТРАЦИЯ ДОГОВОРА (четыре гейта: покрытие + предпосылки оформления §5.2 +
   решение КМ §2.6 + стоп-лист §3.5, Р-18) ---------- */
function openRegister(cid){
  if(!canCurate()) return denyEdit();
  const c = contract(cid), gate = gateCheck(c);
  const rows = gate.rows.map(r=>`<tr><td>${r.id}</td><td class="numcell">${fmt(r.amount)}</td>
    <td class="numcell">${pct(r.req)}</td><td class="numcell">${fmt(r.amount*r.req)}</td><td class="numcell">${fmt(r.sum)}</td>
    <td><span class="pill ${r.ok?'low':'high'}">${pct(r.ratio)}${r.liqApplies?` · ликвид ${pct(r.liqShare)}/80%`:''}</span></td></tr>`).join('');
  /* Р-5: гейт предпосылок оформления — отдельный от гейта покрытия; для регистрации проходят оба. */
  const its = [...new Set(c.allocs.map(a=>a.item))];
  const prereqMiss = its.flatMap(iid => prereqMissing(item(iid)).map(m=>({iid, ...m})));
  /* Р-13 (П1 §2.6): третий гейт — заёмщик под категорией с обеспеченностью по решению КМ,
     а решение ещё не внесено ни на один кредит договора. */
  const kmMiss = c.credits.filter(id => kmGateBlocked(credit(id)));
  /* Р-18 (П1 §3.5): четвёртый гейт — повторная проверка стоп-листа на момент регистрации.
     Предмет мог быть принят до Р-18 (стоп-поля отсутствуют → stopFieldsOf возвращает undefined
     → не блокирует), либо его состояние могло измениться между приёмом и регистрацией. */
  const stopMiss = its.map(iid => ({ iid, v: stopListCheck(stopFieldsOf(item(iid))) })).filter(x => x.v.block);
  const okAll = gate.ok && !prereqMiss.length && !kmMiss.length && !stopMiss.length;
  modal(`<div class="modal form">${mhead('Регистрация залогового договора · '+cid)}
    <div class="modal-b">
      <div class="cgrid-wrap" style="margin-bottom:14px"><table class="cgrid">
        <thead><tr><th>Кредит</th><th class="numcell">Сумма</th><th class="numcell">Порог</th><th class="numcell">Требуется</th><th class="numcell">Обеспечено</th><th>Покрытие</th></tr></thead>
        <tbody>${rows}</tbody></table></div>
      ${gate.ok ? `<div class="okline"><span>Гейт покрытия пройден.</span></div>`
        : `<div class="flagline"><span>Гейт покрытия НЕ пройден: ${gate.rows.filter(r=>!r.ok).map(r=>r.id+' — '+pct(r.ratio)+' (порог '+pct(r.req)+')').join(', ')}. Регистрация блокируется; договор уходит на рассмотрение комитета по администрированию бюджетных кредитов.</span></div>`}
      ${prereqMiss.length ? `<div class="flagline" style="margin-top:10px"><span>Гейт предпосылок НЕ пройден: не приложены обязательные документы — ${prereqMiss.map(m=>`${m.iid}: ${esc(m.label)}`).join('; ')}. Приложите их на карточке предмета и повторите регистрацию.</span></div>`
        : (gate.ok ? `<div class="okline" style="margin-top:10px"><span>Гейт предпосылок пройден: обязательные согласия и справки приложены.</span></div>` : '')}
      ${kmMiss.length ? `<div class="flagline" style="margin-top:10px"><span>Заёмщик относится к категории П1 §2.6 (${esc([...new Set(kmMiss.map(id=>credit(id).borrowerCategory))].join(', '))}). Обеспеченность устанавливается решением Кабинета Министров — укажите реквизиты решения.</span></div>` : ''}
      ${stopMiss.length ? `<div class="flagline" style="margin-top:10px"><span>Гейт стоп-листа П1 §3.5 НЕ пройден: ${stopMiss.map(x=>`${x.iid}: ${esc(x.v.msg)}`).join('; ')}. Регистрация невозможна.</span></div>` : ''}
      ${okAll ? `<div class="mform">
        ${fin('rgNo','Номер договора','',true)}
        ${fdate('rgDate','Дата договора', TODAY, true)}
        ${fin('rgNotary','Нотариус','',true)}
        ${fin('rgNotaryNo','№ нотариальной регистрации','',true)}
        ${fdate('rgNotaryDate','Дата нотариальной регистрации', TODAY, true)}
        ${fin('rgCert','Залоговое рег. свидетельство','',true)}
        ${fsel('rgCustody','Способ хранения предмета залога (ПОЛ §6.4 п.7)', ['у залогодателя','у залогодержателя'], 'у залогодателя')}
        ${fin('rgCustodyPlace','Место хранения (если у залогодержателя)','')}
      </div>
      <div class="okline" style="margin-top:6px"><span>Если способ хранения — «у залогодержателя»: укажите место хранения; периодичность обследования не применяется, имущество у залогодержателя (ПОЛ §6.4 п.7).</span></div>` : ''}
    </div>
    ${okAll ? mfoot('Зарегистрировать','doRegister(\''+cid+'\')','btn-success')
      : (!gate.ok ? `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
         <button class="btn btn-primary" onclick="toCommission('${cid}')">Направить в комитет по администрированию бюджетных кредитов</button></div>`
        : (prereqMiss.length ? `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Закрыть</button></div>`
          : (stopMiss.length ? `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Закрыть</button></div>`
            : `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
               <button class="btn btn-primary" onclick="openKmDecision('${cid}')">Указать решение КМ</button></div>`)))}
    </div>`);
}
/* Постобработка запрета при переводе договора в «Зарегистрирован».
   Запрет — действие во внешнем органе; сам мы его не создаём. Если запрет по
   предмету уже есть (перезалог) — договор добавляется в основания. Если нет —
   предмет остаётся без запрета и немедленно поднимает триггер «залог без запрета»
   с дедлайном (нотар. дата + 5 раб. дней). Возвращает список предметов без запрета. */
function afterRegister(c){
  const its = [...new Set(c.allocs.map(a=>a.item))], missing = [];
  its.forEach(iid => { const it = item(iid);
    if(it.ban){
      if(!it.ban.contracts.includes(c.id)){
        it.ban.contracts.push(c.id);
        hist(it, `Перезалог: договор ${c.id} добавлен в основания действующего запрета ${it.ban.regNo} (повторное наложение не требуется)`);
        hist(c, `По предмету ${iid} действует запрет ${it.ban.regNo} — договор добавлен в его основания (повторное наложение не требуется)`);
      }
    } else missing.push(it);
  });
  return missing;
}
function doRegister(cid){
  const c = contract(cid);
  const breach = invariantBreaches(c);
  if(breach.length) return toast('Инвариант нарушен по '+breach.map(b=>b.id).join(', ')+' — Σ долей превышает залоговую стоимость','warn');
  const gate = gateCheck(c);
  if(!gate.ok) return toast('Гейт покрытия не пройден','warn');
  /* Р-5: гейт предпосылок оформления §5.2 — обязателен для регистрации. */
  const pm = [...new Set(c.allocs.map(a=>a.item))].flatMap(iid=>prereqMissing(item(iid)).map(m=>({iid,...m})));
  if(pm.length) return toast('Гейт предпосылок §5.2 не пройден: '+pm.map(m=>m.iid+' — '+m.label).join('; '),'warn');
  /* Р-13 (П1 §2.6): гейт решения КМ — обязателен для регистрации. */
  const km = c.credits.filter(id => kmGateBlocked(credit(id)));
  if(km.length) return toast('Гейт §2.6 не пройден: обеспеченность по решению КМ не установлена — '+km.join(', '),'warn');
  /* Р-18 (П1 §3.5): гейт стоп-листа — та же повторная проверка, что и в openRegister. */
  const sm = [...new Set(c.allocs.map(a=>a.item))].map(iid => ({ iid, v: stopListCheck(stopFieldsOf(item(iid))) })).filter(x => x.v.block);
  if(sm.length) return toast('Гейт стоп-листа П1 §3.5 не пройден: '+sm.map(x=>x.iid+' — '+x.v.msg).join('; '),'warn');
  const no = val('rgNo').trim(), date = iso2d(val('rgDate')), notary = val('rgNotary').trim(),
        nno = val('rgNotaryNo').trim(), ndate = iso2d(val('rgNotaryDate')), cert = val('rgCert').trim(),
        custody = val('rgCustody'), custodyPlace = val('rgCustodyPlace').trim();
  if(!no || !notary || !nno || !cert) return toast('Заполните все юридические реквизиты','warn');
  if(!isDate(date) || !isDate(ndate)) return toast('Даты — в формате дд.мм.гггг','warn');
  /* Р-16 (ПОЛ §6.4 п.7): способ хранения — обязательное поле регистрации. */
  if(!custodyValid(custody)) return toast('Укажите способ хранения предмета залога (ПОЛ §6.4 п.7)','warn');
  if(custody === 'у залогодержателя' && !custodyPlace) return toast('Укажите место хранения — предмет передаётся залогодержателю (ПОЛ §6.4 п.7)','warn');
  Object.assign(c, { no, date, notary, notaryNo:nno, notaryDate:ndate, cert, status:ACTIVE, custody, custodyPlace: custody === 'у залогодержателя' ? custodyPlace : '' });
  c.allocs.forEach(a => { item(a.item).everPledged = true; });
  hist(c, `Договор зарегистрирован (${no}). Покрытие: ${gate.rows.map(r=>r.id+' — '+pct(r.ratio)).join(', ')}. С этого момента предметы юридически обременены.`);
  const missing = afterRegister(c);
  closeModal(); toast(`Договор зарегистрирован. Гейт покрытия пройден: ${gate.rows.map(r=>`${r.id} — ${pct(r.ratio)} при пороге ${pct(r.req)}`).join('; ')}`,'ok');
  if(missing.length) toast(`Наложите запрет на отчуждение в «${organOf(missing[0])}» до ${banDeadline(missing[0])} — до этого залог не защищён от продажи`,'warn');
  refresh();
}
function toCommission(cid){
  const c = contract(cid), gate = gateCheck(c);
  c.status = 'На рассмотрении комиссии';
  hist(c, `Регистрация заблокирована контрольным гейтом: ${gate.rows.filter(r=>!r.ok).map(r=>r.id+' — '+pct(r.ratio)).join(', ')}. Направлено в комитет по администрированию бюджетных кредитов.`);
  closeModal(); toast('Договор направлен в комитет по администрированию бюджетных кредитов','warn'); refresh();
}

/* ---------- РЕШЕНИЕ КАБИНЕТА МИНИСТРОВ (Р-13, П1 §2.6) — вводится на карточке ДОГОВОРА
   (не в кредитном модуле): заёмщик под категорией §2.6 не имеет собственного расчёта
   обеспеченности — её устанавливает решение КМ, applies ко ВСЕМ кредитам договора,
   у которых заполнена borrowerCategory. requiredCover() уже читает kmDecision.coverPct —
   после сохранения requiredCover/coverage у этих кредитов автоматически переходят на
   % из решения (см. requiredCover выше). ---------- */
function openKmDecision(cid){
  if(!canCurate()) return denyEdit();
  const c = contract(cid);
  modal(`<div class="modal form">${mhead('Решение Кабинета Министров · '+cid)}
    <div class="modal-b">
      <div class="mform">
        ${fin('kmNo','№ решения','',true)}
        ${fdate('kmDate','Дата решения', TODAY, true)}
        ${fin('kmPct','% обеспеченности','',true)}
      </div>
      <div class="warn-inline"><span>Реквизиты применяются ко всем кредитам договора, относящимся к категории П1 §2.6 (${esc([...new Set(c.credits.filter(id=>(credit(id)||{}).borrowerCategory).map(id=>credit(id).borrowerCategory))].join(', '))}).</span></div>
    </div>${mfoot('Сохранить решение','saveKmDecision(\''+cid+'\')')}</div>`);
}
function saveKmDecision(cid){
  const c = contract(cid), no = val('kmNo').trim(), date = iso2d(val('kmDate')), coverPct = num(val('kmPct'));
  if(!no) return toast('Укажите номер решения','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  if(!(coverPct > 0)) return toast('% обеспеченности должен быть положительным числом','warn');
  const decision = { no, date, coverPct };
  const applied = [];
  c.credits.forEach(id => { const cr = credit(id); if(cr && cr.borrowerCategory){ cr.kmDecision = decision; applied.push(id); } });
  hist(c, `Решение Кабинета Министров ${no} от ${date} (П1 §2.6): обеспеченность ${coverPct}% — применено к кредитам ${applied.join(', ')}`);
  closeModal(); toast('Решение КМ сохранено — гейт §2.6 снят','ok');
  openRegister(cid);
}

/* ---------- РЕШЕНИЕ КОМИТЕТА ПО АДМИНИСТРИРОВАНИЮ БЮДЖЕТНЫХ КРЕДИТОВ (обоснование обязательно для допуска) ---------- */
function openCommission(cid){
  if(!canCommittee()) return denyComm();
  const c = contract(cid), gate = gateCheck(c);
  const bad = gate.rows.filter(r=>!r.ok);
  modal(`<div class="modal form">${mhead('Решение комитета по администрированию бюджетных кредитов · '+cid)}
    <div class="modal-b">
      <div class="flagline"><span>Недообеспечение: ${bad.map(r=>`${r.id} — ${pct(r.ratio)} при пороге ${pct(r.req)} (не хватает ${fmt(Math.max(0, r.amount*r.req - r.sum))}${r.liqApplies&&!r.liqOk?`; доля ликвида ${pct(r.liqShare)}<80%`:''})`).join('; ')}</span></div>
      <div class="mform one">
        ${fsel('cmDec','Решение', [
          {v:'return', t:'Вернуть на доработку — догрузить / заменить предмет'},
          {v:'admit',  t:'Допустить недообеспеченный кредит (с обоснованием)'} ], 'return')}
        ${ftxt('cmObosn','Обоснование (обязательно для допуска)','')}
      </div>
      <div class="warn-inline"><span>Обоснование фиксируется в договоре и в истории, договор помечается флагом «допуск &lt;порога».</span></div>
    </div>${mfoot('Провести решение','saveCommission(\''+cid+'\')')}</div>`);
}
function saveCommission(cid){
  const c = contract(cid), dec = val('cmDec'), ob = val('cmObosn').trim(), gate = gateCheck(c);
  if(dec === 'return'){
    c.status = 'Оформляется';
    hist(c, `Комитет по администрированию бюджетных кредитов: возврат на доработку${ob ? ' — '+ob : ''}`);
    closeModal(); toast('Возвращено на доработку','ok'); return refresh();
  }
  if(!ob) return toast('Допуск ниже порога требует обоснования','warn');
  /* Р-5: комиссия допускает недообеспечение, но предпосылки §5.2 (согласия/справки) — не в её власти. */
  const pm = [...new Set(c.allocs.map(a=>a.item))].flatMap(iid=>prereqMissing(item(iid)).map(m=>({iid,...m})));
  if(pm.length) return toast('Регистрация невозможна: гейт предпосылок §5.2 — '+pm.map(m=>m.iid+' — '+m.label).join('; '),'warn');
  const no = 'ЗД-' + TODAY.slice(6) + '/' + c.id.slice(2) + '-1';
  /* Худший по покрытию кредит — тот же выбор, что и Math.min(...ratio) ниже, но с
     сохранением его req (Д-2): порог — функция состава, не константа 120%. */
  const worst = gate.rows.reduce((a,b)=> b.ratio<a.ratio?b:a);
  Object.assign(c, { status:ACTIVE, no: c.no || no, date: c.date || TODAY,
    notary: c.notary || 'Нотариус (реквизиты уточняются)', notaryNo: c.notaryNo || 'НР-' + TODAY.slice(6) + '/0000',
    notaryDate: c.notaryDate || TODAY, cert: c.cert || 'ЗС-' + TODAY.slice(6) + '/0000',
    undercovered: { ratio: worst.ratio, req: worst.req, obosn: ob, by: role, date: TODAY } });
  c.allocs.forEach(a => { item(a.item).everPledged = true; });
  hist(c, `Комитет по администрированию бюджетных кредитов: ДОПУЩЕН недообеспеченный кредит (${gate.rows.filter(r=>!r.ok).map(r=>r.id+' — '+pct(r.ratio)).join(', ')}). Обоснование: «${ob}». Договор зарегистрирован.`);
  const missing = afterRegister(c);
  closeModal(); toast(`Комиссия допустила договор с покрытием ниже порога ${pct(worst.req)} — флаг зафиксирован`,'warn');
  if(missing.length) toast(`Наложите запрет на отчуждение в «${organOf(missing[0])}» до ${banDeadline(missing[0])} — до этого залог не защищён от продажи`,'warn');
  refresh();
}

/* ---------- ДОП СОГЛАШЕНИЕ — CHANGESET (конверт версионирования) ---------- */
let ds = { cid:null, ops:[] };
function openDs(cid){
  if(!canDs()) return denyEdit();
  ds = { cid, ops: [] };
  renderDs();
}
function applyOps(c, ops){
  const v = JSON.parse(JSON.stringify(c));
  ops.forEach(o => {
    if(o.type==='out')    v.allocs = v.allocs.filter(a => a.item !== o.item);
    if(o.type==='in')     v.allocs.push({ item:o.item, credit:o.credit, share:o.share });
    if(o.type==='share'){ const a = v.allocs.find(a => a.item===o.item && a.credit===o.credit); if(a) a.share = o.share; }
    if(o.type==='credit' && !v.credits.includes(o.credit)) v.credits.push(o.credit);
  });
  return v;
}
/* Блокируем только те нарушения инварианта, которые пакет СОЗДАЁТ или УСУГУБЛЯЕТ.
   Уже существующее нарушение (доля закреплена нотариально, а переоценка уронила стоимость)
   блокировать нельзя — иначе доп соглашение, которое его лечит, само окажется запрещено. */
function newBreaches(c, v){
  const base = {}; invariantBreaches(c).forEach(b => base[b.id] = b.alloc);
  return invariantBreaches(v).filter(b => !(b.id in base) || b.alloc > base[b.id] + 0.005);
}
const opText = o =>
  o.type==='out'    ? `Вывод предмета ${o.item} · ${item(o.item).name} (снимаются все его доли в договоре)` :
  o.type==='in'     ? `Ввод предмета ${o.item} · ${item(o.item).name} под ${o.credit}, доля ${fmt(o.share)}` :
  o.type==='share'  ? `Правка доли ${o.item} / ${o.credit}: → ${fmt(o.share)}` :
                      `Добавление кредита ${o.credit} · ${credit(o.credit).num} в договор (перекрёстное обеспечение)`;

/* Р-6 (§8, Прил.3 §3.5): ГЕЙТ ЗАМЕНЫ. Замена = в пакете по одному кредиту есть и вывод, и ввод.
   Правила: (1) нельзя понижать суммарную ликвидность (Σ рангов ввода < Σ рангов вывода) —
   допуск только комиссией с обоснованием; (2) замена при просроченной задолженности по
   кредиту не допускается вовсе (§8: согласие даётся «при отсутствии просроченной задолженности»). */
const liqRankOf = it => (KINDS[it.kind]||{}).liquidityRank || 0;
function replacementInfo(c, ops){
  const byCredit = {};
  const ensure = id => (byCredit[id] ||= { credit:id, outRank:0, inRank:0, outItems:[], inItems:[] });
  ops.filter(o=>o.type==='out').forEach(o =>
    c.allocs.filter(a=>a.item===o.item).forEach(a => { const x = ensure(a.credit); x.outRank += liqRankOf(item(o.item)); x.outItems.push(o.item); }));
  ops.filter(o=>o.type==='in').forEach(o => { const x = ensure(o.credit); x.inRank += liqRankOf(item(o.item)); x.inItems.push(o.item); });
  return Object.values(byCredit)
    .filter(x => x.outItems.length && x.inItems.length)   // и вывод, и ввод по одному кредиту = замена
    .map(x => ({ ...x, drop: x.inRank < x.outRank, overdue: Boolean((credit(x.credit)||{}).overdue) }));
}

/* Р-14 (Прил.3 §3.5): РАВНОЦЕННОСТЬ ЗАМЕНЫ. Сравниваем эффективную стоимость выводимых
   долей (усечённую пропорционально, как и в покрытии — effShare) с залоговой стоимостью
   вводимых предметов (не больше вводимой доли — физически больше стоимости предмета не
   введёшь). Считается по ВСЕМУ пакету, не по кредиту — пакет либо равноценен целиком. */
function replacementValues(c, ops){
  const cs = ctx(c);
  const outValue = ops.filter(o=>o.type==='out')
    .flatMap(o => c.allocs.filter(a=>a.item===o.item))
    .reduce((s,a) => s + effShare(cs, a.item, a.share), 0);
  const inValue = ops.filter(o=>o.type==='in')
    .reduce((s,o) => s + Math.min(o.share, pledgeValue(item(o.item))), 0);
  return { outValue, inValue };
}
/* Р-14 (Прил.3 §3.5): ГЕЙТ ЗАМЕНЫ — четыре условия. Равноценность и согласие/заключение —
   новые жёсткие требования; rankOk (Р-6) передаётся вызывающим кодом (!reps.some(r=>r.drop)). */
function replacementGate({outValue, inValue, deptConsent, dakConclusion, rankOk}){
  const equivalenceOk = inValue >= outValue;
  const consentOk = Boolean(deptConsent && deptConsent.trim());
  const dakOk = Boolean(dakConclusion && dakConclusion.trim());
  const blocked = !(equivalenceOk && consentOk && dakOk && rankOk);
  return { equivalenceOk, consentOk, dakOk, rankOk, blocked };
}

function renderDs(){
  const c = contract(ds.cid);
  const v = applyOps(c, ds.ops);
  const before = gateCheck(c), after = gateCheck(v);
  const breach = newBreaches(c, v);
  const reps = replacementInfo(c, ds.ops);
  const repOverdue = reps.filter(r=>r.overdue);
  const repDrop = reps.some(r=>r.drop && !r.overdue);
  /* Р-14 (Прил.3 §3.5): равноценность пакета замены (Σ вводимой стоимости ≥ Σ эфф.
     выводимой). Недостача равноценности идёт по тому же пути допуска, что покрытие/
     ликвидность — комиссия с обоснованием, НЕ отдельный жёсткий блок. */
  const { outValue, inValue } = reps.length ? replacementValues(c, ds.ops) : { outValue:0, inValue:0 };
  const rankOk = !reps.some(r=>r.drop);
  const repEquivShort = reps.length && inValue < outValue;
  const needCommission = (!after.ok || repDrop || repEquivShort);   // допуск комиссией (покрытие ниже порога / понижение ликвидности / равноценность)
  /* Согласие отраслевого департамента и заключение ДАК — читаем из ПРЕДЫДУЩЕГО рендера
     (при dsAdd/dsDel renderDs() вызывается повторно ДО замены DOM — старые значения полей
     ещё доступны), чтобы не терять ввод офицера при добавлении/удалении операций пакета. */
  const prevDeptConsent = val('dsDeptConsent');
  const prevDeptChk = Boolean((document.getElementById('dsDeptConsentChk')||{}).checked);
  const prevDakConclusion = val('dsDakConclusion');
  const gate = reps.length ? replacementGate({ outValue, inValue, deptConsent: prevDeptConsent, dakConclusion: prevDakConclusion, rankOk }) : null;
  const repDeptDakMissing = reps.length && (!prevDeptConsent.trim() || !prevDeptChk || !prevDakConclusion.trim());
  const inCtr  = [...new Set(v.allocs.map(a=>a.item))];
  /* Р-?: показываем порог ДО/ПОСЛЕ — смена состава обеспечения (напр. добавили товары
     в обороте) поднимает порог 120→150%, из-за чего гейт может падать ДАЖЕ при росте
     покрытия. Без этих колонок офицер не понимает, почему «стало больше», а гейт красный. */
  let reqRose = false;
  const rows = after.rows.map(r => {
    const b = before.rows.find(x=>x.id===r.id);
    const reqUp = b && r.req > b.req + 0.0001;
    if(reqUp) reqRose = true;
    return `<tr><td>${r.id}</td><td>${b ? pct(b.ratio) : '—'}</td>
      <td class="${!b || r.ratio >= b.ratio ? 'diff-up':'diff-dn'}">${pct(r.ratio)}</td>
      <td>${b ? pct(b.req) : '—'}</td>
      <td${reqUp?' class="diff-dn" title="порог вырос — в обеспечение добавлен низколиквидный вид"':''}>${pct(r.req)}${reqUp?' ↑':''}</td>
      <td><span class="pill ${r.ok?'low':'high'}">${r.ok?`≥${pct(r.req)}`:`<${pct(r.req)}`}</span></td></tr>`; }).join('');
  /* Р-6: строка ликвидности до/после для замен + индикатор допустимости. */
  const repRows = reps.map(r=>`<tr><td>${r.credit}</td>
      <td>${r.outItems.join(', ')} (ранг Σ${r.outRank})</td>
      <td>${r.inItems.join(', ')} (ранг Σ${r.inRank})</td>
      <td><span class="pill ${r.overdue?'high':(r.drop?'high':'low')}">${r.overdue?'просрочка — замена запрещена':(r.drop?'ликвидность падает':'ликвидность не падает')}</span></td></tr>`).join('');

  const outOpts   = inCtr.map(i=>({v:i, t:`${i} · ${item(i).name}${item(i).ban?' — есть запрет на отчуждение (после вывода потребует снятия)':''}`}));
  /* Предметы пакета, которые выводятся и по которым сейчас действует запрет:
     вывод не блокируется, но породит задачу снять запрет в органе. */
  const outBanned = ds.ops.filter(o=>o.type==='out' && item(o.item).ban).map(o=>o.item);
  const inOpts    = ITEMS.filter(i=>!i.lost).map(i=>({v:i.id, t:`${i.id} · ${i.name} · доступно ${fmt(availableOf(i))}`}));
  const shareOpts = v.allocs.map((a,i)=>({v:i, t:`${a.item} / ${a.credit} · текущая доля ${fmt(a.share)}`}));
  const credOpts  = CREDITS.filter(cr=>cr.inn===c.inn && cr.status==='Действующий' && !v.credits.includes(cr.id))
                           .map(cr=>({v:cr.id, t:`${cr.id} · ${cr.num} · сумма ${fmt(cr.amount)} · порог по составу (${pct(COVER_LIQUID)}/${pct(COVER_MOVABLE)})`}));

  modal(`<div class="modal">${mhead('Доп соглашение к '+(c.no||c.id)+' — пакет изменений (changeset)')}
    <div class="modal-b">
      <div class="mform">
        ${fsel('dsType','Операция', [
          {v:'out',    t:'Вывод предмета'},
          {v:'in',     t:'Ввод предмета'},
          {v:'share',  t:'Правка доли'},

  if(reps.length){

function dsParams(){
  const t = val('dsType'), o = window.__dsOpts, box = document.getElementById('dsParams');
  const S = (id,opts) => `<div class="control grey" style="margin-bottom:8px"><select id="${id}">${opts.length ? opts.map(x=>`<option value="${esc(x.v)}">${esc(x.t)}</option>`).join('') : '<option value="">— нет доступных —</option>'}</select>${caret()}</div>`;
  const I = (id,ph) => `<div class="control"><input id="${id}" placeholder="${ph}"></div>`;
  box.innerHTML =
    t==='out'    ? S('dsItem', o.outOpts) :
    t==='in'     ? S('dsItem', o.inOpts) + S('dsCredit', contract(ds.cid).credits.map(id=>({v:id,t:id+' · '+credit(id).num}))) + I('dsShare','Доля') :
    t==='share'  ? S('dsIdx', o.shareOpts) + I('dsShare','Новая доля') :
                   S('dsCredit', o.credOpts);
}
function dsAdd(){
  const t = val('dsType'), c = contract(ds.cid);
  if(t==='out'){
    const id = val('dsItem'); if(!id) return toast('Нет предметов для вывода','warn');
    ds.ops.push({ type:'out', item:id });
  }
  if(t==='in'){
    const id = val('dsItem'), cr = val('dsCredit'), sh = num(val('dsShare'));
    if(!id || !cr) return toast('Выберите предмет и кредит','warn');
    if(!(sh > 0)) return toast('Доля должна быть положительным числом','warn');
    /* Advisory: доступное с учётом уже добавленных в пакет вводов по этому предмету.
       Не блокируем (в пакете может быть вывод, освобождающий место) — жёсткий guard = инвариант. */
    const pkgIn = ds.ops.filter(o=>o.type==='in' && o.item===id).reduce((s,o)=>s+o.share,0);
    const avail = availableOf(item(id)) - pkgIn;
    if(sh > avail + 0.005)
      toast(`Внимание: доля ${fmt(sh)} превышает доступное по ${id} (${fmt(Math.max(0,avail))}). Без вывода другого залога это нарушит инвариант.`,'warn');
    ds.ops.push({ type:'in', item:id, credit:cr, share:sh });
  }
  if(t==='share'){
    const i = Number(val('dsIdx')), sh = num(val('dsShare'));
    const v = applyOps(c, ds.ops), a = v.allocs[i];
    if(!a) return toast('Выберите отнесение','warn');
    if(!(sh >= 0)) return toast('Доля должна быть числом ≥ 0','warn');
    ds.ops.push({ type:'share', item:a.item, credit:a.credit, share:sh });
  }
  if(t==='credit'){
    const cr = val('dsCredit'); if(!cr) return toast('Нет доступных кредитов этого заёмщика','warn');
    ds.ops.push({ type:'credit', credit:cr });
  }
  renderDs();
}
function dsDel(i){ ds.ops.splice(i,1); renderDs(); }
function dsRegister(){
  const c = contract(ds.cid), v = applyOps(c, ds.ops);
  if(newBreaches(c, v).length) return toast('Инвариант нарушен — пакет отклонён','warn');
  /* Р-6: гейт замены. Просрочка — жёсткий блок (§8); понижение ликвидности — как и покрытие,
     допускается только комиссией с обоснованием. */
  const reps = replacementInfo(c, ds.ops);
  const repOverdue = reps.filter(r=>r.overdue);
  if(repOverdue.length) return toast('Замена при просроченной задолженности не допускается (§8): кредит '+repOverdue.map(r=>r.credit).join(', '),'warn');
  /* Р-14 (Прил.3 §3.5): согласие отраслевого департамента и заключение ДАК о ликвидности —
     ДВА новых жёстких требования при замене. Не проходят через комитет — обязательны всегда. */
  let deptConsent = '', dakConclusion = '';
  if(reps.length){
    deptConsent = val('dsDeptConsent').trim();
    dakConclusion = val('dsDakConclusion').trim();
    const deptChk = Boolean((document.getElementById('dsDeptConsentChk')||{}).checked);
    if(!deptConsent || !deptChk) return toast('Замена требует согласия отраслевого департамента (Прил.3 §3.5): укажите реквизит и подтвердите чек-боксом','warn');
    if(!dakConclusion) return toast('Замена требует заключения ДАК о ликвидности (Прил.3 §3.5)','warn');
  }
  const repDrop = reps.some(r=>r.drop && !r.overdue);
  const { outValue, inValue } = reps.length ? replacementValues(c, ds.ops) : { outValue:0, inValue:0 };
  const repEquivShort = reps.length && inValue < outValue;
  const before = gateCheck(c), after = gateCheck(v);
  /* Худший по покрытию кредит пакета — тот же смысл, что и Math.min(...ratio) ниже,
     но с сохранением его req (Д-2): порог — функция состава, не константа 120%. */
  const worst = after.rows.reduce((a,b)=> b.ratio<a.ratio?b:a);
  let obosn = '';
  if(!after.ok || repDrop || repEquivShort){
    if(!canCommittee()) return toast('Гейт не пройден (покрытие/ликвидность/равноценность): допуск возможен только комитетом по администрированию бюджетных кредитов','warn');
    obosn = val('dsObosn').trim();
    if(!obosn) return toast('Допуск (покрытие ниже порога / понижение ликвидности / равноценность) требует обоснования','warn');
  }
  const no = 'ДС-' + String(c.addenda.length+1).padStart(2,'0') + '/' + TODAY.slice(6);
  const diff = after.rows.map(r => {
    const b = before.rows.find(x=>x.id===r.id);
    return { id:r.id, before: b ? pct(b.ratio) : '—', after: pct(r.ratio), up: !b || r.ratio >= (b ? b.ratio : 0) };
  });
  const opLines = ds.ops.map(opText);
  reps.forEach(r => opLines.push(`Ликвидность (замена по ${r.credit}): ранг Σ${r.outRank} → Σ${r.inRank}${r.drop?' — понижение, допущено комиссией':' — не понижается'}`));
  if(reps.length) opLines.push(`Равноценность замены: выводится ${fmt(outValue)} / вводится ${fmt(inValue)}${repEquivShort?' — не соблюдена, допущено комиссией':' — соблюдена'}. Согласие департамента: «${deptConsent}». Заключение ДАК: «${dakConclusion}».`);
  c.addenda.push({ no, date: TODAY, ops: opLines, diff, obosn, req: worst.req,
    replacement: reps.length ? { deptConsent, dakConclusion, outValue, inValue, equivalenceOk: !repEquivShort } : null });
  const touched = [...new Set(c.allocs.map(a=>a.item))];   // предметы договора ДО применения пакета
  c.allocs = v.allocs; c.credits = v.credits;
  c.allocs.forEach(a => { item(a.item).everPledged = true; });
  /* Для каждого затронутого предмета, у которого доли обнулились и есть запрет —
     он подлежит снятию. Само снятие — акт в органе, молча в коде не снимаем. */
  touched.forEach(iid => { const it = item(iid);
    if(it.ban && !it.ban.pendingRelease && allocatedLegal(iid) === 0){
      it.ban.pendingRelease = true;
      hist(it, `Предмет выведен доп соглашением ${no} — запрет на отчуждение ${it.ban.regNo} подлежит снятию в «${organOf(it)}» (снятие оформляется актом)`);
    }
  });
  if(!after.ok) c.undercovered = { ratio: worst.ratio, req: worst.req, obosn, by: role, date: TODAY };
  hist(c, `Доп соглашение ${no} зарегистрировано (${ds.ops.length} операц.): ${ds.ops.map(opText).join(' · ')}. Покрытие после: ${after.rows.map(r=>r.id+' — '+pct(r.ratio)).join(', ')}${obosn ? `. Допущено комиссией ниже порога ${pct(worst.req)}: «${obosn}»` : ''}`);
  closeModal(); toast('Доп соглашение '+no+' зарегистрировано — изменения вступили в силу','ok');
  ds = { cid:null, ops:[] }; refresh();
}
/* Р-14: «Отказать в замене» — альтернатива регистрации, когда офицер/комиссия решает НЕ
   допускать замену (равноценность/согласие/ДАК/ранг не устраивают). История — обязательна;
   реестр мониторинга не трогаем (см. бриф) — заметка всплывает на карточке договора. */
function dsRefuseReplacement(){
  const c = contract(ds.cid);
  const reps = replacementInfo(c, ds.ops);
  if(!reps.length) return;
  const reason = val('dsRefuseReason').trim();
  if(!reason) return toast('Укажите причину отказа в замене','warn');
  c.replacementRefusal = { date: TODAY, reason, by: role, credits: reps.map(r=>r.credit) };
  hist(c, `Отказано в замене залога по кредиту(ам) ${reps.map(r=>r.credit).join(', ')} (Прил.3 §3.5): «${reason}»`);
  closeModal(); toast('Отказ в замене зафиксирован — история договора обновлена','warn');
  ds = { cid:null, ops:[] }; refresh();
}

/* ---------- ПОГАШЕНИЕ КРЕДИТА → АВТОМАТИЧЕСКОЕ ВЫСВОБОЖДЕНИЕ ДОЛЕЙ (§4.2) ---------- */
function repay(cid, creditId){
  if(!canCurate()) return denyEdit();
  const cr = credit(creditId);
  modal(`<div class="modal form narrow">${mhead('Полное погашение кредита · '+creditId)}
    <div class="modal-b">
      <div class="warn-inline"><span>Полное погашение — единственный случай <b>автоматического</b> высвобождения долей во всех договорах. Частичное погашение долю не уменьшает — только доп соглашением.</span></div>
      <p class="phead-sub">Кредит ${creditId} · ${esc(cr.num)} · сумма ${fmt(cr.amount)}. Если это последний действующий кредит договора — договор будет закрыт, предметы освобождены.</p>
    </div>${mfoot('Отметить погашенным','doRepay(\''+cid+'\',\''+creditId+'\')','btn-success')}</div>`);
}
function doRepay(cid, creditId){
  const cr = credit(creditId);
  cr.status = 'Погашен';
  const touched = new Set();
  CONTRACTS.forEach(c => {
    const gone = c.allocs.filter(a=>a.credit===creditId);
    if(!gone.length) return;
    gone.forEach(a => touched.add(a.item));
    c.allocs = c.allocs.filter(a=>a.credit!==creditId);
    hist(c, `Кредит ${creditId} полностью погашен → автоматически высвобождены доли: ${gone.map(a=>a.item+' ('+fmt(a.share)+')').join(', ')}`);
    gone.forEach(a => hist(item(a.item), `Доля ${fmt(a.share)} по ${creditId} высвобождена автоматически (кредит погашен). Доступно: ${fmt(availableOf(item(a.item)))}`));
    const live = c.credits.filter(id => credit(id).status === 'Действующий');
    if(!live.length && isActive(c)){
      c.allocs.forEach(a => touched.add(a.item));
      c.status = 'Закрыт'; c.allocs = [];
      hist(c, 'Все кредиты договора погашены → договор закрыт, предметы освобождены (закрытие договора и есть правовой акт)');
    }
  });
  /* После высвобождения долей: предмет с обнулившимися долями и действующим запретом
     подлежит снятию. Само снятие — акт в органе, автоматом не выполняется. */
  let staleN = 0;
  touched.forEach(iid => { const it = item(iid);
    if(it.ban && !it.ban.pendingRelease && allocatedLegal(iid) === 0){
      it.ban.pendingRelease = true; staleN++;
      hist(it, `Доли высвобождены — запрет на отчуждение ${it.ban.regNo} подлежит снятию в «${organOf(it)}» (снятие оформляется актом)`);
    }
  });
  closeModal(); toast('Кредит погашен. Доли высвобождены автоматически','ok');
  if(staleN) toast('Запрет на отчуждение подлежит снятию: доли по предмету обнулились. Оформите акт снятия в органе','warn');
  refresh();
}
