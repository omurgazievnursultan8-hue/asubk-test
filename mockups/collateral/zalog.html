<title>Залоговое обеспечение · АСУБК</title>
<!--
  РАБОЧИЙ ПРОТОТИП (single-file, MVP) — модуль «Залоговое обеспечение» (TO-BE).
  Это не картинка-мокап: вся логика ниже ИСПОЛНЯЕТСЯ. Гейты, инварианты, производные
  величины и триггеры считаются в рантайме от состояния, а не зашиты в разметку.
  Спека: `ASUBK-zalog-logika.md` (секция 13 мастер-документа `ASUBK-analiz-mokapov.md`).
  Экрана залога в живой системе нет — модуль проектируется с нуля, as-is дефектов нет.

  ЧТО РЕАЛИЗОВАНО (и что разработчик обязан сохранить)

  1. ДВЕ СУЩНОСТИ, НЕ ОДНА.
     • ПРЕДМЕТ ЗАЛОГА — каноническая запись актива (реестр). Живёт сквозь весь ЖЦ,
       переоценивается, обследуется, на него накладывается запрет на отчуждение. Реестр — якорь модуля.
     • ЗАЛОГОВЫЙ ДОГОВОР — юридическая обёртка (номер, нотариус, свидетельство).
     Предмет ↔ активный договор = 1:N (перезалог на остаточную стоимость).
     Договор ↔ кредит = 1:N (кредиты одного заёмщика, перекрёстное обеспечение).
     Юр-поля живут НА ДОГОВОРЕ, физические и стоимостные — НА ПРЕДМЕТЕ. Не смешивать.

  2. ОТНЕСЕНИЕ_ЗАЛОГА (junction «предмет ↔ кредит», внутри договора) несёт ДОЛЮ —
     часть залоговой стоимости предмета, закреплённую за конкретным кредитом.
     ИНВАРИАНТ: Σ долей предмета по всем действующим/оформляемым договорам
     ≤ залоговая стоимость предмета. Проверяется при каждом вводе доли (checkInvariant).

  3. БАЗА ПОКРЫТИЯ — ЗАЛОГОВАЯ СТОИМОСТЬ, НЕ ОЦЕНОЧНАЯ (шов №1).
     оценочная — owned (вводит человек из отчёта оценщика);
     залоговая — derived: оценочная × коэффициент[вид залога] (справочник KINDS);
                 событийный override комиссией: ≤ расчётной — свободно,
                 > расчётной — ОБЯЗАТЕЛЬНОЕ обоснование + флаг (см. openOverride);
     покрытие  — вычисляемый оверлей: Σ эффективных долей ÷ сумма кредита ≥ 120%.
     Ни одно из трёх не хранится «на всякий случай» — считается из состояния.

  4. УСЕЧЕНИЕ ДОЛИ ПРИ ПАДЕНИИ СТОИМОСТИ (правило, добавленное сверх спеки —
     согласовать). Юридическая доля в нотариальном договоре СТАТИЧНА и не усыхает.
     Но если переоценка уронила залоговую стоимость ниже суммы закреплённых долей,
     экономическое покрытие не может опираться на несуществующую стоимость: доли
     усекаются ПРОПОРЦИОНАЛЬНО (effShare). Договор при этом не правится — падение
     покрытия поднимает триггер «недостаточность обеспечения» (см. п. 7).

  5. ГЕЙТ 120% — ДВА МЕСТА, ОДИН КОД (gateCheck).
     • Регистрация залогового договора — контрольный гейт.
     • Регистрация доп соглашения — тот же гейт по ЧИСТОМУ ЭФФЕКТУ пакета (net).
     Провал → договор уходит в статус «На рассмотрении комиссии»
     (не «зарегистрирован с ошибкой» и не «молча пропущен»). Комиссия либо возвращает
     на доработку, либо допускает недообеспеченный кредит с ОБЯЗАТЕЛЬНЫМ обоснованием.

  6. ДОП СОГЛАШЕНИЕ — КОНВЕРТ ВЕРСИОНИРОВАНИЯ (changeset), а не набор отдельных кнопок.
     Один акт несёт ≥1 операцию (вывод предмета + ввод + правка долей + добавление
     кредита). Мини-ЖЦ: оформляется → зарегистрировано. Эффект наступает НА РЕГИСТРАЦИИ.
     Снимок before/after сохраняется на соглашении. Вывод предмета не блокируется:
     если он выводит предмет с наложенным запретом, после регистрации возникает
     задача снять запрет (мониторинг), снятие — отдельным актом в органе.

  7. ТРИ НЕЗАВИСИМЫХ ИЗМЕРЕНИЯ, НЕ СЛИВАТЬ В ОДИН «СТАТУС»:
     • залоговая ось предмета (свободен · в залоге · реализуется · освобождён) —
       ПРОИЗВОДНАЯ от наличия долей;
     • ось ЗАПРЕТА НА ОТЧУЖДЕНИЕ (не требуется · не наложен · просрочен · наложен ·
       подлежит снятию) — это НАШ ОБЯЗАТЕЛЬНЫЙ ШАГ ОФОРМЛЕНИЯ, а не внешнее событие:
       порядок «нотариус → запрет → (погашение/вывод) → снятие». Запрет накладываем
       МЫ в регистрирующем органе, чтобы залогодатель не продал предмет без нашего
       ведома. ОДИН запрет на предмет (на вещь), при перезалоге дополняется
       основаниями — повторно не накладывается. ОТСУТСТВИЕ запрета при живом залоге —
       ДЕФЕКТ ОФОРМЛЕНИЯ (триггер), НАЛИЧИЕ — признак защищённости. Снятие ПОД ГЕЙТОМ:
       пока по предмету живы доли, снять нельзя. Срок наложения — 5 рабочих дней после
       нотариального удостоверения (справочник, орган — свой на каждый вид залога).
       Сторонний арест (суд, налоговая) в модуле НЕ моделируется.
     • плановый контроль (обследование / переоценка) — ВЫЧИСЛЯЕМЫЙ ОВЕРЛЕЙ по датам,
       не статус. Просрочка контроля — расчёт от сегодняшней даты.
     Триггер «недостаточность обеспечения» — тоже НЕ статус: это вычисляемое событие,
     которое уходит во взыскание (трек по причине «обеспечение», параллельный просрочке).
     Он НЕ трогает риск-категорию и НЕ трогает группу платёжеспособности.

  8. ВЫСВОБОЖДЕНИЕ ДОЛИ (§4.2 спеки): автоматика ТОЛЬКО при закрытии кредита/договора
     (кнопка «Отметить погашенным» на карточке договора демонстрирует правило).
     Частичное освобождение на живом кредите — ТОЛЬКО доп соглашением. Доля от платежей
     по основному долгу не усыхает.

  9. ОБСЛЕДОВАНИЕ ≠ ПЕРЕОЦЕНКА. Обследование — про физическое состояние (read-событие),
     переоценка — про стоимость. Исход обследования классифицирован и ветвит действие:
     в норме → сдвиг плановой даты; ухудшение → флаг «требуется досрочная переоценка»;
     утрата → предмет выбыл → триггер недостаточности обеспечения.

  СООТВЕТСТВИЕ «Положению о работе с залогом» № 22 от 12.12.2025 и приложениям (Р-1…Р-9):
    Р-1  ТРИ ПОРОГА обеспеченности + ДОЛЯ ЛИКВИДА (§2.3–2.4): ликвид ≥120%, движимое
         неликвидное ≥150% при доле ликвида ≥80%. Порог — функция состава (requiredCover),
         не константа; все расчётные точки и тексты берут порог оттуда.
    Р-2  СТОП-ЛИСТ §3.5 (PROHIBITED_KINDS): «Скот/поголовье» удалён из видов; «Товары в
         обороте» требуют подтверждения непопадания под §3.5; стоп-лист виден в справочнике.
    Р-3  ПЕРИОДИЧНОСТЬ ОБСЛЕДОВАНИЯ по матрице «группа платёжеспособности × движимость»
         (Прил.2 §2.3, SURVEY_MATRIX); группа — worst-of по заёмщикам; банкрот → «по договору
         со спецадминистратором», авто-просрочка не поднимается. Интервал ПЕРЕОЦЕНКИ — вне положения.
    Р-4  СОГЛАСИЕ на действия БЕЗ снятия запрета (§8, Прил.3 §4): it.ban не трогается; при
         необходимости — триггер переоценки за счёт залогодателя.
    Р-5  ПРЕДПОСЫЛКИ ОФОРМЛЕНИЯ (§5.2): согласия собственника/супруга/справка по типу
         залогодателя; гейт регистрации (отдельный от гейта покрытия) блокирует незакрытые.
    Р-6  ГЕЙТ ЗАМЕНЫ (§8, Прил.3 §3.5): нельзя понижать ликвидность (liquidityRank) — допуск
         комиссией; замена при просрочке (credit.overdue) не допускается вовсе.
    Р-7  ТЕХНИКА (§2.5, §3.4): возраст ≤15 лет (СНГ)/≤20 (дальнее зарубежье), обязательное
         страхование; истёкший полис на действующем залоге → триггер.
    Р-8  ИЗВЕЩЕНИЕ О ВОСПОЛНЕНИИ (Прил.2 §2.5): при утрате/ухудшении сперва извещение со
         сроком; взыскание — только по истечении срока или при отказе.
    Р-9  СНЯТИЕ ЗАПРЕТА (§7.2, Прил.3): классификатор из оснований + чек-лист согласования,
         гейтующий кнопку; частичное снятие с части предмета — отдельным действием.

  РОЛИ (ПОЛ §9.1): Куратор отдела залогового обеспечения / Заведующий отделом залогового
  обеспечения (правят, canCurate), Комитет по администрированию бюджетных кредитов (override
  стоимости и решение по гейту, canCommittee), Начальник Департамента администрирования
  кредитов (canHeadOfDept), Наблюдатель (только чтение). Права проверяются в
  canCurate()/canCommittee(); canHeadOfDept()/canHeadOfUnit() — под гейт замены/override
  задачами Р-19 далее по плану (шаг замены/переопределения).

  ДЕМО-ДАННЫЕ покрывают все ветки: перезалог под ОДНИМ запретом с двумя основаниями
  (П-001, ban.contracts=[Д-001,Д-002]), третье-лицо-залог с наложенным запретом
  (П-004, залогодатель ≠ заёмщик), ЗАЛОГ БЕЗ ЗАПРЕТА — дефект оформления, дедлайн
  истёк → триггер high (П-005 / Д-004), override > расчётной с обоснованием (П-005),
  ЗАПРЕТ ПОДЛЕЖИТ СНЯТИЮ после погашения (П-008 / закрытый Д-007) → триггер mid,
  запрет НЕ требуется для незарегистрированного договора (П-006 / черновик Д-005),
  провал гейта на регистрации (Д-005), падение покрытия после переоценки
  (П-002 / Д-006), просроченный плановый контроль (П-007).
  Ветки положения: движимая техника-only не проходит 150%/долю ликвида (К-40 / Д-004 / П-005, Р-1);
  выданное согласие на аренду при действующем запрете (П-001, Р-4); заёмщик-банкрот →
  обследование «по договору» без авто-просрочки (П-009 / Д-009, Р-3); ухудшение с извещением —
  срок в будущем молчит (П-010) и срок истёк → взыскание (П-011) (Р-8); черновики с
  невыполненными предпосылками §5.2 — муниципальное без ОМСУ (П-012 / Д-010) и имущество супругов
  без согласия супруга (П-013 / Д-011) (Р-5); истёкший полис техники → триггер (П-002, Р-7);
  кредит под банковскую гарантию без залоговых долей — покрыт индексом обеспеченности через
  гарантию, без ложного триггера (К-95 / Д-008, Р-10/Р-11).

  ОТКРЫТО (Р-10 — согласуемые архитектурные решения; реализованы флаги/пометки, развороты
  логики подтвердить отдельно):
    • НАПРАВЛЕНИЕ OVERRIDE. Подъём залоговой ВЫШЕ расчётной трактуется как нарушение
      (коэффициент — дисконт риска/спроса, §2.1): проводится только как исключительное
      решение с пометкой «сверх дисконта — вне положения» (флаг isOverAbove / beyondDiscount).
      Полный запрет подъёма — на согласование.
    • ПАРАЛЛЕЛЬНЫЕ ФОРМЫ ОБЕСПЕЧЕНИЯ (§9–10, Прил.1 §2.3). Р-11: банковская гарантия реально
      входит в индекс обеспеченности (coverage().index = idxPledge + idxGuar, порог 100%/120%
      по валюте — guaranteeReq); прежний mirror-флаг (ok:true при одном факте наличия
      otherSecurity) снят. Поручительство остаётся справочным полем на карточке и в индекс
      НЕ входит — личное поручительство (П2) как сущность здесь не моделируется.

.topbar .menu{ color:var(--text-muted); display:flex; cursor:pointer; }
.crumb-title{ font:var(--font-page-title); color:var(--text-heading); }
.topbar .role-wrap{ margin-left:auto; display:flex; align-items:center; gap:8px; }
.topbar .role-wrap label{ font:var(--font-label); color:var(--text-muted); }
.topbar .role-wrap select{ height:32px; border-radius:var(--radius-md); border:1px solid var(--border-strong);
  background:var(--surface-card); color:var(--text-body); font:var(--font-label); padding:0 26px 0 10px;
  appearance:none; cursor:pointer; }
.topbar .role-wrap .rsel{ position:relative; display:flex; align-items:center; }
.topbar .role-wrap .rsel .caret{ position:absolute; right:8px; pointer-events:none; color:var(--text-muted); display:flex; }

.content{ flex:1; overflow:auto; display:flex; flex-direction:column; min-width:0; }
.view{ display:none; flex-direction:column; min-height:0; }

/* ---- buttons ---- */
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);
  height:var(--control-h); padding:0 14px; border:1px solid transparent; border-radius:var(--radius-md);
  font:var(--weight-semibold) var(--text-base)/1 var(--asubk-font); cursor:pointer; white-space:nowrap; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn svg{ flex:none; }
.btn-primary{ background:var(--action-primary); color:#fff; }
.btn-primary:hover:not(:disabled){ background:var(--action-primary-hover); }
.btn-secondary{ background:var(--surface-card); color:var(--text-body); border-color:var(--border-default); }
.btn-secondary:hover:not(:disabled){ background:var(--surface-hover); }
.btn-success{ background:var(--action-success); color:#fff; }
.btn-success:hover:not(:disabled){ background:var(--asubk-green-hover); }
.btn-sm{ height:32px; padding:0 10px; font-size:var(--text-sm); }
.btn-tint{ background:var(--asubk-disabled-fill); color:var(--text-link); border:none;
  font-weight:var(--weight-medium); }
.btn-tint:hover:not(:disabled){ background:rgba(25,59,103,0.10); color:var(--action-primary-hover); }
.btn-tint:disabled{ opacity:1; color:var(--text-disabled); cursor:not-allowed; }
.btn-tint.danger{ color:var(--action-danger); }
.btn-tint.danger:hover:not(:disabled){ background:var(--status-error-bg); }

.split{ position:relative; display:inline-flex; }
.split > .btn{ border-radius:0; }
.split > .btn:first-child{ border-top-left-radius:var(--radius-md); border-bottom-left-radius:var(--radius-md); }
.split > .btn.caret{ padding:0 7px; border-top-right-radius:var(--radius-md); border-bottom-right-radius:var(--radius-md);
  border-left:1px solid rgba(255,255,255,0.35); }
.split-menu{ display:none; position:absolute; top:calc(100% + 4px); left:0; min-width:210px; z-index:30;
  background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-md);
  box-shadow:0 10px 30px rgba(16,28,46,0.18); padding:4px; }
.split.open .split-menu{ display:block; }
.split-menu button{ display:block; width:100%; text-align:left; border:none; background:transparent; cursor:pointer;
  padding:8px 10px; border-radius:var(--radius-sm); font:var(--font-label); color:var(--text-body); }
.split-menu button:hover{ background:var(--surface-hover); }
.gear-btn{ width:var(--control-h); height:var(--control-h); border:none;
  background:var(--asubk-tint-fill); border-radius:var(--radius-md); color:var(--text-link); cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; }
.gear-btn:hover{ background:rgba(25,59,103,0.10); }

/* ---- list: filter head + toolbar ---- */
.filter-head{ display:flex; align-items:center; gap:6px; padding:12px 20px 4px; cursor:pointer;
  font:var(--weight-medium) var(--text-base)/1.25 var(--asubk-font); color:rgba(27,43,65,0.69); user-select:none; }
.filter-head .chev{ display:inline-flex; align-items:center; color:rgba(24,39,57,0.5); transition:transform 120ms ease; }
.filter-head.open .chev{ transform:rotate(90deg); }
.tb-actions{ display:flex; align-items:center; gap:10px; padding:8px 20px 12px; flex-wrap:wrap; }
.add-cond{ display:inline-flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer;
  color:var(--text-link); font:var(--weight-medium) var(--text-base)/1 var(--asubk-font); padding:0 4px; }
.add-cond:hover{ text-decoration:underline; }
/* ---- list: jmix-generic-filter panel (стиль стенда /loan-applicants) ---- */
.filter-head:not(.open) ~ .jf-body{ display:none; }
.jf-panel{ border:1px solid var(--border-default); border-radius:var(--radius-lg); margin:0 20px 4px;
  padding:16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:12px 24px; }
.jf-row{ display:flex; flex-direction:column; gap:4px; min-width:0; }
.jf-label{ font:var(--font-label); color:var(--text-muted);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.jf-ctl{ position:relative; display:flex; align-items:center; }
.jf-ctl input, .jf-ctl select{ flex:1; min-width:0; height:var(--control-h); border:none;
  border-radius:var(--radius-md); background:var(--surface-input); color:var(--text-body);
  font:var(--font-body); padding:0 8px; appearance:none; -webkit-appearance:none; }
.jf-ctl select{ padding-right:28px; background-repeat:no-repeat; background-position:right 6px center;
  background-size:20px 20px; cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='none' stroke='rgba(24,39,57,0.6)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>"); }
.jf-ctl input:focus, .jf-ctl select:focus{ outline:2px solid var(--border-focus); outline-offset:-2px; }
.jf-actions{ display:flex; align-items:center; gap:8px; padding:8px 20px 4px; }
.rowtools{ display:flex; align-items:center; gap:10px; padding:0 20px 8px; }
.rowtools .spacer{ flex:1; }
.pager{ display:flex; align-items:center; gap:6px; color:var(--text-muted);
  font:var(--weight-regular) var(--text-base)/1 var(--asubk-font); }
.pager button{ min-width:30px; height:30px; border:1px solid var(--border-default); background:var(--surface-card);
  border-radius:var(--radius-sm); cursor:pointer; color:var(--text-body); }
.pager button:disabled{ opacity:.4; cursor:not-allowed; }

/* ---- grid (list) ---- */
.grid-wrap{ padding:0 20px 20px; overflow:auto; }
table.grid{ width:100%; border-collapse:collapse; font:var(--font-label); table-layout:fixed;
  border:1px solid var(--border-default); background:var(--surface-card); }
table.grid thead th{ text-align:left; height:56px; padding:0 16px; background:var(--surface-card);
  border-bottom:1px solid var(--asubk-grid-line);
  font:var(--weight-medium) var(--text-sm)/1.375 var(--asubk-font); color:var(--text-body);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; user-select:none; vertical-align:middle; }
table.grid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; }
table.grid tbody td{ height:35px; padding:0 16px; border-bottom:1px solid var(--asubk-grid-line);
  color:var(--text-body); vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
table.grid tbody tr{ cursor:pointer; }
table.grid tbody tr:hover{ background:var(--surface-hover); }
table.grid tbody tr.sel{ background:var(--asubk-nav-active); }

/* Терминальный процесс — работа завершена, строка приглушена. */
.grid tbody tr.terminal td{ color:var(--text-muted); }
.grid tbody tr.terminal td:first-child{ font-style:italic; }

/* status pills in list/cells */
.pill{ display:inline-block; padding:2px 9px; border-radius:var(--radius-pill);
  font:var(--weight-medium) 12px/1.5 var(--asubk-font); white-space:nowrap; }
.pill.low{ background:var(--status-success-bg); color:var(--asubk-green); }
.pill.mid{ background:var(--status-warning-bg); color:var(--asubk-amber); }
.pill.high{ background:var(--status-error-bg); color:var(--asubk-red); }
.pill.neutral{ background:var(--asubk-tint-fill); color:var(--text-muted); }
.pill.info{ background:var(--status-info-bg); color:var(--asubk-blue); }

/* ---- view toggle: Таблица / Карточки (клон паттерна из loan-program) ---- */
.viewseg{ display:inline-flex; border:1px solid var(--border-default); border-radius:var(--radius-md);
  overflow:hidden; background:var(--surface-card); }
.viewseg-btn{ display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px; border:none;
  background:transparent; color:var(--text-muted); cursor:pointer;
  font:var(--weight-semibold) var(--text-sm)/1 var(--asubk-font); white-space:nowrap; }
.viewseg-btn + .viewseg-btn{ border-left:1px solid var(--border-default); }
.viewseg-btn svg{ flex:none; }
.viewseg-btn:hover:not(.active){ background:var(--surface-hover); color:var(--text-body); }
.viewseg-btn.active{ background:var(--action-success); color:#fff; }

/* ---- cards view (клон .pcard из loan-program) ---- */
.cards-wrap{ padding:16px 20px 20px; overflow:auto; }
.cards-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
.pcard{ position:relative; border:1px solid var(--border-default); border-radius:var(--radius-lg);
  background:var(--surface-card); padding:16px; cursor:pointer;
  transition:box-shadow 120ms ease, border-color 120ms ease; }
.pcard:hover{ box-shadow:0 2px 10px rgba(28,55,90,0.10); border-color:var(--border-strong); }
.pcard.sel{ border-color:var(--action-primary); box-shadow:0 0 0 1px var(--action-primary);
  background:var(--asubk-nav-active); }
.pcard-head{ display:flex; align-items:flex-start; gap:12px; }
.pcard-ava{ flex:none; width:40px; height:40px; border-radius:var(--radius-md); display:flex;
  align-items:center; justify-content:center; color:#fff; }
.pcard-ava svg{ width:22px; height:22px; }
.pcard-title{ flex:1; min-width:0; }
.pcard-name{ font:var(--weight-semibold) var(--text-base)/1.3 var(--asubk-font); color:var(--text-heading);
  overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.pcard-sub{ margin-top:2px; font:var(--font-label); color:var(--text-muted);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pcard-chev{ flex:none; color:var(--text-placeholder); display:flex; }
.pcard-badges{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
.pcard-fields{ margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; }
.pcard-field{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.pcard-field.span2{ grid-column:1 / -1; }
.pcard-flabel{ font:var(--weight-regular) var(--text-xs)/1.2 var(--asubk-font); color:var(--text-muted); }
.pcard-fval{ font:var(--weight-medium) var(--text-sm)/1.35 var(--asubk-font); color:var(--text-body);
  overflow:hidden; text-overflow:ellipsis; }
.cards-empty{ padding:24px; text-align:center; color:var(--text-muted); font:var(--font-label); }

/* ---- detail ---- */
.detail-tabbar-wrap{ position:relative; border-bottom:1px solid var(--border-default);
  background:var(--surface-page); flex:none; }
.detail-tabbar{ display:flex; overflow-x:auto; padding:6px 44px 0 20px; scrollbar-width:none; }
.detail-tabbar::-webkit-scrollbar{ display:none; }
.dtab{ flex:none; border:none; background:transparent; padding:11px 15px;
  font:var(--weight-medium) var(--text-base)/1 var(--asubk-font); color:var(--text-muted);
  border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; white-space:nowrap; }
.dtab:hover{ color:var(--text-body); }
.dtab.active{ color:var(--asubk-blue); border-bottom-color:var(--asubk-blue); font-weight:var(--weight-semibold); }
.tabbar-chevron{ position:absolute; right:8px; top:50%; transform:translateY(-50%); width:28px; height:28px;
  background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-md);
  display:flex; align-items:center; justify-content:center; color:var(--text-muted); cursor:pointer; }
.tabbar-chevron:hover{ background:var(--surface-hover); }

.panel-wrap{ padding:18px 20px 8px; }
.panel-card{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:20px 24px; }
.detail-panel{ display:none; }
.detail-panel.active{ display:block; }

/* ---- process header (indicator panel, not a form) ---- */
.phead{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:16px 20px; margin-bottom:18px; }
.phead-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:12px; }
.phead-name{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.phead-name .nm{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); }
.phead-name a{ font:var(--font-label); color:var(--text-link); text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.phead-name a:hover{ text-decoration:underline; }
.phead-sub{ font:var(--font-label); color:var(--text-muted); margin-top:3px; }
.phead-sub b{ color:var(--text-body); font-weight:var(--weight-medium); }
.phead-owner{ font:var(--font-label); color:var(--text-muted); white-space:nowrap; }
.phead-banner{ display:flex; align-items:center; gap:10px; border-radius:var(--radius-md);
  padding:9px 14px; margin-bottom:12px; font:var(--font-label); }
.phead-banner.warn{ background:var(--status-warning-bg); color:var(--asubk-amber); }
.phead-banner.info{ background:var(--status-info-bg); color:var(--asubk-blue); }
/* Событие (смерть, недееспособность) — уводит процесс вбок, фаза сохраняется. */
.phead-banner.danger{ background:var(--status-error-bg); color:var(--asubk-red); }
/* Запрет на отчуждение наложен — предмет защищён от продажи (зелёная строка). */
.phead-banner.ok{ background:var(--status-success-bg); color:var(--asubk-green); }
.phead-banner svg{ flex:none; }
.phead-dims{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media(max-width:760px){ .phead-dims{ grid-template-columns:repeat(2,1fr); } }
.dim{ background:var(--surface-panel); border-radius:var(--radius-md); padding:10px 14px; }
.dim .dl{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-muted); margin-bottom:5px; }
.dim .dv{ font:var(--weight-semibold) 16px/1.2 var(--asubk-font); color:var(--text-heading); }
.dim .src{ font:var(--weight-regular) 11px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:4px; }

/* two-column form (label above) */
.f2{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; max-width:1500px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field .flabel{ font:var(--font-label); color:var(--text-muted); }
.field.col-span{ grid-column:1 / -1; }
.control{ position:relative; display:flex; align-items:center; }
.control input, .control select, .note-area{ width:100%; height:var(--control-h); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); font-weight:var(--weight-medium);
  border:1px solid var(--border-strong); outline:none; padding:0 var(--space-2);
  transition:box-shadow 120ms ease, border-color 120ms ease; }
.control select{ cursor:pointer; appearance:none; padding-right:30px; }
.control input:focus, .control select:focus, .note-area:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); }
.control input[readonly], .ro input, .ro .note-area{ background:var(--surface-input); color:var(--text-muted); border:1px solid transparent; cursor:default; }
.control input[readonly]:focus{ border-color:transparent; box-shadow:none; }
.grey input, .grey select{ background:var(--surface-input); border-color:transparent; }
.control .cal, .control .caret{ position:absolute; right:9px; pointer-events:none; color:var(--text-muted); display:flex; }
.note-area{ height:auto; min-height:80px; padding:10px 12px; resize:vertical; line-height:1.5; }
.dtpair{ display:grid; grid-template-columns:1fr 1fr; gap:0 10px; }

/* lookup (picker) */
.lookup{ display:flex; align-items:center; height:var(--control-h); background:var(--surface-input);
  border-radius:var(--radius-md); border:1px solid transparent; padding-left:var(--space-2); }
.lookup .val{ flex:1; font:var(--font-body); font-weight:var(--weight-medium); color:var(--text-body);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lookup .val.ph{ color:var(--text-placeholder); }
.lookup button{ display:inline-flex; align-items:center; justify-content:center; width:32px; height:var(--control-h);
  border:none; background:transparent; color:var(--text-link); cursor:pointer; }
.lookup .pick{ font-weight:var(--weight-bold); letter-spacing:1px; }
.lookup .clr{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); font-size:13px;
  width:28px; height:var(--control-h); }
.lookup .clr:hover{ color:var(--text-body); }

/* ── online-system entity picker (клон живого Jmix ••• entity-browser) ── */
.picker-bar{ display:flex; align-items:center; gap:10px; margin:6px 0 12px; }
.picker-search{ flex:1; height:34px; border:1px solid var(--border-default); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); padding:0 12px; }
.picker-search:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); outline:none; }
.lk-table-wrap{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:auto; max-height:360px; }
table.lk-table{ width:100%; border-collapse:collapse; font:var(--font-body); white-space:nowrap; }
table.lk-table thead th{ position:sticky; top:0; background:var(--surface-panel); text-align:left; z-index:1;
  font:var(--weight-semibold) var(--text-sm)/1.35 var(--asubk-font); color:var(--text-muted);
  padding:9px 12px; border-bottom:1px solid var(--border-default); }
table.lk-table tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default); color:var(--text-body); }
table.lk-table tbody tr{ cursor:pointer; }
table.lk-table tbody tr:hover{ background:var(--surface-hover); }
table.lk-table tbody tr.sel{ background:var(--asubk-nav-active); }
table.lk-table tbody tr:last-child td{ border-bottom:none; }
.lk-empty{ padding:22px 12px; text-align:center; color:var(--text-placeholder); font:var(--font-label); }

/* section heading + toolbar above collection grid */
.section-h{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); margin:0 0 6px; }
.section-note{ font:var(--font-label); color:var(--text-muted); margin:0 0 14px; max-width:900px; }
.gtoolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.gtoolbar .spacer{ flex:1; }

/* collection grid */
.cgrid-wrap{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:auto; min-height:80px; }
table.cgrid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
table.cgrid thead th{ position:sticky; top:0; text-align:left; padding:10px 12px; background:var(--surface-card);
  border-bottom:1px solid var(--border-default); font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font);
  color:var(--text-heading); cursor:pointer; user-select:none; }
table.cgrid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; font-weight:400; }
table.cgrid tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default); color:var(--text-body); vertical-align:middle; }
table.cgrid tbody tr:hover{ background:var(--surface-hover); }
table.cgrid tbody tr.total td{ font-weight:var(--weight-bold); color:var(--text-heading);
  background:var(--surface-hover); border-top:1px solid var(--border-strong); }
.cgrid-empty{ display:flex; align-items:center; justify-content:center; min-height:120px;
  color:var(--text-placeholder); font:var(--font-label); }
.rowlink{ color:var(--text-link); cursor:pointer; }
.rowlink:hover{ text-decoration:underline; }

/* timeline (phase machine indicator) */
.timeline{ display:flex; flex-wrap:wrap; gap:0; margin:2px 0 20px; }
.tl-step{ display:flex; align-items:center; gap:8px; padding:6px 0; }
.tl-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font:var(--weight-bold) 12px/1 var(--asubk-font); flex:none; }
.tl-dot.done{ background:var(--asubk-green); color:#fff; }
.tl-dot.cur{ background:var(--asubk-blue); color:#fff; }
.tl-dot.todo{ background:var(--surface-input); color:var(--text-placeholder); }
.tl-lbl{ font:var(--font-label); color:var(--text-body); }
.tl-lbl.todo{ color:var(--text-placeholder); }
.tl-arrow{ color:var(--text-placeholder); margin:0 12px; display:flex; }

/* history rows */
.hist{ border-left:2px solid var(--border-strong); margin-left:6px; padding-left:0; }
.hrow{ position:relative; padding:10px 0 10px 22px; border-bottom:1px solid var(--asubk-grid-line); }
.hrow::before{ content:""; position:absolute; left:-5px; top:16px; width:8px; height:8px; border-radius:50%;
  background:var(--asubk-blue); }
.hrow .hwhen{ font:var(--weight-medium) 13px/1.3 var(--asubk-font); color:var(--text-muted); }
.hrow .hwhat{ font:var(--font-label); color:var(--text-body); margin-top:2px; }
.hrow .hwho{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:2px; }

/* footer */
.footer{ position:sticky; bottom:0; background:var(--surface-page); border-top:1px solid var(--border-default);
  padding:14px 20px; display:flex; align-items:center; gap:12px; }

/* Мера без подтверждения вручения не считается исполненной — она не годится

/* Мягкое предупреждение о пересечении охвата — не запрет. */

<script>
/* ============================================================
   SIDEBAR NAVIGATION
   ============================================================ */
const TREE = [
  { id:"k", label:"Система кредитования", subs:[
    { id:"k-app", label:"Заявки и комиссии", items:[ {label:"Заявки"}, {label:"Комиссии по заявкам"} ]},
    { id:"k-prog", label:"Программы и решения", items:[ {label:"Решение правительства"}, {label:"Кредитные программы"} ]},
    { id:"k-borr", label:"Заёмщики", items:[ {label:"Заёмщики"} ]},
    { id:"k-loan", label:"Кредиты и транши", items:[ {label:"Кредиты"}, {label:"Список траншей"} ]} ]},
  { id:"z", label:"Залоговое обеспечение", open:true, subs:[
    { id:"z-all", headerless:true, items:[
      { label:"Предметы залога", active:true },
      { label:"Залоговые договоры" },
      { label:"Мониторинг залога" },
      { label:"Регламентные параметры залога" } ]} ]},
  { id:"debt", label:"Взыскание задолженности", subs:[
    { id:"debt-all", headerless:true, items:[ {label:"Процессы взыскания"} ]} ]},
  { id:"d", label:"Справочники", subs:[ { id:"d-all", headerless:true, items:[ {label:"Справочники"} ]} ]},
  { id:"r", label:"Отчёты", subs:[ { id:"r-all", headerless:true, items:[ {label:"Отчёты"} ]} ]},
  { id:"adm", label:"Администрирование", subs:[ { id:"adm-all", headerless:true, items:[ {label:"Администрирование"} ]} ]},
  { id:"sec", label:"Безопасность", subs:[ { id:"sec-all", headerless:true, items:[ {label:"Безопасность"} ]} ]},
];
const chev = s => `<span class="chev"><svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>`;
function renderNav(){
  document.getElementById('nav').innerHTML = TREE.map(g=>{
    const subs = (g.subs||[]).map(s=>{
      const items = (s.items||[]).map(it=>`<a class="nav-item${s.headerless?' headerless':''}${it.active?' active':''}" onclick="navClick('${it.label}')">${it.label}</a>`).join('');
      if(s.headerless) return `<div class="nav-children" style="display:block">${items}</div>`;
      return `<div class="nav-sub${s.open?' open':''}"><button class="nav-toggle" onclick="this.parentNode.classList.toggle('open')">${chev(13)}<span class="lbl">${s.label}</span></button><div class="nav-children">${items}</div></div>`;
    }).join('');
    return `<div class="nav-group${g.open?' open':''}"><button class="nav-toggle" onclick="this.parentNode.classList.toggle('open')">${chev(14)}<span class="lbl">${g.label}</span></button><div class="nav-children">${subs}</div></div>`;
  }).join('');
}
function navClick(l){
  if(l==='Предметы залога'){ reg='items'; showView('list'); renderList(); }
  else if(l==='Залоговые договоры'){ reg='contracts'; showView('list'); renderList(); }
  else if(l==='Мониторинг залога'){ reg='monitor'; showView('list'); renderList(); }
  else if(l==='Регламентные параметры залога'){ showView('refbook'); renderRefbook(); }
  else toast('Демо-прототип: доступен раздел «Залоговое обеспечение»');
  document.querySelectorAll('.nav-item').forEach(a=>a.classList.toggle('active', a.textContent===l));
}

/* ============================================================
   ДАТЫ И ЧИСЛА
   Сегодняшняя дата вынесена в константу: все «просрочки контроля» —
   ВЫЧИСЛЯЕМЫЙ оверлей от неё, а не хранимый флаг.
   ============================================================ */
const TODAY = '11.07.2026';
const d2n = s => { const [d,m,y] = String(s).split('.').map(Number); return new Date(y, m-1, d); };
const n2d = dt => `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
const addMonths = (s,m) => { const dt = d2n(s); dt.setMonth(dt.getMonth()+m); return n2d(dt); };
const isOverdue = s => s && d2n(s) < d2n(TODAY);
const daysLeft  = s => Math.round((d2n(s) - d2n(TODAY)) / 86400000);
const isDate = s => /^\d{2}\.\d{2}\.\d{4}$/.test(String(s||'').trim());
/* Мост «дд.мм.гггг» ↔ ISO «гггг-мм-дд» для нативного <input type="date">.
   Хранение и вывод остаются в дд.мм.гггг — конвертация только на границе поля. */
const d2iso = s => { s = String(s||'').trim(); if(!isDate(s)) return ''; const [d,m,y] = s.split('.'); return `${y}-${m}-${d}`; };
const iso2d = s => { const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(s||'').trim()); return m ? `${m[3]}.${m[2]}.${m[1]}` : String(s||'').trim(); };
const fmt  = n => Number(n||0).toLocaleString('ru-RU', {minimumFractionDigits:2, maximumFractionDigits:2});
const num  = s => { const v = Number(String(s??'').replace(/\s/g,'').replace(',','.')); return isFinite(v) ? v : NaN; };
const pct  = x => (x*100).toFixed(1).replace('.',',') + '%';
const esc  = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ============================================================
   СПРАВОЧНИК (регламентируемый администратором): по виду залога —
   залоговый коэффициент (дисконт ликвидности) И интервалы планового
   контроля. Один справочник, не два — обследование и переоценка имеют
   разные события, но ОДИН механизм расписания (спека §8).
   ============================================================ */
/* Признаки вида залога (Р-1/Р-2/Р-6 — Положение §2.3–2.4, §3.5, §8):
   liquid — ликвидный вид (недвижимость, кредитный портфель) → базовый порог покрытия 120%;
            неликвидные движимые → 150% + доля ликвида ≥ 80% (см. requiredCover / liquidShare).
   movable — движимое имущество (техника, ТМЦ). На этот признак смотрят: гейт возраста и
            страховки техники (Р-7), матрица периодичности обследования (Р-3), стоп-лист §3.5 (Р-2).
   liquidityRank — ранг ликвидности для гейта замены (Р-6, §8): замена ликвидного залога на
            менее ликвидный не допускается. Числовая шкала, правится администратором в справочнике.
   Периодичность ОБСЛЕДОВАНИЯ здесь НЕ хранится — она в SURVEY_MATRIX (группа
   платёжеспособности × движимость, Прил.2 §2.3). reval — интервал ПЕРЕОЦЕНКИ —
   положением НЕ регламентирован: это внутренний параметр (Р-3 п.5), не смешивать с обследованием.
   «Кредитный портфель» — ликвидный вид залога в справочнике (liquid:true, П1 §2.3).
   tech — физически изнашиваемая техника (транспорт/оборудование/сельхозтехника): на этот
   признак смотрит гейт формы «Год выпуска»/«Страховой полис» (Р-7, isTech). Он у́же, чем
   movable — «Кредитный портфель», «Ценные бумаги», «Право аренды» тоже движимые (Р-6, гейт
   замены), но не физический актив, который стареет и страхуется. */
const KINDS = {
  'Недвижимое имущество':  { k:0.7, reval:24, organ:'Госрегистр (недвижимое имущество)', liquid:true,  movable:false, liquidityRank:5 },
  'Транспортное средство': { k:0.5, reval:12, organ:'ГРС (реестр транспортных средств)', liquid:false, movable:true,  liquidityRank:3, tech:true },
  'Оборудование':          { k:0.5, reval:12, organ:'Реестр залогов движимого имущества', liquid:false, movable:true,  liquidityRank:3, tech:true },
  'Сельхозтехника':        { k:0.5, reval:12, organ:'Реестр залогов движимого имущества', liquid:false, movable:true,  liquidityRank:3, tech:true },
  'Товары в обороте':      { k:0.4, reval:6,  organ:'Реестр залогов движимого имущества', liquid:false, movable:true,  liquidityRank:1 },
  /* «Скот / поголовье» удалён — §3.5 прямо запрещает приём в залог с/х животных (Р-2, PROHIBITED_KINDS). */
  'Кредитный портфель':         { k:0.7, reval:12, organ:'Единый гос. реестр прав требования на движимое имущество', liquid:true,  movable:true,  liquidityRank:5 },
  'Имущественный комплекс':     { k:0.7, reval:24, organ:'Госрегистр (недвижимое имущество)', liquid:true,  movable:false, liquidityRank:5 },
  'Незавершённое строительство':{ k:0.6, reval:24, organ:'Госрегистр (недвижимое имущество)', liquid:true,  movable:false, liquidityRank:4 },
  'Ценные бумаги':              { k:0.5, reval:12, organ:'Реестр залогов движимого имущества', liquid:false, movable:true,  liquidityRank:4 },

   стоп-листа проставляет реализующую валидацию. Применяется дважды: при приёме предмета
   (saveNewItem) и повторно на гейте регистрации залогового договора (openRegister/doRegister),
   т.к. предмет мог быть принят до Р-18 либо его состояние могло измениться между приёмом
   и регистрацией. Земля с/х назначения и износ ≥ предела — жёсткие отказы без права
   комитета на допуск (committeeCanOverride:false); прочие пункты блокируют без этого поля. */
let WEAR_LIMIT = 70;
function stopListCheck(f){
  if (f.landPurpose === 'сельскохозяйственного назначения')
    return { block:true, committeeCanOverride:false, msg:'Приём отклонён (П1 §3.5, Закон КР «О залоге» п.3 ст.6): земли сельскохозяйственного назначения в залог не принимаются.' };
  if (typeof f.wearPct === 'number' && f.wearPct >= WEAR_LIMIT)
    return { block:true, committeeCanOverride:false, msg:`Приём отклонён (П1 §3.5): физический износ ${f.wearPct}% при пределе ${WEAR_LIMIT}%.` };
  if (f.morallyObsolete === true) return { block:true, msg:'Приём отклонён (П1 §3.5): морально устаревшее оборудование.' };
  if (f.circulable === false) return { block:true, msg:'Приём отклонён (П1 §3.5): имущество изъято/ограничено в обороте.' };
  // ТМЦ — три флага; каждый снятый блокирует с цитатой пункта
  if (f.perishable === true)     return { block:true, msg:'Приём отклонён (П1 §3.5): скоропортящиеся товары.' };
  if (f.lowDemand === true)      return { block:true, msg:'Приём отклонён (П1 §3.5): товарно-материальные ценности, не пользующиеся спросом.' };
  if (f.singleNameBulk === true) return { block:true, msg:'Приём отклонён (П1 §3.5): товары одного наименования в большом количестве.' };
  return { block:false };
}
/* Обратное отображение: сохранённый предмет реестра → форма stopListCheck. Единый источник
   истины для saveNewItem (приём) и гейта регистрации (повторная проверка). Предметы, заведённые
   до Р-18 (сид-данные), не несут этих полей — отсутствующее поле возвращается как undefined,
   а не как блокирующее значение, поэтому такие предметы гейт НЕ блокирует (см. guard'ы
   === true / === false / typeof в stopListCheck). */
function stopFieldsOf(it){
  return {
    landPurpose: it.landPurpose, wearPct: it.wearPct, morallyObsolete: it.morallyObsolete,
    circulable: it.circulable, perishable: it.perishable, lowDemand: it.lowDemand,
    singleNameBulk: it.singleNameBulk,
  };
}

/* Р-16 (ПОЛ §6.4 п.7): способ хранения предмета залога — обязательное поле формы
   регистрации (openRegister/doRegister). Допустимы только два значения; предмет либо
   остаётся у залогодателя (обычный режим обследования), либо передаётся залогодержателю
   (интервал обследования не применяется — см. openRegister). */
function custodyValid(v){ return v === 'у залогодателя' || v === 'у залогодержателя'; }
/* Р-16 (ПОЛ §6.4 п.6): предмет залога «Право аренды» — срок аренды должен покрывать срок
   кредита, иначе по окончании аренды обеспечение выбывает раньше погашения. Даты парсятся
   тем же d2n, что и везде в файле (единственный парсер дат в кодовой базе — своего
   parseDate здесь нет). Если хотя бы одна дата отсутствует/не парсится — сравнивать не с
   чем, предупреждение не показывается (в сидовых данных КРЕДИТ вообще не несёт срока
   погашения — см. CREDITS ниже; это осознанно, не баг). */
function leaseCoversCredit(item, credit){
  const lt = item && item.leaseTill ? d2n(item.leaseTill) : null;
  const ct = credit && credit.creditTill ? d2n(credit.creditTill) : null;
  if(!lt || isNaN(lt) || !ct || isNaN(ct)) return { warn:false };
  const covers = lt >= ct;
  return covers ? { warn:false } : { warn:true, msg:'Срок аренды истекает раньше срока кредита (ПОЛ §6.4 п.6) — требуется решение комитета' };
}

/* КЛАССИФИКАТОР ИСХОДА ОБСЛЕДОВАНИЯ (6 значений, дословно из прежней системы,
   04-collateral.md §10). effect ветвит модель: ok → плановый сдвиг; reval → досрочная
   переоценка (needReval); lost → утрата (залоговая = 0). */
const SURVEY_RESULTS = [
  { v:'Хорошее',                                effect:'ok'   },
  { v:'Удовлетворительное',                     effect:'ok'   },
  { v:'Неудовлетворительное (повреждённое)',    effect:'reval'},
  { v:'Неудовлетворительное (требует ремонта)', effect:'reval'},
  { v:'Неудовлетворительное (аварийное)',       effect:'reval'},
  { v:'Неудовлетворительное (утраченное)',      effect:'lost' },
];
/* effect по строке исхода — принимает и новые 6 значений, и старые демо-строки
   («в норме» / «ухудшение состояния» / «утрата / не найден»). */
const surveyEffect = out => {
  const hit = SURVEY_RESULTS.find(r=>r.v===out); if(hit) return hit.effect;
  if(out==='в норме') return 'ok';
  if(out==='утрата / не найден') return 'lost';
  return 'reval';
};

/* Р-15 (П2 §2.4): акт обследования — валидный гейт сохранения. Заключение и
   фотофиксация (§2.3) обязательны всегда; при одностороннем акте — подтверждённое
   наличие имущества, иначе — подписи представителя ГФХ и залогодателя. */
function surveyValidate(a){
  if (!a.conclusion || !a.conclusion.trim()) return { ok:false, msg:'Заключение обязательно (П2 §2.4)' };
  if (!a.photos || !a.photos.length) return { ok:false, msg:'Фотофиксация обязательна (П2 §2.3)' };
  if (a.oneSided) { if (!a.presenceConfirmed) return { ok:false, msg:'Односторонний акт допустим только при подтверждённом наличии имущества (П2 §2.4)' }; }
  else { const s = a.signers||[]; if (!(s.includes('ГФХ') && s.includes('залогодатель'))) return { ok:false, msg:'Требуются подписи представителя ГФХ и залогодателя (П2 §2.4)' }; }
  return { ok:true };
}

function normalizeItem(it){
  const d = ITEM_DEMO[it.id] || {};
  it.pledgerType   = it.pledgerType   || d.pledgerType || 'Прочее ЮЛ';
  it.consents      = it.consents      || d.consents || [];
  it.restoreNotice = it.restoreNotice ?? d.restoreNotice ?? null;
  it.qty      = it.qty      ?? d.qty ?? 1;                 // кол-во (legacy quantity)
  it.unit     = it.unit     || d.unit || 'ед.';            // ед.изм. (legacy quantityType)
  it.legalDoc = it.legalDoc || d.legalDoc || '';           // правоуст. документ (отдельно от отчёта оценщика)
  it.details  = it.details  || d.details || {};            // type-specific детали (KIND_FIELDS)
  it.files    = it.files    || d.files || [];              // вложения/сканы
  if(isTech(it)){
    it.year   = it.year   ?? d.year ?? null;
    it.origin = it.origin || d.origin || 'СНГ';
    it.insured= it.insured|| d.insured || { present:false, policy:'', till:'' };
  }
  /* Р-17: роль обеспечения (основной/дополнительный) — только для движимых видов, кроме
     «Товары в обороте» (та же граница, что и у формы приёма, см. niKindChange/saveNewItem). */
  if(isMovable(it) && it.kind !== 'Товары в обороте') it.securityRole = it.securityRole || 'основной';
  if(!it.prereqs){
    const absent = new Set(d.prereqAbsent || []);
    const mk = key => ({ present: !absent.has(key), doc: absent.has(key) ? '' : 'приложено при оформлении' });
    it.prereqs = { ownerConsent:mk('ownerConsent'), spouseConsent:mk('spouseConsent'), encumbranceCert:mk('encumbranceCert') };
  }
  return it;
}
ITEMS.forEach(normalizeItem);

const isActive  = c => c.status === ACTIVE;
const isDraftish = c => c.status === 'Оформляется' || c.status === 'На рассмотрении комиссии';

/* Контекст расчёта: действующие договоры + (опционально) один виртуальный
   (проверяемый черновик либо договор с применённым пакетом доп соглашения). */
function ctx(virtual){
  const base = CONTRACTS.filter(c => isActive(c) && (!virtual || c.id !== virtual.id));
  return virtual ? [...base, virtual] : base;
}
/* Отнесено по предмету внутри контекста. */
const allocatedIn = (cs, itemId) =>
  cs.reduce((s,c)=> s + c.allocs.filter(a=>a.item===itemId).reduce((t,a)=>t+a.share,0), 0);

/* Юридически обременено (действующие) + предварительно занято черновиками —
   чтобы одну и ту же стоимость не пообещали дважды ещё на этапе оформления. */
const allocatedLegal = itemId => allocatedIn(CONTRACTS.filter(isActive), itemId);
const allocatedDraft = itemId => allocatedIn(CONTRACTS.filter(isDraftish), itemId);
const availableOf    = it => Math.max(0, pledgeValue(it) - allocatedLegal(it.id) - allocatedDraft(it.id));

/* ЭФФЕКТИВНАЯ ДОЛЯ. Юридическая доля в нотариальном договоре статична и от платежей
   не усыхает (§4.2). Но если переоценка уронила залоговую ниже суммы закреплённых
   долей — покрытие не может опираться на несуществующую стоимость: доли усекаются
   ПРОПОРЦИОНАЛЬНО. Договор при этом не правится; падение покрытия поднимает триггер. */
function effShare(cs, itemId, share){
  const it = item(itemId); if(!it || it.lost) return 0;
  const pv = pledgeValue(it), tot = allocatedIn(cs, itemId);
  return tot <= pv ? share : share * (pv / tot);
}
/* ПОРОГ ПОКРЫТИЯ ЗАЛОГОМ — ФУНКЦИЯ состава обеспечения кредита (Р-1, Прил.1 §2.3–2.4), не
   константа. Если в покрытие входит хоть один движимый неликвидный предмет → 150%, иначе →
   120%. Порог банковской гарантии (100/120% по валюте) — отдельная функция guaranteeReq()
   ниже; обе величины комбинируются в coverage().index (Р-11). */
function creditItems(cs, creditId){
  const ids = new Set();
  cs.forEach(c => c.allocs.filter(a=>a.credit===creditId).forEach(a=>ids.add(a.item)));
  return [...ids].map(item);
}
function requiredCover(creditId, cs){
  const cr = credit(creditId);
  if (cr && cr.kmDecision) return { req: cr.kmDecision.coverPct/100,
    source: 'решение КМ ' + cr.kmDecision.no + ' от ' + cr.kmDecision.date + ' (П1 §2.6)' };
  const hasMovableIlliquid = creditItems(cs, creditId).some(it => isMovable(it) && !isLiquid(it));
  return hasMovableIlliquid
    ? { req: COVER_MOVABLE, source: 'П1 §2.4 (движимый неликвидный залог)' }
    : { req: COVER_LIQUID,  source: 'П1 §2.3 (ликвидный залог)' };
}
/* Доля ЛИКВИДНОГО залога в сумме кредита (Р-1 п.3). Применяется только когда порог = 150%
   (в покрытии есть движимый неликвидный предмет): тогда доля ликвида должна быть ≥ 80%. */
const liquidShareApplies = (creditId, cs) => requiredCover(creditId, cs).req === COVER_MOVABLE;
function liquidShare(creditId, cs){
  const cr = credit(creditId);
  const liq = cs.reduce((s,c)=> s + c.allocs.filter(a=>a.credit===creditId)
                 .reduce((t,a)=> t + (isLiquid(item(a.item)) ? effShare(cs, a.item, a.share) : 0), 0), 0);
  return cr.amount ? liq/cr.amount : 1;
}
/* БАНКОВСКАЯ ГАРАНТИЯ (§9–10, Прил.1 §2.3, Р-11). Порог зависит от валюты гарантии
   относительно валюты кредита: та же валюта → 100%, иная → 120% (курсовой запас).
   Отсутствие currency на кредите/гарантии трактуется как 'KGS'. Не банковская гарантия
   (напр. поручительство) либо отсутствие otherSecurity → null (в индекс не входит). */
function guaranteeReq(cr){
  const g = cr && cr.otherSecurity;
  if(!g || g.type !== 'банковская гарантия') return null;
  const cc = cr.currency || 'KGS', gc = g.currency || 'KGS';
  return gc === cc ? COVER_GUARANTEE : COVER_GUARANTEE_FX;
}
/* Гарантия истекла — сравнение till с TODAY (мокап-дата, см. d2n/TODAY выше).
   Гарантия без till (не заполнена) не считается истёкшей. */
function guaranteeExpired(g){
  return g && g.till ? d2n(g.till) < d2n(TODAY) : false;
}
/* Покрытие кредита = ИНДЕКС обеспеченности (Р-11, §9–10, Прил.1 §2.3–2.4):
     index = idxPledge (Σ эффективных отнесённых долей залога ÷ (сумма кредита × её порог))
           + idxGuar   (сумма действующей банковской гарантии ÷ (сумма кредита × её порог)).
   Обеспечен, когда index ≥ 1 И (если применим) доля ликвида в залоговой части ≥ 80%
   (liqOk — подпункт того же гейта, не новый статус). Просроченная гарантия (till < TODAY)
   в idxGuar не участвует (guaranteeExpired). Поручительство в индекс НЕ входит — остаётся
   справочным полем `other` на карточке. */
function coverage(cs, creditId){
  const cr = credit(creditId);
  const other = creditOther(creditId);
  const sum = cs.reduce((s,c)=> s + c.allocs.filter(a=>a.credit===creditId)
                 .reduce((t,a)=> t + effShare(cs, a.item, a.share), 0), 0);
  const { req, source } = requiredCover(creditId, cs);
  const ratio = cr.amount ? sum/cr.amount : 0;
  const covOk = cr.amount ? ratio >= req : true;
  const liqApplies = liquidShareApplies(creditId, cs);
  const liqShare = liqApplies ? liquidShare(creditId, cs) : null;
  const liqOk = liqApplies ? liqShare >= LIQUID_SHARE_MIN - 1e-9 : true;
  const secPledge = sum;
  const idxPledge = cr.amount ? secPledge / (cr.amount * req) : 0;
  let idxGuar = 0, gReq = null;
  if (other && other.type === 'банковская гарантия' && !guaranteeExpired(other)) {
    gReq = guaranteeReq(cr);
    idxGuar = cr.amount ? (other.amount || 0) / (cr.amount * gReq) : 0;
  }
  const index = idxPledge + idxGuar;
  return { sum, amount: cr.amount, ratio, req, source, covOk, liqOk, liqApplies, liqShare, other,
           secPledge, idxPledge, idxGuar, gReq, index,
           ok: (index >= 1) && liqOk };
}
/* ГЕЙТ §2.6 (Р-13, П1 §2.6): заёмщик под категорией, чья обеспеченность устанавливается
   решением Кабинета Министров, — регистрация ЗАБЛОКИРОВАНА, пока решение не внесено на
   кредит (borrowerCategory задана, kmDecision — нет). Как только kmDecision внесено, гейт
   снят; requiredCover() выше уже читает kmDecision.coverPct для самого расчёта порога —
   этот предикат отвечает только за допуск к регистрации, не дублирует ту арифметику. */
function kmGateBlocked(cr){ return Boolean(cr.borrowerCategory) && !cr.kmDecision; }
/* ГЕЙТ покрытия — один код на два места: регистрация договора и регистрация доп соглашения.
   Порог у каждого кредита свой (requiredCover); доля ликвида — подпункт того же гейта. */
function gateCheck(virtual){
  const cs = ctx(virtual);
  const rows = virtual.credits.map(id => ({ id, ...coverage(cs, id) }));
  return { rows, ok: rows.every(r=>r.ok) };
}
/* ИНВАРИАНТ: Σ долей предмета ≤ залоговая стоимость. Проверяется до сохранения. */
function invariantBreaches(virtual){
  const cs = [...CONTRACTS.filter(c => (isActive(c)||isDraftish(c)) && c.id !== virtual.id), virtual];
  const ids = [...new Set(virtual.allocs.map(a=>a.item))];
  return ids.map(id => ({ id, alloc: allocatedIn(cs, id), pledge: pledgeValue(item(id)) }))
            .filter(x => x.alloc > x.pledge + 0.005);
}

/* Залоговая ось статуса предмета — ПРОИЗВОДНАЯ от наличия долей (не поле). */
function lienStatus(it){
  if(it.lost) return 'выбыл';
  if(it.realizing) return 'реализуется';
  if(allocatedLegal(it.id) > 0) return 'в залоге';
  if(allocatedDraft(it.id) > 0) return 'резервируется';
  return it.everPledged ? 'освобождён' : 'свободен';
}
const lienCls = s => s==='в залоге' ? 'info' : s==='реализуется' ? 'mid' : s==='выбыл' ? 'high' : 'neutral';

/* ============================================================
   ОСЬ ЗАПРЕТА НА ОТЧУЖДЕНИЕ — НАШ ШАГ ОФОРМЛЕНИЯ, не внешнее событие.
   Порядок: договор удостоверяется у нотариуса → мы САМИ накладываем запрет
   на отчуждение предмета в регистрирующем органе, чтобы залогодатель не продал
   заложенное имущество без нашего ведома. Запрет — на ВЕЩЬ (один на предмет),
   при перезалоге дополняется основанием, а не накладывается заново. Снимается,
   когда предмет перестал обеспечивать кредит (гейт: живые доли ⇒ снять нельзя).
   Ось запрета НЕЗАВИСИМА от залоговой оси: «в залоге» + «запрет не наложен»
   — это и есть дефект оформления (дыра в обеспечении), а не норма.
   ============================================================ */
/* Дедлайн наложения: нотариальная дата САМОГО РАННЕГО зарегистрированного
   договора, обременяющего предмет, + BAN_DEADLINE_DAYS рабочих дней. */
function banDeadline(it){
  const cs = CONTRACTS.filter(c => isActive(c) && c.allocs.some(a=>a.item===it.id) && isDate(c.notaryDate));
  if(!cs.length) return null;
  const earliest = cs.map(c=>c.notaryDate).sort((a,b)=>d2n(a)-d2n(b))[0];
  return addBusinessDays(earliest, BAN_DEADLINE_DAYS);
}
/* Зарегистрированные договоры, обременяющие предмет — основания запрета. */
const banContracts = it => CONTRACTS.filter(c => isActive(c) && c.allocs.some(a=>a.item===it.id)).map(c=>c.id);
const banRequired = it => allocatedLegal(it.id) > 0;                 // запрет обязан быть
const banMissing  = it => banRequired(it) && !it.ban;               // ДЕФЕКТ ОФОРМЛЕНИЯ
const banOverdue  = it => banMissing(it) && isOverdue(banDeadline(it));
const banStale    = it => Boolean(it.ban) && allocatedLegal(it.id) === 0;  // подлежит снятию
function banStatus(it){
  if(it.ban) return allocatedLegal(it.id) === 0 ? 'подлежит снятию' : 'наложен';
  if(!banRequired(it)) return 'не требуется';
  return banOverdue(it) ? 'просрочен' : 'не наложен';
}
/* Единственный источник пилюли запрета в списках и карточках. */
function banPill(it){
  const s = banStatus(it);
  if(s==='наложен')          return '<span class="pill low">запрет наложен</span>';
  if(s==='не наложен')       return `<span class="pill mid">запрет не наложен · до ${banDeadline(it)}</span>`;
  if(s==='просрочен')        return '<span class="pill high">ЗАПРЕТ НЕ НАЛОЖЕН</span>';
  if(s==='подлежит снятию')  return '<span class="pill mid">подлежит снятию</span>';
  return '<span class="pill neutral">—</span>';
}

/* ПЛАНОВЫЙ КОНТРОЛЬ — вычисляемый оверлей по датам, не статус.
   Периодичность ОБСЛЕДОВАНИЯ (Р-3, Прил.2 §2.3) — по матрице «группа платёжеспособности ×
   движимость», где группа резолвится ОТ ЗАЁМЩИКОВ обеспечиваемых кредитов (залогодатель
   может быть третьим лицом). При нескольких группах — строжайшая (наименьший интервал, worst-of).
   Переоценка (nextReval) — интервал НЕ из положения: внутренний параметр (Р-3 п.5). */
const movableOf = it => isMovable(it);
const surveyInterval = (group, movable) => { const r = SURVEY_MATRIX[group]; if(!r) return undefined;
  return movable ? r.movable : r.immovable; };
/* Группа платёжеспособности предмета: worst-of по заёмщикам зарегистрированных договоров.
   → { group, interval, bankrupt } либо null, если предмет никого не обеспечивает. */
function borrowerSolvency(it){
  const inns = new Set();
  CONTRACTS.filter(c => isActive(c) && c.allocs.some(a=>a.item===it.id))
           .forEach(c => c.credits.forEach(id => inns.add(credit(id).inn)));
  const groups = [...new Set([...inns].map(solvencyOf).filter(Boolean))];
  if(!groups.length) return null;
  const mv = movableOf(it);
  const numeric = groups.filter(g => surveyInterval(g, mv) != null);
  if(!numeric.length) return { group: groups[0], interval: null, bankrupt: true };  // все заёмщики — банкроты
  let best = numeric[0];
  numeric.forEach(g => { if(surveyInterval(g, mv) < surveyInterval(best, mv)) best = g; });
  return { group: best, interval: surveyInterval(best, mv), bankrupt: false };
}

/* Р-22 (ПОР п.10): ужесточение периодичности обследования по категории риска — слой
   ПОВЕРХ матрицы платёжеспособности (Прил.2 §2.3), а не замена ей. Действует только
   при согласовании зампреда (RISK_TIGHTENING_APPROVAL.approved) — иначе используется
   чистая матрица. Нижний предел SURVEY_MIN_MONTHS не даёт ужесточению уйти в абсурд
   (напр. банкрот исключён отдельно: effectiveInterval возвращает undefined). */
let RISK_TIGHTENING   = { 'Низкий':1.0, 'Средний':0.5, 'Высокий':0.25 }; // ПОР п.10 — ужесточение периодичности по категории риска
let SURVEY_MIN_MONTHS = 3;                                               // нижний предел интервала после ужесточения
let RISK_TIGHTENING_APPROVAL = { approved:true, req:'СЗ зампреда №СЗ-2026/07 от 09.07.2026', date:'09.07.2026' }; // ПОР п.10: ужесточение — с согласования зампреда
function effectiveInterval(group, movable, riskCat, approval){
  const base = surveyInterval(group, movable);
  if (base == null) return undefined;               // банкрот (null) / неизвестная группа (undefined) — оба через `==`
  if (!approval || !approval.approved || !riskCat) return base;
  const k = RISK_TIGHTENING[riskCat] ?? 1.0;
  return Math.max(SURVEY_MIN_MONTHS, Math.round(base * k));
}
/* Категория риска предмета: worst-of по кредитам АКТИВНЫХ договоров, отнёсших предмет
   (параллельно borrowerSolvency, но по риску, не по платёжеспособности заёмщика).
   riskCategory — ЗЕРКАЛО из кредитного модуля (см. комментарий у CREDITS); отсутствие
   поля трактуется как 'Низкий' (коэф. 1.0, без ужесточения). Худший риск = наименьший
   коэффициент RISK_TIGHTENING (Высокий 0.25 < Средний 0.5 < Низкий 1.0). */
function itemRiskCategory(it){
  const cats = [];
  CONTRACTS.filter(c => isActive(c) && c.allocs.some(a=>a.item===it.id))
           .forEach(c => c.credits.forEach(id => cats.push(credit(id).riskCategory || 'Низкий')));
  if(!cats.length) return 'Низкий';
  let worst = cats[0];
  cats.forEach(c => { if((RISK_TIGHTENING[c] ?? 1.0) < (RISK_TIGHTENING[worst] ?? 1.0)) worst = c; });
  return worst;
}
/* Дата следующего обследования: null, если предмет никого не обеспечивает или заёмщик —
   банкрот (обследование «по договору со спецадминистратором», авто-просрочка не поднимается).
   Интервал — ДЕЙСТВУЮЩИЙ (effectiveInterval, Р-22/ПОР п.10), не базовый матричный: при
   риске «Низкий» либо отсутствии согласования зампреда effectiveInterval вернёт базовый
   интервал без изменений — поведение для нетронутых ужесточением предметов сохраняется. */
function nextSurvey(it){
  const s = borrowerSolvency(it);
  if(!s || s.interval == null) return null;
  const eff = effectiveInterval(s.group, movableOf(it), itemRiskCategory(it), RISK_TIGHTENING_APPROVAL);
  if(eff == null) return null;
  return addMonths(it.lastSurvey, eff);
}
const nextReval = it => addMonths(it.lastReval, (KINDS[it.kind]||{reval:24}).reval);

/* ---- ПРЕДПОСЫЛКИ ОФОРМЛЕНИЯ (Р-5, Прил.1 §5.2). required — производно от pledgerType. */
function prereqReq(it){
  const t = it.pledgerType;
  return {
    ownerConsent:  { required: ['Муниципальное','Госпредприятие','АО / хоз. общество'].includes(t),
      label: t==='Муниципальное' ? 'согласие ОМСУ'
           : t==='Госпредприятие' ? 'согласие Госимущества (уполномоченного органа)'
           : t==='АО / хоз. общество' ? 'решение исполнительного органа / совета директоров / общего собрания'
           : 'согласие собственника' },
    spouseConsent: { required: t==='Физлицо (имущество в браке)', label:'нотариальное согласие супруга(и)' },
    encumbranceCert:{ required: true, label:'справка регистрационного органа об отсутствии ограничений на отчуждение' },
  };
}
const PREREQ_KEYS = ['ownerConsent','spouseConsent','encumbranceCert'];
function prereqMissing(it){
  const req = prereqReq(it), pr = it.prereqs || {};
  return PREREQ_KEYS.filter(k => req[k].required && !((pr[k]||{}).present))
                    .map(k => ({ key:k, label:req[k].label }));
}

/* ---- ТЕХНИКА (Р-7, Прил.1 §2.5, §3.4). Возраст и страховка — производные проверки. */
const techAge       = it => (isTech(it) && it.year) ? CUR_YEAR - it.year : null;
const techAgeLimit  = it => TECH_AGE_LIMIT[it.origin] ?? TECH_AGE_LIMIT['СНГ'];
const techInsuredOk = it => !isTech(it) || Boolean(it.insured && it.insured.present);
const techPolicyExpired = it => isTech(it) && it.insured && it.insured.present && it.insured.till && isOverdue(it.insured.till);
/* Р-17 (П1 §2.5, §3.4): возраст сверх лимита блокирует ЖЁСТКО только «дополнительный» залог;
   «основной» залог сверх лимита не блокируется на приёме — уходит на решение комитета. */
function techAgeCheck({securityRole, origin, age}){
  const lim = TECH_AGE_LIMIT[origin] ?? 15;
  if (age <= lim) return { block:false, needCommittee:false };
  if (securityRole === 'дополнительный')
    return { block:true, needCommittee:false, msg:`Приём отклонён (П1 §2.5): срок эксплуатации ${age} лет превышает лимит ${lim} лет для «${origin}»` };
  return { block:false, needCommittee:true, msg:`П1 §2.5 устанавливает лимит для дополнительного залога. Приём техники такого возраста в качестве основного обеспечения требует решения комитета с обоснованием по П1 §3.4.` };
}

/* ТРИГГЕРЫ. Собираются из состояния; не хранятся. Триггер «недостаточность
   обеспечения» уходит во взыскание отдельным треком по причине «обеспечение» —
   он НЕ трогает риск-категорию и НЕ трогает группу платёжеспособности. */
function triggers(){
  const out = [], cs = CONTRACTS.filter(isActive);
  const seen = new Set();
  cs.forEach(c => c.credits.forEach(id => {
    if(seen.has(id)) return; seen.add(id);
    const cov = coverage(cs, id);
    /* Кредит с банковской гарантией реально учтён в index (idxGuar, Р-11) — ложный триггер
       недостаточности не поднимается, если гарантия+залог фактически покрывают порог. */
    if(!cov.ok){
      const parts = [];
      if(!cov.covOk) parts.push(`покрытие ${pct(cov.ratio)} < ${pct(cov.req)} (обеспечено ${fmt(cov.sum)} из ${fmt(cov.amount*cov.req)} требуемых)`);
      if(cov.liqApplies && !cov.liqOk) parts.push(`доля ликвидного залога ${pct(cov.liqShare)} < ${pct(LIQUID_SHARE_MIN)} — движимый неликвидный залог (§2.4)`);
      out.push({ type:'Недостаточность обеспечения', crit:'high', obj:id,
        objLbl:`${id} · ${credit(id).num}`, ctr:c.id, text: parts.join('; '),
        act:'Открыть трек взыскания по обеспечению / догрузить или заменить предмет' });
    }
    /* Р-11: истечение банковской гарантии — самостоятельный триггер (§9–10), не зависит от
       того, покрывает ли гарантия порог. */
    const g = cov.other;
    if(g && g.type === 'банковская гарантия'){
      if(guaranteeExpired(g)){
        out.push({ type:'Срок банковской гарантии истёк', crit:'high', obj:id,
          objLbl:`${id} · ${credit(id).num}`, ctr:c.id,
          text:`Банковская гарантия${g.docNo?' '+g.docNo:''} истекла ${g.till}`,
          act:'Обновить/продлить банковскую гарантию либо перекрыть залогом' });
      } else if(g.till && daysLeft(g.till) <= GUAR_WARN_DAYS){
        out.push({ type:'Гарантия истекает', crit:'mid', obj:id,
          objLbl:`${id} · ${credit(id).num}`, ctr:c.id,
          text:`Банковская гарантия${g.docNo?' '+g.docNo:''} истекает ${g.till} (через ${daysLeft(g.till)} дн.)`,
          act:'Инициировать продление гарантии заблаговременно' });
      }
    }
  }));
  ITEMS.forEach(it => {
    /* Р-8: утрата/ухудшение — сначала регламентный шаг «извещение о восполнении» (§2.5),
       взыскание поднимается только по истечении срока восполнения либо при отказе. */
    if(it.lost || it.needReval){
      const reason = it.lost ? 'утрата' : 'ухудшение состояния';
      const rn = it.restoreNotice;
      if(!rn || !rn.issued){
        out.push({ type:'Требуется извещение о восполнении предмета', crit:'mid', obj:it.id, objLbl:`${it.id} · ${it.name}`,
          text:`Обследование зафиксировало: ${reason}. До обращения во взыскание залогодателю вручается извещение о восстановлении/замене предмета или досрочном исполнении (§2.5)`,
          act:'Оформить извещение о восполнении (установить срок восполнения)' });
      } else if(rn.resolved === 'восполнено'){
        /* ветка закрыта — триггеры сняты производно */
      } else if(rn.resolved === 'отказ' || isOverdue(rn.deadline)){
        const why = rn.resolved === 'отказ' ? 'залогодатель отказался восполнить предмет'
                                            : `срок восполнения ${rn.deadline} истёк без восполнения`;
        out.push({ type:'Недостаточность обеспечения → взыскание (обеспечение)', crit:'high', obj:it.id, objLbl:`${it.id} · ${it.name}`,
          text:`${reason[0].toUpperCase()+reason.slice(1)}: ${why}. Материалы — в Департамент правового обеспечения (понуждение) и отраслевые (принудительное взыскание, §2.5)`,
          act:'Замена предмета доп соглашением либо трек взыскания по обеспечению' });
      } else {
        out.push({ type:'Извещение о восполнении выдано — идёт срок', crit:'mid', obj:it.id, objLbl:`${it.id} · ${it.name}`,
          text:`${reason[0].toUpperCase()+reason.slice(1)}. Извещение ${rn.doc||''} от ${rn.date}, срок восполнения до ${rn.deadline}. До истечения срока взыскание не поднимается`,
          act:'Дождаться восполнения либо заменить предмет доп соглашением' });
      }
    }
    /* Р-4: по согласованному действию требуется переоценка за счёт залогодателя. */
    (it.consents||[]).filter(cn => cn.revalRequired && cn.decision==='положительное' && !cn.revalDone).forEach(cn =>
      out.push({ type:'Требуется переоценка после согласованного действия', crit:'mid', obj:it.id, objLbl:`${it.id} · ${it.name}`,
        text:`Выдано согласие на «${cn.action}»${cn.doc?` (${cn.doc})`:''}; после действия требуется переоценка предмета за счёт залогодателя (§8)`,
        act:'Провести переоценку (за счёт залогодателя)' }));
    /* Р-7: страховой полис техники-обеспечения истёк. */
    if(techPolicyExpired(it) && banRequired(it)) out.push({ type:'Страхование техники истекло', crit:'mid',
      obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:`Полис ${it.insured.policy} истёк ${it.insured.till} — техника-обеспечение должна быть застрахована (§3.4)`, act:'Обновить страховой полис' });
    /* ЗАЛОГ БЕЗ ЗАПРЕТА — дыра в обеспечении: залогодатель может продать предмет
       без нашего ведома. Это дефект оформления, а не формальность. */
    if(banMissing(it)) out.push({ type:'Залог без запрета на отчуждение', crit: banOverdue(it) ? 'high' : 'mid',
      obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:`Договор(ы) ${banContracts(it).join(', ')} зарегистрированы, запрет в «${organOf(it)}» не наложен. Срок: до ${banDeadline(it)}${banOverdue(it) ? ` · ПРОСРОЧЕН на ${Math.abs(daysLeft(banDeadline(it)))} дн.` : ''}`,
      act:`Наложить запрет на отчуждение в «${organOf(it)}»` });
    /* ЗАПРЕТ ЖИВ, а доли обнулились — имущество клиента заблокировано без основания. */
    if(banStale(it)) out.push({ type:'Требуется снятие запрета', crit:'mid',
      obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:`Доли по предмету обнулились (кредит погашен / предмет выведен), запрет ${it.ban.regNo} от ${it.ban.date} продолжает действовать в «${organOf(it)}»`,
      act:`Снять запрет в «${organOf(it)}»` });
    /* Р-3: обследование планируется по матрице; банкрот / не-обеспечивающий предмет → nextSurvey=null, авто-просрочка не поднимается.
       Р-22 (ПОР п.10): интервал в триггере — ДЕЙСТВУЮЩИЙ (может быть ужесточён категорией
       риска); если он отличается от нормативного матричного, показываем оба. */
    const ns = nextSurvey(it);
    if(ns && isOverdue(ns)){ const s = borrowerSolvency(it);
      const rc = itemRiskCategory(it), eff = effectiveInterval(s.group, movableOf(it), rc, RISK_TIGHTENING_APPROVAL);
      const intervalTxt = (eff != null && eff !== s.interval)
        ? `${s.interval} мес. по матрице §2.3, действующий — ${eff} мес. (ПОР п.10, категория риска «${rc}»)`
        : `${s.interval} мес.`;
      out.push({ type:'Просрочен контроль: обследование', crit:'mid', obj:it.id, objLbl:`${it.id} · ${it.name}`,
        text:`Плановая дата ${ns} (просрочка ${Math.abs(daysLeft(ns))} дн.). Интервал ${intervalTxt} — группа «${s.group}» × ${movableOf(it)?'движимое':'недвижимое'}`,
        act:'Провести обследование' });
    }
    if(isOverdue(nextReval(it))) out.push({ type:'Просрочен контроль: переоценка', crit:'mid', obj:it.id,
      objLbl:`${it.id} · ${it.name}`, text:`Плановая дата ${nextReval(it)} (просрочка ${Math.abs(daysLeft(nextReval(it)))} дн. · интервал вне положения)`, act:'Провести переоценку' });
  });
  CONTRACTS.filter(c=>c.status==='На рассмотрении комиссии').forEach(c => { const bad = gateCheck(c).rows.filter(r=>!r.ok);
    out.push({
    type:'Регистрация заблокирована', crit:'high', obj:c.id, objLbl:`${c.id} · ${clientName(c.inn)}`,
    text:`Контрольный гейт покрытия не пройден (${bad.map(r=>`${r.id} — ${pct(r.ratio)} при пороге ${pct(r.req)} (${r.source})`).join('; ')}) — договор ждёт решения комитета по администрированию бюджетных кредитов`,
    act:'Решение комиссии: вернуть на доработку либо допустить с обоснованием' }); });
  return out;
}

/* ---- фильтр реестра (jmix-generic-filter, стиль стенда) ----
   Поля фильтруют по полям объекта .sort строки (тем же, по которым идёт сортировка).
   Панель перестраивается только при смене реестра — чтобы ввод в текстовом поле
   не терял фокус при live-фильтрации. */
const FILTERS = {
  items: [
    { key:'name',    label:'Наименование содержит', type:'text'   },
    { key:'kind',    label:'Вид залога =',          type:'select' },
    { key:'pledger', label:'Залогодатель содержит', type:'text'   },
    { key:'st',      label:'Статус =',              type:'select' },
  ],
  contracts: [
    { key:'no',     label:'Договор содержит', type:'text'   },
    { key:'inn',    label:'Заёмщик содержит', type:'text'   },
    { key:'status', label:'Статус =',         type:'select' },
  ],
  monitor: [
    { key:'type', label:'Тип =',          type:'select' },
    { key:'obj',  label:'Объект содержит', type:'text'   },
  ],
};
const activeFilter = { items:{}, contracts:{}, monitor:{} };
let filterPanelReg = null;

function regRows(){
  return reg==='items' ? rowsItems() : reg==='contracts' ? rowsContracts() : rowsMonitor();
}
function filterRows(rows){
  const f = activeFilter[reg] || {};
  return rows.filter(r => (FILTERS[reg]||[]).every(fld => {
    const q = f[fld.key]; if(!q) return true;
    const v = String(r.sort[fld.key] ?? '');
    return fld.type==='select' ? v===q : v.toLowerCase().includes(q.toLowerCase());
  }));
}
function onFilter(key, val){
  const f = activeFilter[reg];
  if(val && val.trim()) f[key] = val.trim(); else delete f[key];
  renderList();
}
function resetFilter(){ activeFilter[reg] = {}; renderFilterPanel(); renderList(); }
function renderFilterPanel(){
  filterPanelReg = reg;
  const cfg = FILTERS[reg] || [], f = activeFilter[reg] || {}, all = regRows();
  document.getElementById('jfPanel').innerHTML = cfg.map(fld => {
    let ctl;
    if(fld.type === 'select'){
      const opts = [...new Set(all.map(r => String(r.sort[fld.key] ?? '')).filter(Boolean))]
        .sort((a,b)=>a.localeCompare(b,'ru'));
      ctl = `<select onchange="onFilter('${fld.key}',this.value)"><option value=""></option>`
        + opts.map(o=>`<option${f[fld.key]===o?' selected':''}>${esc(o)}</option>`).join('') + `</select>`;
    } else {
      ctl = `<input type="text" value="${f[fld.key]?esc(f[fld.key]):''}" oninput="onFilter('${fld.key}',this.value)">`;
    }
    return `<div class="jf-row"><span class="jf-label" title="${esc(fld.label)}">${esc(fld.label)}</span>`
      + `<span class="jf-ctl">${ctl}</span></div>`;
  }).join('');
  const n = Object.keys(f).length;
  document.getElementById('jfSummary').textContent = n ? `Фильтр · ${n} активно` : 'Фильтр';
}

const HEADS = {
