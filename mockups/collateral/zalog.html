<title>Залоговое обеспечение · АСУБК</title>
<!--
  РАБОЧИЙ ПРОТОТИП (single-file, MVP) — модуль «Залоговое обеспечение» (TO-BE).
  Это не картинка-мокап: вся логика ниже ИСПОЛНЯЕТСЯ. Гейты, инварианты, производные
  величины и триггеры считаются в рантайме от состояния, а не зашиты в разметку.
  Спека: `ASUBK-zalog-logika.md` (секция 13 мастер-документа `ASUBK-analiz-mokapov.md`).
  Экрана залога в живой системе нет — модуль проектируется с нуля, as-is дефектов нет.

  ЧТО РЕАЛИЗОВАНО (и что разработчик обязан сохранить)

  1. ДВЕ СУЩНОСТИ, НЕ ОДНА.
     • ПРЕДМЕТ ЗАЛОГА — каноническая запись актива (реестр). Живёт сквозь весь ЖЦ,
       переоценивается, обследуется, на него накладывается запрет на отчуждение. Реестр — якорь модуля.
     • ЗАЛОГОВЫЙ ДОГОВОР — юридическая обёртка (номер, нотариус, свидетельство).
     Предмет ↔ активный договор = 1:N (перезалог на остаточную стоимость).
     Договор ↔ кредит = 1:N (кредиты одного заёмщика, перекрёстное обеспечение).
     Юр-поля живут НА ДОГОВОРЕ, физические и стоимостные — НА ПРЕДМЕТЕ. Не смешивать.

  2. ОТНЕСЕНИЕ_ЗАЛОГА (junction «предмет ↔ кредит», внутри договора) несёт ДОЛЮ —
     часть залоговой стоимости предмета, закреплённую за конкретным кредитом.
     ИНВАРИАНТ: Σ долей предмета по всем действующим/оформляемым договорам
     ≤ залоговая стоимость предмета. Проверяется при каждом вводе доли (checkInvariant).

  3. БАЗА ПОКРЫТИЯ — ЗАЛОГОВАЯ СТОИМОСТЬ, НЕ ОЦЕНОЧНАЯ (шов №1).
     оценочная — owned (вводит человек из отчёта оценщика);
     залоговая — derived: оценочная × коэффициент[вид залога] (справочник KINDS);
                 событийный override комиссией: ≤ расчётной — свободно,
                 > расчётной — ОБЯЗАТЕЛЬНОЕ обоснование + флаг (см. openOverride);
     покрытие  — вычисляемый оверлей: Σ эффективных долей ÷ сумма кредита ≥ 120%.
     Ни одно из трёх не хранится «на всякий случай» — считается из состояния.

  4. УСЕЧЕНИЕ ДОЛИ ПРИ ПАДЕНИИ СТОИМОСТИ (правило, добавленное сверх спеки —
     согласовать). Юридическая доля в нотариальном договоре СТАТИЧНА и не усыхает.
     Но если переоценка уронила залоговую стоимость ниже суммы закреплённых долей,
     экономическое покрытие не может опираться на несуществующую стоимость: доли
     усекаются ПРОПОРЦИОНАЛЬНО (effShare). Договор при этом не правится — падение
     покрытия поднимает триггер «недостаточность обеспечения» (см. п. 7).

  5. ГЕЙТ 120% — ДВА МЕСТА, ОДИН КОД (gateCheck).
     • Регистрация залогового договора — контрольный гейт.
     • Регистрация доп соглашения — тот же гейт по ЧИСТОМУ ЭФФЕКТУ пакета (net).
     Провал → договор уходит в статус «На рассмотрении комиссии по залогу»
     (не «зарегистрирован с ошибкой» и не «молча пропущен»). Комиссия либо возвращает
     на доработку, либо допускает недообеспеченный кредит с ОБЯЗАТЕЛЬНЫМ обоснованием.

  6. ДОП СОГЛАШЕНИЕ — КОНВЕРТ ВЕРСИОНИРОВАНИЯ (changeset), а не набор отдельных кнопок.
     Один акт несёт ≥1 операцию (вывод предмета + ввод + правка долей + добавление
     кредита). Мини-ЖЦ: оформляется → зарегистрировано. Эффект наступает НА РЕГИСТРАЦИИ.
     Снимок before/after сохраняется на соглашении. Вывод предмета не блокируется:
     если он выводит предмет с наложенным запретом, после регистрации возникает
     задача снять запрет (мониторинг), снятие — отдельным актом в органе.

  7. ТРИ НЕЗАВИСИМЫХ ИЗМЕРЕНИЯ, НЕ СЛИВАТЬ В ОДИН «СТАТУС»:
     • залоговая ось предмета (свободен · в залоге · реализуется · освобождён) —
       ПРОИЗВОДНАЯ от наличия долей;
     • ось ЗАПРЕТА НА ОТЧУЖДЕНИЕ (не требуется · не наложен · просрочен · наложен ·
       подлежит снятию) — это НАШ ОБЯЗАТЕЛЬНЫЙ ШАГ ОФОРМЛЕНИЯ, а не внешнее событие:
       порядок «нотариус → запрет → (погашение/вывод) → снятие». Запрет накладываем
       МЫ в регистрирующем органе, чтобы залогодатель не продал предмет без нашего
       ведома. ОДИН запрет на предмет (на вещь), при перезалоге дополняется
       основаниями — повторно не накладывается. ОТСУТСТВИЕ запрета при живом залоге —
       ДЕФЕКТ ОФОРМЛЕНИЯ (триггер), НАЛИЧИЕ — признак защищённости. Снятие ПОД ГЕЙТОМ:
       пока по предмету живы доли, снять нельзя. Срок наложения — 5 рабочих дней после
       нотариального удостоверения (справочник, орган — свой на каждый вид залога).
       Сторонний арест (суд, налоговая) в модуле НЕ моделируется.
     • плановый контроль (обследование / переоценка) — ВЫЧИСЛЯЕМЫЙ ОВЕРЛЕЙ по датам,
       не статус. Просрочка контроля — расчёт от сегодняшней даты.
     Триггер «недостаточность обеспечения» — тоже НЕ статус: это вычисляемое событие,
     которое уходит во взыскание (трек по причине «обеспечение», параллельный просрочке).
     Он НЕ трогает риск-категорию и НЕ трогает группу платёжеспособности.

  8. ВЫСВОБОЖДЕНИЕ ДОЛИ (§4.2 спеки): автоматика ТОЛЬКО при закрытии кредита/договора
     (кнопка «Отметить погашенным» на карточке договора демонстрирует правило).
     Частичное освобождение на живом кредите — ТОЛЬКО доп соглашением. Доля от платежей
     по основному долгу не усыхает.

  9. ОБСЛЕДОВАНИЕ ≠ ПЕРЕОЦЕНКА. Обследование — про физическое состояние (read-событие),
     переоценка — про стоимость. Исход обследования классифицирован и ветвит действие:
     в норме → сдвиг плановой даты; ухудшение → флаг «требуется досрочная переоценка»;
     утрата → предмет выбыл → триггер недостаточности обеспечения.

  РОЛИ: Залоговый специалист (правит), Комиссия по залогу (override стоимости и решение
  по гейту), Наблюдатель (только чтение). Права проверяются в canEdit()/canCommission().

  ДЕМО-ДАННЫЕ покрывают все ветки: перезалог под ОДНИМ запретом с двумя основаниями
  (П-001, ban.contracts=[Д-001,Д-002]), третье-лицо-залог с наложенным запретом
  (П-004, залогодатель ≠ заёмщик), ЗАЛОГ БЕЗ ЗАПРЕТА — дефект оформления, дедлайн
  истёк → триггер high (П-005 / Д-004), override > расчётной с обоснованием (П-005),
  ЗАПРЕТ ПОДЛЕЖИТ СНЯТИЮ после погашения (П-008 / закрытый Д-007) → триггер mid,
  запрет НЕ требуется для незарегистрированного договора (П-006 / черновик Д-005),
  провал гейта на регистрации (Д-005), падение покрытия после переоценки
  (П-002 / Д-006), просроченный плановый контроль (П-007).

  ОТКРЫТО: личное поручительство (П2) в модуле отсутствует — по спеке §10 п.5 это
  отдельная сущность обеспечения, в 120% не входит и здесь не моделируется.
-->

.nav-toggle:hover{ background:rgba(24,39,57,0.04); }

  transition:transform 120ms ease; flex:none; }

  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; user-select:none; vertical-align:middle; }
table.grid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; }
table.grid tbody td{ height:35px; padding:0 16px; border-bottom:1px solid var(--asubk-grid-line);
  color:var(--text-body); vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
table.grid tbody tr{ cursor:pointer; }
table.grid tbody tr:hover{ background:var(--surface-hover); }
table.grid tbody tr.sel{ background:var(--asubk-nav-active); }

/* Терминальный процесс — работа завершена, строка приглушена. */
.grid tbody tr.terminal td{ color:var(--text-muted); }
.grid tbody tr.terminal td:first-child{ font-style:italic; }

/* status pills in list/cells */
.pill{ display:inline-block; padding:2px 9px; border-radius:var(--radius-pill);
  font:var(--weight-medium) 12px/1.5 var(--asubk-font); white-space:nowrap; }
.pill.low{ background:var(--status-success-bg); color:var(--asubk-green); }
.pill.mid{ background:var(--status-warning-bg); color:var(--asubk-amber); }
.pill.high{ background:var(--status-error-bg); color:var(--asubk-red); }
.pill.neutral{ background:var(--asubk-tint-fill); color:var(--text-muted); }
.pill.info{ background:var(--status-info-bg); color:var(--asubk-blue); }

/* ---- detail ---- */
.detail-tabbar-wrap{ position:relative; border-bottom:1px solid var(--border-default);
  background:var(--surface-page); flex:none; }
.detail-tabbar{ display:flex; overflow-x:auto; padding:6px 44px 0 20px; scrollbar-width:none; }
.detail-tabbar::-webkit-scrollbar{ display:none; }
.dtab{ flex:none; border:none; background:transparent; padding:11px 15px;
  font:var(--weight-medium) var(--text-base)/1 var(--asubk-font); color:var(--text-muted);
  border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; white-space:nowrap; }
.dtab:hover{ color:var(--text-body); }
.dtab.active{ color:var(--asubk-blue); border-bottom-color:var(--asubk-blue); font-weight:var(--weight-semibold); }
.tabbar-chevron{ position:absolute; right:8px; top:50%; transform:translateY(-50%); width:28px; height:28px;
  background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-md);
  display:flex; align-items:center; justify-content:center; color:var(--text-muted); cursor:pointer; }
.tabbar-chevron:hover{ background:var(--surface-hover); }

.panel-wrap{ padding:18px 20px 8px; }
.panel-card{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:20px 24px; }
.detail-panel{ display:none; }
.detail-panel.active{ display:block; }

/* ---- process header (indicator panel, not a form) ---- */
.phead{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:16px 20px; margin-bottom:18px; }
.phead-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:12px; }
.phead-name{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.phead-name .nm{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); }
.phead-name a{ font:var(--font-label); color:var(--text-link); text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.phead-name a:hover{ text-decoration:underline; }
.phead-sub{ font:var(--font-label); color:var(--text-muted); margin-top:3px; }
.phead-sub b{ color:var(--text-body); font-weight:var(--weight-medium); }
.phead-owner{ font:var(--font-label); color:var(--text-muted); white-space:nowrap; }
.phead-banner{ display:flex; align-items:center; gap:10px; border-radius:var(--radius-md);
  padding:9px 14px; margin-bottom:12px; font:var(--font-label); }
.phead-banner.warn{ background:var(--status-warning-bg); color:var(--asubk-amber); }
.phead-banner.info{ background:var(--status-info-bg); color:var(--asubk-blue); }
/* Событие (смерть, недееспособность) — уводит процесс вбок, фаза сохраняется. */
.phead-banner.danger{ background:var(--status-error-bg); color:var(--asubk-red); }
/* Запрет на отчуждение наложен — предмет защищён от продажи (зелёная строка). */
.phead-banner.ok{ background:var(--status-success-bg); color:var(--asubk-green); }
.phead-banner svg{ flex:none; }
.phead-dims{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media(max-width:760px){ .phead-dims{ grid-template-columns:repeat(2,1fr); } }
.dim{ background:var(--surface-panel); border-radius:var(--radius-md); padding:10px 14px; }
.dim .dl{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-muted); margin-bottom:5px; }
.dim .dv{ font:var(--weight-semibold) 16px/1.2 var(--asubk-font); color:var(--text-heading); }
.dim .src{ font:var(--weight-regular) 11px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:4px; }

/* two-column form (label above) */
.f2{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; max-width:1500px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field .flabel{ font:var(--font-label); color:var(--text-muted); }
.field.col-span{ grid-column:1 / -1; }
.control{ position:relative; display:flex; align-items:center; }
.control input, .control select, .note-area{ width:100%; height:var(--control-h); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); font-weight:var(--weight-medium);
  border:1px solid var(--border-strong); outline:none; padding:0 var(--space-2);
  transition:box-shadow 120ms ease, border-color 120ms ease; }
.control select{ cursor:pointer; appearance:none; padding-right:30px; }
.control input:focus, .control select:focus, .note-area:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); }
.control input[readonly], .ro input, .ro .note-area{ background:var(--surface-input); color:var(--text-muted); border:1px solid transparent; cursor:default; }
.control input[readonly]:focus{ border-color:transparent; box-shadow:none; }
.grey input, .grey select{ background:var(--surface-input); border-color:transparent; }
.control .cal, .control .caret{ position:absolute; right:9px; pointer-events:none; color:var(--text-muted); display:flex; }
.note-area{ height:auto; min-height:80px; padding:10px 12px; resize:vertical; line-height:1.5; }
.dtpair{ display:grid; grid-template-columns:1fr 1fr; gap:0 10px; }

/* lookup (picker) */
.lookup{ display:flex; align-items:center; height:var(--control-h); background:var(--surface-input);
  border-radius:var(--radius-md); border:1px solid transparent; padding-left:var(--space-2); }
.lookup .val{ flex:1; font:var(--font-body); font-weight:var(--weight-medium); color:var(--text-body);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lookup .val.ph{ color:var(--text-placeholder); }
.lookup button{ display:inline-flex; align-items:center; justify-content:center; width:32px; height:var(--control-h);
  border:none; background:transparent; color:var(--text-link); cursor:pointer; }
.lookup .pick{ font-weight:var(--weight-bold); letter-spacing:1px; }

/* section heading + toolbar above collection grid */
.section-h{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); margin:0 0 6px; }
.section-note{ font:var(--font-label); color:var(--text-muted); margin:0 0 14px; max-width:900px; }
.gtoolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.gtoolbar .spacer{ flex:1; }

/* collection grid */
.cgrid-wrap{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:auto; min-height:80px; }
table.cgrid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
table.cgrid thead th{ position:sticky; top:0; text-align:left; padding:10px 12px; background:var(--surface-card);
  border-bottom:1px solid var(--border-default); font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font);
  color:var(--text-heading); cursor:pointer; user-select:none; }
table.cgrid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; font-weight:400; }
table.cgrid tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default); color:var(--text-body); vertical-align:middle; }
table.cgrid tbody tr:hover{ background:var(--surface-hover); }
table.cgrid tbody tr.total td{ font-weight:var(--weight-bold); color:var(--text-heading);
  background:var(--surface-hover); border-top:1px solid var(--border-strong); }
.cgrid-empty{ display:flex; align-items:center; justify-content:center; min-height:120px;
  color:var(--text-placeholder); font:var(--font-label); }
.rowlink{ color:var(--text-link); cursor:pointer; }
.rowlink:hover{ text-decoration:underline; }

/* timeline (phase machine indicator) */
.timeline{ display:flex; flex-wrap:wrap; gap:0; margin:2px 0 20px; }
.tl-step{ display:flex; align-items:center; gap:8px; padding:6px 0; }
.tl-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font:var(--weight-bold) 12px/1 var(--asubk-font); flex:none; }
.tl-dot.done{ background:var(--asubk-green); color:#fff; }
.tl-dot.cur{ background:var(--asubk-blue); color:#fff; }
.tl-dot.todo{ background:var(--surface-input); color:var(--text-placeholder); }
.tl-lbl{ font:var(--font-label); color:var(--text-body); }
.tl-lbl.todo{ color:var(--text-placeholder); }
.tl-arrow{ color:var(--text-placeholder); margin:0 12px; display:flex; }

/* history rows */
.hist{ border-left:2px solid var(--border-strong); margin-left:6px; padding-left:0; }
.hrow{ position:relative; padding:10px 0 10px 22px; border-bottom:1px solid var(--asubk-grid-line); }
.hrow::before{ content:""; position:absolute; left:-5px; top:16px; width:8px; height:8px; border-radius:50%;
  background:var(--asubk-blue); }
.hrow .hwhen{ font:var(--weight-medium) 13px/1.3 var(--asubk-font); color:var(--text-muted); }
.hrow .hwhat{ font:var(--font-label); color:var(--text-body); margin-top:2px; }
.hrow .hwho{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:2px; }

/* footer */
.footer{ position:sticky; bottom:0; background:var(--surface-page); border-top:1px solid var(--border-default);
  padding:14px 20px; display:flex; align-items:center; gap:12px; }

/* modals */
.overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.42); display:none; align-items:center;
  justify-content:center; z-index:60; padding:24px; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface-card); border-radius:var(--radius-lg); width:min(1040px,100%); max-height:88vh;
  display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(16,28,46,0.4); }
.modal.form{ width:min(720px,100%); }
.modal.narrow{ width:min(560px,100%); }
.modal-h{ padding:18px 24px 12px; display:flex; align-items:center; gap:10px; }
.modal-h .mt{ font:var(--weight-bold) 20px/1.2 var(--asubk-font); color:var(--text-heading); flex:1; }
.modal-x{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); display:flex; padding:4px; }
.modal-x:hover{ color:var(--text-body); }
.modal-b{ padding:0 24px 8px; overflow:auto; flex:1; }
.modal-f{ padding:14px 24px 20px; display:flex; gap:12px; justify-content:flex-end; }
.mform{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; padding-top:8px; }
.mform .field.col-span{ grid-column:1 / -1; }
.mform .field.req .flabel::after{ content:" •"; color:var(--action-danger); }
.mform .control input, .mform .control select, .mform .note-area{ background:var(--surface-input); border-color:transparent; }
.warn-inline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-warning-bg);
  color:var(--asubk-amber); border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin-top:6px; }
/* Мера без подтверждения вручения не считается исполненной — она не годится
   как доказательство в суде. Строка подсвечена, а не спрятана. */
.cgrid tbody tr.mrow-undelivered{ background:var(--status-warning-bg); }
/* Мягкое предупреждение о пересечении охвата — не запрет. */
.overlap-note{ display:flex; gap:8px; align-items:flex-start; background:var(--status-warning-bg);
  color:var(--asubk-amber); border-radius:var(--radius-md); padding:10px 12px; margin:0 0 14px;
  font:var(--font-label); }
.overlap-note svg{ flex:none; margin-top:2px; }
.overlap-note .rowlink{ color:var(--text-link); font-weight:600; }
table.eb-grid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
.eb-grid-wrap{ border:1px solid var(--border-strong); border-radius:var(--radius-md); overflow:auto; max-height:52vh; }
table.eb-grid thead th{ position:sticky; top:0; background:var(--surface-panel); text-align:left; z-index:1;
  padding:11px 14px; border-bottom:1px solid var(--border-default); color:var(--text-heading);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); }
table.eb-grid tbody td{ padding:11px 14px; border-bottom:1px solid var(--border-default); color:var(--text-body); }
table.eb-grid tbody tr{ cursor:pointer; }
table.eb-grid tbody tr:hover{ background:var(--surface-hover); }
table.eb-grid tbody tr:last-child td{ border-bottom:none; }

/* toast */
.toast-wrap{ position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:80; }
.toast{ min-width:260px; max-width:420px; padding:12px 14px; border-radius:var(--radius-md);
  background:var(--asubk-ink); color:#fff; font:var(--font-label); box-shadow:0 10px 30px rgba(16,28,46,0.3);
  display:flex; gap:10px; align-items:flex-start; }
.toast.ok{ background:var(--asubk-green); }
.toast.warn{ background:var(--asubk-amber); }
</style>
<style>
/* ---- дополнения к общей таблице стилей модуля ---- */
.seg{ display:flex; gap:0; padding:12px 20px 0; }
.seg button{ height:34px; padding:0 16px; border:1px solid var(--border-default); background:var(--surface-card);
  color:var(--text-muted); font:var(--weight-medium) var(--text-sm)/1 var(--asubk-font); cursor:pointer; }
.seg button:first-child{ border-radius:var(--radius-md) 0 0 var(--radius-md); }
.seg button:last-child{ border-radius:0 var(--radius-md) var(--radius-md) 0; }
.seg button + button{ border-left:none; }
.seg button.on{ background:var(--asubk-nav-active); color:var(--text-heading); font-weight:var(--weight-semibold); }
.seg .cnt{ margin-left:6px; color:var(--text-placeholder); font-weight:400; }

.kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
@media(max-width:900px){ .kpis{ grid-template-columns:repeat(2,1fr); } }
.formula{ font:var(--weight-regular) 12px/1.4 var(--asubk-font); color:var(--text-placeholder); margin-top:4px; }
.numcell{ text-align:right; font-variant-numeric:tabular-nums; }
.mono{ font-variant-numeric:tabular-nums; }
.flagline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-error-bg); color:var(--asubk-red);
  border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin:0 0 14px; }
.okline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-success-bg); color:var(--asubk-green);
  border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin:0 0 14px; }
.infoline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-info-bg); color:var(--asubk-blue);
  border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin:0 0 14px; }
.ops-list{ border:1px solid var(--border-default); border-radius:var(--radius-md); margin:10px 0 6px; }
.op-row{ display:flex; align-items:center; gap:10px; padding:9px 12px; border-bottom:1px solid var(--asubk-grid-line);
  font:var(--font-label); }
.op-row:last-child{ border-bottom:none; }
.op-row .op-t{ flex:1; }
.op-empty{ padding:14px 12px; color:var(--text-placeholder); font:var(--font-label); }
.diff-up{ color:var(--asubk-green); font-weight:600; }
.diff-dn{ color:var(--asubk-red); font-weight:600; }
.mform.one{ grid-template-columns:1fr; }
.chk{ display:flex; align-items:center; gap:8px; font:var(--font-label); color:var(--text-body); }
.axis{ display:flex; gap:6px; flex-wrap:wrap; }
</style>

<body>
<div class="app">

  <nav class="sidebar">
    <div class="brand">АСУБК</div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot">
      <span>[admin]</span>
      <button class="icon-btn" title="Выйти" aria-label="Выйти">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </nav>

  <div class="main">
    <header class="topbar">
      <span class="menu" title="Меню">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </span>
      <span class="crumb-title" id="crumbTitle">Залоговое обеспечение</span>
      <div class="role-wrap">
        <label>Роль:</label>
        <div class="rsel">
          <select id="roleSel" onchange="onRoleChange()">
            <option>Залоговый специалист</option>
            <option>Комиссия по залогу</option>
            <option>Наблюдатель</option>
          </select>
          <span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
        </div>
      </div>
    </header>

    <div class="content">

      <!-- ============ LIST VIEW (три реестра) ============ -->
      <section class="view" id="view-list" style="display:flex;">
        <div class="seg" id="segBar"></div>
        <div class="tb-actions">
          <div class="split" id="splitRefresh">
            <button class="btn btn-success" onclick="renderList();toast('Список обновлён')">Обновить</button>
            <button class="btn btn-success caret" onclick="document.getElementById('splitRefresh').classList.toggle('open');event.stopPropagation();">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="split-menu">
              <button onclick="renderList();toast('Обновить');closeSplit()">Обновить</button>
              <button onclick="renderList();toast('Применить и обновить');closeSplit()">Применить и обновить</button>
            </div>
          </div>
          <button class="btn btn-primary" id="btnNew" onclick="onNew()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            <span id="btnNewLbl">Новый предмет залога</span>
          </button>
          <button class="gear-btn" title="Справочник коэффициентов и интервалов контроля" onclick="openRefbook()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
        <div class="rowtools">
          <button class="btn btn-tint" id="btnOpen" disabled onclick="openSelected()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Открыть</button>
          <div class="spacer"></div>
          <div class="pager"><span id="pagerCount"></span></div>
        </div>
        <div id="listNote" style="padding:0 20px 8px"></div>
        <div class="grid-wrap">
          <table class="grid" id="listGrid">
            <thead><tr id="listHead"></tr></thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
      </section>

      <!-- ============ DETAIL VIEW (предмет / договор) ============ -->
      <section class="view" id="view-detail">
        <div class="detail-tabbar-wrap">

              {when:'05.01.2024 10:20', what:'Договор зарегистрирован. Покрытие К-33: 120,0%', who:'Залоговый специалист'} ] },

const contract = id => CONTRACTS.find(c=>c.id===id);

/* ============================================================
   ВЫЧИСЛЯЕМЫЙ СЛОЙ — здесь живёт ВСЯ арифметика залога.
   Ничего из этого не хранится в данных: залоговая, отнесено, доступно,
   покрытие, статус предмета, просрочка контроля, триггеры — производные.
   ============================================================ */
const coefOf      = kind => (KINDS[kind]||{k:0.5}).k;
const calcPledge  = it => Math.round(it.appraised * coefOf(it.kind) * 100)/100;   // расчётная залоговая
const pledgeValue = it => it.lost ? 0 : (it.override ? it.override.value : calcPledge(it));
const isOverAbove = it => Boolean(it.override) && it.override.value > calcPledge(it); // override ВЫШЕ расчётной → флаг

const ACTIVE = 'Зарегистрирован';
const isActive  = c => c.status === ACTIVE;
const isDraftish = c => c.status === 'Оформляется' || c.status === 'На рассмотрении комиссии';

/* Контекст расчёта: действующие договоры + (опционально) один виртуальный
   (проверяемый черновик либо договор с применённым пакетом доп соглашения). */
function ctx(virtual){
  const base = CONTRACTS.filter(c => isActive(c) && (!virtual || c.id !== virtual.id));
  return virtual ? [...base, virtual] : base;
}
/* Отнесено по предмету внутри контекста. */
const allocatedIn = (cs, itemId) =>
  cs.reduce((s,c)=> s + c.allocs.filter(a=>a.item===itemId).reduce((t,a)=>t+a.share,0), 0);

/* Юридически обременено (действующие) + предварительно занято черновиками —
   чтобы одну и ту же стоимость не пообещали дважды ещё на этапе оформления. */
const allocatedLegal = itemId => allocatedIn(CONTRACTS.filter(isActive), itemId);
const allocatedDraft = itemId => allocatedIn(CONTRACTS.filter(isDraftish), itemId);
const availableOf    = it => Math.max(0, pledgeValue(it) - allocatedLegal(it.id) - allocatedDraft(it.id));

/* ЭФФЕКТИВНАЯ ДОЛЯ. Юридическая доля в нотариальном договоре статична и от платежей
   не усыхает (§4.2). Но если переоценка уронила залоговую ниже суммы закреплённых
   долей — покрытие не может опираться на несуществующую стоимость: доли усекаются
   ПРОПОРЦИОНАЛЬНО. Договор при этом не правится; падение покрытия поднимает триггер. */
function effShare(cs, itemId, share){
  const it = item(itemId); if(!it || it.lost) return 0;
  const pv = pledgeValue(it), tot = allocatedIn(cs, itemId);
  return tot <= pv ? share : share * (pv / tot);
}
/* Покрытие кредита = Σ эффективных отнесённых долей ÷ сумма кредита. */
function coverage(cs, creditId){
  const cr = credit(creditId);
  const sum = cs.reduce((s,c)=> s + c.allocs.filter(a=>a.credit===creditId)
                 .reduce((t,a)=> t + effShare(cs, a.item, a.share), 0), 0);
  return { sum, amount: cr.amount, ratio: cr.amount ? sum/cr.amount : 0, ok: cr.amount ? sum/cr.amount >= COVER_MIN : true };
}
/* ГЕЙТ 120% — один код на два места: регистрация договора и регистрация доп соглашения. */
function gateCheck(virtual){
  const cs = ctx(virtual);
  const rows = virtual.credits.map(id => ({ id, ...coverage(cs, id) }));
  return { rows, ok: rows.every(r=>r.ok) };
}
/* ИНВАРИАНТ: Σ долей предмета ≤ залоговая стоимость. Проверяется до сохранения. */
function invariantBreaches(virtual){
  const cs = [...CONTRACTS.filter(c => (isActive(c)||isDraftish(c)) && c.id !== virtual.id), virtual];
  const ids = [...new Set(virtual.allocs.map(a=>a.item))];
  return ids.map(id => ({ id, alloc: allocatedIn(cs, id), pledge: pledgeValue(item(id)) }))
            .filter(x => x.alloc > x.pledge + 0.005);
}

/* Залоговая ось статуса предмета — ПРОИЗВОДНАЯ от наличия долей (не поле). */
function lienStatus(it){
  if(it.lost) return 'выбыл';
  if(it.realizing) return 'реализуется';
  if(allocatedLegal(it.id) > 0) return 'в залоге';
  if(allocatedDraft(it.id) > 0) return 'резервируется';
  return it.everPledged ? 'освобождён' : 'свободен';
}
const lienCls = s => s==='в залоге' ? 'info' : s==='реализуется' ? 'mid' : s==='выбыл' ? 'high' : 'neutral';

/* ============================================================
   ОСЬ ЗАПРЕТА НА ОТЧУЖДЕНИЕ — НАШ ШАГ ОФОРМЛЕНИЯ, не внешнее событие.
   Порядок: договор удостоверяется у нотариуса → мы САМИ накладываем запрет
   на отчуждение предмета в регистрирующем органе, чтобы залогодатель не продал
   заложенное имущество без нашего ведома. Запрет — на ВЕЩЬ (один на предмет),
   при перезалоге дополняется основанием, а не накладывается заново. Снимается,
   когда предмет перестал обеспечивать кредит (гейт: живые доли ⇒ снять нельзя).
   Ось запрета НЕЗАВИСИМА от залоговой оси: «в залоге» + «запрет не наложен»
   — это и есть дефект оформления (дыра в обеспечении), а не норма.
   ============================================================ */
/* Дедлайн наложения: нотариальная дата САМОГО РАННЕГО зарегистрированного
   договора, обременяющего предмет, + BAN_DEADLINE_DAYS рабочих дней. */
function banDeadline(it){
  const cs = CONTRACTS.filter(c => isActive(c) && c.allocs.some(a=>a.item===it.id) && isDate(c.notaryDate));
  if(!cs.length) return null;
  const earliest = cs.map(c=>c.notaryDate).sort((a,b)=>d2n(a)-d2n(b))[0];
  return addBusinessDays(earliest, BAN_DEADLINE_DAYS);
}
/* Зарегистрированные договоры, обременяющие предмет — основания запрета. */
const banContracts = it => CONTRACTS.filter(c => isActive(c) && c.allocs.some(a=>a.item===it.id)).map(c=>c.id);
const banRequired = it => allocatedLegal(it.id) > 0;                 // запрет обязан быть
const banMissing  = it => banRequired(it) && !it.ban;               // ДЕФЕКТ ОФОРМЛЕНИЯ
const banOverdue  = it => banMissing(it) && isOverdue(banDeadline(it));
const banStale    = it => Boolean(it.ban) && allocatedLegal(it.id) === 0;  // подлежит снятию
function banStatus(it){
  if(it.ban) return allocatedLegal(it.id) === 0 ? 'подлежит снятию' : 'наложен';
  if(!banRequired(it)) return 'не требуется';
  return banOverdue(it) ? 'просрочен' : 'не наложен';
}
/* Единственный источник пилюли запрета в списках и карточках. */
function banPill(it){
  const s = banStatus(it);
  if(s==='наложен')          return '<span class="pill low">запрет наложен</span>';
  if(s==='не наложен')       return `<span class="pill mid">запрет не наложен · до ${banDeadline(it)}</span>`;
  if(s==='просрочен')        return '<span class="pill high">ЗАПРЕТ НЕ НАЛОЖЕН</span>';
  if(s==='подлежит снятию')  return '<span class="pill mid">подлежит снятию</span>';
  return '<span class="pill neutral">—</span>';
}

/* Плановый контроль — вычисляемый оверлей по датам, не статус. */
const nextSurvey = it => addMonths(it.lastSurvey, (KINDS[it.kind]||{survey:12}).survey);
const nextReval  = it => addMonths(it.lastReval,  (KINDS[it.kind]||{reval:24}).reval);

/* ТРИГГЕРЫ. Собираются из состояния; не хранятся. Триггер «недостаточность
   обеспечения» уходит во взыскание отдельным треком по причине «обеспечение» —
   он НЕ трогает риск-категорию и НЕ трогает группу платёжеспособности. */
function triggers(){
  const out = [], cs = CONTRACTS.filter(isActive);
  const seen = new Set();
  cs.forEach(c => c.credits.forEach(id => {
    if(seen.has(id)) return; seen.add(id);
    const cov = coverage(cs, id);
    if(!cov.ok) out.push({ type:'Недостаточность обеспечения', crit:'high', obj:id,
      objLbl:`${id} · ${credit(id).num}`, ctr:c.id,
      text:`Покрытие ${pct(cov.ratio)} < 120% (обеспечено ${fmt(cov.sum)} из ${fmt(cov.amount*COVER_MIN)} требуемых)`,
      act:'Открыть трек взыскания по обеспечению / догрузить или заменить предмет' });
  }));
  ITEMS.forEach(it => {
    if(it.lost) out.push({ type:'Утрата предмета', crit:'high', obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:'Предмет не найден по акту обследования — стоимость исключена из покрытия', act:'Замена предмета доп соглашением' });
    if(it.needReval) out.push({ type:'Требуется досрочная переоценка', crit:'mid', obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:'Обследование зафиксировало ухудшение состояния', act:'Провести переоценку' });
    /* ЗАЛОГ БЕЗ ЗАПРЕТА — дыра в обеспечении: залогодатель может продать предмет
       без нашего ведома. Это дефект оформления, а не формальность. */
    if(banMissing(it)) out.push({ type:'Залог без запрета на отчуждение', crit: banOverdue(it) ? 'high' : 'mid',
      obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:`Договор(ы) ${banContracts(it).join(', ')} зарегистрированы, запрет в «${organOf(it)}» не наложен. Срок: до ${banDeadline(it)}${banOverdue(it) ? ` · ПРОСРОЧЕН на ${Math.abs(daysLeft(banDeadline(it)))} дн.` : ''}`,
      act:`Наложить запрет на отчуждение в «${organOf(it)}»` });
    /* ЗАПРЕТ ЖИВ, а доли обнулились — имущество клиента заблокировано без основания. */
    if(banStale(it)) out.push({ type:'Требуется снятие запрета', crit:'mid',
      obj:it.id, objLbl:`${it.id} · ${it.name}`,
      text:`Доли по предмету обнулились (кредит погашен / предмет выведен), запрет ${it.ban.regNo} от ${it.ban.date} продолжает действовать в «${organOf(it)}»`,
      act:`Снять запрет в «${organOf(it)}»` });
    if(isOverdue(nextSurvey(it))) out.push({ type:'Просрочен контроль: обследование', crit:'mid', obj:it.id,
      objLbl:`${it.id} · ${it.name}`, text:`Плановая дата ${nextSurvey(it)} (просрочка ${Math.abs(daysLeft(nextSurvey(it)))} дн.)`, act:'Провести обследование' });
    if(isOverdue(nextReval(it))) out.push({ type:'Просрочен контроль: переоценка', crit:'mid', obj:it.id,
      objLbl:`${it.id} · ${it.name}`, text:`Плановая дата ${nextReval(it)} (просрочка ${Math.abs(daysLeft(nextReval(it)))} дн.)`, act:'Провести переоценку' });
  });
  CONTRACTS.filter(c=>c.status==='На рассмотрении комиссии').forEach(c => out.push({
    type:'Регистрация заблокирована', crit:'high', obj:c.id, objLbl:`${c.id} · ${clientName(c.inn)}`,
    text:'Контрольный гейт 120% не пройден — договор ждёт решения комиссии по залогу',
    act:'Решение комиссии: вернуть на доработку либо допустить с обоснованием' }));
  return out;
}

function minCoverage(c){
  const cs = ctx(isActive(c) ? null : c);
  const list = c.credits.map(id => coverage(cs, id).ratio);
  return list.length ? Math.min(...list) : 0;
}
function ctrlBadge(it){
  const s = isOverdue(nextSurvey(it)), r = isOverdue(nextReval(it));
  if(s && r) return '<span class="pill high">обслед. + переоц.</span>';
  if(s) return '<span class="pill mid">обследование просрочено</span>';
  if(r) return '<span class="pill mid">переоценка просрочена</span>';
  if(it.needReval) return '<span class="pill mid">нужна переоценка</span>';
  return '<span class="pill low">по графику</span>';
}
function rowsItems(){
  return ITEMS.map(it => {
    const st = lienStatus(it);
    return { id: it.id, sort:{ id:it.id, kind:it.kind, name:it.name, pledger:clientName(it.pledger),
        appraised:it.appraised, k:coefOf(it.kind), pledge:pledgeValue(it), alloc:allocatedLegal(it.id)+allocatedDraft(it.id), avail:availableOf(it), st },
      cells:[ it.id, it.kind, esc(it.name), esc(clientName(it.pledger)),
        `<span class="numcell">${fmt(it.appraised)}</span>`,
        `<span class="numcell">${coefOf(it.kind).toString().replace('.',',')}</span>`,
        `<span class="numcell">${fmt(pledgeValue(it))}${it.override ? (isOverAbove(it) ? ' <span class="pill high" title="override выше расчётной">override ↑</span>' : ' <span class="pill neutral">override</span>') : ''}</span>`,
        `<span class="numcell">${fmt(allocatedLegal(it.id)+allocatedDraft(it.id))}</span>`,
        `<span class="numcell">${fmt(availableOf(it))}</span>`,
        `<span class="axis"><span class="pill ${lienCls(st)}">${st}</span>${banPill(it)}</span>`,
        ctrlBadge(it) ] };
  });
}
function rowsContracts(){
  return CONTRACTS.map(c => {
    const mc = minCoverage(c);
    const stPill = c.status===ACTIVE ? 'low' : c.status==='Оформляется' ? 'neutral' : c.status==='Закрыт' ? 'neutral' : 'high';
    return { id:c.id, sort:{ id:c.id, no:c.no, inn:clientName(c.inn), status:c.status,
        items:new Set(c.allocs.map(a=>a.item)).size, credits:c.credits.length, mc, add:c.addenda.length },
      cells:[ c.id, c.no ? esc(c.no) : '<span style="color:var(--text-placeholder)">— не зарегистрирован —</span>',
        esc(clientName(c.inn)),
        `<span class="pill ${stPill}">${c.status}</span>${c.undercovered ? ' <span class="pill high">допуск &lt;120%</span>' : ''}`,
        `<span class="numcell">${new Set(c.allocs.map(a=>a.item)).size}</span>`,
        `<span class="numcell">${c.credits.length}</span>`,
        c.status==='Закрыт' ? '—' : `<span class="pill ${mc>=COVER_MIN?'low':'high'}">${pct(mc)}</span>`,
        `<span class="numcell">${c.addenda.length}</span>` ] };
  });
}
function rowsMonitor(){
  return triggers().map((t,i) => ({ id:t.obj, kind:t.type, raw:t,
    sort:{ crit:t.crit==='high'?0:1, type:t.type, obj:t.objLbl },
    cells:[ `<span class="pill ${t.crit==='high'?'high':'mid'}">${t.crit==='high'?'высокая':'средняя'}</span>`,
      esc(t.type), esc(t.objLbl), esc(t.text), esc(t.act) ] }));
}

function renderList(){
  document.getElementById('segBar').innerHTML = SEGS.map(s =>
    `<button class="${reg===s.k?'on':''}" onclick="switchReg('${s.k}')">${s.t}<span class="cnt">${s.n()}</span></button>`).join('');
  document.getElementById('btnNewLbl').textContent = reg==='contracts' ? 'Новый залоговый договор' : 'Новый предмет залога';
  document.getElementById('btnNew').style.display = reg==='monitor' ? 'none' : 'inline-flex';
  document.getElementById('listNote').innerHTML = `<p class="section-note" style="margin:0">${NOTES[reg]}</p>`;

  const heads = HEADS[reg];
  document.getElementById('listHead').innerHTML = heads.map((h,i)=>`<th onclick="sortBy(${i})">${h}<span class="sort">↕</span></th>`).join('');
  let rows = reg==='items' ? rowsItems() : reg==='contracts' ? rowsContracts() : rowsMonitor();
  if(sortKey !== null){
    const keys = Object.keys(rows.length ? rows[0].sort : {});
    const k = keys[sortKey];
    if(k) rows = [...rows].sort((a,b)=>{
      const x=a.sort[k], y=b.sort[k];
      return (typeof x === 'number' ? (x-y) : String(x).localeCompare(String(y),'ru')) * sortDir;
    });
  }
  document.getElementById('listBody').innerHTML = rows.map(r=>`
    <tr data-id="${r.id}" onclick="selectRow('${r.id}')" ondblclick="openSelected()">
      ${r.cells.map(c=>`<td>${c}</td>`).join('')}
    </tr>`).join('') || `<tr><td colspan="${heads.length}"><div class="cgrid-empty">Записей нет</div></td></tr>`;
  document.getElementById('pagerCount').textContent =
    reg==='items' ? ITEMS.length+' предметов' : reg==='contracts' ? CONTRACTS.length+' договоров' : triggers().length+' активных триггеров';
  document.getElementById('btnOpen').disabled = !selected;
  if(selected) document.querySelectorAll('#listBody tr').forEach(t=>t.classList.toggle('sel', t.dataset.id===selected));
}
function sortBy(i){ if(sortKey===i) sortDir*=-1; else { sortKey=i; sortDir=1; } renderList(); }
function selectRow(id){ selected = id; renderList(); }
function openSelected(){
  if(!selected) return;
  if(item(selected)) openCard('item', selected);
  else if(contract(selected)) openCard('contract', selected);
  else if(credit(selected)) toast('Переход в карточку кредита '+credit(selected).num+' (модуль «Кредиты»)');
}
function onNew(){ if(!canEdit()) return denyEdit(); reg==='contracts' ? openNewContract() : openNewItem(); }

/* ============================================================
   КАРТОЧКИ — вкладки и панели
   ============================================================ */
const TABS_ITEM = ['Основное','Стоимость и переоценки','Запрет на отчуждение','Обследования','Отнесения','История'];
const TABS_CTR  = ['Общая информация','Предметы и доли','Кредиты и покрытие','Доп соглашения','История'];
let curTab = 0;

function openCard(type, id, tab){
  cur = { type, id }; curTab = tab ?? 0;
  const tabs = type==='item' ? TABS_ITEM : TABS_CTR;
  document.getElementById('detailTabbar').innerHTML =
    tabs.map((t,i)=>`<button class="dtab${i===curTab?' active':''}" onclick="openCard('${type}','${id}',${i})">${t}</button>`).join('');
  const panels = type==='item' ? itemPanels(item(id)) : ctrPanels(contract(id));
  document.getElementById('detailPanels').innerHTML = panels[curTab];
  document.getElementById('detailFooter').innerHTML = type==='item' ? itemFooter(item(id)) : ctrFooter(contract(id));
  document.getElementById('crumbTitle').textContent = type==='item'
    ? `${id} · ${item(id).name}` : `${id} · ${contract(id).no || 'черновик'} · ${clientName(contract(id).inn)}`;
  showView('detail');
}
const kpi = (l,v,src) => `<div class="dim"><div class="dl">${l}</div><div class="dv">${v}</div><div class="src">${src}</div></div>`;
const ro  = (l,v)=>`<div class="field"><span class="flabel">${l}</span><div class="control ro"><input value="${esc(v??'')}" readonly></div></div>`;

  const p0 = `<div class="panel-wrap">${head}<div class="panel-card"><div class="f2">

  const p1 = `<div class="panel-wrap">
    <p class="section-h">Стоимость</p>

  const canPlace = banRequired(it) && !it.ban;          // есть основание, запрета ещё нет

  const cs = CONTRACTS.filter(c => (isActive(c)||isDraftish(c)) && c.allocs.some(a=>a.item===it.id));
  const active = CONTRACTS.filter(isActive);
  const arows = cs.flatMap(c => c.allocs.filter(a=>a.item===it.id).map(a=>({c,a})));
  const totAll = allocatedLegal(it.id) + allocatedDraft(it.id);
  const p4 = `<div class="panel-wrap">

    <div class="${totAll > pv + 0.005 ? 'flagline' : 'okline'}">
      <span>Инвариант: Σ долей ${fmt(totAll)} ${totAll > pv + 0.005 ? '>' : '≤'} залоговая ${fmt(pv)} ${totAll > pv + 0.005
        ? '— НАРУШЕН. Доли усечены пропорционально в расчёте покрытия (юридический объём договора не меняется), кредиты уходят в триггер «недостаточность обеспечения».'

    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Договор</th><th>Статус</th><th>Кредит</th><th class="numcell">Доля (юр.)</th><th class="numcell">Эффективная доля</th><th>Приоритет</th></tr></thead>
      <tbody>${arows.length ? arows.map(({c,a},i)=>`<tr>

        : `<tr><td colspan="6"><div class="cgrid-empty">Предмет не отнесён ни к одному кредиту — свободен целиком</div></td></tr>`}</tbody>
    </table></div></div>`;

  const p5 = `<div class="panel-wrap">
    <p class="section-h">История предмета</p>
    <p class="section-note">Аудит событий актива: регистрация, переоценки, override стоимости, запрет на отчуждение (наложение / снятие), обследования. Только чтение, по убыванию времени.</p>
    <div class="hist">${[...it.history].map(h=>`<div class="hrow"><div class="hwhen">${h.when}</div><div class="hwhat">${esc(h.what)}</div><div class="hwho">${esc(h.who)}</div></div>`).join('')}</div></div>`;

  return [p0,p1,p2,p3,p4,p5];
}
function itemFooter(it){
  return `<button class="btn btn-secondary" onclick="showView('list')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Закрыть</button>
    <div style="flex:1"></div>
    <button class="btn btn-tint" onclick="openSurvey('${it.id}')">Обследование</button>
    <button class="btn btn-tint" onclick="openReval('${it.id}')">Переоценка</button>
    ${it.ban
      ? `<button class="btn btn-tint danger" onclick="releaseBan('${it.id}')" ${allocatedLegal(it.id)===0?'':'disabled'} title="${allocatedLegal(it.id)===0?'':'Снять запрет нельзя, пока по предмету закреплены доли'}">Снять запрет</button>`
      : `<button class="btn btn-tint" onclick="openBan('${it.id}')" ${banRequired(it)?'':'disabled'} title="${banRequired(it)?'':'Наложить запрет можно только на обременённый зарегистрированным договором предмет'}">Наложить запрет</button>`}
    <button class="btn btn-primary" onclick="openOverride('${it.id}')">Изменить залоговую</button>`;
}

/* ---------- КАРТОЧКА ЗАЛОГОВОГО ДОГОВОРА ---------- */
function ctrPanels(c){
  const virtual = isActive(c) ? null : c;
  const cs = ctx(virtual);
  const gate = gateCheck(c);
  const mc = minCoverage(c);
  const items = [...new Set(c.allocs.map(a=>a.item))];
  const thirdParty = items.filter(i => item(i).pledger !== c.inn);
  /* Запреты на отчуждение — вычисляемый оверлей поверх статуса «Зарегистрирован»,
     НЕ отдельный статус договора (как «покрытие — оверлей, не статус»). Считается
     только по зарегистрированному договору: до регистрации оснований для запрета нет. */
  const banItems  = isActive(c) ? items.filter(i => banRequired(item(i))) : [];
  const banPlaced = banItems.filter(i => item(i).ban);
  const banMiss   = banItems.filter(i => !item(i).ban);

  const head = `<div class="phead">
    <div class="phead-top">
      <div class="phead-name"><span class="nm">${c.no || 'Залоговый договор (черновик)'}</span>
        <a onclick="toast('Переход в карточку заёмщика (модуль «Заёмщики»)')">${esc(clientName(c.inn))} <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg></a>
        <div class="phead-sub" style="width:100%">${c.id} · ${c.credits.length} кредит(ов) · ${items.length} предмет(ов)${thirdParty.length ? ' · <b>имущественный залог третьего лица</b>' : ''}</div>
      </div>
      <span class="phead-owner"><span class="pill ${isActive(c)?'low':c.status==='На рассмотрении комиссии'?'high':'neutral'}">${c.status}</span></span>
    </div>
    ${c.status==='На рассмотрении комиссии' ? `<div class="phead-banner danger">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>
      <span>Контрольный гейт 120% не пройден — регистрация ЗАБЛОКИРОВАНА до решения комиссии по залогу. Комиссия либо возвращает на доработку (догрузить/заменить предмет), либо допускает недообеспеченный кредит с обязательным обоснованием.</span></div>` : ''}
    ${c.undercovered ? `<div class="phead-banner warn">
      <span>Допущен комиссией с покрытием ниже 120% (${pct(c.undercovered.ratio)}). Обоснование: «${esc(c.undercovered.obosn)}» · ${esc(c.undercovered.by)} · ${c.undercovered.date}</span></div>` : ''}
    <div class="phead-dims">
      ${kpi('Статус', c.status, 'ЖЦ договора')}
      ${kpi('Мин. покрытие', c.status==='Закрыт' ? '—' : `<span class="pill ${mc>=COVER_MIN?'low':'high'}">${pct(mc)}</span>`, 'худший кредит договора · порог 120%')}
      ${kpi('Залоговая масса', fmt(c.allocs.reduce((s,a)=>s+effShare(cs, a.item, a.share),0)), 'Σ эффективных долей')}
      ${kpi('Доп соглашений', String(c.addenda.length), 'конверты версионирования')}
    </div></div>`;

  const p0 = `<div class="panel-wrap">${head}<div class="panel-card"><div class="f2">
      ${ro('Номер договора', c.no || '—')}
      ${ro('Дата договора', c.date || '—')}
      ${ro('Заёмщик (кредиты договора)', clientName(c.inn)+' · ИНН '+c.inn)}
      ${ro('Залогодатель(и)', [...new Set(items.map(i=>clientName(item(i).pledger)))].join(', ') || '—')}
      ${ro('Нотариус', c.notary || '—')}
      ${ro('№ / дата нотариальной регистрации', c.notaryNo ? c.notaryNo+' от '+c.notaryDate : '—')}
      ${ro('Залоговое рег. свидетельство', c.cert || '—')}
      ${ro('Статус', c.status)}
      ${isActive(c) ? ro('Запреты на отчуждение', `${banPlaced.length} из ${banItems.length} наложено`) : ''}
    </div>
    ${banMiss.length ? `<div class="flagline" style="margin-top:14px"><span>Оформление не завершено: по предметам ${banMiss.join(', ')} не наложен запрет на отчуждение (срок до ${banDeadline(item(banMiss[0]))}). Договор зарегистрирован, но залог не защищён от продажи.</span></div>` : ''}
    ${thirdParty.length ? `<div class="infoline" style="margin-top:14px"><span>В договоре есть предметы, чей залогодатель ≠ заёмщик (${thirdParty.map(i=>i+' · '+clientName(item(i).pledger)).join('; ')}). Это <b>имущественный залог третьего лица</b> (П3), а не поручительство (П2/П1): третье лицо отвечает только заложенным предметом. Рассматривается комиссией как залог.</span></div>` : ''}
    <p class="section-note" style="margin-top:16px">Договор — юридическая обёртка. Физические и стоимостные атрибуты предметов, а также запрет на отчуждение, живут в реестре предметов, а не здесь. Запрет — вычисляемый оверлей поверх статуса «Зарегистрирован», отдельного статуса договора он не заводит.</p>
    </div></div>`;

  const editable = isDraftish(c) && canEdit();
  const p1 = `<div class="panel-wrap">
    <p class="section-h">Предметы и доли</p>
    <p class="section-note">Предметы не копируются в договор — они <b>привязываются</b> из реестра (одна каноническая запись актива). Договор добавляет юр-обёртку и <b>долю</b> — часть залоговой стоимости, закреплённую за конкретным кредитом. Правка состава на зарегистрированном договоре возможна только доп соглашением.</p>
    ${editable ? `<div class="gtoolbar"><button class="btn btn-tint btn-sm" onclick="openAlloc('${c.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Привязать предмет</button></div>` : ''}
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Предмет</th><th>Вид</th><th>Залогодатель</th><th>Кредит</th><th class="numcell">Залоговая</th><th class="numcell">Доля</th><th class="numcell">Эффективная</th><th>Запрет</th>${editable?'<th></th>':''}</tr></thead>
      <tbody>${c.allocs.length ? c.allocs.map((a,i)=>{ const it = item(a.item); return `<tr>
        <td><span class="rowlink" onclick="openCard('item','${it.id}')">${it.id} · ${esc(it.name)}</span></td>
        <td>${esc(it.kind)}</td><td>${esc(clientName(it.pledger))}</td><td>${a.credit}</td>
        <td class="numcell">${fmt(pledgeValue(it))}</td>
        <td class="numcell">${fmt(a.share)}</td>
        <td class="numcell">${fmt(effShare(cs, it.id, a.share))}${effShare(cs, it.id, a.share) < a.share - 0.005 ? ' <span class="pill high" title="залоговая упала ниже суммы долей">усечена</span>' : ''}</td>
        <td><span class="rowlink" onclick="openCard('item','${it.id}',2)">${banPill(it)}</span></td>
        ${editable ? `<td><button class="btn btn-tint btn-sm danger" onclick="dropAlloc('${c.id}',${i})">Убрать</button></td>` : ''}</tr>`; }).join('')
        : `<tr><td colspan="${editable?9:8}"><div class="cgrid-empty">Предметы не привязаны</div></td></tr>`}</tbody>
    </table></div></div>`;

  const p2 = `<div class="panel-wrap">
    <p class="section-h">Кредиты и покрытие</p>
    <p class="section-note">Покрытие = Σ эффективных долей ÷ сумма кредита ≥ <b>120%</b>. База — <b>залоговая</b> стоимость, не оценочная. Покрытие — вычисляемый оверлей, не статус. При полном погашении кредита отнесения умирают вместе с ним <b>автоматически</b>; частичное освобождение доли на живом кредите — только доп соглашением.</p>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Кредит</th><th>Договор</th><th class="numcell">Сумма кредита</th><th class="numcell">Требуется (120%)</th><th class="numcell">Обеспечено</th><th>Покрытие</th><th>Статус кредита</th>${canEdit()&&isActive(c)?'<th></th>':''}</tr></thead>
      <tbody>${c.credits.map(id=>{ const r = gate.rows.find(x=>x.id===id), cr = credit(id); return `<tr>
        <td>${id}</td><td>${esc(cr.num)}</td>
        <td class="numcell">${fmt(cr.amount)}</td>
        <td class="numcell">${fmt(cr.amount*COVER_MIN)}</td>
        <td class="numcell">${fmt(r.sum)}</td>
        <td><span class="pill ${r.ok?'low':'high'}">${pct(r.ratio)}</span></td>
        <td>${cr.status}</td>
        ${canEdit()&&isActive(c) ? `<td>${cr.status==='Действующий' ? `<button class="btn btn-tint btn-sm" onclick="repay('${c.id}','${id}')">Отметить погашенным</button>` : '—'}</td>` : ''}</tr>`; }).join('')}</tbody>
    </table></div>
    ${gate.ok ? `<div class="okline" style="margin-top:14px"><span>Контрольный гейт 120% пройден по всем кредитам договора.</span></div>`
      : `<div class="flagline" style="margin-top:14px"><span>Гейт 120% НЕ пройден: ${gate.rows.filter(r=>!r.ok).map(r=>`${r.id} — ${pct(r.ratio)}`).join(', ')}. ${isActive(c)
        ? 'Договор уже зарегистрирован → это триггер «недостаточность обеспечения» во взыскание (трек по причине «обеспечение»). Куратор обязан догрузить/заменить предмет либо зафиксировать обоснование.'
        : 'Регистрация будет заблокирована до решения комиссии по залогу.'}</span></div>`}
    </div>`;

  const p3 = `<div class="panel-wrap">
    <p class="section-h">Доп соглашения (конверт версионирования)</p>
    <p class="section-note">Замена залога, освобождение доли, добавление кредита и закрепление переоценки — не отдельные операции, а <b>changeset</b> в одном акте. Гейт валидирует <b>чистый эффект всего пакета</b>. Эффект наступает на регистрации соглашения, не на черновике. На каждом соглашении сохраняется снимок before/after. <b>Вывод предмета</b> не блокируется наличием запрета — наоборот, после регистрации соглашения предмет с обнулившимися долями попадёт в мониторинг с задачей «требуется снятие запрета» (снятие оформляется отдельным актом в органе, автоматически не происходит).</p>
    ${isActive(c) && canEdit() ? `<div class="gtoolbar"><button class="btn btn-tint btn-sm" onclick="openDs('${c.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Новое доп соглашение</button></div>`
      : `<p class="formula">Доп соглашение доступно только на зарегистрированном договоре и только роли «Залоговый специалист».</p>`}
    ${c.addenda.length ? c.addenda.map(d=>`<div class="panel-card" style="margin-bottom:14px">
      <div class="section-h" style="font-size:16px">${d.no} от ${d.date} <span class="pill low">зарегистрировано</span></div>
      <div class="cgrid-wrap" style="margin:10px 0"><table class="cgrid">
        <thead><tr><th>Операции пакета</th></tr></thead>
        <tbody>${d.ops.map(o=>`<tr><td>${esc(o)}</td></tr>`).join('')}</tbody></table></div>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Кредит</th><th>Покрытие до</th><th>Покрытие после</th></tr></thead>
        <tbody>${d.diff.map(x=>`<tr><td>${x.id}</td><td>${x.before}</td>
          <td class="${x.up?'diff-up':'diff-dn'}">${x.after}</td></tr>`).join('')}</tbody></table></div>
      ${d.obosn ? `<div class="flagline" style="margin-top:12px"><span>Допущено комиссией ниже 120%. Обоснование: «${esc(d.obosn)}»</span></div>` : ''}
    </div>`).join('') : `<div class="cgrid-empty" style="border:1px solid var(--border-default);border-radius:4px">Доп соглашений нет</div>`}
    </div>`;

  const p4 = `<div class="panel-wrap">
    <p class="section-h">История договора</p>
    <p class="section-note">Аудит правовых событий: создание, регистрация, решения комиссии, доп соглашения, закрытие и автоматическое высвобождение долей.</p>
    <div class="hist">${[...c.history].reverse().map(h=>`<div class="hrow"><div class="hwhen">${h.when}</div><div class="hwhat">${esc(h.what)}</div><div class="hwho">${esc(h.who)}</div></div>`).join('')}</div></div>`;

  return [p0,p1,p2,p3,p4];
}
function ctrFooter(c){
  const back = `<button class="btn btn-secondary" onclick="showView('list')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Закрыть</button><div style="flex:1"></div>`;
  if(c.status==='Оформляется')
    return back + `<button class="btn btn-primary" onclick="openRegister('${c.id}')">Зарегистрировать договор</button>`;
  if(c.status==='На рассмотрении комиссии')
    return back + `<button class="btn btn-tint" onclick="openRegister('${c.id}')">Повторить проверку гейта</button>
      <button class="btn btn-primary" onclick="openCommission('${c.id}')">Решение комиссии по залогу</button>`;
  if(isActive(c))
    return back + `<button class="btn btn-primary" onclick="openDs('${c.id}')">Новое доп соглашение</button>`;
  return back;
}

/* ============================================================
   ДИАЛОГИ И ДЕЙСТВИЯ — здесь состояние РЕАЛЬНО меняется.
   Каждое действие: валидация → мутация → запись в историю → перерисовка.
   ============================================================ */
const host = () => document.getElementById('modalHost');
function modal(html){ host().innerHTML = html; host().classList.add('open'); }
function closeModal(){ host().classList.remove('open'); host().innerHTML = ''; }
const mhead = t => `<div class="modal-h"><span class="mt">${t}</span><button class="modal-x" onclick="closeModal()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>`;
const mfoot = (okLbl, okFn, okCls) => `<div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
  <button class="btn ${okCls||'btn-primary'}" onclick="${okFn}">${okLbl}</button></div>`;
const caret = () => `<span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>`;
const fin = (id,l,v,req,span) => `<div class="field${req?' req':''}${span?' col-span':''}"><span class="flabel">${l}</span>
  <div class="control"><input id="${id}" value="${esc(v??'')}"></div></div>`;
const fsel = (id,l,opts,v,span) => `<div class="field${span?' col-span':''}"><span class="flabel">${l}</span>
  <div class="control grey"><select id="${id}">${opts.map(o=>`<option value="${esc(o.v??o)}"${(o.v??o)===v?' selected':''}>${esc(o.t??o)}</option>`).join('')}</select>${caret()}</div></div>`;
const ftxt = (id,l,v) => `<div class="field col-span"><span class="flabel">${l}</span><textarea id="${id}" class="note-area">${esc(v??'')}</textarea></div>`;
const val = id => (document.getElementById(id)||{}).value ?? '';
const nowStamp = () => TODAY + ' ' + new Date().toTimeString().slice(0,5);
const hist = (o, what) => o.history.push({ when: nowStamp(), what, who: role });
function refresh(){ renderList(); if(cur) openCard(cur.type, cur.id, curTab); }
const clientOpts = () => CLIENTS.map(c=>({v:c.inn, t:c.name+' · ИНН '+c.inn}));
const nextId = (arr, pfx) => pfx + String(arr.length+1).padStart(3,'0');

/* ---------- НОВЫЙ ПРЕДМЕТ ЗАЛОГА ---------- */
function openNewItem(){
  if(!canEdit()) return denyEdit();
  modal(`<div class="modal form">${mhead('Новый предмет залога')}
    <div class="modal-b"><div class="mform">
      ${fsel('niKind','Вид залога', Object.keys(KINDS), 'Недвижимое имущество')}
      ${fin('niName','Наименование / описание','',true)}
      ${fsel('niPledger','Залогодатель (клиентский реестр)', clientOpts())}
      ${fin('niIdent','Идентификатор (кадастровый №, VIN, инв. №)','',true)}
      ${fin('niVal','Оценочная стоимость (из отчёта оценщика)','',true)}
      ${fin('niDate','Дата оценки (дд.мм.гггг)', TODAY, true)}
      ${fin('niRep','Отчёт оценщика (номер)','',true)}
    </div>
    <div class="warn-inline"><span>Залоговая стоимость <b>не вводится</b> — она производна: оценочная × коэффициент вида (справочник). Изменить её может только комиссия по залогу через override, и превышение расчётной требует обоснования.</span></div>
    </div>${mfoot('Создать','saveNewItem()')}</div>`);
}
function saveNewItem(){
  const kind = val('niKind'), name = val('niName').trim(), pledger = val('niPledger'),
        ident = val('niIdent').trim(), v = num(val('niVal')), date = val('niDate').trim(), rep = val('niRep').trim();
  if(!name || !ident || !rep) return toast('Заполните наименование, идентификатор и отчёт оценщика','warn');
  if(!(v > 0)) return toast('Оценочная стоимость должна быть положительным числом','warn');
  if(!isDate(date)) return toast('Дата оценки — в формате дд.мм.гггг','warn');
  const it = { id: nextId(ITEMS,'П-'), kind, name, pledger, ident, appraised:v, apprDate:date, apprReport:rep,
    override:null, ban:null, lost:false, realizing:false, needReval:false, everPledged:false,
    lastSurvey:date, lastReval:date,
    revals:[{date, appraised:v, report:rep, note:'первичная оценка'}],
    surveys:[], history:[] };
  hist(it, `Предмет зарегистрирован в реестре. Оценочная ${fmt(v)} → залоговая (расч.) ${fmt(calcPledge(it))}`);
  ITEMS.push(it); closeModal(); toast('Предмет '+it.id+' создан. Залоговая: '+fmt(calcPledge(it)),'ok');
  reg='items'; selected = it.id; refresh();
}

/* ---------- ПЕРЕОЦЕНКА (событие: меняет ОЦЕНОЧНУЮ; залоговая и покрытие — следом) ---------- */
function openReval(id){
  if(!canEdit()) return denyEdit();
  const it = item(id);
  modal(`<div class="modal form">${mhead('Переоценка · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fin('rvDate','Дата переоценки', TODAY, true)}
      ${fin('rvRep','Отчёт оценщика (номер)','',true)}
      ${fin('rvVal','Новая оценочная стоимость', String(it.appraised), true)}
      ${fin('rvOld','Текущая оценочная', fmt(it.appraised))}
      ${ftxt('rvNote','Примечание','')}
    </div>
    <div class="warn-inline"><span>Меняется только <b>оценочная</b>. Залоговая пересчитается сама (× ${coefOf(it.kind)})${it.override ? ', <b>но действующий override комиссии её перекрывает</b> — снимите override, чтобы переоценка вступила в силу в расчёте покрытия' : ''}. Если покрытие любого кредита упадёт ниже 120% — поднимется триггер «недостаточность обеспечения» (трек взыскания по обеспечению).</span></div>
    </div>${mfoot('Сохранить переоценку','saveReval(\''+id+'\')')}</div>`);
  document.getElementById('rvOld').readOnly = true;
}
function saveReval(id){
  const it = item(id), v = num(val('rvVal')), date = val('rvDate').trim(), rep = val('rvRep').trim(), note = val('rvNote').trim();
  if(!(v > 0)) return toast('Оценочная стоимость должна быть положительным числом','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  if(!rep) return toast('Укажите номер отчёта оценщика','warn');
  const before = CONTRACTS.filter(isActive).flatMap(c=>c.credits.map(cid=>({cid, r:coverage(CONTRACTS.filter(isActive), cid).ratio})));
  const old = it.appraised;
  it.appraised = v; it.apprDate = date; it.apprReport = rep; it.lastReval = date; it.needReval = false;
  it.revals.push({date, appraised:v, report:rep, note: note || 'переоценка'});
  hist(it, `Переоценка: оценочная ${fmt(old)} → ${fmt(v)} (${rep}). Залоговая (расч.) → ${fmt(calcPledge(it))}${it.override?' · перекрыта действующим override '+fmt(it.override.value):''}`);
  closeModal();
  const after = CONTRACTS.filter(isActive).flatMap(c=>c.credits.map(cid=>({cid, r:coverage(CONTRACTS.filter(isActive), cid).ratio})));
  const dropped = after.filter(a => a.r < COVER_MIN && (before.find(b=>b.cid===a.cid)||{r:0}).r >= COVER_MIN);
  toast('Переоценка сохранена. Залоговая: '+fmt(pledgeValue(it)),'ok');
  if(dropped.length) toast('ТРИГГЕР «недостаточность обеспечения»: покрытие упало ниже 120% по '+dropped.map(d=>d.cid).join(', ')+' → трек взыскания по обеспечению','warn');
  refresh();
}

/* ---------- OVERRIDE ЗАЛОГОВОЙ (только комиссия; > расчётной → обоснование обязательно) ---------- */
function openOverride(id){
  if(!canCommission()) return denyComm();
  const it = item(id), cp = calcPledge(it);
  modal(`<div class="modal form">${mhead('Фактическая залоговая стоимость · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fin('ovCalc','Расчётная залоговая (оценочная × '+coefOf(it.kind)+')', fmt(cp))}
      ${fin('ovVal','Фактическая залоговая (решение комиссии)', String(it.override ? it.override.value : cp), true)}
      ${ftxt('ovObosn','Обоснование (обязательно при превышении расчётной)', it.override ? it.override.obosn : '')}
    </div>
    <div class="warn-inline" id="ovWarn" style="display:none"><span>Фактическая <b>выше расчётной</b> — покрытие завышается относительно ликвидационной базы. Обоснование обязательно, запись будет помечена флагом «override ↑».</span></div>
    </div>
    <div class="modal-f">
      ${it.override ? `<button class="btn btn-tint danger" onclick="clearOverride('${id}')">Снять override</button>` : ''}
      <div style="flex:1"></div>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveOverride('${id}')">Сохранить</button>
    </div></div>`);
  document.getElementById('ovCalc').readOnly = true;
  const sync = () => { document.getElementById('ovWarn').style.display = num(val('ovVal')) > cp ? 'flex' : 'none'; };
  document.getElementById('ovVal').addEventListener('input', sync); sync();
}
function saveOverride(id){
  const it = item(id), cp = calcPledge(it), v = num(val('ovVal')), ob = val('ovObosn').trim();
  if(!(v > 0)) return toast('Стоимость должна быть положительным числом','warn');
  if(v > cp && !ob) return toast('Превышение расчётной залоговой требует обоснования — заполните поле','warn');
  const alloc = allocatedLegal(it.id) + allocatedDraft(it.id);
  if(v < alloc) toast('Внимание: новая залоговая '+fmt(v)+' МЕНЬШЕ суммы закреплённых долей '+fmt(alloc)+' — доли будут усечены в расчёте покрытия','warn');
  const old = pledgeValue(it);
  it.override = { value:v, obosn: ob, by: role, date: TODAY };
  hist(it, `Override залоговой: ${fmt(old)} → ${fmt(v)} (расчётная ${fmt(cp)})${v > cp ? ' — ВЫШЕ расчётной, обоснование: «'+ob+'»' : ' — не выше расчётной'}`);
  closeModal(); toast('Залоговая стоимость установлена: '+fmt(v),'ok'); refresh();
}
function clearOverride(id){
  const it = item(id), old = pledgeValue(it);
  it.override = null;
  hist(it, `Override снят: залоговая ${fmt(old)} → ${fmt(calcPledge(it))} (снова производная)`);
  closeModal(); toast('Override снят, залоговая снова производна','ok'); refresh();
}

/* ---------- ЗАПРЕТ НА ОТЧУЖДЕНИЕ: НАЛОЖЕНИЕ / СНЯТИЕ (наш шаг оформления) ----------
   Наложение — только на предмет, обременённый зарегистрированным договором (есть
   основание). Снятие — под гейтом: пока живы доли, снять нельзя. Оба действия —
   роль «Залоговый специалист». Залоговую ось не трогают (оси независимы). */
function openBan(id){
  if(!canEdit()) return denyEdit();
  const it = item(id);
  /* Предусловие: наложить запрет на свободный предмет нельзя — оснований нет. */
  if(!banRequired(it)) return toast('Наложить запрет нельзя: предмет не обременён ни одним зарегистрированным договором — оснований нет','warn');
  if(it.ban) return toast('Запрет уже наложен: '+it.ban.regNo+'. При перезалоге он дополняется основанием автоматически при регистрации договора','warn');
  const grounds = banContracts(it);
  modal(`<div class="modal form">${mhead('Наложение запрета на отчуждение · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fin('bnOrgan','Регистрирующий орган (предзаполнен по виду залога)', organOf(it), true, true)}
      ${fin('bnReg','Рег. № запрета в органе','',true)}
      ${fin('bnDate','Дата наложения', TODAY, true)}
      ${ro('Договоры-основания (все зарегистрированные)', grounds.join(', '))}
    </div>
    <div class="warn-inline"><span>Запрет накладывается на <b>вещь</b> в регистрирующем органе: после него залогодатель не сможет продать предмет без нашего ведома. Основания (${grounds.join(', ')}) заполняются автоматически. Запись уйдёт в историю предмета и каждого договора-основания. Срок наложения по регламенту: до ${banDeadline(it)}.</span></div>
    </div>${mfoot('Наложить запрет','saveBan(\''+id+'\')','btn-primary')}</div>`);
}
function saveBan(id){
  const it = item(id), organ = val('bnOrgan').trim(), regNo = val('bnReg').trim(), date = val('bnDate').trim();
  if(!banRequired(it)) return toast('Оснований для запрета нет','warn');
  if(!organ) return toast('Укажите регистрирующий орган','warn');
  if(!regNo) return toast('Укажите рег. № запрета','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  const grounds = banContracts(it);
  it.ban = { organ, regNo, date, contracts: grounds, pendingRelease:false };
  hist(it, `Наложен запрет на отчуждение: ${organ} · ${regNo} от ${date} (основания ${grounds.join(', ')}). Предмет не может быть продан без нашего ведома.`);
  grounds.forEach(cid => hist(contract(cid), `По предмету ${it.id} наложен запрет на отчуждение: ${organ} · ${regNo} от ${date}`));
  closeModal(); toast('Запрет на отчуждение наложен — залог защищён от продажи','ok'); refresh();
}
function releaseBan(id){
  if(!canEdit()) return denyEdit();
  const it = item(id);
  if(!it.ban) return toast('Запрет не наложен','warn');
  /* ГЕЙТ СНЯТИЯ: нельзя снять, пока по предмету живы доли. */
  const alloc = allocatedLegal(it.id);
  if(alloc > 0){
    const cs = CONTRACTS.filter(c=>isActive(c) && c.allocs.some(a=>a.item===it.id)).map(c=>c.id);
    return toast(`Снятие запрета невозможно: по предмету закреплены доли на ${fmt(alloc)} по договорам ${cs.join(', ')}. Сначала погасите кредит или выведите предмет доп соглашением`,'warn');
  }
  modal(`<div class="modal form narrow">${mhead('Снятие запрета на отчуждение · '+it.id)}
    <div class="modal-b"><div class="mform one">
      ${fin('rbAct','Акт / основание снятия','',true)}
      ${fin('rbDate','Дата снятия', TODAY, true)}
      ${ro('Орган', it.ban.organ)}
    </div>
    <div class="warn-inline"><span>Действующий запрет: ${esc(it.ban.organ)} · ${esc(it.ban.regNo)} от ${it.ban.date}. Доли по предмету обнулились — снятие допустимо. Оформляется отдельным актом в органе.</span></div>
    </div>${mfoot('Снять запрет','saveRelease(\''+id+'\')','btn-primary')}</div>`);
}
function saveRelease(id){
  const it = item(id), act = val('rbAct').trim(), date = val('rbDate').trim();
  if(allocatedLegal(it.id) > 0) return toast('По предмету снова закреплены доли — снятие невозможно','warn');
  if(!act) return toast('Укажите акт / основание снятия','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  const was = it.ban;
  hist(it, `Запрет на отчуждение снят: ${act} от ${date} (был ${was.organ} · ${was.regNo} от ${was.date}). Предмет свободен от обременения.`);
  it.ban = null;
  closeModal(); toast('Запрет на отчуждение снят','ok'); refresh();
}

/* ---------- ОБСЛЕДОВАНИЕ (классифицированный исход ветвит действие) ---------- */
function openSurvey(id){
  if(!canEdit()) return denyEdit();
  const it = item(id);
  modal(`<div class="modal form">${mhead('Обследование предмета · '+it.id)}
    <div class="modal-b"><div class="mform">
      ${fin('svDate','Дата обследования', TODAY, true)}
      ${fin('svAct','Номер акта','',true)}
      ${fsel('svOut','Исход', ['в норме','ухудшение состояния','утрата / не найден'], 'в норме', true)}
      ${ftxt('svNote','Примечание','')}
    </div>
    <div class="warn-inline"><span><b>в норме</b> → плановая дата сдвигается на ${(KINDS[it.kind]||{}).survey} мес. · <b>ухудшение</b> → триггер досрочной переоценки · <b>утрата</b> → предмет выбыл, залоговая = 0, триггер «недостаточность обеспечения» по всем его кредитам. Обследование — наблюдение: договор оно не версионирует.</span></div>
    </div>${mfoot('Зарегистрировать акт','saveSurvey(\''+id+'\')')}</div>`);
}
function saveSurvey(id){
  const it = item(id), date = val('svDate').trim(), act = val('svAct').trim(), out = val('svOut'), note = val('svNote').trim();
  if(!act) return toast('Укажите номер акта','warn');
  if(!isDate(date)) return toast('Дата — в формате дд.мм.гггг','warn');
  it.surveys.push({date, act, outcome:out, note});
  it.lastSurvey = date;
  if(out === 'в норме'){
    it.needReval = false;
    hist(it, `Обследование ${act} от ${date}: в норме. Следующее — ${nextSurvey(it)}`);
    toast('Акт зарегистрирован. Следующее обследование: '+nextSurvey(it),'ok');
  } else if(out === 'ухудшение состояния'){
    it.needReval = true;
    hist(it, `Обследование ${act} от ${date}: ухудшение состояния → триггер досрочной переоценки`);
    toast('Триггер: требуется досрочная переоценка (вне планового цикла)','warn');
  } else {
    it.lost = true;
    hist(it, `Обследование ${act} от ${date}: УТРАТА. Предмет выбыл, залоговая = 0, доли исключены из покрытия → триггер «недостаточность обеспечения»`);
    toast('Предмет утрачен: залоговая = 0, покрытие пересчитано → триггер «недостаточность обеспечения»','warn');
  }
  closeModal(); refresh();
}

/* ---------- ПРИВЯЗКА ПРЕДМЕТА К ЧЕРНОВИКУ (перезалог считается здесь же) ---------- */
function openAlloc(cid){
  if(!canEdit()) return denyEdit();
  const c = contract(cid);
  const opts = ITEMS.filter(i=>!i.lost).map(i=>({v:i.id, t:`${i.id} · ${i.name} · залогодатель ${clientName(i.pledger)} · доступно ${fmt(availableOf(i))}`}));
  modal(`<div class="modal form">${mhead('Привязать предмет · '+cid)}
    <div class="modal-b"><div class="mform">
      ${fsel('alItem','Предмет из реестра', opts, null, true)}
      ${fsel('alCredit','Кредит договора', c.credits.map(id=>({v:id, t:id+' · '+credit(id).num+' · требуется '+fmt(credit(id).amount*COVER_MIN)})))}
      ${fin('alShare','Отнесённая доля (часть залоговой стоимости)','',true)}
    </div>
    <div class="warn-inline" id="alInfo"></div>
    </div>${mfoot('Привязать','saveAlloc(\''+cid+'\')')}</div>`);
  const sync = () => {
    const it = item(val('alItem')); if(!it) return;
    const av = availableOf(it), leg = allocatedLegal(it.id);
    document.getElementById('alInfo').innerHTML = `<span>Залоговая ${fmt(pledgeValue(it))} · уже обременено действующими договорами ${fmt(leg)} · <b>доступно ${fmt(av)}</b>.
      ${leg > 0 ? 'Это <b>перезалог</b>: новый договор берёт остаточную стоимость того же предмета (Д старше — приоритет по дате регистрации).' : ''}
      Инвариант: Σ долей предмета ≤ залоговая стоимость. Доля больше доступной не будет принята.
      ${it.ban ? `<br>По предмету уже действует запрет ${esc(it.ban.regNo)} — при регистрации договора он будет дополнен новым основанием, повторное наложение не требуется.` : ''}</span>`;
    document.getElementById('alShare').value = document.getElementById('alShare').value || String(Math.min(av, credit(val('alCredit')).amount*COVER_MIN));
  };
  document.getElementById('alItem').addEventListener('change', ()=>{ document.getElementById('alShare').value=''; sync(); });
  document.getElementById('alCredit').addEventListener('change', ()=>{ document.getElementById('alShare').value=''; sync(); });
  sync();
}
function saveAlloc(cid){
  const c = contract(cid), it = item(val('alItem')), cr = val('alCredit'), share = num(val('alShare'));
  if(!(share > 0)) return toast('Доля должна быть положительным числом','warn');
  const av = availableOf(it);
  if(share > av + 0.005)
    return toast('Доля '+fmt(share)+' превышает доступную залоговую стоимость '+fmt(av)+' — инвариант Σ долей ≤ залоговая нарушен','warn');
  c.allocs.push({ item: it.id, credit: cr, share });
  it.everPledged = true;
  hist(c, `Привязан предмет ${it.id} под ${cr}: доля ${fmt(share)} (доступно было ${fmt(av)})`);
  hist(it, `Отнесение к ${cr} по договору ${c.id}: доля ${fmt(share)}`);
  closeModal(); toast('Предмет привязан','ok'); refresh();
}
function dropAlloc(cid, idx){
  const c = contract(cid), a = c.allocs[idx];
  c.allocs.splice(idx,1);
  hist(c, `Отвязан предмет ${a.item} (${a.credit}, доля ${fmt(a.share)}) — правка черновика`);
  toast('Предмет отвязан от черновика','ok'); refresh();
}

/* ---------- РЕГИСТРАЦИЯ ДОГОВОРА (контрольный гейт 120%) ---------- */

        ${fin('rgNotaryNo','№ нотариальной регистрации','',true)}

        ${fin('rgCert','Залоговое рег. свидетельство','',true)}
      </div>` : ''}

         <button class="btn btn-primary" onclick="toCommission('${cid}')">Направить в комиссию по залогу</button></div>`}
    </div>`);
