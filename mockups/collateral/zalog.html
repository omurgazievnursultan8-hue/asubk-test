/* Постобработка запрета при переводе договора в «Зарегистрирован».
   Запрет — действие во внешнем органе; сам мы его не создаём. Если запрет по
   предмету уже есть (перезалог) — договор добавляется в основания. Если нет —
   предмет остаётся без запрета и немедленно поднимает триггер «залог без запрета»
   с дедлайном (нотар. дата + 5 раб. дней). Возвращает список предметов без запрета. */
function afterRegister(c){
  const its = [...new Set(c.allocs.map(a=>a.item))], missing = [];
  its.forEach(iid => { const it = item(iid);
    if(it.ban){
      if(!it.ban.contracts.includes(c.id)){
        it.ban.contracts.push(c.id);
        hist(it, `Перезалог: договор ${c.id} добавлен в основания действующего запрета ${it.ban.regNo} (повторное наложение не требуется)`);
        hist(c, `По предмету ${iid} действует запрет ${it.ban.regNo} — договор добавлен в его основания (повторное наложение не требуется)`);
      }
    } else missing.push(it);
  });
  return missing;
}
function doRegister(cid){
  const c = contract(cid);
  const breach = invariantBreaches(c);
  if(breach.length) return toast('Инвариант нарушен по '+breach.map(b=>b.id).join(', ')+' — Σ долей превышает залоговую стоимость','warn');
  const gate = gateCheck(c);
  if(!gate.ok) return toast('Гейт 120% не пройден','warn');
  const no = val('rgNo').trim(), date = val('rgDate').trim(), notary = val('rgNotary').trim(),
        nno = val('rgNotaryNo').trim(), ndate = val('rgNotaryDate').trim(), cert = val('rgCert').trim();
  if(!no || !notary || !nno || !cert) return toast('Заполните все юридические реквизиты','warn');
  if(!isDate(date) || !isDate(ndate)) return toast('Даты — в формате дд.мм.гггг','warn');
  Object.assign(c, { no, date, notary, notaryNo:nno, notaryDate:ndate, cert, status:ACTIVE });
  c.allocs.forEach(a => { item(a.item).everPledged = true; });
  hist(c, `Договор зарегистрирован (${no}). Покрытие: ${gate.rows.map(r=>r.id+' — '+pct(r.ratio)).join(', ')}. С этого момента предметы юридически обременены.`);
  const missing = afterRegister(c);
  closeModal(); toast('Договор зарегистрирован. Гейт 120% пройден','ok');
  if(missing.length) toast(`Наложите запрет на отчуждение в «${organOf(missing[0])}» до ${banDeadline(missing[0])} — до этого залог не защищён от продажи`,'warn');
  refresh();
}
function toCommission(cid){
  const c = contract(cid), gate = gateCheck(c);
  c.status = 'На рассмотрении комиссии';
  hist(c, `Регистрация заблокирована контрольным гейтом: ${gate.rows.filter(r=>!r.ok).map(r=>r.id+' — '+pct(r.ratio)).join(', ')}. Направлено в комиссию по залогу.`);
  closeModal(); toast('Договор направлен в комиссию по залогу','warn'); refresh();
}

/* ---------- РЕШЕНИЕ КОМИССИИ ПО ЗАЛОГУ (обоснование обязательно для допуска) ---------- */
function openCommission(cid){
  if(!canCommission()) return denyComm();
  const c = contract(cid), gate = gateCheck(c);
  const bad = gate.rows.filter(r=>!r.ok);
  modal(`<div class="modal form">${mhead('Решение комиссии по залогу · '+cid)}
    <div class="modal-b">
      <div class="flagline"><span>Недообеспечение: ${bad.map(r=>`${r.id} — ${pct(r.ratio)} (не хватает ${fmt(r.amount*COVER_MIN - r.sum)})`).join('; ')}</span></div>
      <div class="mform one">
        ${fsel('cmDec','Решение', [
          {v:'return', t:'Вернуть на доработку — догрузить / заменить предмет'},
          {v:'admit',  t:'Допустить недообеспеченный кредит (с обоснованием)'} ], 'return')}
        ${ftxt('cmObosn','Обоснование (обязательно для допуска)','')}
      </div>
      <div class="warn-inline"><span>Допуск ниже 120% — осознанное решение по бюджетным средствам: обоснование фиксируется в договоре и в истории, договор помечается флагом «допуск &lt;120%». Тот же паттерн обязательного обоснования, что у основной кредитной комиссии.</span></div>
    </div>${mfoot('Провести решение','saveCommission(\''+cid+'\')')}</div>`);
}
function saveCommission(cid){
  const c = contract(cid), dec = val('cmDec'), ob = val('cmObosn').trim(), gate = gateCheck(c);
  if(dec === 'return'){
    c.status = 'Оформляется';
    hist(c, `Комиссия по залогу: возврат на доработку${ob ? ' — '+ob : ''}`);
    closeModal(); toast('Возвращено на доработку','ok'); return refresh();
  }
  if(!ob) return toast('Допуск ниже 120% требует обоснования','warn');
  const no = 'ЗД-' + TODAY.slice(6) + '/' + c.id.slice(2) + '-1';
  Object.assign(c, { status:ACTIVE, no: c.no || no, date: c.date || TODAY,
    notary: c.notary || 'Нотариус (реквизиты уточняются)', notaryNo: c.notaryNo || 'НР-' + TODAY.slice(6) + '/0000',
    notaryDate: c.notaryDate || TODAY, cert: c.cert || 'ЗС-' + TODAY.slice(6) + '/0000',
    undercovered: { ratio: Math.min(...gate.rows.map(r=>r.ratio)), obosn: ob, by: role, date: TODAY } });
  c.allocs.forEach(a => { item(a.item).everPledged = true; });
  hist(c, `Комиссия по залогу: ДОПУЩЕН недообеспеченный кредит (${gate.rows.filter(r=>!r.ok).map(r=>r.id+' — '+pct(r.ratio)).join(', ')}). Обоснование: «${ob}». Договор зарегистрирован.`);
  const missing = afterRegister(c);
  closeModal(); toast('Комиссия допустила договор с покрытием ниже 120% — флаг зафиксирован','warn');
  if(missing.length) toast(`Наложите запрет на отчуждение в «${organOf(missing[0])}» до ${banDeadline(missing[0])} — до этого залог не защищён от продажи`,'warn');
  refresh();
}

/* ---------- ДОП СОГЛАШЕНИЕ — CHANGESET (конверт версионирования) ---------- */
let ds = { cid:null, ops:[] };
function openDs(cid){
  if(!canEdit()) return denyEdit();
  ds = { cid, ops: [] };
  renderDs();
}
function applyOps(c, ops){
  const v = JSON.parse(JSON.stringify(c));
  ops.forEach(o => {
    if(o.type==='out')    v.allocs = v.allocs.filter(a => a.item !== o.item);
    if(o.type==='in')     v.allocs.push({ item:o.item, credit:o.credit, share:o.share });
    if(o.type==='share'){ const a = v.allocs.find(a => a.item===o.item && a.credit===o.credit); if(a) a.share = o.share; }
    if(o.type==='credit' && !v.credits.includes(o.credit)) v.credits.push(o.credit);
  });
  return v;
}
/* Блокируем только те нарушения инварианта, которые пакет СОЗДАЁТ или УСУГУБЛЯЕТ.
   Уже существующее нарушение (доля закреплена нотариально, а переоценка уронила стоимость)
   блокировать нельзя — иначе доп соглашение, которое его лечит, само окажется запрещено. */
function newBreaches(c, v){
  const base = {}; invariantBreaches(c).forEach(b => base[b.id] = b.alloc);
  return invariantBreaches(v).filter(b => !(b.id in base) || b.alloc > base[b.id] + 0.005);
}
const opText = o =>
  o.type==='out'    ? `Вывод предмета ${o.item} · ${item(o.item).name} (снимаются все его доли в договоре)` :
  o.type==='in'     ? `Ввод предмета ${o.item} · ${item(o.item).name} под ${o.credit}, доля ${fmt(o.share)}` :
  o.type==='share'  ? `Правка доли ${o.item} / ${o.credit}: → ${fmt(o.share)}` :
                      `Добавление кредита ${o.credit} · ${credit(o.credit).num} в договор (перекрёстное обеспечение)`;

function renderDs(){
  const c = contract(ds.cid);
  const v = applyOps(c, ds.ops);
  const before = gateCheck(c), after = gateCheck(v);
  const breach = newBreaches(c, v);
  const inCtr  = [...new Set(v.allocs.map(a=>a.item))];
  const rows = after.rows.map(r => {
    const b = before.rows.find(x=>x.id===r.id);
    return `<tr><td>${r.id}</td><td>${b ? pct(b.ratio) : '—'}</td>
      <td class="${!b || r.ratio >= b.ratio ? 'diff-up':'diff-dn'}">${pct(r.ratio)}</td>
      <td><span class="pill ${r.ok?'low':'high'}">${r.ok?'≥120%':'<120%'}</span></td></tr>`; }).join('');

  const outOpts   = inCtr.map(i=>({v:i, t:`${i} · ${item(i).name}${item(i).ban?' — есть запрет на отчуждение (после вывода потребует снятия)':''}`}));
  /* Предметы пакета, которые выводятся и по которым сейчас действует запрет:
     вывод не блокируется, но породит задачу снять запрет в органе. */
  const outBanned = ds.ops.filter(o=>o.type==='out' && item(o.item).ban).map(o=>o.item);
  const inOpts    = ITEMS.filter(i=>!i.lost).map(i=>({v:i.id, t:`${i.id} · ${i.name} · доступно ${fmt(availableOf(i))}`}));
  const shareOpts = v.allocs.map((a,i)=>({v:i, t:`${a.item} / ${a.credit} · текущая доля ${fmt(a.share)}`}));
  const credOpts  = CREDITS.filter(cr=>cr.inn===c.inn && cr.status==='Действующий' && !v.credits.includes(cr.id))
                           .map(cr=>({v:cr.id, t:`${cr.id} · ${cr.num} · требуется ${fmt(cr.amount*COVER_MIN)}`}));

  modal(`<div class="modal">${mhead('Доп соглашение к '+(c.no||c.id)+' — пакет изменений (changeset)')}
    <div class="modal-b">
      <p class="section-note">Одно соглашение несёт ≥1 операцию и валидируется по <b>чистому эффекту всего пакета</b> (замена = вывод + ввод в одном акте, иначе между двумя соглашениями предмет повис бы без обеспечения). Эффект наступает <b>на регистрации</b>, не на черновике.</p>

      <div class="mform">
        ${fsel('dsType','Операция', [
          {v:'out',    t:'Вывод предмета'},
          {v:'in',     t:'Ввод предмета'},
          {v:'share',  t:'Правка доли'},
          {v:'credit', t:'Добавить кредит в договор'} ], 'in')}
        <div class="field"><span class="flabel">Параметры</span><div id="dsParams"></div></div>
      </div>
      <div class="gtoolbar" style="margin-top:10px"><button class="btn btn-tint btn-sm" onclick="dsAdd()">Добавить операцию в пакет</button></div>

      <p class="section-h" style="font-size:16px;margin-top:10px">Пакет</p>
      <div class="ops-list">${ds.ops.length ? ds.ops.map((o,i)=>`<div class="op-row"><span class="op-t">${esc(opText(o))}</span>
        <button class="btn btn-tint btn-sm danger" onclick="dsDel(${i})">Убрать</button></div>`).join('')
        : `<div class="op-empty">Пакет пуст — добавьте хотя бы одну операцию</div>`}</div>

      ${outBanned.length ? `<div class="warn-inline" style="margin-top:10px"><span>Вывод ${outBanned.map(i=>`предмета ${i}`).join(', ')} потребует СНЯТИЯ запрета на отчуждение в «${esc(organOf(item(outBanned[0])))}». После регистрации соглашения предмет попадёт в мониторинг с задачей «требуется снятие запрета» — снятие оформляется отдельным актом в органе, автоматически не происходит.</span></div>` : ''}

      <p class="section-h" style="font-size:16px;margin-top:14px">Снимок before / after (чистый эффект пакета)</p>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Кредит</th><th>Покрытие до</th><th>Покрытие после</th><th>Гейт</th></tr></thead>
        <tbody>${rows}</tbody></table></div>

      ${breach.length ? `<div class="flagline" style="margin-top:12px"><span>Инвариант нарушен: по ${breach.map(b=>`${b.id} (Σ долей ${fmt(b.alloc)} > залоговая ${fmt(b.pledge)})`).join('; ')}. Пакет не может быть зарегистрирован.</span></div>` : ''}
      ${!breach.length && !after.ok ? `<div class="flagline" style="margin-top:12px"><span>Чистый эффект пакета роняет покрытие ниже 120% (${after.rows.filter(r=>!r.ok).map(r=>r.id+' — '+pct(r.ratio)).join(', ')}). Регистрация блокируется — тот же гейт, что при регистрации основного договора. Допуск возможен только решением комиссии по залогу с обоснованием.</span>
        </div>${canCommission() ? ftxt('dsObosn','Обоснование комиссии по залогу (для допуска ниже 120%)','') : '<p class="formula">Смените роль на «Комиссия по залогу», чтобы допустить пакет с обоснованием.</p>'}` : ''}
      ${!breach.length && after.ok ? `<div class="okline" style="margin-top:12px"><span>Чистый эффект пакета проходит гейт 120% по всем кредитам договора.</span></div>` : ''}
    </div>
    <div class="modal-f">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" ${(!ds.ops.length || breach.length || (!after.ok && !canCommission())) ? 'disabled' : ''}
        onclick="dsRegister()">Зарегистрировать доп соглашение</button>
    </div></div>`);

  window.__dsOpts = { outOpts, inOpts, shareOpts, credOpts };
  document.getElementById('dsType').addEventListener('change', dsParams);
  dsParams();
}
function dsParams(){
  const t = val('dsType'), o = window.__dsOpts, box = document.getElementById('dsParams');
  const S = (id,opts) => `<div class="control grey" style="margin-bottom:8px"><select id="${id}">${opts.length ? opts.map(x=>`<option value="${esc(x.v)}">${esc(x.t)}</option>`).join('') : '<option value="">— нет доступных —</option>'}</select>${caret()}</div>`;
  const I = (id,ph) => `<div class="control"><input id="${id}" placeholder="${ph}"></div>`;
  box.innerHTML =
    t==='out'    ? S('dsItem', o.outOpts) :
    t==='in'     ? S('dsItem', o.inOpts) + S('dsCredit', contract(ds.cid).credits.map(id=>({v:id,t:id+' · '+credit(id).num}))) + I('dsShare','Доля') :
    t==='share'  ? S('dsIdx', o.shareOpts) + I('dsShare','Новая доля') :
                   S('dsCredit', o.credOpts);
}
function dsAdd(){
  const t = val('dsType'), c = contract(ds.cid);
  if(t==='out'){
    const id = val('dsItem'); if(!id) return toast('Нет предметов для вывода','warn');
    ds.ops.push({ type:'out', item:id });
  }
  if(t==='in'){
    const id = val('dsItem'), cr = val('dsCredit'), sh = num(val('dsShare'));
    if(!id || !cr) return toast('Выберите предмет и кредит','warn');
    if(!(sh > 0)) return toast('Доля должна быть положительным числом','warn');
    ds.ops.push({ type:'in', item:id, credit:cr, share:sh });
  }
  if(t==='share'){
    const i = Number(val('dsIdx')), sh = num(val('dsShare'));
    const v = applyOps(c, ds.ops), a = v.allocs[i];
    if(!a) return toast('Выберите отнесение','warn');
    if(!(sh >= 0)) return toast('Доля должна быть числом ≥ 0','warn');
    ds.ops.push({ type:'share', item:a.item, credit:a.credit, share:sh });
  }
  if(t==='credit'){
    const cr = val('dsCredit'); if(!cr) return toast('Нет доступных кредитов этого заёмщика','warn');
    ds.ops.push({ type:'credit', credit:cr });
  }
  renderDs();
}
function dsDel(i){ ds.ops.splice(i,1); renderDs(); }
function dsRegister(){
  const c = contract(ds.cid), v = applyOps(c, ds.ops);
  if(newBreaches(c, v).length) return toast('Инвариант нарушен — пакет отклонён','warn');
  const before = gateCheck(c), after = gateCheck(v);
  let obosn = '';
  if(!after.ok){
    if(!canCommission()) return toast('Гейт не пройден: допуск возможен только комиссией по залогу','warn');
    obosn = val('dsObosn').trim();
    if(!obosn) return toast('Допуск ниже 120% требует обоснования','warn');
  }
  const no = 'ДС-' + String(c.addenda.length+1).padStart(2,'0') + '/' + TODAY.slice(6);
  const diff = after.rows.map(r => {
    const b = before.rows.find(x=>x.id===r.id);
    return { id:r.id, before: b ? pct(b.ratio) : '—', after: pct(r.ratio), up: !b || r.ratio >= (b ? b.ratio : 0) };
  });
  c.addenda.push({ no, date: TODAY, ops: ds.ops.map(opText), diff, obosn });
  const touched = [...new Set(c.allocs.map(a=>a.item))];   // предметы договора ДО применения пакета
  c.allocs = v.allocs; c.credits = v.credits;
  c.allocs.forEach(a => { item(a.item).everPledged = true; });
  /* Для каждого затронутого предмета, у которого доли обнулились и есть запрет —
     он подлежит снятию. Само снятие — акт в органе, молча в коде не снимаем. */
  touched.forEach(iid => { const it = item(iid);
    if(it.ban && !it.ban.pendingRelease && allocatedLegal(iid) === 0){
      it.ban.pendingRelease = true;
      hist(it, `Предмет выведен доп соглашением ${no} — запрет на отчуждение ${it.ban.regNo} подлежит снятию в «${organOf(it)}» (снятие оформляется актом)`);
    }
  });
  if(!after.ok) c.undercovered = { ratio: Math.min(...after.rows.map(r=>r.ratio)), obosn, by: role, date: TODAY };
  hist(c, `Доп соглашение ${no} зарегистрировано (${ds.ops.length} операц.): ${ds.ops.map(opText).join(' · ')}. Покрытие после: ${after.rows.map(r=>r.id+' — '+pct(r.ratio)).join(', ')}${obosn ? '. Допущено комиссией ниже 120%: «'+obosn+'»' : ''}`);
  closeModal(); toast('Доп соглашение '+no+' зарегистрировано — изменения вступили в силу','ok');
  ds = { cid:null, ops:[] }; refresh();
}

/* ---------- ПОГАШЕНИЕ КРЕДИТА → АВТОМАТИЧЕСКОЕ ВЫСВОБОЖДЕНИЕ ДОЛЕЙ (§4.2) ---------- */
function repay(cid, creditId){
  if(!canEdit()) return denyEdit();
  const cr = credit(creditId);
  modal(`<div class="modal form narrow">${mhead('Полное погашение кредита · '+creditId)}
    <div class="modal-b">
      <div class="warn-inline"><span>Полное погашение — единственный случай <b>автоматического</b> высвобождения: отнесения (предмет ↔ ${creditId}) умирают вместе с кредитом во всех договорах, остаток предмета растёт сам. Частичное погашение долю НЕ уменьшает — только доп соглашение (нотариально заверенный договор не должен молча усыхать).</span></div>
      <p class="section-note">Кредит ${creditId} · ${esc(cr.num)} · сумма ${fmt(cr.amount)}. Если это последний действующий кредит договора — договор будет закрыт, предметы освобождены.</p>
    </div>${mfoot('Отметить погашенным','doRepay(\''+cid+'\',\''+creditId+'\')','btn-success')}</div>`);
}
function doRepay(cid, creditId){
  const cr = credit(creditId);
  cr.status = 'Погашен';
  const touched = new Set();
  CONTRACTS.forEach(c => {
    const gone = c.allocs.filter(a=>a.credit===creditId);
    if(!gone.length) return;
    gone.forEach(a => touched.add(a.item));
    c.allocs = c.allocs.filter(a=>a.credit!==creditId);
    hist(c, `Кредит ${creditId} полностью погашен → автоматически высвобождены доли: ${gone.map(a=>a.item+' ('+fmt(a.share)+')').join(', ')}`);
    gone.forEach(a => hist(item(a.item), `Доля ${fmt(a.share)} по ${creditId} высвобождена автоматически (кредит погашен). Доступно: ${fmt(availableOf(item(a.item)))}`));
    const live = c.credits.filter(id => credit(id).status === 'Действующий');
    if(!live.length && isActive(c)){
      c.allocs.forEach(a => touched.add(a.item));
      c.status = 'Закрыт'; c.allocs = [];
      hist(c, 'Все кредиты договора погашены → договор закрыт, предметы освобождены (закрытие договора и есть правовой акт)');
    }
  });
  /* После высвобождения долей: предмет с обнулившимися долями и действующим запретом
     подлежит снятию. Само снятие — акт в органе, автоматом не выполняется. */
  let staleN = 0;
  touched.forEach(iid => { const it = item(iid);
    if(it.ban && !it.ban.pendingRelease && allocatedLegal(iid) === 0){
      it.ban.pendingRelease = true; staleN++;
      hist(it, `Доли высвобождены — запрет на отчуждение ${it.ban.regNo} подлежит снятию в «${organOf(it)}» (снятие оформляется актом)`);
    }
  });
  closeModal(); toast('Кредит погашен. Доли высвобождены автоматически','ok');
  if(staleN) toast('Запрет на отчуждение подлежит снятию: доли по предмету обнулились. Оформите акт снятия в органе','warn');
  refresh();
}

/* ---------- СПРАВОЧНИК: коэффициенты и интервалы контроля ---------- */
function openRefbook(){
  modal(`<div class="modal">${mhead('Справочник: залоговые коэффициенты и интервалы контроля')}
    <div class="modal-b">
      <p class="section-note">Один справочник на четыре величины по виду залога: <b>коэффициент</b> (дисконт ликвидности — база залоговой стоимости), <b>интервалы</b> планового обследования и переоценки и <b>регистрирующий орган</b> (куда накладывается запрет на отчуждение). Отдельно — <b>срок наложения запрета</b> после нотариального удостоверения. Ведёт администратор. Правка немедленно пересчитывает залоговые стоимости, покрытия, дедлайны запретов и триггеры.</p>
      <div class="field" style="max-width:360px;margin-bottom:14px"><span class="flabel">Срок наложения запрета на отчуждение, рабочих дней</span>
        <div class="control"><input id="rb-ban-days" value="${BAN_DEADLINE_DAYS}"></div></div>
      <div class="cgrid-wrap"><table class="cgrid">
        <thead><tr><th>Вид залога</th><th>Коэффициент</th><th>Обследование, мес.</th><th>Переоценка, мес.</th><th>Регистрирующий орган (запрет)</th><th class="numcell">Предметов</th></tr></thead>
        <tbody>${Object.keys(KINDS).map(k=>`<tr>
          <td>${esc(k)}</td>
          <td><div class="control" style="width:100px"><input id="rb-k-${esc(k)}" value="${KINDS[k].k}"></div></td>
          <td><div class="control" style="width:90px"><input id="rb-s-${esc(k)}" value="${KINDS[k].survey}"></div></td>
          <td><div class="control" style="width:90px"><input id="rb-r-${esc(k)}" value="${KINDS[k].reval}"></div></td>
          <td><div class="control" style="min-width:260px"><input id="rb-o-${esc(k)}" value="${esc(KINDS[k].organ)}"></div></td>
          <td class="numcell">${ITEMS.filter(i=>i.kind===k).length}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>${mfoot('Сохранить справочник','saveRefbook()')}</div>`);
}
function saveRefbook(){
  const bd = num((document.getElementById('rb-ban-days')||{}).value);
  if(!(bd > 0)) return toast('Срок наложения запрета должен быть положительным числом рабочих дней','warn');
  const draft = {};
  for(const k of Object.keys(KINDS)){
    const c = num((document.getElementById('rb-k-'+k)||{}).value), s = num((document.getElementById('rb-s-'+k)||{}).value),
          r = num((document.getElementById('rb-r-'+k)||{}).value), o = (document.getElementById('rb-o-'+k)||{}).value.trim();
    if(!(c > 0 && c <= 1)) return toast('Коэффициент «'+k+'» должен быть в диапазоне (0; 1]','warn');
    if(!(s > 0) || !(r > 0)) return toast('Интервалы контроля «'+k+'» должны быть положительными','warn');
    if(!o) return toast('Укажите регистрирующий орган для «'+k+'»','warn');
    draft[k] = { k:c, survey:Math.round(s), reval:Math.round(r), organ:o };
  }
  Object.keys(draft).forEach(k => KINDS[k] = draft[k]);
  BAN_DEADLINE_DAYS = Math.round(bd);
  closeModal(); toast('Справочник сохранён — залоговые стоимости, покрытия и дедлайны запретов пересчитаны','ok'); refresh();
}

/* ============================================================
   MISC
   ============================================================ */
function showView(v){
  document.querySelectorAll('.view').forEach(s=>s.style.display='none');
  document.getElementById('view-'+v).style.display='flex';
  if(v==='list'){ cur=null; document.getElementById('crumbTitle').textContent='Залоговое обеспечение'; renderList(); }
}
function scrollTabs(){ document.getElementById('detailTabbar').scrollBy({left:200, behavior:'smooth'}); }
function closeSplit(){ document.getElementById('splitRefresh').classList.remove('open'); }
function toast(msg, kind){
  const w = document.getElementById('toastWrap'), t = document.createElement('div');
  t.className = 'toast' + (kind ? ' '+kind : ''); t.innerHTML = `<span>${msg}</span>`;
  w.appendChild(t); setTimeout(()=>t.remove(), 4200);
}
document.addEventListener('keydown', e => { if(e.key==='Escape' && host().classList.contains('open')) closeModal(); });

renderNav(); renderList();
</script>
