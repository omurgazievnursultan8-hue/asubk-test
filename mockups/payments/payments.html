<title>Учёт и сверка платежей · АСУБК</title>
<!--
  MOCKUP (single-file, interactive) — TO-BE модуля «Учёт и сверка платежей».
  Образец для команды разработки, не прод-код. Стиль сверен с mockups/collection/
  и mockups/loan-credit/. Модуль проектируется с нуля (в живом стенде отдельного
  экрана сверки нет) — дефекты по нему в notes/qa-findings.md не заводятся.

  Спек логики: mockups/payments/ASUBK-platezhi-logika.md
  (синхронизируется в мастер ASUBK-analiz-mokapov.md, секция 14).

  СЕМЬ АРХИТЕКТУРНЫХ ШВОВ (что демонстрирует макет)
  1. Платёж и запись реестра ЦК — ДВЕ сущности. Сверка = сопоставление между ними.
  2. Сверка — ЧЕТЫРЕ исхода, не два. Три независимые оси состояния платежа:
     регистрация · сопоставление · заморозка. Схлопывание в один status запрещено.
  3. Шлюз погашения: платёж ДЕЙСТВУЕТ до подтверждения ЦК. Неподтверждение → сторно
     с пересчётом (сторно ≠ удаление). Статус НЕ терминален — возможно восстановление.
  4. Разнесение — МАТРИЦА слой→категория→срочность, не плоская четвёрка колонок.
  5. Слои долга: один кредит → N решений суда → возможно N режимов начисления сразу.
  6. Крыжение = заморозка (бухгалтер). Разморозка — по решению комиссии. Акт сверки —
     по инициативе куратора.
  7. Три счёта шлюза + ГИБРИД: счёт решает разнесение только при «чистом» долге.

  Роли (селектор в шапке меняет доступные действия):
    • Куратор — вводит, разносит, инициирует акт сверки, вносит решение комиссии.
    • Бухгалтер — крыжит (замораживает) / размораживает / сторнирует по решению комиссии.
    • Наблюдатель — только чтение.

  ДЕМО-ОГРАНИЧЕНИЯ: каскад пересчёта не выполняется в рантайме — показан результат
  в данных + баннер-объяснение. Комиссия вне АСУБК — вносится только результат.
-->

.cand{ display:flex; align-items:center; gap:12px; padding:11px 14px; border:1px solid var(--border-default);
  border-radius:var(--radius-md); margin-bottom:8px; }
.cand .ci{ flex:1; }
.cand .ci .cn{ font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); color:var(--text-heading); }
.cand .ci .cm{ font:var(--font-label); color:var(--text-muted); margin-top:2px; }

/* ---- form ---- */
.f2{ display:grid; grid-template-columns:1fr 1fr; gap:16px 32px; align-items:start; max-width:1100px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field.col-span{ grid-column:1 / -1; }
.field .flabel{ font:var(--font-label); color:var(--text-muted); }
.field.req .flabel::after{ content:" •"; color:var(--action-danger); }
.control{ position:relative; display:flex; align-items:center; }
.control input, .control select, .note-area{ width:100%; height:var(--control-h); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); font-weight:var(--weight-medium);
  border:1px solid var(--border-strong); outline:none; padding:0 var(--space-2); }
.control select{ cursor:pointer; appearance:none; padding-right:30px; }
.control input:focus, .control select:focus, .note-area:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); }
.control input[readonly], .ro input{ background:var(--surface-input); color:var(--text-muted); border:1px solid transparent; cursor:default; }
.control .caret{ position:absolute; right:9px; pointer-events:none; color:var(--text-muted); display:flex; }
.note-area{ height:auto; min-height:74px; padding:10px 12px; resize:vertical; line-height:1.5; }

/* ---- timeline (act lifecycle) ---- */
.timeline{ display:flex; flex-wrap:wrap; gap:0; margin:2px 0 6px; }
.tl-step{ display:flex; align-items:center; gap:8px; }
.tl-dot{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font:var(--weight-bold) 12px/1 var(--asubk-font); flex:none; }
.tl-dot.done{ background:var(--asubk-green); color:#fff; }
.tl-dot.cur{ background:var(--asubk-blue); color:#fff; }
.tl-dot.todo{ background:var(--surface-input); color:var(--text-placeholder); }
.tl-lbl{ font:var(--font-label); color:var(--text-body); }
.tl-lbl.todo{ color:var(--text-placeholder); }
.tl-arrow{ color:var(--text-placeholder); margin:0 14px; display:flex; }

/* ---- history ---- */
.hist{ border-left:2px solid var(--border-strong); margin-left:6px; }
.hrow{ position:relative; padding:10px 0 10px 22px; border-bottom:1px solid var(--asubk-grid-line); }
.hrow::before{ content:""; position:absolute; left:-5px; top:16px; width:8px; height:8px; border-radius:50%; background:var(--asubk-blue); }
.hrow.rev::before{ background:var(--asubk-red); }
.hrow.res::before{ background:var(--asubk-green); }
.hrow .hwhen{ font:var(--weight-medium) 13px/1.3 var(--asubk-font); color:var(--text-muted); }
.hrow .hwhat{ font:var(--font-label); color:var(--text-body); margin-top:2px; }
.hrow .hwho{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:2px; }

/* dropzone */
.dropzone{ border:1.5px dashed var(--border-strong); border-radius:var(--radius-md); padding:26px; text-align:center;
  color:var(--text-muted); background:var(--surface-panel); cursor:pointer; margin-bottom:16px; }
.dropzone:hover{ border-color:var(--asubk-blue); color:var(--text-link); }
.dropzone svg{ margin-bottom:8px; }

/* footer */
.footer{ position:sticky; bottom:0; background:var(--surface-page); border-top:1px solid var(--border-default);
  padding:14px 20px; display:flex; align-items:center; gap:12px; z-index:5; }
.footer .spacer{ flex:1; }

/* modal */
.overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.42); display:none; align-items:center; justify-content:center; z-index:60; padding:24px; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface-card); border-radius:var(--radius-lg); width:min(640px,100%); max-height:88vh;
  display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(16,28,46,0.4); }
.modal.wide{ width:min(860px,100%); }
.modal-h{ padding:18px 24px 12px; display:flex; align-items:center; gap:10px; }
.modal-h .mt{ font:var(--weight-bold) 19px/1.2 var(--asubk-font); color:var(--text-heading); flex:1; }
.modal-x{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); display:flex; padding:4px; }
.modal-x:hover{ color:var(--text-body); }
.modal-b{ padding:4px 24px 8px; overflow:auto; flex:1; }
.modal-f{ padding:14px 24px 20px; display:flex; gap:12px; justify-content:flex-end; }

/* toast */
.toast-wrap{ position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:80; }
.toast{ min-width:260px; max-width:440px; padding:12px 14px; border-radius:var(--radius-md);
  background:var(--asubk-ink); color:#fff; font:var(--font-label); box-shadow:0 10px 30px rgba(16,28,46,0.3);
  display:flex; gap:10px; align-items:flex-start; }
.toast.ok{ background:var(--asubk-green); } .toast.warn{ background:var(--asubk-amber); } .toast.err{ background:var(--asubk-red); }

.role-hint{ font:var(--font-label); color:var(--text-placeholder); display:inline-flex; align-items:center; gap:6px; }
.legend{ display:flex; gap:16px; flex-wrap:wrap; font:var(--font-label); color:var(--text-muted); margin-top:12px; }
.legend span{ display:inline-flex; align-items:center; gap:6px; }

let CUR_VIEW = 'pay';
let curPayment = null, curAct = null;

function go(v){ CUR_VIEW = v; curPayment=null; curAct=null; render(); }
function render(){
  renderNav();
  const titles = { pay:'Платежи', registry:'Реестр ЦК', recon:'Сопоставление (сверка)',
                   unresolved:'Невыясненные поступления', acts:'Акты сверки' };
  document.getElementById('crumbTitle').textContent =
    curPayment ? curPayment.number : (curAct ? 'Акт сверки '+curAct.id : titles[CUR_VIEW]);
  const c = document.getElementById('content');
  if(curPayment) return void(c.innerHTML = paymentDetail(curPayment));
  if(curAct)     return void(c.innerHTML = actDetail(curAct));
  c.innerHTML = ({ pay:viewPayments, registry:viewRegistry, recon:viewRecon,
                   unresolved:viewUnresolved, acts:viewActs })[CUR_VIEW]();
}

const roleHint = (allowed, txt) => allowed ? '' :
  `<span class="role-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>${txt}</span>`;

      <td class="r num">${money(p.amount)}</td>

  return `<div class="view active"><div class="page-pad">
    <h2 class="section-h">Платежи</h2>
    <p class="section-note">Каждый платёж несёт <b>три независимые оси состояния</b> — регистрация · сопоставление · заморозка (шов №2). Их нельзя схлопывать в единый «статус». Платёж по шлюзу действует до подтверждения ЦК; статус сопоставления не терминален (возможны сторно и восстановление).</p>

      <div class="seg"><button class="on">Все</button><button onclick="toast('Демо: фильтр не реализован')">Ожидают ЦК</button><button onclick="toast('Демо: фильтр не реализован')">Сторно</button><button onclick="toast('Демо: фильтр не реализован')">Крыжёные</button></div>
      <div class="spacer"></div>
      <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Номер, заёмщик, кредит…"></div>
    </div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Номер</th><th>Дата</th><th>Заёмщик / кредит</th><th class="r">Сумма, сом</th><th>Состояние (3 оси)</th></tr></thead>
      <tbody>${rows}</tbody>

}

let payTab = 'req';
function openPayment(id){ curPayment = DATA.payments.find(p=>p.id===id); payTab='req'; render(); }
function setPayTab(t){ payTab=t; render(); }

function paymentDetail(p){
  const disputePending = p.dispute && p.dispute.status==='pending';
  let banner='';
  if(p.match==='reversed') banner = `<div class="banner err"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.7 3"/><path d="M3 3v5h5"/></svg><div><b>Автосторно по таймауту.</b> Подтверждение ЦК не пришло за ${DATA.timeoutDays} дн от даты операции. Долг восстановлен задним числом, каскад пересчёта прогнан. Пеня периода помечена <b>спорной</b> и ждёт решения комиссии — в требование не входит. Статус не терминален: при позднем подтверждении платёж восстанавливается.</div></div>`;
  if(p.match==='restored') banner = `<div class="banner ok"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg><div><b>Платёж восстановлен после позднего подтверждения ЦК.</b> Обратный каскад пересчёта прогнан, спорная пеня снята <b>автоматически</b> — комиссия не потребовалась.</div></div>`;
  if(p.match==='pending')  banner = `<div class="banner warn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><div><b>Платёж по шлюзу действует, ждёт подтверждения ЦК.</b> До автосторно ${p.daysLeft} дн (таймаут ${DATA.timeoutDays} дн от даты операции ${p.date}). Значение таймаута берётся на дату операции — смена настройки не переигрывает закрытые платежи.</div></div>`;
  if(p.match==='mismatch') banner = `<div class="banner warn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.3 3.9L1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg><div><b>Расхождение реквизитов с реестром ЦК.</b> Требуется корректировка с указанием основания (сумма у нас ≠ сумме ЦК).</div></div>`;

  const tabs = [ ['req','Реквизиты'], ['alloc','Разнесение'], ['dispute','Спорная пеня'], ['hist','История'] ];

  return `<div class="view active">
    <div class="page-pad" style="padding-bottom:80px">
      ${banner}
      <div class="phead">
        <div class="phead-top">
          <div>
            <div class="phead-name"><span class="nm">${p.number}</span><span class="amt num">${money(p.amount)} ${p.currency}</span></div>
            <div class="phead-sub"><b>${p.borrower}</b> · ИНН ${p.inn} · <b>${p.credit}</b> · вид: ${p.kind}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">${payActions(p)}</div>
        </div>
        <div class="phead-dims">
          <div class="dim"><div class="dl">Ось 1 · Регистрация</div><div class="dv">${pill(REG[p.reg])}</div><div class="src">как платёж попал в систему</div></div>
          <div class="dim"><div class="dl">Ось 2 · Сопоставление с ЦК</div><div class="dv">${pill(MATCH[p.match])}</div><div class="src">${p.match==='pending'?'подтверждение ещё не пришло':p.match==='confirmed'?'совпало 1:1 с реестром ЦК':p.match==='reversed'?'таймаут — ждёт восстановления или комиссии':p.match==='restored'?'позднее подтверждение':'реквизиты расходятся'}</div></div>
          <div class="dim"><div class="dl">Ось 3 · Заморозка</div><div class="dv">${pill(FRZ[p.frozen])}</div><div class="src">${p.frozen==='frozen'?'крыжён бухгалтерией':'редактирование разрешено'}</div></div>
        </div>
      </div>

      <div class="detail-tabbar">${tabs.map(([k,l])=>`<button class="dtab${payTab===k?' active':''}" onclick="setPayTab('${k}')">${l}${k==='dispute'&&disputePending?' <span class="pill err" style="margin-left:4px">!</span>':''}</button>`).join('')}</div>

      <div class="dpanel${payTab==='req'?' active':''}">${payReq(p)}</div>
      <div class="dpanel${payTab==='alloc'?' active':''}">${payAlloc(p)}</div>
      <div class="dpanel${payTab==='dispute'?' active':''}">${payDispute(p)}</div>
      <div class="dpanel${payTab==='hist'?' active':''}">${payHist(p)}</div>
    </div>
    <div class="footer">
      <button class="btn btn-secondary" onclick="go('pay')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Закрыть</button>
      <div class="spacer"></div>
      <span class="role-hint">Роль: ${ROLE_LABEL[ROLE]}</span>
    </div>
  </div>`;
}

function payActions(p){
  const a=[];
  if(p.frozen==='open'){
    const canFrz = p.match==='confirmed' || p.match==='restored';
    if(can.freeze()){
      a.push(`<button class="btn btn-primary btn-sm"${canFrz?'':' disabled'} title="${canFrz?'':'Заморозка только по положительной сверке'}" onclick="act('freeze','${p.id}')">Крыжить (заморозить)</button>`);
    } else { a.push(roleHint(false,'Крыжит бухгалтер')); }
    if(p.match==='mismatch' && can.match()) a.push(`<button class="btn btn-secondary btn-sm" onclick="act('correct','${p.id}')">Корректировать с основанием</button>`);
  } else {
    if(can.unfreeze()){
      a.push(`<button class="btn btn-secondary btn-sm" onclick="act('unfreeze','${p.id}')">Разморозить (реш. комиссии)</button>`);
      a.push(`<button class="btn btn-tint danger btn-sm" onclick="act('reverse','${p.id}')">Сторно целиком</button>`);
    } else { a.push(roleHint(false,'Размораживает бухгалтер')); }
  }
  if(p.match==='reversed' && can.match()) a.push(`<button class="btn btn-success btn-sm" onclick="act('restore','${p.id}')">Восстановить (ЦК подтвердил)</button>`);
  return a.join('');
}

    <div class="field"><label class="flabel">Дата (фактического поступления денег)</label><div class="control ro"><input value="${p.date}" readonly></div></div>
    <div class="field"><label class="flabel">Сумма</label><div class="control ${ro?'ro':''}"><input value="${money(p.amount)}" ${ro?'readonly':''}></div></div>
    <div class="field"><label class="flabel">Валюта</label><div class="control ro"><input value="${p.currency}" readonly></div></div>
    <div class="field"><label class="flabel">Источник (source)</label><div class="control ro"><input value="${REG[p.reg].t}" readonly></div></div>
    <div class="field"><label class="flabel">Вид погашения (kind)</label><div class="control ro"><input value="${p.kind}" readonly></div></div>
    <div class="field"><label class="flabel">Кредит</label><div class="control ro"><input value="${p.credit}" readonly></div></div>
    <div class="field"><label class="flabel">Счёт зачисления шлюза (намерение заёмщика)</label><div class="control ro"><input value="${p.gatewayAccount? p.gatewayAccount+(p.clean?'':' — не исполнен, перебит очередью'):'— (не шлюз)'}" readonly></div></div>
    <div class="field col-span"><label class="flabel">Примечание платёжного документа (ключа сопоставления нет — разносим по нему)</label><div class="control ro"><input value="${p.note}" readonly></div></div>
    ${p.frozen==='frozen'?`<div class="field col-span"><div class="banner info" style="margin:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><div>Платёж <b>крыжён</b>. Реквизиты факта (сумма, дата, номер, кредит) заблокированы. После разморозки куратор правит <b>только перераспределение</b> между ОД / % / штрафами; факт поступления неприкосновенен.</div></div></div>`:''}
  </div>`;
}

function payAlloc(p){
  const al = DATA.alloc[p.allocation];
  if(!al || !al.layers.length) return `<div class="banner info" style="margin:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/></svg><div>Разнесение по этому платежу не показано в демо-данных (сторнированный / восстановленный платёж — разнесение снято каскадом).</div></div>`;
  const layers = al.layers.map((L,i)=>{
    const rows = L.cats.map(c=> c.rows.map(r=>`<tr><td>${c.cat}</td><td><span class="urg ${r.urg}">${r.label}</span></td><td class="r">${money(r.v)}</td></tr>`).join('') ).join('');
    return `<div class="mx-layer${i===0?' open':''}">
      <div class="mx-layer-h" onclick="this.parentNode.classList.toggle('open')">
        <span class="chev"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
        <span class="ml-title">${L.name}</span><span class="ml-mode">— ${L.mode}</span>
        <span class="ml-sum num">${money(L.sum)}</span>
      </div>
      <div class="mx-body"><table class="mxg">
        <thead><tr><th>Категория</th><th>Срочность</th><th class="r">Сумма, сом</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');
  return `<p class="section-note" style="margin-bottom:14px">Разнесение — <b>трёхуровневая матрица</b> (шов №4): слой (решение суда) → категория (комиссия · пеня · проценты · ОД, порядок из договора) → срочность (просрочено → накоплено → текущее). Плоская четвёрка колонок недостаточна. Начисление идёт <b>по слоям</b>: у каждого слоя свой режим (шов №5).</p>
    <div class="matrix">${layers}</div>
    <div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap">
      ${can.allocate() ? `<button class="btn btn-secondary btn-sm" onclick="toast('Демо: ручное переразнесение — куратор вправе переопределить авторасчёт с основанием')">Переразнести вручную (с основанием)</button>` : roleHint(false,'Разносит куратор')}
      <span class="role-hint">Автоматика предлагает — куратор вправе переопределить. Расхождение остаётся в аудите.</span>
    </div>`;
}

function payDispute(p){
  if(!p.dispute) return `<div class="banner ok" style="margin:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><div>Спорной пени по этому платежу нет.</div></div>`;
  const d = p.dispute;
  if(d.status==='auto_cleared') return `<div class="banner ok" style="margin:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><div>Спорная пеня <b>${money(d.amount)}</b> за период ${d.from} → ${d.to} снята <b>автоматически</b> при восстановлении платежа. Комиссия не потребовалась.</div></div>`;
  return `<div class="banner warn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><div><b>Спорная пеня ${money(d.amount)}</b> за период ${d.from} → ${d.to} (сторно задним числом). Пеня <b>вычислена, но помечена спорной</b>: не входит в требование, не влияет на фазу взыскания, не двигает категорию риска, не блокирует акт сверки. До решения комиссии долг заёмщика по ней не растёт.</div></div>
  <p class="section-note">Вопрос уходит на комиссию <b>вне АСУБК</b> (повестка/голосование не моделируются). Куратор вносит только окончательное решение реквизитами платежа:</p>
  <div class="f2" style="max-width:720px">
    <div class="field"><label class="flabel">Исход решения</label><div class="control"><select ${ROLE==='curator'?'':'disabled'}><option>начислить</option><option>не начислять</option><option>начислить частично</option></select><span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></div></div>
    <div class="field"><label class="flabel">Сумма (для частичного)</label><div class="control"><input placeholder="0,00" ${ROLE==='curator'?'':'readonly'}></div></div>
    <div class="field"><label class="flabel">Номер протокола (текстом)</label><div class="control"><input placeholder="напр. ПК-2026/47" ${ROLE==='curator'?'':'readonly'}></div></div>
    <div class="field"><label class="flabel">Дата решения</label><div class="control"><input placeholder="дд.мм.гггг" ${ROLE==='curator'?'':'readonly'}></div></div>
    <div class="field col-span"><label class="flabel">Основание / примечание</label><textarea class="note-area" ${ROLE==='curator'?'':'readonly'}></textarea></div>
  </div>
  <div style="margin-top:14px">${can.dispute()?`<button class="btn btn-primary btn-sm" onclick="toast('Демо: решение комиссии внесено. Спорная пеня становится обычной либо аннулируется с основанием.','ok')">Внести решение комиссии</button>`:roleHint(false,'Решение вносит куратор')}</div>`;
}

function payHist(p){
  return `<div class="hist">${p.hist.map(h=>`<div class="hrow ${h.cls}"><div class="hwhen">${h.when}</div><div class="hwhat">${h.what}</div><div class="hwho">${h.who}</div></div>`).join('')}</div>`;

   ============================================================ */
function viewRegistry(){
  const rows = DATA.registry.map(r=>{
    const badge = r.dup ? `<span class="pill neutral" title="Дедупликация по ключу: № документа + дата + сумма">дубль — отсеян</span>`
      : r.mismatch ? `<span class="pill warn">расхождение</span>`
      : r.matched ? `<span class="pill ok">сопоставлен ${r.matched}</span>`
      : `<span class="pill err">нет пары</span>`;
    return `<tr class="${r.dup?'muted':''}">
      <td class="mono">№${r.doc}</td><td>${r.date}</td><td class="r num">${money(r.amount)}</td>
      <td>${r.payer}</td><td>${r.note}</td><td>${badge}</td></tr>`;
  }).join('');
  return `<div class="view active"><div class="page-pad">
    <h2 class="section-h">Реестр ЦК</h2>
    <p class="section-note">Запись реестра ЦК — <b>внешний факт</b> (шов №1), отдельная сущность от платежа. Не редактируется — только перезагрузка и пересопоставление. Ключ дедупликации при повторной загрузке: <code>№ платёжного документа ЦК + дата + сумма</code> — иначе уточнённый реестр задваивает платежи.</p>
    <div class="dropzone" onclick="toast('Демо: загрузка файла реестра ЦК (почта) или импорт по интеграции')">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></svg>
      <div>Загрузить файл реестра ЦК <span style="color:var(--text-placeholder)">(.xlsx / .csv из почты)</span></div>
    </div>
    <div class="banner info"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg><div>При повторной загрузке за май обнаружена <b>1 дублирующая строка</b> (№3391) — отсеяна по ключу дедупликации. Уточнённый реестр не задвоил платёж.</div></div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>№ документа ЦК</th><th>Дата</th><th class="r">Сумма, сом</th><th>Плательщик</th><th>Примечание</th><th>Сопоставление</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div></div>`;
}

/* ============================================================
   VIEW: СОПОСТАВЛЕНИЕ (СВЕРКА) — 4 исхода
   ============================================================ */
function viewRecon(){
  return `<div class="view active"><div class="page-pad">
    <h2 class="section-h">Сопоставление (сверка)</h2>
    <p class="section-note">Сверка — это <b>сопоставление</b> платежа (наш учёт) и записи реестра ЦК (внешний факт), а не статус одной записи. Отсюда <b>четыре исхода</b>, а не два. Ключа сопоставления нет — разносим по примечанию: <b>система предлагает, куратор подтверждает</b> (автопривязка запрещена).</p>
    ${DATA.recon.map(reconCard).join('')}
  </div></div>`;
}
function reconCard(m){
  const pay = m.pay ? DATA.payments.find(p=>p.id===m.pay) : null;
  const reg = m.reg ? DATA.registry.find(r=>r.doc===m.reg && !r.dup) : null;
  const badge = { ok:'pill ok', mismatch:'pill warn', ours_only:'pill err', cbk_only:'pill err' }[m.outcome];
  const ourCol = pay ? `<dl class="kv">
    <dt>Номер</dt><dd class="mono">${pay.number}</dd>
    <dt>Дата</dt><dd>${pay.date}</dd>
    <dt>Сумма</dt><dd class="num${m.outcome==='mismatch'?' diff':''}">${money(pay.amount)}</dd>
    <dt>Заёмщик</dt><dd>${pay.borrower}</dd>
    <dt>Источник</dt><dd>${REG[pay.reg].t}</dd></dl>`
    : `<div class="cgrid-empty">Пары нет — платёж отсутствует</div>`;
  const cbkCol = reg ? `<dl class="kv">
    <dt>№ док. ЦК</dt><dd class="mono">№${reg.doc}</dd>
    <dt>Дата</dt><dd>${reg.date}</dd>
    <dt>Сумма</dt><dd class="num${m.outcome==='mismatch'?' diff':''}">${money(reg.amount)}</dd>
    <dt>Плательщик</dt><dd>${reg.payer}</dd>
    <dt>Примечание</dt><dd>${reg.note}</dd></dl>`
    : `<div class="cgrid-empty">Пары нет — записи ЦК отсутствует</div>`;

  let action='';
  if(m.outcome==='ok')        action = can.match()?`<button class="btn btn-success btn-sm" onclick="toast('Совпало 1:1 — платёж готов к заморозке','ok')">Подтвердить сопоставление</button>`:roleHint(false,'Подтверждает куратор');
  if(m.outcome==='mismatch')  action = can.match()?`<button class="btn btn-secondary btn-sm" onclick="toast('Демо: корректировка платежа с указанием основания')">Корректировать (с основанием)</button>`:roleHint(false,'Корректирует куратор');
  if(m.outcome==='ours_only') action = `<span class="role-hint">Платёж по шлюзу ждёт подтверждения ЦК. При истечении таймаута → ветка сторно.</span>`;
  if(m.outcome==='cbk_only')  action = can.match()?`<button class="btn btn-primary btn-sm" onclick="go('unresolved')">В невыясненные → подобрать хозяина</button>`:roleHint(false,'Разбирает куратор');

  return `<div style="border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <span class="${badge}"><span class="dot"></span>Исход: ${m.title}</span>
      <span class="section-note" style="margin:0">${m.detail}</span>
    </div>
    <div class="recon-split">
      <div class="recon-col"><h4><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg>Платёж (наш учёт)</h4>${ourCol}</div>
      <div class="recon-mid"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      <div class="recon-col"><h4><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Запись реестра ЦК</h4>${cbkCol}</div>
    </div>
    <div style="margin-top:14px">${action}</div>
  </div>`;
}

/* ============================================================
   VIEW: НЕВЫЯСНЕННЫЕ ПОСТУПЛЕНИЯ (буфер)
   ============================================================ */
function viewUnresolved(){
  const cards = DATA.unresolved.map(u=>{
    const cands = u.candidates.length ? u.candidates.map(c=>`
      <div class="cand">
        <span class="pill warn" title="Только ФИО — нечёткое, возможны однофамильцы">${c.score}</span>
        <div class="ci"><div class="cn">${c.borrower}</div><div class="cm">${c.credit}</div></div>
        ${can.match()?`<button class="btn btn-secondary btn-sm" onclick="toast('Демо: куратор выбрал кандидата. Дата платежа = дата поступления ${u.date}, запускается обратный каскад + уведомление взыскания.','ok')">Привязать</button>`:''}
      </div>`).join('')
      : `<div class="banner err" style="margin:8px 0 0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg><div>Ничего не распознано — кандидатов нет. Висит бессрочно до опознания (срока автосписания нет).</div></div>`;
    return `<div style="border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:16px">
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px">
        <span class="phead-name" style="gap:8px"><span class="nm" style="font-size:17px">${u.id}</span><span class="amt num" style="font-size:17px">${money(u.amount)} сом</span></span>
        <span class="section-note" style="margin:0">реестр ЦК №${u.regDoc} · ${u.date} · плательщик: ${u.payer} · примечание: «${u.note}»</span>
      </div>
      <div class="banner warn" style="margin:8px 0 12px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><div>Причина: ${u.reason}. Деньги <b>видны, но долг не гасят</b>. При опознании: <b>дата платежа = дата поступления ${u.date}</b>, не дата опознания → обратный каскад пересчёта + уведомление взыскания.</div></div>
      <div style="font:var(--weight-semibold) 14px/1.2 var(--asubk-font);color:var(--text-heading);margin-bottom:8px">Кандидаты (система предлагает — куратор подтверждает)</div>
      ${cands}
    </div>`;
  }).join('');
  return `<div class="view active"><div class="page-pad">
    <h2 class="section-h">Невыясненные поступления</h2>
    <p class="section-note">Поступление из реестра ЦК без распознанной привязки → <b>буфер</b> (§7.1). Висит <b>бессрочно</b>, пока не найдётся хозяин. Автопривязка запрещена: при точном совпадении номера кредита — подтверждение в один клик, при только ФИО — список кандидатов, при нераспознанном — остаётся здесь.</p>
    ${cards}
  </div></div>`;
}

/* ============================================================
   VIEW: АКТЫ СВЕРКИ
   ============================================================ */
const ACT_STATE = { formed:['Сформирован','warn'], agreed:['Согласован бухгалтерией','info'], signed:['Подписан','ok'] };
function viewActs(){
  const rows = DATA.acts.map(a=>{
    const [t,c]=ACT_STATE[a.state];
    return `<tr onclick="openAct('${a.id}')">
      <td class="mono">${a.id}</td><td>${a.period}</td><td>${a.borrower}</td>
      <td class="r">${a.frozenCount}</td><td class="r num">${money(a.sum)}</td>
      <td><span class="pill ${c}"><span class="dot"></span>${t}</span></td></tr>`;
  }).join('');
  return `<div class="view active"><div class="page-pad">
    <h2 class="section-h">Акты сверки</h2>
    <p class="section-note">Акт сверки — <b>по инициативе куратора</b>, не автоформирование (шов №6). Инициировать можно, только если платежи периода <b>заморожены</b>. Подписанный акт сам является основанием заморозки всего, что в него вошло. Нулевой акт (при полном погашении) — частный случай, не отдельная процедура.</p>
    <div class="gtoolbar">
      ${can.initAct()?`<button class="btn btn-success btn-sm" onclick="toast('Демо: куратор инициирует акт сверки по замороженным платежам периода')">＋ Инициировать акт сверки</button>`:roleHint(false,'Инициирует куратор')}
    </div>
    <div class="cgrid-wrap"><table class="cgrid">
      <thead><tr><th>Акт</th><th>Период</th><th>Заёмщик</th><th class="r">Платежей</th><th class="r">Сумма, сом</th><th>Состояние</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div></div>`;
}
function openAct(id){ curAct = DATA.acts.find(a=>a.id===id); render(); }
function actDetail(a){
  const order=['formed','agreed','signed']; const cur=order.indexOf(a.state);
  const steps=[['formed','Сформирован'],['agreed','Согласован бухгалтерией'],['signed','Подписан']];
  const tl = steps.map(([k,l],i)=>{
    const st = i<cur?'done':i===cur?'cur':'todo';
    const arrow = i<steps.length-1?`<span class="tl-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></span>`:'';
    return `<div class="tl-step"><span class="tl-dot ${st}">${i<cur?'✓':i+1}</span><span class="tl-lbl ${st==='todo'?'todo':''}">${l}</span></div>${arrow}`;
  }).join('');
  const inActList = DATA.payments.filter(p=>p.frozen==='frozen').slice(0,a.frozenCount).map(p=>`<tr><td class="mono">${p.number}</td><td>${p.date}</td><td>${p.borrower}</td><td class="r num">${money(p.amount)}</td><td>${pill(FRZ.frozen)}</td></tr>`).join('');
  let footAction='';
  if(a.state==='formed') footAction = can.freeze()?`<button class="btn btn-primary" onclick="toast('Демо: бухгалтерия согласовала акт')">Согласовать (бухгалтерия)</button>`:roleHint(false,'Согласует бухгалтерия');
  if(a.state==='agreed') footAction = `<button class="btn btn-success" onclick="toast('Демо: акт подписан. Подписанный акт — основание заморозки всего вошедшего.','ok')">Подписать</button>`;
  if(a.state==='signed') footAction = `<span class="pill ok"><span class="dot"></span>Акт подписан — основание заморозки</span>`;
  return `<div class="view active"><div class="page-pad" style="padding-bottom:80px">
    <div class="phead">
      <div class="phead-top"><div>
        <div class="phead-name"><span class="nm">Акт сверки ${a.id}</span><span class="amt num">${money(a.sum)} сом</span></div>
        <div class="phead-sub">${a.borrower} · период <b>${a.period}</b> · инициатор: ${a.initiator} · создан ${a.created}</div>
      </div></div>
      <div class="timeline">${tl}</div>
    </div>
    ${a.sum===0?`<div class="banner info"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/></svg><div><b>Нулевой акт сверки</b> (полное погашение) — частный случай, отдельной процедуры не требует.</div></div>`:''}
    <h3 class="section-h" style="font-size:16px">Замороженные платежи в акте</h3>
    <div class="cgrid-wrap"><table class="cgrid"><thead><tr><th>Номер</th><th>Дата</th><th>Заёмщик</th><th class="r">Сумма</th><th>Заморозка</th></tr></thead><tbody>${inActList||'<tr><td colspan="5" class="cgrid-empty">Нулевой акт — платежей нет</td></tr>'}</tbody></table></div>
  </div>
  <div class="footer">
    <button class="btn btn-secondary" onclick="go('acts')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Закрыть</button>
    <div class="spacer"></div>${footAction}
  </div></div>`;
}

/* ============================================================
   ACTIONS (демо — тосты + локальная мутация состояния)
   ============================================================ */
function act(kind,id){
  const p = DATA.payments.find(x=>x.id===id);
  switch(kind){
    case 'freeze':   p.frozen='frozen'; p.hist.unshift(hrow('Крыжён (заморожен) по положительной сверке.','Бухгалтер')); toast('Платёж крыжён (заморожен). Однократно — в крыжение не возвращается.','ok'); break;
    case 'unfreeze': p.frozen='open';   p.hist.unshift(hrow('Разморожен по решению комиссии. Куратор вправе править только перераспределение.','Бухгалтер')); toast('Разморожен. Каскад ограничен: факт поступления неприкосновенен.','warn'); break;
    case 'reverse':  p.match='reversed'; p.hist.unshift(hrow('Сторнирован целиком (ошибка факта, реш. комиссии). Заводится заново правильный.','Бухгалтер')); toast('Сторно целиком. Сторно ≠ удаление — след денег сохранён.','warn'); break;
    case 'restore':  p.match='restored'; if(p.dispute)p.dispute.status='auto_cleared'; p.hist.unshift(hrow('Восстановлен: ЦК подтвердил после автосторно. Обратный каскад, спорная пеня снята автоматически.','система')); toast('Платёж восстановлен. Спорная пеня снята автоматически — без комиссии.','ok'); break;
    case 'correct':  toast('Демо: корректировка реквизитов с указанием основания'); break;
  }
  render();
}
const hrow = (what,who) => ({when:'сейчас (демо)', what, who, cls: what.indexOf('Сторн')===0?'rev':what.indexOf('Восстанов')===0?'res':''});

/* ============================================================
   MODAL: новый платёж
   ============================================================ */
function modalNewPayment(){
  if(ROLE==='viewer') return toast('Наблюдатель не вносит платежи','warn');
  openModal(`<div class="modal-h"><span class="mt">Внести платёж</span><button class="modal-x" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
  <div class="modal-b">
    <div class="banner info" style="margin-bottom:14px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/></svg><div>Ручной ввод по списку ЦК (почта). <b>Дата = дата фактического поступления денег</b>, не дата ввода. Список ЦК и есть основание ввода.</div></div>
    <div class="f2">
      <div class="field req"><label class="flabel">Дата поступления</label><div class="control"><input placeholder="дд.мм.гггг"></div></div>
      <div class="field req"><label class="flabel">Сумма</label><div class="control"><input placeholder="0,00"></div></div>
      <div class="field req"><label class="flabel">Кредит</label><div class="control"><select><option>Дог. №56 от 10.04.2024</option><option>Дог. №112 от 03.02.2025</option></select><span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></div></div>
      <div class="field"><label class="flabel">Вид погашения</label><div class="control"><select><option>Денежные средства</option><option>Имущество в счёт погашения</option><option>По решению суда</option><option>По графику</option></select><span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span></div></div>
      <div class="field col-span"><label class="flabel">Примечание платёжного документа</label><div class="control"><input placeholder="ФИО / номер кредита из назначения"></div></div>
    </div>
  </div>
  <div class="modal-f"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="closeModal();toast('Демо: платёж внесён. Ось регистрации = Ручной ввод, сопоставление = Ожидает ЦК.','ok')">Внести</button></div>`);
}

/* ============================================================
   INFRA
   ============================================================ */
function onRoleChange(){ ROLE = document.getElementById('roleSel').value; render(); toast('Роль: '+ROLE_LABEL[ROLE]); }
function openModal(html){ const h=document.getElementById('modalHost'); h.innerHTML=`<div class="modal">${html}</div>`; h.classList.add('open'); }
function closeModal(){ const h=document.getElementById('modalHost'); h.classList.remove('open'); h.innerHTML=''; }
function toast(msg,kind){ const w=document.getElementById('toastWrap'); const t=document.createElement('div'); t.className='toast'+(kind?' '+kind:''); t.innerHTML=`<span>${msg}</span>`; w.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3400); }

render();
</script>
</body>
</html>
