      } else if(draft[typeKey]==='Диапазон'){
        body += `<div class="t5-range">
          ${f('Продолжительность c (в мес.)',durKey+'From',{req:true})}
          ${f('Продолжительность по (в мес.)',durKey+'To',{req:true})}
        </div>${t2rangeMsg(draft[durKey+'From'],draft[durKey+'To'])}`;
      }
      body += f(`Условия предоставления (${suf})`, condKey, {type:'textarea',max:1000,hint:'Внутренняя заметка (в Просмотре не показывается)'});
      // из сверки с калькулятором: куда распределять накопленные-отсроченные % (только для «по процентам»)
      if(suf==='по процентам'){
        body += `<div class="hint" style="display:block">Период распределения отсроченных процентов. Пусто = всё единой суммой в первый платёж после льготы. Гасятся распределением, не капитализацией.</div>
          <div class="t5-range">
            ${f('Распределять с периода №','graceIntDistFrom',{hint:'Опционально'})}

          </div>`;
      }
    }

      <div class="section-h">Льготный период ${suf}</div>

      ${check(`Использовать льготный период ${suf}`, ckKey)}
      ${body}
    </div>`;
  };
  return `<div class="subgrid t5-grid">
    ${blk('по основной сумме','graceMain','graceMainType','graceMainDur','graceMainCond')}
    ${blk('по начислению процентов','graceAccr','graceAccrType','graceAccrDur','graceAccrCond')}
    ${blk('по процентам','graceInt','graceIntType','graceIntDur','graceIntCond')}
  </div>`;
}
function t5typeSelect(label,key){
  return `<div class="field required" data-field="${key}"><span class="flabel">${label}</span>
    <div class="control"><select data-k="${key}" onchange="t5type('${key}',this.value)">
      <option value="" ${!draft[key]?'selected':''}>— выберите —</option>
      <option ${draft[key]==='Фиксированный'?'selected':''}>Фиксированный</option>
      <option ${draft[key]==='Диапазон'?'selected':''}>Диапазон</option>
    </select></div></div>`;
}
function t5type(key,val){ saveTabInputs(); draft[key]=val; renderWizBody(); }

// generic per-key multi-select chip combo (reusable; tab3 has a single-key variant)
let msOpen = {};
function msCombo(label,key,opts,hint,req){
  // seed-данные могут хранить одиночную строку — коэрция в массив (edit-path не падает на .map)
  const raw = draft[key];
  const vals = Array.isArray(raw) ? raw : (raw ? [raw] : []);
  if(raw!==undefined && !Array.isArray(raw)) draft[key]=vals;
  const chips = vals.length
    ? vals.map((v,i)=>`<span class="chip">${esc(v)}<button title="Убрать" onclick="msUnchip(event,'${key}',${i})">✕</button></span>`).join('')
    : `<span class="ph">Выберите…</span>`;
  const o = opts.map(op=>`<div class="opt ${vals.includes(op)?'sel':''}" onclick="msToggle(event,'${key}','${esc(op)}')"><span class="mk">${vals.includes(op)?'✓':''}</span>${esc(op)}</div>`).join('');
  return `<div class="field${req?' required':''}" data-field="${key}"><span class="flabel">${label}</span>
    <div class="mscombo ${msOpen[key]?'open':''}" onclick="msComboOpen(event,'${key}')">
      ${chips}<span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
      <div class="mscombo-pop">${o}</div>
    </div>${hint?`<span class="hint">${hint}</span>`:''}</div>`;
}

/* ============================================================

   (проверено 2026-06-23, scripts/inspect/tab6-full.mjs + tab6-labels.mjs,
   .auth/t6-checked.png). Live = two columns, labels above, NO required markers
   on any field (req=null for all 9 controls). Each field-cluster sits under its
   own bold section header with a hairline rule (gov-blue house style).
     L: «Периодичность платежей» {periodicity select, payMonths multi-combo}
        «Метод расчета дней» {value-picker}
        «Очередь погашения»  {value-picker}
     R: «День платежа» {payDay integer, weekend select}
        «Метод погашения кредита» {select, live empty}

        «Период между освоением и первым платежем» {min/max integer}
   ============================================================ */
function renderTab6(){
  const blk=(title,body)=>`<div class="t5-block"><div class="section-h">${title}</div>${body}</div>`;
  if(!draft.payMode) draft.payMode='standard';
  const months = draft.payMode==='months';
  // R19: периодичность и «по конкретным месяцам» — независимые альтернативы (ровно один способ)
  const periodBlk = blk('График платежей',
    `<div class="field required"><span class="flabel">Способ задания графика</span>
      <div class="control"><select data-k="payMode" onchange="t6mode(this.value)">
        <option value="standard" ${!months?'selected':''}>Стандартная периодичность</option>
        <option value="months" ${months?'selected':''}>По конкретным месяцам</option>
      </select></div></div>` +
    (months
      ? msCombo('Конкретные месяцы платежей','payMonths',LK.payMonths,'Любой набор месяцев календарного года', true)
      : sel('Периодичность платежей','periodicity',['Ежемесячно','Ежеквартально','Раз в полгода','Ежегодно'],{req:true})));
  const left = periodBlk +
    // R19: метод расчёта дней разбит на два поля (числитель + знаменатель)
    blk('Метод расчёта дней',
      combo('Метод расчёта дней в периоде','dayCountNum',LK.dayCountNum,{req:true,hint:'Числитель формулы процентов'}) +
      combo('База дней в году','dayCountBase',LK.dayCountBase,{req:true,hint:'Знаменатель формулы процентов'})) +
    blk('Очередь погашения',
      lookupF('Очередь погашения','queue','queue',{req:true,hint:'Порядок: тело → проценты → штрафы → комиссии'}));
  // R19: при «По конкретным месяцам» метод погашения авто «Индивидуальный» (селект перекрыт)
  const repayBlk = months
    ? `<div class="field ro"><span class="flabel">Метод погашения кредита</span><div class="mirror">Индивидуальный</div><span class="hint">При графике «По конкретным месяцам» — индивидуальный</span></div>`
    : sel('Метод погашения кредита','repayMethod',['Аннуитетный','Дифференцированный'],{req:true});
  const right =
    blk('День платежа',
      f('День месяца для платежа','payDay',{req:true,hint:'1–31; короткий месяц = последний день'}) +
      sel('Обработка нерабочих дней','weekend',['Не переносить','Переносить на следующий рабочий день','Переносить на предыдущий рабочий день'],{hint:'Учитывает праздники произв. календаря КР'})) +
    // из сверки с калькулятором loan_calculator_v10.xlsx: привязка последнего платежа
    blk('Привязка последнего платежа',
      sel('Привязка последнего платежа','lastPaymentAnchor',['По дате первого платежа','По дате выдачи'],{req:true,hint:'«По 1-му платежу» → последний = EDATE(1-й, (n−1)×f), факт. срок может ≠ n мес.; «По дате выдачи» → последний = EDATE(выдача, n), срок ровно n мес. Промежуточные даты всегда от 1-го платежа.'})) +
    blk('Метод погашения кредита', repayBlk) +
    blk('Период между освоением и первым платежем',
      f('Минимальное кол-во дней','minDays',{}) +
      f('Максимальное кол-во дней','maxDays',{}) +
      t2rangeMsg(draft.minDays,draft.maxDays));
  return `<div class="t2-cols t6-cols">
    <div class="t2-col">${left}</div>
    <div class="t2-col">${right}</div>
  </div>`;
}
function t6mode(v){ saveTabInputs(); draft.payMode=v; renderWizBody(); }

function renderTab7(){

        ${ (draft.collTypes||[]).length ? (draft.collTypes||[]).map((type,idx)=>{
            seedCollDocs(type); const raw=(draft.docColl[type]||{}).note||'', note=esc(raw);
            return `<div class="t7-collsec">
              <div class="t2-sub t7-collsec-h">${esc(type)}</div>
              <div class="t7-pair">${docList('Обязательные документы','coll::'+idx+'::req')}${docList('Опциональные документы','coll::'+idx+'::opt')}</div>
              <div class="field"><span class="flabel">Требования к оформлению залогового договора</span>
                <textarea class="note-area" maxlength="1000" oninput="updCount(this,1000); setCollNote(${idx}, this.value)">${note}</textarea>
                <span class="char-count">${raw.length}/1000</span>
                <span class="hint">Только русский; по виду залога «${esc(type)}»</span></div>

      </div>` : `<div class="t2-col t7-collhint"><div class="section-h">Залоговые документы</div><div class="hint">Включите «Требуется залоговое обеспечение» на вкладке «Залоговое обеспечение», чтобы задать залоговые документы.</div></div>`}
    </div>
  </div>`;
}
const T7_X = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>';

/* ---- tab 7/8 row-add grids: «+ Добавить» открывает справочник (collection
   mode), выбранная запись добавляется строкой; «✕ Исключить» убирает выделенную.
   Каждая сетка хранит строки в draft[key] (массив); справочник — GRID_KIND[key]. */
// P2-R21: админ-ведомый справочник связей «вид залога → типовые залоговые документы».
// При выборе вида залога на вкл.8 эти наборы авто-наследуются в вкл.7 (вариант C),
// оператор может донастроить под программу. Вид без дефолтов → пустая секция.
const COLL_DOC_DEFAULTS = {
  'Недвижимое имущество':       { req:['Правоустанавливающие документы на залог','Отчёт об оценке залога','Технический паспорт','Выписка из реестра обременений'], opt:['Согласие супруга(и) на залог','Страховой полис предмета залога'] },
  'Транспортное средство':      { req:['Паспорт транспортного средства (ПТС)','Свидетельство о регистрации ТС','Отчёт об оценке залога'], opt:['Страховой полис предмета залога'] },
  'Оборудование':               { req:['Документы на оборудование (счета-фактуры, накладные)','Отчёт об оценке залога'], opt:['Страховой полис предмета залога'] },
  'Товары в обороте':           { req:['Отчёт об оценке залога'], opt:['Страховой полис предмета залога'] },
  'Поручительство':             { req:[], opt:[] },
  'Банковская гарантия':        { req:[], opt:[] },
  'Депозит / денежные средства':{ req:['Договор банковского вклада','Заявление о залоге прав по вкладу'], opt:[] },
  'Сельхозтехника':             { req:['Паспорт транспортного средства (ПТС)','Отчёт об оценке залога'], opt:['Страховой полис предмета залога'] },
  'Скот / поголовье':           { req:['Ветеринарная справка','Документы учёта поголовья (бирки)','Отчёт об оценке залога'], opt:[] },
};
// docColl[<вид>] = {req:[],opt:[],note:''} — залоговые документы и требования к договору по виду залога.
function seedCollDocs(type){ draft.docColl=draft.docColl||{};
  if(!draft.docColl[type]){ const d=COLL_DOC_DEFAULTS[type]||{req:[],opt:[]};
    draft.docColl[type]={ req:[...(d.req||[])], opt:[...(d.opt||[])], note:'' }; } }
function setCollNote(idx,val){ const t=draft.collTypes[idx]; if(!t) return; seedCollDocs(t); draft.docColl[t].note=val; }

const GRID_KIND = { docCredReq:'docCredit', docCredOpt:'docCredit',
  collTypes:'collKind', templates:'templates', printForms:'printForms' };
// R20: кросс-дедуп — документ из «обязательных» нельзя добавить в «опциональные» и наоборот
const GRID_CROSS = { docCredReq:'docCredOpt', docCredOpt:'docCredReq' };
let gsel = {};   // { draftKey: выбранный индекс }
// Композитный ключ залоговых документов: 'coll::<idx видов залога>::req|opt'.
// Виды залога выбираются на вкл.8, документы группируются по виду на вкл.7 (вариант C).
function isCollKey(key){ return typeof key==='string' && key.indexOf('coll::')===0; }
function collParts(key){ const p=key.split('::'); return { type:draft.collTypes[+p[1]], slot:p[2] }; }
function gridArr(key){
  if(isCollKey(key)){ const {type,slot}=collParts(key); if(!type) return [];
    seedCollDocs(type); return draft.docColl[type][slot]; }
  return draft[key]||(draft[key]=[]);
}
function gridKind(key){ return isCollKey(key) ? 'docColl' : GRID_KIND[key]; }
function gridCross(key){ if(isCollKey(key)){ const p=key.split('::'); return 'coll::'+p[1]+'::'+(p[2]==='req'?'opt':'req'); } return GRID_CROSS[key]; }
function domId(key){ return 'grid_'+key.split('::').join('_'); }
function gridInner(key){
  const rows=gridArr(key), sel=gsel[key], gc=key==='collTypes'?'t8-grid':'t7-grid';
  const body=rows.map((v,i)=>`<tr class="${sel===i?'sel':''}" onclick="gridSel('${key}',${i})"><td title="${esc(v)}">${esc(v)}</td></tr>`).join('');
  return `<div class="t2-rowtools">
      <button class="btn btn-sm btn-rowadd" onclick="gridAdd('${key}')">${T2_PLUS}Добавить</button>
      <button class="btn btn-sm btn-rowdel" ${sel==null?'disabled':''} onclick="gridDel('${key}')">${T7_X}Исключить</button>
    </div>
    <div class="collgrid ${gc}"><table><thead><tr><th>Наименование<span class="sort">⇅</span></th></tr></thead><tbody>${body}</tbody></table></div>`;
}
function gridBox(key){ return `<div class="grid-box" id="${domId(key)}">${gridInner(key)}</div>`; }
function gridRender(key){ const el=document.getElementById(domId(key)); if(el) el.innerHTML=gridInner(key); }
function gridSel(key,i){ gsel[key]=(gsel[key]===i?null:i); gridRender(key); }
function gridDel(key){ if(gsel[key]==null) return;
  // удаление вида залога на вкл.8 — каскадно снять его залоговые документы (с предупреждением)
  if(key==='collTypes'){ const type=(draft.collTypes||[])[gsel[key]];
    if(type && draft.docColl && draft.docColl[type]){ delete draft.docColl[type];
      toast('Вид залога и его залоговые документы исключены: '+type,'warn'); }
    else toast('Строка исключена.','ok'); }
  else toast('Строка исключена.','ok');
  gridArr(key).splice(gsel[key],1); gsel[key]=null; gridRender(key);
}
function gridAdd(key){
  openRefDialog(REFBOOKS[gridKind(key)], { mode:'collection',
    onPick:(label)=>{ const arr=gridArr(key), cross=gridCross(key), crossArr=cross?gridArr(cross):null;
      if(arr.includes(label)){ toast('Уже добавлено: '+label,'warn'); }
      else if(crossArr && crossArr.includes(label)){ toast('Документ уже в другом списке (обяз./опц.): '+label,'warn'); }
      else { arr.push(label); arr.sort((a,b)=>a.localeCompare(b,'ru'));   // R20: авто-сортировка
        // выбор вида залога на вкл.8 → авто-наследование типовых документов из справочника (вариант C)
        if(key==='collTypes') seedCollDocs(label);
        toast('Добавлено: '+label,'ok'); } },
    ret:()=>{ closeModal(); gridRender(key); } });
}

  const nx=document.getElementById('btnWizNext'); if(nx) nx.style.display = wizTab<TABS.length-1 ? 'inline-flex' : 'none';
}

// P2-R2 date validation -----------------------------------------
function wireDates(){
  const from=document.querySelector('[data-k="dateFrom"]'), to=document.querySelector('[data-k="dateTo"]');
  if(!from||!to) return;
  const decMin = draft.decisionId ? (DECISIONS.find(d=>d.id===draft.decisionId)||{}).date : '';
  if(decMin) from.min=decMin;
  function sync(){
    if(from.value) to.min=from.value;
    const ff=from.closest('.field'), tf=to.closest('.field');
    if(decMin && from.value && from.value<decMin){
      ff.classList.add('invalid'); ff.querySelector('.err').textContent='Дата с ≥ даты решения ('+fmtDate(decMin)+')';
    } else { ff.classList.remove('invalid'); ff.querySelector('.err').textContent='Обязательное поле'; }
    if(from.value && to.value && to.value<from.value){
      tf.classList.add('invalid'); tf.querySelector('.err').textContent='Дата по ≥ «Дата с»';
    } else { tf.classList.remove('invalid'); tf.querySelector('.err').textContent='Обязательное поле'; }
  }
  from.addEventListener('change',()=>{ draft.dateFrom=from.value; sync(); });
  to.addEventListener('change',()=>{ draft.dateTo=to.value; sync(); });
  if(decMin && (from.value||to.value)) sync();
}

// R12: мягкие warning'и наименований (не блокируют сохранение)
function wireNames(){
  const ru=document.querySelector('[data-k="nameRu"]'), ky=document.querySelector('[data-k="nameKy"]');
  if(!ru) return;
  const warnOf=(inp)=>{ const fld=inp.closest('.field'); let w=fld.querySelector('.warn-inline');
    if(!w){ w=document.createElement('span'); w.className='warn-inline'; w.style.display='none'; fld.appendChild(w); } return w; };
  const ACTIVE=['draft','review','rework','approved'];
  ru.addEventListener('blur',()=>{ draft.nameRu=ru.value; const w=warnOf(ru); const v=ru.value.trim().toLowerCase();
    const dup = v && PROGRAMS.some(p=>p.id!==editingId && ACTIVE.includes(p.status) && (p.nameRu||'').trim().toLowerCase()===v);
    w.textContent='Активная программа с таким наименованием уже существует — проверьте дубль'; w.style.display=dup?'block':'none'; });
  if(ky) ky.addEventListener('blur',()=>{ draft.nameKy=ky.value; const w=warnOf(ky);

// collect inputs of current tab into draft
function saveTabInputs(){
  document.querySelectorAll('#wizBody [data-k]').forEach(el=>{
    const k=el.dataset.k;
    if(el.type==='checkbox') draft[k]=el.checked; else draft[k]=el.value;
  });
  if(wizTab===1) t2syncStr();   // keep legacy amounts/terms strings fresh for preview/detail
  if(wizTab===2) t3sync();      // keep legacy rateValue string fresh
}

/* ---- save (P2-R3 semantics) + validation (P2-R6) ---- */
const REQUIRED_BY_TAB = {
  // R12: «Дата по» исключена (опц.), «Ответственные сотрудники» добавлены (обяз.). nameKy скрыт (нет i18n). Итого 10.
  0:['nameRu','shortDesc','decisionId','source','purpose','kind','currency','industry','dateFrom','staffMain'],
  // R19: «Тип расчёта процентов» удалён; «Метод расчёта дней» разбит на метод+базу; периодичность — через payMode.
  5:['payDay','repayMethod','queue','dayCountNum','dayCountBase'],
};
// ---- per-tab validation (progressive wizard gating) ----
// validateTab(i): error count for ONE tab = missing simple required keys + per-tab special rules.
function validateTab(ti){
  let n=(REQUIRED_BY_TAB[ti]||[]).filter(k=>{ const v=draft[k]; if(Array.isArray(v)) return v.length===0; return !v && v!==0; }).length;
  if(ti===0){
    const dec=DECISIONS.find(d=>d.id===draft.decisionId);
    if(draft.dateFrom&&draft.dateTo&&draft.dateTo<draft.dateFrom) n++;
    if(dec&&draft.dateFrom&&draft.dateFrom<dec.date) n++;
  }
  if(ti===1){                                   // финансовое ядро: ≥1 значение суммы И срока
    t2hydrate();
    n += t2colInvalid('amount') + t2colInvalid('term');
  }
  if(ti===2){                                   // ставка: тип + значение (плавающая — опциональна)
    t3hydrate();
    n += t3rateInvalid();
  }
  if(ti===3){                                   // штрафы: тип+значение (осн. и проц.) + макс. %
    n += t4Invalid();
  }
  if(ti===4){                                   // льготный период: условный гейт (если блок включён)
    n += t5Invalid();
  }
  if(ti===5){                                   // R19: ровно один способ графика + min≤max
    if(draft.payMode==='months'){ if(!((draft.payMonths||[]).length)) n++; }
    else if(!draft.periodicity) n++;
    const a=t2num(draft.minDays), b=t2num(draft.maxDays);
    if(draft.minDays&&draft.maxDays&&!isNaN(a)&&!isNaN(b)&&a>b) n++;
  }
  if(ti===7){                                   // R21: при включённом залоге — ≥1 вид залога (требования опц.)
    if(draft.collateral && !((draft.collTypes||[]).length)) n++;
  }
  return n;
}
function t5Invalid(){                            // включённый блок требует тип + продолжительность
  let n=0;
  [['graceMain','graceMainType','graceMainDur'],
   ['graceAccr','graceAccrType','graceAccrDur'],
   ['graceInt','graceIntType','graceIntDur']].forEach(([ck,typeK,durK])=>{
    if(!draft[ck]) return;                       // блок выключен — свободен
    if(!draft[typeK]){ n++; return; }            // тип не выбран
    if(draft[typeK]==='Диапазон'){ if(!(draft[durK+'From'] && draft[durK+'To'])) n++; }
    else if(!((draft[durK]||[]).length)) n++;    // Фиксированный → ≥1 срок
  });
  return n;
}
function t3rateInvalid(){
  let n;
  if((draft.rateType||'Фиксированная')==='Диапазон'){
    const a=t2num(draft.rateMin), b=t2num(draft.rateMax);
    n=(!draft.rateMin||!draft.rateMax||isNaN(a)||isNaN(b)||a<=0||b<=0||a>b)?1:0;
  } else n=((draft.rateValues||[]).length?0:1);
  if(draft.floatRate && !draft.floatType) n++;   // чек «плавающая ставка» → тип обязателен
  return n;
}
function t4side(typeK,valK,floatK){            // Фикс → значение; Плавающая → тип плавающей ставки
  if((draft[typeK]||'Фиксированная')==='Плавающая') return draft[floatK]?0:1;
  return draft[valK]?0:1;
}
function t4Invalid(){
  let n = draft.penaltyMaxPct?0:1;             // макс. размер штрафа (% от суммы)
  n += t4side('penaltyMainType','penaltyMainVal','penaltyMainFloatType');
  n += t4side('penaltyIntType','penaltyIntVal','penaltyIntFloatType');
  return n;
}
function t2colInvalid(side){
  const isAmt=side==='amount';
  const type=draft[isAmt?'amountType':'termType']||'Фиксированная';
  if(type==='Диапазон'){
    const min=draft[isAmt?'amountMin':'termMin'], max=draft[isAmt?'amountMax':'termMax'];
    if(!min||!max) return 1;
    const a=t2num(min), b=t2num(max);                 // R15: 0 < мин ≤ макс (равенство — warning)
    return (isNaN(a)||isNaN(b)||a<=0||b<=0||a>b)?1:0;
  }
  return ((isAmt?draft.amountList:draft.termList)||[]).length?0:1;
}
function allTabErrors(){ const m={}; TABS.forEach((_,i)=>{ const e=validateTab(i); if(e) m[i]=e; }); return m; }
// first tab in [0..upto] that still has errors, or null if all clean
function firstInvalid(upto){ for(let t=0;t<=upto;t++){ if(validateTab(t)>0) return t; } return null; }
function validate(){ saveTabInputs(); return allTabErrors(); }
// scope = индекс последней вкладки, для которой показываем счётчик ошибок:
// только те, что требуются для текущего действия (переход / сохранение / отправка).
// Дальние ещё не тронутые вкладки счётчик не показывают.
function applyErrors(errByTab, scope){
  if(scope==null) scope=TABS.length-1;
  TABS.forEach((_,i)=>{
    const tab=document.getElementById('wtab'+i); if(!tab) return;
    const n=(i<=scope) ? (errByTab[i]||0) : 0;
    tab.classList.toggle('has-err', n>0);
    const b=document.getElementById('terr'+i); if(b) b.textContent=n;
  });
  (REQUIRED_BY_TAB[wizTab]||[]).forEach(k=>{
    const fld=document.querySelector(`#wizBody [data-field="${k}"]`);
    if(!fld) return;
    // даты: пустые подсвечиваем здесь; заполненные валидирует wireDates (правило «≥ даты решения / Дата с»)
    if(fld.querySelector('input[type="date"]')){ if(!draft[k]) fld.classList.add('invalid'); }
    else fld.classList.toggle('invalid', !draft[k]);
  });
  markTabFields(wizTab);
}
// Подсветка обязательных полей текущей вкладки по тем же правилам, что и validateTab.
// mark(key,bad): красная рамка у [data-field]; coll(sel,bad): у коллекционной сетки.
function markTabFields(ti){
  const mark=(k,bad)=>{ const f=document.querySelector(`#wizBody [data-field="${k}"]`); if(f) f.classList.toggle('invalid', bad); };
  const coll=(sel,bad)=>{ const e=document.querySelector(sel); if(e) e.classList.toggle('invalid', bad); };
  if(ti===1){                                     // Сумма и срок
    ['amount','term'].forEach(side=>{
      const isAmt=side==='amount';
      if((draft[isAmt?'amountType':'termType']||'Фиксированная')==='Диапазон'){
        mark(isAmt?'amountMin':'termMin', !draft[isAmt?'amountMin':'termMin']);
        mark(isAmt?'amountMax':'termMax', !draft[isAmt?'amountMax':'termMax']);
      } else {
        coll(`#wizBody [data-coll="${side}"]`, !((isAmt?draft.amountList:draft.termList)||[]).length);
      }
    });
  }
  else if(ti===2){                                // Процентные ставки
    if((draft.rateType||'Фиксированная')==='Диапазон'){ mark('rateMin', !draft.rateMin); mark('rateMax', !draft.rateMax); }
    else mark('rateValues', !((draft.rateValues||[]).length));
    if(draft.floatRate) mark('floatType', !draft.floatType);
  }
  else if(ti===3){                                // Штрафы
    mark('penaltyMaxPct', !draft.penaltyMaxPct);
    if((draft.penaltyMainType||'Фиксированная')==='Плавающая') mark('penaltyMainFloatType', !draft.penaltyMainFloatType);
    else mark('penaltyMainVal', !draft.penaltyMainVal);
    if((draft.penaltyIntType||'Фиксированная')==='Плавающая') mark('penaltyIntFloatType', !draft.penaltyIntFloatType);
    else mark('penaltyIntVal', !draft.penaltyIntVal);
  }
  else if(ti===4){                                // Льготный период (условные блоки)
    [['graceMain','graceMainType','graceMainDur'],
     ['graceAccr','graceAccrType','graceAccrDur'],
     ['graceInt','graceIntType','graceIntDur']].forEach(([ck,typeK,durK])=>{
      if(!draft[ck]) return;
      mark(typeK, !draft[typeK]);
      if(draft[typeK]==='Диапазон'){ mark(durK+'From', !draft[durK+'From']); mark(durK+'To', !draft[durK+'To']); }
      else if(draft[typeK]==='Фиксированный') mark(durK, !((draft[durK]||[]).length));
    });
  }
  else if(ti===5){                                // Платежи: способ графика (прочие — через REQUIRED_BY_TAB)
    if(draft.payMode==='months') mark('payMonths', !((draft.payMonths||[]).length));
    else mark('periodicity', !draft.periodicity);
  }
  else if(ti===7){                                // Залог (при включённом чек-боксе) — только ≥1 вид
    if(draft.collateral) coll('#wizBody #grid_collTypes .collgrid', !((draft.collTypes||[]).length));
  }
}
function commitDraft(){
  draft.decisionName=decName(draft.decisionId);
  if(editingId){ const i=PROGRAMS.findIndex(p=>p.id===editingId); PROGRAMS[i]=draft; }
  else { draft.id=++SEQ; PROGRAMS.unshift(draft); editingId=draft.id; }
  selectedId=editingId;
}
function saveProgram(close){
  saveTabInputs();
  const scope=wizTab;                             // сохранять можно, если вкладки 0..текущая заполнены
  const bad=firstInvalid(wizTab);
  if(bad!=null){
    wizTab=bad; renderWizTabs(); renderWizBody(); applyErrors(allTabErrors(), scope);
    toast('Заполните обязательные поля этой вкладки — см. красный счётчик.','err','Внимание');
    return;
  }
  commitDraft();
  toast('Программа успешно сохранена.','ok');
  if(close){ goList(); } else { setCrumb(draft.nameRu||'Программа', statusBadge(draft.status)); }
}
function decName(id){ const d=DECISIONS.find(x=>x.id===id); return d?d.name:''; }
function submitFromWizard(){
  saveTabInputs();
  const bad=firstInvalid(TABS.length-1);          // отправка — валидируем ВСЕ вкладки
  if(bad!=null){
    wizTab=bad; renderWizTabs(); renderWizBody(); applyErrors(allTabErrors());
    toast('Перед отправкой заполните обязательные поля всех вкладок.','err','Внимание'); return;
  }
  commitDraft(); doSubmit(draft); goList();
}

/* ---- preview tab (read-only roll-up) ---- */
/* TAB 9 «Предпросмотр» — faithful clone of live Jmix
   (проверено 2026-06-23, scripts/inspect/tab9-full.mjs + tab9-labels.mjs,
   .auth/t9-default.png). Read-only summary, all fields disabled (grey, label
   above). 4 fs22 sections: «Сводная информация о программе» (3-col, 9 fields)
   → «Финансовые параметры» | «Условия погашения» (2-col) → «Требуемые
   документы» | «Настройки проверки» (2-col). «Фиксированные суммы»/«Сроки
   кредита» carry KGS / «месяцев» unit suffixes. Bottom-right green «Отправить
   на согласование» = btnWizSubmit. */
function previewHtml(){
  // B: вкл.9 «Предпросмотр» рендерит те же секции, что и Просмотр (openView), но стопкой —
  // единый источник buildDetailSections(draft), расхождения исключены.
  const secs = buildDetailSections(draft);
  return `<div class="t9 t9-review">
    <div class="section-h t9-review-head">Предпросмотр программы перед сохранением</div>

/* ============================================================
   DETAIL / Просмотр (P2-R4)
   ============================================================ */
// B: единый построитель read-only секций программы. Используется и в Просмотре
// (openView, табами), и во вкл.9 «Предпросмотр» (previewHtml, стопкой) — одна правда.
function buildDetailSections(p){
  const fld=(k,v,span)=>`<div class="view-field${span?' col-span':''}"><span class="vlabel">${k}</span><span class="vvalue${v?'':' empty'}">${v?esc(v):'—'}</span></div>`;
  const row=(k,v)=>fld(k,v,false);
  const rowF=(k,v)=>fld(k,v,true);
  const list=a=>(a&&a.length)?a.join(', '):'';
  // tab2: сумма/срок с единицами (валюта / мес.)
  const amountStr = p.amounts ? p.amounts+(p.currency?' '+asTxt(p.currency):'') : '';
  const termStr   = p.terms   ? p.terms+' мес.' : '';
  // tab3: основная ставка (+ плавающая)
  const rateStr = p.floatRate
    ? ('Плавающая'+(p.floatType?' · '+p.floatType:''))
    : (p.rateValue||'');
  // tab4: штрафы
  const penStr=(type,val)=>{ const parts=[type,val].filter(Boolean); return parts.join(' · '); };
  // tab5: льготный период — перечисление включённых видов с длительностью (условия — внутренние, не показываются)
  const graceSeg=(lbl,ck,tK,dK)=>{
    if(!p[ck]) return null;
    let dur='';
    if(p[tK]==='Фиксированный') dur=list(p[dK])&&(p[dK]||[]).join(', ')+' мес.';
    else if(p[tK]==='Диапазон') dur=`${p[dK+'From']||'?'} – ${p[dK+'To']||'?'} мес.`;
    return lbl+(dur?': '+dur:'');
  };
  const graces=[graceSeg('По основной сумме','graceMain','graceMainType','graceMainDur'),
                graceSeg('По начислению процентов','graceAccr','graceAccrType','graceAccrDur'),
                (function(){ const s=graceSeg('По процентам','graceInt','graceIntType','graceIntDur'); if(!s) return null;
                  const d=(p.graceIntDistFrom||p.graceIntDistTo)?` · распределение отсроч. %: период ${p.graceIntDistFrom||'?'}–${p.graceIntDistTo||'?'}`:'';
                  return s+d; })()].filter(Boolean);
  // tab6: график/расчёты
  const schedStr = p.payMode==='months'
    ? 'По конкретным месяцам'+(list(p.payMonths)?': '+p.payMonths.join(', '):'')
    : (p.periodicity||'');
  const dayMethod=[p.dayCountNum,p.dayCountBase].filter(Boolean).join(' / ');
  const repayStr = p.payMode==='months' ? 'Индивидуальный' : p.repayMethod;
  const firstPay = (p.minDays||p.maxDays) ? `${p.minDays||'0'} – ${p.maxDays||'∞'} дн.` : '';
  // залоговые документы — по выбранным видам залога (вариант C)
  const collDocsRows = (p.collateral && (p.collTypes||[]).length)
    ? (p.collTypes||[]).map(type=>{ const d=(p.docColl||{})[type]||{};
        const parts=[ (d.req&&d.req.length)?'обяз.: '+d.req.join(', '):'',
                      (d.opt&&d.opt.length)?'опц.: '+d.opt.join(', '):'',
                      d.note?'требования к договору: '+d.note:'' ].filter(Boolean);
        return rowF('Залоговые документы — '+type, parts.join('  •  ')); }).join('')
    : '';
  const panel = inner => `<div class="dgrid">${inner}</div>`;
  // P2-R4: detail split into the same 8 sections as the wizard (read-only).
  return [
    ['Основные данные',
      panel(`${row('Наименование на русском',p.nameRu)}${row('Решение правительства',p.decisionName)}
        ${rowF('Краткое описание',p.shortDesc)}
        ${row('Источник финансирования',asTxt(p.source))}${row('Кредитная линия',asTxt(p.line))}
        ${row('Назначение кредита',asTxt(p.purpose))}${row('Вид кредита',asTxt(p.kind))}
        ${row('Групповой кредит',p.group?'Да':'Нет')}
        ${row('Отрасль',p.industry)}${row('Валюта',asTxt(p.currency))}
        ${row('Вид счёта погашения',asTxt(p.repayAcct))}${row('Ответственные сотрудники',p.staffMain)}
        ${row('Комиссия по заявкам',p.commission)}
        ${row('Дата с',fmtDate(p.dateFrom))}${row('Дата по',fmtDateTo(p.dateTo))}
        ${rowF('Заявители (whitelist)', (p.applicantsFiz||p.applicantsJur) ? [p.applicantsFiz,p.applicantsJur].filter(Boolean).join('; ') : 'Без ограничений — доступно всем')}
        ${rowF('Служебные заметки',p.comment)}`)],
    ['Сумма и срок',
      panel(`${row('Ограничение суммы',p.amountType)}${row('Сумма',amountStr)}
        ${row('Ограничение срока',p.termType)}${row('Срок кредита',termStr)}`)],
    ['Процентные ставки',
      panel(`${row('Тип основной ставки',p.rateType)}${row('Значение ставки',rateStr)}`)],
    ['Штрафы',
      panel(`${row('Штраф за просрочку осн. суммы',penStr(p.penaltyMainType,p.penaltyMainVal))}
        ${row('Штраф за просрочку процентов',penStr(p.penaltyIntType,p.penaltyIntVal))}
        ${row('Максимальный размер штрафа',p.penaltyMaxPct?p.penaltyMaxPct+'% от суммы кредита':'')}`)],
    ['Льготный период',
      panel(graces.length ? graces.map(g=>rowF('',g)).join('') : rowF('','Не применяется'))],
    ['Платежи и расчёты',
      panel(`${rowF('График платежей',schedStr)}
        ${row('Метод расчёта дней',dayMethod)}${row('Очередь погашения',p.queue)}

// Стаб: в реальной системе — открытие формы новой заявки (модуль «Заявки») с предзаполненной программой (FK).
function createApplication(id){
  const p=PROGRAMS.find(x=>x.id===id); if(!p) return;
  toast(`Создание заявки по программе «${p.nameRu}». В реальной системе откроется форма заявки с предзаполненной программой.`,'info');
}
function openView(id){
  const p=PROGRAMS.find(x=>x.id===id); if(!p) return; selectedId=id;
  showView('view-detail'); setCrumb(p.nameRu, statusBadge(p.status));
  // P2-R4 / B: секции строит общая buildDetailSections(p) — единый источник для Просмотра и вкл.9 «Предпросмотр».
  detailSections = buildDetailSections(p);
  detailRefBanner = p.references>0
    ? `<div class="note-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg><span>На программу ссылаются <b>${p.references}</b> downstream-записей (заявки/кредиты). Удаление заблокировано.</span></div>`
    : '';
  if(detailDataId!==id) detailTab=0;        // keep current tab on in-place rerender (status actions)
  detailDataId=id;
  renderDetailTabs();
  let acts = `<button class="btn btn-secondary" onclick="goList()">Назад к списку</button>`;
  // P2-R11: edit only in Черновик / На доработке (author)
  if((p.status==='draft'||p.status==='rework') && role==='editor') acts += `<button class="btn btn-secondary" onclick="openEdit(${p.id})">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Изменить</button>`;
  acts += `<span class="tb-spacer"></span>`;
  if(p.status==='draft'  && role==='editor') acts += `<button class="btn btn-primary" onclick="submitSelected()">Отправить на согласование</button>`;
  if(p.status==='rework' && role==='editor') acts += `<button class="btn btn-primary" onclick="resubmitSelected()">Отправить повторно</button>`;
  if(p.status==='review' && role==='confirmer'){
    acts += `<button class="btn btn-success" onclick="approveSelected()">Одобрить</button>`;
    acts += `<button class="btn btn-danger" onclick="rejectSelected()">Отклонить</button>`;
    acts += `<button class="btn btn-secondary" onclick="reworkSelected()">Вернуть на доработку</button>`;
  }
  if(p.status==='approved' && role==='confirmer') acts += `<button class="btn btn-secondary" onclick="closeSelected()">Закрыть</button>`;
  // Создать заявку по действующей программе (кредитный специалист): переход в модуль «Заявки» с предзаполненной программой.
  if(p.status==='approved') acts += `<button class="btn btn-success" onclick="createApplication(${p.id})" title="Создать заявку по этой программе">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></svg> Создать заявку</button>`;
  if((p.status==='rejected'||p.status==='closed') && role==='admin') acts += `<button class="btn btn-secondary" onclick="returnSelected()">Вернуть на согласование</button>`;
  if(p.status==='review' && role==='editor') acts += `<span class="role-pill">Ожидает согласования (роль «Согласующий»)</span>`;
  document.getElementById('detailFoot').innerHTML = acts;
}
function renderDetailTabs(){
  document.getElementById('detailTabs').innerHTML = detailSections.map((s,i)=>
    `<button class="tab ${i===detailTab?'active':''}" onclick="showDetailTab(${i})">
       <span class="tnum">${i+1}</span>${esc(s[0])}</button>`).join('');
  renderDetailBody();
}
function showDetailTab(i){ detailTab=i; renderDetailTabs(); }
function renderDetailBody(){
  const sec = detailSections[detailTab];
  document.getElementById('detailBody').innerHTML = detailRefBanner + (sec?sec[1]:'');
}

let pickList=[], pickSel=null;
function openModal(title, bodyHtml, footActions){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  const foot=document.getElementById('modalFoot');
  foot.innerHTML = (footActions||[]).map((a,i)=>`<button class="btn ${a.cls}" data-mi="${i}">${a.label}</button>`).join('');
  foot.querySelectorAll('button').forEach((b,i)=> b.onclick=footActions[i].fn);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ const m=document.getElementById('modal'); document.getElementById('overlay').classList.remove('open'); m.classList.remove('wide','lkwide','mvdlg'); m.querySelector('.modal-b').classList.remove('lk-dlg'); }
function confirmModal(title, msg, okLabel, okCls, okFn, single){
  const acts = single ? [{label:okLabel,cls:okCls,fn:closeModal}]
    : [{label:'Отмена',cls:'btn-secondary',fn:closeModal},{label:okLabel,cls:okCls,fn:()=>{closeModal();okFn();}}];
  openModal(title, `<div style="font:var(--font-body);color:var(--text-body)">${msg}</div>`, acts);
}

      <button class="btn btn-ghost btn-sm" title="Настройки фильтра" onclick="toast('Настройки фильтра — заглушка макета.','info')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button class="add-cond" onclick="toggleRefSearch()">Добавить условие поиска</button>
      ${lockChip}
    </div>
    <input class="picker-search" id="rfSearch" placeholder="Поиск…" oninput="refState.q=this.value;renderRefGrid()" style="display:none;max-width:280px;margin:0 0 10px">
    <div class="tb-actions">
      <button class="btn btn-primary btn-sm" onclick="toast('Создание из режима выбора — заглушка макета.','info')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>Создать</button>
      <button class="btn btn-secondary btn-sm" id="rfEdit" disabled onclick="toast('Изменить — заглушка макета.','info')">Изменить</button>
      ${viewBtn}
      <button class="btn btn-danger btn-sm" id="rfDel" disabled onclick="toast('Удалить — заглушка макета.','info')">Удалить</button>
      ${wfBtns}
      <span class="tb-spacer"></span>
      <div class="pager"><button disabled>«</button><button disabled>‹</button><span class="pageinfo" id="rfCount"></span><button disabled>›</button><button disabled>»</button></div>
    </div>
    <div class="lk-grid-wrap"><table class="grid"><thead><tr>${book.cols.map(c=>`<th>${c[1]}<span class="sort">⇅</span></th>`).join('')}</tr></thead><tbody id="rfBody"></tbody></table></div>`;
  const f=document.getElementById('modalFoot');
  f.innerHTML = `<button class="btn btn-secondary">Отмена</button><button class="btn btn-primary" id="rfPick" disabled>Выбрать</button>`;
  f.children[0].onclick = ()=>{ if(refState.ret){ const r=refState.ret; refState=null; r(); } else closeModal(); };
  f.children[1].onclick = commitRef;
  renderRefGrid(); document.getElementById('overlay').classList.add('open');
}
// live pager plural: 1 строка · 2–4 строки · 5–20 строк …
function strokWord(n){ const a=n%10,b=n%100; return (a===1&&b!==11)?'строка':(a>=2&&a<=4&&(b<10||b>=20))?'строки':'строк'; }
// «Добавить условие поиска» → reveals the inline search input (matches live: link first, box on click)
function toggleRefSearch(){ const s=document.getElementById('rfSearch'); if(!s) return;
  const show = s.style.display==='none'; s.style.display = show?'block':'none'; if(show) s.focus(); else { s.value=''; refState.q=''; renderRefGrid(); } }
function refRows(){
  const q=refState.q.toLowerCase();
  // R13: неактивные/недействующие значения в пикерах скрывать (Отрасль — только «Активный»)
  return refState.book.rows.filter(r=>
    (!r.status || !['Неактивный','Закрыт','Отклонен','Отклонена'].includes(r.status))
    && (!q || String(r._label).toLowerCase().includes(q)));
}
function renderRefGrid(){
  const book=refState.book, rows=refRows();
  document.getElementById('rfBody').innerHTML = rows.map(r=>
    `<tr class="${refState.sel===r._id?'sel':''}" ondblclick="refState.sel='${esc(r._id)}';commitRef()" onclick="refState.sel='${esc(r._id)}';renderRefGrid()">
      ${book.cols.map(c=>{ const v=r[c[0]]??''; return `<td title="${esc(v)}">${esc(v)}</td>`; }).join('')}</tr>`).join('')
    || `<tr><td colspan="${book.cols.length}" class="muted" style="text-align:center;padding:16px">Ничего не найдено</td></tr>`;
  const c=document.getElementById('rfCount'); if(c) c.textContent = `${rows.length} ${strokWord(rows.length)}`;
  const has=!!refState.sel;
  ['rfPick','rfEdit','rfView','rfDel'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=!has; });
}
function commitRef(){
  if(!refState.sel){ toast('Выберите запись.','warn'); return; }
  const book=refState.book, ctx=refState.ctx, row=book.rows.find(r=>r._id===refState.sel);
  if(ctx.mode==='collection'){ const r=refState.ret; refState=null; ctx.onPick(row._label); if(r) r(); return; }
  // mode field
  const key=ctx.key;
  if(key==='decisionId'){ draft.decisionId=row._id; draft.decisionName=row._label;
    const lk=document.getElementById('lk_decisionId'); if(lk){ lk.textContent=row._label; lk.classList.add('filled'); }
    document.querySelector('[data-field="decisionId"]')?.classList.remove('invalid');
    closeModal(); wireDates(); toast('Решение выбрано.','ok'); return; }
  draft[key]=row._label;
  document.querySelector(`[data-field="${key}"]`)?.classList.remove('invalid');
  closeModal();
  // re-render so dependent UI refreshes (R16/R17 маржа-зеркало, R7 валюта и т.п.)
  if(document.getElementById('view-wizard').classList.contains('active')){ saveTabInputs(); renderWizBody(); }
  else { const lk=document.getElementById('lk_'+key); if(lk){ lk.textContent=row._label; lk.classList.add('filled'); } }
}

// ---- archetype B: «Выбор значения» multi-value collection dialog ----
// (live: combo + nested ••• entity-browser + Выбрать/Отмена; add many refs)
const COLLECTION_KINDS = new Set(['applicantsFiz','applicantsJur','staff']);
let collState=null;
function openCollectionDialog(key, kind){
  const keep = (collState && collState.key===key) ? collState.items
             : (draft[key]||'').split(',').map(s=>s.trim()).filter(Boolean);
  collState = { key, kind, items:keep };
  // live «Выбор значения» = compact dialog, single combo + ••• (no «Добавить» button)
  const m=document.getElementById('modal'); m.classList.add('mvdlg');
  document.getElementById('modalTitle').textContent='Выбор значения';
  const opts = REFBOOKS[kind].rows.map(r=>`<option value="${esc(r._label)}">${esc(r._label)}</option>`).join('');
  document.getElementById('modalBody').innerHTML = `
    <div class="mv-add">
      <select id="mvCombo" onchange="if(this.value){collAdd(this.value);this.value='';}"><option value="">— выберите значение —</option>${opts}</select>
      <button class="pick" title="Открыть справочник" onclick="collOpenRef()">•••</button>
    </div>
    <div class="mv-list" id="mvList"></div>`;
  const f=document.getElementById('modalFoot');
  f.innerHTML = `<button class="btn btn-secondary">Отмена</button><button class="btn btn-primary">Выбрать</button>`;
  f.children[0].onclick = closeModal;
  f.children[1].onclick = ()=>{
    draft[collState.key] = collState.items.join(', ');
    const lk=document.getElementById('lk_'+collState.key);
    if(lk){ const v=collState.items.join(', '); lk.textContent=v||'Выберите значения…'; lk.classList.toggle('filled',!!v); }
    closeModal();
  };
  renderCollList(); document.getElementById('overlay').classList.add('open');
}
function renderCollList(){
  document.getElementById('mvList').innerHTML = collState.items.length
    ? collState.items.map((v,i)=>`<div class="mv-chip"><span class="pn">${esc(v)}</span><button title="Убрать" onclick="collRemove(${i})">✕</button></div>`).join('')
    : `<div class="mv-empty">Значения не выбраны. Выберите из списка или через ••• справочник.</div>`;
}
function collAdd(v){ if(!v){ toast('Выберите значение.','warn'); return; } if(!collState.items.includes(v)) collState.items.push(v); renderCollList(); }
function collRemove(i){ collState.items.splice(i,1); renderCollList(); }
function collOpenRef(){
  const saved=collState, kind=saved.kind;
  openRefDialog(REFBOOKS[kind], { mode:'collection', onPick:(v)=>{ saved.items.includes(v)||saved.items.push(v); },
    ret:()=>{ const m=document.getElementById('modal'); m.classList.remove('lkwide'); m.querySelector('.modal-b').classList.remove('lk-dlg'); collState=saved; openCollectionDialog(saved.key, saved.kind); } });
}
function clearLookup(key){ draft[key]=''; if(key==='decisionId') draft.decisionName='';
  const lk=document.getElementById('lk_'+key);
  if(lk){ lk.textContent = key==='decisionId'?'Выберите одобренное решение…':'Выберите…'; lk.classList.remove('filled'); } }

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg, kind, title){
  const ic = kind==='ok' ? '<path d="M20 6L9 17l-5-5"/>' :
             kind==='err'? '<circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6"/><path d="M9 9l6 6"/>' :
             kind==='warn'?'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/>' :
             '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>';
  const el=document.createElement('div');
  el.className='toast '+(kind||'');
  el.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ic}</svg>
    <div>${title?`<div class="tt">${esc(title)}</div>`:''}${esc(msg)}</div>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3600);
}

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });
// close the tab-3 rate multi-combo on outside click
document.addEventListener('click', e=>{ if(t3comboOpen && !e.target.closest('#rateCombo')){ t3comboOpen=false; const c=document.getElementById('rateCombo'); c&&c.classList.remove('open'); } });
// close single-select comboboxes (R13) on outside click
document.addEventListener('click', e=>{ if(comboOpenKey){ const el=document.getElementById('combo_'+comboOpenKey); if(el && !e.target.closest('#combo_'+comboOpenKey)){ el.classList.remove('open'); comboOpenKey=null; } } });
goList();
</script>
