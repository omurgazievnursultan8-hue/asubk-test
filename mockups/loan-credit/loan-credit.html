<title>Кредиты · АСУБК</title>
<!--
  MOCKUP (single-file, interactive) — образец для команды разработки, не прод-код.
  Раздел «Кредиты» (список /loansCredit · деталь /loan-credits/{id}).
  Точная копия живого тест-стенда https://fkftest.okmot.kg/, инспекция 2026-07-06,
  скрипт scripts/inspect/loan-credit-clone.mjs (запись 18 = «Номер регистрации 56»,
  заёмщик ОсОО «Бек Кабель», ПИН 01912201610212).

  Две части: список (14 строк) → деталь «Редактирование кредита» (11 вкладок).
  Все вкладки и содержимое соответствуют живой системе. Как-есть клон:
  воспроизводит поведение и дефекты, без улучшений (см. P5-* в notes/qa-findings.md).

  ПРИМЕЧАНИЕ по данным: деталь наполняется одним полностью заполненным образцом
  (запись 56). При клике по другим строкам списка открывается тот же образец —
  демо-ограничение макета, а не дефект живой системы.

  Клики воспроизводят живые диалоги: ••• → экран-браузер справочника, «Добавить»
  на Транши/Платеж → форма создания, поля даты → календарь (см.
  scripts/inspect/loan-credit-clicks*.mjs, loan-credit-final2.mjs).
-->
<style>
:root{
  --asubk-blue:#006AF5; --asubk-blue-hover:#0058CC; --asubk-blue-active:#0049A8;
  --asubk-link:#005FDB; --asubk-green:#158443; --asubk-green-hover:#106A36;
  --asubk-red:#E03A3A; --asubk-red-hover:#C42E2E;
  --asubk-ink:#192434;
  --asubk-ink-90:rgba(24,39,57,0.94); --asubk-ink-65:rgba(24,39,57,0.65);
  --asubk-ink-45:rgba(24,39,57,0.45); --asubk-ink-26:rgba(28,52,84,0.26);
  --asubk-white:#FFFFFF; --asubk-gray-50:#F8F9FB; --asubk-gray-100:#F5F7FA;
  --asubk-gray-150:#EFF1F4; --asubk-gray-200:#E4E8EE;
  --asubk-border-base:rgba(28,55,90,0.16); --asubk-border-strong:rgba(28,55,90,0.30);
  --asubk-blue-tint:rgba(0,106,245,0.08); --asubk-nav-active:rgba(51,139,255,0.13);
  --asubk-disabled-fill:rgba(25,59,103,0.05); --asubk-red-tint:#FCE6E6;
  --asubk-green-tint:rgba(21,132,67,0.10); --asubk-amber:#B8860B; --asubk-amber-tint:rgba(184,134,11,0.12);
  --text-body:var(--asubk-ink-90); --text-heading:var(--asubk-ink); --text-muted:var(--asubk-ink-65);
  --text-placeholder:var(--asubk-ink-45); --text-disabled:var(--asubk-ink-26); --text-link:var(--asubk-link);
  --surface-page:var(--asubk-white); --surface-panel:var(--asubk-gray-100); --surface-sidebar:var(--asubk-gray-150);
  --surface-card:var(--asubk-white); --surface-input:var(--asubk-gray-200); --surface-hover:var(--asubk-gray-50);
  --border-default:var(--asubk-border-base); --border-strong:var(--asubk-border-strong); --border-focus:var(--asubk-blue);
  --action-primary:var(--asubk-blue); --action-primary-hover:var(--asubk-blue-hover);
  --action-success:var(--asubk-green); --action-danger:var(--asubk-red);
  --status-success:var(--asubk-green); --status-success-bg:var(--asubk-green-tint);
  --status-info:var(--asubk-blue); --status-info-bg:var(--asubk-blue-tint);
  --status-warning:var(--asubk-amber); --status-warning-bg:var(--asubk-amber-tint);
  --status-error:var(--asubk-red); --status-error-bg:var(--asubk-red-tint);
  --asubk-font:-apple-system,BlinkMacSystemFont,Roboto,"Segoe UI",Helvetica,Arial,sans-serif;
  --text-xs:12px; --text-sm:14px; --text-base:16px; --text-lg:18px;
  --weight-regular:400; --weight-medium:500; --weight-semibold:600; --weight-bold:700;
  --leading-tight:1.2; --leading-snug:1.35; --leading-normal:1.5;
  --font-body:var(--weight-regular) var(--text-base)/var(--leading-normal) var(--asubk-font);
  --font-label:var(--weight-regular) var(--text-sm)/var(--leading-snug) var(--asubk-font);
  --font-page-title:var(--weight-semibold) var(--text-lg)/var(--leading-tight) var(--asubk-font);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:24px; --space-6:32px;
  --radius-sm:3.5px; --radius-md:4px; --radius-lg:8px; --radius-pill:999px;
  --control-h:36px; --header-h:56px; --sidebar-w:320px;
  --shadow-focus:0 0 0 2px rgba(0,106,245,0.35);
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font:var(--font-body); color:var(--text-body); background:var(--surface-page); }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:rgba(28,55,90,0.22); border-radius:6px; }
a{ color:inherit; }

.app{ display:flex; height:100vh; width:100%; }

/* ---- sidebar ---- */
.sidebar{ width:var(--sidebar-w); flex:none; background:var(--surface-sidebar);
  display:flex; flex-direction:column; border-right:1px solid var(--border-default); }
.brand{ padding:18px 16px 14px; font:var(--weight-semibold) 17px/1.2 var(--asubk-font);
  color:var(--text-heading); letter-spacing:0.04em; }
.nav{ flex:1; overflow-y:auto; padding-bottom:8px; }
.nav-toggle{ display:flex; align-items:center; gap:8px; width:100%; appearance:none;
  border:none; background:transparent; color:rgba(24,39,57,0.82); cursor:pointer; text-align:left; }
.nav-group > .nav-toggle{ padding:9px 16px; font:var(--weight-semibold) 15px/1.3 var(--asubk-font); }
.nav-sub > .nav-toggle{ padding:8px 16px 8px 32px; font:var(--weight-semibold) 14px/1.3 var(--asubk-font); }
.nav-toggle:hover{ background:rgba(24,39,57,0.04); }
.nav-toggle .chev{ display:inline-flex; align-items:center; color:rgba(24,39,57,0.5);
  transition:transform 120ms ease; flex:none; }
.nav-group.open > .nav-toggle .chev, .nav-sub.open > .nav-toggle .chev{ transform:rotate(90deg); }
.nav-toggle .lbl{ flex:1; }
.nav-children{ display:none; }
.nav-group.open > .nav-children, .nav-sub.open > .nav-children{ display:block; }
.nav-item{ display:block; padding:7px 16px 7px 52px; text-decoration:none; color:rgba(24,39,57,0.88);
  font:var(--weight-regular) 15px/1.35 var(--asubk-font); cursor:pointer; }
.nav-item.headerless{ padding-left:40px; }
.nav-item:hover{ background:rgba(24,39,57,0.05); }
.nav-item.active{ background:var(--asubk-nav-active); color:rgba(24,39,57,0.96); }
.sidebar-foot{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px; color:var(--text-muted); }
.sidebar-foot span{ font:var(--weight-regular) 14px/1.2 var(--asubk-font); }
.icon-btn{ border:none; background:rgba(24,39,57,0.05); color:var(--text-link); cursor:pointer;
  padding:7px; border-radius:4px; display:flex; }

/* ---- main ---- */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--surface-page); }
.topbar{ height:var(--header-h); flex:none; background:var(--surface-page);
  border-bottom:1px solid var(--border-default); display:flex; align-items:center; gap:14px; padding:0 20px; }
.topbar .menu{ color:var(--text-muted); display:flex; cursor:pointer; }
.crumb-title{ font:var(--font-page-title); color:var(--text-heading); }

.content{ flex:1; overflow:auto; display:flex; flex-direction:column; min-width:0; }
.view{ display:none; flex-direction:column; min-height:0; }

/* ---- buttons ---- */
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);
  height:var(--control-h); padding:0 14px; border:1px solid transparent; border-radius:var(--radius-md);
  font:var(--weight-semibold) var(--text-sm)/1 var(--asubk-font); cursor:pointer; white-space:nowrap; }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn svg{ flex:none; }
.btn-primary{ background:var(--action-primary); color:#fff; }
.btn-primary:hover:not(:disabled){ background:var(--action-primary-hover); }
.btn-secondary{ background:var(--surface-card); color:var(--text-body); border-color:var(--border-default); }
.btn-secondary:hover:not(:disabled){ background:var(--surface-hover); }
.btn-success{ background:var(--action-success); color:#fff; }
.btn-success:hover:not(:disabled){ background:var(--asubk-green-hover); }
.btn-sm{ height:32px; padding:0 10px; }
/* tinted grid-toolbar buttons (Добавить/Открыть/Удалить/Редактировать/расчёт) */
.btn-tint{ background:var(--asubk-disabled-fill); color:var(--text-link); border:none; }
.btn-tint:hover:not(:disabled){ background:rgba(25,59,103,0.10); color:var(--action-primary-hover); }
.btn-tint.danger{ color:var(--action-danger); }
.btn-tint.danger:hover:not(:disabled){ background:var(--status-error-bg); }

/* ---- L1: split «Обновить» ---- */
.split{ position:relative; display:inline-flex; }
.split > .btn{ border-radius:0; }
.split > .btn:first-child{ border-top-left-radius:var(--radius-md); border-bottom-left-radius:var(--radius-md); }
.split > .btn.caret{ padding:0 7px; border-top-right-radius:var(--radius-md); border-bottom-right-radius:var(--radius-md);
  border-left:1px solid rgba(255,255,255,0.35); }
.split-menu{ display:none; position:absolute; top:calc(100% + 4px); left:0; min-width:210px; z-index:30;
  background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-md);
  box-shadow:0 10px 30px rgba(16,28,46,0.18); padding:4px; }
.split.open .split-menu{ display:block; }
.split-menu button{ display:block; width:100%; text-align:left; border:none; background:transparent; cursor:pointer;
  padding:8px 10px; border-radius:var(--radius-sm); font:var(--font-label); color:var(--text-body); }
.split-menu button:hover{ background:var(--surface-hover); }
.gear-btn{ width:var(--control-h); height:var(--control-h); border:1px solid var(--border-default);
  background:var(--surface-card); border-radius:var(--radius-md); color:var(--text-muted); cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; }
.gear-btn:hover{ background:var(--surface-hover); }

/* ---- list: filter head + toolbar ---- */
.filter-head{ display:flex; align-items:center; gap:6px; padding:12px 20px 4px; cursor:pointer;
  font:var(--font-label); color:var(--text-muted); user-select:none; }
.filter-head .chev{ display:inline-flex; align-items:center; color:rgba(24,39,57,0.5); transition:transform 120ms ease; }
.filter-head.open .chev{ transform:rotate(90deg); }
.tb-actions{ display:flex; align-items:center; gap:10px; padding:8px 20px 12px; flex-wrap:wrap; }
.add-cond{ display:inline-flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer;
  color:var(--text-link); font:var(--weight-medium) var(--text-sm)/1 var(--asubk-font); padding:0 4px; }
.add-cond:hover{ text-decoration:underline; }
.rowtools{ display:flex; align-items:center; gap:10px; padding:0 20px 8px; }
.rowtools .spacer{ flex:1; }
.pager{ display:flex; align-items:center; gap:6px; color:var(--text-muted); font:var(--font-label); }
.pager button{ min-width:30px; height:30px; border:1px solid var(--border-default); background:var(--surface-card);
  border-radius:var(--radius-sm); cursor:pointer; color:var(--text-body); }
.pager button:disabled{ opacity:.4; cursor:not-allowed; }

/* ---- grid (list) ---- */
.grid-wrap{ padding:0 20px 20px; overflow:auto; }
table.grid{ width:100%; border-collapse:collapse; font:var(--font-label); table-layout:fixed;
  border:1px solid var(--border-strong); }
table.grid thead th{ text-align:left; padding:10px 12px; background:var(--surface-panel);
  border-bottom:1px solid var(--border-strong); border-right:1px solid var(--border-default);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); color:var(--text-heading);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; user-select:none; }
table.grid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; }
table.grid tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default);
  border-right:1px solid var(--border-default);
  color:var(--text-body); vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
table.grid tbody tr{ cursor:pointer; }
table.grid tbody tr:hover{ background:var(--surface-hover); }
table.grid tbody tr.sel{ background:var(--asubk-nav-active); }

/* ---- detail ---- */
.detail-tabbar-wrap{ position:relative; border-bottom:1px solid var(--border-default);
  background:var(--surface-page); flex:none; }
.detail-tabbar{ display:flex; overflow-x:auto; padding:6px 44px 0 20px; scrollbar-width:none; }
.detail-tabbar::-webkit-scrollbar{ display:none; }
.dtab{ flex:none; border:none; background:transparent; padding:11px 15px;
  font:var(--weight-medium) var(--text-base)/1 var(--asubk-font); color:var(--text-muted);
  border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; white-space:nowrap; }
.dtab:hover{ color:var(--text-body); }
.dtab.active{ color:var(--asubk-blue); border-bottom-color:var(--asubk-blue); font-weight:var(--weight-semibold); }
.tabbar-chevron{ position:absolute; right:8px; top:50%; transform:translateY(-50%); width:28px; height:28px;
  background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-md);
  display:flex; align-items:center; justify-content:center; color:var(--text-muted); cursor:pointer; }
.tabbar-chevron:hover{ background:var(--surface-hover); }

.panel-wrap{ padding:18px 20px 8px; }
.panel-card{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:20px 24px; }
.detail-panel{ display:none; }
.detail-panel.active{ display:block; }

/* two-column form (label above) */
.f2{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; max-width:1500px; }
.f2.col-span-wide{ max-width:none; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field .flabel{ font:var(--font-label); color:var(--text-muted); }
.field.col-span{ grid-column:1 / -1; }
.control{ position:relative; display:flex; align-items:center; }
.control input, .control select, .note-area{ width:100%; height:var(--control-h); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); font-weight:var(--weight-medium);
  border:1px solid var(--border-strong); outline:none; padding:0 var(--space-2);
  transition:box-shadow 120ms ease, border-color 120ms ease; }
.control select{ cursor:pointer; appearance:none; padding-right:30px; }
.control input:focus, .control select:focus, .note-area:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); }
/* as-is: readonly / grey-filled look (P2-01 live defect kept) */
.control input[readonly], .ro input, .ro .note-area{ background:var(--surface-input); color:var(--text-muted); border:1px solid transparent; cursor:default; }
.control input[readonly]:focus{ border-color:transparent; box-shadow:none; }
.grey input, .grey select{ background:var(--surface-input); border-color:transparent; }
.control .cal, .control .caret{ position:absolute; right:9px; pointer-events:none; color:var(--text-muted); display:flex; }
.note-area{ height:auto; min-height:80px; padding:10px 12px; resize:vertical; line-height:1.5; }
/* paired date-time widgets (as-is P5-06: date | time split, unlabeled) */
.dtpair{ display:grid; grid-template-columns:1fr 1fr; gap:0 10px; }

/* lookup (picker) — ••• / × / eye */
.lookup{ display:flex; align-items:center; height:var(--control-h); background:var(--surface-input);
  border-radius:var(--radius-md); border:1px solid transparent; padding-left:var(--space-2); }
.lookup .val{ flex:1; font:var(--font-body); font-weight:var(--weight-medium); color:var(--text-body);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lookup .val.ph{ color:var(--text-placeholder); }
.lookup button{ display:inline-flex; align-items:center; justify-content:center; width:32px; height:var(--control-h);
  border:none; background:transparent; color:var(--text-link); cursor:pointer; }
.lookup .pick{ font-weight:var(--weight-bold); letter-spacing:1px; }

/* nested sub-tabs (Условия кредита) */
.subtabs{ display:flex; gap:2px; border-bottom:1px solid var(--border-default); margin-bottom:20px; }
.subtab{ border:none; background:transparent; padding:9px 4px; margin-right:22px;
  font:var(--weight-medium) var(--text-base)/1 var(--asubk-font); color:var(--text-muted);
  border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; }
.subtab.active{ color:var(--asubk-blue); border-bottom-color:var(--asubk-blue); font-weight:var(--weight-semibold); }
.subpanel{ display:none; }
.subpanel.active{ display:block; }
.empty-note{ padding:30px 4px; color:var(--text-placeholder); font:var(--font-label); }

/* summary field row (График) */
.sumrow{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:0 24px; margin-bottom:18px; max-width:1500px; }

/* toolbar above collection grid */
.gtoolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.gtoolbar .sel{ display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }

/* collection grid */
.cgrid-wrap{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:auto; min-height:120px; }
table.cgrid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
table.cgrid thead th{ position:sticky; top:0; text-align:left; padding:10px 12px; background:var(--surface-card);
  border-bottom:1px solid var(--border-default); font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font);
  color:var(--text-heading); cursor:pointer; user-select:none; }
table.cgrid thead th .sort{ color:var(--text-placeholder); margin-left:4px; font-size:11px; font-weight:400; }
table.cgrid tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default); color:var(--text-body); }
table.cgrid tbody tr{ cursor:pointer; }
table.cgrid tbody tr:hover{ background:var(--surface-hover); }
table.cgrid tbody tr.sel{ background:var(--asubk-nav-active); }
table.cgrid tr.total td, table.cgrid tbody tr.total td{ font-weight:var(--weight-bold); color:var(--text-heading);
  background:var(--surface-hover); border-top:1px solid var(--border-strong); }
table.cgrid tbody tr.total.green td{ background:var(--asubk-green-tint); }
.cgrid-empty{ min-height:240px; }
.upload-row{ display:flex; align-items:center; gap:10px; margin-top:16px; }
.filename{ font:var(--font-label); color:var(--text-muted); }
.section-h{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); margin:0 0 14px; }

/* ---- footer OK/Отмена ---- */
.footer{ position:sticky; bottom:0; background:var(--surface-page); border-top:1px solid var(--border-default);
  padding:14px 20px; display:flex; align-items:center; gap:12px; }

/* ============================================================
   MODALS / OVERLAYS — picker (entity-browser) + form dialogs
   ============================================================ */
.overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.42); display:none; align-items:center;
  justify-content:center; z-index:60; padding:24px; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface-card); border-radius:var(--radius-lg); width:min(1040px,100%); max-height:88vh;
  display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(16,28,46,0.4); }
.modal.form{ width:min(1100px,100%); }
.modal.form.narrow{ width:min(620px,100%); }
.modal-h{ padding:18px 24px 12px; display:flex; align-items:center; gap:10px; }
.modal-h .mt{ font:var(--weight-bold) 20px/1.2 var(--asubk-font); color:var(--text-heading); flex:1; }
.modal-x{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); display:flex; padding:4px; }
.modal-x:hover{ color:var(--text-body); }
.modal-b{ padding:0 24px 8px; overflow:auto; flex:1; }
.modal-f{ padding:14px 24px 20px; display:flex; gap:12px; }

/* entity-browser dialog innards (Фильтр + toolbar + grid + Выбрать/Отмена) */
.eb-createbar{ display:flex; gap:10px; align-items:center; margin:6px 0 12px; }
.eb-create{ background:var(--action-primary); color:#fff; border:none; }
.eb-create:hover{ background:var(--action-primary-hover); }
.eb-grid-wrap{ border:1px solid var(--border-strong); border-radius:var(--radius-md); overflow:auto; max-height:44vh; }
.eb-grid-wrap thead tr{ outline:1.5px solid var(--asubk-blue); outline-offset:-1.5px; }
table.eb-grid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
table.eb-grid thead th{ position:sticky; top:0; background:var(--surface-panel); text-align:left; z-index:1;
  padding:11px 14px; border-bottom:1px solid var(--border-default); color:var(--text-heading);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); }
table.eb-grid thead th .sort{ color:var(--asubk-blue); margin-left:6px; font-size:12px; font-weight:400; }
table.eb-grid tbody td{ padding:11px 14px; border-bottom:1px solid var(--border-default); color:var(--text-body); }
table.eb-grid tbody tr{ cursor:pointer; }
table.eb-grid tbody tr:hover{ background:var(--surface-hover); }
table.eb-grid tbody tr.sel{ background:var(--asubk-nav-active); }
table.eb-grid tbody tr:last-child td{ border-bottom:none; }
.eb-empty{ padding:60px 0; text-align:center; color:var(--text-placeholder); font:var(--font-label); }

/* form dialog: 2-col, as-is grey-filled look (P2-01) + eager required red (P7) */
.mform{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; padding-top:8px; }
.mform .field{ gap:6px; }
.mform .field .flabel{ font:var(--font-label); color:var(--text-muted); }
.mform .field.req .flabel::after{ content:" •"; color:var(--action-danger); }
.mform .field.foc .flabel{ color:var(--asubk-blue); }
.mform .field.foc .control input{ border-color:var(--asubk-blue); box-shadow:0 0 0 3px var(--asubk-blue-tint); background:var(--surface-card); }
.mform .control input, .mform .control select{ background:var(--surface-input); border-color:transparent; }
.mform .control input.dashed{ background:var(--surface-card); border:1px dashed var(--border-strong); }
.mform .field.err .control input, .mform .field.err .control select{ background:rgba(224,58,58,0.10); border-color:transparent; }
.mform .field.err .errmsg{ display:block; }
.mform .errmsg{ display:none; font:var(--weight-medium) 12px/1.3 var(--asubk-font); color:var(--action-danger); margin-top:3px; }
.mform .col-span{ grid-column:1 / -1; }
.check{ display:flex; align-items:center; gap:8px; font:var(--font-body); color:var(--text-body); cursor:pointer; }
.check .box{ width:18px; height:18px; border:1.5px solid var(--border-strong); border-radius:3px; background:var(--surface-card); }

/* mini calendar popup (date picker) */
.calpop{ position:absolute; z-index:70; background:var(--surface-card); border:1px solid var(--border-default);
  border-radius:var(--radius-md); box-shadow:0 12px 34px rgba(16,28,46,0.22); padding:10px; width:252px; display:none; }
.calpop.open{ display:block; }
.cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.cal-head button{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); padding:4px 8px; border-radius:var(--radius-sm); }
.cal-head button:hover{ background:var(--surface-hover); }
.cal-title{ font:var(--weight-semibold) var(--text-sm)/1 var(--asubk-font); color:var(--text-heading); }
.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-grid .dow{ font:var(--weight-medium) 11px/1 var(--asubk-font); color:var(--text-muted); text-align:center; padding:4px 0; }
.cal-grid .day{ text-align:center; padding:6px 0; font:var(--font-label); border-radius:var(--radius-sm); cursor:pointer; }
.cal-grid .day:hover{ background:var(--surface-hover); }
.cal-grid .day.today{ outline:1px solid var(--asubk-blue); }
.cal-grid .day.sel{ background:var(--asubk-blue); color:#fff; }
.cal-grid .day.mute{ color:var(--text-placeholder); }

/* ---- toast ---- */
.toast-wrap{ position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:80; }
.toast{ min-width:260px; max-width:420px; padding:12px 14px; border-radius:var(--radius-md);
  background:var(--asubk-ink); color:#fff; font:var(--font-label); box-shadow:0 10px 30px rgba(16,28,46,0.3);
  display:flex; gap:10px; align-items:flex-start; }
.toast.ok{ background:var(--asubk-green); }

function pickSel(i){
  pickerCtx.selIdx = i;
  document.querySelectorAll('#modalHost .eb-grid tbody tr').forEach((tr,idx)=>tr.classList.toggle('sel',idx===i));
  document.getElementById('ebPick').disabled = false;
  document.getElementById('ebEdit').disabled = false;
  document.getElementById('ebDel').disabled = false;
}
function pickApply(){
  const rb = REFBOOKS[pickerCtx.key];
  const row = rb.rows[pickerCtx.selIdx];
  const val = row[row.length-1]; // display last col (name / subject)
  if(pickerCtx.anchor){
    const lookup = pickerCtx.anchor.closest('.lookup');
    const span = lookup.querySelector('.val');
    span.textContent = val; span.classList.remove('ph');
  }
  closeModal();
  toast('Выбрано: '+val);
}
function clearPicker(btn){
  const span = btn.closest('.lookup').querySelector('.val');
  span.textContent=''; span.classList.add('ph');
}
function viewPicker(key){
  const lookup = [...document.querySelectorAll('.lookup')].find(l=>l.dataset.key===key);
  const v = lookup?.querySelector('.val')?.textContent.trim();
  toast(v ? ('Просмотр: '+v) : 'Значение не выбрано');
}

/* ============================================================
   CALENDAR POPUP (date-picker) — month grid, prev/next
   ============================================================ */
const calState = { input:null, y:2026, m:6, sel:6 };
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
function openCalendar(input){
  const pop = document.getElementById('calPop');
  if(calState.input===input && pop.classList.contains('open')){ pop.classList.remove('open'); calState.input=null; return; }
  calState.input = input; calState.y=2026; calState.m=6;
  renderCalendar();
  const r = input.getBoundingClientRect();
  pop.style.left = Math.min(r.left, window.innerWidth-270)+'px';
  pop.style.top = (r.bottom+4)+'px';
  pop.classList.add('open');
}
function renderCalendar(){
  const pop = document.getElementById('calPop');
  const {y,m} = calState;
  const first = new Date(y,m,1).getDay(); const start=(first+6)%7; // Mon-first
  const dim = new Date(y,m+1,0).getDate();
  const dows=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let cells='';
  for(let i=0;i<start;i++) cells+=`<div class="day mute"></div>`;
  for(let d=1;d<=dim;d++){ const isSel=(d===calState.sel && m===6); const isToday=(d===6 && m===6);
    cells+=`<div class="day${isSel?' sel':''}${isToday&&!isSel?' today':''}" onclick="pickDay(${d})">${d}</div>`; }
  pop.innerHTML = `<div class="cal-head">
      <button onclick="calNav(-1)">‹</button><span class="cal-title">${MONTHS[m]} ${y}</span><button onclick="calNav(1)">›</button>
    </div><div class="cal-grid">${dows.map(d=>`<div class="dow">${d}</div>`).join('')}${cells}</div>`;
}
function calNav(d){ calState.m+=d; if(calState.m<0){calState.m=11;calState.y--;} if(calState.m>11){calState.m=0;calState.y++;} renderCalendar(); }
function pickDay(d){
  calState.sel=d;
  const dd=String(d).padStart(2,'0'), mm=String(calState.m+1).padStart(2,'0');
  if(calState.input) calState.input.value = `${dd}.${mm}.${calState.y}`;
  document.getElementById('calPop').classList.remove('open'); calState.input=null;
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.calpop') && !(e.target.closest('.control') && e.target.tagName==='INPUT'))
    document.getElementById('calPop').classList.remove('open');
});

renderList();
