    const payRows=pays.map(p=>{
      const ed=CR.paymentEditable(c,p);
      const layers=Object.keys(p.layers||{}).length?Object.entries(p.layers).map(([k,v])=>`${esc(k)}: ${money(v)}`).join(' · '):'—';
      return `<tr>
        <td>${esc(p.num)}</td><td>${esc(p.date)}</td><td style="text-align:right">${money(p.amount)}</td><td>№${esc(p.tranche)}</td>
        <td>${esc(p.reg)}</td><td>${esc(p.match)}</td><td>${p.frozen?'заморожен':'—'}</td>
        <td>${layers}</td><td>${ed?'<span class="pill info">правка возможна</span>':'<span class="pill neutral">read-only ЦК</span>'}</td></tr>`;
    });
    const b=d.debt;
    const drow=(name,x)=>`<tr><td>${name}</td><td style="text-align:right">${money(x.accrued)}</td><td style="text-align:right">${money(x.paid)}</td><td style="text-align:right;color:${x.overdue>0?'var(--asubk-red)':'inherit'}">${money(x.overdue)}</td><td style="text-align:right">${money(x.bal)}</td></tr>`;
    const courts=(c.mirror.collection||[]).filter(x=>/суд|решени/i.test((x.subject||'')+(x.phase||'')));
    return `
      <div class="section-h">Платежи ${lockHtml()}</div>
      <p class="section-note">Зеркало модуля платежей. Три оси на платёж: регистрация · сопоставление · заморозка. Слои показаны, но не редактируются здесь.</p>
      ${cgrid([{h:'№'},{h:'Дата'},{h:'Сумма',r:1},{h:'Транш'},{h:'Регистрация'},{h:'Сопоставление'},{h:'Заморозка'},{h:'Слои'},{h:'Правка'}], payRows, {empty:'Платежей нет'})}
      <div class="mirror-src">Источник: модуль платежей (Р-5). Ручной ввод — вызов формы владельца, платёж повисает «Ожидает ЦК» и не двигает остатки до подтверждения ЦК.</div>
      <div class="gtoolbar" style="margin-top:12px">${roleBtn('savePayment','Внести платёж вручную',"CR.stubAction('Ручной ввод платежа')",'btn btn-primary btn-sm')}</div>
      ${courts.length?`<div class="info-plate">${svgInfo()}<div>Есть судебное решение: возможна множественность слоёв начисления (шов №5, §10.4) — сначала сумма по решению, затем договор. Матрица очередей — вне макета.</div></div>`:''}
      <div class="section-h" style="margin-top:22px">Задолженность (из детального расчёта)</div>
      <div class="cgrid-wrap"><table class="cgrid"><thead><tr><th>Слой</th><th style="text-align:right">Начислено</th><th style="text-align:right">Оплачено</th><th style="text-align:right">Просрочено</th><th style="text-align:right">Остаток</th></tr></thead><tbody>
        ${drow('Основной долг', b.principal)}${drow('Проценты', b.interest)}${drow('Пеня / штрафы', b.penalty)}
      </tbody></table></div>`;
  }

  /* ---- ВКЛАДКА 6: Обеспечение (зеркало залогового модуля, Р-7) ---- */
  function tabObespechenie(c,d){
    const cov=d.coverage, light=cov.ok?'var(--asubk-green)':'var(--asubk-red)';
    const pledgeRows=[];
    for(const p of (c.mirror.pledges||[])) for(const it of (p.items||[])){
      pledgeRows.push(`<tr>
        <td>${esc(p.contractNum)}</td><td>${esc(it.name)}</td><td>${esc(it.kind)}</td>
        <td style="text-align:right">${money(it.appraised)}</td><td style="text-align:right">${money(it.pledgeValue)}</td><td style="text-align:right">${Math.round((it.share==null?1:it.share)*100)}%</td>
        <td>${p.liquid?'<span class="pill low">ликвид</span>':'<span class="pill mid">неликвид</span>'}</td>
        <td>${p.ban?'<span class="pill info">запрет</span>':'—'}</td>
        <td>${(p.otherCredits&&p.otherCredits.length)?esc(p.otherCredits.join(', ')):'—'}</td></tr>`);
    }
    const bg=c.mirror.bankGuarantee, guars=(c.mirror.guarantees||[]);
    return `
      <div class="section-h">Обеспечение ${lockHtml()}</div>
      <p class="section-note">Зеркало залогового модуля. Залоговые договоры создаются только в модуле залога (Р-7) — здесь доступна привязка существующего.</p>
      ${cgrid([{h:'Договор залога'},{h:'Предмет'},{h:'Вид'},{h:'Оценочная',r:1},{h:'Залоговая',r:1},{h:'Доля'},{h:'Ликвидность'},{h:'Запрет отчуждения'},{h:'Также обеспечивает'}], pledgeRows, {empty:'Обеспечение не привязано'})}
      <div class="mirror-src">Источник: модуль залога (Р-7). Данные read-only.</div>
      <div class="section-h" style="margin-top:22px">Покрытие</div>
      <div class="phead-dims" style="grid-template-columns:repeat(4,1fr)">
        <div class="dim"><div class="dl">Индекс покрытия</div><div class="dv"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${light};margin-right:6px"></span>${Math.round(cov.index*100)}%</div></div>
        <div class="dim"><div class="dl">Порог</div><div class="dv">${cov.req}%</div></div>
        <div class="dim"><div class="dl">Доля ликвида</div><div class="dv">${Math.round(cov.liquidShare*100)}%</div></div>
        <div class="dim"><div class="dl">Статус</div><div class="dv" style="color:${light}">${cov.ok?'достаточно':'недостаточно'}</div></div>
      </div>
      <div class="mirror-src">База покрытия: ${esc(cov.source)}. Банковская гарантия входит в индекс, поручительство — нет.</div>
      ${bg?`<div class="section-h" style="margin-top:22px">Банковская гарантия (в индексе)</div><div class="f2">${fld('Банк',esc(bg.bank))}${fld('Сумма',money(bg.amount))}${fld('Действует до',esc(bg.till))}</div>`:''}
      ${guars.length?`<div class="info-plate">${svgInfo()}<div>Поручительство (${guars.map(g=>esc(g.party)).join(', ')}) — параллельный слой обеспечения, в индекс покрытия НЕ входит (открытый вопрос §10.2).</div></div>`:''}
      <div class="gtoolbar" style="margin-top:16px">
        ${roleBtn('linkPledge','Привязать существующий',"CR.stubAction('Привязка залогового договора (Г-13)')",'btn btn-primary btn-sm')}
        <button class="btn btn-secondary btn-sm" onclick="CR.toast('Открытие модуля залога — вне объёма макета')">Открыть в модуле залога</button>
      </div>`;
  }

  /* ---- ВКЛАДКА 7: Проблемные ---- */
  function tabProblemnye(c,d){
    const grp=(c.mirror.borrowerRisk&&c.mirror.borrowerRisk.group)||null;
    const byDays=d.overdueDays>=181?'высокий':d.overdueDays>=1?'средний':'низкий';
    const byGroup=(grp==='C'||grp==='D')?'высокий':grp==='B'?'средний':'низкий';
    const rs=c.mirror.restructuring||{count:0,active:null};
    const collRows=(c.mirror.collection||[]).map(x=>`<tr><td>${esc(x.processId)}</td><td>${esc(x.contour)}</td><td>${esc(x.phase)}</td><td>${esc(x.subject)}</td><td style="text-align:right">${money(x.claim)}</td><td>${esc(x.since)}</td></tr>`);
    const hasBankruptcy=d.overlays.some(o=>o.kind==='bankruptcy');
    return `
      <div class="section-h">Категория риска — worst-of</div>
      <div class="cat-expand">
        <div class="row"><span class="ck">По просрочке (${d.overdueDays} дн.):</span> <b class="cat-${catClsOf(byDays)}">${byDays}</b></div>
        <div class="row"><span class="ck">По группе заёмщика (${esc(grp||'—')}):</span> <b class="cat-${catClsOf(byGroup)}">${byGroup}</b></div>
        <div class="row"><span class="ck">Итоговая (худшая):</span> <b class="cat-${catClsOf(d.riskCategory)}">${d.riskCategory}</b></div>
      </div>
      ${d.overlays.some(o=>o.kind==='suppress181')?`<div class="info-plate">${svgInfo()}<div>Подавление 181-го дня активно: дни просрочки для категории ограничены 180 (активная реструктуризация / пауза начисления).</div></div>`:''}

      <div class="section-h" style="margin-top:22px">Реструктуризация ${lockHtml()}</div>
      ${rs.active?`<div class="f2">${fld('Стадия',esc(rs.active.stage))}${fld('Дедлайн',esc(rs.active.deadline))}${fld('Всего заявок',esc(rs.count))}</div>`
        :`<p class="section-note">Активной реструктуризации нет. Всего заявок: ${rs.count}.</p>`}
      <div class="mirror-src">Источник: модуль реструктуризации (Р-16). Read-only — из кредита не заводится.</div>

      <div class="section-h" style="margin-top:22px">Взыскание ${lockHtml()}</div>
      ${cgrid([{h:'Процесс'},{h:'Контур'},{h:'Фаза'},{h:'Предмет'},{h:'Требование',r:1},{h:'С даты'}], collRows, {empty:'Процессов взыскания нет'})}
      <div class="mirror-src">Источник: модуль взыскания (Р-16). Контуры К0–К7. Read-only.</div>

      <div class="section-h" style="margin-top:22px">Банкротство ${lockHtml()}</div>
      <p class="section-note">${hasBankruptcy?'Признаки банкротства зафиксированы (зеркало модуля взыскания).':'Процедур банкротства нет.'}</p>
      <div class="mirror-src">Источник: модуль взыскания (Р-16).</div>

      <div class="gtoolbar" style="margin-top:16px">${roleBtn('writeOff','Списать',"CR.stubAction('Списание — реквизиты решения (Г-12)')",'btn btn-tint danger btn-sm')}</div>`;
  }

  /* ---- ВКЛАДКА 8: Досье ---- */
  function docState(s){
    const map={'принят':'low','не требуется':'neutral','на проверке':'info','загружен':'info','требуется':'mid','отклонён':'high','просрочен':'high'};
    return `<span class="pill ${map[s]||'neutral'}">${esc(s||'—')}</span>`;
  }
  function tabDosye(c,d){
    const docRows=(c.docs||[]).map(x=>`<tr><td>${esc(x.kind)}</td><td>${esc(x.name)}</td><td>${docState(x.state)}</td><td>${esc(x.date)}</td><td>${esc(x.file)}</td></tr>`);
    const tu=c.targetUse||{};
    const auditRows=(c.audit||[]).slice().reverse().map(a=>`<div class="hrow"><div class="hwhen">${esc(a.when)} · ${esc(a.who)}</div><div class="hwhat">${esc(a.what)}</div></div>`);
    return `
      <div class="section-h">Документы кредита</div>
      <p class="section-note">Жизненный цикл документа: требуется → загружен → на проверке → принят / отклонён / не требуется / просрочен.</p>
      ${cgrid([{h:'Вид'},{h:'Наименование'},{h:'Состояние'},{h:'Дата'},{h:'Файл'}], docRows, {empty:'Документов нет'})}

      <div class="section-h" style="margin-top:22px">Целевое использование (Р-15)</div>
      <div class="f2">
        ${fld('Подтверждающих документов', esc((tu.docs||[]).length))}
        ${fld('Проверок', esc((tu.checks||[]).length))}
        ${fld('Мер реагирования', esc((tu.measures||[]).length))}
        ${fld('Решение Комитета (нецелевое)', tu.committeeDecision?esc(tu.committeeDecision.num||'есть'):null)}
      </div>

      <div class="section-h" style="margin-top:22px">Журнал (append-only)</div>
      <div class="gtoolbar"><div class="field" style="max-width:360px"><span class="flabel">Фильтр по типу</span><div class="control"><input placeholder="например: addDisbursement" oninput="CR.filterAudit(this.value)"></div></div></div>
      <div class="hist" id="cr-audit">${auditRows.length?auditRows.join(''):'<div class="hrow"><div class="hwhat">Записей журнала нет</div></div>'}</div>`;
  }

  /* ---- диспетчер вкладок + рендер карточки ---- */
  function renderTab(name, c){
    switch(name){
      case 'Договор': return tabDogovor(c, derive(c));
      case 'Условия': return tabUsloviya(c, derive(c));
      case 'Транши и освоение': return tabTranshi(c, derive(c));
      case 'Расчёты': return tabRaschety(c, derive(c));
      case 'Платежи': return tabPlatezhi(c, derive(c));
      case 'Обеспечение': return tabObespechenie(c, derive(c));
      case 'Проблемные': return tabProblemnye(c, derive(c));
      case 'Досье': return tabDosye(c, derive(c));
      default: return tabDogovor(c, derive(c));
    }
  }
  function renderDetail(c){
    const host=document.getElementById('cr-card-body'); if(!host) return;
    const d=derive(c);                                              // СВЕЖИЙ расчёт на каждый рендер (Р-11)
    host.innerHTML = `<div class="panel-wrap" style="padding-bottom:0">${headerHtml(c,d)}</div>`
      + tabbarHtml()
      + `<div class="panel-wrap"><div class="panel-card">${renderTab(detailTab,c)}</div></div>`;
  }
  function rerenderDetail(){ const c=currentCredit(); if(c) renderDetail(c); }
  function openTab(name){ detailTab=name; disbFormOpen=schedFormOpen=agrFormOpen=false; rerenderDetail(); }

  /* ---- обвязка действий карточки (onclick-строки живут в глобальной области → CR.*) ---- */
  CR.renderDetail=renderDetail; CR.renderTab=renderTab; CR.openTab=openTab; CR.rerenderDetail=rerenderDetail;
  CR.selectDetailTranche=function(no){ detailTrancheNo=no; rerenderDetail(); };
  CR.setCalcMode=function(v){ calcConsolidated=!!v; rerenderDetail(); };
  CR.stubAction=function(name){ toast('Действие «'+name+'» — форма реализуется в Task 8'); };
  CR.filterAudit=function(q){ q=(q||'').toLowerCase(); const host=document.getElementById('cr-audit'); if(!host) return;
    [...host.querySelectorAll('.hrow')].forEach(el=>{ el.style.display = el.textContent.toLowerCase().includes(q)?'':'none'; }); };
  CR.toggleDisbForm=function(){ const c=currentCredit();
    if(!disbFormOpen){ if(!canRole(currentRole,'addDisbursement')){ toast('Роль «'+currentRole+'» не может вносить освоение','warn'); return; }
      const g=gate(c,'addDisbursement',{trancheNo:detailTrancheNo,amount:0}); if(!g.ok){ toast(g.reasons.join(' · '),'warn'); return; } }
    disbFormOpen=!disbFormOpen; rerenderDetail(); };
  CR.submitDisb=function(){ const c=currentCredit();
    const no=+document.getElementById('disbTranche').value;
    const amount=+document.getElementById('disbAmount').value||0;
    const order=document.getElementById('disbOrder').value, purpose=document.getElementById('disbPurpose').value;
    if(!canRole(currentRole,'addDisbursement')){ toast('Роль «'+currentRole+'» не может вносить освоение','warn'); return; }
    const r=CR.addDisbursement(c,{trancheNo:no,amount,order,purpose}); if(!r.ok){ toast(r.reasons.join(' · '),'warn'); return; }
    disbFormOpen=false; detailTrancheNo=no; toast('Освоение внесено: '+money(amount),'ok'); rerenderDetail(); };
  CR.toggleSchedForm=function(){ const c=currentCredit(); const sel=c.tranches.find(t=>t.no===detailTrancheNo)||c.tranches[0];
    if(!schedFormOpen){ if(!canRole(currentRole,'buildSchedule')){ toast('Роль «'+currentRole+'» не может формировать график','warn'); return; }
      const g=gate(c,'buildSchedule',{tranche:sel}); if(!g.ok){ toast(g.reasons.join(' · '),'warn'); return; } }
    schedFormOpen=!schedFormOpen; rerenderDetail(); };
  CR.submitSched=function(){ const c=currentCredit();
    const no=+document.getElementById('schedTranche').value, from=document.getElementById('schedFrom').value;
    if(!canRole(currentRole,'buildSchedule')){ toast('Роль «'+currentRole+'» не может формировать график','warn'); return; }
    const r=CR.generateSchedule(c,no,{from}); if(r&&r.ok===false){ toast(r.reasons.join(' · '),'warn'); return; }
    schedFormOpen=false; detailTrancheNo=no; toast('График сформирован: версия v'+(r.ver||'?'),'ok'); rerenderDetail(); };
  CR.toggleAgrForm=function(){ if(!agrFormOpen && !canRole(currentRole,'addAgreement')){ toast('Роль «'+currentRole+'» не может оформлять доп. соглашения','warn'); return; }
    agrFormOpen=!agrFormOpen; rerenderDetail(); };
  CR.submitAgr=function(){ const c=currentCredit();
    const num=document.getElementById('agrNum').value, date=document.getElementById('agrDate').value;
    const before={rate:+document.getElementById('agrBeforeRate').value, term:+document.getElementById('agrBeforeTerm').value};
    const after={rate:+document.getElementById('agrAfterRate').value, term:+document.getElementById('agrAfterTerm').value};
    if(!canRole(currentRole,'addAgreement')){ toast('Роль «'+currentRole+'» не может оформлять доп. соглашения','warn'); return; }
    const r=CR.addAgreement(c,{num,date,source:'кредит',before,after}); if(!r.ok){ toast(r.reasons.join(' · '),'warn'); return; }
    agrFormOpen=false; toast('Доп. соглашение '+num+' оформлено','ok'); rerenderDetail(); };

  /* экспорт DOM-обвязки на CR (onclick-строки разметки живут в глобальной области) */
  CR._sel = null;
  CR.renderList = renderList; CR.renderRows = renderRows; CR.renderRole = renderRole;
  CR.selectRow = selectRow; CR.openDetail = openDetail; CR.backToList = backToList;
  CR.resetDemo = resetDemo; CR.openCreatePicker = openCreatePicker; CR.pickApplication = pickApplication;

  renderNav();
  renderList();          // реестр §5.1 (Р-19); карточка (8 вкладок) — Task 7
}

</script>
</body>
</html>
