  «Порядок мониторинга, взыскания и урегулирования задолженности».
  Проверка: node scripts/inspect/credit-check.mjs

  РЕАЛИЗОВАННЫЕ РЕШЕНИЯ
   Р-1  Единица учёта — ТРАНШ; кредит — агрегат (Σ по траншам); одна сумма = транш №1.
   Р-2  Условия двухуровневые: база кредита → наследование траншем; дифф «база → транш».
   Р-3  Две оси (ЖЦ owned · освоение derived) + множественный производный оверлей проблемности.
   Р-4  Изменение условий после регистрации — только доп. соглашением (versioned changeset).
   Р-5  Платежи — зеркало модуля платежей + ручной ввод формой владельца («Ожидает ЦК»).
   Р-6  Освоение — owned кредитом, на транше; реестр «Освоение» — сквозной вид, не владелец.
   Р-7  Залог — зеркало: «Создать залоговый договор» нет, только «Привязать существующий».
   Р-8  Реквизиты решения КМ об освобождении от залога — owned поле кредита (гейт §2.6).
   Р-9  Кураторство — зеркало журнала назначений; не picker и не поле.
   Р-10 Группа платёжеспособности и категория риска — read-only зеркала.
   Р-11 Все производные (§4) считаются в рантайме, не хранятся.
   Р-12 Сумма договора owned, зажата гейтом contractAmount ≤ approvedAmount (Г-1).
   Р-13 Срок — один источник (условия транша); на кредите — производный агрегат (max).
   Р-14 Перевод долга (смена заёмщика) — owned кредитом, только зарегистрированным соглашением.
   Р-15 Целевое использование — owned; факт нецелевого — реквизиты решения Комитета.
   Р-16 Взыскание, банкротство, реструктуризация — зеркала; из кредита не заводятся.
   Р-17 Приостановление начисления — управляющее действие кредита/транша.
   Р-18 Происхождение кредита — обязательный read-only блок (заявка→комиссия→программа→ПП).
   Р-19 Реестр показывает кредит (кредитные колонки), а не заявку.
   Р-20 Списание и закрытие — терминалы с обязательными реквизитами; без физ. удаления.

   • «Сегодня» демо зафиксировано (TODAY = 23.07.2026) — просрочка/дедлайны считаются от него.

   • Расчёт графика/детального расчёта — детерминированное упрощение, не банковский движок.
   • Зеркала (кураторство, залог, платежи, взыскание, реструктуризация, категория) —

   3. Лимит повторов реструктуризации. Макет: счётчик растёт неограниченно.
   4. Очередь погашения при судебном решении (сначала сумма по решению, затем договор).
      Макет: показывается возможная множественность слоёв начисления (info-plate), без матрицы.
   5. Источник производственного календаря для дат платежей в нерабочие дни.

.pill.info{ background:var(--status-info-bg); color:var(--asubk-blue); }
.cat-low{ color:var(--asubk-green); } .cat-mid{ color:var(--asubk-amber); } .cat-high{ color:var(--asubk-red); }

/* ---- detail ---- */
.detail-tabbar-wrap{ position:relative; border-bottom:1px solid var(--border-default);
  background:var(--surface-page); flex:none; }
.detail-tabbar{ display:flex; overflow-x:auto; padding:6px 44px 0 20px; scrollbar-width:none; }
.detail-tabbar::-webkit-scrollbar{ display:none; }
.dtab{ flex:none; border:none; background:transparent; padding:11px 15px;
  font:var(--weight-medium) var(--text-base)/1 var(--asubk-font); color:var(--text-muted);
  border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; white-space:nowrap; }
.dtab:hover{ color:var(--text-body); }
.dtab.active{ color:var(--asubk-blue); border-bottom-color:var(--asubk-blue); font-weight:var(--weight-semibold); }
.tabbar-chevron{ position:absolute; right:8px; top:50%; transform:translateY(-50%); width:28px; height:28px;
  background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-md);
  display:flex; align-items:center; justify-content:center; color:var(--text-muted); cursor:pointer; }
.tabbar-chevron:hover{ background:var(--surface-hover); }
.panel-wrap{ padding:18px 20px 8px; }
.panel-card{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:20px 24px; }
.detail-panel{ display:none; }
.detail-panel.active{ display:block; }

/* ---- process header (indicator panel) — ПЯТЬ плиток ---- */
.phead{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:16px 20px; margin-bottom:18px; }
.phead-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:12px; }
.phead-name{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.phead-name .nm{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); }
.phead-name a{ font:var(--font-label); color:var(--text-link); text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
.phead-name a:hover{ text-decoration:underline; }
.phead-sub{ font:var(--font-label); color:var(--text-muted); margin-top:3px; }
.phead-sub b{ color:var(--text-body); font-weight:var(--weight-medium); }
.phead-owner{ font:var(--font-label); color:var(--text-muted); white-space:nowrap; }
.phead-banner{ display:flex; align-items:flex-start; gap:10px; border-radius:var(--radius-md);
  padding:9px 14px; margin-bottom:12px; font:var(--font-label); }
.phead-banner.warn{ background:var(--status-warning-bg); color:var(--asubk-amber); }
.phead-banner.info{ background:var(--status-info-bg); color:var(--asubk-blue); }
.phead-banner.danger{ background:var(--status-error-bg); color:var(--asubk-red); }
.phead-banner.ok{ background:var(--status-success-bg); color:var(--asubk-green); }
.phead-banner svg{ flex:none; margin-top:1px; }
.ms-card{ border:1px solid var(--border-default); border-radius:var(--radius-md); padding:14px 16px; margin-top:12px; background:#fff; }
.ms-card-h{ display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.ms-card-h .mt{ font-weight:600; }
.ms-meta{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:6px 18px; margin-bottom:6px; font-size:13px; }
.ms-meta b{ color:var(--text-muted); font-weight:500; }
.ms-acts{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.phead-banner .b-act{ margin-left:auto; }
.phead-dims{ display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
@media(max-width:900px){ .phead-dims{ grid-template-columns:repeat(3,1fr); } }
@media(max-width:560px){ .phead-dims{ grid-template-columns:repeat(2,1fr); } }
.dim{ background:var(--surface-panel); border-radius:var(--radius-md); padding:10px 14px; }
.dim.clickable{ cursor:pointer; } .dim.clickable:hover{ background:var(--surface-hover); }
.dim .dl{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-muted); margin-bottom:5px;
  display:flex; align-items:center; gap:4px; justify-content:space-between; }
.dim .dv{ font:var(--weight-semibold) 16px/1.2 var(--asubk-font); color:var(--text-heading); }
.dim .src{ font:var(--weight-regular) 11px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:4px; }
.dim .cnt{ font-weight:var(--weight-bold); } .dim .cnt.over{ color:var(--asubk-red); }
/* Раскрытие входов worst-of (паттерн borrower.html) */
.cat-expand{ margin-top:10px; border:1px solid var(--border-default); border-radius:var(--radius-md);
  padding:12px 16px; background:var(--surface-panel); font:var(--font-label); }
.cat-expand .row{ padding:4px 0; border-bottom:1px solid var(--asubk-grid-line); }
.cat-expand .row:last-child{ border-bottom:none; font-weight:var(--weight-semibold); }
.cat-expand .ck{ color:var(--text-muted); }
.win{ background:var(--status-error-bg); padding:0 4px; border-radius:3px; }

/* two-column form */
.f2{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; max-width:1500px; }
.field{ display:flex; flex-direction:column; gap:6px; }
.field .flabel{ font:var(--font-label); color:var(--text-muted); }
.field.col-span{ grid-column:1 / -1; }
.control{ position:relative; display:flex; align-items:center; }
.control input, .control select, .note-area{ width:100%; height:var(--control-h); border-radius:var(--radius-md);
  background:var(--surface-card); color:var(--text-body); font:var(--font-body); font-weight:var(--weight-medium);
  border:1px solid var(--border-strong); outline:none; padding:0 var(--space-2);
  transition:box-shadow 120ms ease, border-color 120ms ease; }
.control select{ cursor:pointer; appearance:none; padding-right:30px; }
.control input:focus, .control select:focus, .note-area:focus{ border-color:var(--border-focus); box-shadow:0 0 0 3px var(--asubk-blue-tint); }
.control input[readonly], .ro input, .ro .note-area{ background:var(--surface-input); color:var(--text-muted); border:1px solid transparent; cursor:default; }
.control input[readonly]:focus{ border-color:transparent; box-shadow:none; }
.grey input, .grey select{ background:var(--surface-input); border-color:transparent; }
.control .cal, .control .caret{ position:absolute; right:9px; pointer-events:none; color:var(--text-muted); display:flex; }
.note-area{ height:auto; min-height:80px; padding:10px 12px; resize:vertical; line-height:1.5; }
.lookup{ display:flex; align-items:center; height:var(--control-h); background:var(--surface-input);
  border-radius:var(--radius-md); border:1px solid transparent; padding-left:var(--space-2); }
.lookup .val{ flex:1; font:var(--font-body); font-weight:var(--weight-medium); color:var(--text-body);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lookup .val.ph{ color:var(--text-placeholder); }
.lookup button{ display:inline-flex; align-items:center; justify-content:center; width:32px; height:var(--control-h);
  border:none; background:transparent; color:var(--text-link); cursor:pointer; }
.lookup .pick{ font-weight:var(--weight-bold); letter-spacing:1px; }

.section-h{ font:var(--weight-semibold) 18px/1.2 var(--asubk-font); color:var(--text-heading); margin:0 0 6px; }
.section-note{ font:var(--font-label); color:var(--text-muted); margin:0 0 14px; max-width:960px; }
.gtoolbar{ display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
.gtoolbar .spacer{ flex:1; }

/* collection grid (внутри вкладок) */
.cgrid-wrap{ border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:auto; min-height:80px; }
table.cgrid{ width:100%; border-collapse:collapse; font:var(--font-label); white-space:nowrap; }
table.cgrid thead th{ position:sticky; top:0; text-align:left; padding:10px 12px; background:var(--surface-card);
  border-bottom:1px solid var(--border-default); font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font);
  color:var(--text-heading); cursor:pointer; user-select:none; }
table.cgrid tbody td{ padding:9px 12px; border-bottom:1px solid var(--border-default); color:var(--text-body); vertical-align:top; }
table.cgrid tbody tr:hover{ background:var(--surface-hover); }
table.cgrid tbody tr.total td{ font-weight:var(--weight-bold); color:var(--text-heading);
  background:var(--surface-hover); border-top:1px solid var(--border-strong); }
table.cgrid tbody tr.giveback td{ color:var(--asubk-green); font-weight:var(--weight-medium); }
/* Сторнированная мера — запись остаётся, зачёркнута с пометкой основания (И-3). */
table.cgrid tbody tr.storno td{ color:var(--text-placeholder); text-decoration:line-through; }
table.cgrid tbody tr.storno td.storno-reason{ text-decoration:none; color:var(--asubk-red); }
.cgrid-empty{ display:flex; align-items:center; justify-content:center; min-height:120px;
  color:var(--text-placeholder); font:var(--font-label); }
.rowlink{ color:var(--text-link); cursor:pointer; }
.rowlink:hover{ text-decoration:underline; }

/* timeline (контур текущей фазы) */
.timeline{ display:flex; flex-wrap:wrap; gap:0; margin:2px 0 20px; align-items:center; }
.tl-step{ display:flex; align-items:center; gap:8px; padding:6px 0; }
.tl-dot{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font:var(--weight-bold) 12px/1 var(--asubk-font); flex:none; }
.tl-dot.done{ background:var(--asubk-green); color:#fff; }
.tl-dot.cur{ background:var(--asubk-blue); color:#fff; }
.tl-dot.todo{ background:var(--surface-input); color:var(--text-placeholder); }
.tl-dot.cond{ background:var(--surface-input); color:var(--asubk-amber); border:1px dashed var(--asubk-amber); }
.tl-lbl{ font:var(--font-label); color:var(--text-body); }
.tl-lbl.todo{ color:var(--text-placeholder); }
.tl-lbl.cond{ color:var(--asubk-amber); }
.tl-arrow{ color:var(--text-placeholder); margin:0 12px; display:flex; }
.tl-contour{ font:var(--font-label); color:var(--text-muted); margin-bottom:6px; }

/* deadlines block */
table.dl-grid{ width:100%; border-collapse:collapse; font:var(--font-label); }
table.dl-grid th{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--border-default);
  font:var(--weight-semibold) var(--text-sm)/1.3 var(--asubk-font); color:var(--text-heading); }
table.dl-grid td{ padding:8px 10px; border-bottom:1px solid var(--asubk-grid-line); }
table.dl-grid tr.overdue td{ color:var(--asubk-red); }
table.dl-grid tr.overdue td:last-child{ font-weight:var(--weight-semibold); }

/* history */
.hist{ border-left:2px solid var(--border-strong); margin-left:6px; padding-left:0; }
.hrow{ position:relative; padding:10px 0 10px 22px; border-bottom:1px solid var(--asubk-grid-line); }
.hrow::before{ content:""; position:absolute; left:-5px; top:16px; width:8px; height:8px; border-radius:50%; background:var(--asubk-blue); }
.hrow.storno::before{ background:var(--asubk-red); }
.hrow .hwhen{ font:var(--weight-medium) 13px/1.3 var(--asubk-font); color:var(--text-muted); }
.hrow .hwhat{ font:var(--font-label); color:var(--text-body); margin-top:2px; }
.hrow .hwho{ font:var(--weight-regular) 12px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:2px; }

/* checklist (структурный чек-лист передачи, В-10) */
.chk{ display:flex; flex-direction:column; gap:2px; }
.chk-row{ display:grid; grid-template-columns:1fr auto auto; gap:12px; align-items:center;
  padding:8px 10px; border-bottom:1px solid var(--asubk-grid-line); font:var(--font-label); }
.chk-row .chk-form{ color:var(--text-muted); font-size:12px; white-space:nowrap; }
.chk-flag{ font-size:12px; white-space:nowrap; }
.chk-flag.ok{ color:var(--asubk-green); } .chk-flag.no{ color:var(--asubk-red); }

/* Выборка кредитов (модалка согласования). Отдельный класс — НЕ внутри .control,
   иначе глобальное .control input{width:100%;height:36px} растягивает чекбоксы. */
.cpick{ display:flex; flex-direction:column; border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:hidden; }
.cpick input[type=checkbox]{ width:16px; height:16px; flex:none; margin:0; accent-color:var(--asubk-blue); cursor:pointer; }
.cpick-all{ display:flex; align-items:center; gap:8px; padding:8px 12px; font-size:12px; color:var(--text-muted);
  background:var(--surface-input); border-bottom:1px solid var(--border-default); cursor:pointer; }
.cpick-row{ display:flex; align-items:center; gap:10px; padding:9px 12px; font-size:13px; cursor:pointer; }
.cpick-row + .cpick-row{ border-top:1px solid var(--asubk-grid-line); }
.cpick-row:hover{ background:var(--asubk-blue-tint); }
.cpick-main{ flex:1; min-width:0; line-height:1.35; }
.cpick-num{ font-weight:600; } .cpick-sub{ color:var(--text-muted); }
.cpick-claim{ color:var(--text-muted); white-space:nowrap; font-variant-numeric:tabular-nums; }

/* footer */
.footer{ position:sticky; bottom:0; background:var(--surface-page); border-top:1px solid var(--border-default);
  padding:14px 20px; display:flex; align-items:center; gap:12px; }

/* modals */
.overlay{ position:fixed; inset:0; background:rgba(16,28,46,0.42); display:none; align-items:center;
  justify-content:center; z-index:60; padding:24px; }
.overlay.open{ display:flex; }
.modal{ background:var(--surface-card); border-radius:var(--radius-lg); width:min(1040px,100%); max-height:88vh;
  display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(16,28,46,0.4); }
.modal.form{ width:min(760px,100%); }
.modal.narrow{ width:min(560px,100%); }
.modal-h{ padding:18px 24px 12px; display:flex; align-items:center; gap:10px; }
.modal-h .mt{ font:var(--weight-bold) 20px/1.2 var(--asubk-font); color:var(--text-heading); flex:1; }
.modal-x{ border:none; background:transparent; cursor:pointer; color:var(--text-muted); display:flex; padding:4px; }
.modal-x:hover{ color:var(--text-body); }
.modal-b{ padding:0 24px 8px; overflow:auto; flex:1; }
.modal-f{ padding:14px 24px 20px; display:flex; gap:12px; justify-content:flex-end; }
.mform{ display:grid; grid-template-columns:1fr 1fr; gap:16px 40px; align-items:start; padding-top:8px; }
.mform .field.col-span{ grid-column:1 / -1; }
.mform .field.req .flabel::after{ content:" •"; color:var(--action-danger); }
.mform .control input, .mform .control select, .mform .note-area{ background:var(--surface-input); border-color:transparent; }
.warn-inline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-warning-bg);
  color:var(--asubk-amber); border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin-top:6px; }
/* Гейт — жёсткая блокировка с причиной (§6.3, паттерн sendGateReason). */
.gate-inline{ display:flex; gap:8px; align-items:flex-start; background:var(--status-error-bg);
  color:var(--asubk-red); border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin-top:6px; }
.gate-inline svg{ flex:none; margin-top:2px; }
.cgrid tbody tr.mrow-undelivered{ background:var(--status-warning-bg); }
.overlap-note{ display:flex; gap:8px; align-items:flex-start; background:var(--status-warning-bg);
  color:var(--asubk-amber); border-radius:var(--radius-md); padding:10px 12px; margin:0 0 14px; font:var(--font-label); }
.overlap-note svg{ flex:none; margin-top:2px; }
.overlap-note .rowlink{ color:var(--text-link); font-weight:600; }

/* toast */
.toast-wrap{ position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column; gap:10px; z-index:80; }
.toast{ min-width:260px; max-width:460px; padding:12px 14px; border-radius:var(--radius-md);
  background:var(--asubk-ink); color:#fff; font:var(--font-label); box-shadow:0 10px 30px rgba(16,28,46,0.3);
  display:flex; gap:10px; align-items:flex-start; }
.toast.ok{ background:var(--asubk-green); }
.toast.warn{ background:var(--asubk-amber); }
.toast.err{ background:var(--asubk-red); }

/* settings screen tabs */
.settings-tabbar{ display:flex; gap:4px; border-bottom:1px solid var(--border-strong); margin-bottom:16px; }
.settings-tab{ padding:8px 16px; cursor:pointer; border:none; background:none; font:var(--font-label); color:var(--text-muted); border-bottom:2px solid transparent; }
.settings-tab.active{ color:var(--asubk-blue); border-bottom-color:var(--asubk-blue); font-weight:var(--weight-semibold); }
.settings-grid,.role-grid{ border-collapse:collapse; width:100%; }
.settings-grid th,.settings-grid td,.role-grid th,.role-grid td{ border:1px solid var(--border-strong); padding:6px 10px; text-align:center; font:var(--font-body); }
.settings-grid th:first-child,.settings-grid td:first-child,.role-grid th:first-child,.role-grid td:first-child{ text-align:left; }
.v9-sec-label{ font:var(--font-label); font-weight:var(--weight-semibold); color:var(--text-muted); }
.warn-badge{ color:#b45309; font-size:12px; white-space:nowrap; }

/* объединённая вкладка «Кредиты»: сворачиваемая карточка на кредит (details/summary) */
.credit-card{ border:1px solid var(--border-strong); border-radius:var(--radius-md); margin-top:12px; background:#fff; overflow:hidden; }
.credit-card[open]{ box-shadow:0 1px 4px rgba(16,28,46,0.06); }
.credit-head{ list-style:none; cursor:pointer; padding:12px 14px; display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
.credit-head::-webkit-details-marker{ display:none; }
.credit-head:hover{ background:var(--surface-muted,#f6f8fb); }
.credit-head .tw{ transition:transform .15s; color:var(--text-muted); font-size:12px; }
.credit-card[open] .credit-head .tw{ transform:rotate(90deg); }
.credit-head .cnum{ font-weight:var(--weight-semibold); color:var(--asubk-blue); }
.credit-head .csub{ color:var(--text-muted); font:var(--font-label); }
.credit-head .cright{ margin-left:auto; text-align:right; }
.credit-head .cright .amt{ font-weight:var(--weight-semibold); }
.credit-head .cright .aml{ display:block; color:var(--text-muted); font-size:11px; }
.credit-body{ padding:0 14px 14px; border-top:1px solid var(--border-subtle,#eef1f6); }

/* ============ КРЕДИТ-СПЕЦИФИЧНЫЕ УТИЛИТЫ (дополнение к базовым классам collection.html) ============ */
/* Замок зеркала (Р-5…Р-10, Р-16): данные чужого модуля read-only, с подписью источника. */
.lock{ display:inline-flex; align-items:center; gap:4px; font:var(--weight-medium) 11px/1.3 var(--asubk-font);
  color:var(--text-muted); border:1px solid var(--border-default); border-radius:var(--radius-sm); padding:0 6px; }
.lock svg{ flex:none; }
.locked{ position:relative; }
.mirror-src{ font:var(--weight-regular) 11px/1.3 var(--asubk-font); color:var(--text-placeholder); margin-top:4px; }
/* Пояснение архитектурного решения под блоком (info-plate). */
.info-plate{ display:flex; gap:8px; align-items:flex-start; background:var(--status-info-bg); color:var(--asubk-blue);
  border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin-top:10px; }
.info-plate svg{ flex:none; margin-top:2px; }
/* Дифф «было → стало» (Р-2 отклонение транша · Р-4 доп. соглашение). */
.diff{ display:inline-flex; align-items:center; gap:6px; font:var(--font-label); }
.diff-old{ color:var(--text-muted); text-decoration:line-through; }
.diff-new{ color:var(--asubk-green); font-weight:var(--weight-semibold); }
.diff-changed td{ background:rgba(0,106,245,0.05); }
/* Гейт — жёсткая блокировка с причиной (§6). */
.warn{ display:flex; gap:8px; align-items:flex-start; background:var(--status-error-bg); color:var(--asubk-red);
  border-radius:var(--radius-md); padding:10px 12px; font:var(--font-label); margin-top:6px; }
.warn svg{ flex:none; margin-top:2px; }
</style>
</head>

      </button>

  <div class="main">

      <span class="menu" title="Меню">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </span>
      <span class="crumb-title" id="crumbTitle">Кредиты</span>
      <span class="crumb" id="crumb" style="color:var(--text-muted);font:var(--font-label)"></span>
      <div class="role-wrap">

/* ============================================================
   3. ЧИСТЫЙ ЛОГИЧЕСКИЙ СЛОЙ — derive / buildSchedule (Task 2).
   Все функции чистые (не трогают document); ничего из §4 не хранится в модели —
   derive пересчитывается при каждой перерисовке, кэш запрещён (Р-11).
   gate / canRole / мутации добавляются в следующих задачах.
   ============================================================ */

/* округление до копеек (детерминированное упрощение, не банковский движок) */
function round2(x){ return Math.round((x + Number.EPSILON) * 100) / 100; }
/* Σ освоений транша (Р-6) */
function disbursedSum(t){ return (t.disbursements || []).reduce((x,d) => x + (d.amount||0), 0); }
/* последняя (самая свежая) строка детального расчёта транша */
function latestLedger(t){
  return (t.ledger || []).reduce((a,b) => (b.no >= ((a && a.no) ?? -Infinity) ? b : a), null);
}
/* активен ли интервал приостановки начисления на «сегодня» (Р-17) */
function holdIsActive(h){
  if (!h || !h.from) return false;
  const today = pd(TODAY);
  if (pd(h.from) > today) return false;
  return !h.to || pd(h.to) >= today;
}
/* оверлей «подавление 181-го дня»: активная реструктуризация с флагом или интервал
   приостановки с явным основанием 181 (учитывается на уровне кредита, до worst-of) */
function has181Suppression(c){
  const r = c.mirror && c.mirror.restructuring && c.mirror.restructuring.active;
  if (r && r.overlay181) return true;
  return (c.accrualHold || []).some(h => /181/.test(h.reason || ''));
}

/* ---- 3.1 buildSchedule(tranche, fromDate) — амортизация от фактической даты освоения ----
   Аннуитет либо дифференцированный (conditions.method). Учитывает льготу по ОД
   (graceMain — только проценты) и по процентам (graceInterest — без начисления %),
   а также интервалы приостановки начисления (t.accrualHold — Task 4: holdAccrual пишет
   интервал в credit.accrualHold и зеркалирует его на КАЖДЫЙ транш кредита, т.к.
   buildSchedule принимает только транш, без ссылки на кредит; пеня при паузе не
   затрагивается — within() участвует только в расчёте interest). Возврат:
   {rows:[{no,date,total,principal,interest}]}. */
function buildSchedule(tranche, fromDate){
  const c = tranche.conditions || {};
  const P = disbursedSum(tranche) || tranche.amount || 0;        // амортизируем освоенный ОД
  const n = Math.max(1, c.term | 0);                             // число периодов = срок, мес.
  const i = (c.rate || 0) / 100 / 12;                            // месячная ставка
  const method = c.method || 'аннуитет';
  const gMain = c.graceMain | 0;                                 // льгота по ОД (мес.)
  const gInt  = c.graceInterest | 0;                            // льгота по процентам (мес.)
  const holds = tranche.accrualHold || [];                      // зеркало credit.accrualHold (holdAccrual, Task 4)
  const within = (dt) => holds.some(h => h && h.from &&
    pd(h.from) <= dt && (!h.to || pd(h.to) >= dt));
  const start = pd(fromDate);
  const principalPeriods = Math.max(1, n - gMain);              // периодов гашения ОД после льготы
  const annuity = (i > 0)
    ? P * i / (1 - Math.pow(1 + i, -principalPeriods))
    : P / principalPeriods;
  const diffPrincipal = P / principalPeriods;
  const rows = [];
  let bal = P;
  for (let k = 1; k <= n; k++){
    const date = addM(start, k);
    const noAccrual = within(date) || (k <= gInt) || i === 0;   // без начисления процентов
    const interest = noAccrual ? 0 : round2(bal * i);
    let principal;
    if (k <= gMain) principal = 0;                              // льгота по ОД: только проценты
    else if (method === 'дифференцированный') principal = round2(diffPrincipal);
    else principal = round2(annuity - bal * i);                 // аннуитет: ОД = платёж − проценты
    if (k === n) principal = round2(bal);                       // последний период гасит остаток
    principal = Math.max(0, Math.min(principal, bal));
    bal = round2(bal - principal);
    rows.push({ no:k, date:fd(date), total:round2(principal + interest), principal, interest });
  }
  return { rows };
}

/* строки активной версии графика транша; если версии нет, но транш освоен —
   строим на лету от первой даты освоения (для scheduleTotals/fullRepayDate) */
function trancheScheduleRows(t){
  const active = (t.schedules || []).find(s => s.active);
  if (active && active.rows && active.rows.length) return active.rows;
  const disb = (t.disbursements || []).slice().sort((a,b) => pd(a.date) - pd(b.date))[0];
  return disb ? buildSchedule(t, disb.date).rows : [];
}

/* ---- 3.2 Помощники derive (все чистые) ---- */

/* долг по трём слоям × 4 величины из детального расчёта траншей (§4) */
function debtFromLedger(c){
  const zero = () => ({ accrued:0, paid:0, overdue:0, bal:0 });
  const d = { principal:zero(), interest:zero(), penalty:zero() };
  for (const t of c.tranches){
    const l = latestLedger(t); if (!l) continue;
    d.principal.paid    += l.principalPaid    || 0;
    d.principal.overdue += l.principalOverdue || 0;
    d.principal.bal     += l.principalBal     || 0;
    // TODO Task 5/later: эвристика (Task 2, Minor) — сеяный ledger не имеет отдельной
    // колонки «начислено ОД», поэтому accrued приближается через paid+bal. Ручной платёж
    // (addPayment, Task 5) сознательно НЕ трогает ledger — висит в mirror.payments до
    // подтверждения ЦК (Р-5) — поэтому эта эвристика пока не расходится с реальностью.
    d.principal.accrued += (l.principalPaid || 0) + (l.principalBal || 0);   // всего вошло в погашение
    d.interest.accrued  += l.interestAccrued  || 0;
    d.interest.paid     += l.interestPaid     || 0;
    d.interest.overdue  += l.interestOverdue  || 0;
    d.interest.bal      += Math.max(0, (l.interestAccrued || 0) - (l.interestPaid || 0));
    d.penalty.accrued   += l.penaltyAccrued   || 0;
    d.penalty.paid       += l.penaltyPaid     || 0;
    d.penalty.bal        += l.penaltyBal      || 0;
    // TODO Task 5/later: та же эвристика — нет отдельной колонки «пеня просрочена» в
    // сеяном ledger; addPayment (Task 5) не пишет в ledger (см. TODO у principal.accrued выше).
    d.penalty.overdue    += l.penaltyBal      || 0;   // неоплаченная пеня трактуется как просроченная
  }
  for (const k of ['principal','interest','penalty'])
    for (const v of ['accrued','paid','overdue','bal']) d[k][v] = round2(d[k][v]);
  return d;
}

/* дней просрочки транша: max days среди строк расчёта с непогашенной наступившей позицией */
function overdueDaysOfTranche(t){
  let d = 0;
  for (const r of (t.ledger || [])){
    const has = (r.principalOverdue || 0) > 0 || (r.interestOverdue || 0) > 0 || (r.penaltyBal || 0) > 0;
    if (has) d = Math.max(d, r.days || 0);
  }
  return d;
}

/* покрытие: база — ЗАЛОГОВАЯ стоимость (не оценочная); порог переменный;
   банковская гарантия входит в индекс, поручительство — нет (§4, П1 §2.3/§2.4). */
function computeCoverage(c){
  let liq = 0, illiq = 0, hasItems = false, hasIlliquid = false;
  for (const p of (c.mirror && c.mirror.pledges || [])){
    for (const it of (p.items || [])){
      const v = (it.pledgeValue || 0) * (it.share == null ? 1 : it.share);   // залоговая × доля
      hasItems = true;
      if (p.liquid) liq += v; else { illiq += v; hasIlliquid = true; }
    }
  }
  const bank = (c.mirror && c.mirror.bankGuarantee) ? (c.mirror.bankGuarantee.amount || 0) : 0;
  const contract = c.contractAmount || 0;
  const index = contract > 0 ? (liq + illiq + bank) / contract : 0;
  const totalPledge = liq + illiq;
  const liquidShare = totalPledge > 0 ? liq / totalPledge : 0;
  let req, source;
  if (!hasItems){ req = 120; source = 'Обеспечение отсутствует'; }
  else if (!hasIlliquid){ req = 120; source = 'Ликвидное обеспечение ≥120 % (П1 §2.3)'; }
  else if (liquidShare >= 0.8){ req = 150; source = 'Движимое неликвидное при доле ликвида ≥80 % ⇒ ≥150 % (П1 §2.4)'; }
  else { req = 150; source = 'Смешанное/неликвидное обеспечение ⇒ ≥150 % (П1 §2.4)'; }
  return { index: round2(index), req, source, ok: index * 100 >= req, liquidShare: round2(liquidShare) };
}

/* worst-of категории (по дням + по подтверждённым факторам заёмщика).
   Подавление 181-го дня применяется на уровне кредита ДО worst-of. */
const CAT_ORDER = ['низкий','средний','высокий'];
function daysToCat(d){ return d >= 181 ? 'высокий' : d >= 1 ? 'средний' : 'низкий'; }
function groupToCat(g){ return (g === 'C' || g === 'D') ? 'высокий' : g === 'B' ? 'средний' : 'низкий'; }
function worstCat(a,b){ return CAT_ORDER[Math.max(CAT_ORDER.indexOf(a), CAT_ORDER.indexOf(b))]; }
function riskWorstOf(c, overdueDays){
  const eff = has181Suppression(c) ? Math.min(overdueDays, 180) : overdueDays;   // подавление 181-го дня
  const grp = c.mirror && c.mirror.borrowerRisk ? c.mirror.borrowerRisk.group : null;
  return worstCat(daysToCat(eff), groupToCat(grp));
}

/* массив производных оверлеев проблемности (Р-3): не третья ось, а набор меток */
function buildOverlays(c, overdueDays){
  const ov = [];
  if (overdueDays > 0) ov.push({ kind:'overdue', tone:'warn', text:`Просрочка ${overdueDays} дн.` });
  const r = c.mirror && c.mirror.restructuring && c.mirror.restructuring.active;
  if (r) ov.push({ kind:'restructuring', tone:'info', text:`Реструктуризация (${r.stage})` });
  for (const col of (c.mirror && c.mirror.collection || [])){
    ov.push({ kind:'collection', tone:'danger', text:`Взыскание ${col.contour} · ${col.phase}` });
    if (col.contour === 'К6' || /банкрот/i.test(col.phase || ''))
      ov.push({ kind:'bankruptcy', tone:'danger', text:'Банкротство' });
  }
  if ((c.accrualHold || []).some(holdIsActive))
    ov.push({ kind:'accrual-hold', tone:'info', text:'Начисление приостановлено' });
  if (has181Suppression(c)) ov.push({ kind:'suppress181', tone:'info', text:'Подавление 181-го дня' });
  return ov;
}

/* дата последнего платежа активной версии графика (max по траншам) */
function maxFullRepayDate(c){
  let best = null;
  for (const t of c.tranches){
    const rows = trancheScheduleRows(t); if (!rows.length) continue;
    const dt = pd(rows[rows.length - 1].date);
    if (!best || dt > best) best = dt;
  }
  return best ? fd(best) : null;
}

/* неустойка за неполное освоение: недоосвоенный остаток транша × reserveRate за
   период от плановой даты. При reserveRate = 0 → {applies:false} (не 24 строки нулей). */
function computeReserve(c){
  const per = []; let totalBase = 0, totalAmount = 0, rate = 0;
  for (const t of c.tranches){
    const rr = (t.conditions && t.conditions.reserveRate) || 0;
    if (rr <= 0) continue;
    const base = (t.amount || 0) - disbursedSum(t);
    if (base <= 0 || !t.plannedDate) continue;
    const days = Math.max(0, dd(pd(t.plannedDate), pd(TODAY)));
    if (days <= 0) continue;
    const amount = round2(base * (rr / 100) * (days / 365));
    rate = rr; totalBase += base; totalAmount += amount;
    per.push({ trancheId:t.id, base, rate:rr, days, amount });
  }
  if (!per.length) return { applies:false };
  return { applies:true, rate, totalBase, totalAmount:round2(totalAmount), perTranche:per };
}

/* итоги активной версии графика (консолидировано по траншам) */
function computeScheduleTotals(c){
  let count = 0, principalSum = 0, interestSum = 0, total = 0, regularPay = 0;
  for (const t of c.tranches){
    const rows = trancheScheduleRows(t); if (!rows.length) continue;
    count += rows.length;
    for (const r of rows){ principalSum += r.principal; interestSum += r.interest; total += r.total; }
    regularPay += rows[0].total;                                // регулярный платёж — сумма первых по траншам
  }
  return { count, principalSum:round2(principalSum), interestSum:round2(interestSum),
           regularPay:round2(regularPay), total:round2(total) };
}

/* активен ли транш (не soft-closed) — для агрегатов срока (Р-13) */
function activeTranche(t){ return !t.closed; }

/* ---- 3.3 derive(credit) — ВСЕ производные §4. Ничего не хранится в модели. ---- */
function derive(c){
  const disbursed   = c.tranches.reduce((a,t) => a + disbursedSum(t), 0);
  const allocated   = c.tranches.reduce((a,t) => a + (t.amount || 0), 0);
  const undisbursed = c.contractAmount - disbursed;
  const allocatable = c.contractAmount - allocated;
  const disbState =
      (allocated === 0 && disbursed === 0) ? 'Не освоен'
    : (c.closure && undisbursed > 0 && c.closure.disbClosed) ? 'Освоение закрыто'
    : (disbursed === 0) ? 'Не освоен'
    : (disbursed < c.contractAmount) ? 'Частично освоен'
    : 'Полностью освоен';
  const debt          = debtFromLedger(c);
  const overdueDays   = Math.max(0, ...c.tranches.map(overdueDaysOfTranche));
  const coverage      = computeCoverage(c);
  const riskCategory  = riskWorstOf(c, overdueDays);
  const overlays      = buildOverlays(c, overdueDays);
  const fullRepayDate = maxFullRepayDate(c);
  const termAgg       = Math.max(0, ...c.tranches.filter(activeTranche).map(t => (t.conditions && t.conditions.term) || 0));
  const reserveAccrual = computeReserve(c);
  const scheduleTotals = computeScheduleTotals(c);
  return { disbursed, undisbursed, allocated, allocatable, disbState, debt,
           overdueDays, riskCategory, coverage, overlays, fullRepayDate, termAgg,
           reserveAccrual, scheduleTotals };
}

/* ---- 3.4 requiredDocsComplete(credit) — обязательный комплект документов (Г-7).
   Документ считается закрывающим гейт, если его состояние окончательное и не
   блокирующее: «принят» либо «не требуется» (§5.3: «принят / отклонён / не
   требуется / просрочен»). Любой документ в состоянии «отклонён»/«просрочен»
   или без явного состояния — комплект не собран. */
function requiredDocsComplete(credit){
  return (credit.docs || []).every(doc => doc.state === 'принят' || doc.state === 'не требуется');
}

/* ============================================================
   4. gate(credit, action, ctx) — единая точка блокировок Г-1…Г-16 (Task 3).
   Чистая функция: только чтение credit/ctx через derive(), никаких побочных
   эффектов. Г-10 — внутри addAgreement (Task 5). Г-17 — структурный запрет
   (нет кнопок «Удалить»), в gate() не участвует.
   ============================================================ */
function gate(credit, action, ctx = {}){
  const r = []; const d = credit ? derive(credit) : null;
  switch(action){
    case 'saveContractAmount':
      if (ctx.value > credit.approvedAmount) r.push('Сумма договора не может превышать одобренную ('+money(credit.approvedAmount)+')'); // Г-1
      break;
    case 'createCredit':
      if (!ctx.application || ctx.application.approved!==true) r.push('Кредит создаётся только из одобренной заявки'); // Г-2
      else if (ctx.application.creditId) r.push('У заявки уже есть кредит');
      break;
    case 'addTranche':
      if (ctx.amount > d.allocatable) r.push('Σ сумм траншей не может превышать сумму договора (доступно '+money(d.allocatable)+')'); // Г-3
      break;
    case 'addDisbursement': {
      const t = credit.tranches.find(x=>x.no===ctx.trancheNo);
      if (!t) r.push('Транш не найден');                                // защита от неизвестного trancheNo (иначе gate проходит, а мутация падает на push в undefined)
      const already = t ? disbursedSum(t) : 0;
      if (t && ctx.amount + already > t.amount) r.push('Σ освоений транша не может превышать сумму транша'); // Г-4
      if (!['Зарегистрирован','Действует'].includes(credit.lifecycle)) r.push('Освоение возможно только при ЖЦ «Зарегистрирован» или «Действует»'); // Г-5
      if (!d.coverage.ok && !credit.kmDecision && !(credit.mirror && credit.mirror.pledgeWaiver)) r.push('Провал покрытия: нужны реквизиты решения КМ (Р-8) или waiver комиссии по залогу'); // Г-6
      break;
    }
    case 'waiver':                                                       // второй разблок Г-6 — waiver залоговой комиссии (Task 5)
      if (!ctx.reason || !String(ctx.reason).trim()) r.push('Waiver требует обоснования (протокол комиссии по залогу)');
      break;
    case 'addAgreement':                                                                    // Г-10
      if (!ctx.num || !ctx.date) r.push('Доп. соглашение требует номер и дату (Г-10)');
      break;
    case 'register': {                                                                     // Г-7
      if (!credit.num || !credit.date || !credit.reg.scan) r.push('Нужны номер, дата и скан договора');
      if (!requiredDocsComplete(credit)) r.push('Не собран обязательный комплект документов');
      if (!d.coverage.ok && !credit.kmDecision && !(credit.mirror && credit.mirror.pledgeWaiver)) r.push('Не пройден гейт покрытия (или исключение Г-6)');
      break;
    }
    case 'buildSchedule':
      if (!ctx.tranche || ctx.tranche.disbursements.length===0) r.push('График строится только от фактической даты освоения транша'); // Г-8
      break;
    case 'editConditions':
      if (credit.lifecycle!=='Проект') r.push('Изменение условий — только доп. соглашением'); // Г-9
      break;
    case 'savePayment':                                                                    // Г-11
      if (!(ctx.amount>0)) r.push('Сумма платежа должна быть > 0');
      if (ctx.dateAfterToday) r.push('Дата платежа не может быть в будущем');
      if (!ctx.trancheNo) r.push('Транш обязателен');
      break;
    case 'writeOff':
      if (!ctx.doc || !ctx.doc.kind || !ctx.doc.num || !ctx.doc.date) r.push('Списание — только с реквизитами решения (вид · номер · дата)'); // Г-12
      break;
    case 'linkPledge':
      if (!ctx.pledge || ctx.pledge.pledgorInn !== credit.borrower.inn) r.push('Привязка — только договоры того же ИНН заёмщика'); // Г-13
      break;
    case 'repay':                                                                          // Г-14
      { const b = d.debt; const nonzero = ['principal','interest','penalty'].some(k=>b[k].bal>0.005);
        if (nonzero) r.push('«Погашен» — только при нулевом остатке по всем слоям');
        if ((credit.mirror.collection||[]).length) r.push('Есть активный процесс взыскания'); }
      break;
    case 'holdAccrual':
      if (!ctx.reason || !ctx.doc || !ctx.from) r.push('Приостановление — только с основанием, документом и датой начала'); // Г-15
      break;
    case 'transferDebt':
      if (!ctx.agreement || !ctx.agreement.registered) r.push('Заёмщик не меняется без зарегистрированного соглашения'); // Г-16
      break;
  }
  return { ok: r.length===0, reasons: r };
}

/* ---- 4.1 canRole(role, action) — матрица прав по ролям (§7). ---- */
const ROLE_ACTIONS = {
  'Кредитный специалист': new Set(['createCredit','saveContractAmount','register','addTranche','addDisbursement','buildSchedule','addAgreement','editConditions','editDocs']),
  'Куратор': new Set(['targetUse','inspection','holdAccrual','transferDebt','linkPledge']),
  'Бухгалтер': new Set(['savePayment']),
  'Начальник отдела': new Set(['createCredit','saveContractAmount','register','addTranche','addDisbursement','buildSchedule','addAgreement','editConditions','editDocs','targetUse','inspection','holdAccrual','transferDebt','linkPledge','savePayment','waiver','setKmDecision','writeOff','repay']),
  'Наблюдатель': new Set(),
};
function canRole(role, action){ return (ROLE_ACTIONS[role]||new Set()).has(action); }

/* ============================================================
   5. МУТАЦИИ — операции, меняющие состояние credit/tranche (Task 4+).
   Каждая мутация: gate() → если заблокирован, возвращает {ok:false,reasons} и НЕ
   трогает модель → если ok, применяет изменение → append-only запись в credit.audit
   (никаких физических удалений/перезаписей — Р-4/Г-17). Функции чистые относительно
   document (работают только с переданными объектами).
   ============================================================ */

/* версии графика транша (Р-4, Г-8): предыдущая активная версия ДЕМОТИРУЕТСЯ
   (active:false) и остаётся в массиве как архив — не перезаписывается и не удаляется.
   Возврат: при блоке — {ok:false,reasons:[...]} гейта; при успехе — новая версия
   {ver,active,generatedFrom,rows}. */
function generateSchedule(credit, trancheNo, params){
  const t = credit.tranches.find(x => x.no === trancheNo);
  const g = gate(credit, 'buildSchedule', { tranche: t });               // Г-8
  if (!g.ok) return g;
  const built = buildSchedule(t, params.from);
  t.schedules = t.schedules || [];
  const prevActive = t.schedules.find(s => s.active);
  if (prevActive) prevActive.active = false;                             // архив, не удаление (Р-4)
  const ver = t.schedules.reduce((m,s) => Math.max(m, s.ver || 0), 0) + 1;
  const version = { ver, active:true, generatedFrom: params.from, rows: built.rows };
  t.schedules.push(version);
  pushAudit(credit, `Сформирован график погашения v${ver} по траншу №${trancheNo} от ${params.from}`,
    prevActive || null, version);
  return version;
}

/* приостановка начисления процентов (Р-17, Г-15). Интервал живёт на credit.accrualHold
   (его читают derive/buildOverlays/риск-подавление 181-го дня — не трогать это поле) И
   зеркалируется на accrualHold КАЖДОГО транша кредита, потому что buildSchedule(tranche,
   fromDate) получает только транш, без ссылки на кредит. Пеня при паузе продолжает
   начисляться (within() внутри buildSchedule обнуляет только interest). */
function holdAccrual(credit, ctx){
  const g = gate(credit, 'holdAccrual', ctx);                            // Г-15
  if (!g.ok) return g;
  const hold = { from: ctx.from, to: ctx.to || null, reason: ctx.reason, doc: ctx.doc, by: ctx.by || '' };
  credit.accrualHold.push(hold);
  for (const t of credit.tranches){ t.accrualHold = t.accrualHold || []; t.accrualHold.push(hold); }
  pushAudit(credit, `Приостановлено начисление процентов ${ctx.from}–${ctx.to || '…'} (${ctx.reason})`,
    null, hold);
  return g;
}

/* Текущая роль пользователя — источник audit.who. Живёт как обычная переменная
   области видимости <script>, а НЕ на window.CR/document, чтобы быть доступной
   и в браузере, и в смоук-песочнице node:vm (там window — вложенный объект
   sandbox, а не globalThis, поэтому даже window.CR.* небезопасно читать из
   верхнеуровневого/чистого кода — см. переключение роли ниже, оно живёт
   только в DOM-блоке и на bare-CR вне браузера не полагается). */
let currentRole = 'Кредитный специалист';

/* Единая точка записи в append-only журнал (§0.5, Г-17): запись ЗАМОРОЖЕНА —
   Object.freeze — и никогда не редактируется/не удаляется. Нет CR.deleteAudit. */
function pushAudit(credit, what, before, after){
  const entry = Object.freeze({ when: TODAY, who: currentRole, what, before, after });
  credit.audit.push(entry);
  return entry;
}

/* saveContractAmount(credit, value) — Г-1: сумма договора ≤ одобренной (Р-12). */
function saveContractAmount(credit, value){
  const g = gate(credit, 'saveContractAmount', { value });               // Г-1
  if (!g.ok) return g;
  const before = credit.contractAmount;
  credit.contractAmount = value;
  pushAudit(credit, 'saveContractAmount', before, value);
  return g;
}

/* addTranche(credit, {amount,plannedDate,subject}) — Г-3: Σ траншей ≤ суммы договора.
   Условия транша наследуются от базовых условий кредита (Р-2, диффуются позже правкой). */
function addTranche(credit, ctx){
  const g = gate(credit, 'addTranche', { amount: ctx.amount });          // Г-3
  if (!g.ok) return g;
  const no = credit.tranches.reduce((m,t) => Math.max(m, t.no || 0), 0) + 1;
  const t = mkTranche({
    id: credit.id + '-T' + no, no,
    subject: ctx.subject || { inn: credit.borrower.inn, name: credit.borrower.name },
    amount: ctx.amount, plannedDate: ctx.plannedDate || '',
    conditions: Object.assign({}, credit.baseConditions)
  });
  credit.tranches.push(t);
  pushAudit(credit, 'addTranche', null, t);
  return g;
}

/* addDisbursement(credit, {trancheNo,amount,order,purpose,doc}) — Г-4 (сумма транша) ·
   Г-5 (ЖЦ) · Г-6 (покрытие/КМ/waiver), все три проверяет единый gate('addDisbursement'). */
function addDisbursement(credit, ctx){
  const g = gate(credit, 'addDisbursement', { trancheNo: ctx.trancheNo, amount: ctx.amount }); // Г-4/Г-5/Г-6
  if (!g.ok) return g;
  const t = credit.tranches.find(x => x.no === ctx.trancheNo);
  const before = (t.disbursements || []).slice();
  const rec = { date: ctx.date || TODAY, amount: ctx.amount, order: ctx.order || '', purpose: ctx.purpose || '', doc: ctx.doc || '' };
  t.disbursements.push(rec);
  pushAudit(credit, 'addDisbursement', before, rec);
  return g;
}

/* setKmDecision(credit, {kind,num,date,scan}) — реквизиты решения КМ об освобождении
   от залога (Р-8, П1 §2.6). Собственного блокирующего гейта нет: сама фиксация — это
   разблокирующее событие для Г-6/Г-7 (gate('addDisbursement'|'register') читает
   credit.kmDecision напрямую). */
function setKmDecision(credit, ctx){
  const g = gate(credit, 'setKmDecision', ctx);
  if (!g.ok) return g;
  const before = credit.kmDecision;
  const after = { kind: ctx.kind, num: ctx.num, date: ctx.date, scan: ctx.scan };
  credit.kmDecision = after;
  pushAudit(credit, 'setKmDecision', before, after);
  return g;
}

/* saveWaiver(credit, {reason}) — второй разблок Г-6/Г-7: waiver залоговой комиссии
   (альтернатива решению КМ). Пустое обоснование не сохраняется (case 'waiver' в gate). */
function saveWaiver(credit, ctx){
  const g = gate(credit, 'waiver', ctx);
  if (!g.ok) return g;
  const before = credit.mirror.pledgeWaiver || null;
  const after = { reason: ctx.reason, when: TODAY };
  credit.mirror.pledgeWaiver = after;
  pushAudit(credit, 'saveWaiver', before, after);
  return g;
}

/* addPayment(credit, {amount,date,trancheNo}) — Г-11 (savePayment). Р-5: ручной ввод —
   это ВЫЗОВ ФОРМЫ МОДУЛЯ-ВЛАДЕЛЬЦА, платёж повисает «Ожидает ЦК» и НЕ трогает ledger/
   долг кредита — подтверждённые остатки двигает только ЦК своим потоком (вне макета).
   Поэтому derive()/debtFromLedger читают только ledger, платёж на debt не влияет,
   пока match не станет «Подтверждён ЦК» (см. TODO у debtFromLedger, §3.2). */
function addPayment(credit, ctx){
  const dateAfterToday = ctx.date ? pd(ctx.date) > pd(TODAY) : false;
  const g = gate(credit, 'savePayment', { amount: ctx.amount, dateAfterToday, trancheNo: ctx.trancheNo }); // Г-11
  if (!g.ok) return g;
  const num = (credit.mirror.payments.length || 0) + 1;
  const rec = { num, date: ctx.date, amount: ctx.amount, tranche: ctx.trancheNo,
    reg:'Ручной ввод', match:'Ожидает ЦК', frozen:false, layers:{} };
  credit.mirror.payments.push(rec);
  pushAudit(credit, 'addPayment', null, rec);
  return g;
}

/* paymentEditable(credit, payment) — чистый предикат (Р-5): платёж, подтверждённый ЦК,
   недоступен для правки из кредита ни при какой роли (мираж ЦК всегда read-only). */
function paymentEditable(credit, p){ return (p && p.match) !== 'Подтверждён ЦК'; }

/* addAgreement(credit, {num,date,source,before,after}) — Г-10: версии условий только
   доп. соглашением (Р-4). Предыдущая активная версия ДЕМОТИРУЕТСЯ (active:false) и
   остаётся в массиве архивом — не перезаписывается/не удаляется. */
function addAgreement(credit, ctx){
  const g = gate(credit, 'addAgreement', ctx);                           // Г-10
  if (!g.ok) return g;
  const prevActive = credit.agreements.find(a => a.active);
  if (prevActive) prevActive.active = false;                             // архив, не удаление (Р-4)
  const version = { num: ctx.num, date: ctx.date, source: ctx.source || 'кредит',
    before: ctx.before || {}, after: ctx.after || {}, active: true };
  credit.agreements.push(version);
  pushAudit(credit, 'addAgreement', prevActive || null, version);
  return g;
}

/* closeCredit(credit, {reason,doc}) — терминалы «Погашен»(Г-14=repay)/«Списан»(Г-12=writeOff),
   Р-20: обязательные реквизиты, без физ. удаления. */
function closeCredit(credit, ctx){
  const action = ctx.reason === 'Погашен' ? 'repay' : ctx.reason === 'Списан' ? 'writeOff' : null;
  if (!action) return { ok:false, reasons:['Неизвестное основание закрытия — только «Погашен» либо «Списан»'] };
  const g = gate(credit, action, { doc: ctx.doc });                      // Г-14 / Г-12
  if (!g.ok) return g;
  const before = credit.closure;
  const after = { reason: ctx.reason, date: TODAY, doc: ctx.doc || null };
  credit.closure = after;
  credit.lifecycle = 'Закрыт';
  pushAudit(credit, 'closeCredit', before, after);
  return g;
}

/* linkPledge(credit, pledge) — Г-13: привязка ТОЛЬКО существующего залогового
   договора того же ИНН заёмщика (Р-7 — «Создать залоговый договор» из кредита нет). */
function linkPledge(credit, pledge){
  const g = gate(credit, 'linkPledge', { pledge });                      // Г-13
  if (!g.ok) return g;
  const before = credit.mirror.pledges.length;
  credit.mirror.pledges.push(pledge);
  pushAudit(credit, 'linkPledge', before, pledge);
  return g;
}

/* zeroOutForTest(credit) — ТЕСТ-ХЕЛПЕР (не бизнес-функция, не в export UI-путях):
   обнуляет остатки detail-расчёта по всем траншам, чтобы можно было проверить
   позитивную ветку Г-14 (closeCredit «Погашен») без банковского движка погашения. */
function zeroOutForTest(credit){
  for (const t of credit.tranches){
    for (const l of (t.ledger || [])){
      l.principalBal = 0; l.principalOverdue = 0; l.principalDue = 0;
      l.interestOverdue = 0; l.interestPaid = l.interestAccrued || 0;
      l.penaltyBal = 0;
    }
  }
}

/* ---- 6. Экспорт логического слоя (§0.2). db=null до DOM-инициализации. ---- */
window.CR = {
  seedDb,
  db: null,
  derive, buildSchedule, gate, canRole,
  generateSchedule, holdAccrual,
  saveContractAmount, addTranche, addDisbursement, setKmDecision, saveWaiver,
  addPayment, paymentEditable, addAgreement, closeCredit, linkPledge,
  zeroOutForTest,
  // утилиты — пригодятся тестам и UI
  money, pd, fd, addM, dd, toast, TODAY
};

/* ---- 7. DOM: рендер и обвязка (только в браузере) ---- */
if (typeof document !== 'undefined') {
  CR.db = seedDb();                                  // живой изменяемый экземпляр

  /* дерево навигации сайдбара (активна «Система кредитования → Кредиты») */
  const TREE = [
    { label:'Система кредитования', open:true, subs:[
      { label:'Заявки и комиссии', items:[{ label:'Заявки' }, { label:'Комиссии по заявкам' }] },
      { label:'Программы и решения', items:[{ label:'Решение правительства' }, { label:'Кредитные программы' }] },
      { label:'Заёмщики', items:[{ label:'Заёмщики' }] },
      { label:'Кредиты и транши', items:[{ label:'Кредиты', active:true }, { label:'Освоение' }, { label:'Список траншей' }] }
    ]},
    { label:'Обеспечение', subs:[{ headerless:true, items:[{ label:'Реестр залогов' }, { label:'Поручительства' }] }] },
    { label:'Проблемная задолженность', subs:[{ headerless:true, items:[{ label:'Реструктуризация' }, { label:'Взыскание' }] }] }
  ];
  function renderNav(){
    const host = document.getElementById('nav'); if (!host) return;
    host.innerHTML = TREE.map(g => {
      const subs = (g.subs || []).map(s => {
        const items = (s.items || []).map(it =>
          `<a class="nav-item${it.active ? ' active' : ''}${s.headerless ? ' headerless' : ''}"
             onclick="if(!${!!it.active})CR.toast('Раздел «'+this.textContent.trim()+'» — вне объёма макета')">${it.label}</a>`).join('');
        if (s.headerless) return items;
        return `<div class="nav-sub open"><button class="nav-toggle" onclick="this.parentElement.classList.toggle('open')">
            <span class="chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
            <span class="lbl">${s.label}</span></button><div class="nav-children">${items}</div></div>`;
      }).join('');
      return `<div class="nav-group${g.open ? ' open' : ''}"><button class="nav-toggle" onclick="this.parentElement.classList.toggle('open')">
          <span class="chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
          <span class="lbl">${g.label}</span></button><div class="nav-children">${subs}</div></div>`;
    }).join('');
  }

  /* смена роли (полная матрица прав — Task 2+; здесь только запоминание и тост) */
  CR.state = { role: 'Кредитный специалист' };
  CR.onRoleChange = function(){
    const sel = document.getElementById('roleSel');
    CR.state.role = sel ? sel.value : CR.state.role;
    currentRole = CR.state.role;                    // синхронизация с audit.who (мутации читают currentRole)
    toast('Роль: ' + CR.state.role);
  };
  CR.closeModal = function(){ const h = document.getElementById('modalHost'); if (h) h.classList.remove('open'); };

  renderNav();
  // реестр/карточка наполняются в Task 2+ — здесь скелет готов.
}
