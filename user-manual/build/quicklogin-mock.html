<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><title>mock</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"DejaVu Sans",Arial,sans-serif;background:#eef1f5;
    display:flex;justify-content:center;padding:40px;}
  .card{background:#fff;width:440px;padding:34px 36px 30px;border-radius:4px;
    box-shadow:0 6px 30px rgba(15,23,42,.08);}
  .logo{font-size:30px;font-weight:800;color:#1e293b;margin-bottom:20px;}
  label{display:block;font-size:13px;margin-bottom:5px;}
  label.u{color:#1d4ed8;} label.p{color:#64748b;}
  label .req{color:#1d4ed8;}
  .inp{height:38px;background:#e9edf2;border:none;border-radius:4px;
    display:flex;align-items:center;padding:0 12px;color:#334155;font-size:14px;margin-bottom:16px;position:relative;}
  .inp .eye{position:absolute;right:12px;color:#94a3b8;font-size:16px;}
  .btn{height:40px;background:#1f6bff;color:#fff;font-weight:700;font-size:15px;
    border-radius:4px;display:flex;align-items:center;justify-content:center;margin-top:4px;}
  .sep{display:flex;align-items:center;gap:10px;margin:22px 0 14px;color:#94a3b8;font-size:12px;}
  .sep::before,.sep::after{content:"";flex:1;height:1px;background:#e2e8f0;}
  .ql{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;}
  .ql .row{display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;border-bottom:1px solid #eef2f7;}
  .ql .row:last-child{border-bottom:none;}
  .ql .row:hover{background:#f8fafc;}
  .role{font-weight:700;color:#1e293b;font-size:13.5px;}
  .creds{font-size:11.5px;color:#94a3b8;margin-top:2px;}
  .go{background:#eef4ff;color:#1d4ed8;font-weight:700;font-size:12px;
    padding:6px 14px;border-radius:6px;}
  .hint{font-size:11px;color:#94a3b8;margin-top:10px;text-align:center;}
</style></head><body>
  <div class="card">
    <div class="logo">АСУБК</div>
    <label class="u">Пользователь <span class="req">•</span></label>
    <div class="inp">admin</div>
    <label class="p">Пароль <span class="req" style="color:#64748b">•</span></label>
    <div class="inp">•••••<span class="eye">👁</span></div>
    <div class="btn">Войти</div>

    <div class="sep">Быстрый вход (тестовая среда)</div>
    <div class="ql">
      <div class="row"><div><div class="role">Администратор</div><div class="creds">admin</div></div><div class="go">Войти</div></div>
      <div class="row"><div><div class="role">Кредитный инспектор</div><div class="creds">inspector</div></div><div class="go">Войти</div></div>
      <div class="row"><div><div class="role">Член комиссии</div><div class="creds">commission</div></div><div class="go">Войти</div></div>
      <div class="row"><div><div class="role">Наблюдатель</div><div class="creds">viewer</div></div><div class="go">Войти</div></div>
    </div>
    <div class="hint">Доступно только в тестовой среде</div>
  </div>
</body></html>
